name: Scraping Didattico Completo Google Maps

on: 
  workflow_dispatch:

jobs:
  scrape_maps_details:
    runs-on: ubuntu-latest
    steps:

      - name: Setup 1 WARProxy Docker Container (IPv6)
        # Il proxy serve per evitare blocchi immediati dell'IP di GitHub da parte di Google
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          docker run --name warproxy-1 --network host \
            -e SOCKS5_PORT=$PORT -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -d ghcr.io/kingcc/warproxy:latest
          sleep 5

      - name: Verifica IP IPv6 (socks5h)
        run: |
          PORT=40001
          for i in {1..3}; do
            IP=$(curl -s --max-time 5 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org) && break || sleep 2
          done
          echo "Proxy pronto. IP di uscita: $IP"

      - name: Setup Ambiente e Dipendenze
        # Installiamo solo SeleniumBase per controllare direttamente il browser
        run: |
          pip install seleniumbase
          seleniumbase install chromedriver

      - name: Avvio Xvfb (Display virtuale per Selenium)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Esecuzione Scraping Didattico Multidato
        run: |
          python -c "
          import json
          import urllib.parse
          import time
          import re
          from seleniumbase import Driver

          # Lista di test
          nomi_attivita = [
              'Colosseo, Roma',
              'Da Enzo al 29, Roma',
              'Hoffell hot tub'
          ]

          print('Avvio del browser controllato via SeleniumBase...', flush=True)
          driver = Driver(uc=True, headless=False, proxy='socks5://127.0.0.1:40001')
          
          risultati = []
          cookie_accettati = False

          try:
              for nome in nomi_attivita:
                  nome_trimmed = nome.strip()
                  print(f'\n=== Avvio estrazione per: \"{nome_trimmed}\" ===', flush=True)
                  
                  search_url = f'https://www.google.com/maps/search/{urllib.parse.quote(nome_trimmed)}'
                  driver.get(search_url)
                  time.sleep(5)
                  
                  # 1. Gestione Banner Cookie di Google (solo la prima volta)
                  if not cookie_accettati:
                      try:
                          consent_btn = driver.find_element('css selector', 'button[aria-label*=\"Accetta\"], button[aria-label*=\"Accept\"], [aria-label*=\"Agree\"]')
                          consent_btn.click()
                          cookie_accettati = True
                          print('-> Cookie di Google accettati con successo.', flush=True)
                          time.sleep(2)
                      except Exception:
                          pass
                  
                  # 2. Disambiguazione automatica se Google mostra una lista di risultati (es: Colosseo)
                  current_url = driver.current_url
                  if '/maps/place/' not in current_url:
                      try:
                          first_result_el = driver.find_element('css selector', 'a[href*=\"/maps/place/\"]')
                          resolved_url = first_result_el.get_attribute('href')
                          print(f'-> Rilevata lista. Caricamento primo risultato utile: {resolved_url}', flush=True)
                          driver.get(resolved_url)
                          time.sleep(5)
                      except Exception:
                          print('-> Impossibile disambiguare l\'elenco dei risultati, tento l\'estrazione dalla pagina attuale.', flush=True)
                  
                  # Inizializzazione del dizionario dati per questo specifico locale
                  info_locale = {
                      'ricerca_originale': nome_trimmed,
                      'url_mappa': driver.current_url,
                      'nome': 'N/D',
                      'categoria': 'N/D',
                      'indirizzo': 'N/D',
                      'telefono': 'N/D',
                      'sito_web': 'N/D',
                      'media_stelle': 'N/D',
                      'totale_recensioni': 'N/D',
                      'coordinate': {},
                      'popular_times_affluenza': [],
                      'caratteristiche_servizi': []
                  }
                  
                  # A. Estrazione del Nome (tag H1 della scheda)
                  try:
                      info_locale['nome'] = driver.find_element('css selector', 'h1').text
                  except Exception: pass
                  
                  # B. Estrazione della Categoria (tag pulsante con jsaction category)
                  try:
                      info_locale['categoria'] = driver.find_element('css selector', 'button[jsaction*=\"category\"]').text
                  except Exception: pass

                  # C. Estrazione dell'Indirizzo (selettore stabile tramite data-item-id)
                  try:
                      info_locale['indirizzo'] = driver.find_element('css selector', '[data-item-id=\"address\"]').text
                  except Exception: pass
                  
                  # D. Estrazione del Telefono (selettore stabile tramite data-item-id)
                  try:
                      info_locale['telefono'] = driver.find_element('css selector', '[data-item-id^=\"phone:tel\"]').text
                  except Exception: pass
                  
                  # E. Estrazione del Sito Web (selettore stabile tramite data-item-id)
                  try:
                      info_locale['sito_web'] = driver.find_element('css selector', '[data-item-id=\"authority\"]').get_attribute('href')
                  except Exception: pass
                  
                  # F. Estrazione delle Coordinate Geografiche (estrapolate tramite Regex dall'URL attivo)
                  match = re.search(r'@([-0-9.]+),([-0-9.]+)', driver.current_url)
                  if match:
                      info_locale['coordinate'] = {
                          'latitudine': float(match.group(1)),
                          'longitudine': float(match.group(2))
                      }
                      
                  # G. Estrazione delle Stelle Medie e del Totale Recensioni (Parsing del div delle stelle)
                  try:
                      rating_text = driver.find_element('css selector', 'div.F7nice').text
                      if '(' in rating_text:
                          parts = rating_text.split('(')
                          info_locale['media_stelle'] = float(parts[0].replace(',', '.'))
                          info_locale['totale_recensioni'] = int(parts[1].replace(')', '').replace('.', '').replace(',', ''))
                  except Exception: pass

                  # H. Estrazione dei grafici di affluenza (Popular Times)
                  try:
                      barre = driver.find_elements('css selector', 'div.g27YOf')
                      for b in barre:
                          lbl = b.get_attribute('aria-label')
                          if lbl:
                              info_locale['popular_times_affluenza'].append(lbl)
                  except Exception: pass

                  # I. Estrazione Caratteristiche e Servizi (Cliccando sul pulsante 'Informazioni')
                  try:
                      url_scheda_corrente = driver.current_url
                      # Individua e clicca il pulsante Informazioni / About
                      info_btn = driver.find_element('css selector', 'button[data-tooltip=\"Informazioni\"], button[aria-label*=\"Informazioni\"]')
                      info_btn.click()
                      time.sleep(2)
                      
                      # Cattura tutti i testi dei servizi nella lista
                      elementi_servizi = driver.find_elements('css selector', 'li.FontNormal')
                      for s in elementi_servizi:
                          if s.text:
                              info_locale['caratteristiche_servizi'].append(s.text)
                              
                      # Ricarica la scheda principale per non inficiare le ricerche dei locali successivi
                      driver.get(url_scheda_corrente)
                      time.sleep(2)
                  except Exception: pass
                  
                  print(f'-> Estrazione ultimata per: {info_locale[\"nome\"]}', flush=True)
                  risultati.append(info_locale)
                  
          finally:
              driver.quit()

          # Scrittura del JSON finale ordinato
          with open('dati_completi_mappe.json', 'w', encoding='utf-8') as f:
              json.dump(risultati, f, indent=4, ensure_ascii=False)
          print('\nFile dati_completi_mappe.json creato con successo.')
          "

      - name: Esporta Risultati in JSON
        uses: actions/upload-artifact@v4
        with:
          name: Dati_Mappe_Estratti
          path: dati_completi_mappe.json
