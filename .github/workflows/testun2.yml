name: Scraping Integrato e Guida Turistica Visiva con Gemini AI

on: 
  workflow_dispatch:

jobs:
  scrape_and_generate_guide:
    runs-on: ubuntu-latest
    steps:

      - name: Setup 1 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          docker run --name warproxy-1 --network host \
            -e SOCKS5_PORT=$PORT -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -d ghcr.io/kingcc/warproxy:latest
          sleep 5

      - name: Verifica IP IPv6 (socks5h)
        run: |
          PORT=40001
          for i in {1..3}; do
            IP=$(curl -s --max-time 5 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org) && break || sleep 2
          done
          echo "Proxy pronto. IP di uscita: $IP"

      - name: Setup Ambiente e Dipendenze Essenziali
        run: |
          git clone https://github.com/georgekhananaev/google-reviews-scraper-pro.git
          cd google-reviews-scraper-pro
          pip install -r requirements.txt
          # Installiamo il NUOVO SDK ufficiale 'google-genai'
          pip install pyyaml seleniumbase google-genai requests
          seleniumbase install chromedriver

      - name: Avvio Xvfb (Display virtuale per Selenium)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Scrivi Script Risolutore (Fase 1)
        shell: bash
        run: |
          cat << 'EOF' > google-reviews-scraper-pro/resolve_maps.py
          import json
          import urllib.parse
          import time
          import re
          import yaml
          from seleniumbase import Driver

          nomi_attivita = [
              'Colosseo, Roma',
              'Da Enzo al 29, Roma',
              'Hoffell hot tub'
          ]

          def pulisci_testo(testo):
              if not testo:
                  return 'N/D'
              testo_pulito = re.sub(r'^[\s\W_]+', '', testo)
              return testo_pulito.strip()

          print('Avvio del browser controllato via SeleniumBase (English)...', flush=True)
          driver = Driver(uc=True, headless=False, proxy='socks5://127.0.0.1:40001')
          
          risultati = []
          businesses_list = []
          cookie_accettati = False

          try:
              for nome in nomi_attivita:
                  nome_trimmed = nome.strip()
                  print(f'\n=== Risoluzione ed Estrazione Dati per: "{nome_trimmed}" ===', flush=True)
                  
                  search_url = f'https://www.google.com/maps/search/{urllib.parse.quote(nome_trimmed)}?hl=en'
                  driver.get(search_url)
                  time.sleep(5)
                  
                  if not cookie_accettati:
                      try:
                          consent_btn = driver.find_element('css selector', 'button[aria-label*="Accetta"], button[aria-label*="Accept"], [aria-label*="Agree"]')
                          consent_btn.click()
                          cookie_accettati = True
                          print('-> Cookie di Google accettati.', flush=True)
                          time.sleep(2)
                      except Exception:
                          pass
                  
                  current_url = driver.current_url
                  if '/maps/place/' not in current_url:
                      try:
                          first_result_el = driver.find_element('css selector', 'a[href*="/maps/place/"]')
                          resolved_url = first_result_el.get_attribute('href')
                          
                          if 'hl=' not in resolved_url:
                              resolved_url += '&hl=en'
                          else:
                              resolved_url = re.sub(r'hl=[a-z]{2}', 'hl=en', resolved_url)
                              
                          print(f'-> Rilevata lista. Carico il primo risultato: {resolved_url}', flush=True)
                          driver.get(resolved_url)
                          time.sleep(5)
                      except Exception:
                          print('-> Nessuna corrispondenza diretta o lista trovata.', flush=True)
                  
                  info_locale = {
                      'ricerca_originale': nome_trimmed,
                      'url_mappa': driver.current_url,
                      'nome': 'N/D',
                      'categoria': 'N/D',
                      'indirizzo': 'N/D',
                      'telefono': 'N/D',
                      'sito_web': 'N/D',
                      'media_stelle': 'N/D',
                      'totale_recensioni': 'N/D',
                      'coordinate': {},
                      'popular_times_affluenza': [],
                      'caratteristiche_servizi': []
                  }
                  
                  try:
                      info_locale['nome'] = driver.find_element('css selector', 'h1').text
                  except Exception: pass
                  
                  try:
                      info_locale['categoria'] = driver.find_element('css selector', 'button[jsaction*="category"]').text
                  except Exception: pass

                  try:
                      raw_address = driver.find_element('css selector', '[data-item-id="address"]').text
                      info_locale['indirizzo'] = pulisci_testo(raw_address)
                  except Exception: pass
                  
                  try:
                      raw_phone = driver.find_element('css selector', '[data-item-id^="phone:tel"]').text
                      info_locale['telefono'] = pulisci_testo(raw_phone)
                  except Exception: pass
                  
                  try:
                      info_locale['sito_web'] = driver.find_element('css selector', '[data-item-id="authority"]').get_attribute('href')
                  except Exception: pass
                  
                  # Coordinate
                  match_at = re.search(r'@([-0-9.]+),([-0-9.]+)', driver.current_url)
                  if match_at:
                      info_locale['coordinate'] = {
                          'latitudine': float(match_at.group(1)),
                          'longitudine': float(match_at.group(2))
                      }
                  else:
                      match_data = re.search(r'!3d([-0-9.]+)!4d([-0-9.]+)', driver.current_url)
                      if match_data:
                          info_locale['coordinate'] = {
                              'latitudine': float(match_data.group(1)),
                              'longitudine': float(match_data.group(2))
                          }
                      
                  # Stelle e totale recensioni
                  try:
                      rating_text = driver.find_element('css selector', 'div.F7nice').text
                      rating_text = rating_text.replace('\xa0', ' ')
                      if '(' in rating_text:
                          parts = rating_text.split('(')
                          info_locale['media_stelle'] = float(parts[0].strip())
                          reviews_raw = parts[1].split(')')[0]
                          only_numbers = re.sub(r'[^\d]', '', reviews_raw)
                          info_locale['totale_recensioni'] = int(only_numbers)
                  except Exception: pass

                  # Scroll per caricamento asincrono
                  try:
                      pannello = None
                      for selector in ['div[role="main"]', 'div.m67q6b', 'div.bJWbme', 'div.ecsc6b']:
                          try:
                              el = driver.find_element('css selector', selector)
                              if el.is_displayed():
                                  pannello = el
                                  break
                          except Exception:
                              pass
                      
                      if pannello:
                          print('-> Scorrimento progressivo della scheda per sbloccare l\'affluenza...', flush=True)
                          for pos in [300, 600, 900]:
                              driver.execute_script(f"arguments[0].scrollTo(0, {pos});", pannello)
                              time.sleep(1.5)
                  except Exception:
                      pass

                  # Grafici Affluenza
                  try:
                      barre = driver.find_elements('xpath', "//*[contains(@aria-label, 'busy') or contains(@aria-label, 'popular') or contains(@aria-label, 'historically')]")
                      for b in barre:
                          lbl = b.get_attribute('aria-label')
                          if lbl and lbl not in info_locale['popular_times_affluenza']:
                              info_locale['popular_times_affluenza'].append(lbl)
                  except Exception: pass

                  # Caratteristiche ed etichette (Informazioni)
                  try:
                      url_scheda_corrente = driver.current_url
                      info_btn = driver.find_element('css selector', 'button[data-tooltip="About"], button[aria-label*="About"]')
                      info_btn.click()
                      time.sleep(2)
                      
                      elementi_servizi = driver.find_elements('css selector', 'li.FontNormal, .DRY99e li, span.Y39Ktc, div.fontBodyMedium')
                      for s in elementi_servizi:
                          if s.text and s.text not in info_locale['caratteristiche_servizi']:
                              info_locale['caratteristiche_servizi'].append(s.text)
                              
                      driver.get(url_scheda_corrente)
                      time.sleep(2)
                  except Exception as e:
                      print(f'-> Avviso: scheda informazioni non accessibile per {nome_trimmed}: {e}', flush=True)
                  
                  print(f'-> Dati anagrafici estratti per: {info_locale["nome"]}', flush=True)
                  risultati.append(info_locale)
                  
                  # Registriamo l'URL con hl=en per lo scraper di recensioni
                  businesses_list.append({
                      'url': driver.current_url,
                      'custom_params': {'company': nome_trimmed}
                  })
                  
          finally:
              driver.quit()

          with open('dati_completi_mappe.json', 'w', encoding='utf-8') as f:
              json.dump(risultati, f, indent=4, ensure_ascii=False)

          config_data = {
              'headless': False,                       
              'sort_by': 'newest',                     
              'scrape_mode': 'full',                   
              'max_reviews': 50,                       
              'proxy': 'socks5://127.0.0.1:40001',     
              'db_path': ':memory:',                   
              'download_images': False,                
              'use_mongodb': False,                    
              'backup_to_json': True,                  
              'json_path': 'google_reviews.json',      
              'log_level': 'WARNING',                  
              'businesses': businesses_list
          }

          with open('config.yaml', 'w') as f:
              yaml.dump(config_data, f)

          print('\nFase 1 conclusa: generati dati_completi_mappe.json e config.yaml.', flush=True)
          EOF

      - name: Esecuzione Fase 1 (Risolutore ed Estrazione Dati Maps)
        run: |
          cd google-reviews-scraper-pro
          python resolve_maps.py

      - name: Esecuzione Fase 2 (Scraper Recensioni Ufficiale)
        run: |
          cd google-reviews-scraper-pro
          python start.py

      - name: Scrivi Script Generatore Guida AI con Gemini 3.1 Live (Fase 3)
        # Questo script implementa il nuovo SDK 'google-genai' e il modello richiesto
        shell: bash
        run: |
          cat << 'EOF' > google-reviews-scraper-pro/generate_guide.py
          import os
          import json
          import re
          import requests
          from google import genai
          from google.genai import types

          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              print("Errore: GEMINI_API_KEY non trovata nelle variabili d'ambiente.")
              exit(1)

          # Inizializziamo il Client ufficiale google-genai
          client = genai.Client(api_key=api_key)

          try:
              with open("google_reviews.json", "r", encoding="utf-8") as f:
                  reviews = json.load(f)
          except Exception as e:
              print(f"Impossibile leggere google_reviews.json: {e}")
              exit(1)

          # Raggruppiamo gli URL delle immagini per locale
          immagini_per_locale = {}
          for r in reviews:
              company = r.get("company")
              images = r.get("user_images", [])
              if company and images:
                  if company not in immagini_per_locale:
                      immagini_per_locale[company] = []
                  immagini_per_locale[company].extend(images)

          guida_turistica_visiva = {}

          for locale, urls in immagini_per_locale.items():
              urls_unici = list(set(urls))
              urls_campione = urls_unici[:5]
              
              if not urls_campione:
                  print(f"Nessuna immagine disponibile per {locale}.")
                  continue

              print(f"\n-> Analisi visiva per {locale} usando {len(urls_campione)} immagini con Gemini 3.1 Flash Live Preview...", flush=True)
              
              # Prepariamo la lista dei contenuti per la chiamata multimodale
              contents_payload = []
              
              for idx, url in enumerate(urls_campione):
                  try:
                      # Ottimizziamo il download chiedendo a Google foto leggermente più piccole (es: 400x400)
                      url_ottimizzato = re.sub(r'=w\d+-h\d+', '=w400-h400', url)
                      
                      response = requests.get(url_ottimizzato, timeout=10)
                      if response.status_code == 200:
                          # Creiamo la parte dall'array dei byte con il nuovo SDK google-genai
                          image_part = types.Part.from_bytes(
                              data=response.content,
                              mime_type="image/jpeg"
                          )
                          contents_payload.append(image_part)
                          print(f"   [Foto {idx+1}/{len(urls_campione)}] Scaricata con successo.", flush=True)
                  except Exception as e:
                      print(f"   [Foto {idx+1}] Errore durante il download: {e}", flush=True)

              if not contents_payload:
                  print(f"Nessuna immagine scaricata con successo per {locale}.")
                  continue

              # Prompt flessibile per identificazione entità, analisi visiva ed estrazione OCR
              prompt = """
              Sei un sistema di intelligenza artificiale multimodale specializzato in geomarketing, viaggi ed estrazione dati visivi.
              Analizza attentamente questo gruppo di immagini caricate dagli utenti per questa specifica attività commerciale o punto di interesse.
              
              Devi capire dinamicamente che tipo di entità stai analizzando (es. ristorante, attrazione naturale, terme/spa, monumento storico, chiesa, sentiero, museo, hotel, ecc.) e adattare l'analisi in base alle peculiarità del luogo.
              
              Inoltre, effettua un'operazione di OCR (riconoscimento ottico dei caratteri): se nelle foto compaiono cartelli, menu, listini cartacei, lavagne con prezzi, orari di apertura o avvisi scritti, estrai queste informazioni con la massima precisione.
              
              Restituisci l'output ESCLUSIVAMENTE in formato JSON con la seguente struttura:
              {
                  "tipo_entita": "Categoria identificata (es. Ristorante / Terme / Monumento Storico / Chiesa / Sentiero / Hotel)",
                  "descrizione_atmosfera": "Descrizione evocativa e professionale di 2 paragrafi in italiano sullo stile, l'atmosfera, il design, le luci e la 'vibe' del posto. Concentrati sulle emozioni visive.",
                  "analisi_visiva_dettagli": "Dettagli sugli elementi visibili (es. presentazione e cura dei piatti, stile degli arredi, panorama circostante, architettura, stato delle piscine o vasche termali, ecc.)",
                  "dati_estratti_da_cartelli": "Eventuali prezzi, orari, regole o informazioni testuali letti direttamente dalle scritte, dai menu o dai cartelli presenti nelle foto (se presenti, altrimenti scrivi 'Nessun cartello o menu con testo rilevato')"
              }
              
              Importante: rispondi esclusivamente in italiano per i testi descrittivi, e non menzionare mai che stai analizzando dei file o delle immagini nella 'descrizione_atmosfera'. Scrivi come se descrivessi l'esperienza vissuta sul posto.
              """
              
              contents_payload.append(prompt)

              try:
                  # Interroghiamo il modello specificato con la configurazione JSON attiva
                  response = client.models.generate_content(
                      model='gemini-3.1-flash-live-preview',
                      contents=contents_payload,
                      config=types.GenerateContentConfig(
                          response_mime_type="application/json"
                      )
                  )
                  
                  # Validiamo la risposta verificando che sia un JSON valido
                  json_data = json.loads(response.text)
                  guida_turistica_visiva[locale] = json_data
                  print(f"-> Analisi Gemini completata con successo per {locale}!", flush=True)
              except Exception as e:
                  print(f"Errore durante l'interrogazione di Gemini per {locale}: {e}", flush=True)

          # Scrittura del file finale
          output_path = "guida_viaggio_visiva.json"
          with open(output_path, "w", encoding="utf-8") as f:
              json.dump(guida_turistica_visiva, f, indent=4, ensure_ascii=False)

          print(f"\nGuida turistica visiva completata e salvata in {output_path}.", flush=True)
          EOF

      - name: Esecuzione Fase 3 (Generazione Guida Turistica con Gemini AI)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd google-reviews-scraper-pro
          python generate_guide.py

      - name: Organizzazione File per l'Esportazione
        run: |
          cp google-reviews-scraper-pro/dati_completi_mappe.json ./dati_completi_mappe.json
          cp google-reviews-scraper-pro/google_reviews.json ./google_reviews.json
          if [ -f "google-reviews-scraper-pro/guida_viaggio_visiva.json" ]; then
            cp google-reviews-scraper-pro/guida_viaggio_visiva.json ./guida_viaggio_visiva.json
          fi

      - name: Esporta Risultati (Tre JSON)
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Mappe_Recensioni_e_GuidaAI
          path: |
            dati_completi_mappe.json
            google_reviews.json
            guida_viaggio_visiva.json
