import os
import json
import re
import asyncio
import requests
from google import genai
from google.genai import types

# 1. Caricamento della chiave API di Gemini
api_key = os.environ.get("GEMINI_API_KEY")
if not api_key:
    print("Errore: GEMINI_API_KEY non trovata nelle variabili d'ambiente.")
    exit(1)

client = genai.Client(api_key=api_key)

# 2. Caricamento del file JSON delle recensioni
try:
    with open("google_reviews.json", "r", encoding="utf-8") as f:
        reviews = json.load(f)
except Exception as e:
    print(f"Errore: impossibile leggere google_reviews.json nella directory corrente: {e}")
    exit(1)

# Raggruppiamo gli URL delle immagini per locale
immagini_per_locale = {}
for r in reviews:
    company = r.get("company")
    images = r.get("user_images", [])
    if company and images:
        if company not in immagini_per_locale:
            immagini_per_locale[company] = []
        immagini_per_locale[company].extend(images)

guida_turistica_visiva = {}

# Esecuzione della sessione asincrona Live WebSocket
async def analizza_locale_live(locale, urls_campione):
    print(f"\n-> Avvio sessione Live WebSocket per {locale} con gemini-3.1-flash-live-preview...", flush=True)
    
    # Download delle immagini in memoria
    immagini_bytes = []
    for idx, url in enumerate(urls_campione):
        try:
            url_ottimizzato = re.sub(r'=w\d+-h\d+', '=w400-h400', url)
            response = requests.get(url_ottimizzato, timeout=10)
            if response.status_code == 200:
                immagini_bytes.append(response.content)
                print(f"   [Foto {idx+1}/{len(urls_campione)}] Scaricata.", flush=True)
        except Exception as e:
            print(f"   [Foto {idx+1}] Errore download: {e}", flush=True)

    if not immagini_bytes:
        print(f"Nessuna immagine scaricata per {locale}.", flush=True)
        return None

    # Configurazione della sessione Live
    config = types.LiveConnectConfig(
        response_modalities=[types.Modality.AUDIO],
        output_audio_transcription=types.AudioTranscriptionConfig()
    )

    # Prompt ottimizzato per analisi giornalistica ed empirica (OCR + Rilevamento)
    prompt = """
    Sei un giornalista d'inchiesta e un ricercatore sul campo specializzato in reportage di viaggio, geomarketing e analisi del territorio. 
    Il tuo compito è analizzare questo gruppo di immagini per ricostruire oggettivamente e scientificamente le caratteristiche reali del luogo. 
    
    Devi evitare ASSOLUTAMENTE qualsiasi tono poetico, metafora, espressione promozionale o aggettivo vuoto (es. evita formule come 'teatro di luci', 'protagonista indiscussa', 'magico', 'maestoso', 'immergiti nell'abbraccio di'). 
    Mantieni un tono giornalistico, analitico, asciutto, distaccato e basato esclusivamente su prove visive concrete ed inferenze logiche rigorose.
    
    Analizza le immagini focalizzandoti su:
    1. Ambiente geografico e geologico (tipo di paesaggio, vegetazione, fauna visibile come cavalli o pecore, meteo, elementi naturali come montagne, ghiacciai o corsi d'acqua).
    2. Infrastrutture, architettura e materiali (materiali costruttivi visibili come legno scuro, pietra, metallo; layout spaziale; stato delle strutture, pulizia o recente ristrutturazione).
    3. Presenza umana e dinamiche (attività delle persone, abbigliamento, densità di affollamento, comportamento).
    4. OCR ed Estrazione Dati: estrai con la massima precisione qualsiasi testo leggibile (cartelli, menu, orari, listini prezzi, regole).
    
    Restituisci l'output ESCLUSIVAMENTE in formato JSON all'interno di un blocco di codice markdown contrassegnato con ```json ... ```, con la seguente struttura:
    {
        "tipo_entita": "Categoria esatta identificata (es. Ristorante / Vasche geotermiche all'aperto / Monumento storico / Sentiero escursionistico / Spa)",
        "analisi_ambiente_geografico": "Analisi analitica e dettagliata in 2 paragrafi degli elementi naturali, geografici e paesaggistici visibili nelle foto (es. catene montuose brulle, presenza di pascoli, vallata aperta, condizioni meteo). Descrivi solo i fatti visivi accertabili.",
        "analisi_strutture_e_materiali": "Analisi tecnica delle infrastrutture (es. vasche circolari rivestite in legno scuro, edificio adiacente dal design nordico minimalista con rivestimento nero, presenza di sauna panoramica con vetrata, livello percepito di manutenzione e pulizia).",
        "analisi_presenza_umana_e_vibe": "Rilevazione di persone, abbigliamento (es. costumi da bagno), densità (affollato o deserto), e orari della giornata deducibili dalle ombre o dalla luce (es. tramonto o cielo coperto).",
        "dati_estratti_e_ocr": "Trascrizione testuale accurata di qualsiasi scritta, cartello, menu o prezzo leggibile nelle foto (se presente, altrimenti scrivi 'Nessun cartello o menu con testo rilevato')"
    }
    
    Rispondi esclusivamente in italiano per i testi. Mantieni un approccio puramente descrittivo, scientifico ed empirico.
    """

    accumulated_text = ""

    try:
        # Connessione WebSocket asincrona
        async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config) as session:
            # Invio dei byte delle immagini
            for img in immagini_bytes:
                await session.send_realtime_input(
                    video=types.Blob(
                        data=img,
                        mime_type="image/jpeg"
                    )
                )
                await asyncio.sleep(0.5)
            
            # Invio del prompt
            await session.send_realtime_input(
                text=prompt
            )

            # Ricezione dello stream di trascrizione
            async for response in session.receive():
                if response.server_content and response.server_content.output_transcription:
                    if response.server_content.output_transcription.text:
                        accumulated_text += response.server_content.output_transcription.text
                
                # Usciamo al completamento del turno
                if response.server_content and response.server_content.turn_complete:
                    break

        print(f"-> Sessione Live completata con successo per {locale}!", flush=True)

        # Estrazione del JSON dal markdown
        match = re.search(r'```json\s*(.*?)\s*```', accumulated_text, re.DOTALL)
        if match:
            json_str = match.group(1)
            return json.loads(json_str)
        else:
            try:
                return json.loads(accumulated_text)
            except Exception:
                return {
                    "tipo_entita": "N/D",
                    "analisi_ambiente_geografico": accumulated_text,
                    "analisi_strutture_e_materiali": "N/D",
                    "analisi_presenza_umana_e_vibe": "N/D",
                    "dati_estratti_e_ocr": "N/D"
                }
    except Exception as e:
        print(f"Errore durante l'interrogazione WebSocket per {locale}: {e}", flush=True)
        return None

async def main():
    for locale, urls in immagini_per_locale.items():
        urls_unici = list(set(urls))
        urls_campione = urls_unici[:5]
        
        if not urls_campione:
            continue
            
        json_res = await analizza_locale_live(locale, urls_campione)
        if json_res:
            guida_turistica_visiva[locale] = json_res

    output_path = "guida_viaggio_visiva.json"
    with open(output_path, "w", encoding="utf-8") as f:
        json.dump(guida_turistica_visiva, f, indent=4, ensure_ascii=False)
    print(f"\nGuida turistica visiva completata e salvata in {output_path}.", flush=True)

if __name__ == "__main__":
    asyncio.run(main())
