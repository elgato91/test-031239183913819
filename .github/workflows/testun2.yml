name: Test Standalone - Gemini 3.1 Live API (Raw Vision Test 20 Images)

on: 
  workflow_dispatch:

jobs:
  test_gemini_live:
    runs-on: ubuntu-latest
    steps:

      - name: Setup Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installazione Dipendenze Essenziali
        run: |
          pip install google-genai requests

      - name: Scrivi Script Generatore Guida AI con Gemini 3.1 Live
