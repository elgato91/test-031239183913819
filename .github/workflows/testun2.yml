name: Test Standalone - Gemini 3.1 Live API (Efficient 2-Request Pipeline)

on: 
  workflow_dispatch:

jobs:
  test_gemini_live:
    runs-on: ubuntu-latest
    steps:

      - name: Setup Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installazione Dipendenze Essenziali
        run: |
          pip install google-genai requests

      - name: Scrivi Script Generatore Guida AI con Gemini 3.1 Live
        # Creiamo lo script Python asincrono ottimizzato a due fasi (solo 2 chiamate WS)
        shell: bash
        run: |
          cat << 'EOF' > generate_guide.py
          import os
          import json
          import re
          import asyncio
          import requests
          from google import genai
          from google.genai import types

          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              print("Errore: GEMINI_API_KEY non trovata nelle variabili d'ambiente.")
              exit(1)

          client = genai.Client(api_key=api_key)

          # -----------------------------------------------------------------
          # ELENCO DI 20 IMMAGINI DA ANALIZZARE IN STREAMING
          # -----------------------------------------------------------------
          immagini_test = [
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn2nikKKf0tccFSld6MfPaA3ptpr5UL6KIGzl4YcV4KJJMHff0t34FQbBdndHHCjp81_iX4hWtpijmq1rAgirXVF7WcLVcMajiQEVAqHIzuKbGd-UbtVF3IIm3U3UWxjffWRN4-7ug=w600-h900-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn0Vt3B0gX-7b4VvbsvZIxBmkQXiTuLCLhnWz_9fp7NtrR0ex9K82mLqnDUlsH2pvO61bpRSRWql2RmaTWBwYoOL7u0-DVeY15MF24jarfJB6npzzFUTEUPYUsIvnWxznl9YcixY=w600-h900-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn3tTh2inpiAIP221yKeLRrvGaxiVDaESqVpd--R1GFFxXy66shBVZJYSLeDzoYmMzgCCIndzLlcnOR2WztT9AAeCuFKtOXorazHHnehcaCwPfDY2kqRH3yew5Q41hjozc48BDrTs_TPhgIw=w300-h450-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn0lT3st43PWr3sqX9dZTEa0OGsJog54_c96TV5pHKZQBtejyjSYw3VNLs-TBSeSe-HmHP6ChGqAJs-_EFnWmfgI346oLxOuDgdrWu_aQAV9ox2yYe-3XOANA0No2u_SLrafhFUkUXMSHYo=w300-h450-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn2RmQa_kFNFvKJVEtLinTMZOHtF4V1X8-AROjkv1WDXHcDjUUtqFk_tCrPhTJqKjxkMbltTejx9Yywjjud1yLqc8uluCPUL8NGsGAHjRsw6SE2224i7ORHNvoFIYJd4ye3pFjeXqf3J6KJt=w300-h450-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn1S9iJKEIRgbDuPOQP1LDVVptud8vJd4DmWgixDLjX_naGsI8aJ19AEZlcHYtNLnQ2m9vTKJBSTPEhmV1RSn6Qyj1umnJD27Tz-GIAwrc-MMFa48_QloCR0xCwKjGtr4KCBtr-Cragzav2J=w300-h450-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn39xIoXYaoSRT6WaWDDrZWT56A0WFEgIKOftGrOJXXr1JH1W6Pd-mI-DO7qOfplmz_yuBeyxmrh71ZckLdncGLfbDzCy6t4KzC2K7eRIgNBRO8jY3md2ce1eUITnWfn-FoppJKanBM0w87_=w300-h450-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn0eB5sqajwK0HcQ_g5IeQfUDSMDn6d9Xy-OxeGkfY2ZeXB1mJIigKCBlSI5ZprijYPoW91IUxFCSuusZvtgq_XupWdTpHtcHI4FlgoM58wGTeLtoURUmRk-E7VCLvGXtpEHz5bz8e9j8srl=w300-h225-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn1YGpRTW8qbQ9nXyGXjyi0dD6je8-_aTDO6vwidhgP2aVIRLgHatNszd313HZNeHQ-PPRKzUHnbY8FoKS2ngmSF3YpSaedxt_M1LfI9cUZ7nmDusNryloHwot9zz6lCfvE2UEFPtlzYI3Cx=w300-h225-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn2RmQa_kFNFvKJVEtLinTMZOHtF4V1X8-AROjkv1WDXHcDjUUtqFk_tCrPhTJqKjxkMbltTejx9Yywjjud1yLqc8uluCPUL8NGsGAHjRsw6SE2224i7ORHNvoFIYJd4ye3pFjeXqf3J6KJt=w300-h450-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn1S9iJKEIRgbDuPOQP1LDVVptud8vJd4DmWgixDLjX_naGsI8aJ19AEZlcHYtNLnQ2m9vTKJBSTPEhmV1RSn6Qyj1umnJD27Tz-GIAwrc-MMFa48_QloCR0xCwKjGtr4KCBtr-Cragzav2J=w300-h450-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn3txyRCW5C-VNUbuhSMMHWUGknvGnjPhiOoBhg2pmPKH2Flt90CrFX7Jb_BT_2nMLT8clL3P7efDIJDYRTbz5US1SdmktWxcFRvdFGT4dU3A-5AjgdXoM6eTGY91WopzxHOuI8ATQN2x9y6=w300-h225-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn1WlLZm_VNtqbbVYf3eZJJ1JjVlpoThpaWpmjob_quEcvYVe5_UCe6Uhr5my1Qhdd51ABQGwtSzB5aCCTUm9yEJcqnQSH7nOgwgNmzCv9diuLF-lRhflOFj1o5cvGf0cPanVCrppcB-iDQJ=w300-h225-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn0dVSO8EqCRZ8-hvPJ6EsXRPDd1puHCDDgk1BewLIokxKySxADbNvMVfPlqFlhfLVb-gYSXnY1PnLTOOeBrexhB-4SXf3IAGv-arfYHk38xgBjDY0A8JANfCJ1bOvXL5aJf4yzagshZ_jBW=w300-h225-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn2H2tqMXERZnlT_qeKV-NNl-9nOsZDW9ov0dwzgXbvgd8vBa7UI1Rz2yd-eJrtrKSgBMxOay9wHMg-4uM7mAMs7l3dng4Qlo06f3WJRr5fDvkKCmF4IJ6H2KQN4IgFjnJiIWLUfHDjWwPq4=w300-h225-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn1e-5mAwnPpChM1vdC8_fIIIK_YIgUie_Gqfi2_F1GKrEIhtekVHYBd7Xu1KAJPTT_TW1ttwZUp2NBwGw_iwHfj0Vq1Thls0Gz8Pt6Yengs3f24cSOgMp4RzagaNBKM0x63VFOBZ1kGehTt=w600-h450-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn0OZKw_x0gzeOryoDSc3ToHUK3XfpiyN7axkJ6_bJOx8eblytpiPGC0U49f1W6OUQC0_Cst2bWggj5w-zOhqAdBjPa6_CzmVbbAVt-iGFs5-qoq6vCo5jxuSHU9nysdkvk53UhTbEQL70cz=w600-h450-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn3cuiguLlGQaJuTVrSlLpRQXBGDiWOVQIDLw7V_sCXDMWaOmMXkoXlNOLqU1pT9NaR7S2BnoW217zoDZSpG740ZX6fyERhKqtZOy9yncBl4-rGKSXqg4C6kZPI3lyJ3dfa4gRrsvsG_ARI=w300-h225-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn0lkyiAu88CRbCdAGmTXXVW4lMsKvKj2rJ3IBFOKHhjjSU5Ly_1PIBv9LaT2tBjLiACDJdCSRuJcRLvupShLaggksxRtyH7f_aIopts03i0KPIVYTaxBB05273m9KBeqnBNG7dVD8Ofaa7S=w300-h225-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn2k5I5fmzp_MXQOpwtMnK9I23ak5T4uc5v4HDnkfadu4RMH4whs5DSueMmQoPph4lxYNI6LRpPdfYZ7YUH-aKk3M3f1wg6Et0SlxFTA9pAAvzWmovG5Wl4BJ8RBsYSmj22zfHz43pjMOmeR=w300-h225-p-k-no"
          ]

          config_live = {
              "response_modalities": ["AUDIO"],
              "output_audio_transcription": {}
          }

          async def analizza_tutte_le_immagini_live(immagini_bytes, prompt_fase1):
              print("-> Invio di 20 immagini in streaming via WebSocket (Fase 1)...", flush=True)
              accumulated_text = ""
              try:
                  async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config_live) as session:
                      # Stream all 20 images as raw bytes
                      for idx, img in enumerate(immagini_bytes):
                          await session.send_realtime_input(
                              video=types.Blob(
                                  data=img,
                                  mime_type="image/jpeg"
                              )
                          )
                          await asyncio.sleep(0.1) # Pausa minima per permettere l'ingestion asincrona
                          
                      # Inviamo il prompt per elaborare l'input
                      await session.send_realtime_input(
                          text=prompt_fase1
                      )

                      # Catturiamo lo stream ed estraiamo la trascrizione dell'audio generato (output_transcription.text)
                      async for response in session.receive():
                          if response.server_content and response.server_content.output_transcription:
                              if response.server_content.output_transcription.text:
                                  accumulated_text += response.server_content.output_transcription.text
                          
                          # Usciamo al completamento del turno
                          if response.server_content and response.server_content.turn_complete:
                              break
                  return accumulated_text.strip()
              except Exception as e:
                  print(f"Errore WebSocket in Fase 1: {e}", flush=True)
                  return None

          async def analizza_sintesi_live(dati_json_str, prompt_fase2):
              print("-> Invio dati JSON per la Sintesi Globale via WebSocket (Fase 2)...", flush=True)
              accumulated_text = ""
              # Combiniamo dati e istruzioni in un unico invio testuale per non saturare i turni del WebSocket
              combined_payload = f"DATI INPUT COMPLETI DA ANALIZZARE:\n{dati_json_str}\n\nISTRUZIONI DI ANALISI:\n{prompt_fase2}"
              try:
                  async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config_live) as session:
                      await session.send_realtime_input(
                          text=combined_payload
                      )
                      async for response in session.receive():
                          if response.server_content and response.server_content.output_transcription:
                              if response.server_content.output_transcription.text:
                                  accumulated_text += response.server_content.output_transcription.text
                          if response.server_content and response.server_content.turn_complete:
                              break
                  return accumulated_text.strip()
              except Exception as e:
                  print(f"Errore WebSocket in Fase 2: {e}", flush=True)
                  return None

          async def main():
              locale = "Hoffell hot tub"
              print(f"\n--- INIZIO PIPELINE A 2 RICHIESTE ---")
              
              # 1. Scarichiamo tutte le 20 immagini
              immagini_bytes = []
              print(f"Download di {len(immagini_test)} immagini in corso...")
              for idx, url in enumerate(immagini_test):
                  try:
                      url_ottimizzato = re.sub(r'=w\d+-h\d+', '=w600-h600', url)
                      response = requests.get(url_ottimizzato, timeout=10)
                      if response.status_code == 200:
                          immagini_bytes.append(response.content)
                      else:
                          print(f"   [Foto {idx+1}] Errore download (Status: {response.status_code})")
                  except Exception as e:
                      print(f"   [Foto {idx+1}] Errore download: {e}")

              if len(immagini_bytes) < len(immagini_test):
                  print(f"Attenzione: Scaricate solo {len(immagini_bytes)} immagini su {len(immagini_test)}.")

              # -----------------------------------------------------------------
              # RICHIESTA 1: ANALISI GRANULARE DELLE 20 IMMAGINI (1 sola chiamata WS)
              # -----------------------------------------------------------------
              prompt_fase1 = """
              Ti ho appena inviato una sequenza di immagini di un luogo in tempo reale.
              Descrivi ciascuna immagine in modo estremamente dettagliato, oggettivo, distaccato e approfondito, seguendo lo stesso ordine numerico in cui le ho inviate (da 1 a 20).
              Evita qualsiasi aggettivo vuoto, metafora o tono promozionale. Concentrati solo sui fatti visibili.
              
              Restituisci l'output ESCLUSIVAMENTE in formato JSON all'interno di un blocco di codice markdown contrassegnato con ```json ... ```, con la seguente struttura:
              [
                  {
                      "numero_immagine": 1,
                      "descrizione_dettagliata": "Descrizione oggettiva della prima immagine..."
                  },
                  ...
              ]
              """
              
              risultati_granulari_raw = await analizza_tutte_le_immagini_live(immagini_bytes, prompt_fase1)
              
              risultati_granulari = []
              if risultati_granulari_raw:
                  try:
                      match = re.search(r'```json\s*(.*?)\s*```', risultati_granulari_raw, re.DOTALL)
                      json_str = match.group(1) if match else risultati_granulari_raw
                      lista_json = json.loads(json_str)
                      
                      # Mappiamo gli URL originali con le risposte basandoci sull'indice sequenziale
                      for idx, item in enumerate(lista_json):
                          if idx < len(immagini_test):
                              risultati_granulari.append({
                                  "url_immagine": immagini_test[idx],
                                  "descrizione_dettagliata": item.get("descrizione_dettagliata", "N/D")
                              })
                      print("-> Fase 1 completata con successo!", flush=True)
                  except Exception as e:
                      print(f"Errore nel parsing JSON della Fase 1: {e}", flush=True)
                      print(f"Risposta grezza ricevuta:\n{risultati_granulari_raw}", flush=True)
                      exit(1)
                      
              # -----------------------------------------------------------------
              # RICHIESTA 2: SINTESI AGNOSTICA E CONSOLIDAMENTO FATTI (1 sola chiamata WS)
              # -----------------------------------------------------------------
              # Prepariamo la stringa JSON dei risultati da inviare
              dati_json_str = json.dumps(risultati_granulari, indent=2, ensure_ascii=False)
              
              prompt_fase2 = """
              Sei un analista senior e ricercatore d'archivio specializzato nel controllo incrociato di reportage sul campo e informazioni geomarketing.
              Ti viene fornito un elenco strutturato di descrizioni empiriche ed oggettive di diverse immagini relative a un singolo luogo geografico.
              
              Il tuo compito NON è scrivere una guida turistica, un testo romanzato o promozionale, ma effettuare una sintesi e ricostruzione globale del posto basandoti esclusivamente sui fatti riportati.
              Devi produrre un "nugget" informativo strutturato e oggettivo, pronto per essere utilizzato all'interno di un processo di deep research editoriale.
              
              Mantieni un approccio distaccato, puramente fattuale, analitico e non suggestivo. Evita qualsiasi tono lirico, enfatico, poetico o promozionale. Limita la tua analisi esclusivamente a quanto emerge in modo diretto, logico e comprovabile dalle descrizioni fornite.
              In particolare, evidenzia in modo naturale qualsiasi eventuale anomalia o elemento visivo palesemente contrastante rispetto al contesto generale che emerge dal set di descrizioni, senza però forzare o suggerire che debbano essercene.
              
              Restituisci l'output ESCLUSIVAMENTE in formato JSON all'interno di un blocco di codice markdown contrassegnato con ```json ... ```, con la seguente struttura:
              {
                  "tipologia_luogo": "Categoria generale del luogo identificata dall'analisi incrociata dei dati",
                  "descrizione_globale_posto": "Una descrizione complessiva, dettagliata, fattuale e oggettiva del luogo ricavata sintetizzando gli elementi coerenti e ricorrenti presenti nelle descrizioni delle immagini.",
                  "fatti_rilevanti_accertati": [
                      "Elenco di fatti fisici, strutturali, geografici o operativi concreti emersi come certi e ripetuti nelle descrizioni"
                  ],
                  "discrepanze_o_incoerenze_rilevate": [
                      "Eventuali elementi visivi contrastanti, dati contraddittori o descrizioni che appaino palesemente incoerenti con il resto del set di dati (se presenti, altrimenti lista vuota)"
                  ],
                  "testi_e_dati_ocr_aggregati": [
                      "Trascrizione o sintesi strutturata dei testi, cartelli, listini, regole o orari emersi dalla lettura ottica delle immagini (se presenti, altrimenti lista vuota)"
                  ]
              }
              
              Rispondi esclusivamente in italiano per i testi descrittivi. Mantieni un approccio puramente analitico, oggettivo, distaccato e scientifico.
              """
              
              risultato_sintesi_raw = await analizza_sintesi_live(dati_json_str, prompt_fase2)
              
              sintesi_globale = {}
              if risultato_sintesi_raw:
                  try:
                      match = re.search(r'```json\s*(.*?)\s*```', risultato_sintesi_raw, re.DOTALL)
                      json_str = match.group(1) if match else risultato_sintesi_raw
                      sintesi_globale = json.loads(json_str)
                      print("-> Fase 2 completata con successo!", flush=True)
                  except Exception as e:
                      print(f"Errore nel parsing JSON della Fase 2: {e}", flush=True)
                      sintesi_globale = {
                          "tipologia_luogo": "N/D",
                          "descrizione_globale_posto": risultato_sintesi_raw,
                          "fatti_rilevanti_accertati": [],
                          "discrepanze_o_incoerenze_rilevate": [],
                          "testi_e_dati_ocr_aggregati": []
                      }

              # 3. Strutturiamo l'output finale integrato
              output_finale = {
                  locale: {
                      "ricostruzione_globale_analitica": sintesi_globale,
                      "analisi_granulare_immagini": risultati_granulari
                  }
              }

              # Salvataggio su disco
              output_path = "guida_viaggio_visiva.json"
              with open(output_path, "w", encoding="utf-8") as f:
                  json.dump(output_finale, f, indent=4, ensure_ascii=False)
              print(f"\nAnalisi globale completata e salvata con successo in {output_path}.", flush=True)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Fase 3 (Generazione Guida Turistica con Gemini AI Live)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python generate_guide.py

      - name: Esporta Guida AI (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: Risultato_Vision_Test_Due_Stadi
          path: guida_viaggio_visiva.json
