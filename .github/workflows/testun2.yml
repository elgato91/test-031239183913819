              "https://lh3.googleusercontent.com/grass-cs/ANxoTn3cuiguLlGQaJuTVrSlLpRQXBGDiWOVQIDLw7V_sCXDMWaOmMXkoXlNOLqU1pT9NaR7S2BnoW217zoDZSpG740ZX6fyERhKqtZOy9yncBl4-rGKSXqg4C6kZPI3lyJ3dfa4gRrsvsG_ARI=w300-h225-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn0lkyiAu88CRbCdAGmTXXVW4lMsKvKj2rJ3IBFOKHhjjSU5Ly_1PIBv9LaT2tBjLiACDJdCSRuJcRLvupShLaggksxRtyH7f_aIopts03i0KPIVYTaxBB05273m9KBeqnBNG7dVD8Ofaa7S=w300-h225-p-k-no",
              "https://lh3.googleusercontent.com/grass-cs/ANxoTn2k5I5fmzp_MXQOpwtMnK9I23ak5T4uc5v4HDnkfadu4RMH4whs5DSueMmQoPph4lxYNI6LRpPdfYZ7YUH-aKk3M3f1wg6Et0SlxFTA9pAAvzWmovG5Wl4BJ8RBsYSmj22zfHz43pjMOmeR=w300-h225-p-k-no"
          ]

          # Funzione asincrona riutilizzabile per analizzare una singola immagine
          async def analizza_singola_immagine_live(img_bytes, prompt):
              config = {
                  "response_modalities": ["AUDIO"],
                  "output_audio_transcription": {}
              }
              accumulated_text = ""
              try:
                  # Connessione asincrona alla Live API
                  async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config) as session:
                      # Inviamo i byte dell'immagine come video input stream
                      await session.send_realtime_input(
                          video=types.Blob(
                              data=img_bytes,
                              mime_type="image/jpeg"
                          )
                      )
                      await asyncio.sleep(0.5)
                      
                      # Inviamo il prompt testuale per elaborare l'input
                      await session.send_realtime_input(
                          text=prompt
                      )

                      # Catturiamo lo stream ed estraiamo il testo dell'output_transcription piatto (.text)
                      async for response in session.receive():
                          if response.server_content and response.server_content.output_transcription:
                              if response.server_content.output_transcription.text:
                                  accumulated_text += response.server_content.output_transcription.text
                          
                          # Usciamo al completamento del turno
                          if response.server_content and response.server_content.turn_complete:
                              break
                              
                  return accumulated_text.strip()
              except Exception as e:
                  print(f"Errore durante l'interrogazione WebSocket per la singola immagine: {e}", flush=True)
                  return None

          async def main():
              locale = "Hoffell hot tub"
              print(f"\n-> Avvio analisi granulare di {len(immagini_test)} immagini per: {locale}...", flush=True)
              
              risultati_locale = []
              
              for idx, url in enumerate(immagini_test):
                  try:
                      # Chiediamo un formato a 600px per i dettagli visivi
                      url_ottimizzato = re.sub(r'=w\d+-h\d+', '=w600-h600', url)
                      response = requests.get(url_ottimizzato, timeout=10)
                      
                      if response.status_code == 200:
                          img_bytes = response.content
                          print(f"   [Immagine {idx+1}/{len(immagini_test)}] Scaricata. Interrogazione Live API...", flush=True)
                          
                          # PROMPT TOTALMENTE NEUTRO, PUREAMENTE DESCRITTIVO E NON SUGGESTIVO
                          prompt_singolo = "Descrivi questa immagine in modo dettagliato, oggettivo ed approfondito. Evita qualsiasi riflessione poetica o commento personale."
                          
                          descrizione = await analizza_singola_immagine_live(img_bytes, prompt_singolo)
                          if descrizione:
                              risultati_locale.append({
                                  "url_immagine": url,
                                  "descrizione_dettagliata": descrizione
                              })
                              print(f"   [Immagine {idx+1}/{len(immagini_test)}] Analisi completata.", flush=True)
                          else:
                              print(f"   [Immagine {idx+1}] Errore nell'ottenere la risposta da Gemini Live.", flush=True)
                      else:
                          print(f"   [Immagine {idx+1}] Errore download (Status: {response.status_code})", flush=True)
                  except Exception as e:
                      print(f"   [Immagine {idx+1}] Errore generico: {e}", flush=True)
                      
              guida_turistica_visiva = {locale: risultati_locale}

              output_path = "guida_viaggio_visiva.json"
              with open(output_path, "w", encoding="utf-8") as f:
                  json.dump(guida_turistica_visiva, f, indent=4, ensure_ascii=False)
              print(f"\nAnalisi completata e salvata in {output_path}.", flush=True)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Fase 3 (Generazione Guida Turistica con Gemini AI Live)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python generate_guide.py

      - name: Esporta Guida AI (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: Risultato_Vision_Test_Granulare
          path: guida_viaggio_visiva.json
