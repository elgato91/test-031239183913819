name: Test Standalone - Gemini 3.1 Live API (Only AI)

on: 
  workflow_dispatch:

jobs:
  test_gemini_live:
    runs-on: ubuntu-latest
    steps:

      - name: Setup Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installazione Dipendenze Essenziali
        # Installiamo solo le librerie necessarie all'interazione asincrona con l'API Live
        run: |
          pip install google-genai requests

      - name: Scrivi File Dati Recensioni (google_reviews.json)
        # Creiamo il file JSON locale contenente le recensioni con foto estratte in precedenza
        shell: bash
        run: |
          cat << 'EOF' > google_reviews.json
          [
            {
              "review_id": "Ci9DQUlRQUNvZENodHljRjlvT2xGWGQwUkVjVGcxY25CVmNFbFNSV1F5T1ZWU01sRRAB",
              "place_id": "0x48ce5180d52bd02f:0",
              "author": "Rudi Schachtl",
              "rating": 5.0,
              "description": {
                "en": "A dream... Four hot tubs outside in wonderful nature... and what a view of the glacier!\nBrand new facilities, nice and helpful staff, prize for two about 7000 isk"
              },
              "user_images": [
                "https://lh3.googleusercontent.com/grass-cs/ANxoTn03yI63nePNdRTjcmDMzu6M6_0Q0aplvd-AyD4KDrsC9JzJsgxe7ERwRPgIRhNJ_UZ2VhbMDiiT9OSPAxjZLeXKfCF4MJmqJwyE8zs2Z22Fyno2T8guUQqz4RxroIbNAJixl427n3HF_6w=w600-h450-p-k-no"
              ],
              "company": "Hoffell hot tub"
            },
            {
              "review_id": "Ci9DQUlRQUNvZENodHljRjlvT2tOclFUZHFiazFZZVdocFFUZzNVVWxqZFRaNlJsRRAB",
              "place_id": "0x48ce5180d52bd02f:0",
              "author": "Brittany Hartmeyer",
              "rating": 5.0,
              "description": {
                "en": "Much needed relaxing spot. Only us and one other couple when we were there. Very clean locker room and showers. Highly recommended if you pass it stop and soak for an hour or so!"
              },
              "user_images": [
                "https://lh3.googleusercontent.com/grass-cs/ANxoTn3zevpVc8sz636YOrnUhQ4_91nl6lrxjlA5HvTkKGHtNThSvv18Mlc6hhgJZsel4LMZFHfkwbwPi2xqFvp2ZJt8qy3y-5xAZJB2XOZNY5ZEdu1Um52GPlETwk0kl5TCP5glMqN0UwO_GzrD=w600-h450-p-k-no"
              ],
              "company": "Hoffell hot tub"
            },
            {
              "review_id": "Ci9DQUlRQUNvZENodHljRjlvT2xwUFUzSnpTVUZCYjJadWJIRlpOMWw0U0RsQmRGRRAB",
              "place_id": "0x48ce5180d52bd02f:0",
              "author": "Ivan Toropitsin",
              "rating": 5.0,
              "description": {
                "en": "Great spot with new spa and sauna. Perfect view."
              },
              "user_images": [
                "https://lh3.googleusercontent.com/grass-cs/ANxoTn3tTh2inpiAIP221yKeLRrvGaxiVDaESqVpd--R1GFFxXy66shBVZJYSLeDzoYmMzgCCIndzLlcnOR2WztT9AAeCuFKtOXorazHHnehcaCwPfDY2kqRH3yew5Q41hjozc48BDrTs_TPhgIw=w300-h450-p-k-no",
                "https://lh3.googleusercontent.com/grass-cs/ANxoTn0lT3st43PWr3sqX9dZTEa0OGsJog54_c96TV5pHKZQBtejyjSYw3VNLs-TBSeSe-HmHP6ChGqAJs-_EFnWmfgI346oLxOuDgdrWu_aQAV9ox2yYe-3XOANA0No2u_SLrafhFUkUXMSHYo=w300-h450-p-k-no"
              ],
              "company": "Hoffell hot tub"
            }
          ]
          EOF

      - name: Scrivi Script Generatore Guida AI con Gemini 3.1 Live
        # Creiamo lo script Python asincrono ottimizzato per estrarre la trascrizione testuale
        shell: bash
        run: |
          cat << 'EOF' > generate_guide.py
          import os
          import json
          import re
          import asyncio
          import requests
          from google import genai
          from google.genai import types

          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              print("Errore: GEMINI_API_KEY non trovata nelle variabili d'ambiente.")
              exit(1)

          client = genai.Client(api_key=api_key)

          try:
              with open("google_reviews.json", "r", encoding="utf-8") as f:
                  reviews = json.load(f)
          except Exception as e:
              print(f"Impossibile leggere google_reviews.json: {e}")
              exit(1)

          immagini_per_locale = {}
          for r in reviews:
              company = r.get("company")
              images = r.get("user_images", [])
              if company and images:
                  if company not in immagini_per_locale:
                      immagini_per_locale[company] = []
                  immagini_per_locale[company].extend(images)

          guida_turistica_visiva = {}

          async def analizza_locale_live(locale, urls_campione):
              print(f"\n-> Avvio sessione Live WebSocket per {locale} con gemini-3.1-flash-live-preview...", flush=True)
              
              immagini_bytes = []
              for idx, url in enumerate(urls_campione):
                  try:
                      url_ottimizzato = re.sub(r'=w\d+-h\d+', '=w400-h400', url)
                      response = requests.get(url_ottimizzato, timeout=10)
                      if response.status_code == 200:
                          immagini_bytes.append(response.content)
                          print(f"   [Foto {idx+1}/{len(urls_campione)}] Scaricata.", flush=True)
                  except Exception as e:
                      print(f"   [Foto {idx+1}] Errore download: {e}", flush=True)

              if not immagini_bytes:
                  print(f"Nessuna immagine scaricata per {locale}.", flush=True)
                  return None

              # Configuriamo response_modalities su AUDIO per abilitare il modello live
              config = {
                  "response_modalities": ["AUDIO"]
              }

              prompt = """
              Sei un sistema di intelligenza artificiale multimodale specializzato in geomarketing, viaggi ed estrazione dati visivi.
              Analizza attentamente questo gruppo di immagini caricate dagli utenti per questa specifica attività commerciale o punto di interesse.
              
              Devi capire dinamicamente che tipo di entità stai analizzando (es. ristorante, attrazione naturale, terme/spa, monumento storico, chiesa, sentiero, museo, hotel, ecc.) e adattare l'analisi in base alle caratteristiche del luogo.
              
              Inoltre, effettua un'operazione di OCR (riconoscimento ottico dei caratteri): se nelle foto compaiono cartelli, menu, listini, lavagne con prezzi, orari di apertura o avvisi scritti, estrai queste informazioni con precisione.
              
              Restituisci l'output ESCLUSIVAMENTE in formato JSON all'interno di un blocco di codice markdown contrassegnato con ```json ... ```, con la seguente struttura:
              {
                  "tipo_entita": "Categoria identificata (es. Ristorante / Terme / Monumento Storico / Chiesa / Sentiero / Hotel)",
                  "descrizione_atmosfera": "Descrizione evocativa e professionale di 2 paragrafi in italiano sullo stile, l'atmosfera, il design, le luci e la 'vibe' del posto. Concentrati sulle emozioni visive.",
                  "analisi_visiva_dettagli": "Dettagli sugli elementi visibili (es. presentazione e cura dei piatti, stile degli arredi, panorama circostante, architettura, stato delle piscine o vasche termali, ecc.)",
                  "dati_estratti_da_cartelli": "Eventuali prezzi, orari, regole o informazioni testuali letti direttamente dalle scritte e dai cartelli nelle foto (se presenti, altrimenti scrivi 'Nessun cartello o menu con testo rilevato')"
              }
              
              Importante: rispondi esclusivamente in italiano per i testi descrittivi, e non menzionare mai che stai analizzando dei file o delle immagini nella 'descrizione_atmosfera'. Scrivi come se descrivessi l'esperienza vissuta sul posto.
              """

              accumulated_text = ""

              try:
                  # Connessione asincrona alla Live API
                  async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config) as session:
                      # Inviamo i byte delle immagini come video input stream
                      for img in immagini_bytes:
                          await session.send_realtime_input(
                              video=types.Blob(
                                  data=img,
                                  mime_type="image/jpeg"
                              )
                          )
                          await asyncio.sleep(0.5)
                      
                      # Inviamo il prompt per elaborare l'input
                      await session.send_realtime_input(
                          text=prompt
                      )

                      # Catturiamo lo stream ed estraiamo la trascrizione dell'audio generato (output_transcription)
                      async for response in session.receive():
                          if response.server_content and response.server_content.output_transcription:
                              for part in response.server_content.output_transcription.parts:
                                  if part.text:
                                      accumulated_text += part.text
                          
                          # Usciamo al completamento del turno
                          if response.server_content and response.server_content.turn_complete:
                              break

                  print(f"-> Sessione Live completata con successo per {locale}!", flush=True)

                  # Estrazione del JSON strutturato dal blocco di markdown
                  match = re.search(r'```json\s*(.*?)\s*```', accumulated_text, re.DOTALL)
                  if match:
                      json_str = match.group(1)
                      return json.loads(json_str)
                  else:
                      try:
                          return json.loads(accumulated_text)
                      except Exception:
                          return {
                              "tipo_entita": "N/D",
                              "descrizione_atmosfera": accumulated_text,
                              "analisi_visiva_dettagli": "N/D",
                              "dati_estratti_da_cartelli": "N/D"
                          }
              except Exception as e:
                  print(f"Errore durante l'interrogazione WebSocket per {locale}: {e}", flush=True)
                  return None

          async def main():
              for locale, urls in immagini_per_locale.items():
                  urls_unici = list(set(urls))
                  urls_campione = urls_unici[:5]
                  
                  if not urls_campione:
                      continue
                      
                  json_res = await analizza_locale_live(locale, urls_campione)
                  if json_res:
                      guida_turistica_visiva[locale] = json_res

              output_path = "guida_viaggio_visiva.json"
              with open(output_path, "w", encoding="utf-8") as f:
                  json.dump(guida_turistica_visiva, f, indent=4, ensure_ascii=False)
              print(f"\nGuida turistica visiva completata e salvata in {output_path}.", flush=True)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Fase 3 (Generazione Guida Turistica con Gemini AI Live)
        env:
          # Assicurati che GEMINI_API_KEY sia configurata nei tuoi GitHub Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python generate_guide.py

      - name: Esporta Guida AI (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: Risultato_Guida_AI_Live
          path: guida_viaggio_visiva.json
