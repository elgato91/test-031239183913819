name: Pipeline Completa Parallela - Scraping & AI Live

on: 
  workflow_dispatch:

jobs:
  run_full_pipeline:
    runs-on: ubuntu-latest
    steps:

      - name: Setup 3 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          
          # Avvia 3 proxy su 3 porte diverse
          for PORT in 40001 40002 40003; do
            docker run --name warproxy-$PORT --network host \
              -e SOCKS5_PORT=$PORT -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -d ghcr.io/kingcc/warproxy:latest
          done
          echo "Attesa inizializzazione proxy..."
          sleep 10

      - name: Verifica IP dei 3 Proxy
        run: |
          for PORT in 40001 40002 40003; do
            echo "Verifica proxy su porta $PORT..."
            IP=""
            for i in {1..5}; do
              IP=$(curl -s --max-time 5 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org) && break || sleep 3
            done
            if [ -z "$IP" ]; then
              echo "Errore: Proxy su porta $PORT non risponde."
              exit 1
            fi
            echo "Proxy $PORT pronto. IP: $IP"
          done

      - name: Setup Ambiente e Dipendenze
        run: |
          # Cloniamo lo scraper in una cartella "base" che poi i worker copieranno
          git clone https://github.com/georgekhananaev/google-reviews-scraper-pro.git base-scraper
          cd base-scraper
          pip install -r requirements.txt
          pip install pyyaml seleniumbase google-genai requests aiohttp
          seleniumbase install chromedriver

      - name: Avvio Xvfb (Display virtuale per Selenium)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Scrittura Orchestratore Asincrono (Il Motore del Sistema)
        shell: bash
        run: |
          cat << 'EOF' > orchestrator.py
          import asyncio
          import json
          import yaml
          import os
          import shutil
          import re
          import urllib.parse
          from seleniumbase import Driver
          from google import genai
          from google.genai import types
          import requests

          # --- CONFIGURAZIONE LUOGHI ---
          LUOGHI_DA_ANALIZZARE = [
              'Colosseo, Roma',
              'Da Enzo al 29, Roma',
              'Hoffell hot tub',
              'Fontana di Trevi, Roma',
              'Pantheon, Roma'
              # Aggiungi qui quanti luoghi vuoi...
          ]

          # --- SETUP DEI 6 RUNNER E DEI PROXY ---
          # 3 Porte proxy. 2 Runner per porta = 6 Runner totali.
          WORKER_CONFIGS = [
              {"id": 1, "proxy_port": 40001}, {"id": 2, "proxy_port": 40001},
              {"id": 3, "proxy_port": 40002}, {"id": 4, "proxy_port": 40002},
              {"id": 5, "proxy_port": 40003}, {"id": 6, "proxy_port": 40003}
          ]

          # Limite di chiamate simultanee Gemini per tutto il sistema per evitare Rate Limit (429)
          api_semaphore = asyncio.Semaphore(50)

          async def fase1_risolvi_mappa(luogo, proxy_url):
              print(f"[Fase 1] Risoluzione URL per '{luogo}' usando proxy {proxy_url}...")
              
              # Eseguiamo Selenium in un thread separato per non bloccare l'event loop asincrono
              def run_selenium():
                  # IMPORTANTE: headless=True è obbligatorio in esecuzione parallela massiva su GitHub Actions
                  driver = Driver(uc=True, headless=True, proxy=proxy_url)
                  resolved_url = None
                  try:
                      search_url = f'https://www.google.com/maps/search/{urllib.parse.quote(luogo)}?hl=it'
                      driver.get(search_url)
                      driver.sleep(5)
                      
                      try:
                          consent_btn = driver.find_element('css selector', 'button[aria-label*="Accetta"], button[aria-label*="Accept"]')
                          consent_btn.click()
                          driver.sleep(2)
                      except: pass
                      
                      current_url = driver.current_url
                      if '/maps/place/' not in current_url:
                          try:
                              first_result = driver.find_element('css selector', 'a[href*="/maps/place/"]')
                              resolved_url = first_result.get_attribute('href')
                          except: pass
                      else:
                          resolved_url = current_url
                          
                      if resolved_url:
                          if 'hl=' not in resolved_url:
                              resolved_url += '&hl=it'
                          else:
                              resolved_url = re.sub(r'hl=[a-z]{2}', 'hl=it', resolved_url)
                  finally:
                      driver.quit()
                  return resolved_url

              loop = asyncio.get_running_loop()
              url = await loop.run_in_executor(None, run_selenium)
              return url

          async def analizza_immagine_gemini(client, config_live, url_immagine, prompt):
              async with api_semaphore:
                  try:
                      url_ottimizzato = re.sub(r'=w\d+-h\d+', '=w600-h600', url_immagine)
                      
                      def scarica_foto():
                          resp = requests.get(url_ottimizzato, timeout=10)
                          return resp.content if resp.status_code == 200 else None
                          
                      loop = asyncio.get_running_loop()
                      img_bytes = await loop.run_in_executor(None, scarica_foto)
                      
                      if not img_bytes: return None

                      accumulated_text = ""
                      async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config_live) as session:
                          await session.send_realtime_input(video=types.Blob(data=img_bytes, mime_type="image/jpeg"))
                          await asyncio.sleep(0.5)
                          await session.send_realtime_input(text=prompt)
                          async for response in session.receive():
                              if response.server_content and response.server_content.output_transcription:
                                  if response.server_content.output_transcription.text:
                                      accumulated_text += response.server_content.output_transcription.text
                              if response.server_content and response.server_content.turn_complete:
                                  break
                      
                      return {"url": url_immagine, "descrizione": accumulated_text.strip()}
                  except Exception as e:
                      return None

          async def fase3_ai_analisi(luogo, worker_dir):
              print(f"[Fase 3] Avvio Analisi AI Live per '{luogo}'...")
              api_key = os.environ.get("GEMINI_API_KEY")
              if not api_key:
                  return {"errore": "Manca API KEY"}
                  
              client = genai.Client(api_key=api_key)
              config_live = {"response_modalities": ["AUDIO"], "output_audio_transcription": {}}
              
              reviews_file = os.path.join(worker_dir, "google_reviews.json")
              if not os.path.exists(reviews_file):
                  return {"errore": "Nessun file recensioni trovato"}
                  
              with open(reviews_file, "r", encoding="utf-8") as f:
                  reviews = json.load(f)
                  
              # Estraiamo TUTTE le immagini (come richiesto)
              tutte_le_immagini = []
              for r in reviews:
                  tutte_le_immagini.extend(r.get("user_images", []))
              
              urls_unici = list(set(tutte_le_immagini))
              if not urls_unici:
                  return {"avviso": "Nessuna foto trovata in questo posto."}
                  
              print(f"   Trovate {len(urls_unici)} foto uniche per '{luogo}'. Inizio elaborazione massiva...")
              
              prompt_singolo = "Descrivi questa immagine in modo dettagliato e oggettivo. No commenti poetici."
              
              tasks = [analizza_immagine_gemini(client, config_live, url, prompt_singolo) for url in urls_unici]
              risultati_raw = await asyncio.gather(*tasks)
              risultati_validi = [r for r in risultati_raw if r is not None]
              
              print(f"   Elaborate {len(risultati_validi)}/{len(urls_unici)} foto per '{luogo}'. Avvio Sintesi...")
              
              if not risultati_validi:
                  return {"avviso": "Errore nel download o analisi delle foto."}
                  
              # Sintesi Finale (Fase 2 della AI)
              prompt_sintesi = "Sintetizza queste descrizioni oggettive in una ricostruzione d'insieme, sensoriale e spaziale. Restituisci SOLO un JSON con chiavi: tipologia_luogo, identita_visiva_e_vibe, analisi_materica_e_design."
              dati_str = json.dumps(risultati_validi, ensure_ascii=False)
              payload = f"DATI:\n{dati_str}\n\nISTRUZIONI:\n{prompt_sintesi}"
              
              sintesi = ""
              try:
                  async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config_live) as session:
                      await session.send_realtime_input(text=payload)
                      async for response in session.receive():
                          if response.server_content and response.server_content.output_transcription:
                              if response.server_content.output_transcription.text:
                                  sintesi += response.server_content.output_transcription.text
                          if response.server_content and response.server_content.turn_complete:
                              break
              except Exception as e:
                  print(f"Errore sintesi {luogo}: {e}")
              
              # Pulizia eventuale markdown JSON
              match = re.search(r'```json\s*(.*?)\s*```', sintesi, re.DOTALL)
              if match: sintesi = match.group(1)
              
              try:
                  sintesi_json = json.loads(sintesi)
              except:
                  sintesi_json = {"testo_raw": sintesi}
                  
              return {
                  "sintesi_globale": sintesi_json,
                  "dettaglio_foto": risultati_validi
              }

          async def worker(worker_id, proxy_port, coda_luoghi, dizionario_risultati):
              proxy_url = f"socks5://127.0.0.1:{proxy_port}"
              worker_dir = f"worker_{worker_id}_env"
              
              # Prepariamo la cartella isolata per questo runner copiandola dalla base
              if os.path.exists(worker_dir): shutil.rmtree(worker_dir)
              shutil.copytree("base-scraper", worker_dir)
              
              while not coda_luoghi.empty():
                  luogo = await coda_luoghi.get()
                  print(f"► [Worker {worker_id} | Proxy {proxy_port}] Prende in carico: '{luogo}'")
                  
                  # -- FASE 1 --
                  url_mappa = await fase1_risolvi_mappa(luogo, proxy_url)
                  if not url_mappa:
                      print(f"✖ [Worker {worker_id}] Fallita ricerca per '{luogo}'. Salto.")
                      coda_luoghi.task_done()
                      continue
                      
                  # -- FASE 2 --
                  print(f"[Fase 2] Scraping recensioni avviato per '{luogo}' in ambiente isolato...")
                  config_data = {
                      'headless': True, 'sort_by': 'newest', 'scrape_mode': 'full',
                      'max_reviews': 100, # Aumenta a piacimento (es. 500) per avere più foto
                      'proxy': proxy_url, 'db_path': f'db_{worker_id}.sqlite',
                      'download_images': False, 'use_mongodb': False,
                      'backup_to_json': True, 'json_path': 'google_reviews.json',
                      'businesses': [{'url': url_mappa, 'custom_params': {'company': luogo}}]
                  }
                  
                  config_path = os.path.join(worker_dir, "config.yaml")
                  with open(config_path, 'w') as f: yaml.dump(config_data, f)
                  
                  # Esegue lo scraper ufficiale nel contesto del worker isolato
                  process = await asyncio.create_subprocess_exec(
                      "python", "start.py",
                      cwd=worker_dir,
                      stdout=asyncio.subprocess.PIPE,
                      stderr=asyncio.subprocess.PIPE
                  )
                  await process.communicate()
                  
                  # -- FASE 3 --
                  risultati_ai = await fase3_ai_analisi(luogo, worker_dir)
                  
                  dizionario_risultati[luogo] = risultati_ai
                  print(f"✔ [Worker {worker_id}] CICLO COMPLETATO per '{luogo}'!\n")
                  
                  coda_luoghi.task_done()

          async def main():
              print("=== AVVIO ORCHESTRATORE PARALLELO 3x2 ===")
              coda = asyncio.Queue()
              for l in LUOGHI_DA_ANALIZZARE:
                  coda.put_nowait(l)
                  
              risultati_finali = {}
              
              tasks = []
              for cfg in WORKER_CONFIGS:
                  task = asyncio.create_task(worker(cfg["id"], cfg["proxy_port"], coda, risultati_finali))
                  tasks.append(task)
                  
              await coda.join()
              
              # Salva il Master JSON finale
              with open("GUIDA_VISIVA_GLOBALE.json", "w", encoding="utf-8") as f:
                  json.dump(risultati_finali, f, indent=4, ensure_ascii=False)
              print("=== ELABORAZIONE DI TUTTI I LUOGHI COMPLETATA ===")

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Pipeline Concorrente Orchestrata
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python orchestrator.py

      - name: Esporta Risultati AI Finale
        uses: actions/upload-artifact@v4
        with:
          name: Guida_Turistica_Visiva_Finale
          path: GUIDA_VISIVA_GLOBALE.json
