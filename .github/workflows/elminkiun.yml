name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 curl-cffi
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup Container WARP (20 Nodi IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..20}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
            sleep 0.3
          done
          
          echo "Attesa stabilizzazione tunnel WARP..."
          sleep 12

      - name: Creazione Cartella Temporanea Risultati
        run: mkdir -p results_temp

      - name: Creazione Scraper Veloce - FASE 1 (curl-cffi)
        run: |
          cat << 'EOF' > stealth_scraper.py
          import json
          import re
          import sys
          import time
          import random
          import threading
          from pathlib import Path
          from urllib.parse import urlparse, urlunparse, parse_qs, parse_qsl, urlencode, unquote, quote
          from concurrent.futures import ThreadPoolExecutor, wait, FIRST_COMPLETED
          from bs4 import BeautifulSoup
          from curl_cffi import requests

          def log(message: str):
              sys.stderr.write(message + "\n")
              sys.stderr.flush()

          def clean_url(url: str) -> str:
              try:
                  url_no_anchor = url.split('#')[0]
                  parsed = urlparse(url_no_anchor)
                  query_params = parse_qsl(parsed.query)
                  blacklist_params = {
                      "fbclid", "gclid", "srsltid", "msclkid", "yclid", 
                      "mc_cid", "mc_eid", "_hsenc", "_hsmi", "hsctatracking", 
                      "submissionguid", "rb_clickid"
                  }
                  filtered_params = [
                      (k, v) for k, v in query_params
                      if k.lower() not in blacklist_params
                      and not k.lower().startswith("utm_")
                  ]
                  new_query = urlencode(filtered_params)
                  return urlunparse((parsed.scheme, parsed.netloc, parsed.path, parsed.params, new_query, ""))
              except Exception:
                  return url

          def human_sleep(mean: float, std_dev: float):
              sleep_time = max(0.1, random.gauss(mean, std_dev))
              time.sleep(sleep_time)

          class ProxyPool:
              def __init__(self, ports):
                  self.ports = ports
                  self.usage_count = {port: 0 for port in ports}
                  self.lock = threading.Lock()
                  self.restarting = set()

              def get_proxy(self):
                  with self.lock:
                      available = [p for p in self.ports if p not in self.restarting]
                      if not available:
                          return None
                      return random.choice(available)

              def report_usage(self, port):
                  with self.lock:
                      if port in self.restarting:
                          return
                      self.usage_count[port] += 1
                      if self.usage_count[port] >= 35:
                          self.usage_count[port] = 0
                          self.restarting.add(port)
                          threading.Thread(target=self._restart_proxy, args=(port,)).start()

              def _restart_proxy(self, port):
                  container_index = port - 40000
                  log(f"🔄 [AUTO-CLEAN] warproxy-{container_index} ha elaborato 35 richieste. Cambio IP in background...")
                  subprocess.run(["docker", "restart", f"warproxy-{container_index}"], capture_output=True, check=False)
                  time.sleep(6)
                  with self.lock:
                      self.restarting.remove(port)

          PROXY_POOL = ProxyPool([40000 + i for i in range(1, 21)])
          STARTPAGE_LOCK = threading.Lock()

          ACCEPT_LANGUAGES = [
              "it-IT,it;q=0.9,en-US;q=0.8,en;q=0.7",
              "it-IT,it;q=0.9",
              "en-US,en;q=0.9,it;q=0.8"
          ]

          BROWSER_PROFILES = {
              "chrome": {
                  "impersonate": "chrome120",
                  "ua": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  "accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
              },
              "edge": {
                  "impersonate": "chrome120",
                  "ua": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36 Edg/120.0.0.0",
                  "accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
              }
          }

          def get_minimal_headers(browser: str) -> dict:
              profile = BROWSER_PROFILES[browser]
              return {
                  "user-agent": profile["ua"],
                  "accept": profile["accept"],
                  "accept-language": random.choice(ACCEPT_LANGUAGES),
                  "accept-encoding": "gzip, deflate, br",
              }

          def create_session(port, browser):
              impersonate_target = BROWSER_PROFILES[browser]["impersonate"]
              proxies = {
                  "http": f"socks5h://127.0.0.1:{port}",
                  "https": f"socks5h://127.0.0.1:{port}"
              }
              sess = requests.Session(impersonate=impersonate_target, proxies=proxies)
              sess.headers.update(get_minimal_headers(browser))
              return sess

          def extract_react_json(html_content: str) -> dict | None:
              start_str = '{"render":'
              idx = html_content.find(start_str)
              if idx == -1: return None
              brace_count, json_end = 0, -1
              for i in range(idx, len(html_content)):
                  if html_content[i] == "{": brace_count += 1
                  elif html_content[i] == "}": brace_count -= 1
                  if brace_count == 0:
                      json_end = i
                      break
              if json_end == -1: return None
              try: return json.loads(html_content[idx : json_end + 1])
              except Exception: return None

          def extract_duckduckgo(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", class_="result__url", href=True):
                  href = a["href"]
                  match = re.search(r"uddg=([^&]+)", href)
                  if match:
                      real_url = unquote(match.group(1))
                      if real_url.startswith("http") and "duckduckgo.com" not in real_url:
                          links.append(real_url)
              return links

          def extract_startpage(html):
              links = []
              react_data = extract_react_json(html)
              if react_data:
                  try:
                      mainline = react_data.get("render", {}).get("presenter", {}).get("regions", {}).get("mainline", [])
                      for section in mainline:
                          if section.get("display_type") == "web-google" and "results" in section:
                              for item in section["results"]:
                                  if "clickUrl" in item:
                                      links.append(item["clickUrl"])
                  except Exception: pass
              
              if links:
                  return links

              soup = BeautifulSoup(html, "html.parser")
              for a in soup.find_all("a", class_=["w-gl__result-title", "w-gl__result-link"], href=True):
                  href = a["href"]
                  if href.startswith("http") and not any(d in href for d in ["startpage.com", "ixquick.com", "startmail.com"]):
                      links.append(href)
              return links

          def extract_yahoo(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for div in soup.find_all("div", class_=["compTitle", "algo", "y-algo"]):
                  for a in div.find_all("a", href=True):
                      href = a["href"]
                      if "r.search.yahoo.com" in href and "RU=" in href:
                          match = re.search(r"RU=([^/]+)", href)
                          if match:
                              url = unquote(match.group(1))
                              if url.startswith("http"):
                                  links.append(url)
                      elif href.startswith("http") and not any(d in href for d in ["yahoo.com", "yimg.com", "yahoo.co.jp"]):
                          links.append(href)
              return links

          def fetch_startpage(query: str, browser: str, initial_port: int) -> list[str] | None:
              port = initial_port
              session = create_session(port, browser)

              def get_sc_token(sess):
                  with STARTPAGE_LOCK:
                      try:
                          response_get = sess.get("https://www.startpage.com/", timeout=8.0)
                          if response_get.status_code == 200:
                              sc_match = (
                                  re.search(r'name=["\']sc["\'][^>]*value=["\']([^"\']+)["\']', response_get.text, re.IGNORECASE)
                                  or re.search(r'value=["\']([^"\']+)["\'][^>]*name=["\']sc["\']', response_get.text, re.IGNORECASE)
                              )
                              return sc_match.group(1) if sc_match else ""
                      except Exception: pass
                  return ""

              sc_token = get_sc_token(session)
              if not sc_token:
                  port = PROXY_POOL.get_proxy()
                  if not port: return None
                  session = create_session(port, browser)
                  sc_token = get_sc_token(session)
                  if not sc_token: return None

              links = []
              for page in range(7):
                  offset = page * 10
                  payload = {
                      "query": query, "sc": sc_token, "cat": "web", "t": "device",
                      "language": "italiano", "lui": "english", "qadf": "moderate",
                      "startat": str(offset)
                  }
                  
                  page_success = False
                  for attempt in range(2):
                      headers_post = get_minimal_headers(browser)
                      headers_post.update({
                          "origin": "https://www.startpage.com", "referer": "https://www.startpage.com/",
                          "content-type": "application/x-www-form-urlencoded", "sec-fetch-dest": "empty",
                          "sec-fetch-mode": "cors", "sec-fetch-site": "same-origin"
                      })
                      try:
                          response_post = session.post("https://www.startpage.com/sp/search", headers=headers_post, data=payload, timeout=8.0)
                          if response_post.status_code == 200 and "captcha" not in response_post.text.lower():
                              page_links = extract_startpage(response_post.text)
                              if page_links:
                                  links.extend(page_links)
                              page_success = True
                              break
                      except Exception:
                          pass
                      
                      port = PROXY_POOL.get_proxy()
                      session = create_session(port, browser)
                      sc_token = get_sc_token(session)
                      if not sc_token: break
                      payload["sc"] = sc_token
                      human_sleep(0.5, 0.2)

                  if not page_success:
                      break 
                  human_sleep(0.2, 0.1)

              return links if links else None

          def fetch_duckduckgo(query: str, browser: str, initial_port: int) -> list[str] | None:
              port = initial_port
              session = create_session(port, browser)
              links = []
              
              offsets = [0, 30, 60]
              for page_idx, offset in enumerate(offsets):
                  if page_idx == 0:
                      url = f"https://html.duckduckgo.com/html/?q={quote(query)}"
                  else:
                      url = f"https://html.duckduckgo.com/html/?q={quote(query)}&s={offset}&dc={offset+1}&v=l"
                  
                  page_success = False
                  for attempt in range(2):
                      headers = get_minimal_headers(browser)
                      headers.update({
                          "referer": "https://duckduckgo.com/", "origin": "https://duckduckgo.com",
                          "sec-fetch-dest": "document", "sec-fetch-mode": "navigate",
                          "sec-fetch-site": "same-origin", "sec-fetch-user": "?1", "upgrade-insecure-requests": "1"
                      })
                      try:
                          response = session.get(url, headers=headers, timeout=8.0)
                          if response.status_code == 202:
                              human_sleep(1.5, 0.3)
                              response = session.get(url, headers=headers, timeout=8.0)
                          if response.status_code == 200 and "captcha" not in response.text.lower():
                              page_links = extract_duckduckgo(response.text)
                              if page_links:
                                  links.extend(page_links)
                              page_success = True
                              break
                      except Exception:
                          pass
                      
                      port = PROXY_POOL.get_proxy()
                      session = create_session(port, browser)
                      human_sleep(0.5, 0.2)
                  
                  if not page_success:
                      break
                  human_sleep(0.3, 0.1)

              return links if links else None

          def fetch_yahoo(query: str, browser: str, initial_port: int) -> list[str] | None:
              port = initial_port
              session = create_session(port, browser)
              links = []
              
              offsets = [1, 41]
              for page_idx, offset in enumerate(offsets):
                  url = f"https://search.yahoo.com/search?p={quote(query)}&n=50&b={offset}"
                  
                  page_success = False
                  for attempt in range(2):
                      headers = get_minimal_headers(browser)
                      try:
                          response = session.get(url, headers=headers, timeout=10.0)
                          if response.status_code == 200:
                              page_links = extract_yahoo(response.text)
                              if page_links:
                                  links.extend(page_links)
                              page_success = True
                              break
                      except Exception:
                          pass
                      
                      port = PROXY_POOL.get_proxy()
                      session = create_session(port, browser)
                      human_sleep(0.5, 0.2)
                  
                  if not page_success:
                      break
                  human_sleep(0.3, 0.1)
                  
              return links if links else None

          def process_single_task(query: str, engine: str, task_index: int, total_tasks: int, global_attempt: int) -> list[str] | None:
              if global_attempt == 1:
                  time.sleep(random.uniform(0.1, 7.0))
              
              max_local_retries = 3
              
              for local_attempt in range(1, max_local_retries + 1):
                  port = PROXY_POOL.get_proxy()
                  if not port:
                      time.sleep(1.0)
                      continue
                      
                  browser = random.choice(["chrome", "edge"])
                  links = None
                  try:
                      if engine == "duckduckgo": links = fetch_duckduckgo(query, browser, port)
                      elif engine == "startpage": links = fetch_startpage(query, browser, port)
                      elif engine == "yahoo": links = fetch_yahoo(query, browser, port)
                  except Exception:
                      pass

                  PROXY_POOL.report_usage(port)

                  if links is not None and len(links) > 0:
                      cleaned_links = [clean_url(l) for l in links if l]
                      log(f"[{task_index:03d}/{total_tasks}] [OK] {engine.upper()} -> {len(cleaned_links)} risultati per: '{query}'")
                      return cleaned_links
                  else:
                      human_sleep(1.0, 0.3)

              log(f"[{task_index:03d}/{total_tasks}] [RITARDO] {engine.upper()} per '{query}'. Pausa raffreddamento... (Giro {global_attempt})")
              time.sleep(random.uniform(4.0, 6.0))
              
              return None

          def main():
              queries = [
                  "cosa vedere a Orvieto in un giorno",
                  "Orvieto sotterranea biglietti e orari",
                  "Duomo di Orvieto facciata e capolavori",
                  "Pozzo di San Patrizio storia e segreti",
                  "itinerario Orvieto a piedi centro storico"
              ]

              engines = ["duckduckgo", "startpage", "yahoo"]
              tasks = []
              for q_idx, q in enumerate(queries):
                  for eng in engines:
                      tasks.append((q, eng))

              total_tasks = len(tasks)
              log(f"Inizio scraping di {total_tasks} combinazioni (5 query x 3 motori di ricerca)")

              Path("results_temp").mkdir(exist_ok=True)
              
              MAX_GLOBAL_RETRIES = 50

              with ThreadPoolExecutor(max_workers=10) as executor:
                  futures = {
                      executor.submit(process_single_task, task[0], task[1], idx + 1, total_tasks, 1): (task[0], task[1], idx + 1, 1)
                      for idx, task in enumerate(tasks)
                  }

                  while futures:
                      done, not_done = wait(futures.keys(), return_when=FIRST_COMPLETED)
                      
                      for future in done:
                          q, eng, t_idx, global_attempt = futures.pop(future)
                          
                          try:
                              links = future.result()
                              
                              if links is not None:
                                  temp_file = Path("results_temp") / f"task_{t_idx:03d}_{eng}.json"
                                  with open(temp_file, "w", encoding="utf-8") as f:
                                      json.dump({"query": q, "engine": eng, "links": links}, f, ensure_ascii=False, indent=2)
                              else:
                                  if global_attempt < MAX_GLOBAL_RETRIES:
                                      new_future = executor.submit(process_single_task, q, eng, t_idx, total_tasks, global_attempt + 1)
                                      futures[new_future] = (q, eng, t_idx, global_attempt + 1)
                                  else:
                                      log(f"❌ ABBANDONO DEFINITIVO task {t_idx:03d} ({eng.upper()}) per la query '{q}'.")
                          except Exception as e:
                              log(f"Errore grave nel thread task {t_idx:03d}: {e}")

          if __name__ == "__main__":
              main()
          EOF

      - name: Esecuzione Scraping Veloce - FASE 1 (curl-cffi)
        run: python -u stealth_scraper.py

      - name: Inizializzazione Code DISTRIBUITE - FASE 2 (CloakBrowser)
        run: |
          cat << 'EOF' > m2_cloak_setup.py
          import json
          import urllib.parse
          
          queries_critiche = [
              "cosa vedere a Orvieto in un giorno",
              "Orvieto sotterranea biglietti e orari",
              "Duomo di Orvieto facciata e capolavori",
              "Pozzo di San Patrizio storia e segreti",
              "itinerario Orvieto a piedi centro storico",
              "migliori ristoranti cucina tipica Orvieto",
              "Pozzo della Cava Orvieto recensioni",
              "Cappella di San Brizio Luca Signorelli Duomo",
              "MUSEO Claudio Faina Orvieto cosa vedere",
              "dove mangiare la gallina ubriaca a Orvieto"
          ]
          
          tasks = []
          for q in queries_critiche:
              tasks.append(f"https://www.google.com/search?q={urllib.parse.quote(q)}&hl=it")
              tasks.append(f"https://www.bing.com/search?q={urllib.parse.quote(q)}")
          
          for i in range(1, 6):
              chunk = tasks[i-1::5]
              with open(f"/tmp/cloak_queue_{i}.json", "w") as f:
                  json.dump(chunk, f)
                  
          print(f"Generata coda per Step 2 CloakBrowser con {len(tasks)} target distribuiti su 5 nodi.")
          EOF
          python -u m2_cloak_setup.py

      - name: Creazione Script Python - FASE 2 (CloakBrowser su 5 Nodi - No custom manual inputs)
        run: |
          cat << 'EOF' > cloak_scraper.py
          import asyncio
          import time
          import sys
          import random
          import os
          import json
          from pathlib import Path
          from urllib.parse import urlparse, urlunparse, parse_qs, parse_qsl, urlencode
          from bs4 import BeautifulSoup
          from cloakbrowser import launch_persistent_context_async

          def log(message: str):
              sys.stderr.write(message + "\n")
              sys.stderr.flush()

          if len(sys.argv) < 2: sys.exit(1)
          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          def get_query_from_url(url, default="cosa vedere orvieto"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p', 'find_desc']:
                      if param in queries: return queries[param][0]
              except: pass
              return default

          def clean_url(url: str) -> str:
              try:
                  url_no_anchor = url.split('#')[0]
                  parsed = urlparse(url_no_anchor)
                  query_params = parse_qsl(parsed.query)
                  blacklist_params = {
                      "fbclid", "gclid", "srsltid", "msclkid", "yclid", 
                      "mc_cid", "mc_eid", "_hsenc", "_hsmi", "hsctatracking", 
                      "submissionguid", "rb_clickid"
                  }
                  filtered_params = [
                      (k, v) for k, v in query_params
                      if k.lower() not in blacklist_params
                      and not k.lower().startswith("utm_")
                  ]
                  new_query = urlencode(filtered_params)
                  return urlunparse((parsed.scheme, parsed.netloc, parsed.path, parsed.params, new_query, ""))
              except Exception:
                  return url

          def extract_google_links(html: str) -> list[str]:
              soup = BeautifulSoup(html, "html.parser")
              search_container = soup.find(id="search")
              if not search_container:
                  search_container = soup
              
              links = []
              # I risultati organici di Google hanno il titolo dentro un tag h3
              for h3 in search_container.find_all("h3"):
                  a_parent = h3.find_parent("a", href=True)
                  if a_parent:
                      href = a_parent["href"]
                      if href.startswith("http") and not any(d in href.lower() for d in [
                          "google.com", "google.it", "youtube.com", "gstatic.com", "googleadservices.com"
                      ]):
                          links.append(href)
              
              # Fallback ad ampio spettro se la struttura dei tag h3 è anomala o modificata
              if not links:
                  for a in search_container.find_all("a", href=True):
                      href = a["href"]
                      if href.startswith("http") and not any(d in href.lower() for d in [
                          "google.com", "google.it", "youtube.com", "gstatic.com", "googleadservices.com", "webcache.googleusercontent"
                      ]):
                          if not any(x in href.lower() for x in ["/search?", "/imgres?", "/preferences?", "/maps?"]):
                              links.append(href)
              return list(dict.fromkeys(links))

          def extract_bing_links(html: str) -> list[str]:
              soup = BeautifulSoup(html, "html.parser")
              results_container = soup.find(id="b_results")
              if not results_container:
                  results_container = soup
              
              links = []
              # I risultati organici di Bing hanno storicamente il titolo dentro h2
              for h2 in results_container.find_all("h2"):
                  for a in h2.find_all("a", href=True):
                      href = a["href"]
                      if href.startswith("http") and not any(d in href.lower() for d in [
                          "bing.com", "microsoft.com", "msn.com", "microsofttranslator.com", "go.microsoft.com"
                      ]):
                          links.append(href)
              
              # Fallback robusto se Bing non risponde con i tag h2 tradizionali (aggiramento cambi struttura)
              if not links:
                  for a in results_container.find_all("a", href=True):
                      href = a["href"]
                      if href.startswith("http") and not any(d in href.lower() for d in [
                          "bing.com", "microsoft.com", "msn.com", "go.microsoft.com", "cc.bingj.com", "explore/title"
                      ]):
                          if not any(x in href.lower() for x in ["/search?", "/images?", "/videos?", "/maps?", "/news?"]):
                              links.append(href)
              return list(dict.fromkeys(links))

          async def main():
              queue_file = f"/tmp/cloak_queue_{node_id}.json"
              if not os.path.exists(queue_file): return
              
              with open(queue_file, "r") as f: targets = json.load(f)
              if not targets: return # CORRETTO: Cambiato 'tasks' con 'targets'

              home_dir = os.path.expanduser("~")
              profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}")
              windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
              
              base_args = [
                  "--no-sandbox",
                  "--disable-dev-shm-usage",
                  f"--fingerprint={random.randint(100000, 999999)}",
                  f"--fingerprint-fonts-dir={windows_fonts_dir}"
              ]

              print(f"[NODO {node_id}] Avvio sessione Persistente nativa (Warmup + Scraping)...", flush=True)
              try:
                  context = await launch_persistent_context_async(
                      profile_dir,
                      headless=False,
                      humanize=True,
                      human_config={"mistype_chance": 0.05, "typing_delay": 100, "idle_between_actions": True},
                      proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
                      geoip=True,
                      viewport={"width": 1920, "height": 1080},
                      args=base_args
                  )
                  
                  # -------------------------------------------------------------
                  # BYPASS SILENZIOSO DEL CONSENSO (Nessun click o automazione JS)
                  # -------------------------------------------------------------
                  # Iniettiamo in modo nativo e invisibile i cookie di accettazione
                  # per far credere a Google e Bing che l'utente abbia già acconsentito.
                  await context.add_cookies([
                      {
                          "name": "CONSENT",
                          "value": "YES+cb.20240513-17-p0.it+it+999",
                          "domain": ".google.com",
                          "path": "/",
                      },
                      {
                          "name": "SOCS",
                          "value": "CAISHAgBEhJnd3NfMjAyNDA2MjEtMF8SQzEaBmVuIAEaBgiAsd-yBq",
                          "domain": ".google.com",
                          "path": "/",
                      },
                      {
                          "name": "CONSENT",
                          "value": "YES+cb.20240513-17-p0.it+it+999",
                          "domain": ".google.it",
                          "path": "/",
                      },
                      {
                          "name": "MUID",
                          "value": "00000000000000000000000000000000",
                          "domain": ".bing.com",
                          "path": "/",
                      }
                  ])
                  
                  page = await context.new_page()
                  
                  # WARMUP nativo di cloakbrowser
                  await page.goto("https://www.google.com/?hl=it", wait_until="domcontentloaded", timeout=25000)
                  await asyncio.sleep(2)
              except Exception as e:
                  log(f"[CLOAK NODO {node_id}] Errore avvio browser: {e}")
                  return

              for idx, url in enumerate(targets):
                  print(f"[NODO {node_id}] Recupero Avanzato: {url}", flush=True)
                  try:
                      query_to_search = get_query_from_url(url)
                      
                      if "bing.com" in url:
                          await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.5, 4.0))
                          try:
                              search_box = page.locator("textarea[name='q'], input[name='q']").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: 
                              await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                      else:
                          await page.goto(url, wait_until="domcontentloaded", timeout=40000)
                      
                      # --- SILENZIO RADIO ---
                      try: await page.wait_for_load_state("networkidle", timeout=12000)
                      except: pass
                      await asyncio.sleep(6)
                      
                      # Scorrimento Lazy Load NATIVO (Tastiera hardware)
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(1)
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(2)
                      
                      # Estrazione statica dell'HTML in memoria (Zero CDP/JS fingerprint)
                      raw_html = await page.content()
                      if "google.com" in url:
                          links = extract_google_links(raw_html)
                      else:
                          links = extract_bing_links(raw_html)

                      if links:
                          cleaned_links = [clean_url(l) for l in links if l]
                          temp_file = Path("results_temp") / f"task_cloak_{node_id}_{idx}.json"
                          with open(temp_file, "w", encoding="utf-8") as f:
                              json.dump({"query": query_to_search, "engine": "cloak", "links": cleaned_links}, f, ensure_ascii=False, indent=2)
                          print(f"[NODO {node_id}] -> Recuperato con Successo! {len(cleaned_links)} link organici estratti.", flush=True)
                      else:
                          print(f"[NODO {node_id}] -> Nessun link organico estratto.", flush=True)

                  except Exception as e:
                      print(f"[NODO {node_id}] -> Errore esecuzione: {e}", flush=True)
                  
                  await asyncio.sleep(random.uniform(4.0, 7.0))

              try: await context.close()
              except: pass

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Scraping Parallelo - FASE 2 (CloakBrowser su 5 Nodi)
        run: |
          echo 'Avvio processi CloakBrowser in modalità headful simulata...'
          touch node1_cloak.log node2_cloak.log node3_cloak.log node4_cloak.log node5_cloak.log
          tail -q -f node1_cloak.log node2_cloak.log node3_cloak.log node4_cloak.log node5_cloak.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..5}; do
            python -u cloak_scraper.py $i > node${i}_cloak.log 2>&1 &
            PIDS+=($!)
            sleep 2.0
          done

          wait "${PIDS[@]}"
          kill $TAIL_PID || true

      - name: Arresto Container WARP
        if: always()
        run: |
          for i in {1..20}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

      - name: Combinazione e Deduplica Risultati Finali
        if: always()
        shell: python
        run: |
          import json
          import glob
          import re
          import os
          from urllib.parse import urlparse, parse_qsl, urlencode, urlunparse

          def normalize_url(url: str) -> str:
              try:
                  parsed = urlparse(url)
                  scheme = parsed.scheme.lower() if parsed.scheme else "https"
                  netloc = parsed.netloc.lower()
                  if netloc.startswith("www."):
                      netloc = netloc[4:]
                  
                  path = parsed.path.rstrip("/")
                  params = sorted(parse_qsl(parsed.query))
                  query = urlencode(params)
                  return urlunparse((scheme, netloc, path, "", query, ""))
              except Exception:
                  return url

          all_raw_links = []
          for filepath in glob.glob("results_temp/task_*.json"):
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      data = json.load(f)
                      links = data.get("links", [])
                      if isinstance(links, list):
                          all_raw_links.extend(links)
              except Exception as e:
                  print(f"Errore lettura {filepath}: {e}")

          seen_normalized = set()
          deduped_urls = []
          for u in all_raw_links:
              cleaned = re.sub(r"[\s\u200b\u200c\u200d\ufeff]+", "", u).strip()
              if not cleaned.startswith("http") or len(cleaned) < 12:
                  continue
              norm = normalize_url(cleaned)
              if norm not in seen_normalized:
                  seen_normalized.add(norm)
                  deduped_urls.append(cleaned)

          deduped_urls.sort()

          with open("output_macchina2_cdp.txt", "w", encoding="utf-8") as f:
              for url in deduped_urls:
                  f.write(url + "\n")

          print(f"Sintesi completata: {len(all_raw_links)} link estratti complessivamente dalle due fasi.")
          print(f"Fase successiva pronta con {len(deduped_urls)} URL unici globali scritti in output_macchina2_cdp.txt.")

      - name: Upload Artifact Macchina 2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
