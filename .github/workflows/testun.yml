name: Fast RAG Challenge 2026 Università di Roma

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Setup 1 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          docker run --name warproxy-1 --network host \
            -e SOCKS5_PORT=$PORT -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -d ghcr.io/kingcc/warproxy:latest
          sleep 5

      - name: Verifica IP IPv6 (socks5h)
        run: |
          PORT=40001
          for i in {1..3}; do
            IP=$(curl -s --max-time 5 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org) && break || sleep 2
          done
          echo "Proxy pronto. IP di uscita: $IP"

      - name: Setup Ambiente e Dipendenze Essenziali
        run: |
          git clone https://github.com/georgekhananaev/google-reviews-scraper-pro.git
          cd google-reviews-scraper-pro
          pip install -r requirements.txt
          pip install pyyaml seleniumbase
          seleniumbase install chromedriver

      - name: Avvio Xvfb (Display virtuale per Selenium)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Genera Configurazione Ottimizzata
        run: |
          cd google-reviews-scraper-pro
          python -c "
          import yaml
          import urllib.parse

          # -----------------------------------------------------------------
          # INSERISCI QUI LA TUA LISTA DI ATTIVITÀ O PUNTI DI INTERESSE
          # -----------------------------------------------------------------
          nomi_attivita = [
              'Colosseo, Roma',
              'Da Enzo al 29, Roma',
              'Hoffell hot tub'
          ]

          businesses_list = []
          for nome in nomi_attivita:
              # Trasforma il nome testuale in un URL di ricerca (es. spazi diventano %20)
              url_ricerca = f'https://www.google.com/maps/search/{urllib.parse.quote(nome)}'
              businesses_list.append({
                  'url': url_ricerca,
                  'custom_params': {'company': nome}
              })

          config_data = {
              'headless': False,                       # Richiesto False per UC Mode e Xvfb
              'sort_by': 'newest',                     # Ordina per Più Recenti
              'max_reviews': 50,                       # Limite di recensioni per attività
              'proxy': 'socks5://127.0.0.1:40001',     
              'db_path': ':memory:',                   
              'download_images': False,                
              'use_mongodb': False,                    
              'backup_to_json': True,                  
              'json_path': 'google_reviews.json',      
              'log_level': 'WARNING',                  
              'businesses': businesses_list
          }

          with open('config.yaml', 'w') as f:
              yaml.dump(config_data, f)
          "

      - name: Esecuzione Scraping
        run: |
          cd google-reviews-scraper-pro
          python start.py
          cp google_reviews.json ../output_macchina2_cdp.json

      - name: Upload Artifact (SOLO JSON)
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2_JSON
          path: output_macchina2_cdp.json
