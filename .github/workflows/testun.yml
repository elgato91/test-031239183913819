name: AI Agentic Scraper PoC (Test Didattico)

on: 
  workflow_dispatch:

jobs:
  agentic_scraping:
    runs-on: ubuntu-latest
    
    # Passiamo la secret di Gemini come variabile d'ambiente
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Setup WARProxy (Anti-Ban)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          docker run --name warproxy-1 --network host \
            -e SOCKS5_PORT=40001 -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -d ghcr.io/kingcc/warproxy:latest
          sleep 5

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installazione Dipendenze (Playwright e Gemini SDK)
        run: |
          pip install playwright google-generativeai requests
          playwright install chromium

      - name: Fase 1 - L'Ariete (Intercettazione Rete con Playwright)
        run: |
          cat << 'EOF' > interceptor.py
          from playwright.sync_api import sync_playwright
          import json

          captured_requests = []

          def handle_request(request):
              # Filtriamo per intercettare la chiamata segreta di Google Maps (che usa 'pb=')
              if request.resource_type in ["xhr", "fetch"] and "pb=" in request.url:
                  captured_requests.append({
                      "url": request.url,
                      "method": request.method,
                      "headers": request.headers,
                      "post_data": request.post_data
                  })

          with sync_playwright() as p:
              # Avviamo il browser passando per il proxy
              browser = p.chromium.launch(headless=True, proxy={"server": "socks5://127.0.0.1:40001"})
              page = browser.new_page()
              page.on("request", handle_request)
              
              print("Apertura di Google Maps per rubare il token...")
              page.goto("https://www.google.com/maps/place/Coro/@42.7179111,12.1116244,17z/data=!3m1!4b1!4m6!3m5!1s0x132ecd778417bda5:0x4e6e6043f0ea67e1!8m2!3d42.7179111!4d12.1116244!16s%2Fg%2F11l23qq660", timeout=60000)
              
              page.wait_for_timeout(4000)
              # Scrolliamo per simulare l'utente e scatenare le API di rete
              page.mouse.wheel(0, 2000)
              page.wait_for_timeout(3000)
              
              browser.close()

          # Troviamo la chiamata con l'URL più lungo (in genere è quella col payload dei dati principali)
          if captured_requests:
              best_request = max(captured_requests, key=lambda r: len(r['url']))
              with open("intercepted.json", "w") as f:
                  json.dump(best_request, f)
              print(f"Richiesta intercettata con successo! URL rubato: {best_request['url'][:50]}...")
          else:
              print("ERRORE: NESSUNA RICHIESTA UTILE INTERCETTATA.")
          EOF
          python interceptor.py

      - name: Fase 2 - Il Cervello (AI Agent Scrive il Codice)
        run: |
          cat << 'EOF' > ai_agent.py
          import google.generativeai as genai
          import os
          import sys

          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              print("ERRORE CRITICO: API Key non trovata. Aggiungi GEMINI_API_KEY nei secrets.")
              sys.exit(1)

          genai.configure(api_key=api_key)
          # Usiamo il modello veloce e potente di Gemini 1.5
          model = genai.GenerativeModel('gemini-1.5-flash')

          try:
              with open("intercepted.json", "r") as f:
                  req_data = f.read()
          except FileNotFoundError:
              print("Nessun dato intercettato. Interrompo.")
              sys.exit(1)

          prompt = f"""
          Sei un programmatore Python esperto di web scraping e reverse engineering.
          Il mio browser ha intercettato questa richiesta HTTP interna verso le API di Google Maps:
          
          {req_data}
          
          Il tuo compito è scrivere uno script Python usando la libreria 'requests' che replica ESATTAMENTE questa chiamata HTTP (usando quello stesso URL e quegli headers intercettati).
          Lo script deve:
          1. Importare la libreria 'requests'.
          2. Impostare le variabili url e headers (copiando i dati intercettati).
          3. Fare la richiesta HTTP (GET o POST in base al method). Usa proxies={{"http": "socks5://127.0.0.1:40001", "https": "socks5://127.0.0.1:40001"}} per il proxy.
          4. Salvare il testo crudo della risposta (response.text) in un file chiamato 'raw_data.txt'.
          
          RESTITUISCI SOLO IL CODICE PYTHON PURO VALIDO. Non usare blocchi markdown (come ```python), nessuna spiegazione iniziale o finale. Solo codice.
          """

          print("Inoltro i dati intercettati a Gemini... l'AI sta scrivendo il codice...")
          response = model.generate_content(prompt)
          
          code = response.text.strip()
          # Pulizia di sicurezza nel caso l'AI includa formattazione markdown
          if code.startswith("```python"): code = code[9:]
          if code.startswith("```"): code = code[3:]
          if code.endswith("```"): code = code[:-3]
          code = code.strip()

          with open("fast_scraper.py", "w") as f:
              f.write(code)
          print("Codice Python Auto-Generato salvato con successo!")
          EOF
          python ai_agent.py

      - name: Fase 3 - Velocità della Luce (Esecuzione Codice AI)
        run: |
          echo "==================================="
          echo "Eseguo lo script ultra-veloce scritto da Gemini..."
          # Mostriamo il codice scritto da Gemini per curiosità
          cat fast_scraper.py
          echo "==================================="
          
          # Lo eseguiamo
          python fast_scraper.py
          
          echo "Esecuzione completata in frazioni di secondo!"

      - name: Upload Artefatti Finali
        uses: actions/upload-artifact@v4
        with:
          name: AI_Reverse_Engineering_PoC
          path: |
            intercepted.json
            fast_scraper.py
            raw_data.txt
