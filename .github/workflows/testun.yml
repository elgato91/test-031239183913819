name: AI Agentic Scraper PoC (Gemini 3 Live API)

on: 
  workflow_dispatch:

jobs:
  agentic_scraping:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Setup WARProxy (Anti-Ban)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          docker run --name warproxy-1 --network host \
            -e SOCKS5_PORT=40001 -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -d ghcr.io/kingcc/warproxy:latest
          sleep 5

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installazione Dipendenze (Playwright, Google GenAI SDK con supporto SOCKS)
        run: |
          pip install playwright google-genai "requests[socks]" PySocks
          playwright install chromium

      - name: Fase 1 - L'Ariete (Intercettazione Rete con Playwright)
        run: |
          cat << 'EOF' > interceptor.py
          from playwright.sync_api import sync_playwright
          import json

          captured_requests = []

          def handle_request(request):
              # Catturiamo le chiamate API delle recensioni (listugcposts o preview/review)
              if request.resource_type in ["xhr", "fetch"] and ("listugc" in request.url or "preview/review" in request.url):
                  captured_requests.append({
                      "url": request.url,
                      "method": request.method,
                      "headers": request.headers,
                      "post_data": request.post_data
                  })

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, proxy={"server": "socks5://127.0.0.1:40001"})
              page = browser.new_page()
              page.on("request", handle_request)
              
              print("Apertura di Google Maps...")
              # URL con parametro per aprire direttamente il tab recensioni
              url = "https://www.google.com/maps/place/Coro/@42.7179111,12.1116244,17z/data=!4m8!3m7!1s0x132ecd778417bda5:0x4e6e6043f0ea67e1!8m2!3d42.7179111!4d12.1116244!9m1!1b1!16s%2Fg%2F11l23qq660"
              page.goto(url, timeout=60000)
              
              # Attendiamo per verificare se appare la schermata di consenso cookie
              page.wait_for_timeout(3000)
              
              # Gestione ed elusione del popup di consenso cookie di Google
              try:
                  if "consent.google.com" in page.url or page.locator('dialog').count() > 0 or page.locator('button:has-text("Accept")').count() > 0:
                      print("Rilevato modulo di consenso di Google. Tento il bypass...")
                      # Selettori comuni per i pulsanti di accettazione cookie (multilingua)
                      selectors = [
                          'button:has-text("Accetta tutto")',
                          'button:has-text("Accept all")',
                          'button:has-text("I agree")',
                          'button:has-text("Agree")',
                          'button:has-text("Tout accepter")',
                          'button:has-text("Alle akzeptieren")',
                          'form[action*="consent"] button',
                          'button[aria-label*="Accetta"]',
                          'button[aria-label*="Accept"]'
                      ]
                      clicked = False
                      for selector in selectors:
                          try:
                              loc = page.locator(selector)
                              if loc.count() > 0:
                                  loc.first.click()
                                  print(f"Cliccato pulsante di consenso: {selector}")
                                  clicked = True
                                  break
                          except Exception:
                              continue
                      if clicked:
                          page.wait_for_timeout(5000)  # Attendiamo il caricamento reale di Maps
              except Exception as e:
                  print(f"Nessun popup o errore durante il consenso: {e}")

              print("Simulazione dello scorrimento per forzare le chiamate di rete...")
              # Tenta di scorrere il pannello specifico delle recensioni per innescare l'API
              try:
                  review_feed = page.locator('div[role="feed"], div[tabindex="0"]')
                  if review_feed.count() > 0:
                      review_feed.first.focus()
                      for _ in range(4):
                          page.mouse.wheel(0, 1000)
                          page.wait_for_timeout(1500)
                  else:
                      page.mouse.wheel(0, 3000)
                      page.wait_for_timeout(4000)
              except Exception as e:
                  print(f"Errore di scorrimento specifico: {e}")
                  page.mouse.wheel(0, 3000)
                  page.wait_for_timeout(4000)
              
              browser.close()

          if captured_requests:
              best_request = captured_requests[0]
              with open("intercepted.json", "w") as f:
                  json.dump(best_request, f)
              print(f"Richiesta intercettata con successo! URL: {best_request['url'][:80]}...")
          else:
              print("ERRORE: NESSUNA RICHIESTA 'listugc' INTERCETTATA.")
          EOF
          python interceptor.py

      - name: Fase 2 - Il Cervello (AI Agent via Gemini 3 Live API)
        run: |
          cat << 'EOF' > ai_agent.py
          import asyncio
          import os
          import sys
          import json
          from google import genai
          from google.genai import types

          async def main():
              api_key = os.environ.get("GEMINI_API_KEY")
              if not api_key:
                  print("ERRORE CRITICO: API Key non trovata. Aggiungi GEMINI_API_KEY nei secrets.")
                  sys.exit(1)

              client = genai.Client(api_key=api_key)
              
              # Configurazione per gemini-3.1-flash-live-preview
              config = types.LiveConnectConfig(
                  response_modalities=["AUDIO"],
                  output_audio_transcription=types.AudioTranscriptionConfig()
              )
              model = "gemini-3.1-flash-live-preview"

              try:
                  with open("intercepted.json", "r") as f:
                      req_data = f.read()
              except FileNotFoundError:
                  print("Nessun dato intercettato. Interrompo.")
                  sys.exit(1)

              prompt = f"""
              Sei un programmatore Python esperto di web scraping e reverse engineering.
              Il mio browser ha intercettato questa richiesta HTTP interna verso le API di Google Maps:
              
              {req_data}
              
              Il tuo compito è scrivere uno script Python usando la libreria 'requests' che replica questa chiamata HTTP (usando lo stesso URL e headers intercettati).
              Lo script deve:
              1. Importare la libreria 'requests'.
              2. Impostare le variabili url e headers (copiando i dati intercettati).
              3. Fare la richiesta HTTP (GET o POST in base al method). Usa proxies={{"http": "socks5://127.0.0.1:40001", "https": "socks5://127.0.0.1:40001"}} per il proxy.
              4. Salvare il testo crudo della risposta (response.text) in un file chiamato 'raw_data.txt'.
              
              RESTITUISCI SOLO IL CODICE PYTHON PURO VALIDO. Non usare blocchi markdown (come ```python), nessuna spiegazione iniziale o finale. Solo codice.
              """

              print("Connessione in corso a Gemini 3.1 Live API tramite WebSocket...")
              generated_code = []

              async with client.aio.live.connect(model=model, config=config) as session:
                  print("Connessione asincrona stabilita.")
                  
                  await session.send_realtime_input(text=prompt)
                  print("Prompt inviato. Ricezione della trascrizione del codice...")

                  async_for = session.receive()
                  async for response in async_for:
                      server_content = response.server_content
                      if server_content:
                          if server_content.output_transcription and server_content.output_transcription.text:
                              text_chunk = server_content.output_transcription.text
                              print(text_chunk, end="", flush=True)
                              generated_code.append(text_chunk)
                          
                          if server_content.turn_complete:
                              break

              code = "".join(generated_code).strip()
              
              if code.startswith("```python"): code = code[9:]
              if code.startswith("```"): code = code[3:]
              if code.endswith("```"): code = code[:-3]
              code = code.strip()

              with open("fast_scraper.py", "w") as f:
                  f.write(code)
              print("\n[AI Agent] Codice Python salvato in fast_scraper.py!")

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python ai_agent.py

      - name: Fase 3 - Velocità della Luce (Esecuzione Codice AI)
        run: |
          echo "==================================="
          echo "Eseguo lo script scritto da Gemini 3.1 Live..."
          cat fast_scraper.py
          echo "==================================="
          
          python fast_scraper.py
          
          echo "Esecuzione completata!"

      - name: Upload Artefatti Finali
        uses: actions/upload-artifact@v4
        with:
          name: AI_Reverse_Engineering_PoC
          path: |
            intercepted.json
            fast_scraper.py
            raw_data.txt
