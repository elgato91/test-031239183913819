name: Fast RAG Challenge 2026 Università di Roma

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Setup 1 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          docker run --name warproxy-1 --network host \
            -e SOCKS5_PORT=$PORT -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -d ghcr.io/kingcc/warproxy:latest
          sleep 5

      - name: Verifica IP IPv6 (socks5h)
        run: |
          PORT=40001
          for i in {1..3}; do
            IP=$(curl -s --max-time 5 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org) && break || sleep 2
          done
          echo "Proxy pronto. IP di uscita: $IP"

      - name: Setup Ambiente e Dipendenze Essenziali
        run: |
          git clone https://github.com/georgekhananaev/google-reviews-scraper-pro.git
          cd google-reviews-scraper-pro
          pip install -r requirements.txt
          pip install pyyaml seleniumbase
          seleniumbase install chromedriver

      - name: Avvio Xvfb (Display virtuale per Selenium)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Genera Configurazione Ottimizzata
        run: |
          python -c "
          import yaml
          import urllib.parse
          import time
          from seleniumbase import Driver

          # -----------------------------------------------------------------
          # INSERISCI QUI LA TUA LISTA DI NOMI SEMPLICI
          # Lo script si occuperà di trovare l'URL esatto per ognuno di essi
          # -----------------------------------------------------------------
          nomi_attivita = [
              'Colosseo, Roma',
              'Da Enzo al 29, Roma',
              'Hoffell hot tub'
          ]

          print('Avvio del risolutore automatico di indirizzi...')
          # Utilizziamo SeleniumBase in modalità UC per bypassare i controlli
          driver = Driver(uc=True, headless=False, proxy='socks5://127.0.0.1:40001')
          
          businesses_list = []

          try:
              for nome in nomi_attivita:
                  nome_trimmed = nome.strip()
                  
                  # Se è già un URL, lo saltiamo e lo inseriamo direttamente
                  if nome_trimmed.startswith('http://') or nome_trimmed.startswith('https://'):
                      print(f'Rilevato URL diretto: {nome_trimmed}')
                      businesses_list.append({
                          'url': nome_trimmed,
                          'custom_params': {'company': nome_trimmed}
                      })
                      continue
                      
                  print(f'Risoluzione in corso per: \"{nome_trimmed}\"...', flush=True)
                  search_url = f'https://www.google.com/maps/search/{urllib.parse.quote(nome_trimmed)}'
                  
                  try:
                      driver.get(search_url)
                      time.sleep(6)  # Tempo necessario per il caricamento e l'eventuale reindirizzamento
                      
                      # Gestione del banner dei cookie se presente
                      try:
                          consent_btn = driver.find_element('css selector', 'button[aria-label*=\"Accetta\"], button[aria-label*=\"Accept\"], [aria-label*=\"Agree\"]')
                          consent_btn.click()
                          time.sleep(3)
                      except Exception:
                          pass
                      
                      current_url = driver.current_url
                      
                      if '/maps/place/' in current_url:
                          # Caso 1: Google Maps ha aperto direttamente la scheda
                          print(f'-> Trovata corrispondenza univoca diretta: {current_url}', flush=True)
                          resolved_url = current_url
                      else:
                          # Caso 2: Google Maps mostra una lista di risultati
                          # Estraiamo il link del primo risultato utile nell'elenco
                          try:
                              first_result_el = driver.find_element('css selector', 'a[href*=\"/maps/place/\"]')
                              resolved_url = first_result_el.get_attribute('href')
                              print(f'-> Disambiguato con successo (preso il primo risultato della lista): {resolved_url}', flush=True)
                          except Exception:
                              print(f'-> Impossibile disambiguare. Fallback all\'URL di ricerca originale.', flush=True)
                              resolved_url = search_url
                              
                      businesses_list.append({
                          'url': resolved_url,
                          'custom_params': {'company': nome_trimmed}
                      })
                      
                  except Exception as e:
                      print(f'Errore durante la risoluzione di \"{nome_trimmed}\": {e}', flush=True)
                      businesses_list.append({
                          'url': search_url,
                          'custom_params': {'company': nome_trimmed}
                      })
          finally:
              driver.quit()

          # Scrittura del file config.yaml per lo scraper
          config_data = {
              'headless': False,                       
              'sort_by': 'newest',                     
              'max_reviews': 50,                       
              'proxy': 'socks5://127.0.0.1:40001',     
              'db_path': ':memory:',                   
              'download_images': False,                
              'use_mongodb': False,                    
              'backup_to_json': True,                  
              'json_path': 'google_reviews.json',      
              'log_level': 'WARNING',                  
              'businesses': businesses_list
          }

          with open('google-reviews-scraper-pro/config.yaml', 'w') as f:
              yaml.dump(config_data, f)
          "

      - name: Esecuzione Scraping
        run: |
          cd google-reviews-scraper-pro
          python start.py
          cp google_reviews.json ../output_macchina2_cdp.json

      - name: Upload Artifact (SOLO JSON)
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2_JSON
          path: output_macchina2_cdp.json
