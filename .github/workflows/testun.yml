name: AI Agentic Scraper PoC (SeleniumBase UC + Gemini 3 Live)

on: 
  workflow_dispatch:

jobs:
  agentic_scraping:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Setup 1 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          docker run --name warproxy-1 --network host \
            -e SOCKS5_PORT=40001 -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -d ghcr.io/kingcc/warproxy:latest
          sleep 5

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup Ambiente e Dipendenze Essenziali
        # Installiamo il nuovo SDK GenAI e le librerie SOCKS necessarie per la Fase 3
        run: |
          pip install seleniumbase google-genai "requests[socks]" PySocks
          seleniumbase install chromedriver

      - name: Avvio Xvfb (Display virtuale per Selenium UC Mode)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Fase 1 - L'Ariete (Intercettazione Rete con SeleniumBase UC + CDP)
        run: |
          cat << 'EOF' > interceptor.py
          import json
          import time
          from seleniumbase import Driver
          from selenium.webdriver.common.keys import Keys

          captured_requests = []

          # Questa funzione callback cattura i dati dei pacchetti tramite gli eventi CDP nativi di Chrome
          def cdp_listener(data):
              try:
                  if "method" in data and data["method"] == "Network.requestWillBeSent":
                      params = data.get("params", {})
                      request = params.get("request", {})
                      url = request.get("url", "")
                      # Intercettiamo l'API listugc delle recensioni
                      if "listugc" in url:
                          captured_requests.append({
                              "url": url,
                              "method": request.get("method"),
                              "headers": request.get("headers"),
                              "post_data": request.get("postData")
                          })
              except Exception:
                  pass

          # Inizializziamo il driver con uc=True e uc_cdp_events=True (ascolto eventi CDP nativi)
          driver = Driver(uc=True, uc_cdp_events=True, headless=False, proxy="socks5://127.0.0.1:40001")
          driver.add_cdp_listener("*", cdp_listener)

          try:
              url = "https://www.google.com/maps/place/Coro/@42.7179111,12.1116244,17z/data=!4m8!3m7!1s0x132ecd778417bda5:0x4e6e6043f0ea67e1!8m2!3d42.7179111!4d12.1116244!9m1!1b1!16s%2Fg%2F11l23qq660"
              print("Apertura di Google Maps con SeleniumBase UC...")
              driver.get(url)
              time.sleep(6)

              # Bypass del popup di consenso cookie se presente
              try:
                  buttons = driver.find_elements("tag name", "button")
                  for btn in buttons:
                      txt = (btn.text or "").lower()
                      if any(word in txt for word in ["accetta tutto", "accept all", "i agree", "consento"]):
                          btn.click()
                          print("Modulo di consenso cookie superato.")
                          time.sleep(5)
                          break
              except Exception as e:
                  print(f"Nessun popup cookie gestito: {e}")

              # Salvataggio screenshot di debug
              driver.save_screenshot("page_state.png")

              # Scorrimento del pannello delle recensioni
              print("Simulazione dello scorrimento...")
              # Proviamo a scorrere via JS agendo sul container
              try:
                  for _ in range(5):
                      driver.execute_script("document.querySelector('div.DxyBCb').scrollTop += 1500;")
                      time.sleep(1.5)
              except Exception:
                  # Alternativa: invio PageDown alla pagina intera
                  for _ in range(5):
                      driver.find_element("tag name", "body").send_keys(Keys.PAGE_DOWN)
                      time.sleep(1.5)

          finally:
              driver.quit()

          # Salviamo l'API intercettata
          if captured_requests:
              best_request = captured_requests[0]
              with open("intercepted.json", "w") as f:
                  json.dump(best_request, f)
              print(f"Richiesta listugc intercettata con successo! URL: {best_request['url'][:80]}...")
          else:
              print("ERRORE: NESSUNA RICHIESTA 'listugc' INTERCETTATA.")
              with open("intercepted.json", "w") as f:
                  json.dump({}, f)
          EOF
          python interceptor.py

      - name: Fase 2 - Il Cervello (AI Agent via Gemini 3 Live API)
        run: |
          cat << 'EOF' > ai_agent.py
          import asyncio
          import os
          import sys
          import json
          from google import genai
          from google.genai import types

          async def main():
              api_key = os.environ.get("GEMINI_API_KEY")
              if not api_key:
                  print("ERRORE CRITICO: API Key non trovata. Aggiungi GEMINI_API_KEY nei secrets.")
                  sys.exit(1)

              client = genai.Client(api_key=api_key)
              
              config = types.LiveConnectConfig(
                  response_modalities=["AUDIO"],
                  output_audio_transcription=types.AudioTranscriptionConfig()
              )
              model = "gemini-3.1-flash-live-preview"

              try:
                  with open("intercepted.json", "r") as f:
                      content = json.load(f)
                      if not content:
                          print("Il file delle intercettazioni è vuoto. Impossibile procedere.")
                          sys.exit(1)
                  req_data = json.dumps(content, indent=2)
              except Exception as e:
                  print(f"Errore di lettura del file intercepted.json: {e}")
                  sys.exit(1)

              prompt = f"""
              Sei un programmatore Python esperto di web scraping e reverse engineering.
              Il mio browser ha intercettato questa richiesta HTTP interna verso le API di Google Maps:
              
              {req_data}
              
              Il tuo compito è scrivere uno script Python usando la libreria 'requests' che replica questa chiamata HTTP (usando lo stesso URL e headers intercettati).
              Lo script deve:
              1. Importare la libreria 'requests'.
              2. Impostare le variabili url e headers (copiando i dati intercettati).
              3. Fare la richiesta HTTP (GET o POST in base al method). Usa proxies={{"http": "socks5://127.0.0.1:40001", "https": "socks5://127.0.0.1:40001"}} per il proxy.
              4. Salvare il testo crudo della risposta (response.text) in un file chiamato 'raw_data.txt'.
              
              RESTITUISCI SOLO IL CODICE PYTHON PURO VALIDO. Non usare blocchi markdown (come ```python), nessuna spiegazione iniziale o finale. Solo codice.
              """

              print("Connessione in corso a Gemini 3.1 Live API tramite WebSocket...")
              generated_code = []

              async with client.aio.live.connect(model=model, config=config) as session:
                  print("Connessione asincrona stabilita.")
                  await session.send_realtime_input(text=prompt)
                  print("Prompt inviato. Ricezione della trascrizione del codice...")

                  async_for = session.receive()
                  async for response in async_for:
                      server_content = response.server_content
                      if server_content:
                          if server_content.output_transcription and server_content.output_transcription.text:
                              text_chunk = server_content.output_transcription.text
                              print(text_chunk, end="", flush=True)
                              generated_code.append(text_chunk)
                          
                          if server_content.turn_complete:
                              break

              code = "".join(generated_code).strip()
              
              if code.startswith("```python"): code = code[9:]
              if code.startswith("```"): code = code[3:]
              if code.endswith("```"): code = code[:-3]
              code = code.strip()

              with open("fast_scraper.py", "w") as f:
                  f.write(code)
              print("\n[AI Agent] Codice Python salvato in fast_scraper.py!")

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python ai_agent.py

      - name: Fase 3 - Velocità della Luce (Esecuzione Codice AI)
        run: |
          if [ -f fast_scraper.py ]; then
            echo "==================================="
            echo "Eseguo lo script scritto da Gemini 3.1 Live..."
            cat fast_scraper.py
            echo "==================================="
            python fast_scraper.py
            echo "Esecuzione completata!"
          else
            echo "Nessuno script generato dall'AI da eseguire."
          fi

      - name: Upload Artefatti Finali
        uses: actions/upload-artifact@v4
        with:
          name: AI_Reverse_Engineering_PoC
          path: |
            intercepted.json
            fast_scraper.py
            raw_data.txt
            page_state.png
