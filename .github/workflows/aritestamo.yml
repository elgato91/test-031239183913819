name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TARGET_TOPIC: "Orvieto"
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl-cffi markdownify google-genai
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup Container WARP (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
            sleep 0.5
          done
          
          echo "Attesa stabilizzazione tunnel WARP..."
          sleep 6

      - name: Inizializzazione Code DISTRIBUITE - STEP 1
        run: |
          cat << 'EOF' > m2_step1_setup.py
          import json
          TARGETS = [
              "https://10cose.it/orvieto/cosa-vedere-orvieto",
              "https://4viteinvacanza.it/itinerari/orvieto-con-i-bambini",
              "https://accessibilitacentristorici.it/ztl/Umbria_en/orvieto.html",
              "https://accessibilitacentristorici.it/ztl/umbria/orvieto/parcheggio_orvieto.html",
              "https://accessibilitacentristorici.it/ztl/umbria/parcheggio_orvieto.html",
              "https://acooknotmad.com/2016/11/we-love-orvieto.html",
              "https://activetourism.it/viaggi/viaggi-in-programma/la-via-francigena-da-orvieto-e-roma",
              "https://adagioumbro.it/it/cosa-vedere-orvieto",
              "https://adventurebackpack.com/orvieto-itinerary",
              "https://adventuresinitaly.ca/2024/05/02/a-food-tour-of-orvieto",
              "https://adventuresinitaly.ca/2025/07/31/museums-of-orvieto",
              "https://airguide.info/the-5-best-restaurants-in-orvieto-italy",
              "https://aletes.it/torre-del-moro-nel-centro-di-orvieto",
              "https://alltrails.com/it-it/italy/umbria/orvieto",
              "https://altoadige.it/viaggiart/a-san-valentino-un-cammino-degli-innamorati-nella-orvieto-nascosta-bb8fj850",
              "https://altraopinione.org/museo/orvieto/pozzo-della-cava",
              "https://amicinvacanza.it/orvieto-con-bambini"
          ]
          
          # Suddivisione matematica statica (Chunking) per performance ottimali
          for i in range(1, 7):
              chunk = TARGETS[i-1::6]
              with open(f"/tmp/step1_queue_{i}.json", "w") as f:
                  json.dump(chunk, f)
          print("Code distribuite Step 1 generate con successo.")
          EOF
          python -u m2_step1_setup.py

      - name: Creazione Modulo Condiviso - Pulizia Link e Conversione Markdown
        run: |
          cat << 'EOF' > extraction_utils.py
          """
          Modulo condiviso tra Step 1 e Step 2.
          Contiene SOLO logica di estrazione/pulizia: nessuna modifica a proxy,
          retry, validazione WAF o altra logica di scraping.

          Pulizia link basata esclusivamente su urllib (libreria standard, nessuna
          dipendenza aggiuntiva):
            1. Relativi -> assoluti (urljoin)
            2. Rimozione parametri di tracciamento dalla query string
            3. Rimozione ancore interne pure (#frammento sulla stessa pagina)
            4. Rimozione link a social/junk noti
            5. Rimozione link che puntano alla pagina stessa (self-link)
          Il testo pulito viene poi convertito in Markdown con markdownify,
          mantenendo i link superstiti nel formato [Testo](URL).
          """
          import re
          from urllib.parse import urljoin, urlsplit, urlunsplit, parse_qsl, urlencode

          from bs4 import BeautifulSoup
          from markdownify import markdownify as md_convert

          # Tag strutturali che non portano contenuto editoriale utile
          STRUCTURAL_TAGS_TO_STRIP = ["script", "style", "nav", "footer", "header",
                                      "form", "noscript", "iframe", "svg"]

          # Parametri di query da rimuovere sempre (tracciamento marketing/analytics)
          TRACKING_PARAMS_PREFIXES = ("utm_",)
          TRACKING_PARAMS_EXACT = {
              "fbclid", "gclid", "gclsrc", "dclid", "msclkid", "mc_cid", "mc_eid",
              "igshid", "ref", "ref_src", "ref_url", "source", "spm", "yclid",
              "_ga", "_gl", "cmpid", "campaign_id", "ad_id", "adgroup_id",
              "wbraid", "gbraid", "twclid", "vero_id", "trk", "trkCampaign",
              "share", "share_id", "si"
          }

          # Domini social/junk: i link verso questi domini vengono despogliati
          # (restano come testo semplice, non come link markdown)
          JUNK_LINK_DOMAINS = (
              "twitter.com", "x.com", "facebook.com", "fb.com", "instagram.com",
              "linkedin.com/share", "linkedin.com/shareArticle", "pinterest.com",
              "pinterest.it", "whatsapp.com", "wa.me", "t.me", "telegram.me",
              "reddit.com/submit", "tumblr.com/share", "getpocket.com",
              "addtoany.com", "sharethis.com", "mailto:"
          )


          def _is_junk_domain(netloc, full_href):
              netloc_low = netloc.lower()
              href_low = full_href.lower()
              for junk in JUNK_LINK_DOMAINS:
                  if junk in netloc_low or href_low.startswith(junk):
                      return True
              return False


          def _clean_query(query_string):
              if not query_string:
                  return ""
              pairs = parse_qsl(query_string, keep_blank_values=True)
              cleaned_pairs = []
              for key, value in pairs:
                  key_low = key.lower()
                  if key_low in TRACKING_PARAMS_EXACT:
                      continue
                  if any(key_low.startswith(pfx) for pfx in TRACKING_PARAMS_PREFIXES):
                      continue
                  cleaned_pairs.append((key, value))
              return urlencode(cleaned_pairs)


          def clean_link_href(raw_href, page_url):
              """
              Ritorna l'URL assoluto e ripulito, oppure None se il link va
              despogliato (ancora interna, self-link, social/junk, vuoto,
              javascript:, mailto: senza indirizzo valido).
              """
              if not raw_href:
                  return None

              raw_href = raw_href.strip()
              if not raw_href or raw_href.startswith("javascript:"):
                  return None
              if raw_href.startswith("mailto:") and len(raw_href) <= len("mailto:"):
                  return None

              # Assolutizza (gestisce anche i protocol-relative //host/path)
              try:
                  absolute = urljoin(page_url, raw_href)
              except Exception:
                  return None

              try:
                  parts = urlsplit(absolute)
              except Exception:
                  return None

              if parts.scheme not in ("http", "https", "mailto"):
                  return None

              if parts.scheme == "mailto":
                  return None

              # Ancora pura sulla stessa pagina (stesso path, solo #frammento)
              page_parts = urlsplit(page_url)
              same_path = (parts.netloc == page_parts.netloc and
                           parts.path.rstrip("/") == page_parts.path.rstrip("/"))

              if same_path and parts.fragment and not parts.query:
                  return None

              # Social / junk
              if _is_junk_domain(parts.netloc, absolute):
                  return None

              # Pulizia query string dai parametri di tracciamento
              cleaned_query = _clean_query(parts.query)

              # Ricostruzione URL: rimuove sempre il fragment (ancore interne)
              # a meno che non punti a una pagina diversa con un frammento
              # significativo (raro nei casi editoriali, quindi lo scartiamo
              # comunque per pulizia).
              rebuilt = urlunsplit((parts.scheme, parts.netloc, parts.path,
                                     cleaned_query, ""))

              # Self-link: stesso URL (dopo pulizia) della pagina sorgente
              page_rebuilt_parts = urlsplit(page_url)
              page_cleaned_query = _clean_query(page_rebuilt_parts.query)
              page_rebuilt = urlunsplit((page_rebuilt_parts.scheme,
                                          page_rebuilt_parts.netloc,
                                          page_rebuilt_parts.path.rstrip("/"),
                                          page_cleaned_query, ""))
              rebuilt_no_trailing = urlunsplit((parts.scheme, parts.netloc,
                                                 parts.path.rstrip("/"),
                                                 cleaned_query, ""))
              if rebuilt_no_trailing == page_rebuilt:
                  return None

              return rebuilt


          def _strip_anchor_tag(a_tag):
              """Sostituisce un <a> con il suo solo testo, senza rimuoverlo dal DOM."""
              a_tag.replace_with(a_tag.get_text())


          def html_to_clean_markdown(html, page_url):
              """
              Pipeline unica: rimuove tag strutturali, pulisce i link chirurgicamente
              con urllib, converte in Markdown con markdownify.
              Ritorna il markdown completo (nessun troncamento).
              """
              soup = BeautifulSoup(html, "html.parser")

              for tag_name in STRUCTURAL_TAGS_TO_STRIP:
                  for tag in soup.find_all(tag_name):
                      tag.decompose()

              for a_tag in soup.find_all("a"):
                  href = a_tag.get("href")
                  cleaned = clean_link_href(href, page_url)
                  if cleaned is None:
                      _strip_anchor_tag(a_tag)
                  else:
                      a_tag["href"] = cleaned
                      # Rimuove eventuali attributi di tracciamento superflui
                      for attr in list(a_tag.attrs):
                          if attr not in ("href", "title"):
                              del a_tag[attr]

              markdown_text = md_convert(
                  str(soup),
                  heading_style="ATX",
                  bullets="-",
                  strip=["img"],
              )

              # Collassa 3+ righe vuote consecutive in 2, pulisce i bordi
              markdown_text = re.sub(r"\n{3,}", "\n\n", markdown_text)
              markdown_text = markdown_text.strip()

              return markdown_text
          EOF

      - name: Creazione Modulo Condiviso - Estrazione Nugget via Gemini Live
        run: |
          cat << 'EOF' > nugget_extractor.py
          """
          Modulo condiviso tra Step 1 e Step 2 per l'estrazione di nugget strutturati
          tramite Gemini Live API (gemini-3.1-flash-live-preview).

          Segue lo stesso pattern del middleware filtro URL (url_screener.py):
            - client.aio.live.connect con response_modalities=["AUDIO"] +
              output_audio_transcription per ottenere testo dalla sessione Live
            - timeout di sicurezza con asyncio.wait_for
            - parsing JSON robusto con fallback su regex ```json ... ```
            - nessuna eccezione propagata verso il chiamante: ogni fallimento
              ritorna None, mai un'eccezione non gestita

          Principio non-negoziabile (coerente con ARIA):
            la "confidence" NON e' mai auto-riportata dal modello. Viene derivata
            deterministicamente confrontando la quote_originale dichiarata dal
            modello con il testo sorgente realmente scrapato (fuzzy match), esattamente
            come il fuzzy recovery gia' usato in url_screener.py con difflib.
          """

          import json
          import re
          import asyncio
          import difflib

          from google import genai

          MODEL_NAME = "gemini-live-2.5-flash-native-audio"

          CONFIG_LIVE = {
              "response_modalities": ["AUDIO"],
              "output_audio_transcription": {}
          }

          # Timeout di sicurezza per singola chiamata Live (per-target, non per-chunk)
          NUGGET_TIMEOUT_SECONDS = 40.0

          NUGGET_PROMPT_TEMPLATE = """
          Sei un estrattore di fatti (nugget) ad alta precisione per un sistema editoriale
          di ricerca. Il tuo compito e' leggere il TESTO SORGENTE fornito ed estrarre
          SOLO informazioni fattuali, dati concreti o affermazioni verificabili che
          potrebbero essere utili per un articolo editoriale sul TARGET TOPIC indicato.

          REGOLE:
          1. Estrai SOLO fatti realmente presenti nel testo. Non inventare, non
             dedurre, non completare informazioni mancanti.
          2. Per ogni nugget, riporta in "quote_originale" la frase o porzione di
             testo ESATTA (verbatim, non parafrasata) da cui hai estratto il fatto.
             Questo campo verra' verificato programmaticamente contro il testo
             sorgente: se non corrisponde, il nugget verra' scartato.
          3. Classifica ogni nugget in una "category" tra: prezzo, orario, evento,
             storia, geografia, recensione, dato_statistico, contatto, altro.
          4. Se il testo non contiene alcun fatto utile o rilevante, restituisci un
             array vuoto [].
          5. Non includere opinioni editoriali, pubblicita', o contenuto promozionale
             generico privo di dati concreti.

          Restituisci ESCLUSIVAMENTE un array JSON con oggetti nel formato:
          [
            {{"fact": "...", "category": "...", "quote_originale": "..."}}
          ]
          Usa il formato markdown ```json ... ```. Non aggiungere altro testo di commento.

          TARGET TOPIC:
          {topic}

          URL SORGENTE:
          {source_url}

          TESTO SORGENTE:
          {testo}
          """


          def _estrai_json_da_risposta(raw_text):
              """Estrae l'array JSON dalla risposta grezza, con fallback su regex.
              Identico approccio a url_screener.py."""
              if not raw_text:
                  return None
              match = re.search(r'```json\s*(.*?)\s*```', raw_text, re.DOTALL)
              json_str = match.group(1) if match else raw_text
              try:
                  parsed = json.loads(json_str)
                  if isinstance(parsed, list):
                      return parsed
              except Exception:
                  pass
              return None


          def _calcola_confidence(quote_originale, testo_sorgente):
              """
              Confidence derivata STRUTTURALMENTE, mai auto-riportata dal modello.

              - high: la quote e' rintracciabile pressoche' verbatim nel testo sorgente
              - medium: match parziale/fuzzy sopra soglia minima
              - low: quote non riscontrabile nel testo sorgente (possibile allucinazione)
              """
              if not quote_originale or not testo_sorgente:
                  return "low"

              quote_norm = re.sub(r'\s+', ' ', quote_originale).strip().lower()
              testo_norm = re.sub(r'\s+', ' ', testo_sorgente).strip().lower()

              if not quote_norm:
                  return "low"

              # Match verbatim diretto (case-insensitive, whitespace-normalizzato)
              if quote_norm in testo_norm:
                  return "high"

              # Fuzzy match: cerca la sottostringa piu' simile nel testo sorgente
              # usando una finestra scorrevole di dimensione comparabile alla quote
              finestra = len(quote_norm)
              if finestra < 8 or len(testo_norm) < finestra:
                  # Quote troppo corta o testo troppo piccolo per un confronto affidabile
                  best_ratio = difflib.SequenceMatcher(None, quote_norm, testo_norm).ratio()
              else:
                  best_ratio = 0.0
                  step = max(1, finestra // 2)
                  for i in range(0, len(testo_norm) - finestra + 1, step):
                      frammento = testo_norm[i:i + finestra]
                      ratio = difflib.SequenceMatcher(None, quote_norm, frammento).ratio()
                      if ratio > best_ratio:
                          best_ratio = ratio
                      if best_ratio > 0.95:
                          break

              if best_ratio >= 0.85:
                  return "high"
              elif best_ratio >= 0.60:
                  return "medium"
              else:
                  return "low"


          async def estrai_nuggets(client, semaphore, source_url, testo_markdown, topic,
                                    node_id=None, timeout_seconds=NUGGET_TIMEOUT_SECONDS):
              """
              Estrae nugget strutturati da un singolo testo gia' scrapato, tramite
              Gemini Live. Non solleva mai eccezioni verso il chiamante: in caso di
              errore o timeout ritorna None, e il chiamante decide come gestire il
              retry (in Step 1/2: rimessa in coda per un secondo tentativo a fine nodo).

              Ritorna: lista di dict nugget con schema
                {fact, source_url, category, confidence, quote_originale}
              oppure None in caso di fallimento totale della chiamata.
              """
              if not testo_markdown or len(testo_markdown.strip()) < 50:
                  return []

              label = f"[NODO {node_id}] " if node_id is not None else ""
              payload = NUGGET_PROMPT_TEMPLATE.format(
                  topic=topic,
                  source_url=source_url,
                  testo=testo_markdown
              )

              async with semaphore:
                  accumulated_text = ""
                  try:
                      async def run_session():
                          nonlocal accumulated_text
                          async with client.aio.live.connect(model=MODEL_NAME, config=CONFIG_LIVE) as session:
                              await session.send_realtime_input(text=payload)
                              async for response in session.receive():
                                  if response.server_content and response.server_content.output_transcription:
                                      if response.server_content.output_transcription.text:
                                          accumulated_text += response.server_content.output_transcription.text
                                  if response.server_content and response.server_content.turn_complete:
                                      break

                      await asyncio.wait_for(run_session(), timeout=timeout_seconds)

                  except (asyncio.TimeoutError, TimeoutError):
                      print(f"{label}[NUGGET] TIMEOUT {timeout_seconds}s su {source_url}. "
                            f"Verra' ritentato a fine nodo.", flush=True)
                      return None
                  except Exception as e:
                      print(f"{label}[NUGGET] Errore chiamata Live su {source_url}: {e}", flush=True)
                      return None

              parsed = _estrai_json_da_risposta(accumulated_text.strip())
              if parsed is None:
                  print(f"{label}[NUGGET] Parsing JSON fallito su {source_url}. "
                        f"Output grezzo: {accumulated_text[:80]}...", flush=True)
                  return None

              nuggets = []
              for item in parsed:
                  if not isinstance(item, dict):
                      continue
                  fact = str(item.get("fact", "")).strip()
                  quote = str(item.get("quote_originale", "")).strip()
                  category = str(item.get("category", "altro")).strip() or "altro"
                  if not fact:
                      continue

                  confidence = _calcola_confidence(quote, testo_markdown)

                  nuggets.append({
                      "fact": fact,
                      "source_url": source_url,
                      "category": category,
                      "confidence": confidence,
                      "quote_originale": quote
                  })

              print(f"{label}[NUGGET] {len(nuggets)} nugget estratti da {source_url}", flush=True)
              return nuggets
          EOF

      - name: Creazione Script Python - STEP 1 (Veloce curl-cffi, async + nugget extraction)
        run: |
          cat << 'EOF' > m2_step1.py
          import time
          import sys
          import random
          import os
          import json
          import asyncio
          from curl_cffi import requests as curl_requests
          from extraction_utils import html_to_clean_markdown
          from nugget_extractor import estrai_nuggets
          from google import genai

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          # Numero massimo di sessioni Gemini Live concorrenti PER NODO.
          # Tenuto deliberatamente basso: ogni sessione apre un WebSocket separato,
          # e 6 nodi girano in parallelo a livello di job (6 x NUGGET_CONCURRENCY
          # connessioni totali nel picco).
          NUGGET_CONCURRENCY = 5

          TARGET_TOPIC = os.environ.get("TARGET_TOPIC", "")

          if len(sys.argv) < 2:
              sys.exit(1)
          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id


          async def verify_proxy_active(port, max_retries=5, delay=5):
              test_session = curl_requests.AsyncSession(impersonate="chrome120")
              test_session.proxies = {"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}
              for _ in range(max_retries):
                  try:
                      resp = await test_session.get("https://api6.ipify.org?format=json", timeout=6)
                      if resp.status_code == 200:
                          await test_session.close()
                          return True
                  except Exception:
                      pass
                  await asyncio.sleep(delay)
              await test_session.close()
              return False


          def validate_html(html, url, status_code):
              if status_code >= 400:
                  return False, f"Blocco HTTP {status_code}"
              if not html or len(html.strip()) < 300:
                  return False, "HTML vuoto"
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return True, ""

              low_html = html.lower()
              blocking_indicators = [
                  "challenge-platform", "access denied", "403 forbidden", "cloudflare",
                  "just a moment", "security verification", "please enable js", "enable javascript",
                  "are you a robot", "please wait for verification", "we've detected unusual activity",
                  "if you are not redirected", "unusual traffic from your computer network",
                  "checking your browser", "prove your humanity", "captcha verification",
                  "please enter in the characters you see below", "access to this page is forbidden",
                  "error 1020", "you have been blocked", "pardon our interruption",
                  "se non vieni reindirizzato", "se hai problemi ad accedere",
                  "robot challenge screen", "ci siamo quasi", "verifica di sicurezza"
              ]

              for ind in blocking_indicators:
                  if ind in low_html:
                      return False, f"WAF/Captcha rilevato: {ind}"
              return True, ""


          async def main():
              if not await verify_proxy_active(ACTIVE_PORT):
                  sys.exit(0)

              queue_file = f"/tmp/step1_queue_{node_id}.json"
              if not os.path.exists(queue_file):
                  sys.exit(0)

              with open(queue_file, "r") as f:
                  targets = json.load(f)

              api_key = os.environ.get("GEMINI_API_KEY")
              gemini_client = genai.Client(api_key=api_key) if api_key else None
              nugget_semaphore = asyncio.Semaphore(NUGGET_CONCURRENCY)

              results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 1 (curl-cffi)\n{'#'*60}\n"
              failed_targets = []
              all_nuggets = []
              # target il cui SCRAPING e' riuscito ma la cui NUGGET EXTRACTION e' fallita
              # per timeout/errore: vengono ritentati una sola volta a fine nodo.
              nugget_retry_pool = []  # lista di tuple (url, testo_markdown)

              session = curl_requests.AsyncSession(impersonate="chrome120")
              session.proxies = {"http": f"socks5h://127.0.0.1:{ACTIVE_PORT}", "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"}
              session.headers.update({
                  "Accept-Language": "it-IT,it;q=0.9,en-US;q=0.8,en;q=0.7",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8"
              })

              nugget_tasks = []

              async def lancia_nugget_task(url, testo_markdown):
                  """Crea un task fire-and-forget per l'estrazione nugget, cosi' il
                  loop di scraping puo' proseguire subito sul target successivo."""
                  if gemini_client is None:
                      return

                  async def _run():
                      esito = await estrai_nuggets(
                          client=gemini_client,
                          semaphore=nugget_semaphore,
                          source_url=url,
                          testo_markdown=testo_markdown,
                          topic=TARGET_TOPIC,
                          node_id=node_id
                      )
                      if esito is None:
                          # Timeout o errore: candidato al retry a fine nodo
                          nugget_retry_pool.append((url, testo_markdown))
                      else:
                          all_nuggets.extend(esito)

                  task = asyncio.create_task(_run())
                  nugget_tasks.append(task)

              for url in targets:
                  print(f"[NODO {node_id}] [STEP 1] Richiesta: {url}", flush=True)
                  try:
                      resp = await session.get(url, timeout=12)
                      is_ok, err_msg = validate_html(resp.text, url, resp.status_code)

                      if is_ok:
                          if any(site in url for site in DIAGNOSTIC_SITES):
                              from bs4 import BeautifulSoup
                              soup = BeautifulSoup(resp.text, 'html.parser')
                              text = soup.get_text(separator=' ', strip=True)
                          else:
                              text = html_to_clean_markdown(resp.text, url)
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO:\n{text}\n"
                          print(f"[NODO {node_id}] -> Successo Rapido!", flush=True)

                          # Lancia l'estrazione nugget in background SENZA attendere:
                          # il loop prosegue subito sul prossimo target.
                          if not any(site in url for site in DIAGNOSTIC_SITES):
                              await lancia_nugget_task(url, text)
                      else:
                          print(f"[NODO {node_id}] -> Bloccato, passo allo Step 2: {err_msg}", flush=True)
                          failed_targets.append(url)
                  except Exception:
                      print(f"[NODO {node_id}] -> Errore rete. Passo allo Step 2.", flush=True)
                      failed_targets.append(url)

                  await asyncio.sleep(random.uniform(1.0, 2.0))

              await session.close()

              # Attende il completamento di tutte le chiamate nugget lanciate in background
              if nugget_tasks:
                  print(f"[NODO {node_id}] Attesa completamento {len(nugget_tasks)} chiamate nugget in volo...", flush=True)
                  await asyncio.gather(*nugget_tasks, return_exceptions=True)

              # Secondo (e ultimo) tentativo per i target andati in timeout/errore
              if nugget_retry_pool and gemini_client is not None:
                  print(f"[NODO {node_id}] Retry nugget extraction su {len(nugget_retry_pool)} target falliti...", flush=True)
                  retry_tasks = []
                  for url, testo_markdown in nugget_retry_pool:
                      async def _retry(url=url, testo_markdown=testo_markdown):
                          esito = await estrai_nuggets(
                              client=gemini_client,
                              semaphore=nugget_semaphore,
                              source_url=url,
                              testo_markdown=testo_markdown,
                              topic=TARGET_TOPIC,
                              node_id=node_id
                          )
                          if esito:
                              all_nuggets.extend(esito)
                          else:
                              print(f"[NODO {node_id}] [NUGGET] Retry fallito definitivamente su {url}", flush=True)
                      retry_tasks.append(asyncio.create_task(_retry()))
                  await asyncio.gather(*retry_tasks, return_exceptions=True)

              with open(f"output_node_{node_id}_step1.txt", "w", encoding="utf-8") as f:
                  f.write(results)
              with open(f"failed_node_{node_id}.json", "w", encoding="utf-8") as f:
                  json.dump(failed_targets, f)
              with open(f"nuggets_node_{node_id}_step1.json", "w", encoding="utf-8") as f:
                  json.dump(all_nuggets, f, indent=2, ensure_ascii=False)

              print(f"[NODO {node_id}] STEP 1 completato. Nugget totali estratti: {len(all_nuggets)}", flush=True)


          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Scraping Parallelo - STEP 1
        run: |
          echo 'Avvio processi paralleli per STEP 1 (Velocità Pura)...'
          touch node1_step1.log node2_step1.log node3_step1.log node4_step1.log node5_step1.log node6_step1.log
          tail -q -f node1_step1.log node2_step1.log node3_step1.log node4_step1.log node5_step1.log node6_step1.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            python -u m2_step1.py $i > node${i}_step1.log 2>&1 &
            PIDS+=($!)
            sleep 1.5
          done

          wait "${PIDS[@]}"
          kill $TAIL_PID || true

      - name: Refresh IP Container per lo STEP 2
        run: |
          echo 'Riavvio dei container per pulire la sessione WARP per lo Step 2...'
          docker restart warproxy-1 warproxy-2 warproxy-3 warproxy-4 warproxy-5 warproxy-6
          sleep 6

      - name: Inizializzazione Code DISTRIBUITE - STEP 2
        run: |
          cat << 'EOF' > m2_step2_setup.py
          import json
          import os

          merged_failed = []
          for i in range(1, 7):
              filename = f"failed_node_{i}.json"
              if os.path.exists(filename):
                  with open(filename, "r", encoding="utf-8") as f:
                      try: merged_failed.extend(json.load(f))
                      except Exception: pass
          
          unique_failed = list(dict.fromkeys(merged_failed))
          
          for i in range(1, 7):
              chunk = unique_failed[i-1::6]
              with open(f"/tmp/step2_queue_{i}.json", "w") as f:
                  json.dump(chunk, f)
                  
          print(f"Code Step 2 distribuite con {len(unique_failed)} target da recuperare con CloakBrowser.")
          EOF
          python -u m2_step2_setup.py

      - name: Creazione Script Python - STEP 2 (Async + CloakBrowser Ottimizzato + nugget extraction)
        run: |
          cat << 'EOF' > m2_step2.py
          import asyncio
          import time
          import sys
          import random
          import os
          import json
          from urllib.parse import urlparse, parse_qs
          from cloakbrowser import launch_persistent_context_async
          from extraction_utils import html_to_clean_markdown
          from nugget_extractor import estrai_nuggets
          from google import genai

          if len(sys.argv) < 2: sys.exit(1)
          node_id = int(sys.argv[1])
          INITIAL_PORT = 40000 + node_id

          NUGGET_CONCURRENCY = 5
          TARGET_TOPIC = os.environ.get("TARGET_TOPIC", "")

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p', 'find_desc']:
                      if param in queries: return queries[param][0]
              except: pass
              return default

          async def main():
              queue_file = f"/tmp/step2_queue_{node_id}.json"
              if not os.path.exists(queue_file): return
              
              with open(queue_file, "r") as f: targets = json.load(f)
              if not targets:
                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f: f.write("")
                  with open(f"nuggets_node_{node_id}_step2.json", "w", encoding="utf-8") as f: json.dump([], f)
                  return

              api_key = os.environ.get("GEMINI_API_KEY")
              gemini_client = genai.Client(api_key=api_key) if api_key else None
              nugget_semaphore = asyncio.Semaphore(NUGGET_CONCURRENCY)
              all_nuggets = []
              nugget_retry_pool = []  # (url, testo) andati in timeout/errore: un solo retry a fine nodo
              nugget_tasks = []

              async def lancia_nugget_task(url, testo_markdown):
                  if gemini_client is None:
                      return

                  async def _run():
                      esito = await estrai_nuggets(
                          client=gemini_client,
                          semaphore=nugget_semaphore,
                          source_url=url,
                          testo_markdown=testo_markdown,
                          topic=TARGET_TOPIC,
                          node_id=node_id
                      )
                      if esito is None:
                          nugget_retry_pool.append((url, testo_markdown))
                      else:
                          all_nuggets.extend(esito)

                  nugget_tasks.append(asyncio.create_task(_run()))

              home_dir = os.path.expanduser("~")
              profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2")
              windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
              
              # Profilo con noise attivo di default e path per font corretti
              base_args = [
                  "--no-sandbox",
                  "--disable-dev-shm-usage",
                  f"--fingerprint={random.randint(100000, 999999)}",
                  f"--fingerprint-fonts-dir={windows_fonts_dir}"
              ]

              print(f"[NODO {node_id}] Avvio singola sessione Persistente (Warmup + Scraping)...", flush=True)
              try:
                  # Avvio unificato. geoip=True gestirà dinamicamente locale e timezone in base al proxy WARP.
                  context = await launch_persistent_context_async(
                      profile_dir,
                      headless=False,
                      humanize=True,
                      human_config={"mistype_chance": 0.05, "typing_delay": 100, "idle_between_actions": True},
                      proxy=f"socks5://127.0.0.1:{INITIAL_PORT}",
                      geoip=True,
                      viewport={"width": 1920, "height": 1080},
                      args=base_args
                  )
                  page = await context.new_page()
                  
                  # WARMUP Integrato - Creazione di cronologia valida
                  await page.goto("https://www.google.com", wait_until="domcontentloaded", timeout=25000)
                  await asyncio.sleep(2)
                  await page.goto("https://www.reddit.com", wait_until="domcontentloaded", timeout=25000)
                  await asyncio.sleep(2)

              except Exception as e:
                  print(f"[NODO {node_id}] Errore critico avvio Browser: {e}")
                  return

              results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 2 (Fallback)\n{'#'*60}\n"

              for url in targets:
                  print(f"[NODO {node_id}] Recupero Avanzato: {url}", flush=True)
                  try:
                      query_to_search = get_query_from_url(url)
                      
                      # RICERCHE NATIVE con `.fill()` nativo di cloakbrowser (evita lo shadowban)
                      if "bing.com" in url:
                          await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.5, 4.0))
                          try:
                              search_box = page.locator("textarea[name='q'], input[name='q']").first
                              await search_box.fill(query_to_search) 
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                              
                      elif "startpage.com" in url:
                          await page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.0, 3.5))
                          try:
                              search_box = page.locator("input#q").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                      elif "html.duckduckgo.com" in url:
                          await page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.0, 3.5))
                          try:
                              search_box = page.locator("input[name=q]").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                      else:
                          await page.goto(url, wait_until="domcontentloaded", timeout=40000)
                      
                      # --- SILENZIO RADIO ---
                      # Zero esecuzioni JS per bypassare l'anti-bot
                      try: await page.wait_for_load_state("networkidle", timeout=12000)
                      except: pass
                          
                      await asyncio.sleep(6) 
                      
                      # Scorrimento Lazy Load NATIVO (simula tastiera hardware)
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(1)
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(2)
                      
                      # Scarica l'HTML in memoria una singola volta
                      raw_html = await page.content()
                      current_url = page.url

                      text_for_check = html_to_clean_markdown(raw_html, current_url)
                      text_lower_for_check = text_for_check.lower()
                      
                      # Rilevamento passivo WAF/Captcha
                      blocking_indicators = [
                          "just a moment", "are you a robot", "prove your humanity",
                          "captcha verification", "please enter in the characters you see below",
                          "access is forbidden", "access to this page is forbidden", "challenge-platform",
                          "we've detected unusual activity"
                      ]
                      is_blocked = any(b in text_lower_for_check for b in blocking_indicators)
                      
                      if len(text_for_check) > 150 and not is_blocked:
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO ESTRATTO:\n{text_for_check}\n"
                          print(f"[NODO {node_id}] -> Recuperato con Successo!", flush=True)

                          # Nugget extraction in background, non blocca il loop
                          await lancia_nugget_task(url, text_for_check)
                      else:
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nFALLITO (Blocco WAF/Captcha)\n"
                          print(f"[NODO {node_id}] -> Fallito.", flush=True)

                  except Exception as e:
                      print(f"[NODO {node_id}] -> Errore esecuzione: {e}", flush=True)
                      results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nERRORE: {e}\n"
                  
                  await asyncio.sleep(random.uniform(4.0, 7.0))

              try: await context.close()
              except: pass

              if nugget_tasks:
                  print(f"[NODO {node_id}] Attesa completamento {len(nugget_tasks)} chiamate nugget in volo...", flush=True)
                  await asyncio.gather(*nugget_tasks, return_exceptions=True)

              if nugget_retry_pool and gemini_client is not None:
                  print(f"[NODO {node_id}] Retry nugget extraction su {len(nugget_retry_pool)} target falliti...", flush=True)
                  retry_tasks = []
                  for url, testo_markdown in nugget_retry_pool:
                      async def _retry(url=url, testo_markdown=testo_markdown):
                          esito = await estrai_nuggets(
                              client=gemini_client,
                              semaphore=nugget_semaphore,
                              source_url=url,
                              testo_markdown=testo_markdown,
                              topic=TARGET_TOPIC,
                              node_id=node_id
                          )
                          if esito:
                              all_nuggets.extend(esito)
                          else:
                              print(f"[NODO {node_id}] [NUGGET] Retry fallito definitivamente su {url}", flush=True)
                      retry_tasks.append(asyncio.create_task(_retry()))
                  await asyncio.gather(*retry_tasks, return_exceptions=True)

              with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                  f.write(results)
              with open(f"nuggets_node_{node_id}_step2.json", "w", encoding="utf-8") as f:
                  json.dump(all_nuggets, f, indent=2, ensure_ascii=False)

              print(f"[NODO {node_id}] STEP 2 completato. Nugget totali estratti: {len(all_nuggets)}", flush=True)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Scraping Parallelo - STEP 2 (Fallback CloakBrowser)
        run: |
          echo 'Avvio processi paralleli per STEP 2 sui target falliti...'
          touch node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log
          tail -q -f node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            python -u m2_step2.py $i > node${i}_step2.log 2>&1 &
            PIDS+=($!)
            sleep 1.5
          done

          wait "${PIDS[@]}"
          kill $TAIL_PID || true
          
          for i in {1..6}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

          touch output_node_1_step1.txt output_node_1_step2.txt \
                output_node_2_step1.txt output_node_2_step2.txt \
                output_node_3_step1.txt output_node_3_step2.txt \
                output_node_4_step1.txt output_node_4_step2.txt \
                output_node_5_step1.txt output_node_5_step2.txt \
                output_node_6_step1.txt output_node_6_step2.txt

          cat output_node_1_step1.txt output_node_1_step2.txt \
              output_node_2_step1.txt output_node_2_step2.txt \
              output_node_3_step1.txt output_node_3_step2.txt \
              output_node_4_step1.txt output_node_4_step2.txt \
              output_node_5_step1.txt output_node_5_step2.txt \
              output_node_6_step1.txt output_node_6_step2.txt > output_macchina2_cdp.txt

      - name: Merge Nugget Finale (JSON strutturato deduplicato)
        run: |
          cat << 'EOF' > merge_nuggets.py
          import json
          import os

          TOTAL_NODES = 6

          merged_nuggets = []
          per_node_stats = {}

          for i in range(1, TOTAL_NODES + 1):
              for step in ["step1", "step2"]:
                  filename = f"nuggets_node_{i}_{step}.json"
                  if os.path.exists(filename):
                      try:
                          with open(filename, "r", encoding="utf-8") as f:
                              nuggets = json.load(f)
                              if isinstance(nuggets, list):
                                  merged_nuggets.extend(nuggets)
                                  per_node_stats[f"node_{i}_{step}"] = len(nuggets)
                      except Exception as e:
                          print(f"Errore lettura {filename}: {e}", flush=True)
                          per_node_stats[f"node_{i}_{step}"] = 0

          # Deduplica su (fact, source_url) normalizzati: evita nugget duplicati
          # quando lo stesso fatto appare identico da estrazioni diverse.
          seen = set()
          nuggets_deduplicati = []
          for n in merged_nuggets:
              fact_norm = (n.get("fact") or "").strip().lower()
              url_norm = (n.get("source_url") or "").strip().lower()
              key = (fact_norm, url_norm)
              if key in seen:
                  continue
              seen.add(key)
              nuggets_deduplicati.append(n)

          # Conteggio per livello di confidence, utile per audit rapido
          confidence_counts = {"high": 0, "medium": 0, "low": 0}
          for n in nuggets_deduplicati:
              c = n.get("confidence", "low")
              if c in confidence_counts:
                  confidence_counts[c] += 1

          output_finale = {
              "stats": {
                  "totale_nugget_grezzi": len(merged_nuggets),
                  "totale_nugget_deduplicati": len(nuggets_deduplicati),
                  "per_nodo": per_node_stats,
                  "per_confidence": confidence_counts
              },
              "nuggets": nuggets_deduplicati
          }

          with open("nuggets_finale.json", "w", encoding="utf-8") as f:
              json.dump(output_finale, f, indent=2, ensure_ascii=False)

          print(f"Merge completato: {len(nuggets_deduplicati)} nugget unici "
                f"(da {len(merged_nuggets)} grezzi) salvati in nuggets_finale.json", flush=True)
          print(f"Distribuzione confidence: {confidence_counts}", flush=True)
          EOF
          python -u merge_nuggets.py

      - name: Upload Artifact Macchina 2 (Testo Grezzo)
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt

      - name: Upload Artifact Nugget (JSON Strutturato)
        uses: actions/upload-artifact@v4
        with:
          name: Nuggets_Macchina2
          path: nuggets_finale.json
