name: Clean and Consolidate Nuggets (Enterprise Agnostic)

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: 'Nome del file JSON di input'
        required: false
        default: 'nuggets_finale.json'
  push:
    paths:
      - 'nuggets_input.json'
      - 'nuggets_finale.json'

jobs:
  reconcile_and_verify:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      ANALYSIS_MODEL_NAME: "gemma-4-26b-a4b-it"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configurazione Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installazione Dipendenze
        run: |
          pip install google-genai pydantic

      - name: Creazione Codice Pipeline
        run: |
          cat << 'EOF' > deep_research_consolidator.py
          import os
          import sys
          import json
          import re
          import time
          import asyncio
          import argparse
          import difflib
          from collections import deque
          from google import genai
          from google.genai import types

          MAX_MACRO_AREE = 15
          ANALYSIS_MODEL_NAME = os.environ.get("ANALYSIS_MODEL_NAME", "gemma-4-26b-a4b-it")
          MAX_RPM_ANALYSIS = int(os.environ.get("MAX_RPM_ANALYSIS", "15"))
          ANALYSIS_TIMEOUT_SECONDS = float(os.environ.get("ANALYSIS_TIMEOUT_SECONDS", "90.0"))
          MAX_RETRY_TRANSIENT = 3

          # Parametri di tolleranza per il controllo anti-allucinazione deterministico
          NUMERIC_TOLERANCE_PCT = 0.02
          SIMILARITY_THRESHOLD = 0.60
          NUMBER_REGEX = re.compile(r"\d[\d.,]*\d|\d")

          # ---------------------------------------------------------
          # 1. Rate Limiter Deterministico (Sliding Window)
          # ---------------------------------------------------------
          class RPMLimiter:
              def __init__(self, max_rpm: int):
                  if max_rpm <= 0:
                      raise ValueError("max_rpm deve essere > 0")
                  self.max_rpm = max_rpm
                  self._timestamps = deque()
                  self._lock = asyncio.Lock()

              async def acquire(self, label: str = ""):
                  async with self._lock:
                      while True:
                          now = time.monotonic()
                          while self._timestamps and now - self._timestamps[0] >= 60.0:
                              self._timestamps.popleft()

                          if len(self._timestamps) < self.max_rpm:
                              self._timestamps.append(now)
                              return

                          wait_seconds = 60.0 - (now - self._timestamps[0]) + 0.05
                          print(f"{label}[RPM-LIMITER] Limite {self.max_rpm} RPM raggiunto, "
                                f"attendo {wait_seconds:.1f}s...", flush=True)
                          await asyncio.sleep(max(wait_seconds, 0.1))

          # ---------------------------------------------------------
          # 2. Client API con Grounding e Self-Correction
          # ---------------------------------------------------------
          class GemmaAnalysisClient:
              def __init__(self, api_key: str, max_rpm: int = MAX_RPM_ANALYSIS):
                  if not api_key:
                      raise ValueError("API key mancante per il modello di analisi")
                  self.client = genai.Client(api_key=api_key)
                  self.limiter = RPMLimiter(max_rpm)

              async def generate_grounded_json(self, prompt: str, label: str = "",
                                                expect_list: bool = False,
                                                timeout_seconds: float = ANALYSIS_TIMEOUT_SECONDS):
                  last_raw_text = None
                  current_prompt = prompt

                  for tentativo in range(MAX_RETRY_TRANSIENT):
                      await self.limiter.acquire(label=label)

                      try:
                          response = await asyncio.wait_for(
                              self._call_model(current_prompt),
                              timeout=timeout_seconds
                          )
                      except (asyncio.TimeoutError, TimeoutError):
                          print(f"{label}[GEMMA] Timeout dopo {timeout_seconds}s (tentativo {tentativo + 1}/{MAX_RETRY_TRANSIENT})", flush=True)
                          continue
                      except Exception as e:
                          print(f"{label}[GEMMA] Errore chiamata modello: {e} (tentativo {tentativo + 1}/{MAX_RETRY_TRANSIENT})", flush=True)
                          await asyncio.sleep(2.0 * (tentativo + 1))
                          continue

                      raw_text = response.get("text", "")
                      grounding_used = response.get("grounding_used", False)
                      last_raw_text = raw_text

                      parsed = _estrai_json(raw_text, expect_list=expect_list)
                      if parsed is not None:
                          return parsed, raw_text, grounding_used

                      print(f"{label}[GEMMA] Parsing JSON fallito (tentativo {tentativo + 1}/{MAX_RETRY_TRANSIENT}). Richiedo correzione formato...", flush=True)
                      current_prompt = (
                          prompt
                          + "\n\nATTENZIONE: la tua risposta precedente non era un JSON valido "
                            "o non rispettava lo schema richiesto. Rispondi ESCLUSIVAMENTE con "
                            "il JSON richiesto, senza alcun testo di commento, senza markdown "
                            "fences se non i delimitatori ```json ... ``` richiesti."
                      )

                  return None, last_raw_text, False

              async def _call_model(self, prompt: str):
                  grounding_tool = types.Tool(google_search=types.GoogleSearch())
                  config = types.GenerateContentConfig(
                      tools=[grounding_tool],
                      temperature=0.0,
                  )

                  def _sync_call():
                      return self.client.models.generate_content(
                          model=ANALYSIS_MODEL_NAME,
                          contents=prompt,
                          config=config,
                      )

                  result = await asyncio.to_thread(_sync_call)

                  text = ""
                  if result.candidates:
                      candidate = result.candidates[0]
                      if candidate.content and candidate.content.parts:
                          for part in candidate.content.parts:
                              if getattr(part, "text", None):
                                  text += part.text

                  grounding_used = False
                  try:
                      if result.candidates and result.candidates[0].grounding_metadata:
                          gm = result.candidates[0].grounding_metadata
                          grounding_used = bool(
                              getattr(gm, "grounding_chunks", None) or
                              getattr(gm, "web_search_queries", None)
                          )
                  except Exception:
                      pass

                  return {"text": text.strip(), "grounding_used": grounding_used}

          def _estrai_json(raw_text, expect_list: bool = False):
              if not raw_text:
                  return None

              match = re.search(r'```json\s*(.*?)\s*```', raw_text, re.DOTALL)
              json_str = match.group(1) if match else raw_text.strip()

              try:
                  parsed = json.loads(json_str)
              except Exception:
                  alt_match = re.search(r'(\{.*\}|\[.*\])', raw_text, re.DOTALL)
                  if not alt_match:
                      return None
                  try:
                      parsed = json.loads(alt_match.group(1))
                  except Exception:
                      return None

              if expect_list and not isinstance(parsed, list):
                  return None
              if not expect_list and not isinstance(parsed, (dict, list)):
                  return None

              return parsed

          # ---------------------------------------------------------
          # 3. Fase 1: Clustering Agnostico e Riduzione Deterministica
          # ---------------------------------------------------------
          CLUSTERING_PROMPT_TEMPLATE = """Sei un analista editoriale specializzato in organizzazione di informazioni fattuali per articoli di viaggio/turismo/cultura, in QUALSIASI lingua e per QUALSIASI destinazione al mondo. Il tuo compito e' puramente organizzativo: NON devi riscrivere, correggere o verificare i fatti in questa fase.

          Riceverai un elenco numerato di "nugget" (fatti grezzi estratti da fonti web), ciascuno con un id univoco, il testo del fatto e la categoria assegnata in fase di estrazione.

          COMPITO:
          Raggruppa questi nugget in MACRO-AREE tematiche, basandoti sull'entita' o sul sotto-argomento a cui si riferiscono (es. un monumento specifico, un tema trasversale come mobilita'/parcheggi, un tema come enogastronomia, eccetera). Le macro-aree devono emergere ESCLUSIVAMENTE dal contenuto che leggi, non da una lista predefinita: se il contenuto parla di una cattedrale, una torre, un pozzo, un museo, un evento, un'area naturale, un aspetto logistico, crea la macro-area che meglio descrive quell'insieme di nugget, usando la stessa lingua prevalente dei nugget stessi.

          VINCOLI RIGIDI:
          1. Il numero totale di macro-aree NON puo' superare {max_macro_aree}. Se il contenuto e' molto vario, accorpa i temi minori in macro-aree piu' ampie piuttosto che superare il limite.
          2. Ogni nugget deve essere assegnato a ESATTAMENTE una macro-area (nessun nugget escluso, nessun nugget duplicato tra macro-aree).
          3. Il nome di ogni macro-area deve essere breve, descrittivo, nella lingua prevalente del contenuto.
          4. Se alcuni nugget sono generici, non correlati o troppo eterogenei per una macro-area dedicata, raggruppali in una macro-area residuale (es. equivalente locale di "Altre informazioni").

          NUGGET DA RAGGRUPPARE:
          {nuggets_list}

          Restituisci ESCLUSIVAMENTE un JSON con questo schema, racchiuso in un blocco ```json ... ```:
          {{
            "macro_aree": [
              {{
                "nome_macro_area": "...",
                "nugget_ids": [0, 3, 7, ...]
              }}
            ]
          }}
          Non aggiungere alcun testo al di fuori del JSON."""

          def _formatta_nuggets_per_prompt(nuggets_indicizzati):
              righe = []
              for idx, n in nuggets_indicizzati:
                  righe.append(f"[{idx}] (categoria: {n.get('category', 'altro')}) {n.get('fact', '')}")
              return "\n".join(righe)

          async def clusterizza_nuggets(gemma_client, nuggets, label="[CLUSTERING] "):
              nuggets_indicizzati = list(enumerate(nuggets))
              prompt = CLUSTERING_PROMPT_TEMPLATE.format(
                  max_macro_aree=MAX_MACRO_AREE,
                  nuggets_list=_formatta_nuggets_per_prompt(nuggets_indicizzati)
              )

              parsed, raw_text, grounding_used = await gemma_client.generate_grounded_json(
                  prompt, label=label, expect_list=False
              )

              if parsed is None:
                  print(f"{label}Clustering fallito (nessuna risposta), uso fallback per-categoria.", flush=True)
                  return _fallback_clustering_per_categoria(nuggets)

              # Gestione tollerante di ritorni strutturati come liste flat o oggetti avvolti
              if isinstance(parsed, list):
                  macro_aree_raw = parsed
              elif isinstance(parsed, dict) and "macro_aree" in parsed:
                  macro_aree_raw = parsed["macro_aree"]
              else:
                  print(f"{label}Clustering fallito (formato JSON imprevisto), uso fallback per-categoria.", flush=True)
                  return _fallback_clustering_per_categoria(nuggets)

              assegnati = {}
              for area in macro_aree_raw:
                  nome = str(area.get("nome_macro_area", "")).strip() or "Altre informazioni"
                  for nid in area.get("nugget_ids", []):
                      try:
                          nid_int = int(nid)
                      except (TypeError, ValueError):
                          continue
                      if 0 <= nid_int < len(nuggets):
                          assegnati[nid_int] = nome

              mancanti = [i for i in range(len(nuggets)) if i not in assegnati]
              if mancanti:
                  print(f"{label}{len(mancanti)} nugget non assegnati, spostati nel bucket di fallback.", flush=True)
                  for i in mancanti:
                      assegnati[i] = "Altre informazioni"

              macro_aree = {}
              for idx, nome_area in assegnati.items():
                  macro_aree.setdefault(nome_area, []).append(nuggets[idx])

              risultato = [
                  {"nome_macro_area": nome, "nuggets": lista}
                  for nome, lista in macro_aree.items()
              ]

              return _applica_tetto_macro_aree(risultato, MAX_MACRO_AREE)

          def _fallback_clustering_per_categoria(nuggets):
              macro_aree = {}
              for n in nuggets:
                  cat = n.get("category", "altro") or "altro"
                  macro_aree.setdefault(cat, []).append(n)
              risultato = [{"nome_macro_area": nome, "nuggets": lista} for nome, lista in macro_aree.items()]
              return _applica_tetto_macro_aree(risultato, MAX_MACRO_AREE)

          def _applica_tetto_macro_aree(macro_aree, max_macro_aree):
              if len(macro_aree) <= max_macro_aree:
                  return macro_aree

              # Accorpamento deterministico dei raggruppamenti minori per evitare chiamate AI in eccesso
              macro_aree_ordinate = sorted(macro_aree, key=lambda a: len(a["nuggets"]))
              residuale_nome = "Altre informazioni"
              residuale_nuggets = []
              risultato = []

              n_da_accorpare = len(macro_aree_ordinate) - (max_macro_aree - 1)
              for i, area in enumerate(macro_aree_ordinate):
                  if i < n_da_accorpare:
                      residuale_nuggets.extend(area["nuggets"])
                  else:
                      risultato.append(area)

              if residuale_nuggets:
                  area_esistente = next((a for a in risultato if a["nome_macro_area"] == residuale_nome), None)
                  if area_esistente:
                      area_esistente["nuggets"].extend(residuale_nuggets)
                  else:
                      risultato.append({"nome_macro_area": residuale_nome, "nuggets": residuale_nuggets})

              return risultato

          # ---------------------------------------------------------
          # 4. Fase 2: Riconciliazione Macro-Aree
          # ---------------------------------------------------------
          RECONCILIATION_PROMPT_TEMPLATE = """Sei un fact-checker editoriale senior. Ti occupi di riconciliare informazioni raccolte da piu' fonti web su un singolo argomento/entita', in QUALSIASI lingua e per QUALSIASI destinazione al mondo. Hai accesso allo strumento di ricerca Google per verificare dati incerti o contraddittori: usalo ogni volta che serve dirimere un conflitto numerico o fattuale, o per capire quale sia la fonte ufficiale di un dato.

          MACRO-AREA: {nome_macro_area}

          Di seguito i nugget grezzi raccolti su questo argomento, ciascuno con: id, fatto, categoria, url sorgente, e livello di confidence assegnato in fase di estrazione.

          NUGGET GREZZI:
          {nuggets_list}

          COMPITO:
          1. Unisci i nugget che riportano la stessa informazione in un unico "fatto consolidato". Elimina duplicati, ridondanze e informazioni superflue.
          2. Se due o piu' nugget riportano DATI NUMERICI O FATTUALI IN CONFLITTO sullo stesso argomento, risolvi il conflitto:
             a. Se una delle fonti e' chiaramente piu' autorevole (es. sito istituzionale/ufficiale), dai priorita' al dato di quella fonte.
             b. Se non e' possibile determinarlo, usa lo strumento di ricerca Google (grounding) per verificare il valore corretto.
             c. Se nemmeno il grounding risolve il conflitto con certezza, riporta il fatto come "conflitto irrisolto", elencando i valori alternativi.
          3. Per ogni fatto CONSOLIDATO relativo a categorie ad alto valore/alta volatilita' (prezzi, orari, contatti, indirizzi), produci ANCHE una voce separata "verified_facts": deve riportare il campo, il valore corretto, l'URL ufficiale, e impostare "verificato_via_grounding" a true se reperito o corretto tramite ricerca web.
          4. Ogni fatto consolidato in output deve riportare la lista degli id dei nugget grezzi da cui deriva (campo "source_nugget_ids") per permettere la tracciabilità.
          5. NON INVENTARE alcun dato non presente nei nugget grezzi o non confermato da ricerca grounded reale.

          Restituisci ESCLUSIVAMENTE un JSON con questo schema, in un blocco ```json ... ```:
          {{
            "macro_area": "{nome_macro_area}",
            "fatti_consolidati": [
              {{
                "fact": "testo del fatto consolidato",
                "category": "categoria del nugget di origine",
                "source_nugget_ids": [0, 2, 5],
                "source_urls": ["https://...", "https://..."],
                "conflitto_irrisolto": false,
                "valori_alternativi": [],
                "note_risoluzione": "nota su come e' stato risolto un eventuale conflitto"
              }}
            ],
            "verified_facts": [
              {{
                "campo": "es. prezzo biglietto intero / orario apertura",
                "valore": "il valore corretto",
                "valori_alternativi_scartati": [],
                "fonte_ufficiale_url": "https://...",
                "fonte_ufficiale_certa": true,
                "verificato_via_grounding": true,
                "source_nugget_ids": [3, 9]
              }}
            ]
          }}
          Non aggiungere alcun testo al di fuori del JSON."""

          def _formatta_nuggets_per_reconcile(nuggets):
              righe = []
              for idx, n in enumerate(nuggets):
                  righe.append(
                      f"[{idx}] (categoria: {n.get('category', 'altro')}, "
                      f"confidence: {n.get('confidence', 'n/d')}, "
                      f"fonte: {n.get('source_url', 'n/d')}) {n.get('fact', '')}"
                  )
              return "\n".join(righe)

          async def riconcilia_macro_area(gemma_client, nome_macro_area, nuggets, label=""):
              prompt = RECONCILIATION_PROMPT_TEMPLATE.format(
                  nome_macro_area=nome_macro_area,
                  nuggets_list=_formatta_nuggets_per_reconcile(nuggets)
              )

              parsed, raw_text, grounding_used = await gemma_client.generate_grounded_json(
                  prompt, label=label, expect_list=False
              )

              if parsed is None or not isinstance(parsed, dict):
                  print(f"{label}[RICONCILIAZIONE] Fallita o non strutturata per macro-area '{nome_macro_area}'. Fallback applicato.", flush=True)
                  return _fallback_nessuna_riconciliazione(nome_macro_area, nuggets)

              parsed.setdefault("macro_area", nome_macro_area)
              parsed.setdefault("fatti_consolidati", [])
              parsed.setdefault("verified_facts", [])
              parsed["_grounding_used"] = grounding_used
              parsed["_local_nuggets"] = nuggets
              return parsed

          def _fallback_nessuna_riconciliazione(nome_macro_area, nuggets):
              fatti = []
              for idx, n in enumerate(nuggets):
                  fatti.append({
                      "fact": n.get("fact", ""),
                      "category": n.get("category", "altro"),
                      "source_nugget_ids": [idx],
                      "source_urls": [n.get("source_url", "")],
                      "conflitto_irrisolto": False,
                      "valori_alternativi": [],
                      "note_risoluzione": "RICONCILIAZIONE AI FALLITA: fatto mantenuto as-is.",
                      "_non_riconciliato": True,
                  })
              return {
                  "macro_area": nome_macro_area,
                  "fatti_consolidati": fatti,
                  "verified_facts": [],
                  "_grounding_used": False,
                  "_local_nuggets": nuggets,
              }

          # ---------------------------------------------------------
          # 5. Fase 3: Verifica Deterministica Anti-Allucinazione
          # ---------------------------------------------------------
          def _estrai_numeri(testo):
              if not testo:
                  return []
              grezzi = NUMBER_REGEX.findall(testo)
              numeri = []
              for g in grezzi:
                  pulito = g.strip(".,")
                  if not pulito:
                      continue
                  normalizzato = pulito.replace(".", "").replace(",", ".") if pulito.count(",") == 1 and pulito.count(".") <= 1 else pulito.replace(",", "")
                  try:
                      numeri.append(float(normalizzato))
                  except ValueError:
                      continue
              return numeri

          def _numero_supportato(numero, numeri_sorgente):
              for n_sorgente in numeri_sorgente:
                  if n_sorgente == 0:
                      if numero == 0:
                          return True
                      continue
                  scostamento = abs(numero - n_sorgente) / abs(n_sorgente)
                  if scostamento <= NUMERIC_TOLERANCE_PCT:
                      return True
              return False

          def _testo_supportato_fuzzy(testo, testi_sorgente_concatenati):
              if not testo or not testi_sorgente_concatenati:
                  return 0.0
              testo_norm = re.sub(r"\s+", " ", testo).strip().lower()
              sorgente_norm = re.sub(r"\s+", " ", testi_sorgente_concatenati).strip().lower()

              if testo_norm in sorgente_norm:
                  return 1.0

              finestra = min(len(testo_norm), 300)
              if finestra < 8 or len(sorgente_norm) < finestra:
                  return difflib.SequenceMatcher(None, testo_norm, sorgente_norm).ratio()

              best_ratio = 0.0
              step = max(1, finestra // 2)
              for i in range(0, len(sorgente_norm) - finestra + 1, step):
                  frammento = sorgente_norm[i:i + finestra]
                  ratio = difflib.SequenceMatcher(None, testo_norm, frammento).ratio()
                  if ratio > best_ratio:
                      best_ratio = ratio
                  if best_ratio > 0.95:
                      break
              return best_ratio

          def _raccogli_quote_originali(source_ids, id_map):
              testi = []
              for local_id in source_ids:
                  try:
                      lid = int(local_id)
                  except (TypeError, ValueError):
                      continue
                  nugget = id_map.get(lid)
                  if nugget:
                      if nugget.get("quote_originale"):
                          testi.append(nugget["quote_originale"])
                      if nugget.get("fact"):
                          testi.append(nugget["fact"])
              return "\n".join(testi)

          def verifica_fatto_consolidato(fatto_consolidato, id_map):
              source_ids = fatto_consolidato.get("source_nugget_ids", [])
              testo_fatto = fatto_consolidato.get("fact", "")

              testi_sorgente = _raccogli_quote_originali(source_ids, id_map)

              dettagli = {
                  "similarity_score": None,
                  "numeri_non_supportati": [],
                  "source_ids_invalidi": [],
              }

              for sid in source_ids:
                  try:
                      sid_int = int(sid)
                      if sid_int not in id_map:
                          dettagli["source_ids_invalidi"].append(sid)
                  except (TypeError, ValueError):
                      dettagli["source_ids_invalidi"].append(sid)

              if not source_ids or not testi_sorgente:
                  fatto_consolidato["verification_status"] = "unverified"
                  fatto_consolidato["unverified"] = True
                  dettagli["motivo"] = "Nessun id di riferimento o quote originali mancanti."
                  fatto_consolidato["verification_details"] = dettagli
                  return fatto_consolidato

              similarity = _testo_supportato_fuzzy(testo_fatto, testi_sorgente)
              dettagli["similarity_score"] = round(similarity, 3)

              numeri_fatto = _estrai_numeri(testo_fatto)
              numeri_sorgente = _estrai_numeri(testi_sorgente)

              for numero in numeri_fatto:
                  if not _numero_supportato(numero, numeri_sorgente):
                      dettagli["numeri_non_supportati"].append(numero)

              is_verified = (
                  similarity >= SIMILARITY_THRESHOLD
                  and not dettagli["numeri_non_supportati"]
                  and not dettagli["source_ids_invalidi"]
              )

              fatto_consolidato["verification_status"] = "verified" if is_verified else "unverified"
              if not is_verified:
                  fatto_consolidato["unverified"] = True
              fatto_consolidato["verification_details"] = dettagli
              return fatto_consolidato

          def verifica_verified_fact(verified_fact, id_map):
              source_ids = verified_fact.get("source_nugget_ids", [])
              valore = str(verified_fact.get("valore", ""))
              verificato_via_grounding = bool(verified_fact.get("verificato_via_grounding", False))

              testi_sorgente = _raccogli_quote_originali(source_ids, id_map)

              invalid_ids = []
              for sid in source_ids:
                  try:
                      sid_int = int(sid)
                      if sid_int not in id_map:
                          invalid_ids.append(sid)
                  except (TypeError, ValueError):
                      invalid_ids.append(sid)

              dettagli = {
                  "similarity_score": None,
                  "numeri_non_supportati": [],
                  "source_ids_invalidi": invalid_ids,
              }

              if not testi_sorgente:
                  if verificato_via_grounding:
                      verified_fact["verification_status"] = "verified_external"
                  else:
                      verified_fact["verification_status"] = "unverified"
                      verified_fact["unverified"] = True
                      dettagli["motivo"] = "Nessun riferimento e nessun grounding dichiarato."
                  verified_fact["verification_details"] = dettagli
                  return verified_fact

              similarity = _testo_supportato_fuzzy(valore, testi_sorgente)
              dettagli["similarity_score"] = round(similarity, 3)

              numeri_valore = _estrai_numeri(valore)
              numeri_sorgente = _estrai_numeri(testi_sorgente)
              for numero in numeri_valore:
                  if not _numero_supportato(numero, numeri_sorgente):
                      dettagli["numeri_non_supportati"].append(numero)

              is_verified = (not dettagli["numeri_non_supportati"]) and (similarity >= SIMILARITY_THRESHOLD or not numeri_valore)

              if is_verified:
                  verified_fact["verification_status"] = "verified"
              elif verificato_via_grounding:
                  verified_fact["verification_status"] = "verified_external"
              else:
                  verified_fact["verification_status"] = "unverified"
                  verified_fact["unverified"] = True

              verified_fact["verification_details"] = dettagli
              return verified_fact

          def esegui_verifica_anti_allucinazione(macro_aree_riconciliate):
              needs_human_review = []
              totale_fatti = 0
              totale_verified_facts = 0
              totale_non_verificati = 0

              for area in macro_aree_riconciliate:
                  local_nuggets = area.get("_local_nuggets", [])
                  id_map = {i: n for i, n in enumerate(local_nuggets)}

                  fatti_verificati = []
                  for fatto in area.get("fatti_consolidati", []):
                      totale_fatti += 1
                      fatto_verificato = verifica_fatto_consolidato(fatto, id_map)
                      fatti_verificati.append(fatto_verificato)
                      if fatto_verificato.get("verification_status") == "unverified":
                          totale_non_verificati += 1
                          needs_human_review.append({
                              "tipo": "fatto_consolidato",
                              "macro_area": area.get("macro_area"),
                              "fact": fatto_verificato.get("fact"),
                              "source_urls": fatto_verificato.get("source_urls", []),
                              "verification_details": fatto_verificato.get("verification_details"),
                          })
                  area["fatti_consolidati"] = fatti_verificati

                  vf_verificati = []
                  for vf in area.get("verified_facts", []):
                      totale_verified_facts += 1
                      vf_verificato = verifica_verified_fact(vf, id_map)
                      vf_verificati.append(vf_verificato)
                      if vf_verificato.get("verification_status") == "unverified":
                          totale_non_verificati += 1
                          needs_human_review.append({
                              "tipo": "verified_fact",
                              "macro_area": area.get("macro_area"),
                              "campo": vf_verificato.get("campo"),
                              "valore": vf_verificato.get("valore"),
                              "fonte_ufficiale_url": vf_verificato.get("fonte_ufficiale_url"),
                              "verification_details": vf_verificato.get("verification_details"),
                          })
                  area["verified_facts"] = vf_verificati

                  # Mappatura sicura dagli ID locali a quelli globali (evita TypeError durante indicizzazione liste)
                  for fatto in area.get("fatti_consolidati", []):
                      global_ids = []
                      for lid in fatto.get("source_nugget_ids", []):
                          try:
                              lid_int = int(lid)
                              if 0 <= lid_int < len(local_nuggets):
                                  global_ids.append(local_nuggets[lid_int].get("_global_id"))
                          except (TypeError, ValueError):
                              continue
                      fatto["source_nugget_ids"] = global_ids

                  for vf in area.get("verified_facts", []):
                      global_ids = []
                      for lid in vf.get("source_nugget_ids", []):
                          try:
                              lid_int = int(lid)
                              if 0 <= lid_int < len(local_nuggets):
                                  global_ids.append(local_nuggets[lid_int].get("_global_id"))
                          except (TypeError, ValueError):
                              continue
                      vf["source_nugget_ids"] = global_ids

                  area.pop("_local_nuggets", None)

              report = {
                  "totale_fatti_consolidati": totale_fatti,
                  "totale_verified_facts": totale_verified_facts,
                  "totale_non_verificati": totale_non_verificati,
                  "needs_human_review": needs_human_review,
              }

              return macro_aree_riconciliate, report

