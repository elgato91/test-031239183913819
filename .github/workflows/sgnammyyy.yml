- name: Installazione Font di Sistema e Windows 11 Reali
        run: |
          sudo apt-get update
          # Installazione dei pacchetti necessari per decomprimere e gestire i font
          sudo apt-get install -y cabextract xfonts-utils unzip wget
          
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true

          # Crea le directory dei font sia a livello utente che a livello di sistema globale
          mkdir -p ~/.local/share/fonts/windows
          sudo mkdir -p /usr/share/fonts/truetype/windows

          # Copia i font msttcorefonts standard
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          
          # Scarica il pacchetto completo con i veri font di sistema di Windows 11 dal repository attivo liblaf/fonts
          wget -qO /tmp/win11-fonts.zip https://github.com/liblaf/fonts/releases/download/Win11/Win11-English.zip
          unzip -oq /tmp/win11-fonts.zip -d /tmp/win11-fonts-extracted
          
          # Copia ricorsivamente tutti i font Windows 11 nelle cartelle utente e di sistema
          find /tmp/win11-fonts-extracted -name "*.ttf" -o -name "*.TTF" -o -name "*.otf" -o -name "*.OTF" | while read -r font_path; do
            cp "$font_path" ~/.local/share/fonts/windows/ || true
            sudo cp "$font_path" /usr/share/fonts/truetype/windows/ || true
          done
          
          # Rigenera la cache di sistema globale dei font per il sistema Linux
          sudo fc-cache -f -v
