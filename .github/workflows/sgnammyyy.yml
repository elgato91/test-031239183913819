name: WARP Ufficiale - Ottimizzazione Tempo (4-6s fisso)

on:
  workflow_dispatch:

env:
  NODI_NECESSARI: 6
  BUDGET_TOTALE_SECONDI: 90
  DELAY_MIN: 4
  DELAY_MAX: 6

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pull immagine
        run: docker pull caomingjun/warp:latest

      - name: Registrazione con polling aggressivo e timing dettagliato per nodo
        run: |
          set -o pipefail
          START_TS=$(date +%s)

          declare -A porta_di_nodo
          declare -A ipv4_di_nodo
          declare -A ipv6_di_nodo
          declare -A ipv4_visti
          NODI_OK=()
          CONTATORE_GLOBALE=0
          PORTA_BASE=1080

          tempo_residuo() {
            local elapsed=$(( $(date +%s) - START_TS ))
            echo $(( BUDGET_TOTALE_SECONDI - elapsed ))
          }

          # Scrive sempre 5 campi separati da '|' (mai spazi), cosi' i campi
          # vuoti (es. IPv6 non ottenuto) non fanno collassare gli altri
          # durante il parsing con IFS='|' read.
          avvia_e_verifica_nodo() {
            local id=$1
            local port=$2
            local out_file=$3
            local ip4=""
            local ip6=""
            local t_pronto="0"
            local t_start
            t_start=$(date +%s)

            trap 'echo "${id}|${port}|${ip4}|${ip6}|${t_pronto}" > "$out_file"' EXIT

            docker rm -f "warp_$id" > /dev/null 2>&1 || true

            if ! docker run -d \
              --name "warp_$id" \
              --cap-add NET_ADMIN \
              --cap-add MKNOD \
              --cap-add AUDIT_WRITE \
              --sysctl net.ipv6.conf.all.disable_ipv6=0 \
              --sysctl net.ipv4.conf.all.src_valid_mark=1 \
              -e WARP_SLEEP=1 \
              -p "$port":1080 \
              caomingjun/warp:latest > /dev/null 2>&1; then
              return 0
            fi

            local pronto=0
            for _ in $(seq 1 60); do
              local trace
              trace=$(curl -s --max-time 1 -x "socks5h://127.0.0.1:$port" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null || true)
              if echo "$trace" | grep -q "warp=on" 2>/dev/null; then
                pronto=1
                t_pronto=$(( $(date +%s) - t_start ))
                break
              fi
              sleep 0.5
            done

            if [ "$pronto" -eq 1 ]; then
              ip4=$(curl -s --max-time 5 --ipv4 -x "socks5://127.0.0.1:$port" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep "^ip=" | cut -d= -f2 || true)
              ip6=$(curl -s --max-time 5 --ipv6 -x "socks5://127.0.0.1:$port" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep "^ip=" | cut -d= -f2 || true)
            fi

            return 0
          }

          rimuovi_nodo() {
            local id=$1
            docker rm -f "warp_$id" > /dev/null 2>&1 || true
          }

          # Legge un file esito a 5 campi pipe-separated in 5 variabili globali:
          # PARSED_ID PARSED_PORT PARSED_IP4 PARSED_IP6 PARSED_TPRONTO
          leggi_esito() {
            local esito_file=$1
            IFS='|' read -r PARSED_ID PARSED_PORT PARSED_IP4 PARSED_IP6 PARSED_TPRONTO < "$esito_file"
          }

          echo "=== ONDATA 1: avvio $NODI_NECESSARI nodi scaglionati (${DELAY_MIN}-${DELAY_MAX}s) ==="
          declare -A pid_di_nodo
          declare -A file_di_nodo

          for i in $(seq 1 "$NODI_NECESSARI"); do
            CONTATORE_GLOBALE=$((CONTATORE_GLOBALE + 1))
            id="n$CONTATORE_GLOBALE"
            port=$((PORTA_BASE + CONTATORE_GLOBALE))
            porta_di_nodo[$id]=$port
            out="/tmp/esito_${id}.txt"
            file_di_nodo[$id]=$out

            avvia_e_verifica_nodo "$id" "$port" "$out" &
            pid_di_nodo[$id]=$!

            if [ "$i" -lt "$NODI_NECESSARI" ]; then
              DELAY=$(awk -v min="$DELAY_MIN" -v max="$DELAY_MAX" 'BEGIN{srand('"$i"'+systime()); print min+rand()*(max-min)}')
              echo "Nodo $id avviato (porta $port), prossimo tra ${DELAY}s..."
              sleep "$DELAY"
            else
              echo "Nodo $id avviato (porta $port), ultimo dell'ondata 1."
            fi
          done

          echo ""
          echo "Attendo che tutti i nodi completino la verifica (polling attivo, nessuna attesa fissa)..."
          for id in "${!pid_di_nodo[@]}"; do
            wait "${pid_di_nodo[$id]}" 2>/dev/null || true
          done

          echo ""
          echo "=== Esiti ondata 1 (con timing per nodo) ==="
          for id in "${!file_di_nodo[@]}"; do
            esito_file="${file_di_nodo[$id]}"
            if [ ! -f "$esito_file" ]; then
              echo "Nodo $id (porta ${porta_di_nodo[$id]}): FALLITO (nessun esito)"
              rimuovi_nodo "$id"
              continue
            fi

            leggi_esito "$esito_file"
            echo "Nodo $PARSED_ID (porta $PARSED_PORT): IPv4=${PARSED_IP4:-NESSUNO} IPv6=${PARSED_IP6:-NESSUNO} (pronto in ${PARSED_TPRONTO}s dal suo avvio)"

            if [ -z "$PARSED_IP4" ]; then
              echo "  -> IPv4 non ottenuto, verra' sostituito"
              rimuovi_nodo "$PARSED_ID"
              continue
            fi

            if [ -n "${ipv4_visti[$PARSED_IP4]:-}" ]; then
              echo "  -> IPv4 duplicato (gia' usato da nodo ${ipv4_visti[$PARSED_IP4]}), verra' sostituito"
              rimuovi_nodo "$PARSED_ID"
              continue
            fi

            ipv4_visti[$PARSED_IP4]=$PARSED_ID
            ipv4_di_nodo[$PARSED_ID]=$PARSED_IP4
            ipv6_di_nodo[$PARSED_ID]=$PARSED_IP6
            NODI_OK+=("$PARSED_ID")
          done

          echo ""
          echo "Nodi validi dopo ondata 1: ${#NODI_OK[@]}/$NODI_NECESSARI"
          echo "Tempo residuo: $(tempo_residuo)s"

          ONDATA=1
          while [ "${#NODI_OK[@]}" -lt "$NODI_NECESSARI" ]; do
            RESIDUO=$(tempo_residuo)
            if [ "$RESIDUO" -le 10 ]; then
              echo ""
              echo "Tempo residuo insufficiente per un altro retry (${RESIDUO}s). Mi fermo qui."
              break
            fi

            ONDATA=$((ONDATA + 1))
            MANCANTI=$((NODI_NECESSARI - ${#NODI_OK[@]}))
            echo ""
            echo "=== ONDATA $ONDATA: servono ancora $MANCANTI nodi, tempo residuo ${RESIDUO}s ==="

            declare -A pid_retry
            declare -A file_retry

            for i in $(seq 1 "$MANCANTI"); do
              CONTATORE_GLOBALE=$((CONTATORE_GLOBALE + 1))
              id="n$CONTATORE_GLOBALE"
              port=$((PORTA_BASE + CONTATORE_GLOBALE))
              porta_di_nodo[$id]=$port
              out="/tmp/esito_${id}.txt"
              file_retry[$id]=$out

              avvia_e_verifica_nodo "$id" "$port" "$out" &
              pid_retry[$id]=$!

              if [ "$i" -lt "$MANCANTI" ]; then
                DELAY=$(awk -v min="$DELAY_MIN" -v max="$DELAY_MAX" 'BEGIN{srand('"$CONTATORE_GLOBALE"'+systime()); print min+rand()*(max-min)}')
                sleep "$DELAY"
              fi
            done

            for id in "${!pid_retry[@]}"; do
              wait "${pid_retry[$id]}" 2>/dev/null || true
            done

            for id in "${!file_retry[@]}"; do
              esito_file="${file_retry[$id]}"
              if [ ! -f "$esito_file" ]; then
                echo "Nodo $id (porta ${porta_di_nodo[$id]}): FALLITO"
                rimuovi_nodo "$id"
                continue
              fi

              leggi_esito "$esito_file"
              echo "Nodo $PARSED_ID (porta $PARSED_PORT): IPv4=${PARSED_IP4:-NESSUNO} IPv6=${PARSED_IP6:-NESSUNO} (pronto in ${PARSED_TPRONTO}s)"

              if [ -z "$PARSED_IP4" ]; then
                echo "  -> IPv4 non ottenuto, scartato"
                rimuovi_nodo "$PARSED_ID"
                continue
              fi

              if [ -n "${ipv4_visti[$PARSED_IP4]:-}" ]; then
                echo "  -> IPv4 duplicato, scartato"
                rimuovi_nodo "$PARSED_ID"
                continue
              fi

              ipv4_visti[$PARSED_IP4]=$PARSED_ID
              ipv4_di_nodo[$PARSED_ID]=$PARSED_IP4
              ipv6_di_nodo[$PARSED_ID]=$PARSED_IP6
              NODI_OK+=("$PARSED_ID")

              if [ "${#NODI_OK[@]}" -ge "$NODI_NECESSARI" ]; then
                break
              fi
            done

            unset pid_retry file_retry
            echo "Nodi validi dopo ondata $ONDATA: ${#NODI_OK[@]}/$NODI_NECESSARI"
          done

          ELAPSED_FINALE=$(( $(date +%s) - START_TS ))
          echo ""
          echo "======================================================"
          echo "RISULTATO FINALE: ${#NODI_OK[@]}/$NODI_NECESSARI nodi"
          echo "Tempo impiegato: ${ELAPSED_FINALE}s (budget: ${BUDGET_TOTALE_SECONDI}s)"
          echo "======================================================"
          for id in "${NODI_OK[@]}"; do
            echo "  $id (porta ${porta_di_nodo[$id]}) -> IPv4: ${ipv4_di_nodo[$id]} | IPv6: ${ipv6_di_nodo[$id]:-N/D}"
          done

          echo ""
          UNIVOCI_V6=$(for id in "${NODI_OK[@]}"; do echo "${ipv6_di_nodo[$id]:-VUOTO}"; done | sort -u | wc -l)
          echo "=== IPv6 univoci tra i nodi selezionati: $UNIVOCI_V6 / ${#NODI_OK[@]} ==="

          if [ "${#NODI_OK[@]}" -lt "$NODI_NECESSARI" ]; then
            echo "::error::Ottenuti solo ${#NODI_OK[@]}/$NODI_NECESSARI IPv4 univoci."
            exit 1
          fi

      - name: Pulizia
        if: always()
        run: |
          docker ps -a --format '{{.Names}}' | grep '^warp_' | xargs -r docker rm -f || true
