name: Test WARP IPv6 Forzato v2

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pull immagine
        run: docker pull ghcr.io/kingcc/warproxy:latest

      - name: Avvia 6 nodi
        run: |
          for i in 1 2 3 4 5 6; do
            PORT=$((40000 + i))
            docker run --name wp-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,1.1.1.1 \
              -d ghcr.io/kingcc/warproxy:latest

            DELAY=$(awk -v min=4 -v max=6 'BEGIN{srand('"$i"'+systime()); print min+rand()*(max-min)}')
            echo "Nodo $i avviato su porta $PORT, attendo ${DELAY}s..."
            sleep "$DELAY"
          done

          echo ""
          echo "=== Attesa generazione file di config iniziale (30s) ==="
          sleep 30

      - name: Ispeziona permessi e contenuto file config (diagnostica)
        run: |
          for i in 1 2 3 4 5 6; do
            echo "--- Nodo $i ---"
            docker exec wp-$i sh -c "ls -la /config/ 2>&1 || echo 'errore ls'"
            docker exec wp-$i sh -c "cat /config/wgcf-profile.conf 2>&1 | grep -i endpoint || echo 'file o riga endpoint non trovati'"
          done

      - name: Forza Endpoint IPv6 fisso dentro ciascun container e riavvia processo interno
        run: |
          for i in 1 2 3 4 5 6; do
            echo "Nodo $i: sostituzione endpoint dentro il container"
            docker exec wp-$i sh -c "sed -i 's/Endpoint = engage.cloudflareclient.com:2408/Endpoint = [2606:4700:d0::a29f:c001]:2408/' /config/wgcf-profile.conf 2>&1" || echo "  sed fallito sul nodo $i"
            docker exec wp-$i sh -c "grep -i endpoint /config/wgcf-profile.conf 2>&1" || echo "  grep fallito sul nodo $i"

            echo "Nodo $i: riavvio container per applicare la nuova config"
            docker restart wp-$i
          done

          echo ""
          echo "=== Attesa ristabilimento tunnel (30s) ==="
          sleep 30

      - name: Verifica se l'endpoint è stato mantenuto dopo il restart (o riscritto da wgcf)
        run: |
          for i in 1 2 3 4 5 6; do
            echo "--- Nodo $i (post-restart) ---"
            docker exec wp-$i sh -c "grep -i endpoint /config/wgcf-profile.conf 2>&1" || echo "  file non leggibile"
          done

      - name: IP di uscita per nodo
        run: |
          for i in 1 2 3 4 5 6; do
            PORT=$((40000 + i))
            TRACE=$(curl -s --max-time 10 -x socks5h://127.0.0.1:$PORT https://www.cloudflare.com/cdn-cgi/trace)
            IP=$(echo "$TRACE" | grep "^ip=" | cut -d= -f2)
            WARP=$(echo "$TRACE" | grep "^warp=" | cut -d= -f2)
            echo "Nodo $i (porta $PORT): IP=$IP warp=$WARP"
          done

      - name: Pulizia
        if: always()
        run: |
          for i in 1 2 3 4 5 6; do
            docker rm -f wp-$i || true
          done
