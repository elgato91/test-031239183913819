name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on:
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      TARGET_TOPIC: "Orvieto"
      # Metti a "1" per forzare i 6 siti diagnostici (browserleaks, sannysoft,
      # creepjs, pixelscan, incolumitas, deviceinfo) a saltare Step 1 e finire
      # dritti nel fallback CloakBrowser di Step 2, cosi' il fingerprint e lo
      # stealth vengono verificati sul browser headful vero e non sul semplice
      # fetch HTTP di curl-cffi. Default "0": comportamento identico a sempre.
      FORZA_DIAGNOSTICI_STEP2: "0"
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true

          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl-cffi markdownify google-genai
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup Container WARP (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
            sleep 0.5
          done

          echo "Attesa stabilizzazione tunnel WARP..."
          sleep 6

      - name: Inizializzazione Code DISTRIBUITE - STEP 1
        run: |
          cat << 'EOF' > m2_step1_setup.py
          import json
          TARGETS = [
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          # Suddivisione matematica statica (Chunking) per performance ottimali
          for i in range(1, 7):
              chunk = TARGETS[i-1::6]
              with open(f"/tmp/step1_queue_{i}.json", "w") as f:
                  json.dump(chunk, f)
          print("Code distribuite Step 1 generate con successo.")
          EOF
          python -u m2_step1_setup.py

      - name: Creazione Modulo Condiviso - Pulizia Link e Conversione Markdown
        run: |
          cat << 'EOF' > extraction_utils.py
          """
          Modulo condiviso tra Step 1 e Step 2.
          Contiene SOLO logica di estrazione/pulizia: nessuna modifica a proxy,
          retry, validazione WAF o altra logica di scraping.

          Pulizia link basata esclusivamente su urllib (libreria standard, nessuna
          dipendenza aggiuntiva):
            1. Relativi -> assoluti (urljoin)
            2. Rimozione parametri di tracciamento dalla query string
            3. Rimozione ancore interne pure (#frammento sulla stessa pagina)
            4. Rimozione link a social/junk noti
            5. Rimozione link che puntano alla pagina stessa (self-link)
          Il testo pulito viene poi convertito in Markdown con markdownify,
          mantenendo i link superstiti nel formato [Testo](URL).
          """
          import re
          from urllib.parse import urljoin, urlsplit, urlunsplit, parse_qsl, urlencode

          from bs4 import BeautifulSoup
          from markdownify import markdownify as md_convert

          # Tag strutturali che non portano contenuto editoriale utile
          STRUCTURAL_TAGS_TO_STRIP = ["script", "style", "nav", "footer", "header",
                                      "form", "noscript", "iframe", "svg"]

          # Parametri di query da rimuovere sempre (tracciamento marketing/analytics)
          TRACKING_PARAMS_PREFIXES = ("utm_",)
          TRACKING_PARAMS_EXACT = {
              "fbclid", "gclid", "gclsrc", "dclid", "msclkid", "mc_cid", "mc_eid",
              "igshid", "ref", "ref_src", "ref_url", "source", "spm", "yclid",
              "_ga", "_gl", "cmpid", "campaign_id", "ad_id", "adgroup_id",
              "wbraid", "gbraid", "twclid", "vero_id", "trk", "trkCampaign",
              "share", "share_id", "si"
          }

          # Domini social/junk: i link verso questi domini vengono despogliati
          # (restano come testo semplice, non come link markdown)
          JUNK_LINK_DOMAINS = (
              "twitter.com", "x.com", "facebook.com", "fb.com", "instagram.com",
              "linkedin.com/share", "linkedin.com/shareArticle", "pinterest.com",
              "pinterest.it", "whatsapp.com", "wa.me", "t.me", "telegram.me",
              "reddit.com/submit", "tumblr.com/share", "getpocket.com",
              "addtoany.com", "sharethis.com", "mailto:"
          )


          def _is_junk_domain(netloc, full_href):
              netloc_low = netloc.lower()
              href_low = full_href.lower()
              for junk in JUNK_LINK_DOMAINS:
                  if junk in netloc_low or href_low.startswith(junk):
                      return True
              return False


          def _clean_query(query_string):
              if not query_string:
                  return ""
              pairs = parse_qsl(query_string, keep_blank_values=True)
              cleaned_pairs = []
              for key, value in pairs:
                  key_low = key.lower()
                  if key_low in TRACKING_PARAMS_EXACT:
                      continue
                  if any(key_low.startswith(pfx) for pfx in TRACKING_PARAMS_PREFIXES):
                      continue
                  cleaned_pairs.append((key, value))
              return urlencode(cleaned_pairs)


          def clean_link_href(raw_href, page_url):
              """
              Ritorna l'URL assoluto e ripulito, oppure None se il link va
              despogliato (ancora interna, self-link, social/junk, vuoto,
              javascript:, mailto: senza indirizzo valido).
              """
              if not raw_href:
                  return None

              raw_href = raw_href.strip()
              if not raw_href or raw_href.startswith("javascript:"):
                  return None
              if raw_href.startswith("mailto:") and len(raw_href) <= len("mailto:"):
                  return None

              # Assolutizza (gestisce anche i protocol-relative //host/path)
              try:
                  absolute = urljoin(page_url, raw_href)
              except Exception:
                  return None

              try:
                  parts = urlsplit(absolute)
              except Exception:
                  return None

              if parts.scheme not in ("http", "https", "mailto"):
                  return None

              if parts.scheme == "mailto":
                  return None

              # Ancora pura sulla stessa pagina (stesso path, solo #frammento)
              page_parts = urlsplit(page_url)
              same_path = (parts.netloc == page_parts.netloc and
                           parts.path.rstrip("/") == page_parts.path.rstrip("/"))

              if same_path and parts.fragment and not parts.query:
                  return None

              # Social / junk
              if _is_junk_domain(parts.netloc, absolute):
                  return None

              # Pulizia query string dai parametri di tracciamento
              cleaned_query = _clean_query(parts.query)

              # Ricostruzione URL: rimuove sempre il fragment (ancore interne)
              # a meno che non punti a una pagina diversa con un frammento
              # significativo (raro nei casi editoriali, quindi lo scartiamo
              # comunque per pulizia).
              rebuilt = urlunsplit((parts.scheme, parts.netloc, parts.path,
                                     cleaned_query, ""))

              # Self-link: stesso URL (dopo pulizia) della pagina sorgente
              page_rebuilt_parts = urlsplit(page_url)
              page_cleaned_query = _clean_query(page_rebuilt_parts.query)
              page_rebuilt = urlunsplit((page_rebuilt_parts.scheme,
                                          page_rebuilt_parts.netloc,
                                          page_rebuilt_parts.path.rstrip("/"),
                                          page_cleaned_query, ""))
              rebuilt_no_trailing = urlunsplit((parts.scheme, parts.netloc,
                                                 parts.path.rstrip("/"),
                                                 cleaned_query, ""))
              if rebuilt_no_trailing == page_rebuilt:
                  return None

              return rebuilt


          def _strip_anchor_tag(a_tag):
              """Sostituisce un <a> con il suo solo testo, senza rimuoverlo dal DOM."""
              a_tag.replace_with(a_tag.get_text())


          def html_to_clean_markdown(html, page_url):
              """
              Pipeline unica: rimuove tag strutturali, pulisce i link chirurgicamente
              con urllib, converte in Markdown con markdownify.
              Ritorna il markdown completo (nessun troncamento).
              """
              soup = BeautifulSoup(html, "html.parser")

              for tag_name in STRUCTURAL_TAGS_TO_STRIP:
                  for tag in soup.find_all(tag_name):
                      tag.decompose()

              for a_tag in soup.find_all("a"):
                  href = a_tag.get("href")
                  cleaned = clean_link_href(href, page_url)
                  if cleaned is None:
                      _strip_anchor_tag(a_tag)
                  else:
                      a_tag["href"] = cleaned
                      # Rimuove eventuali attributi di tracciamento superflui
                      for attr in list(a_tag.attrs):
                          if attr not in ("href", "title"):
                              del a_tag[attr]

              markdown_text = md_convert(
                  str(soup),
                  heading_style="ATX",
                  bullets="-",
                  strip=["img"],
              )

              # Collassa 3+ righe vuote consecutive in 2, pulisce i bordi
              markdown_text = re.sub(r"\n{3,}", "\n\n", markdown_text)
              markdown_text = markdown_text.strip()

              return markdown_text
          EOF

      - name: Creazione Modulo Condiviso - Estrazione Nugget via Gemini Live (Token Bucket + Multi-Key)
        run: |
          cat << 'EOF' > nugget_extractor.py
          """
          Modulo condiviso tra Step 1 e Step 2 per l'estrazione di nugget strutturati
          tramite Gemini Live API (gemini-3.1-flash-live-preview).

          Segue lo stesso pattern del middleware filtro URL (url_screener.py):
            - client.aio.live.connect con response_modalities=["AUDIO"] +
              output_audio_transcription per ottenere testo dalla sessione Live
            - timeout di sicurezza con asyncio.wait_for
            - parsing JSON robusto con fallback su regex ```json ... ```

          Principio non-negoziabile (coerente con ARIA):
            la "confidence" NON e' mai auto-riportata dal modello. Viene derivata
            deterministicamente confrontando la quote_originale dichiarata dal
            modello con il testo sorgente realmente scrapato (fuzzy match).

          GESTIONE LIMITI ENTERPRISE (v2):
            1. Token bucket per-chiave: il limite dichiarato e' TPM 65K. Ogni
               GeminiKeyPool.acquire() stima i token del payload e attende finche'
               non c'e' budget sufficiente nel bucket della chiave corrente, con
               un margine di sicurezza (75% del limite dichiarato) perche' la stima
               token e' approssimata (~4 char/token) e non il vero tokenizer.
            2. Multi-key round-robin con cooldown: se una chiave sforra comunque
               (risposta 1011 / "exceeded your current quota"), viene marcata in
               cooldown per COOLDOWN_SECONDS e il pool passa automaticamente alla
               chiave successiva disponibile. Funziona anche con una sola chiave:
               in quel caso il "pool" ha un solo elemento e la chiave va semplicemente
               in attesa che il proprio bucket si ricarichi.
            3. Scrittura incrementale JSONL: ogni nugget estratto viene appeso
               immediatamente su disco (una riga = un oggetto JSON completo), NON
               accumulato solo in RAM. Se il processo viene interrotto (timeout job,
               kill, crash), tutto cio' che era stato scritto fino a quel momento
               resta valido e recuperabile.
          """

          import json
          import re
          import os
          import time
          import asyncio
          import difflib
          import concurrent.futures

          from google import genai

          MODEL_NAME = "gemini-3.1-flash-live-preview"

          CONFIG_LIVE = {
              "response_modalities": ["AUDIO"],
              "output_audio_transcription": {}
          }

          NUGGET_TIMEOUT_SECONDS = 40.0

          # Limite dichiarato dal piano: TPM 65.000. Usiamo un margine di sicurezza
          # perche' la stima token e' approssimata (char/4), non il tokenizer reale.
          TPM_LIMIT_DICHIARATO = 65_000
          TPM_SAFETY_MARGIN = 0.75
          TPM_BUDGET = int(TPM_LIMIT_DICHIARATO * TPM_SAFETY_MARGIN)  # 48.750

          # Quanto tempo una chiave resta "in cooldown" dopo aver sforato il limite
          # (segnale ricevuto direttamente dall'errore 1011 di Gemini, non dedotto)
          COOLDOWN_SECONDS = 65.0

          # Segnali testuali che identificano un errore di quota/rate-limit nella
          # risposta d'errore della Live API (messaggio WebSocket 1011)
          QUOTA_ERROR_MARKERS = ("exceeded your current quota", "resource_exhausted", "rate limit")

          NUGGET_PROMPT_TEMPLATE = """
          Sei un estrattore di fatti (nugget) ad alta precisione per un sistema editoriale
          di ricerca. Il tuo compito e' leggere il TESTO SORGENTE fornito ed estrarre
          SOLO informazioni fattuali, dati concreti o affermazioni verificabili che
          potrebbero essere utili per un articolo editoriale sul TARGET TOPIC indicato.

          REGOLE:
          1. Estrai SOLO fatti realmente presenti nel testo. Non inventare, non
             dedurre, non completare informazioni mancanti.
          2. Per ogni nugget, riporta in "quote_originale" la frase o porzione di
             testo ESATTA (verbatim, non parafrasata) da cui hai estratto il fatto.
             Questo campo verra' verificato programmaticamente contro il testo
             sorgente: se non corrisponde, il nugget verra' scartato.
          3. Classifica ogni nugget in una "category" tra: prezzo, orario, evento,
             storia, geografia, recensione, dato_statistico, contatto, altro.
          4. Se il testo non contiene alcun fatto utile o rilevante, restituisci un
             array vuoto [].
          5. Non includere opinioni editoriali, pubblicita', o contenuto promozionale
             generico privo di dati concreti.

          Restituisci ESCLUSIVAMENTE un array JSON con oggetti nel formato:
          [
            {{"fact": "...", "category": "...", "quote_originale": "..."}}
          ]
          Usa il formato markdown ```json ... ```. Non aggiungere altro testo di commento.

          TARGET TOPIC:
          {topic}

          URL SORGENTE:
          {source_url}

          TESTO SORGENTE:
          {testo}
          """


          def _stima_token(testo):
              """Stima approssimata dei token (~4 caratteri/token per testo misto
              italiano/inglese). Deliberatamente prudente: meglio sovrastimare che
              sforare il limite reale."""
              if not testo:
                  return 0
              return max(1, len(testo) // 4)


          class TokenBucket:
              """Token bucket a ricarica continua per il rate limiting TPM di una
              singola API key. Non e' un pacing a intervallo fisso: permette raffiche
              quando il budget e' pieno e rallenta automaticamente quando si avvicina
              al limite, aspettando solo il tempo necessario a liberare budget."""

              def __init__(self, capacity_tokens, refill_period_seconds=60.0):
                  self.capacity = capacity_tokens
                  self.tokens = capacity_tokens
                  self.refill_period = refill_period_seconds
                  self.refill_rate = capacity_tokens / refill_period_seconds  # token/secondo
                  self.last_refill = time.monotonic()
                  self._lock = asyncio.Lock()

              def _refill(self):
                  now = time.monotonic()
                  elapsed = now - self.last_refill
                  if elapsed > 0:
                      self.tokens = min(self.capacity, self.tokens + elapsed * self.refill_rate)
                      self.last_refill = now

              async def acquire(self, needed_tokens, label=""):
                  """Attende finche' non c'e' budget sufficiente, poi lo consuma."""
                  needed_tokens = min(needed_tokens, self.capacity)  # non bloccare mai indefinitamente
                  async with self._lock:
                      while True:
                          self._refill()
                          if self.tokens >= needed_tokens:
                              self.tokens -= needed_tokens
                              return
                          deficit = needed_tokens - self.tokens
                          wait_seconds = deficit / self.refill_rate
                          wait_seconds = min(wait_seconds, 20.0)  # non aspettare mai troppo in un colpo solo
                          print(f"{label}[TPM-BUCKET] Budget insufficiente "
                                f"({self.tokens:.0f}/{needed_tokens} token), attendo {wait_seconds:.1f}s...",
                                flush=True)
                          await asyncio.sleep(wait_seconds)


          class GeminiKeyPool:
              """Gestisce una o piu' API key Gemini con round-robin, token bucket
              indipendente per chiave, e cooldown automatico sulle chiavi che
              sforano il limite. Funziona in modo trasparente anche con una sola
              chiave configurata."""

              def __init__(self, api_keys):
                  api_keys = [k for k in api_keys if k]
                  if not api_keys:
                      raise ValueError("Nessuna API key Gemini fornita")

                  self.entries = []
                  for key in api_keys:
                      self.entries.append({
                          "key": key,
                          "client": genai.Client(api_key=key),
                          "bucket": TokenBucket(TPM_BUDGET),
                          "cooldown_until": 0.0,
                      })
                  self._idx = 0
                  self._lock = asyncio.Lock()

              async def _pick_entry(self, label=""):
                  """Sceglie la prossima chiave disponibile (non in cooldown) in
                  round-robin. Se tutte sono in cooldown, aspetta quella che si
                  libera per prima."""
                  async with self._lock:
                      n = len(self.entries)
                      while True:
                          now = time.monotonic()
                          candidati = [(i, e) for i, e in enumerate(self.entries) if e["cooldown_until"] <= now]
                          if candidati:
                              for _ in range(n):
                                  self._idx = (self._idx + 1) % n
                                  entry = self.entries[self._idx]
                                  if entry["cooldown_until"] <= now:
                                      return entry
                          prossima_liberazione = min(e["cooldown_until"] for e in self.entries)
                          attesa = max(0.5, prossima_liberazione - now)
                          print(f"{label}[KEY-POOL] Tutte le chiavi in cooldown, attendo {attesa:.1f}s...",
                                flush=True)
                          await asyncio.sleep(min(attesa, 15.0))

              def _mark_cooldown(self, entry, label=""):
                  entry["cooldown_until"] = time.monotonic() + COOLDOWN_SECONDS
                  print(f"{label}[KEY-POOL] Chiave in cooldown per {COOLDOWN_SECONDS:.0f}s "
                        f"(quota TPM superata)", flush=True)

              async def esegui_con_pool(self, payload, timeout_seconds, label=""):
                  """Sceglie una chiave disponibile, attende budget TPM sufficiente
                  sul suo bucket, esegue la chiamata Live. Un SOLO tentativo su UNA
                  chiave: la logica di retry su piu' chiavi vive nel chiamante
                  (estrai_nuggets), non qui."""

                  entry = await self._pick_entry(label)
                  stima = _stima_token(payload)
                  await entry["bucket"].acquire(stima, label=label)

                  accumulated_text = ""
                  try:
                      async def run_session():
                          nonlocal accumulated_text
                          async with entry["client"].aio.live.connect(model=MODEL_NAME, config=CONFIG_LIVE) as session:
                              await session.send_realtime_input(text=payload)
                              async for response in session.receive():
                                  if response.server_content and response.server_content.output_transcription:
                                      if response.server_content.output_transcription.text:
                                          accumulated_text += response.server_content.output_transcription.text
                                  if response.server_content and response.server_content.turn_complete:
                                      break

                      await asyncio.wait_for(run_session(), timeout=timeout_seconds)
                      return accumulated_text.strip(), None

                  except (asyncio.TimeoutError, TimeoutError):
                      return None, "timeout"
                  except Exception as e:
                      err_str = str(e).lower()
                      if any(marker in err_str for marker in QUOTA_ERROR_MARKERS):
                          self._mark_cooldown(entry, label=label)
                          return None, "quota"
                      return None, f"errore: {e}"
          def _estrai_json_da_risposta(raw_text):
              if not raw_text:
                  return None
              match = re.search(r'```json\s*(.*?)\s*```', raw_text, re.DOTALL)
              json_str = match.group(1) if match else raw_text
              try:
                  parsed = json.loads(json_str)
                  if isinstance(parsed, list):
                      return parsed
              except Exception:
                  pass
              return None


          def _calcola_confidence(quote_originale, testo_sorgente):
              """Confidence derivata STRUTTURALMENTE, mai auto-riportata dal modello."""
              if not quote_originale or not testo_sorgente:
                  return "low"

              quote_norm = re.sub(r'\s+', ' ', quote_originale).strip().lower()
              testo_norm = re.sub(r'\s+', ' ', testo_sorgente).strip().lower()

              if not quote_norm:
                  return "low"

              if quote_norm in testo_norm:
                  return "high"

              finestra = len(quote_norm)
              if finestra < 8 or len(testo_norm) < finestra:
                  best_ratio = difflib.SequenceMatcher(None, quote_norm, testo_norm).ratio()
              else:
                  best_ratio = 0.0
                  step = max(1, finestra // 2)
                  for i in range(0, len(testo_norm) - finestra + 1, step):
                      frammento = testo_norm[i:i + finestra]
                      ratio = difflib.SequenceMatcher(None, quote_norm, frammento).ratio()
                      if ratio > best_ratio:
                          best_ratio = ratio
                      if best_ratio > 0.95:
                          break

              if best_ratio >= 0.85:
                  return "high"
              elif best_ratio >= 0.60:
                  return "medium"
              else:
                  return "low"


          def scrivi_nuggets_jsonl(nuggets, jsonl_path):
              """Scrittura incrementale: ogni nugget e' una riga JSON append-only.
              Se il file non esiste viene creato. Nessuna riscrittura del file intero:
              ogni chiamata aggiunge solo le righe nuove."""
              if not nuggets:
                  return
              with open(jsonl_path, "a", encoding="utf-8") as f:
                  for n in nuggets:
                      f.write(json.dumps(n, ensure_ascii=False) + "\n")


          async def estrai_nuggets(key_pool, source_url, testo_markdown, topic,
                                    node_id=None, timeout_seconds=NUGGET_TIMEOUT_SECONDS,
                                    max_key_attempts=None):
              """
              Estrae nugget strutturati da un singolo testo gia' scrapato, tramite
              Gemini Live, usando il pool di chiavi con token bucket TPM.

              Se una chiave sforra la quota, riprova automaticamente su un'altra
              chiave del pool (fino a max_key_attempts, default = numero di chiavi
              nel pool). Non solleva mai eccezioni verso il chiamante.

              Ritorna: lista di dict nugget con schema
                {fact, source_url, category, confidence, quote_originale}
              oppure None in caso di fallimento totale (tutte le chiavi esaurite/timeout).
              """
              if not testo_markdown or len(testo_markdown.strip()) < 50:
                  return []

              label = f"[NODO {node_id}] " if node_id is not None else ""
              payload = NUGGET_PROMPT_TEMPLATE.format(
                  topic=topic,
                  source_url=source_url,
                  testo=testo_markdown
              )

              if max_key_attempts is None:
                  max_key_attempts = len(key_pool.entries)

              ultimo_motivo = None
              for tentativo in range(max_key_attempts):
                  accumulated_text, errore = await key_pool.esegui_con_pool(payload, timeout_seconds, label=label)

                  if errore is None:
                      parsed = _estrai_json_da_risposta(accumulated_text)
                      if parsed is None:
                          print(f"{label}[NUGGET] Parsing JSON fallito su {source_url}. "
                                f"Output grezzo: {accumulated_text[:80]}...", flush=True)
                          return None

                      nuggets = []
                      for item in parsed:
                          if not isinstance(item, dict):
                              continue
                          fact = str(item.get("fact", "")).strip()
                          quote = str(item.get("quote_originale", "")).strip()
                          category = str(item.get("category", "altro")).strip() or "altro"
                          if not fact:
                              continue

                          confidence = _calcola_confidence(quote, testo_markdown)
                          nuggets.append({
                              "fact": fact,
                              "source_url": source_url,
                              "category": category,
                              "confidence": confidence,
                              "quote_originale": quote
                          })

                      print(f"{label}[NUGGET] {len(nuggets)} nugget estratti da {source_url}", flush=True)
                      return nuggets

                  elif errore == "quota":
                      ultimo_motivo = "quota"
                      print(f"{label}[NUGGET] Quota superata su {source_url}, "
                            f"provo con un'altra chiave ({tentativo + 1}/{max_key_attempts})...", flush=True)
                      continue

                  elif errore == "timeout":
                      print(f"{label}[NUGGET] TIMEOUT {timeout_seconds}s su {source_url}.", flush=True)
                      return None

                  else:
                      print(f"{label}[NUGGET] {errore} su {source_url}", flush=True)
                      return None

              print(f"{label}[NUGGET] Tutte le chiavi disponibili esaurite per {source_url} "
                    f"(ultimo motivo: {ultimo_motivo})", flush=True)
              return None
          EOF

      - name: Creazione Processo Estrattore Nugget INDIPENDENTE
        run: |
          cat << 'EOF' > nugget_estrattore_standalone.py
          import asyncio
          import json
          import os
          import time
          import sys

          from nugget_extractor import GeminiKeyPool, estrai_nuggets, scrivi_nuggets_jsonl

          """
          Processo COMPLETAMENTE INDIPENDENTE dallo scraper. Gira in background,
          lanciato in parallelo con Step 1 e (poi) Step 2, sulla stessa macchina ma
          come processo a se stante: potrebbe girare identico su una macchina
          diversa, l'unico contatto con lo scraper e' il file scraped_content.jsonl,
          che legge in sola lettura via polling.

          Nessun import di curl_cffi, cloakbrowser, playwright: questo processo non
          sa nulla di WARP, proxy, browser headful o validazione HTML. Riceve solo
          testo gia' pronto e lo passa a Gemini. Se Gemini e' lento, va in timeout,
          sclera per qualsiasi motivo: non ha alcun modo di rallentare o rompere lo
          scraping, perche' vive in un processo separato con il proprio event loop.

          Il file di stato SCRAPED_CONTENT_POSITION_PATH tiene traccia di quante
          righe sono gia' state lette, cosi' un riavvio di questo processo (se mai
          servisse) non rielabora da capo tutto quanto gia' processato.
          """

          SCRAPED_CONTENT_PATH = "scraped_content.jsonl"
          NUGGETS_OUTPUT_PATH = "nuggets_estrattore.jsonl"

          # File-sentinella scritto dal workflow SOLO dopo che Step 1 E Step 2 sono
          # entrambi completamente terminati (tutti i nodi chiusi, container fermati).
          # Finche' questo file non esiste, l'estrattore non si ferma MAI per
          # timeout: aspetta indefinitamente, perche' un silenzio prolungato puo'
          # semplicemente essere la pausa fisiologica tra Step 1 e Step 2 (refresh
          # WARP, setup code, avvio browser), non la fine dello scraping.
          SCRAPING_DONE_FLAG_PATH = "scraping_completato.flag"

          # Ogni quanti secondi si ricontrolla se ci sono nuove righe nel file
          # condiviso. Un valore piccolo (1-2s) tiene la latenza di estrazione bassa
          # senza consumare CPU in modo apprezzabile con un semplice polling.
          POLL_INTERVAL_SECONDS = 2.0

          # Piccola finestra di sicurezza DOPO aver visto il flag di fine scraping:
          # serve solo a dare un ultimo paio di giri di polling per righe scritte
          # negli istanti immediatamente precedenti alla comparsa del flag stesso
          # (nessuna dipendenza da indovinare quanto sia "abbastanza lungo": e' un
          # margine di sicurezza minimo, non un timeout che decide la chiusura).
          FINAL_GRACE_SECONDS = 3.0

          NUGGET_CONCURRENCY = 5
          TARGET_TOPIC = os.environ.get("TARGET_TOPIC", "")

          _jsonl_lock = asyncio.Lock()


          def carica_gemini_api_keys():
              keys = []
              primary = os.environ.get("GEMINI_API_KEY")
              if primary:
                  keys.append(primary)
              i = 2
              while True:
                  k = os.environ.get(f"GEMINI_API_KEY_{i}")
                  if not k:
                      break
                  keys.append(k)
                  i += 1
              return keys


          async def salva_nuggets(nuggets):
              if not nuggets:
                  return
              async with _jsonl_lock:
                  scrivi_nuggets_jsonl(nuggets, NUGGETS_OUTPUT_PATH)


          async def main():
              api_keys = carica_gemini_api_keys()
              if not api_keys:
                  print("[ESTRATTORE] Nessuna GEMINI_API_KEY trovata. Processo terminato "
                        "immediatamente (nessun impatto sullo scraper).", flush=True)
                  return

              # Qui l'init del pool puo' tranquillamente essere un await diretto:
              # se si blocca o fallisce, blocca SOLO questo processo indipendente,
              # mai lo scraper, che gira altrove e non aspetta nessuno.
              try:
                  key_pool = GeminiKeyPool(api_keys)
                  print(f"[ESTRATTORE] Pool Gemini inizializzato con {len(key_pool.entries)} chiave/i.", flush=True)
              except Exception as e:
                  print(f"[ESTRATTORE] Impossibile inizializzare il pool Gemini: {e}. "
                        f"Processo terminato (nessun impatto sullo scraper).", flush=True)
                  return

              nugget_semaphore = asyncio.Semaphore(NUGGET_CONCURRENCY)
              tasks_in_volo = []
              righe_lette = 0
              ultima_riga_vista = time.monotonic()

              print(f"[ESTRATTORE] Avvio polling su {SCRAPED_CONTENT_PATH} "
                    f"(ogni {POLL_INTERVAL_SECONDS:.0f}s, topic='{TARGET_TOPIC}')...", flush=True)

              async def processa_riga(source_url, testo_markdown):
                  async with nugget_semaphore:
                      esito = await estrai_nuggets(
                          key_pool=key_pool,
                          source_url=source_url,
                          testo_markdown=testo_markdown,
                          topic=TARGET_TOPIC,
                          node_id=None
                      )
                  if esito:
                      await salva_nuggets(esito)

              while True:
                  if os.path.exists(SCRAPED_CONTENT_PATH):
                      with open(SCRAPED_CONTENT_PATH, "r", encoding="utf-8") as f:
                          tutte_le_righe = f.readlines()

                      righe_nuove = tutte_le_righe[righe_lette:]
                      if righe_nuove:
                          ultima_riga_vista = time.monotonic()

                      for riga in righe_nuove:
                          riga = riga.strip()
                          if not riga:
                              continue
                          try:
                              record = json.loads(riga)
                          except json.JSONDecodeError:
                              # Riga scritta a meta' da un nodo (raro, ma possibile se
                              # capita esattamente nell'istante del polling): la si
                              # rilegge al giro successivo, quindi qui la si salta e
                              # NON si avanza righe_lette per questa specifica riga.
                              continue

                          source_url = record.get("source_url")
                          testo_markdown = record.get("testo_markdown")
                          if source_url and testo_markdown:
                              print(f"[ESTRATTORE] Nuovo contenuto ricevuto: {source_url}", flush=True)
                              tasks_in_volo.append(asyncio.create_task(processa_riga(source_url, testo_markdown)))

                      righe_lette = len(tutte_le_righe)

                  # Pulizia dei task gia' completati per non far crescere la lista
                  # all'infinito durante run lunghe.
                  tasks_in_volo = [t for t in tasks_in_volo if not t.done()]

                  # --- Condizione di chiusura corretta ---
                  # PRIMA questo processo si chiudeva solo in base a un timeout di
                  # inattivita' (IDLE_SHUTDOWN_SECONDS), indovinando che "lo scraper ha
                  # finito" dal semplice fatto di non vedere righe nuove per un po'.
                  # Il problema: tra Step 1 e Step 2 c'e' SEMPRE una pausa fisiologica
                  # (refresh dei container WARP, setup delle code, avvio di
                  # CloakBrowser) che puo' tranquillamente superare quella soglia,
                  # anche se lo scraping non e' affatto finito - anzi, Step 2 sta per
                  # produrre proprio i risultati piu' interessanti (i target recuperati
                  # dal fallback). Il risultato osservato: l'estrattore si chiudeva
                  # durante quella pausa, PRIMA che Step 2 avesse scritto anche una
                  # sola riga, perdendo cosi' tutti i contenuti recuperati in Step 2.
                  #
                  # La chiusura ora richiede un segnale ESPLICITO: il file
                  # SCRAPING_DONE_FLAG_PATH, scritto dal workflow SOLO dopo che sia
                  # Step 1 che Step 2 sono completamente terminati (nodi chiusi,
                  # container fermati). Senza quel file, questo processo non si
                  # ferma MAI per timeout, non importa quanto a lungo resti in
                  # silenzio: aspetta comunque, perche' sa che lo scraping potrebbe
                  # semplicemente essere in una pausa tra le sue fasi.
                  scraping_e_finito = os.path.exists(SCRAPING_DONE_FLAG_PATH)

                  if scraping_e_finito and not tasks_in_volo:
                      # Diamo comunque un'ultima occasione di leggere righe scritte
                      # negli ultimissimi istanti prima del flag, per sicurezza.
                      inattivo_da = time.monotonic() - ultima_riga_vista
                      if inattivo_da > FINAL_GRACE_SECONDS:
                          print(f"[ESTRATTORE] Segnale di fine scraping ricevuto e nessun "
                                f"task in volo: chiusura.", flush=True)
                          break

                  await asyncio.sleep(POLL_INTERVAL_SECONDS)

              if tasks_in_volo:
                  print(f"[ESTRATTORE] Attesa completamento {len(tasks_in_volo)} estrazioni residue...", flush=True)
                  await asyncio.gather(*tasks_in_volo, return_exceptions=True)

              print(f"[ESTRATTORE] Terminato. Nugget salvati in {NUGGETS_OUTPUT_PATH}", flush=True)


          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Creazione Script Python - STEP 1 (Veloce curl-cffi, disaccoppiato da Gemini)
        run: |
          cat << 'EOF' > m2_step1.py
          import time
          import sys
          import random
          import os
          import json
          import asyncio
          from curl_cffi import requests as curl_requests
          from extraction_utils import html_to_clean_markdown

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          if len(sys.argv) < 2:
              sys.exit(1)
          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          # File JSONL condiviso tra TUTTI i nodi di Step 1 e letto in parallelo
          # dall'estrattore di nugget (processo completamente separato). Ogni riga e'
          # un oggetto {"source_url": ..., "testo_markdown": ...}. E' l'UNICO punto di
          # contatto tra scraper ed estrattore: nessun'altra dipendenza, nessuna
          # chiamata di rete verso Gemini da qui, nessun import di client Gemini.
          SCRAPED_CONTENT_PATH = "scraped_content.jsonl"

          # Lock a livello di file (non di processo): piu' nodi scrivono in append
          # sullo stesso file. append su Linux e' atomico per scritture sotto ~4KB
          # in un colpo solo (PIPE_BUF), quindi per righe JSONL di dimensione tipica
          # non serve altro; usiamo comunque un flush esplicito per sicurezza.


          def carica_gemini_api_keys_placeholder():
              # Mantenuto per compatibilita' di firma, non usato: lo scraper non sa
              # nulla di Gemini. Rimane qui solo come promemoria che le chiavi vivono
              # esclusivamente nel processo estrattore.
              pass


          async def verify_proxy_active(port, max_retries=5, delay=5):
              test_session = curl_requests.AsyncSession(impersonate="chrome120")
              test_session.proxies = {"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}
              for _ in range(max_retries):
                  try:
                      resp = await test_session.get("https://api6.ipify.org?format=json", timeout=6)
                      if resp.status_code == 200:
                          await test_session.close()
                          return True
                  except Exception:
                      pass
                  await asyncio.sleep(delay)
              await test_session.close()
              return False


          def validate_html(html, url, status_code):
              if status_code >= 400:
                  return False, f"Blocco HTTP {status_code}"
              if not html or len(html.strip()) < 300:
                  return False, "HTML vuoto"
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return True, ""

              low_html = html.lower()
              blocking_indicators = [
                  "challenge-platform", "access denied", "403 forbidden", "cloudflare",
                  "just a moment", "security verification", "please enable js", "enable javascript",
                  "are you a robot", "please wait for verification", "we've detected unusual activity",
                  "if you are not redirected", "unusual traffic from your computer network",
                  "checking your browser", "prove your humanity", "captcha verification",
                  "please enter in the characters you see below", "access to this page is forbidden",
                  "error 1020", "you have been blocked", "pardon our interruption",
                  "se non vieni reindirizzato", "se hai problemi ad accedere",
                  "robot challenge screen", "ci siamo quasi", "verifica di sicurezza",
                  "checking the site connection", "verifying you are human", "ray id"
              ]

              for ind in blocking_indicators:
                  if ind in low_html:
                      return False, f"WAF/Captcha rilevato: {ind}"
              return True, ""


          def pubblica_contenuto_scrapato(source_url, testo_markdown, node_id, step_label):
              """
              Scrive una riga JSONL sul file condiviso, letto in parallelo dal
              processo estrattore. Questa e' l'UNICA interazione tra scraper ed
              estrattore: un append su un file di testo. Nessuna chiamata di rete
              verso Gemini avviene qui, nessuna attesa, nessun blocco: se il file
              non si riesce a scrivere per qualsiasi motivo, l'eccezione viene
              ignorata (lo scraping non deve MAI fermarsi per un problema
              dell'estrazione nugget a valle).
              """
              try:
                  riga = json.dumps({
                      "source_url": source_url,
                      "testo_markdown": testo_markdown,
                      "node_id": node_id,
                      "step": step_label
                  }, ensure_ascii=False)
                  with open(SCRAPED_CONTENT_PATH, "a", encoding="utf-8") as f:
                      f.write(riga + "\n")
                      f.flush()
              except Exception as e:
                  print(f"[NODO {node_id}] Attenzione: impossibile pubblicare contenuto per "
                        f"l'estrattore nugget ({e}). Lo scraping prosegue comunque.", flush=True)


          async def main():
              if not await verify_proxy_active(ACTIVE_PORT):
                  sys.exit(0)

              queue_file = f"/tmp/step1_queue_{node_id}.json"
              if not os.path.exists(queue_file):
                  sys.exit(0)

              with open(queue_file, "r") as f:
                  targets = json.load(f)

              results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 1 (curl-cffi)\n{'#'*60}\n"
              failed_targets = []

              session = curl_requests.AsyncSession(impersonate="chrome120")
              session.proxies = {"http": f"socks5h://127.0.0.1:{ACTIVE_PORT}", "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"}
              session.headers.update({
                  "Accept-Language": "it-IT,it;q=0.9,en-US;q=0.8,en;q=0.7",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8"
              })

              # Se FORZA_DIAGNOSTICI_STEP2=1, i siti diagnostici (browserleaks, sannysoft,
              # creepjs, pixelscan, incolumitas, deviceinfo) vengono skippati a monte in
              # Step 1 e mandati dritti al fallback CloakBrowser, cosi' il fingerprint
              # e lo stealth vengono testati sul browser headful vero, non sul semplice
              # fetch HTTP di curl-cffi. Di default (variabile assente o diversa da "1")
              # il comportamento resta IDENTICO a sempre: i diagnostici passano per
              # Step 1 come qualsiasi altro target.
              forza_diagnostici_step2 = os.environ.get("FORZA_DIAGNOSTICI_STEP2", "0") == "1"

              for url in targets:
                  if forza_diagnostici_step2 and any(site in url for site in DIAGNOSTIC_SITES):
                      print(f"[NODO {node_id}] [STEP 1] {url} -> forzato su Step 2 "
                            f"(FORZA_DIAGNOSTICI_STEP2=1), skip del fetch HTTP diretto.", flush=True)
                      failed_targets.append(url)
                      continue

                  print(f"[NODO {node_id}] [STEP 1] Richiesta: {url}", flush=True)
                  try:
                      resp = await session.get(url, timeout=12)
                      is_ok, err_msg = validate_html(resp.text, url, resp.status_code)

                      if is_ok:
                          if any(site in url for site in DIAGNOSTIC_SITES):
                              from bs4 import BeautifulSoup
                              soup = BeautifulSoup(resp.text, 'html.parser')
                              text = soup.get_text(separator=' ', strip=True)
                          else:
                              text = html_to_clean_markdown(resp.text, url)
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO:\n{text}\n"
                          print(f"[NODO {node_id}] -> Successo Rapido!", flush=True)

                          if not any(site in url for site in DIAGNOSTIC_SITES):
                              pubblica_contenuto_scrapato(url, text, node_id, "step1")
                      else:
                          print(f"[NODO {node_id}] -> Bloccato, passo allo Step 2: {err_msg}", flush=True)
                          failed_targets.append(url)
                  except Exception:
                      print(f"[NODO {node_id}] -> Errore rete. Passo allo Step 2.", flush=True)
                      failed_targets.append(url)

                  await asyncio.sleep(random.uniform(1.0, 2.0))

              await session.close()

              with open(f"output_node_{node_id}_step1.txt", "w", encoding="utf-8") as f:
                  f.write(results)
              with open(f"failed_node_{node_id}.json", "w", encoding="utf-8") as f:
                  json.dump(failed_targets, f)

              print(f"[NODO {node_id}] STEP 1 completato.", flush=True)


          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Avvio Processo Estrattore Nugget INDIPENDENTE (background)
        run: |
          # Processo completamente separato dallo scraper: nessun import di
          # curl-cffi/cloakbrowser/playwright al suo interno, nessuna
          # dipendenza dai container WARP. Legge in polling il file
          # scraped_content.jsonl che Step 1 e Step 2 riempiono via via, e
