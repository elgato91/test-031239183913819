              except Exception as e:
                  print(f"[NODO {node_id}] Attenzione: impossibile pubblicare contenuto per "
                        f"l'estrattore nugget ({e}). Lo scraping prosegue comunque.", flush=True)


          async def verify_proxy_active(port, max_retries=6, delay=5):
              """Health-check del proxy prima di avviare il browser: nella pipeline
              stabile mancava in Step 2, ma il timing tutto sincrono lo rendeva
              innocuo. Va mantenuto qui a prescindere da qualsiasi discorso su
              Gemini, perche' risolve un problema di timing tra Docker/WARP e
              CloakBrowser che non ha nulla a che fare con la nugget extraction."""
              test_session = curl_requests.AsyncSession(impersonate="chrome120")
              test_session.proxies = {"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}
              for tentativo in range(max_retries):
                  try:
                      resp = await test_session.get("https://api6.ipify.org?format=json", timeout=6)
                      if resp.status_code == 200:
                          await test_session.close()
                          return True
                  except Exception:
                      pass
                  print(f"[NODO {node_id}] Proxy non ancora pronto sulla porta {port}, "
                        f"tentativo {tentativo + 1}/{max_retries}...", flush=True)
                  await asyncio.sleep(delay)
              await test_session.close()
              return False


          def validate_html(html, url, status_code):
              """Validazione sull'HTML grezzo, PRIMA di qualunque conversione a
              markdown: la conversione resta un post-processing per l'output finale
              e non deve mai influenzare la decisione di successo/fallimento."""
              if status_code is not None and status_code >= 400:
                  return False, f"Blocco HTTP {status_code}"
              if not html or len(html.strip()) < 300:
                  return False, "HTML vuoto"

              soup = BeautifulSoup(html, "html.parser")
              text_grezzo = soup.get_text(separator=' ', strip=True)

              if len(text_grezzo) <= 150:
                  return False, "Contenuto insufficiente"

              low_text = text_grezzo.lower()
              for ind in BLOCKING_INDICATORS:
                  if ind in low_text:
                      return False, f"WAF/Captcha rilevato: {ind}"

              return True, ""


          async def main():
              queue_file = f"/tmp/step2_queue_{node_id}.json"
              if not os.path.exists(queue_file):
                  return

              with open(queue_file, "r") as f:
                  targets = json.load(f)

              if not targets:
                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                      f.write("")
                  return

              if not await verify_proxy_active(INITIAL_PORT):
                  print(f"[NODO {node_id}] Proxy MAI diventato attivo sulla porta {INITIAL_PORT}. "
                        f"Nodo abortito, i target restano falliti.", flush=True)
                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                      f.write(f"\n{'#'*60}\nNODO {node_id} - STEP 2: proxy non disponibile, "
                               f"nodo abortito prima di iniziare\n{'#'*60}\n")
                  return

              home_dir = os.path.expanduser("~")
              profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2")
              windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")

              # --- Seed di fingerprint deterministico, non piu' random ad ogni run ---
              # La doc di CloakBrowser e' esplicita: un seed random ad ogni lancio fa
              # sembrare ogni sessione un dispositivo fisico diverso. Colpendo piu'
              # volte gli stessi domini (bing, google, yahoo...) da un pool di soli 6
              # IP WARP in rotazione, un seed sempre nuovo per lo stesso IP e' proprio
              # il pattern che i sistemi di scoring comportamentale (reCAPTCHA v3
              # Enterprise e simili) segnalano come sospetto. Dato che il profilo
              # (profile_dir) e' gia' persistente per node_id, il seed deriva in modo
              # deterministico dallo stesso node_id: ogni nodo mantiene la STESSA
              # identita' fingerprint da un'esecuzione del workflow all'altra, invece
              # di cambiarla ogni volta. Restano comunque 6 identita' diverse fra
              # loro (una per nodo), non un'unica identita' condivisa.
              fingerprint_seed = 100000 + (node_id * 137)  # deterministico, range valido 100000-999999

              base_args = [
                  "--no-sandbox",
                  "--disable-dev-shm-usage",
                  f"--fingerprint={fingerprint_seed}",
                  "--fingerprint-platform=windows",
                  f"--fingerprint-fonts-dir={windows_fonts_dir}"
              ]

              results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 2 (Fallback)\n{'#'*60}\n"

              context = None
              print(f"[NODO {node_id}] Avvio singola sessione Persistente (Warmup + Scraping)...", flush=True)
              try:
                  try:
                      context = await launch_persistent_context_async(
                          profile_dir,
                          headless=False,
                          humanize=True,
                          human_config={"mistype_chance": 0.05, "typing_delay": 100, "idle_between_actions": True},
                          proxy=f"socks5://127.0.0.1:{INITIAL_PORT}",
                          geoip=True,
                          viewport={"width": 1920, "height": 1080},
                          args=base_args
                      )
                      page = await context.new_page()

                      await page.goto("https://www.google.com", wait_until="domcontentloaded", timeout=25000)
                      await asyncio.sleep(2)
                      await page.goto("https://www.reddit.com", wait_until="domcontentloaded", timeout=25000)
                      await asyncio.sleep(2)

                  except Exception as e:
                      print(f"[NODO {node_id}] Errore critico avvio Browser: {e}", flush=True)
                      with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                          f.write(f"\n{'#'*60}\nNODO {node_id} - STEP 2: errore critico avvio browser: {e}\n{'#'*60}\n")
                      return

                  for url in targets:
                      print(f"[NODO {node_id}] Recupero Avanzato: {url}", flush=True)
                      try:
                          query_to_search = get_query_from_url(url)

                          if "bing.com" in url:
                              await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.5, 4.0))
                              try:
                                  search_box = page.locator("textarea[name='q'], input[name='q']").first
                                  await search_box.type(query_to_search, delay=50)
                                  await page.keyboard.press("Enter")
                              except Exception:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                          elif "startpage.com" in url:
                              await page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.0, 3.5))
                              try:
                                  search_box = page.locator("input#q").first
                                  await search_box.type(query_to_search, delay=50)
                                  await page.keyboard.press("Enter")
                              except Exception:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                          elif "html.duckduckgo.com" in url:
                              await page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.0, 3.5))
                              try:
                                  search_box = page.locator("input[name=q]").first
                                  await search_box.type(query_to_search, delay=50)
                                  await page.keyboard.press("Enter")
                              except Exception:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                          else:
                              await page.goto(url, wait_until="domcontentloaded", timeout=40000)

                          # --- Rimosso wait_for_load_state("networkidle") ---
                          # La doc di CloakBrowser segnala che page.wait_for_timeout()
                          # invia comandi CDP che reCAPTCHA rileva, e raccomanda di
                          # minimizzare ogni chiamata Playwright che passa per CDP a
                          # interrogare lo stato della pagina prima che un check
                          # anti-bot scatti. wait_for_load_state("networkidle") non è
                          # un semplice sleep lato client: e' comunque una query
                          # attiva sullo stato di rete via CDP. La sostituiamo con
                          # un'attesa nativa piu' lunga, invisibile al browser.
                          await asyncio.sleep(8)

                          await asyncio.sleep(6)

                          await page.keyboard.press("PageDown")
                          await asyncio.sleep(1)
                          await page.keyboard.press("PageDown")
                          await asyncio.sleep(2)

                          raw_html = await page.content()
                          current_url = page.url

                          is_ok, err_msg = validate_html(raw_html, current_url, None)

                          if is_ok:
                              text_for_output = html_to_clean_markdown(raw_html, current_url)
                              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO ESTRATTO:\n{text_for_output}\n"
                              print(f"[NODO {node_id}] -> Recuperato con Successo!", flush=True)

                              pubblica_contenuto_scrapato(url, text_for_output, node_id, "step2")
                          else:
                              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nFALLITO ({err_msg})\n"
                              print(f"[NODO {node_id}] -> Fallito: {err_msg}", flush=True)

                      except Exception as e:
                          print(f"[NODO {node_id}] -> Errore esecuzione: {e}", flush=True)
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nERRORE: {e}\n"

                      await asyncio.sleep(random.uniform(4.0, 7.0))

                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                      f.write(results)

                  print(f"[NODO {node_id}] STEP 2 completato.", flush=True)

              finally:
                  if context is not None:
                      try:
                          await context.close()
                      except Exception:
                          pass


          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Scraping Parallelo - STEP 2 (Fallback CloakBrowser)
        if: always()
        run: |
          echo 'Avvio processi paralleli per STEP 2 sui target falliti...'
          touch node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log
          tail -q -f node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log &
          TAIL_PID=$!

          PIDS=()
          for i in {1..6}; do
            python -u m2_step2.py $i > node${i}_step2.log 2>&1 &
            PIDS+=($!)
            sleep 1.5
          done

          wait "${PIDS[@]}"
          kill $TAIL_PID || true

          for i in {1..6}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

          touch output_node_1_step1.txt output_node_1_step2.txt \
                output_node_2_step1.txt output_node_2_step2.txt \
                output_node_3_step1.txt output_node_3_step2.txt \
                output_node_4_step1.txt output_node_4_step2.txt \
                output_node_5_step1.txt output_node_5_step2.txt \
                output_node_6_step1.txt output_node_6_step2.txt

          cat output_node_1_step1.txt output_node_1_step2.txt \
              output_node_2_step1.txt output_node_2_step2.txt \
              output_node_3_step1.txt output_node_3_step2.txt \
              output_node_4_step1.txt output_node_4_step2.txt \
              output_node_5_step1.txt output_node_5_step2.txt \
              output_node_6_step1.txt output_node_6_step2.txt > output_macchina2_cdp.txt

      - name: Attesa Coda Residua Estrattore Nugget (segnale esplicito di fine scraping)
        if: always()
        run: |
          # A questo punto lo SCRAPING E' GIA' COMPLETAMENTE FINITO (lo step
          # sopra ha gia' fatto "wait" sui suoi processi e chiuso i container
          # WARP). Prima di aspettare l'estrattore, gli mandiamo il segnale
          # ESPLICITO che lo scraping e' concluso: senza questo file,
          # l'estrattore non si ferma mai per un semplice timeout di
          # inattivita', perche' un silenzio prolungato durante Step 1/Step 2
          # puo' essere solo la pausa fisiologica tra le due fasi (refresh
          # WARP, setup code, avvio browser) e non significa affatto che lo
          # scraping sia finito.
          touch scraping_completato.flag
          echo "Segnale di fine scraping inviato all'estrattore."

          if [ -f estrattore_nugget.pid ]; then
            PID=$(cat estrattore_nugget.pid)
            echo "Attendo la chiusura naturale del processo estrattore (PID $PID), max 90s..."
            for i in {1..90}; do
              if ! kill -0 "$PID" 2>/dev/null; then
                echo "Processo estrattore terminato naturalmente dopo ${i}s."
                break
              fi
              sleep 1
            done
            if kill -0 "$PID" 2>/dev/null; then
              echo "Timeout di sicurezza raggiunto (90s dopo il segnale): chiudo forzatamente il processo estrattore residuo."
              kill "$PID" 2>/dev/null || true
            fi
          fi
          touch nuggets_estrattore.jsonl
          echo "--- log estrattore nugget ---"
          cat estrattore_nugget.log || true

      - name: Merge Nugget Finale (JSONL -> JSON strutturato deduplicato)
        if: always()
        run: |
          cat << 'EOF' > merge_nuggets.py
          import json
          import os
          import glob

          # Con l'architettura disaccoppiata c'e' un SOLO file di output nugget,
          # scritto dal processo estrattore indipendente (nuggets_estrattore.jsonl),
          # non piu' un file per nodo/step come nella versione precedente. Il glob
          # resta comunque utile per compatibilita' con eventuali run parziali o
          # rilanci dello stesso file.
          jsonl_files = sorted(glob.glob("nuggets_estrattore*.jsonl"))

          merged_nuggets = []
          per_file_stats = {}

          for filename in jsonl_files:
              count = 0
              corrotte = 0
              try:
                  with open(filename, "r", encoding="utf-8") as f:
                      for riga in f:
                          riga = riga.strip()
                          if not riga:
                              continue
                          try:
                              nugget = json.loads(riga)
                              merged_nuggets.append(nugget)
                              count += 1
                          except json.JSONDecodeError:
                              # Riga scritta a meta' (es. processo interrotto durante
                              # il flush): la scartiamo senza far fallire tutto il merge.
                              corrotte += 1
              except Exception as e:
                  print(f"Errore lettura {filename}: {e}", flush=True)

              per_file_stats[filename] = count
              if corrotte:
                  print(f"{filename}: {corrotte} riga/e corrotta/e scartata/e", flush=True)

          # Deduplica su (fact, source_url) normalizzati
          seen = set()
          nuggets_deduplicati = []
          for n in merged_nuggets:
              fact_norm = (n.get("fact") or "").strip().lower()
              url_norm = (n.get("source_url") or "").strip().lower()
              key = (fact_norm, url_norm)
              if key in seen:
                  continue
              seen.add(key)
              nuggets_deduplicati.append(n)

          confidence_counts = {"high": 0, "medium": 0, "low": 0}
          for n in nuggets_deduplicati:
              c = n.get("confidence", "low")
              if c in confidence_counts:
                  confidence_counts[c] += 1

          output_finale = {
              "stats": {
                  "file_jsonl_trovati": len(jsonl_files),
                  "totale_nugget_grezzi": len(merged_nuggets),
                  "totale_nugget_deduplicati": len(nuggets_deduplicati),
                  "per_file": per_file_stats,
                  "per_confidence": confidence_counts
              },
              "nuggets": nuggets_deduplicati
          }

          with open("nuggets_finale.json", "w", encoding="utf-8") as f:
              json.dump(output_finale, f, indent=2, ensure_ascii=False)

          print(f"Merge completato: {len(nuggets_deduplicati)} nugget unici "
                f"(da {len(merged_nuggets)} grezzi, {len(jsonl_files)} file letti) "
                f"salvati in nuggets_finale.json", flush=True)
          print(f"Distribuzione confidence: {confidence_counts}", flush=True)
          EOF
          python -u merge_nuggets.py

      - name: Upload Artifact Macchina 2 (Testo Grezzo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt

      - name: Upload Artifact Nugget (JSON Strutturato)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nuggets_Macchina2
          path: nuggets_finale.json
