name: Test WARP Ufficiale - IPv4 Forzato

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pull immagine
        run: docker pull caomingjun/warp:latest

      - name: Avvia 6 nodi scaglionati (client ufficiale)
        run: |
          for i in 1 2 3 4 5 6; do
            PORT=$((1080 + i))
            docker run -d \
              --name "warp_$i" \
              --cap-add NET_ADMIN \
              --cap-add MKNOD \
              --cap-add AUDIT_WRITE \
              --sysctl net.ipv6.conf.all.disable_ipv6=0 \
              --sysctl net.ipv4.conf.all.src_valid_mark=1 \
              -e WARP_SLEEP=2 \
              -p "$PORT":1080 \
              caomingjun/warp:latest

            DELAY=$(awk -v min=4 -v max=8 'BEGIN{srand('"$i"'+systime()); print min+rand()*(max-min)}')
            echo "Nodo $i avviato su porta $PORT, attendo ${DELAY}s..."
            sleep "$DELAY"
          done

          echo ""
          echo "=== Attesa registrazione (3s) ==="
          sleep 3

      - name: Misura IPv4 e IPv6 separatamente per nodo (protocollo forzato)
        run: |
          declare -A ipv4_di_nodo
          declare -A ipv6_di_nodo

          for i in 1 2 3 4 5 6; do
            PORT=$((1080 + i))

            # socks5 semplice (non socks5h): curl risolve l'hostname localmente
            # per famiglia (--ipv4 / --ipv6), passando un IP letterale al proxy,
            # cosi' forziamo davvero il protocollo lato tunnel WARP.
            IP4=$(curl -s --max-time 8 --ipv4 -x "socks5://127.0.0.1:$PORT" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep "^ip=" | cut -d= -f2)
            IP6=$(curl -s --max-time 8 --ipv6 -x "socks5://127.0.0.1:$PORT" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep "^ip=" | cut -d= -f2)

            ipv4_di_nodo[$i]="${IP4:-NESSUNO}"
            ipv6_di_nodo[$i]="${IP6:-NESSUNO}"

            echo "Nodo $i (porta $PORT):"
            echo "  IPv4 forzato -> ${IP4:-NESSUNO}"
            echo "  IPv6 forzato -> ${IP6:-NESSUNO}"
          done

          echo ""
          echo "=== Riepilogo IPv4 ==="
          for i in 1 2 3 4 5 6; do
            echo "Nodo $i -> ${ipv4_di_nodo[$i]}"
          done

          echo ""
          echo "=== Riepilogo IPv6 ==="
          for i in 1 2 3 4 5 6; do
            echo "Nodo $i -> ${ipv6_di_nodo[$i]}"
          done

          echo ""
          UNIVOCI_V4=$(printf '%s\n' "${ipv4_di_nodo[@]}" | sort -u | wc -l)
          UNIVOCI_V6=$(printf '%s\n' "${ipv6_di_nodo[@]}" | sort -u | wc -l)
          echo "=== IPv4 univoci: $UNIVOCI_V4 / 6 ==="
          echo "=== IPv6 univoci: $UNIVOCI_V6 / 6 ==="

      - name: Pulizia
        if: always()
        run: |
          for i in 1 2 3 4 5 6; do
            docker rm -f "warp_$i" || true
          done
