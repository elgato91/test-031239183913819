                              await asyncio.sleep(random.uniform(2.5, 4.0))
                              try:
                                  search_box = state["current_page"].locator("input#q").first
                                  await search_box.type(query_to_search, delay=80)
                                  await asyncio.sleep(random.uniform(0.4, 1.0))
                                  await state["current_page"].keyboard.press("Enter")
                                  await state["current_page"].wait_for_load_state("domcontentloaded", timeout=15000)
                              except Exception:
                                  await state["current_page"].goto(url, wait_until="domcontentloaded", timeout=35000)

                          elif "duckduckgo.com" in url:
                              await state["current_page"].goto("https://duckduckgo.com", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.5, 4.0))
                              try:
                                  search_box = state["current_page"].locator("input[name=q]").first
                                  await search_box.type(query_to_search, delay=80)
                                  await asyncio.sleep(random.uniform(0.4, 0.9))
                                  await state["current_page"].keyboard.press("Enter")
                                  await state["current_page"].wait_for_load_state("domcontentloaded", timeout=15000)
                              except Exception:
                                  await state["current_page"].goto(url, wait_until="domcontentloaded", timeout=35000)

                          else:
                              await state["current_page"].goto(url, wait_until="domcontentloaded", timeout=40000)

                          # Attesa asincrona passiva invisibile ai sistemi anti-bot
                          await asyncio.sleep(random.uniform(6.0, 8.0))

                          # Simulazione movimenti umani sulla pagina caricata
                          await state["current_page"].keyboard.press("PageDown")
                          await asyncio.sleep(random.uniform(1.5, 2.5))
                          await state["current_page"].keyboard.press("PageDown")
                          await asyncio.sleep(random.uniform(2.0, 3.0))

                          raw_html = await state["current_page"].content()
                          current_url = state["current_page"].url

                          is_ok, err_msg = validate_html(raw_html, current_url, None)

                          if is_ok:
                              text_for_output = html_to_clean_markdown(raw_html, current_url)
                              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO ESTRATTO:\n{text_for_output}\n"
                              print(f"[NODO {node_id}] -> Recuperato con Successo!", flush=True)
