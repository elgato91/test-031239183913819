      - name: Creazione Script Python - STEP 2 (Async CloakBrowser, identico alla baseline)
        run: |
          cat << 'EOF' > m2_step2.py
          import asyncio
          import time
          import sys
          import random
          import os
          import json
          from urllib.parse import urlparse, parse_qs
          from cloakbrowser import launch_persistent_context_async
          from bs4 import BeautifulSoup
          from extraction_utils import html_to_clean_markdown

          if len(sys.argv) < 2: sys.exit(1)
          node_id = int(sys.argv[1])
          INITIAL_PORT = 40000 + node_id

          # File dedicato per nodo: stesso principio dello Step 1.
          SCRAPED_CONTENT_PATH = f"scraped_content_node_{node_id}.jsonl"

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p', 'find_desc']:
                      if param in queries: return queries[param][0]
              except: pass
              return default

          def pubblica_contenuto_scrapato(source_url, testo_markdown, step_label):
              try:
                  riga = json.dumps({
                      "source_url": source_url,
                      "testo_markdown": testo_markdown,
                      "node_id": node_id,
                      "step": step_label
                  }, ensure_ascii=False)
                  with open(SCRAPED_CONTENT_PATH, "a", encoding="utf-8") as f:
                      f.write(riga + "\n")
                      f.flush()
              except Exception as e:
                  print(f"[NODO {node_id}] Errore pubblicazione per l'estrattore: {e}", flush=True)

          async def main():
              queue_file = f"/tmp/step2_queue_{node_id}.json"
              if not os.path.exists(queue_file): return

              with open(queue_file, "r") as f: targets = json.load(f)
              if not targets:
                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f: f.write("")
                  return

              home_dir = os.path.expanduser("~")
              profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2")
              windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")

              # Profilo con noise attivo di default e path per font corretti (identico alla baseline).
              base_args = [
                  "--no-sandbox",
                  "--disable-dev-shm-usage",
                  f"--fingerprint={random.randint(100000, 999999)}",
                  "--fingerprint-storage-quota=5000",
                  f"--fingerprint-fonts-dir={windows_fonts_dir}"
              ]

              print(f"[NODO {node_id}] Avvio singola sessione Persistente (Warmup + Scraping)...", flush=True)
              try:
                  context = await launch_persistent_context_async(
                      profile_dir,
                      headless=False,
                      humanize=True,
                      proxy=f"socks5://127.0.0.1:{INITIAL_PORT}",
                      viewport={"width": 1920, "height": 1080},
                      geoip=True,
                      args=base_args
                  )
                  page = await context.new_page()

                  # WARMUP Integrato - Creazione di cronologia valida
                  await page.goto("https://www.google.com", wait_until="domcontentloaded", timeout=15000)
                  await asyncio.sleep(1)
                  await page.goto("https://www.yelp.com", wait_until="domcontentloaded", timeout=10000)
                  await asyncio.sleep(2)

              except Exception as e:
                  print(f"[NODO {node_id}] Errore critico avvio Browser: {e}")
                  return

              results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 2 (Fallback)\n{'#'*60}\n"

              for url in targets:
                  print(f"[NODO {node_id}] Recupero Avanzato: {url}", flush=True)
                  try:
                      query_to_search = get_query_from_url(url)

                      # RICERCHE NATIVE con `.fill()` nativo di cloakbrowser (evita lo shadowban)
                      if "bing.com" in url:
                          await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.5, 4.0))
                          try:
                              search_box = page.locator("textarea[name='q'], input[name='q']").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                      elif "startpage.com" in url:
                          await page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.0, 3.5))
                          try:
                              search_box = page.locator("input#q").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                      elif "html.duckduckgo.com" in url:
                          await page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.0, 3.5))
                          try:
                              search_box = page.locator("input[name=q]").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                      else:
                          await page.goto(url, wait_until="domcontentloaded", timeout=40000)

                      # --- SILENZIO RADIO ---
                      # Zero esecuzioni JS per bypassare l'anti-bot
                      try: await page.wait_for_load_state("networkidle", timeout=12000)
                      except: pass

                      await asyncio.sleep(6)

                      # Scorrimento Lazy Load NATIVO (simula tastiera hardware)
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(1)
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(2)

                      # Scarica l'HTML in memoria una singola volta
                      raw_html = await page.content()
                      soup = BeautifulSoup(raw_html, 'html.parser')

                      # Controllo sul <title>: segnale ad alta confidenza, indipendente
                      # dal testo visibile, basso rischio di falsi positivi.
                      title_blocked = False
                      title_reason = ""
                      if soup.title and soup.title.string:
                          title_low = soup.title.string.strip().lower()
                          waf_titles = ["just a moment", "attention required", "access denied",
                                        "checking your browser", "robot challenge screen"]
                          for wt in waf_titles:
                              if wt in title_low:
                                  title_blocked = True
                                  title_reason = f"WAF nel titolo: {wt}"
                                  break

                      # Testo completo, senza troncamento, in Markdown pulito per l'LLM.
                      # Il check di validazione gira sul testo GIA' pulito, non sull'HTML
                      # grezzo troncato: una pagina di blocco corta resta corta anche dopo
                      # la pulizia, invece di essere gonfiata da tag/script residui.
                      text_full = html_to_clean_markdown(raw_html, url)
                      text_lower_full = text_full.lower()

                      # Blocklist aggiornata su base OSSERVATA (run reali): aggiunte le
                      # frasi esatte di pagine di blocco che passavano il controllo
                      # precedente ("Robot Challenge Screen" / "Checking the site
                      # connection security" da Cloudflare; "unusual traffic from your
                      # computer network" da Google), senza rimuovere nessuna delle
                      # frasi originali.
                      blocking_indicators = [
                          "just a moment", "are you a robot", "prove your humanity",
                          "captcha verification", "please enter in the characters you see below",
                          "access is forbidden", "access to this page is forbidden", "challenge-platform",
                          "we've detected unusual activity",
                          "robot challenge screen", "checking the site connection security",
                          "unusual traffic from your computer network"
                      ]
                      is_blocked = title_blocked or any(b in text_lower_full for b in blocking_indicators)

                      if len(text_full) > 300 and not is_blocked:
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO ESTRATTO:\n{text_full}\n"
                          print(f"[NODO {node_id}] -> Recuperato con Successo!", flush=True)
                          pubblica_contenuto_scrapato(url, text_full, "step2")
                      else:
                          motivo = title_reason if title_blocked else "Blocco WAF/Captcha o contenuto insufficiente"
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nFALLITO ({motivo})\n"
                          print(f"[NODO {node_id}] -> Fallito: {motivo}", flush=True)

                  except Exception as e:
                      print(f"[NODO {node_id}] -> Errore esecuzione: {e}", flush=True)
                      results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nERRORE: {e}\n"

                  await asyncio.sleep(random.uniform(4.0, 7.0))

              try: await context.close()
              except: pass

              with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                  f.write(results)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Scraping Parallelo - STEP 2 (Fallback CloakBrowser)
        if: always()
        run: |
          echo 'Avvio processi paralleli per STEP 2 sui target falliti...'
