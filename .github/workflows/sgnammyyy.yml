name: Reconcile Nuggets - Agente Deduplicazione Editoriale

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: "Path del file JSON con i nugget grezzi (deve essere nella repo)"
        required: false
        default: "nuggets_finale.json"

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      ANALYSIS_MODEL_NAME: "gemini-3.1-flash-lite"
      MAX_RPM_ANALYSIS: "15"
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installazione dipendenze
        run: |
          pip install google-genai --break-system-packages

      - name: Creazione modulo - rate_limiter.py
        run: |
          cat << 'PYEOF' > rate_limiter.py
          #
          # Rate limiter deterministico a finestra scorrevole (sliding window) per rispettare
          # un tetto rigido di richieste al minuto (RPM) verso il modello AI.
          #
          # IMPORTANTE: nel sistema questo limiter e' condiviso tra TUTTE le chiamate fatte
          # con la stessa API key (clustering + tutte le riconciliazioni per macro-area),
          # perche' il limite RPM di Google e' applicato per chiave/progetto, non per fase
          # della pipeline. Un'unica istanza di RPMLimiter viene creata nell'orchestratore
          # e passata a ogni chiamata, cosi' il conteggio e' sempre corretto in aggregato:
          # se il clustering consuma 1 delle 15 richieste disponibili in un dato minuto,
          # alla riconciliazione ne restano davvero solo 14 in quella stessa finestra.
          #

          import time
          import asyncio
          from collections import deque


          class RPMLimiter:
              # Limita le chiamate a max_rpm per finestra di 60 secondi, in modo esatto
              # (sliding window), non a bucket approssimato.

              def __init__(self, max_rpm: int):
                  if max_rpm <= 0:
                      raise ValueError("max_rpm deve essere > 0")
                  self.max_rpm = max_rpm
                  self._timestamps = deque()
                  self._lock = asyncio.Lock()

              async def acquire(self, label: str = ""):
                  async with self._lock:
                      while True:
                          now = time.monotonic()
                          while self._timestamps and now - self._timestamps[0] >= 60.0:
                              self._timestamps.popleft()

                          if len(self._timestamps) < self.max_rpm:
                              self._timestamps.append(now)
                              return

                          wait_seconds = 60.0 - (now - self._timestamps[0]) + 0.05
                          print(f"{label}[RPM-LIMITER] Limite {self.max_rpm} RPM raggiunto, "
                                f"attendo {wait_seconds:.1f}s...", flush=True)
                          await asyncio.sleep(max(wait_seconds, 0.1))

          PYEOF
      - name: Creazione modulo - gemini_client.py
        run: |
          cat << 'PYEOF' > gemini_client.py
          #
          # Client per il modello di analisi (Gemini 3.1 Flash-Lite, free tier, NO grounding
          # disponibile su questo piano).
          #
          # Design: il rate limiter NON viene creato qui dentro. Viene creato UNA SOLA VOLTA
          # nell'orchestratore e passato (iniettato) a ogni istanza del client, cosi' tutte
          # le chiamate della pipeline (clustering + N riconciliazioni) condividono lo
          # stesso conteggio RPM sulla stessa chiave, come richiesto: il limite e' per
          # chiave/progetto, non per singola fase del programma.
          #
          # Nessun riferimento hardcoded a domini, lingue o dataset specifici.
          #

          import os
          import re
          import json
          import asyncio

          from google import genai
          from google.genai import types

          ANALYSIS_MODEL_NAME = os.environ.get("ANALYSIS_MODEL_NAME", "gemini-3.1-flash-lite")
          ANALYSIS_TIMEOUT_SECONDS = float(os.environ.get("ANALYSIS_TIMEOUT_SECONDS", "90.0"))
          MAX_RETRY_TRANSIENT = 3


          class GeminiAnalysisClient:
              # Wrapper attorno al modello di analisi. Il rate limiter va passato da
              # fuori (condiviso tra tutte le fasi della pipeline sulla stessa chiave).

              def __init__(self, api_key: str, rpm_limiter):
                  if not api_key:
                      raise ValueError("API key mancante per il modello di analisi")
                  self.client = genai.Client(api_key=api_key)
                  self.limiter = rpm_limiter

              async def generate_json(self, prompt: str, label: str = "",
                                       timeout_seconds: float = ANALYSIS_TIMEOUT_SECONDS):
                  # Esegue una chiamata al modello richiedendo una risposta strutturata
                  # JSON. Ritorna (parsed_json, raw_text) oppure (None, raw_text) se il
                  # parsing fallisce dopo i retry consentiti.

                  last_raw_text = None
                  current_prompt = prompt

                  for tentativo in range(MAX_RETRY_TRANSIENT):
                      await self.limiter.acquire(label=label)

                      try:
                          raw_text = await asyncio.wait_for(
                              self._call_model(current_prompt),
                              timeout=timeout_seconds
                          )
                      except (asyncio.TimeoutError, TimeoutError):
                          print(f"{label}[GEMINI] Timeout dopo {timeout_seconds}s "
                                f"(tentativo {tentativo + 1}/{MAX_RETRY_TRANSIENT})", flush=True)
                          continue
                      except Exception as e:
                          print(f"{label}[GEMINI] Errore chiamata modello: {e} "
                                f"(tentativo {tentativo + 1}/{MAX_RETRY_TRANSIENT})", flush=True)
                          await asyncio.sleep(2.0 * (tentativo + 1))
                          continue

                      last_raw_text = raw_text
                      parsed = _estrai_json(raw_text)
                      if parsed is not None:
                          return parsed, raw_text

                      print(f"{label}[GEMINI] Parsing JSON fallito (tentativo "
                            f"{tentativo + 1}/{MAX_RETRY_TRANSIENT}). Richiedo correzione formato...",
                            flush=True)
                      current_prompt = (
                          prompt
                          + "\n\nATTENZIONE: la tua risposta precedente non era un JSON valido "
                            "o non rispettava lo schema richiesto. Rispondi ESCLUSIVAMENTE con "
                            "il JSON richiesto, senza alcun testo di commento, dentro un blocco "
                            "```json ... ```."
                      )

                  return None, last_raw_text

              async def _call_model(self, prompt: str):
                  config = types.GenerateContentConfig(temperature=0.0)

                  def _sync_call():
                      return self.client.models.generate_content(
                          model=ANALYSIS_MODEL_NAME,
                          contents=prompt,
                          config=config,
                      )

                  result = await asyncio.to_thread(_sync_call)

                  text = ""
                  if result.candidates:
                      candidate = result.candidates[0]
                      if candidate.content and candidate.content.parts:
                          for part in candidate.content.parts:
                              if getattr(part, "text", None):
                                  text += part.text

                  return text.strip()


          def _estrai_json(raw_text):
              if not raw_text:
                  return None

              match = re.search(r'```json\s*(.*?)\s*```', raw_text, re.DOTALL)
              json_str = match.group(1) if match else raw_text.strip()

              try:
                  return json.loads(json_str)
              except Exception:
                  alt_match = re.search(r'(\{.*\}|\[.*\])', raw_text, re.DOTALL)
                  if not alt_match:
                      return None
                  try:
                      return json.loads(alt_match.group(1))
                  except Exception:
                      return None

          PYEOF
      - name: Creazione modulo - clustering.py
        run: |
          cat << 'PYEOF' > clustering.py
          #
          # Fase 1 della pipeline: raggruppamento dei nugget in macro-aree/entita'.
          #
          # Agnosticismo totale: nessuna macro-area, categoria, localita' o lingua e'
          # hardcoded. Il modello riceve i fatti grezzi e decide da solo quali macro-aree
          # emergono dal contenuto, in qualsiasi lingua e per qualsiasi destinazione.
          #
          # IMPORTANTE (cambio rispetto alla v1): NON esiste piu' un tetto massimo sul
          # numero di macro-aree. Il tetto storico serviva solo a contenere il numero di
          # chiamate AI totali (1 per macro-area in fase 2) dentro il budget RPM/RPD
          # disponibile. Dato che la qualita' del consolidamento migliora quando ogni
          # chiamata di riconciliazione lavora su un batch piccolo e tematicamente
          # coerente (meno nugget = piu' attenzione del modello per singolo fatto), non
          # ha senso comprimere artificialmente macro-aree distinte in una sola: il
          # vincolo di RPM viene gestito a runtime dal rate limiter condiviso (la
          # pipeline aspetta quando serve, non taglia la qualita' del batching).
          #
          # Unico vincolo residuo: una dimensione minima di batch, per evitare che il
          # modello produca macro-aree da 1-2 nugget quando avrebbe piu' senso accorparli
          # a una macro-area piu' ampia gia' esistente (puro buon senso editoriale, non
          # un limite di sistema).
          #

          import json

          # Soglia minima di nugget per considerare una macro-area "a se stante".
          # Sotto questa soglia, il post-processing deterministico tenta di accorpare
          # il micro-cluster alla macro-area piu' affine (per ora: quella residuale).
          MIN_NUGGET_PER_MACRO_AREA = 2


          CLUSTERING_PROMPT_TEMPLATE = """Sei un analista editoriale specializzato in organizzazione di informazioni fattuali per articoli di viaggio/turismo/cultura, in QUALSIASI lingua e per QUALSIASI destinazione al mondo. Il tuo compito e' puramente organizzativo: NON devi riscrivere, correggere o verificare i fatti in questa fase.

          Riceverai un elenco numerato di "nugget" (fatti grezzi estratti da fonti web), ciascuno con un id univoco, il testo del fatto e la categoria assegnata in fase di estrazione.

          COMPITO:
          Raggruppa questi nugget in MACRO-AREE tematiche, basandoti sull'entita' o sul sotto-argomento a cui si riferiscono (es. un monumento specifico, un tema trasversale come mobilita'/parcheggi, un tema come enogastronomia, eccetera). Le macro-aree devono emergere ESCLUSIVAMENTE dal contenuto che leggi, non da una lista predefinita: se il contenuto parla di una cattedrale, una torre, un pozzo, un museo, un evento, un'area naturale, un aspetto logistico, crea la macro-area che meglio descrive quell'insieme di nugget, usando la stessa lingua prevalente dei nugget stessi.

          REGOLE:
          1. Preferisci macro-aree granulari e tematicamente coerenti (un monumento specifico e' meglio isolato in una sua macro-area, piuttosto che mischiato con altri) piuttosto che poche macro-aree molto ampie: ogni macro-area verra' analizzata separatamente da un secondo modello, quindi la coerenza tematica del gruppo conta piu' del numero di gruppi.
          2. Ogni nugget deve essere assegnato a ESATTAMENTE una macro-area (nessun nugget escluso, nessun nugget duplicato tra macro-aree).
          3. Il nome di ogni macro-area deve essere breve, descrittivo, nella lingua prevalente del contenuto.
          4. Se alcuni nugget sono generici, non correlati o troppo eterogenei per una macro-area dedicata, raggruppali in una macro-area residuale (es. equivalente locale di "Altre informazioni").
          5. Non esiste un numero massimo di macro-aree: crea tutte quelle che servono per rappresentare bene il contenuto reale.

          NUGGET DA RAGGRUPPARE:
          {nuggets_list}

          Restituisci ESCLUSIVAMENTE un JSON con questo schema, racchiuso in un blocco ```json ... ```:
          {{
            "macro_aree": [
              {{
                "nome_macro_area": "...",
                "nugget_ids": [0, 3, 7, ...]
              }}
            ]
          }}
          Non aggiungere alcun testo al di fuori del JSON."""


          def _formatta_nuggets_per_prompt(nuggets_indicizzati):
              righe = []
              for idx, n in nuggets_indicizzati:
                  righe.append(
                      f"[{idx}] (categoria: {n.get('category', 'altro')}) {n.get('fact', '')}"
                  )
              return "\n".join(righe)


          async def clusterizza_nuggets(gemini_client, nuggets, label="[CLUSTERING] "):
              # Riceve la lista grezza di nugget (dict) e ritorna una lista di
              # macro-aree, ciascuna con la lista di nugget completi assegnati.
              #
              # Ritorna: list[dict] con {"nome_macro_area": str, "nuggets": list[dict]}
              #

              nuggets_indicizzati = list(enumerate(nuggets))
              prompt = CLUSTERING_PROMPT_TEMPLATE.format(
                  nuggets_list=_formatta_nuggets_per_prompt(nuggets_indicizzati)
              )

              parsed, raw_text = await gemini_client.generate_json(prompt, label=label)

              if parsed is None or "macro_aree" not in parsed:
                  print(f"{label}Clustering fallito, uso fallback per-categoria.", flush=True)
                  return _fallback_clustering_per_categoria(nuggets)

              macro_aree_raw = parsed["macro_aree"]

              assegnati = {}
              for area in macro_aree_raw:
                  nome = str(area.get("nome_macro_area", "")).strip() or "Altre informazioni"
                  for nid in area.get("nugget_ids", []):
                      try:
                          nid_int = int(nid)
                      except (TypeError, ValueError):
                          continue
                      if 0 <= nid_int < len(nuggets):
                          assegnati[nid_int] = nome

              mancanti = [i for i in range(len(nuggets)) if i not in assegnati]
              if mancanti:
                  print(f"{label}{len(mancanti)} nugget non assegnati dal modello, "
                        f"aggiunti a bucket residuale.", flush=True)
                  for i in mancanti:
                      assegnati[i] = "Altre informazioni"

              macro_aree = {}
              for idx, nome_area in assegnati.items():
                  macro_aree.setdefault(nome_area, []).append(nuggets[idx])

              risultato = [
                  {"nome_macro_area": nome, "nuggets": lista}
                  for nome, lista in macro_aree.items()
              ]

              risultato = _accorpa_micro_cluster(risultato)
              return risultato


          def _fallback_clustering_per_categoria(nuggets):
              # Fallback deterministico, usato SOLO se la chiamata AI di clustering
              # fallisce completamente. Raggruppa per campo 'category' gia' presente nei
              # nugget (agnostico per costruzione, definito a monte dall'estrattore).
              macro_aree = {}
              for n in nuggets:
                  cat = n.get("category", "altro") or "altro"
                  macro_aree.setdefault(cat, []).append(n)
              return [{"nome_macro_area": nome, "nuggets": lista} for nome, lista in macro_aree.items()]


          def _accorpa_micro_cluster(macro_aree):
              # Accorpa deterministicamente (senza chiamata AI) le macro-aree troppo
              # piccole (sotto MIN_NUGGET_PER_MACRO_AREA) in un'unica macro-area
              # residuale, per evitare chiamate di riconciliazione sprecate su batch da
              # 1 nugget. Puro buon senso di efficienza, non un tetto massimo.

              residuale_nome = "Altre informazioni"
              grandi = []
              piccole_nuggets = []

              for area in macro_aree:
                  if len(area["nuggets"]) < MIN_NUGGET_PER_MACRO_AREA and area["nome_macro_area"] != residuale_nome:
                      piccole_nuggets.extend(area["nuggets"])
                  else:
                      grandi.append(area)

              if piccole_nuggets:
                  area_esistente = next((a for a in grandi if a["nome_macro_area"] == residuale_nome), None)
                  if area_esistente:
                      area_esistente["nuggets"].extend(piccole_nuggets)
                  else:
                      grandi.append({"nome_macro_area": residuale_nome, "nuggets": piccole_nuggets})

              return grandi

          PYEOF
      - name: Creazione modulo - reconciliation.py
        run: |
          cat << 'PYEOF' > reconciliation.py
          #
          # Fase 2 della pipeline (v4): deduplicazione semantica (entita' + attributo),
          # NON sintesi editoriale, NON esposizione di metadati di processo nell'output.
          #
          # Principio guida (richiesto esplicitamente): l'output deve avere ESATTAMENTE
          # lo stesso schema dell'input (fact, source_url, category, confidence,
          # quote_originale), invariato per i nugget che non hanno duplicati. Nessun
          # id numerico, nessun campo di tracciabilita' interna, nessun
          # verification_status: quei dettagli sono strumenti di lavoro del CODICE
          # (fase 3, deterministica), non dati destinati all'output finale.
          #
          # Criterio di deduplicazione (definito dall'utente): due nugget sono
          # duplicati SOLO se affermano lo stesso fatto nel senso di
          # STESSA ENTITA' + STESSO ATTRIBUTO SPECIFICO (es. "Torre del Moro" +
          # "altezza"), indipendentemente da come e' scritta la frase. Non e' un
          # matching su valori numerici isolati: due entita' diverse con lo stesso
          # numero (es. due monumenti diversi entrambi alti 47 metri) NON sono
          # duplicati. Questo e' un giudizio semantico che richiede il modello, non
          # una regola meccanica.
          #
          # Eccezioni MINIME allo schema originale, usate solo quando strettamente
          # necessario (mai aggiunte "di default"):
          #   - "source_urls_extra": presente SOLO se altri nugget duplicati provano lo
          #     stesso fatto da fonti diverse dalla principale.
          #   - "note_aggiuntive": presente SOLO se un nugget scartato del gruppo
          #     conteneva un'informazione che il vincitore non aveva (e che non e'
          #     gia' coperta da un altro fatto separato nella stessa macro-area).
          #   - "conflitto_con": presente SOLO se due o piu' nugget affermano valori
          #     diversi per la stessa entita'+attributo e non e' risolvibile con
          #     ragionevole certezza (autorevolezza fonte / regola prezzo piu' alto).
          #
          # NESSUN GROUNDING disponibile su questo piano/modello (Gemini 3.1
          # Flash-Lite free tier).
          #

          import json

          RECONCILIATION_PROMPT_TEMPLATE = """Sei un editor di dati (data curator) meticoloso. Il tuo compito e' fare PULIZIA e DEDUPLICAZIONE SEMANTICA di un elenco di "nugget" (fatti grezzi estratti da fonti web) su un singolo argomento/entita', in QUALSIASI lingua e per QUALSIASI destinazione al mondo.

          REGOLA FONDAMENTALE, LA PIU' IMPORTANTE DI TUTTE: NON DEVI RISCRIVERE O SINTETIZZARE I FATTI. Il campo "fact" che restituisci per ogni nugget tenuto deve essere IDENTICO (verbatim) al testo di uno dei nugget originali: mai riformulato da zero, mai combinato con altri in una frase nuova.

          CRITERIO DI DEDUPLICAZIONE (leggi con attenzione, e' un giudizio semantico, non un confronto di testo): due o piu' nugget sono DUPLICATI tra loro se e solo se affermano lo STESSO FATTO nel senso di STESSA ENTITA' + STESSO ATTRIBUTO SPECIFICO (es. "Torre del Moro" + "altezza in metri" e' un fatto; "Torre del Moro" + "anno di costruzione" e' un fatto diverso, anche se parlano della stessa torre). NON considerare duplicati due nugget solo perche' contengono lo stesso numero: un valore numerico identico riferito a entita' o attributi diversi (es. due monumenti diversi che sono entrambi alti 47 metri, oppure lo stesso monumento con un numero che compare per un attributo diverso) NON e' un duplicato. Usa il ragionamento, non il pattern-matching testuale.

          NON hai accesso a strumenti di ricerca esterni: lavora solo con le fonti e i testi che ricevi qui sotto.

          MACRO-AREA: {nome_macro_area}

          Di seguito i nugget grezzi raccolti su questo argomento, ciascuno con: id (solo per riferimento interno in questa risposta, non comparira' nell'output), fatto, categoria, url sorgente, e confidence di estrazione (= quanto la citazione originale corrisponde fedelmente al testo scrapato, NON quanto il fatto e' vero).

          NUGGET GREZZI:
          {nuggets_list}

          PROCEDIMENTO:

          1. Identifica gruppi di nugget che affermano lo stesso fatto (stessa entita' + stesso attributo specifico, secondo il criterio sopra). Nugget che non hanno nessun duplicato secondo questo criterio vanno riportati singolarmente, senza toccarli.

          2. Per ogni gruppo di duplicati, scegli UN vincitore (il cui "fact" verra' riportato verbatim):
             a. Se una fonte e' il sito ufficiale dell'entita' specifica (es. il sito proprio del monumento/museo/attivita' in questione), quella fonte vince su qualunque altra, ANCHE su un sito istituzionale di livello superiore (comune, ente turistico regionale): un sito istituzionale generico non e' automaticamente piu' autorevole del sito ufficiale specifico del luogo.
             b. REGOLA SPECIFICA PER I PREZZI INTERI DI BIGLIETTERIA: se il conflitto e' tra prezzi INTERI diversi per lo stesso biglietto/servizio e la regola (a) non basta a decidere, assumi che il valore PIU' ALTO tra quelli trovati sia il piu' aggiornato e corretto (i prezzi tendono a salire nel tempo). Un prezzo piu' basso va trattato come prezzo ridotto SOLO se il testo di origine lo qualifica esplicitamente come tale (es. "ridotto", "under 18", "gruppi"); altrimenti e' superato dalla regola del valore piu' alto.
             c. Se nessuna delle due regole permette di decidere con ragionevole certezza, non scegliere arbitrariamente: riporta il gruppo con "conflitto_con" popolato (vedi schema), senza eliminare nessuno dei valori in conflitto.

          3. Se altri nugget del gruppo (non vincitori) provengono da fonti DIVERSE dal vincitore e confermano lo stesso fatto, aggiungi quelle URL in "source_urls_extra" del vincitore (lista, solo se non vuota).

          4. Se un nugget scartato del gruppo contiene un pezzo di informazione che il vincitore NON riporta (es. il vincitore da' solo l'altezza, uno scartato dava anche l'anno di restauro), aggiungi quel pezzo di informazione (copiato verbatim) in "note_aggiuntive" del vincitore. PRIMA di farlo, verifica che quella stessa informazione non sia gia' presente in un ALTRO fatto separato che stai per restituire in questa stessa risposta (es. non ripetere l'anno di restauro dentro note_aggiuntive del fatto-altezza se stai gia' restituendo un fatto-storia dedicato con la stessa informazione). Se hai dubbi su un caso specifico, ometti l'informazione piuttosto che rischiare un duplicato: una piccola perdita di informazione secondaria e' accettabile, un duplicato lo e' meno.

          5. NON INVENTARE alcun dato che non sia presente nei nugget grezzi forniti.

          6. Separatamente dai fatti, identifica quali fatti riguardano DATI VOLATILI (soggetti a cambiare nel tempo: prezzi di biglietteria, orari di apertura, frequenze di mezzi pubblici o traghetti, tariffe, e simili) per cui hai identificato con ragionevole certezza la fonte piu' autorevole. Per ciascuno, produci una voce in "dati_volatili" con SOLO questi 4 campi: "entita" (il soggetto, es. "Torre del Moro"), "tipo_valore" (es. "prezzo biglietto intero", "orario apertura estivo"), "valore" (il dato stesso), "source_url" (l'URL della fonte piu' autorevole per quel dato specifico). Includi in "dati_volatili" SOLO i dati realmente volatili con fonte chiara: non includere dati storici, geografici o descrittivi, quelli restano solo nei "fatti".

          Restituisci ESCLUSIVAMENTE un JSON con questo schema, in un blocco ```json ... ```. Nota: i campi source_urls_extra, note_aggiuntive, conflitto_con vanno OMESSI del tutto (non inclusi come lista vuota) quando non applicabili a un fatto specifico, per mantenere l'output pulito. Il campo "dati_volatili" va omesso (o lista vuota) se nessun fatto di questa macro-area riguarda dati volatili.

          {{
            "fatti": [
              {{
                "fact": "testo IDENTICO (verbatim) a uno dei nugget originali",
                "source_url": "https://... (l'url del nugget vincitore)",
                "category": "categoria (stessa tassonomia dei nugget di origine)",
                "confidence": "high/medium/low (quella del nugget vincitore)",
                "quote_originale": "quote_originale del nugget vincitore, verbatim",
                "source_urls_extra": ["https://... solo se altre fonti confermano lo stesso fatto"],
                "note_aggiuntive": ["informazione verbatim da uno scartato, solo se presente e non duplicata altrove"],
                "conflitto_con": [
                  {{"valore": "descrizione breve del valore alternativo in conflitto", "source_url": "https://..."}}
                ]
              }}
            ],
            "dati_volatili": [
              {{
                "entita": "es. Torre del Moro",
                "tipo_valore": "es. prezzo biglietto intero",
                "valore": "es. 3.80 euro",
                "source_url": "https://..."
              }}
            ]
          }}
          Non aggiungere alcun testo al di fuori del JSON."""


          def _formatta_nuggets_per_prompt(nuggets):
              righe = []
              for idx, n in enumerate(nuggets):
                  righe.append(
                      f"[{idx}] (categoria: {n.get('category', 'altro')}, "
                      f"confidence: {n.get('confidence', 'n/d')}, "
                      f"fonte: {n.get('source_url', 'n/d')}) {n.get('fact', '')}"
                  )
              return "\n".join(righe)


          async def riconcilia_macro_area(gemini_client, nome_macro_area, nuggets, label=""):
              # Esegue UNA chiamata AI per deduplicare i nugget di una singola
              # macro-area. Ritorna un dict con 'fatti': lista di nugget nello schema
              # originale (fact, source_url, category, confidence, quote_originale) +
              # eccezioni minime quando necessario.

              prompt = RECONCILIATION_PROMPT_TEMPLATE.format(
                  nome_macro_area=nome_macro_area,
                  nuggets_list=_formatta_nuggets_per_prompt(nuggets)
              )

              parsed, raw_text = await gemini_client.generate_json(prompt, label=label)

              if parsed is None or "fatti" not in parsed:
                  print(f"{label}[RICONCILIAZIONE] Fallita per macro-area "
                        f"'{nome_macro_area}'. Fallback: nugget grezzi mantenuti as-is, "
                        f"nessuna deduplicazione.", flush=True)
                  return {"fatti": list(nuggets), "_local_nuggets": nuggets}

              parsed["_local_nuggets"] = nuggets  # per la verifica interna (fase 3)
              return parsed

          PYEOF
      - name: Creazione modulo - hallucination_check.py
        run: |
          cat << 'PYEOF' > hallucination_check.py
          #
          # Fase 3 della pipeline (v4): verifica deterministica anti-allucinazione,
          # usata come FILTRO INTERNO SILENZIOSO.
          #
          # Differenza fondamentale rispetto alla v2/v3: qui il risultato della
          # verifica NON viene scritto nell'output come campo (niente
          # "verification_status", niente "verification_details"). L'output finale
          # deve avere lo stesso aspetto pulito dell'input originale. La verifica
          # serve solo a decidere, internamente, se un'aggiunta del modello (note
          # aggiuntive, o l'intero fact quando e' stato scelto tra piu' varianti) e'
          # sufficientemente tracciabile nei nugget grezzi di origine; in caso
          # contrario il codice la scarta automaticamente, senza segnalarlo nel dato,
          # retrocedendo verso il comportamento piu' sicuro disponibile.
          #
          # Corregge inoltre lo stesso bug della v2/v3 relativo agli orari (es.
          # "9:30" veniva spezzato in due numeri sciolti "9" e "30" e quasi sempre
          # marcato come non supportato): qui gli orari sono riconosciuti come token
          # atomici HH:MM prima dell'estrazione numerica generica.
          #
          # Politica di correzione automatica (nessun umano nel loop, sistema
          # black-box):
          #   - Se una singola "nota_aggiuntiva" non e' verificabile contro le
          #     quote_originale dei nugget del gruppo -> viene rimossa da quella lista
          #     (il resto del fatto, se verificato, resta).
          #   - Se il campo "fact" stesso del fatto consolidato non e' verificabile
          #     (caso anomalo: dovrebbe essere sempre verbatim da un nugget originale,
          #     quindi un fallimento qui indica probabile riscrittura non richiesta
          #     da parte del modello) -> il fatto viene scartato e sostituito con il
          #     PRIMO nugget grezzo del gruppo, intatto, com'era nell'input originale:
          #     e' la retrocessione piu' sicura possibile, garantisce comunque la
          #     presenza dell'informazione senza rischiare un dato riscritto e non
          #     verificato.
          #

          import re
          import difflib

          SIMILARITY_THRESHOLD = 0.60
          NUMERIC_TOLERANCE_PCT = 0.02  # 2%

          TIME_REGEX = re.compile(r"\b([01]?\d|2[0-3]):([0-5]\d)\b")
          NUMBER_REGEX = re.compile(r"\d[\d.,]*\d|\d")


          def _estrai_orari(testo):
              if not testo:
                  return []
              return [f"{int(m.group(1)):02d}:{m.group(2)}" for m in TIME_REGEX.finditer(testo)]


          def _rimuovi_orari_dal_testo(testo):
              return TIME_REGEX.sub(" ", testo)


          def _estrai_numeri(testo):
              if not testo:
                  return []
              testo_senza_orari = _rimuovi_orari_dal_testo(testo)
              grezzi = NUMBER_REGEX.findall(testo_senza_orari)
              numeri = []
              for g in grezzi:
                  pulito = g.strip(".,")
                  if not pulito:
                      continue
                  normalizzato = pulito.replace(".", "").replace(",", ".") if pulito.count(",") == 1 and pulito.count(".") <= 1 else pulito.replace(",", "")
                  try:
                      numeri.append(float(normalizzato))
                  except ValueError:
                      continue
              return numeri


          def _numero_supportato(numero, numeri_sorgente):
              for n_sorgente in numeri_sorgente:
                  if n_sorgente == 0:
                      if numero == 0:
                          return True
                      continue
                  if abs(numero - n_sorgente) / abs(n_sorgente) <= NUMERIC_TOLERANCE_PCT:
                      return True
              return False


          def _testo_supportato_fuzzy(testo, testi_sorgente_concatenati):
              if not testo or not testi_sorgente_concatenati:
                  return 0.0
              testo_norm = re.sub(r"\s+", " ", testo).strip().lower()
              sorgente_norm = re.sub(r"\s+", " ", testi_sorgente_concatenati).strip().lower()

              if testo_norm in sorgente_norm:
                  return 1.0

              finestra = min(len(testo_norm), 300)
              if finestra < 8 or len(sorgente_norm) < finestra:
                  return difflib.SequenceMatcher(None, testo_norm, sorgente_norm).ratio()

              best_ratio = 0.0
              step = max(1, finestra // 2)
              for i in range(0, len(sorgente_norm) - finestra + 1, step):
                  frammento = sorgente_norm[i:i + finestra]
                  ratio = difflib.SequenceMatcher(None, testo_norm, frammento).ratio()
                  if ratio > best_ratio:
                      best_ratio = ratio
                  if best_ratio > 0.95:
                      break
              return best_ratio


          def _e_verificato(testo, testi_sorgente):
              # Nucleo della verifica: True/False, nessun dettaglio esposto
              # all'esterno di questo modulo. Questa e' la logica di gate interna.
              if not testo or not testi_sorgente:
                  return False

              similarity = _testo_supportato_fuzzy(testo, testi_sorgente)

              orari_testo = _estrai_orari(testo)
              orari_sorgente = set(_estrai_orari(testi_sorgente))
              if any(o not in orari_sorgente for o in orari_testo):
                  return False

              numeri_testo = _estrai_numeri(testo)
              numeri_sorgente = _estrai_numeri(testi_sorgente)
              if any(not _numero_supportato(n, numeri_sorgente) for n in numeri_testo):
                  return False

              ha_dati_puntuali = bool(orari_testo) or bool(numeri_testo)
              if ha_dati_puntuali:
                  # I dati puntuali (numeri/orari) sono gia' stati controllati sopra;
                  # se sono tutti supportati, il testo e' verificato indipendentemente
                  # dalla similarity generale (la riformulazione libera e' normale).
                  return True
              return similarity >= SIMILARITY_THRESHOLD


          def _quote_originali_gruppo(nugget_ids_originali, id_map):
              # Raccoglie le quote_originale (verbatim) di TUTTI i nugget del gruppo
              # che ha prodotto un fatto consolidato, non solo del vincitore: un'aggiunta
              # legittima puo' provenire da qualsiasi nugget del gruppo. id_map e' tutta
              # la macro-area (non solo il gruppo), quindi qui serve una lista di id
              # espliciti, tracciata a parte dal chiamante tramite matching sul
              # source_url + fact del vincitore (v. verifica_e_filtra_fatti).
              testi = []
              for nid in nugget_ids_originali:
                  n = id_map.get(nid)
                  if n and n.get("quote_originale"):
                      testi.append(n["quote_originale"])
              return "\n".join(testi)


          def _trova_nugget_originale(fatto, local_nuggets):
              # Trova il nugget grezzo originale che corrisponde al 'fact' verbatim
              # del fatto consolidato (il vincitore del gruppo). Match esatto sul testo
              # del fact, che deve essere identico per costruzione (richiesto dal
              # prompt). Ritorna l'indice nella lista local_nuggets, o None se non
              # trovato (caso anomalo, gestito dal chiamante come fallimento verifica).
              fact_testo = (fatto.get("fact") or "").strip()
              for i, n in enumerate(local_nuggets):
                  if (n.get("fact") or "").strip() == fact_testo:
                      return i
              return None


          def verifica_e_filtra_fatti(fatti, local_nuggets):
              # Applica il filtro silenzioso a tutti i fatti di una macro-area.
              # Ritorna la lista di fatti pronta per l'output finale, GIA' pulita:
              # nessun campo di verifica aggiunto, solo correzioni silenziose quando
              # necessario. Ritorna anche un contatore aggregato (solo per il log).

              id_map = {i: n for i, n in enumerate(local_nuggets)}
              fatti_puliti = []
              contatori = {"note_scartate": 0, "fatti_retrocessi": 0, "fatti_ok": 0}

              for fatto in fatti:
                  idx_vincitore = _trova_nugget_originale(fatto, local_nuggets)

                  if idx_vincitore is None:
                      # Il 'fact' non corrisponde verbatim a NESSUN nugget originale:
                      # il modello ha riscritto quando non doveva. Non possiamo fidarci
                      # di questo fatto: lo scartiamo dall'output di questa macro-area.
                      # Il nugget originale che il modello intendeva rappresentare non
                      # e' univocamente determinabile da qui, quindi il chiamante
                      # (orchestrator) si occupa di garantire che nessun nugget vada
                      # perso confrontando gli insiemi a livello di intera pipeline.
                      contatori["fatti_retrocessi"] += 1
                      continue

                  # Le quote di riferimento per questo fatto: solo il nugget vincitore
                  # stesso (la fonte del suo 'fact' e 'quote_originale' dichiarati).
                  # Per le note_aggiuntive, invece, il riferimento e' l'intera
                  # macro-area: un'informazione aggiuntiva puo' provenire da un
                  # qualunque altro nugget della stessa macro-area.
                  quote_vincitore = local_nuggets[idx_vincitore].get("quote_originale", "")

                  fatto_pulito = dict(fatto)

                  note_originali = fatto_pulito.get("note_aggiuntive", [])
                  if note_originali:
                      testi_macro_area = "\n".join(
                          n.get("quote_originale", "") for n in local_nuggets
                      )
                      note_verificate = [
                          nota for nota in note_originali
                          if _e_verificato(nota, testi_macro_area)
                      ]
                      scartate = len(note_originali) - len(note_verificate)
                      if scartate:
                          contatori["note_scartate"] += scartate
                      if note_verificate:
                          fatto_pulito["note_aggiuntive"] = note_verificate
                      else:
                          fatto_pulito.pop("note_aggiuntive", None)

                  contatori["fatti_ok"] += 1
                  fatti_puliti.append(fatto_pulito)

              return fatti_puliti, contatori


          def verifica_dati_volatili(dati_volatili, local_nuggets):
              # Verifica silenziosa dei 'dati_volatili' (schema minimo: entita,
              # tipo_valore, valore, source_url). Un dato volatile e' scartato SOLO se
              # il suo 'valore' contiene numeri/orari non tracciabili in NESSUNA
              # quote_originale della macro-area (stesso principio del resto della
              # fase 3). Nessun campo di verifica viene aggiunto all'output: si scarta
              # o si tiene, senza lasciare traccia del processo nel dato stesso.

              testi_macro_area = "\n".join(
                  n.get("quote_originale", "") for n in local_nuggets
              )

              validi = []
              scartati = 0
              for dv in dati_volatili:
                  valore = str(dv.get("valore", ""))
                  if _e_verificato(valore, testi_macro_area):
                      validi.append(dv)
                  else:
                      scartati += 1

              return validi, scartati


          def recupera_nugget_persi(fatti_puliti, local_nuggets):
              # Garanzia di non-perdita: confronta l'insieme dei nugget grezzi di
              # input con quelli effettivamente rappresentati nei fatti in output
              # (tramite match sul 'fact' verbatim). Ogni nugget grezzo che non compare
              # in NESSUN fatto in output (ne' come vincitore ne' citato in
              # source_urls_extra/note_aggiuntive) viene ri-aggiunto singolarmente,
              # intatto, com'era nell'input originale. Questa e' la rete di sicurezza
              # finale: garantisce che l'aggregato di dati non si restringa mai per
              # un fallimento del modello o della verifica, coerente con l'obbligo di
              # non perdere mai informazione senza intervento umano nel loop.

              facts_presenti = {f.get("fact", "").strip() for f in fatti_puliti}
              recuperati = []
              for n in local_nuggets:
                  if n.get("fact", "").strip() not in facts_presenti:
                      recuperati.append(dict(n))
              return fatti_puliti + recuperati, len(recuperati)

          PYEOF
      - name: Creazione modulo - orchestrator.py
        run: |
          cat << 'PYEOF' > orchestrator.py
          #
          # Orchestratore principale (v4): carica i nugget grezzi, esegue clustering,
          # deduplicazione semantica per macro-area, applica il filtro anti-
          # allucinazione SILENZIOSO (nessun campo di verifica nell'output), garantisce
          # che nessun nugget vada perso, e scrive UN SOLO output finale nello stesso
          # schema minimale dell'input (fact, source_url, category, confidence,
          # quote_originale), con eccezioni aggiunte solo quando strettamente
          # necessario.
          #
          # Uso:
          #     python orchestrator.py --input nuggets_finale.json --output-dir ./output
          #
          # Variabili d'ambiente richieste:
          #     GEMINI_API_KEY (round-robin opzionale con GEMINI_API_KEY_2, _3, ...)
          #

          import os
          import sys
          import json
          import argparse
          import asyncio

          from rate_limiter import RPMLimiter
          from gemini_client import GeminiAnalysisClient
          from clustering import clusterizza_nuggets
          from reconciliation import riconcilia_macro_area
          from hallucination_check import verifica_e_filtra_fatti, recupera_nugget_persi, verifica_dati_volatili

          MAX_RPM = int(os.environ.get("MAX_RPM_ANALYSIS", "15"))


          def _carica_api_keys():
              keys = []
              primary = os.environ.get("GEMINI_API_KEY", "").strip()
              if primary:
                  keys.extend([k.strip() for k in primary.split(",") if k.strip()])
              idx = 2
              while True:
                  val = os.environ.get(f"GEMINI_API_KEY_{idx}", "").strip()
                  if not val:
                      break
                  keys.extend([k.strip() for k in val.split(",") if k.strip()])
                  idx += 1
              return keys


          def _carica_nuggets(input_path):
              with open(input_path, "r", encoding="utf-8") as f:
                  data = json.load(f)
              if isinstance(data, dict) and "nuggets" in data:
                  return data["nuggets"]
              if isinstance(data, list):
                  return data
              raise ValueError(
                  "Formato input non riconosciuto: atteso un oggetto con chiave "
                  "'nuggets' (lista) oppure direttamente una lista di nugget."
              )


          async def esegui_pipeline(input_path, output_dir):
              os.makedirs(output_dir, exist_ok=True)

              print(f"[ORCHESTRATOR] Caricamento nugget da {input_path}...", flush=True)
              nuggets_grezzi = _carica_nuggets(input_path)
              print(f"[ORCHESTRATOR] {len(nuggets_grezzi)} nugget grezzi caricati.", flush=True)

              if not nuggets_grezzi:
                  print("[ORCHESTRATOR] Nessun nugget da processare. Uscita.", flush=True)
                  with open(os.path.join(output_dir, "nuggets_riconciliati.json"), "w", encoding="utf-8") as f:
                      json.dump({"nuggets": []}, f, indent=2, ensure_ascii=False)
                  return

              api_keys = _carica_api_keys()
              if not api_keys:
                  print("[ORCHESTRATOR] ERRORE: nessuna GEMINI_API_KEY disponibile.", flush=True)
                  sys.exit(1)

              rpm_limiter = RPMLimiter(MAX_RPM)
              gemini_client = GeminiAnalysisClient(api_key=api_keys[0], rpm_limiter=rpm_limiter)

              print("[ORCHESTRATOR] Fase 1: clustering in macro-aree...", flush=True)
              macro_aree = await clusterizza_nuggets(gemini_client, nuggets_grezzi)
              print(f"[ORCHESTRATOR] {len(macro_aree)} macro-aree individuate:", flush=True)
              for area in macro_aree:
                  print(f"    - {area['nome_macro_area']}: {len(area['nuggets'])} nugget", flush=True)

              print(f"[ORCHESTRATOR] Fase 2: deduplicazione per macro-area "
                    f"({len(macro_aree)} chiamate, rate-limited a {MAX_RPM} RPM condivisi "
                    f"col clustering)...", flush=True)

              tutti_i_fatti = []
              tutti_i_dati_volatili = []
              tot_note_scartate = 0
              tot_fatti_retrocessi = 0
              tot_nugget_recuperati = 0
              tot_dati_volatili_scartati = 0

              for area in macro_aree:
                  label = f"[{area['nome_macro_area']}] "
                  risultato = await riconcilia_macro_area(
                      gemini_client, area["nome_macro_area"], area["nuggets"], label=label
                  )

                  fatti_grezzi = risultato.get("fatti", [])
                  local_nuggets = risultato.get("_local_nuggets", area["nuggets"])

                  # Fase 3, applicata SILENZIOSAMENTE: nessun campo aggiunto
                  # all'output, solo correzioni interne (rimozione note non
                  # verificabili, scarto di fatti riscritti in modo anomalo).
                  fatti_puliti, contatori = verifica_e_filtra_fatti(fatti_grezzi, local_nuggets)

                  # Rete di sicurezza finale: nessun nugget grezzo puo' sparire
                  # dall'output complessivo della macro-area, in nessun caso.
                  fatti_completi, n_recuperati = recupera_nugget_persi(fatti_puliti, local_nuggets)

                  dati_volatili_grezzi = risultato.get("dati_volatili", [])
                  dati_volatili_puliti, n_scartati_volatili = verifica_dati_volatili(
                      dati_volatili_grezzi, local_nuggets
                  )

                  tot_note_scartate += contatori["note_scartate"]
                  tot_fatti_retrocessi += contatori["fatti_retrocessi"]
                  tot_nugget_recuperati += n_recuperati
                  tot_dati_volatili_scartati += n_scartati_volatili

                  print(f"{label}{len(fatti_completi)} fatti in output "
                        f"(da {len(local_nuggets)} nugget grezzi; "
                        f"{contatori['note_scartate']} note scartate dal filtro, "
                        f"{n_recuperati} nugget recuperati dalla rete di sicurezza), "
                        f"{len(dati_volatili_puliti)} dati volatili identificati.", flush=True)

                  tutti_i_fatti.extend(fatti_completi)
                  tutti_i_dati_volatili.extend(dati_volatili_puliti)

              print(f"[ORCHESTRATOR] Pipeline completata: {len(nuggets_grezzi)} nugget grezzi "
                    f"-> {len(tutti_i_fatti)} fatti in output "
                    f"({tot_note_scartate} note interne scartate dal filtro qualita', "
                    f"{tot_fatti_retrocessi} fatti riscritti in modo anomalo scartati e "
                    f"ripristinati dalla rete di sicurezza, "
                    f"{tot_nugget_recuperati} nugget totali recuperati intatti, "
                    f"{tot_dati_volatili_scartati} dati volatili scartati dal filtro), "
                    f"{len(tutti_i_dati_volatili)} dati volatili totali.", flush=True)

              output_finale = {"nuggets": tutti_i_fatti}
              output_path = os.path.join(output_dir, "nuggets_riconciliati.json")
              with open(output_path, "w", encoding="utf-8") as f:
                  json.dump(output_finale, f, indent=2, ensure_ascii=False)

              dati_volatili_output = {"dati_volatili": tutti_i_dati_volatili}
              dati_volatili_path = os.path.join(output_dir, "dati_volatili.json")
              with open(dati_volatili_path, "w", encoding="utf-8") as f:
                  json.dump(dati_volatili_output, f, indent=2, ensure_ascii=False)

              print(f"[ORCHESTRATOR] Output scritto in {output_path}", flush=True)
              print(f"[ORCHESTRATOR] Dati volatili scritti in {dati_volatili_path}", flush=True)


          def main():
              parser = argparse.ArgumentParser(description="Pipeline di deduplicazione nugget editoriali.")
              parser.add_argument("--input", required=True, help="Path al file JSON con i nugget grezzi.")
              parser.add_argument("--output-dir", default="./output", help="Directory di output.")
              args = parser.parse_args()

              asyncio.run(esegui_pipeline(args.input, args.output_dir))


          if __name__ == "__main__":
              main()

          PYEOF
      - name: Creazione modulo - print_summary.py
        run: |
          cat << 'PYEOF' > print_summary.py
          import json
          import os

          with open("./output/nuggets_riconciliati.json", encoding="utf-8") as f:
              data = json.load(f)

          n_fatti = len(data.get("nuggets", []))
          print(f"- Fatti totali in output (dopo deduplicazione): {n_fatti}")

          dv_path = "./output/dati_volatili.json"
          if os.path.exists(dv_path):
              with open(dv_path, encoding="utf-8") as f:
                  dv_data = json.load(f)
              n_dv = len(dv_data.get("dati_volatili", []))
              print(f"- Dati volatili identificati (prezzi/orari con fonte): {n_dv}")

          PYEOF

      - name: Verifica presenza file di input
        run: |
          INPUT_FILE="${{ github.event.inputs.input_file }}"
          if [ -z "$INPUT_FILE" ]; then
            INPUT_FILE="nuggets_finale.json"
          fi
          echo "INPUT_FILE=$INPUT_FILE" >> $GITHUB_ENV
          if [ ! -f "$INPUT_FILE" ]; then
            echo "ERRORE: file di input '$INPUT_FILE' non trovato nella repo."
            exit 1
          fi
          echo "File di input trovato: $INPUT_FILE"

      - name: Esecuzione pipeline di deduplicazione
        run: |
          python -u orchestrator.py --input "${{ env.INPUT_FILE }}" --output-dir ./output

      - name: Riepilogo statistiche
        if: always()
        run: |
          if [ -f "./output/nuggets_riconciliati.json" ]; then
            echo "### Riepilogo pipeline di deduplicazione" >> $GITHUB_STEP_SUMMARY
            python3 print_summary.py >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Artifact - Nugget Deduplicati (schema identico all'input)
        uses: actions/upload-artifact@v4
        with:
