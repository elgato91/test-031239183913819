      - name: Pulizia Container WARP STEP 1 (libera le porte per il nuovo setup)
        run: |
          echo "Arresto e rimozione dei 6 container WARP dello Step 1, per liberare le porte 40001-40006..."
          for i in {1..6}; do
            docker rm -f "warp_step1_slot${i}" || true
          done
          echo "Container Step 1 rimossi."

          # Cooldown deliberato: registrare 6 nuovi device WARP subito dopo aver
          # gia' registrato 6 device (Step 1) sullo stesso IP host fa scattare
          # un tasso di timeout molto piu' alto in ondata 1 (osservato empiricamente:
          # 5/6 falliti al primo tentativo quando il gap era di pochi secondi).
          # Un cooldown piu' ampio riduce il burst percepito da Cloudflare.
          echo "Cooldown di 10s prima del setup WARP Step 2..."
          sleep 50

      - name: Setup Container WARP STEP 2 (Nuovi IP) (client ufficiale, rigoroso, IPv4+IPv6 univoci)
        run: |
          set -o pipefail
          START_TS=$(date +%s)

          NODI_NECESSARI=6
          MAX_ONDATE=3
          DELAY_MIN=4
          DELAY_MAX=6
          ATTESA_FINALE_SECONDI=15
          PORTA_BASE=40000
          # RICHIEDI_IPV4_UNIVOCO=1 -> Step 2 (rigoroso): scarta anche su collisione IPv4.
          # RICHIEDI_IPV4_UNIVOCO=0 -> Step 1 (permissivo): la dedup guarda solo IPv6.
          RICHIEDI_IPV4_UNIVOCO=0

          # Polling leggero anti race-condition di registrazione WARP:
          # il client warp-svc a volte tenta Connect prima che la
          # registrazione device sia completata (err=MissingRegistration).
          # Pochi tentativi spaziati, non polling aggressivo continuo.
          MAX_TENTATIVI_REGISTRAZIONE=4
          ATTESA_TRA_TENTATIVI_SECONDI=10

          declare -A ipv4_di_slot
          declare -A ipv6_di_slot
          declare -A ipv4_visti
          declare -A ipv6_visti
          SLOT_OK=()

          # Avvia il container e basta. Nessuna verifica, nessun curl qui:
          # la verifica avviene TUTTA INSIEME dopo che ogni nodo dell'ondata
          # e' partito e dopo un'unica attesa finale fissa, non un polling
          # continuo per nodo che genera carico concorrente sull'host.
          avvia_nodo() {
            local slot=$1
            local port=$2

            docker rm -f "warp_${CONTAINER_PREFIX}_slot${slot}" > /dev/null 2>&1 || true

            docker run -d \
              --name "warp_${CONTAINER_PREFIX}_slot${slot}" \
              --cap-add NET_ADMIN \
              --cap-add MKNOD \
              --cap-add AUDIT_WRITE \
              --sysctl net.ipv6.conf.all.disable_ipv6=0 \
              --sysctl net.ipv4.conf.all.src_valid_mark=1 \
              -e WARP_SLEEP=1 \
              -p "$port":1080 \
              caomingjun/warp:latest > /dev/null 2>&1 || true
          }

          # Verifica UN SOLO nodo, chiamata dopo l'attesa finale, tutte in
          # parallelo tra loro (un curl a testa, non un loop di polling
          # pesante). Include un piccolo retry interno sulla sola rilevazione
          # di warp=on, per assorbire la race condition di registrazione
          # (MissingRegistration) del client warp-svc appena avviato.
          verifica_nodo() {
            local slot=$1
            local port=$2
            local out_file=$3
            local ip4=""
            local ip6=""
            local err_msg=""

            trap 'echo "${slot}|${port}|${ip4}|${ip6}|${err_msg}" > "$out_file"' EXIT

            local trace=""
            local tentativo=1
            while [ "$tentativo" -le "$MAX_TENTATIVI_REGISTRAZIONE" ]; do
              trace=$(curl -s --max-time 5 -x "socks5h://127.0.0.1:$port" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null || true)

              if echo "$trace" | grep -q "warp=on" 2>/dev/null; then
                break
              fi

              echo "  [slot $slot] tentativo $tentativo/$MAX_TENTATIVI_REGISTRAZIONE: warp=on non ancora rilevato (probabile registrazione device in corso), ritento tra ${ATTESA_TRA_TENTATIVI_SECONDI}s..."
              tentativo=$((tentativo + 1))
              if [ "$tentativo" -le "$MAX_TENTATIVI_REGISTRAZIONE" ]; then
                sleep "$ATTESA_TRA_TENTATIVI_SECONDI"
              fi
            done

            if ! echo "$trace" | grep -q "warp=on" 2>/dev/null; then
              err_msg="warp=on non rilevato dopo ${MAX_TENTATIVI_REGISTRAZIONE} tentativi"
              echo "  --- Log docker del container warp_${CONTAINER_PREFIX}_slot${slot} (ultime 30 righe) ---"
              docker logs --tail 30 "warp_${CONTAINER_PREFIX}_slot${slot}" 2>&1 | sed 's/^/    /'
              echo "  --- Fine log ---"
              return 0
            fi

            (curl -s --max-time 3 -x "socks5h://127.0.0.1:$port" https://ipv4.icanhazip.com 2>/dev/null | tr -d '[:space:]' > "/tmp/ip4_${CONTAINER_PREFIX}_${slot}") &
            (curl -s --max-time 3 -x "socks5h://127.0.0.1:$port" https://ipv6.icanhazip.com 2>/dev/null | tr -d '[:space:]' > "/tmp/ip6_${CONTAINER_PREFIX}_${slot}") &
            wait

            ip4=$(cat "/tmp/ip4_${CONTAINER_PREFIX}_${slot}" 2>/dev/null || true)
            ip6=$(cat "/tmp/ip6_${CONTAINER_PREFIX}_${slot}" 2>/dev/null || true)
            rm -f "/tmp/ip4_${CONTAINER_PREFIX}_${slot}" "/tmp/ip6_${CONTAINER_PREFIX}_${slot}"

            if [ -z "$ip4" ]; then
              ip4=$(echo "$trace" | grep "^ip=" | cut -d= -f2 || true)
            fi
            if [ -z "$ip6" ]; then
              ip6=$(curl -s --max-time 3 -x "socks5h://127.0.0.1:$port" https://api6.ipify.org 2>/dev/null | tr -d '[:space:]' || true)
            fi

            return 0
          }

          rimuovi_nodo_slot() {
            local slot=$1
            docker rm -f "warp_${CONTAINER_PREFIX}_slot${slot}" > /dev/null 2>&1 || true
          }

          leggi_esito() {
            local esito_file=$1
            IFS='|' read -r PARSED_SLOT PARSED_PORT PARSED_IP4 PARSED_IP6 PARSED_ERR < "$esito_file"
          }

          elabora_esiti() {
            SLOT_DA_RIPROVARE=()
            local file_list=("$@")
            for esito_file in "${file_list[@]}"; do
              if [ ! -f "$esito_file" ]; then
                echo "  FALLITO: nessun report generato ($esito_file)"
                continue
              fi

              leggi_esito "$esito_file"

              if [ -n "$PARSED_ERR" ]; then
                echo "  [slot $PARSED_SLOT] porta $PARSED_PORT: FALLITO (${PARSED_ERR})"
                rimuovi_nodo_slot "$PARSED_SLOT"
                SLOT_DA_RIPROVARE+=("$PARSED_SLOT")
                continue
              fi

              if [ -z "$PARSED_IP6" ] || [ "$PARSED_IP6" = "NESSUNO" ]; then
                echo "  [slot $PARSED_SLOT] porta $PARSED_PORT: FALLITO (IPv6 non ottenuto)"
                rimuovi_nodo_slot "$PARSED_SLOT"
                SLOT_DA_RIPROVARE+=("$PARSED_SLOT")
                continue
              fi

              if [ -n "${ipv6_visti[$PARSED_IP6]:-}" ]; then
                echo "  [slot $PARSED_SLOT] porta $PARSED_PORT: FALLITO (IPv6 duplicato con slot ${ipv6_visti[$PARSED_IP6]})"
                rimuovi_nodo_slot "$PARSED_SLOT"
                SLOT_DA_RIPROVARE+=("$PARSED_SLOT")
                continue
              fi

              if [ "$RICHIEDI_IPV4_UNIVOCO" = "1" ]; then
                if [ -z "$PARSED_IP4" ] || [ "$PARSED_IP4" = "NESSUNO" ]; then
                  echo "  [slot $PARSED_SLOT] porta $PARSED_PORT: FALLITO (IPv4 non ottenuto)"
                  rimuovi_nodo_slot "$PARSED_SLOT"
                  SLOT_DA_RIPROVARE+=("$PARSED_SLOT")
                  continue
                fi

                if [ -n "${ipv4_visti[$PARSED_IP4]:-}" ]; then
                  echo "  [slot $PARSED_SLOT] porta $PARSED_PORT: FALLITO (IPv4 duplicato con slot ${ipv4_visti[$PARSED_IP4]})"
                  rimuovi_nodo_slot "$PARSED_SLOT"
                  SLOT_DA_RIPROVARE+=("$PARSED_SLOT")
                  continue
                fi
              elif [ -n "$PARSED_IP4" ] && [ "$PARSED_IP4" != "NESSUNO" ] && [ -n "${ipv4_visti[$PARSED_IP4]:-}" ]; then
                echo "  [slot $PARSED_SLOT] porta $PARSED_PORT: IPv4 duplicato con slot ${ipv4_visti[$PARSED_IP4]}, ma ACCETTATO (modalita' permissiva)"
              fi

              ipv4_visti[$PARSED_IP4]=$PARSED_SLOT
              ipv6_visti[$PARSED_IP6]=$PARSED_SLOT
              ipv4_di_slot[$PARSED_SLOT]=$PARSED_IP4
              ipv6_di_slot[$PARSED_SLOT]=$PARSED_IP6
              SLOT_OK+=("$PARSED_SLOT")
              echo "  [slot $PARSED_SLOT] porta $PARSED_PORT: OK (IPv4: $PARSED_IP4 | IPv6: $PARSED_IP6)"
            done
          }

          esegui_ondata() {
            local slots=("$@")
            local n=${#slots[@]}
            local idx=0
            local files=()

            for slot in "${slots[@]}"; do
              idx=$((idx + 1))
              port=$((PORTA_BASE + slot))
              avvia_nodo "$slot" "$port"

              if [ "$idx" -lt "$n" ]; then
                DELAY=$(awk -v min="$DELAY_MIN" -v max="$DELAY_MAX" 'BEGIN{srand('"$slot"'+systime()); print min+rand()*(max-min)}')
                echo "  [slot $slot] container avviato su porta $port. Prossimo tra ${DELAY}s..."
                sleep "$DELAY"
              else
                echo "  [slot $slot] container avviato su porta $port. Ultimo dell'ondata."
              fi
            done

            echo "Attesa finale di ${ATTESA_FINALE_SECONDI}s prima della verifica..."
            sleep "$ATTESA_FINALE_SECONDI"

            local pids=()
            for slot in "${slots[@]}"; do
              port=$((PORTA_BASE + slot))
              out="/tmp/esito_${CONTAINER_PREFIX}_slot${slot}.txt"
              files+=("$out")
              verifica_nodo "$slot" "$port" "$out" &
              pids+=($!)
            done

            for pid in "${pids[@]}"; do
              wait "$pid" 2>/dev/null || true
            done

            elabora_esiti "${files[@]}"
          }

          echo "=== STEP 2 (Nuovi IP) - ONDATA 1/$MAX_ONDATE: avvio $NODI_NECESSARI nodi sugli slot fissi 1-$NODI_NECESSARI (ritardo ${DELAY_MIN}-${DELAY_MAX}s, ${MODALITA_LABEL}) ==="
          TUTTI_SLOT=($(seq 1 "$NODI_NECESSARI"))
          esegui_ondata "${TUTTI_SLOT[@]}"
          echo "Slot validi dopo ondata 1: ${#SLOT_OK[@]}/$NODI_NECESSARI"

          ONDATA=1
          SLOT_MANCANTI=("${SLOT_DA_RIPROVARE[@]}")
          while [ "${#SLOT_MANCANTI[@]}" -gt 0 ] && [ "$ONDATA" -lt "$MAX_ONDATE" ]; do
            echo "Cooldown 4s per prevenire rate-limit di registrazione..."
            sleep 4

            ONDATA=$((ONDATA + 1))
            echo ""
            echo "=== STEP 2 (Nuovi IP) - ONDATA $ONDATA/$MAX_ONDATE: retry sugli slot ${SLOT_MANCANTI[*]} ==="
            esegui_ondata "${SLOT_MANCANTI[@]}"
            SLOT_MANCANTI=("${SLOT_DA_RIPROVARE[@]}")
            echo "Slot validi dopo ondata $ONDATA: ${#SLOT_OK[@]}/$NODI_NECESSARI"
          done

          ELAPSED_FINALE=$(( $(date +%s) - START_TS ))
          echo ""
          if [ "${#SLOT_OK[@]}" -lt "$NODI_NECESSARI" ]; then
            echo "::warning::STEP 2 (Nuovi IP): dopo $MAX_ONDATE ondate (max consentite), ottenuti ${#SLOT_OK[@]}/$NODI_NECESSARI slot. Si prosegue comunque."
          fi
          echo "=== STEP 2 (Nuovi IP) completata (${#SLOT_OK[@]}/$NODI_NECESSARI slot), in ${ELAPSED_FINALE}s ==="
          for slot in $(seq 1 "$NODI_NECESSARI"); do
            if [ -n "${ipv4_di_slot[$slot]:-}" ]; then
              echo "  slot $slot (porta $((PORTA_BASE+slot))) -> IPv4: ${ipv4_di_slot[$slot]} | IPv6: ${ipv6_di_slot[$slot]}"
            else
              echo "  slot $slot (porta $((PORTA_BASE+slot))) -> NON DISPONIBILE"
            fi
          done
        env:
          CONTAINER_PREFIX: step2
          MODALITA_LABEL: rigoroso, IPv4+IPv6 univoci

      - name: Inizializzazione Code DISTRIBUITE - STEP 2
        run: |
          echo "::group::Scrittura m2_step2_setup.py"
          cat << 'EOF' > m2_step2_setup.py
          import json
          import os

          merged_failed = []
          for i in range(1, 7):
              filename = f"failed_node_{i}.json"
              if os.path.exists(filename):
                  with open(filename, "r", encoding="utf-8") as f:
                      try: merged_failed.extend(json.load(f))
                      except Exception: pass

          unique_failed = list(dict.fromkeys(merged_failed))

          for i in range(1, 7):
              chunk = unique_failed[i-1::6]
              with open(f"/tmp/step2_queue_{i}.json", "w") as f:
                  json.dump(chunk, f)

          print(f"Code Step 2 distribuite con {len(unique_failed)} target da recuperare con CloakBrowser.")
          EOF
          echo "::endgroup::"
          python -u m2_step2_setup.py

      - name: Creazione Script Python - STEP 2 (Async CloakBrowser, identico alla baseline)
        run: |
          echo "::group::Scrittura m2_step2.py"
          cat << 'EOF' > m2_step2.py
          import asyncio
          import time
          import sys
          import random
          import os
          import json
          from urllib.parse import urlparse, parse_qs
          from curl_cffi import requests
          from cloakbrowser import launch_persistent_context_async
          from bs4 import BeautifulSoup
          from extraction_utils import html_to_clean_markdown

          if len(sys.argv) < 2: sys.exit(1)
          node_id = int(sys.argv[1])
          INITIAL_PORT = 40000 + node_id

          SCRAPED_CONTENT_PATH = f"scraped_content_node_{node_id}.jsonl"

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p', 'find_desc']:
                      if param in queries: return queries[param][0]
              except: pass
              return default

          def pubblica_contenuto_scrapato(source_url, testo_markdown, step_label):
              try:
                  riga = json.dumps({
                      "source_url": source_url,
                      "testo_markdown": testo_markdown,
                      "node_id": node_id,
                      "step": step_label
                  }, ensure_ascii=False)
                  with open(SCRAPED_CONTENT_PATH, "a", encoding="utf-8") as f:
                      f.write(riga + "\n")
                      f.flush()
              except Exception as e:
                  print(f"[NODO {node_id}] Errore pubblicazione per l'estrattore: {e}", flush=True)

          async def main():
              queue_file = f"/tmp/step2_queue_{node_id}.json"
              if not os.path.exists(queue_file): return

              with open(queue_file, "r") as f: targets = json.load(f)
              if not targets:
                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f: f.write("")
                  return

              # Verifica rapida e leggera che il proxy sia vivo PRIMA di avviare
              # l'intero browser: se lo slot WARP non si e' mai registrato (nodo
              # escluso in precedenza), evita di sprecare tempo dentro Playwright
              # con un proxy fantasma.
              proxy_vivo = False
              try:
                  test_session = requests.Session(impersonate="chrome120")
                  test_session.proxies = {"http": f"socks5h://127.0.0.1:{INITIAL_PORT}", "https": f"socks5h://127.0.0.1:{INITIAL_PORT}"}
                  resp = test_session.get("https://api64.ipify.org?format=json", timeout=6)
                  if resp.status_code == 200:
                      proxy_vivo = True
              except Exception:
                  pass

              if not proxy_vivo:
                  print(f"[NODO {node_id}] Proxy sulla porta {INITIAL_PORT} non raggiungibile: "
                        f"slot WARP non registrato per questo nodo. Salto lo Step 2.", flush=True)
                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                      f.write(f"\n{'#'*60}\nNODO {node_id} - STEP 2 SALTATO (proxy WARP non disponibile)\n{'#'*60}\n")
                  return

              home_dir = os.path.expanduser("~")
              profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2")
              windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")

              base_args = [
                  "--no-sandbox",
                  "--disable-dev-shm-usage",
                  f"--fingerprint={random.randint(100000, 999999)}",
                  "--fingerprint-storage-quota=5000",
                  "--fingerprint-platform=linux"
              ]

              print(f"[NODO {node_id}] Avvio singola sessione Persistente (Warmup + Scraping)...", flush=True)
              try:
                  context = await launch_persistent_context_async(
                      profile_dir,
                      headless=False,
                      humanize=True,
                      proxy=f"socks5://127.0.0.1:{INITIAL_PORT}",
                      geoip=True,
                      args=base_args
                  )
                  page = await context.new_page()

                  await page.goto("https://en.wikipedia.org/wiki/Main_Page", wait_until="domcontentloaded", timeout=25000)
                  await asyncio.sleep(1)
                  await page.goto("https://www.yelp.com/", wait_until="domcontentloaded", timeout=25000)
                  await asyncio.sleep(2)

              except Exception as e:
                  print(f"[NODO {node_id}] Errore critico avvio Browser: {e}")
                  return

              results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 2 (Fallback)\n{'#'*60}\n"

              for url in targets:
                  print(f"[NODO {node_id}] Recupero Avanzato: {url}", flush=True)
                  try:
                      query_to_search = get_query_from_url(url)

                      if "bing.com" in url:
                          await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.5, 4.0))
                          try:
                              search_box = page.locator("textarea[name='q'], input[name='q']").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                      elif "startpage.com" in url:
                          await page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.0, 3.5))
                          try:
                              search_box = page.locator("input#q").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                      elif "html.duckduckgo.com" in url:
                          await page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.0, 3.5))
                          try:
                              search_box = page.locator("input[name=q]").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                      else:
                          await page.goto(url, wait_until="domcontentloaded", timeout=40000)

                      try: await page.wait_for_load_state("networkidle", timeout=12000)
                      except: pass

                      await asyncio.sleep(6)

                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(1)
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(2)

                      raw_html = await page.content()
                      soup = BeautifulSoup(raw_html, 'html.parser')

                      title_blocked = False
                      title_reason = ""
                      if soup.title and soup.title.string:
                          title_low = soup.title.string.strip().lower()
                          waf_titles = ["just a moment", "attention required", "access denied",
                                        "checking your browser", "robot challenge screen"]
                          for wt in waf_titles:
                              if wt in title_low:
                                  title_blocked = True
                                  title_reason = f"WAF nel titolo: {wt}"
                                  break

                      text_full = html_to_clean_markdown(raw_html, url)
                      text_lower_full = text_full.lower()

                      blocking_indicators = [
                          "just a moment", "are you a robot", "prove your humanity",
                          "captcha verification", "please enter in the characters you see below",
                          "access is forbidden", "access to this page is forbidden", "challenge-platform",
                          "we've detected unusual activity",
                          "robot challenge screen", "checking the site connection security",
                          "unusual traffic from your computer network"
                      ]
                      is_blocked = title_blocked or any(b in text_lower_full for b in blocking_indicators)

                      if len(text_full) > 300 and not is_blocked:
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO ESTRATTO:\n{text_full}\n"
                          print(f"[NODO {node_id}] -> Recuperato con Successo!", flush=True)
                          pubblica_contenuto_scrapato(url, text_full, "step2")
                      else:
                          motivo = title_reason if title_blocked else "Blocco WAF/Captcha o contenuto insufficiente"
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nFALLITO ({motivo})\n"
                          print(f"[NODO {node_id}] -> Fallito: {motivo}", flush=True)

                  except Exception as e:
                      print(f"[NODO {node_id}] -> Errore esecuzione: {e}", flush=True)
                      results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nERRORE: {e}\n"

                  await asyncio.sleep(random.uniform(4.0, 7.0))

              try: await context.close()
              except: pass

              with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                  f.write(results)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          echo "::endgroup::"

      - name: Esecuzione Scraping Parallelo - STEP 2 (Fallback CloakBrowser)
        if: always()
        run: |
          if [ ! -f "m2_step2.py" ]; then
            echo "::warning::m2_step2.py non trovato: un passo precedente (probabilmente il setup WARP Step 2) e' fallito. Salto lo scraping Step 2."
            exit 0
          fi

          echo 'Avvio processi paralleli per STEP 2 sui target falliti...'
          touch node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log
          tail -q -f node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log &
          TAIL_PID=$!

          PIDS=()
          for i in {1..6}; do
            python -u m2_step2.py $i > node${i}_step2.log 2>&1 &
            PIDS+=($!)
            sleep 1.5
          done

          wait "${PIDS[@]}"
          kill $TAIL_PID || true

          for i in {1..6}; do
            docker rm -f "warp_step2_slot${i}" || true
          done

          touch output_node_1_step1.txt output_node_1_step2.txt \
                output_node_2_step1.txt output_node_2_step2.txt \
                output_node_3_step1.txt output_node_3_step2.txt \
                output_node_4_step1.txt output_node_4_step2.txt \
                output_node_5_step1.txt output_node_5_step2.txt \
                output_node_6_step1.txt output_node_6_step2.txt

          cat output_node_1_step1.txt output_node_1_step2.txt \
              output_node_2_step1.txt output_node_2_step2.txt \
              output_node_3_step1.txt output_node_3_step2.txt \
              output_node_4_step1.txt output_node_4_step2.txt \
              output_node_5_step1.txt output_node_5_step2.txt \
              output_node_6_step1.txt output_node_6_step2.txt > output_macchina2_cdp.txt

      - name: Attesa Coda Residua Estrattore Nugget (segnale esplicito di fine scraping)
        if: always()
        run: |
          touch scraping_completato.flag
          echo "Segnale di fine scraping inviato all'estrattore."

          if [ -f estrattore_nugget.pid ]; then
            PID=$(cat estrattore_nugget.pid)
            echo "Attendo la chiusura naturale del processo estrattore (PID $PID), max 90s..."
            for i in {1..90}; do
              if ! kill -0 "$PID" 2>/dev/null; then
                echo "Processo estrattore terminato naturalmente dopo ${i}s."
                break
              fi
              sleep 1
            done
            if kill -0 "$PID" 2>/dev/null; then
              echo "Timeout di sicurezza raggiunto (90s dopo il segnale): chiudo forzatamente il processo estrattore residuo."
              kill "$PID" 2>/dev/null || true
            fi
          fi
          touch nuggets_estrattore.jsonl
          echo "--- log estrattore nugget ---"
          cat estrattore_nugget.log || true

      - name: Merge Nugget Finale (JSONL -> JSON strutturato deduplicato)
        if: always()
        run: |
          echo "::group::Scrittura merge_nuggets.py"
          cat << 'EOF' > merge_nuggets.py
          import json
          import os
          import glob

          jsonl_files = sorted(glob.glob("nuggets_estrattore*.jsonl"))

          merged_nuggets = []
          per_file_stats = {}

          for filename in jsonl_files:
              count = 0
              corrotte = 0
              try:
                  with open(filename, "r", encoding="utf-8") as f:
                      for riga in f:
                          riga = riga.strip()
                          if not riga:
                              continue
                          try:
                              nugget = json.loads(riga)
                              merged_nuggets.append(nugget)
                              count += 1
                          except json.JSONDecodeError:
                              corrotte += 1
              except Exception as e:
                  print(f"Errore lettura {filename}: {e}", flush=True)

              per_file_stats[filename] = count
              if corrotte:
                  print(f"{filename}: {corrotte} riga/e corrotta/e scartata/e", flush=True)

          seen = set()
          nuggets_deduplicati = []
          for n in merged_nuggets:
              fact_norm = (n.get("fact") or "").strip().lower()
              url_norm = (n.get("source_url") or "").strip().lower()
              key = (fact_norm, url_norm)
              if key in seen:
                  continue
              seen.add(key)
              nuggets_deduplicati.append(n)

          confidence_counts = {"high": 0, "medium": 0, "low": 0}
          for n in nuggets_deduplicati:
              c = n.get("confidence", "low")
              if c in confidence_counts:
                  confidence_counts[c] += 1

          output_finale = {
              "stats": {
                  "file_jsonl_trovati": len(jsonl_files),
                  "totale_nugget_grezzi": len(merged_nuggets),
                  "totale_nugget_deduplicati": len(nuggets_deduplicati),
                  "per_file": per_file_stats,
                  "per_confidence": confidence_counts
              },
              "nuggets": nuggets_deduplicati
          }

          with open("nuggets_finale.json", "w", encoding="utf-8") as f:
              json.dump(output_finale, f, indent=2, ensure_ascii=False)

          print(f"Merge completato: {len(nuggets_deduplicati)} nugget unici "
                f"salvati in nuggets_finale.json", flush=True)
          print(f"Distribuzione confidence: {confidence_counts}", flush=True)
          EOF
          echo "::endgroup::"
          python -u merge_nuggets.py

      - name: Upload Artifact Macchina 2 (Testo Grezzo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt

      - name: Upload Artifact Nugget (JSON Strutturato)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nuggets_Macchina2
          path: nuggets_finale.json
