"""
scraper.py — USS Ultimate Stealth Scraper

Discovery layer: esegue ricerche su Startpage + DuckDuckGo attraverso
5 nodi Cloudflare WARP e raccoglie URL unici.

Output: raw_urls.json nella directory corrente.
Formato: lista di oggetti {"url": ..., "query": ..., "engine": ...}

I log vengono scritti su stderr (visibili in GitHub Actions).
raw_urls.json viene scritto su disco (non su stdout) per evitare
qualsiasi problema di buffering con redirect shell.
"""

import json
import re
import sys
import time
import random
import threading
import subprocess
from pathlib import Path
from urllib.parse import urlparse, urlunparse, parse_qsl, urlencode, unquote, quote
from concurrent.futures import ThreadPoolExecutor, as_completed
from curl_cffi import requests


# ==========================================
# CORE: LOGGING & CLEANUP
# ==========================================

def log(message: str):
    sys.stderr.write(message + "\n")
    sys.stderr.flush()


def clean_url(url: str) -> str:
    try:
        parsed = urlparse(url)
        query_params = parse_qsl(parsed.query)
        filtered_params = [
            (k, v) for k, v in query_params
            if k.lower() not in ["srsltid", "gclid", "fbclid"]
            and not k.lower().startswith("utm_")
        ]
        new_query = urlencode(filtered_params)
        return urlunparse((parsed.scheme, parsed.netloc, parsed.path, parsed.params, new_query, parsed.fragment))
    except Exception:
        return url


def normalize_url(url: str) -> str:
    """Normalizza URL per deduplicazione: lowercase, rimuove www, trailing slash, ordina params."""
    try:
        url_lower = url.lower().rstrip("/")
        parsed = urlparse(url_lower)
        netloc = parsed.netloc
        if netloc.startswith("www."):
            netloc = netloc[4:]
        scheme = "https"
        params = sorted(parse_qsl(parsed.query))
        return urlunparse((scheme, netloc, parsed.path, "", urlencode(params), ""))
    except Exception:
        return url


# ==========================================
# ANTI-BOT: HUMAN MIMICRY (GAUSSIAN SLEEP)
# ==========================================

def human_sleep(mean: float, std_dev: float):
    """Genera un ritardo realistico usando una distribuzione a campana (Gaussiana)."""
    sleep_time = max(0.5, random.gauss(mean, std_dev))
    time.sleep(sleep_time)


# ==========================================
# ENGINE: SELF-HEALING PROXY POOL
# ==========================================

class ProxyPool:
    def __init__(self, ports):
        self.ports = ports
        self.active_ports = set(ports)
        self.lock = threading.Lock()

    def get_proxy(self):
        with self.lock:
            if not self.active_ports:
                return None
            return random.choice(list(self.active_ports))

    def mark_sick_and_heal(self, port):
        with self.lock:
            if port in self.active_ports:
                self.active_ports.remove(port)
                log(f"     [PROXY POOL] ⚠️ Porta {port} bruciata. Messa in quarantena. Auto-cura in corso...")
                threading.Thread(target=self._heal_proxy_background, args=(port,), daemon=True).start()

    def _heal_proxy_background(self, port):
        warp_id = port - 1080
        container = f"warp_{warp_id}"
        try:
            subprocess.run(["docker", "restart", container], capture_output=True, text=True, timeout=15)
            time.sleep(6)
            with self.lock:
                self.active_ports.add(port)
                log(f"     [PROXY POOL] ♻️ Auto-cura completata. Porta {port} reintegrata nel pool.")
        except Exception:
            log(f"     [PROXY POOL] ❌ Fallimento critico riavvio porta {port}. Nodo perso definitivamente.")


# Pool globale: 5 nodi WARP
PROXY_POOL = ProxyPool([1081, 1082, 1083, 1084, 1085])

# Semaforo anti-burst: impedisce ai thread di interrogare Startpage nello stesso istante
STARTPAGE_LOCK = threading.Lock()

ACCEPT_LANGUAGES = [
    "it-IT,it;q=0.9,en-US;q=0.8,en;q=0.7",
    "it-IT,it;q=0.9",
    "en-US,en;q=0.9,it;q=0.8",
    "it,en-US;q=0.9,en;q=0.8",
    "it-IT,it;q=0.8,en;q=0.6",
    "en-GB,en;q=0.9",
    "en-US,en;q=0.9",
]

BROWSER_PROFILES = {
    "chrome": {
        "impersonate": "chrome120",
        "ua": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
        "accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8",
    },
    "edge": {
        "impersonate": "chrome120",
        "ua": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36 Edg/120.0.0.0",
        "accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8",
    },
    "safari": {
        "impersonate": "safari17_0",
        "ua": "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_0) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Safari/605.1.15",
        "accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
    },
}


def get_minimal_headers(browser: str) -> dict:
    profile = BROWSER_PROFILES[browser]
    return {
        "user-agent": profile["ua"],
        "accept": profile["accept"],
        "accept-language": random.choice(ACCEPT_LANGUAGES),
        "accept-encoding": "gzip, deflate, br",
    }


# ==========================================
# WARM-UP SESSIONE
# ==========================================

def warm_up_session(session: requests.Session, browser: str):
    headers = get_minimal_headers(browser)
    try:
        session.get("https://www.startpage.com/", headers=headers, timeout=6.0)
        human_sleep(mean=1.2, std_dev=0.3)
        session.get("https://www.startpage.com/en/", headers=headers, timeout=6.0)
    except Exception:
        pass


# ==========================================
# MOTORI DI RICERCA
# ==========================================

def fetch_startpage(session: requests.Session, query: str, browser: str) -> list[str] | None:
    headers = get_minimal_headers(browser)
    human_sleep(mean=1.2, std_dev=0.4)

    with STARTPAGE_LOCK:
        try:
            response_get = session.get("https://www.startpage.com/", headers=headers, timeout=8.0)
            if response_get.status_code != 200:
                return None
            sc_match = (
                re.search(r'name=["\']sc["\'][^>]*value=["\']([^"\']+)["\']', response_get.text, re.IGNORECASE)
                or re.search(r'value=["\']([^"\']+)["\'][^>]*name=["\']sc["\']', response_get.text, re.IGNORECASE)
            )
            sc_token = sc_match.group(1) if sc_match else ""
        except Exception:
            return None

        time.sleep(random.uniform(0.8, 1.5))

        payload = {
            "query": query,
            "sc": sc_token,
            "cat": "web",
            "t": "device",
            "language": "italiano",
            "lui": "english",
            "qadf": "moderate",
        }

        headers_post = headers.copy()
        headers_post.update({
            "origin": "https://www.startpage.com",
            "referer": "https://www.startpage.com/",
            "content-type": "application/x-www-form-urlencoded",
            "sec-fetch-dest": "empty",
            "sec-fetch-mode": "cors",
            "sec-fetch-site": "same-origin",
        })

        try:
            response_post = session.post(
                "https://www.startpage.com/sp/search",
                headers=headers_post,
                data=payload,
                timeout=8.0,
            )
            if (
                response_post.status_code != 200
                or "captcha" in response_post.text.lower()
                or "sorry" in response_post.text.lower()
            ):
                return None

            links = []
            data = extract_react_json(response_post.text)
            if data:
                mainline = (
                    data.get("render", {})
                    .get("presenter", {})
                    .get("regions", {})
                    .get("mainline", [])
                )
                for section in mainline:
                    if section.get("display_type") == "web-google" and "results" in section:
                        for item in section["results"]:
                            if "clickUrl" in item:
                                c = clean_url(item["clickUrl"].strip())
                                if c:
                                    links.append(c)
            return links
        except Exception:
            return None


def fetch_duckduckgo(session: requests.Session, query: str, browser: str) -> list[str] | None:
    headers = get_minimal_headers(browser)
    url = f"https://html.duckduckgo.com/html/?q={quote(query)}"
    try:
        response = session.get(url, headers=headers, timeout=8.0)
        if response.status_code != 200 or "captcha" in response.text.lower():
            return None

        links = []
        for match in re.finditer(r'uddg=([^&"\'>\s]+)', response.text):
            try:
                real_url = unquote(match.group(1))
                if real_url.startswith("http") and "duckduckgo.com" not in real_url:
                    c = clean_url(real_url.strip())
                    if c:
                        links.append(c)
            except Exception:
                pass
        return links if links else None
    except Exception:
        return None


def extract_react_json(html_content: str) -> dict | None:
    start_str = '{"render":'
    idx = html_content.find(start_str)
    if idx == -1:
        return None
    brace_count, json_end = 0, -1
    for i in range(idx, len(html_content)):
        if html_content[i] == "{":
            brace_count += 1
        elif html_content[i] == "}":
            brace_count -= 1
        if brace_count == 0:
            json_end = i
            break
    if json_end == -1:
        return None
    try:
        return json.loads(html_content[idx : json_end + 1])
    except Exception:
        return None


# ==========================================
# WORKER PROCESS
# ==========================================

def process_single_query(
    query: str, query_index: int, total_queries: int
) -> list[dict]:
    """
    Processa una singola query su Startpage + DuckDuckGo.
    Restituisce lista di dict {url, query, engine} con metadata di provenienza.
    """
    max_retries = 3

    for attempt in range(1, max_retries + 1):
        port = PROXY_POOL.get_proxy()
        if not port:
            log(f"[{query_index:02d}/{total_queries}] Nessun proxy sano disponibile. Attesa...")
            human_sleep(3.0, 0.5)
            continue

        browser = random.choice(["chrome", "edge", "safari"])
        impersonate_target = BROWSER_PROFILES[browser]["impersonate"]
        proxies = {
            "http": f"socks5h://127.0.0.1:{port}",
            "https": f"socks5h://127.0.0.1:{port}",
        }

        session = requests.Session(impersonate=impersonate_target, proxies=proxies)

        log(f"[{query_index:02d}/{total_queries}] (Port {port}, {impersonate_target}) {query} (Tentativo {attempt})")

        warm_up_session(session, browser)
        human_sleep(mean=1.0, std_dev=0.3)

        sp_links = fetch_startpage(session, query, browser)
        ddg_links = fetch_duckduckgo(session, query, browser)

        # Shadow ban detection
        if sp_links is not None and len(sp_links) == 0:
            sp_links = None
        if ddg_links is not None and len(ddg_links) == 0:
            ddg_links = None

        if sp_links is not None:
            log(f"  └─ [OK] Startpage: {len(sp_links)} risultati")
        else:
            log(f"  └─ [WARN] Startpage bloccato o shadow-ban.")

        if ddg_links is not None:
            log(f"  └─ [OK] DuckDuckGo: {len(ddg_links)} risultati")
        else:
            log(f"  └─ [WARN] DuckDuckGo bloccato o shadow-ban.")

        # Se entrambi falliscono: proxy bruciato → kill & retry
        if sp_links is None and ddg_links is None:
            PROXY_POOL.mark_sick_and_heal(port)
            human_sleep(mean=2.5, std_dev=0.5)
            continue

        # Almeno uno ha funzionato: costruiamo i record con metadata
        result_items: list[dict] = []

        # Tagga le sorgenti
        sp_set = set(sp_links or [])
        ddg_set = set(ddg_links or [])
        all_urls = sp_set | ddg_set

        for url in all_urls:
            if url in sp_set and url in ddg_set:
                engine = "both"
            elif url in sp_set:
                engine = "startpage"
            else:
                engine = "duckduckgo"
            result_items.append({"url": url, "query": query, "engine": engine})

        human_sleep(mean=3.5, std_dev=0.8)
        return result_items

    log(f"[{query_index:02d}/{total_queries}] ❌ FALLIMENTO DEFINITIVO: {query}")
    return []


# ==========================================
# QUERY GENERATOR
# ==========================================

def generate_queries() -> list[str]:
    """
    Genera le query di ricerca.
    Personalizza questa funzione per ogni progetto editoriale.
    """
    locs = ["Trastevere", "Testaccio", "Monti", "Prati", "Campo de Fiori"]
    queries = []
    for loc in locs:
        queries.extend([
            f"best restaurants in {loc} Rome",
            f"best restaurants in {loc} Rome reviews blog",
            f"where to eat in {loc} Rome local recommendations",
            f"best traditional trattorias and osterias in {loc} Rome",
            f"cheap eats and street food in {loc} Rome",
            f"hidden gem restaurants in {loc} Rome",
            f"best historic restaurants in {loc} Rome",
            f"best pasta and pizza in {loc} Rome favorites",
            f"authentic local restaurants {loc} Rome",
            f"where do locals eat in {loc} Rome",
        ])
    return queries


# ==========================================
# MAIN
# ==========================================

def main():
    OUTPUT_FILE = Path("raw_urls.json")

    log("====================================================")
    log("AVVIO SCRAPER ULTIMATE - SEMAFORO ANTI-BURST & AUTO-CURA")
    log("====================================================")

    queries = generate_queries()
    all_link_items: list[dict] = []

    # max_workers=4 su 5 proxy: manteniamo 1 proxy libero per auto-cura in background
    with ThreadPoolExecutor(max_workers=4) as executor:
        futures = {
            executor.submit(process_single_query, q, idx + 1, len(queries)): q
            for idx, q in enumerate(queries)
        }
        for future in as_completed(futures):
            try:
                items = future.result()
                all_link_items.extend(items)
            except Exception as e:
                log(f"[CRITICAL ERROR] Fallimento nel ThreadPool: {e}")

    # Deduplicazione con normalizzazione URL
    seen_normalized: set[str] = set()
    deduped_items: list[dict] = []

    for item in all_link_items:
        raw_url = item.get("url", "")
        if not raw_url:
            continue
        # Rimuove caratteri invisibili
        cleaned = re.sub(r"[\s\u200b\u200c\u200d\ufeff]+", "", raw_url).strip()
        if not cleaned.startswith("http") or len(cleaned) < 12:
            continue

        norm = normalize_url(cleaned)
        if norm not in seen_normalized:
            seen_normalized.add(norm)
            deduped_items.append({
                "url": cleaned,
                "query": item.get("query"),
                "engine": item.get("engine"),
            })

    # Ordina per URL per output deterministico
    deduped_items.sort(key=lambda x: x["url"])

    # Scrittura su file (NON su stdout — evita problemi di buffering con redirect shell)
    OUTPUT_FILE.write_text(
        json.dumps(deduped_items, ensure_ascii=False, indent=2),
        encoding="utf-8",
    )

    log("")
    log("================================================")
    log(f"=== REPORT FINALE: {len(deduped_items)} URL UNICI ESTRATTI ===")
    log("================================================")
    for idx, item in enumerate(deduped_items, 1):
        log(f"  {idx:03d}. [{item['engine']:10s}] {item['url']}")
    log("================================================")
    log(f"Output scritto in: {OUTPUT_FILE.resolve()}")


if __name__ == "__main__":
    main()
