name: WARP Ufficiale - Ottimizzazione Tempo (4-6s fisso)

on:
  workflow_dispatch:

env:
  NODI_NECESSARI: 6
  BUDGET_TOTALE_SECONDI: 90
  DELAY_MIN: 1
  DELAY_MAX: 2

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pull immagine
        run: docker pull caomingjun/warp:latest

      - name: Registrazione con polling aggressivo e timing dettagliato per nodo
        run: |
          set -o pipefail
          START_TS=$(date +%s)

          declare -A porta_di_nodo
          declare -A ipv4_di_nodo
          declare -A ipv6_di_nodo
          declare -A ipv4_visti
          declare -A ipv6_visti
          NODI_OK=()
          CONTATORE_GLOBALE=0
          PORTA_BASE=1080

          tempo_residuo() {
            local elapsed=$(( $(date +%s) - START_TS ))
            echo $(( BUDGET_TOTALE_SECONDI - elapsed ))
          }

          # Funzione in background 100% silenziosa. Comunica solo tramite file di esito.
          avvia_e_verifica_nodo() {
            local id=$1
            local port=$2
            local out_file=$3
            local ip4=""
            local ip6=""
            local t_pronto="0"
            local err_msg=""
            local t_start
            t_start=$(date +%s)

            trap 'echo "${id}|${port}|${ip4}|${ip6}|${t_pronto}|${err_msg}" > "$out_file"' EXIT

            # Rimuovi eventuali container residui con lo stesso nome
            docker rm -f "warp_$id" > /dev/null 2>&1 || true

            # Avvia il container catturando l'eventuale errore di sistema
            local run_out
            if ! run_out=$(docker run -d \
              --name "warp_$id" \
              --cap-add NET_ADMIN \
              --cap-add MKNOD \
              --cap-add AUDIT_WRITE \
              --sysctl net.ipv6.conf.all.disable_ipv6=0 \
              --sysctl net.ipv4.conf.all.src_valid_mark=1 \
              -e WARP_SLEEP=1 \
              -p "$port":1080 \
              caomingjun/warp:latest 2>&1); then
              err_msg="Docker run fallito: $(echo "$run_out" | tr -d '\r\n')"
              return 0
            fi

            local pronto=0
            local trace=""
            for _ in $(seq 1 60); do
              trace=$(curl -s --max-time 1 -x "socks5h://127.0.0.1:$port" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null || true)
              if echo "$trace" | grep -q "warp=on" 2>/dev/null; then
                pronto=1
                t_pronto=$(( $(date +%s) - t_start ))
                break
              fi
              sleep 0.5
            done

            if [ "$pronto" -eq 1 ]; then
              # Ottieni IPv4 e IPv6 in parallelo per azzerare i tempi morti di curl
              (curl -s --max-time 3 -x "socks5h://127.0.0.1:$port" https://ipv4.icanhazip.com 2>/dev/null | tr -d '[:space:]' > "/tmp/ip4_${id}") &
              (curl -s --max-time 3 -x "socks5h://127.0.0.1:$port" https://ipv6.icanhazip.com 2>/dev/null | tr -d '[:space:]' > "/tmp/ip6_${id}") &
              wait

              ip4=$(cat "/tmp/ip4_${id}" 2>/dev/null || true)
              ip6=$(cat "/tmp/ip6_${id}" 2>/dev/null || true)
              rm -f "/tmp/ip4_${id}" "/tmp/ip6_${id}"

              # Fallback IPv4 tramite trace se icanhazip fallisce
              if [ -z "$ip4" ]; then
                ip4=$(echo "$trace" | grep "^ip=" | cut -d= -f2 || true)
              fi
            else
              err_msg="Timeout WARP (warp=on non rilevato dopo 30s)"
            fi

            return 0
          }

          rimuovi_nodo() {
            local id=$1
            docker rm -f "warp_$id" > /dev/null 2>&1 || true
          }

          # Legge un file esito a 6 campi pipe-separated in 6 variabili globali
          leggi_esito() {
            local esito_file=$1
            IFS='|' read -r PARSED_ID PARSED_PORT PARSED_IP4 PARSED_IP6 PARSED_TPRONTO PARSED_ERR < "$esito_file"
          }

          # Funzione centralizzata per analizzare gli esiti in modo sincrono e ordinato
          elabora_esiti() {
            local file_list=("$@")
            for esito_file in "${file_list[@]}"; do
              if [ ! -f "$esito_file" ]; then
                local filename
                filename=$(basename "$esito_file")
                local id="${filename#esito_}"
                id="${id%.txt}"
                echo "  [$id] FALLITO: Nessun report generato dal nodo"
                rimuovi_nodo "$id"
                continue
              fi

              leggi_esito "$esito_file"

              if [ -n "$PARSED_ERR" ]; then
                echo "  [$PARSED_ID] Porta $PARSED_PORT: FALLITO (${PARSED_ERR})"
                rimuovi_nodo "$PARSED_ID"
                continue
              fi

              if [ -z "$PARSED_IP4" ] || [ "$PARSED_IP4" = "NESSUNO" ]; then
                echo "  [$PARSED_ID] Porta $PARSED_PORT: FALLITO (IPv4 non ottenuto)"
                rimuovi_nodo "$PARSED_ID"
                continue
              fi

              if [ -z "$PARSED_IP6" ] || [ "$PARSED_IP6" = "NESSUNO" ]; then
                echo "  [$PARSED_ID] Porta $PARSED_PORT: FALLITO (IPv6 non ottenuto)"
                rimuovi_nodo "$PARSED_ID"
                continue
              fi

              if [ -n "${ipv4_visti[$PARSED_IP4]:-}" ]; then
                echo "  [$PARSED_ID] Porta $PARSED_PORT: FALLITO (IPv4 duplicato con nodo ${ipv4_visti[$PARSED_IP4]})"
                rimuovi_nodo "$PARSED_ID"
                continue
              fi

              if [ -n "${ipv6_visti[$PARSED_IP6]:-}" ]; then
                echo "  [$PARSED_ID] Porta $PARSED_PORT: FALLITO (IPv6 duplicato con nodo ${ipv6_visti[$PARSED_IP6]})"
                rimuovi_nodo "$PARSED_ID"
                continue
              fi

              # Superati tutti i controlli: nodo valido
              ipv4_visti[$PARSED_IP4]=$PARSED_ID
              ipv6_visti[$PARSED_IP6]=$PARSED_ID
              ipv4_di_nodo[$PARSED_ID]=$PARSED_IP4
              ipv6_di_nodo[$PARSED_ID]=$PARSED_IP6
              NODI_OK+=("$PARSED_ID")
              echo "  [$PARSED_ID] Porta $PARSED_PORT: OK (Pronto in ${PARSED_TPRONTO}s | IPv4: $PARSED_IP4 | IPv6: $PARSED_IP6)"
            done
          }

          echo "=== ONDATA 1: Avvio di $NODI_NECESSARI nodi (ritardo: ${DELAY_MIN}-${DELAY_MAX}s) ==="
          ondata1_pids=()
          ondata1_files=()

          for i in $(seq 1 "$NODI_NECESSARI"); do
            CONTATORE_GLOBALE=$((CONTATORE_GLOBALE + 1))
            id="n$CONTATORE_GLOBALE"
            port=$((PORTA_BASE + CONTATORE_GLOBALE))
            porta_di_nodo[$id]=$port
            out="/tmp/esito_${id}.txt"
            ondata1_files+=("$out")

            avvia_e_verifica_nodo "$id" "$port" "$out" &
            ondata1_pids+=($!)

            if [ "$i" -lt "$NODI_NECESSARI" ]; then
              DELAY=$(awk -v min="$DELAY_MIN" -v max="$DELAY_MAX" 'BEGIN{srand('"$i"'+systime()); print min+rand()*(max-min)}')
              echo "  [$id] Container avviato su porta $port. Prossimo nodo tra ${DELAY}s..."
              sleep "$DELAY"
            else
              echo "  [$id] Container avviato su porta $port. Ultimo nodo dell'ondata 1."
            fi
          done

          echo ""
          echo "Attendo che tutti i nodi completino la verifica (polling attivo)..."
          for pid in "${ondata1_pids[@]}"; do
            wait "$pid" 2>/dev/null || true
          done

          echo ""
          echo "=== ESITI ONDATA 1 ==="
          elabora_esiti "${ondata1_files[@]}"

          echo ""
          echo "Nodi validi dopo ondata 1: ${#NODI_OK[@]}/$NODI_NECESSARI"
          echo "Tempo residuo: $(tempo_residuo)s"

          ONDATA=1
          while [ "${#NODI_OK[@]}" -lt "$NODI_NECESSARI" ]; do
            RESIDUO=$(tempo_residuo)
            if [ "$RESIDUO" -le 10 ]; then
              echo ""
              echo "Tempo residuo insufficiente per un altro retry (${RESIDUO}s). Arresto."
              break
            fi

            ONDATA=$((ONDATA + 1))
            MANCANTI=$((NODI_NECESSARI - ${#NODI_OK[@]}))
            echo ""
            echo "=== ONDATA $ONDATA: Avvio di $MANCANTI nodi sostitutivi (tempo residuo: ${RESIDUO}s) ==="

            retry_pids=()
            retry_files=()

            for i in $(seq 1 "$MANCANTI"); do
              CONTATORE_GLOBALE=$((CONTATORE_GLOBALE + 1))
              id="n$CONTATORE_GLOBALE"
              port=$((PORTA_BASE + CONTATORE_GLOBALE))
              porta_di_nodo[$id]=$port
              out="/tmp/esito_${id}.txt"
              retry_files+=("$out")

              avvia_e_verifica_nodo "$id" "$port" "$out" &
              retry_pids+=($!)

              if [ "$i" -lt "$MANCANTI" ]; then
                DELAY=$(awk -v min="$DELAY_MIN" -v max="$DELAY_MAX" 'BEGIN{srand('"$CONTATORE_GLOBALE"'+systime()); print min+rand()*(max-min)}')
                echo "  [$id] Container avviato su porta $port. Prossimo nodo tra ${DELAY}s..."
                sleep "$DELAY"
              else
                echo "  [$id] Container avviato su porta $port. Ultimo nodo dell'ondata $ONDATA."
              fi
            done

            echo ""
            echo "Attendo che i nodi sostitutivi completino la verifica..."
            for pid in "${retry_pids[@]}"; do
              wait "$pid" 2>/dev/null || true
            done

            echo ""
            echo "=== ESITI ONDATA $ONDATA ==="
            elabora_esiti "${retry_files[@]}"

            echo "Nodi validi dopo ondata $ONDATA: ${#NODI_OK[@]}/$NODI_NECESSARI"
          done

          ELAPSED_FINALE=$(( $(date +%s) - START_TS ))
          echo ""
          echo "======================================================"
          echo "RISULTATO FINALE: ${#NODI_OK[@]}/$NODI_NECESSARI nodi"
          echo "Tempo impiegato: ${ELAPSED_FINALE}s (budget: ${BUDGET_TOTALE_SECONDI}s)"
          echo "======================================================"
          for id in "${NODI_OK[@]}"; do
            echo "  $id (porta ${porta_di_nodo[$id]}) -> IPv4: ${ipv4_di_nodo[$id]} | IPv6: ${ipv6_di_nodo[$id]:-N/D}"
          done

          echo ""
          UNIVOCI_V6=$(for id in "${NODI_OK[@]}"; do echo "${ipv6_di_nodo[$id]:-VUOTO}"; done | sort -u | wc -l)
          echo "=== IPv6 univoci tra i nodi selezionati: $UNIVOCI_V6 / ${#NODI_OK[@]} ==="

          if [ "${#NODI_OK[@]}" -lt "$NODI_NECESSARI" ]; then
            echo "::error::Ottenuti solo ${#NODI_OK[@]}/$NODI_NECESSARI nodi validi con IPv4 e IPv6 univoci."
            exit 1
          fi

      - name: Pulizia
        if: always()
        run: |
          docker ps -a --format '{{.Names}}' | grep '^warp_' | xargs -r docker rm -f || true
