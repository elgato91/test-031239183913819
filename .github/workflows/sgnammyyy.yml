name: Test WARP IPv4+IPv6 Separati Per Nodo

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pull immagine
        run: docker pull ghcr.io/kingcc/warproxy:latest

      - name: Avvia 6 nodi scaglionati
        run: |
          for i in 1 2 3 4 5 6; do
            PORT=$((40000 + i))
            docker run --name wp-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,1.1.1.1 \
              -d ghcr.io/kingcc/warproxy:latest

            DELAY=$(awk -v min=4 -v max=6 'BEGIN{srand('"$i"'+systime()); print min+rand()*(max-min)}')
            echo "Nodo $i avviato su porta $PORT, attendo ${DELAY}s..."
            sleep "$DELAY"
          done

          echo ""
          echo "=== Attesa registrazione (25s) ==="
          sleep 25

      - name: Misura IPv4 e IPv6 SEPARATAMENTE per ciascun nodo (protocollo forzato)
        run: |
          echo "Per ogni nodo interrogo cdn-cgi/trace forzando --ipv4 e poi --ipv6"
          echo "sulla STESSA porta SOCKS5, per vedere se il tunnel espone entrambi gli indirizzi."
          echo ""

          declare -A ipv4_di_nodo
          declare -A ipv6_di_nodo

          for i in 1 2 3 4 5 6; do
            PORT=$((40000 + i))

            IP4=$(curl -s --max-time 8 --ipv4 -x "socks5h://127.0.0.1:$PORT" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep "^ip=" | cut -d= -f2)
            IP6=$(curl -s --max-time 8 --ipv6 -x "socks5h://127.0.0.1:$PORT" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep "^ip=" | cut -d= -f2)

            ipv4_di_nodo[$i]="${IP4:-NESSUNO}"
            ipv6_di_nodo[$i]="${IP6:-NESSUNO}"

            echo "Nodo $i (porta $PORT):"
            echo "  IPv4 forzato -> ${IP4:-NESSUNO}"
            echo "  IPv6 forzato -> ${IP6:-NESSUNO}"
          done

          echo ""
          echo "=== Riepilogo IPv4 (controllo duplicati) ==="
          for i in 1 2 3 4 5 6; do
            echo "Nodo $i -> ${ipv4_di_nodo[$i]}"
          done

          echo ""
          echo "=== Riepilogo IPv6 (controllo duplicati) ==="
          for i in 1 2 3 4 5 6; do
            echo "Nodo $i -> ${ipv6_di_nodo[$i]}"
          done

          echo ""
          echo "=== Conteggio univoci ==="
          UNIVOCI_V4=$(printf '%s\n' "${ipv4_di_nodo[@]}" | sort -u | wc -l)
          UNIVOCI_V6=$(printf '%s\n' "${ipv6_di_nodo[@]}" | sort -u | wc -l)
          echo "IPv4 univoci: $UNIVOCI_V4 / 6"
          echo "IPv6 univoci: $UNIVOCI_V6 / 6"

      - name: Pulizia
        if: always()
        run: |
          for i in 1 2 3 4 5 6; do
            docker rm -f wp-$i || true
          done
