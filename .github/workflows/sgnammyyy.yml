name: Test WARP Selezione 6 Univoci

on:
  workflow_dispatch:

env:
  NODI_NECESSARI: 6
  NODI_BATCH_INIZIALE: 11
  BUDGET_TOTALE_SECONDI: 33

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pull immagine
        run: docker pull ghcr.io/kingcc/warproxy:latest

      - name: Registra batch iniziale in parallelo, seleziona 6 univoci, rincalza se serve
        run: |
          START_TS=$(date +%s)

          declare -A ip_di_nodo
          declare -A porta_di_nodo
          NEXT_PORT_OFFSET=1

          avvia_nodo() {
            local id=$1
            local port=$((40000 + NEXT_PORT_OFFSET))
            NEXT_PORT_OFFSET=$((NEXT_PORT_OFFSET + 1))
            porta_di_nodo[$id]=$port

            docker run --name wp-$id \
              --network host \
              -e SOCKS5_PORT=$port \
              -e DNS=2606:4700:4700::1111,1.1.1.1 \
              -d ghcr.io/kingcc/warproxy:latest > /dev/null
          }

          echo "=== Round 1: avvio $NODI_BATCH_INIZIALE nodi in parallelo (scaglionamento minimo) ==="
          for i in $(seq 1 $NODI_BATCH_INIZIALE); do
            avvia_nodo "$i"
            sleep 1.2
          done

          echo "Tutti i nodi del round 1 avviati. Attendo stabilizzazione tunnel (22s)..."
          sleep 22

          echo ""
          echo "=== Misura IP di uscita per ciascun nodo (parallelo) ==="
          for id in "${!porta_di_nodo[@]}"; do
            (
              port=${porta_di_nodo[$id]}
              ip=$(curl -s --max-time 8 -x socks5h://127.0.0.1:$port https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep "^ip=" | cut -d= -f2)
              echo "$id $ip" >> /tmp/risultati_ip.txt
            ) &
          done
          wait

          echo "Risultati grezzi:"
          sort -k1 -n /tmp/risultati_ip.txt

          echo ""
          echo "=== Selezione dei primi $NODI_NECESSARI nodi con IP univoco ==="
          declare -A ip_visti
          NODI_SELEZIONATI=()
          while read -r id ip; do
            [ -z "$ip" ] && continue
            if [ -z "${ip_visti[$ip]}" ]; then
              ip_visti[$ip]=1
              NODI_SELEZIONATI+=("$id")
              echo "Selezionato nodo $id -> $ip"
            fi
            if [ "${#NODI_SELEZIONATI[@]}" -ge "$NODI_NECESSARI" ]; then
              break
            fi
          done < <(sort -k1 -n /tmp/risultati_ip.txt)

          echo ""
          echo "Trovati ${#NODI_SELEZIONATI[@]}/$NODI_NECESSARI nodi con IP univoco dopo il round 1."

          ELAPSED=$(( $(date +%s) - START_TS ))
          echo "Tempo trascorso finora: ${ELAPSED}s (budget totale: ${BUDGET_TOTALE_SECONDI}s)"

          if [ "${#NODI_SELEZIONATI[@]}" -lt "$NODI_NECESSARI" ]; then
            MANCANTI=$((NODI_NECESSARI - ${#NODI_SELEZIONATI[@]}))
            TEMPO_RESIDUO=$((BUDGET_TOTALE_SECONDI - ELAPSED))
            echo ""
            echo "=== Mancano $MANCANTI nodi univoci, tempo residuo ${TEMPO_RESIDUO}s ==="

            if [ "$TEMPO_RESIDUO" -lt 8 ]; then
              echo "ATTENZIONE: tempo residuo insufficiente per un round di rincalzo affidabile. Procedo comunque nel limite del possibile."
            fi

            EXTRA=$((MANCANTI * 2))
            echo "Avvio $EXTRA nodi extra di rincalzo..."
            for i in $(seq 1 $EXTRA); do
              rid="r$i"
              avvia_nodo "$rid"
              sleep 1.0
            done

            echo "Attendo stabilizzazione rincalzo (10s)..."
            sleep 10

            > /tmp/risultati_ip_extra.txt
            for id in "${!porta_di_nodo[@]}"; do
              case "$id" in r*) : ;; *) continue ;; esac
              (
                port=${porta_di_nodo[$id]}
                ip=$(curl -s --max-time 6 -x socks5h://127.0.0.1:$port https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep "^ip=" | cut -d= -f2)
                echo "$id $ip" >> /tmp/risultati_ip_extra.txt
              ) &
            done
            wait

            echo "Risultati rincalzo:"
            cat /tmp/risultati_ip_extra.txt

            while read -r id ip; do
              [ -z "$ip" ] && continue
              if [ -z "${ip_visti[$ip]}" ]; then
                ip_visti[$ip]=1
                NODI_SELEZIONATI+=("$id")
                echo "Selezionato nodo rincalzo $id -> $ip"
              fi
              if [ "${#NODI_SELEZIONATI[@]}" -ge "$NODI_NECESSARI" ]; then
                break
              fi
            done < /tmp/risultati_ip_extra.txt
          fi

          ELAPSED_FINALE=$(( $(date +%s) - START_TS ))
          echo ""
          echo "=== RISULTATO FINALE ==="
          echo "Nodi selezionati: ${NODI_SELEZIONATI[@]}"
          echo "Totale univoci ottenuti: ${#NODI_SELEZIONATI[@]}/$NODI_NECESSARI"
          echo "Tempo totale impiegato: ${ELAPSED_FINALE}s (budget: ${BUDGET_TOTALE_SECONDI}s)"

          if [ "${#NODI_SELEZIONATI[@]}" -lt "$NODI_NECESSARI" ]; then
            echo "::error::Non è stato possibile ottenere $NODI_NECESSARI IP univoci entro il budget di tempo."
            exit 1
          fi

          if [ "$ELAPSED_FINALE" -gt "$BUDGET_TOTALE_SECONDI" ]; then
            echo "::warning::Budget di tempo superato (${ELAPSED_FINALE}s > ${BUDGET_TOTALE_SECONDI}s)"
          fi

      - name: Pulizia
        if: always()
        run: |
          docker ps -a --format '{{.Names}}' | grep '^wp-' | xargs -r docker rm -f
