name: Test WARP IPv6 Forzato

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pull immagine
        run: docker pull ghcr.io/kingcc/warproxy:latest

      - name: Avvia 6 nodi, forza endpoint IPv6, stampa IP
        run: |
          mkdir -p /tmp/warp_configs

          for i in 1 2 3 4 5 6; do
            PORT=$((40000 + i))
            CONFIG_DIR="/tmp/warp_configs/node_$i"
            mkdir -p "$CONFIG_DIR"

            docker run --name wp-$i \
              --network host \
              -v "$CONFIG_DIR:/config" \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,1.1.1.1 \
              -d ghcr.io/kingcc/warproxy:latest

            DELAY=$(awk -v min=4 -v max=6 'BEGIN{srand('"$i"'+systime()); print min+rand()*(max-min)}')
            echo "Nodo $i avviato su porta $PORT, attendo ${DELAY}s..."
            sleep "$DELAY"
          done

          echo ""
          echo "=== Attesa generazione file di config iniziale (30s) ==="
          sleep 30

          echo ""
          echo "=== Forzatura Endpoint IPv6 fisso su ciascun nodo ==="
          for i in 1 2 3 4 5 6; do
            CONFIG_DIR="/tmp/warp_configs/node_$i"
            PROFILE="$CONFIG_DIR/wgcf-profile.conf"

            if [ -f "$PROFILE" ]; then
              echo "Nodo $i: profilo trovato, sostituisco Endpoint con IPv6 fisso"
              sed -i 's/Endpoint = engage.cloudflareclient.com:2408/Endpoint = [2606:4700:d0::a29f:c001]:2408/' "$PROFILE"
              cat "$PROFILE" | grep -i endpoint
            else
              echo "Nodo $i: ATTENZIONE, wgcf-profile.conf non trovato in $CONFIG_DIR"
              ls -la "$CONFIG_DIR" || true
            fi

            echo "Riavvio container per nodo $i..."
            docker restart wp-$i
          done

          echo ""
          echo "=== Attesa ristabilimento tunnel (30s) ==="
          sleep 30

          echo ""
          echo "=== IP di uscita per nodo (dopo forzatura IPv6) ==="
          for i in 1 2 3 4 5 6; do
            PORT=$((40000 + i))
            TRACE=$(curl -s --max-time 10 -x socks5h://127.0.0.1:$PORT https://www.cloudflare.com/cdn-cgi/trace)
            IP=$(echo "$TRACE" | grep "^ip=" | cut -d= -f2)
            WARP=$(echo "$TRACE" | grep "^warp=" | cut -d= -f2)
            echo "Nodo $i (porta $PORT): IP=$IP warp=$WARP"
          done

      - name: Pulizia
        if: always()
        run: |
          for i in 1 2 3 4 5 6; do
            docker rm -f wp-$i || true
          done
          rm -rf /tmp/warp_configs
