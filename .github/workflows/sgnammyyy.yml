name: Test Architettura Scraping (Engine Blindato)

on:
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf

      - name: Installazione Dipendenze
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests
          # Installiamo unicamente le dipendenze di sistema richieste da Playwright per Chromium.
          # Come da documentazione ufficiale, CloakBrowser gestirà in autonomia il download del proprio binario stealth.
          playwright install-deps chromium

      - name: Setup Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos connect
          sleep 5

      - name: Avvio Xvfb (Virtual Display Stabile)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Creazione script Python (Macchina 2)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import requests
          from cloakbrowser import launch_context
          from bs4 import BeautifulSoup

          TARGETS = [
              "https://api64.ipify.org?format=json",
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.yelp.it/search?find_desc=roma&find_loc=Milano",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://www.booking.com/searchresults.html?ss=Rome",
              "https://www.afar.com/hotels/the-best-new-hotels-of-2026",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.glassdoor.com/Overview/Working-at-Google-EI_IE9079.11,17.htm",
              "https://alex-canter-84751.medium.com/eating-through-los-angeles-alex-canters-top-100-restaurants-for-2022-95ad5c47f5b6",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]
          results = ""

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          # 1. Recupero dinamico dei parametri geografici associati alla connessione WARP corrente
          print("Rilevamento parametri di geolocalizzazione dell'IP WARP...", flush=True)
          timezone = "UTC"
          locale = "en-US"
          try:
              # Sotto rete WARP, interroghiamo un servizio geoip per allineare browser e rete
              res = requests.get("https://ipapi.co/json/", timeout=10).json()
              timezone = res.get("timezone", "UTC")
              raw_lang = res.get("languages", "en-US")
              locale = raw_lang.split(",")[0] if raw_lang else "en-US"
              print(f"IP WARP Geolocalizzato -> Timezone: {timezone} | Locale: {locale}", flush=True)
          except Exception as e:
              print(f"Impossibile determinare la posizione geografica di WARP ({e}). Default: UTC, en-US.", flush=True)

          print("Avviando CloakBrowser con i moduli di protezione C++ attivi...", flush=True)
          
          # 2. Configurazione del contesto tramite la funzione nativa launch_context.
          # Lo stealth comportamentale (humanize) e la conformazione delle impronte sono
          # applicati direttamente dal motore C++ nativo senza l'ausilio di fragili iniezioni JS.
          context = launch_context(
              headless=False,           # Headed mode per bypassare i controlli comportamentali più rigidi
              humanize=True,            # Attiva traiettorie del mouse a curve di Bézier, timing di digitazione e scorrimento umano
              timezone=timezone,
              locale=locale,
              viewport={"width": 1920, "height": 1080},
              args=[
                  "--no-sandbox", 
                  "--disable-dev-shm-usage"
              ]
          )

          for url in TARGETS:
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"Analizzando: {url}", flush=True)
              try:
                  page = context.new_page()

                  # Simulazione navigazione umana per Startpage
                  if "startpage.com/sp/search" in url:
                      page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(2)
                      # Con humanize=True, page.type simula la digitazione carattere per carattere con pause realistiche
                      page.type("input#q", "migliore carbonara roma", delay=150)
                      page.keyboard.press("Enter")
                  
                  # Simulazione navigazione umana per DuckDuckGo
                  elif "html.duckduckgo.com/html/" in url:
                      page.goto("https://duckduckgo.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(2)
                      page.type("input[name=q]", "migliore carbonara roma", delay=150)
                      page.keyboard.press("Enter")
                      
                  else:
                      page.goto(url, wait_until="domcontentloaded", timeout=25000)
                  
                  # Scorrimento realistico della pagina
                  try:
                      for _ in range(3):
                          page.mouse.wheel(0, 300)
                          time.sleep(1)
                  except:
                      pass

                  # Tempi di attesa per permettere ai test di completare le analisi
                  if "creepjs" in url:
                      time.sleep(20) 
                  elif "pixelscan" in url:
                      time.sleep(10)
                  elif any(test in url for test in ["sannysoft", "browserleaks", "incolumitas", "deviceinfo"]):
                      time.sleep(5)
                  else:
                      time.sleep(6)

                  raw_html = page.content()
                  results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"
                  page.close()

              except Exception as e:
                  print(f"Errore critico su {url}: {e}", flush=True)
                  results += f"ERRORE GLOBALE: {str(e)}\n"
                  try:
                      page.close()
                  except:
                      pass

          context.close()

          with open("output_macchina2_cdp.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Macchina 2
        run: python -u m2_insocket.py

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
