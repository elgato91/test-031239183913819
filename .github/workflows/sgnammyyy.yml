name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on:
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      TARGET_TOPIC: "Orvieto"
      FORZA_DIAGNOSTICI_STEP2: "1"
      CLOAKBROWSER_SUPPRESS_FONT_WARNING: "1"
    steps:

      - name: Installazione Font di Sistema e Windows 11 Reali
        run: |
          sudo apt-get update
          sudo apt-get install -y cabextract xfonts-utils unzip wget
          
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true

          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          
          wget -qO /tmp/win11-fonts.zip https://github.com/liblaf/win-fonts/releases/download/Win11/Win11-English.zip
          unzip -oq /tmp/win11-fonts.zip -d /tmp/win11-fonts-extracted
          
          # [FIX] Sintassi find corretta tramite uso di parentesi escapate e case-insensitive match (-iname)
          find /tmp/win11-fonts-extracted -type f \( -iname "*.ttf" -o -iname "*.otf" \) -exec cp {} ~/.local/share/fonts/windows/ \;
          
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl-cffi markdownify google-genai
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup Container WARP (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
            sleep 0.5
          done

          echo "Attesa stabilizzazione tunnel WARP..."
          sleep 6

      - name: Inizializzazione Code DISTRIBUITE - STEP 1
        run: |
          cat << 'EOF' > m2_step1_setup.py
          import json
          TARGETS = [
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          for i in range(1, 7):
              chunk = TARGETS[i-1::6]
              with open(f"/tmp/step1_queue_{i}.json", "w") as f:
                  json.dump(chunk, f)
          print("Code distribuite Step 1 generate con successo.")
          EOF
          python -u m2_step1_setup.py

      - name: Creazione Modulo Condiviso - Pulizia Link e Conversione Markdown
        run: |
          cat << 'EOF' > extraction_utils.py
          import re
          from urllib.parse import urljoin, urlsplit, urlunsplit, parse_qsl, urlencode
          from bs4 import BeautifulSoup
          from markdownify import markdownify as md_convert

          STRUCTURAL_TAGS_TO_STRIP = ["script", "style", "nav", "footer", "header",
                                      "form", "noscript", "iframe", "svg"]

          TRACKING_PARAMS_PREFIXES = ("utm_",)
          TRACKING_PARAMS_EXACT = {
              "fbclid", "gclid", "gclsrc", "dclid", "msclkid", "mc_cid", "mc_eid",
              "igshid", "ref", "ref_src", "ref_url", "source", "spm", "yclid",
              "_ga", "_gl", "cmpid", "campaign_id", "ad_id", "adgroup_id",
              "wbraid", "gbraid", "twclid", "vero_id", "trk", "trkCampaign",
              "share", "share_id", "si"
          }

          JUNK_LINK_DOMAINS = (
              "twitter.com", "x.com", "facebook.com", "fb.com", "instagram.com",
              "linkedin.com/share", "linkedin.com/shareArticle", "pinterest.com",
              "pinterest.it", "whatsapp.com", "wa.me", "t.me", "telegram.me",
              "reddit.com/submit", "tumblr.com/share", "getpocket.com",
              "addtoany.com", "sharethis.com", "mailto:"
          )

          def _is_junk_domain(netloc, full_href):
              netloc_low = netloc.lower()
              href_low = full_href.lower()
              for junk in JUNK_LINK_DOMAINS:
                  if junk in netloc_low or href_low.startswith(junk):
                      return True
              return False

          def _clean_query(query_string):
              if not query_string:
                  return ""
              pairs = parse_qsl(query_string, keep_blank_values=True)
              cleaned_pairs = []
              for key, value in pairs:
                  key_low = key.lower()
                  if key_low in TRACKING_PARAMS_EXACT:
                      continue
                  if any(key_low.startswith(pfx) for pfx in TRACKING_PARAMS_PREFIXES):
                      continue
                  cleaned_pairs.append((key, value))
              return urlencode(cleaned_pairs)

          def clean_link_href(raw_href, page_url):
              if not raw_href:
                  return None

              raw_href = raw_href.strip()
              if not raw_href or raw_href.startswith("javascript:"):
                  return None
              if raw_href.startswith("mailto:") and len(raw_href) <= len("mailto:"):
                  return None

              try:
                  absolute = urljoin(page_url, raw_href)
              except Exception:
                  return None

              try:
                  parts = urlsplit(absolute)
              except Exception:
                  return None

              if parts.scheme not in ("http", "https", "mailto"):
                  return None

              if parts.scheme == "mailto":
                  return None

              page_parts = urlsplit(page_url)
              same_path = (parts.netloc == page_parts.netloc and
                           parts.path.rstrip("/") == page_parts.path.rstrip("/"))

              if same_path and parts.fragment and not parts.query:
                  return None

              if _is_junk_domain(parts.netloc, absolute):
                  return None

              cleaned_query = _clean_query(parts.query)

              rebuilt = urlunsplit((parts.scheme, parts.netloc, parts.path,
                                     cleaned_query, ""))

              page_rebuilt_parts = urlsplit(page_url)
              page_cleaned_query = _clean_query(page_rebuilt_parts.query)
              page_rebuilt = urlunsplit((page_rebuilt_parts.scheme,
                                          page_rebuilt_parts.netloc,
                                          page_rebuilt_parts.path.rstrip("/"),
                                          page_cleaned_query, ""))
              rebuilt_no_trailing = urlunsplit((parts.scheme, parts.netloc,
                                                 parts.path.rstrip("/"),
                                                 cleaned_query, ""))
              if rebuilt_no_trailing == page_rebuilt:
                  return None

              return rebuilt

          def _strip_anchor_tag(a_tag):
              a_tag.replace_with(a_tag.get_text())

          def html_to_clean_markdown(html, page_url):
              soup = BeautifulSoup(html, "html.parser")

              for tag_name in STRUCTURAL_TAGS_TO_STRIP:
                  for tag in soup.find_all(tag_name):
                      tag.decompose()

              for a_tag in soup.find_all("a"):
                  href = a_tag.get("href")
                  cleaned = clean_link_href(href, page_url)
                  if cleaned is None:
                      _strip_anchor_tag(a_tag)
                  else:
                      a_tag["href"] = cleaned
                      for attr in list(a_tag.attrs):
                          if attr not in ("href", "title"):
                              del a_tag[attr]

              markdown_text = md_convert(
                  str(soup),
                  heading_style="ATX",
                  bullets="-",
                  strip=["img"],
              )

              markdown_text = re.sub(r"\n{3,}", "\n\n", markdown_text)
              markdown_text = markdown_text.strip()

              return markdown_text
          EOF

      - name: Creazione Modulo Condiviso - Estrazione Nugget via Gemini Live
        run: |
          cat << 'EOF' > nugget_extractor.py
          import json
          import re
          import time
          import asyncio
          import difflib

          from google import genai

          MODEL_NAME = "gemini-3.1-flash-live-preview"
          CONFIG_LIVE = {
              "response_modalities": ["AUDIO"],
              "output_audio_transcription": {}
          }
          NUGGET_TIMEOUT_SECONDS = 40.0

          TPM_LIMIT_DICHIARATO = 65_000
          TPM_SAFETY_MARGIN = 0.75
          TPM_BUDGET = int(TPM_LIMIT_DICHIARATO * TPM_SAFETY_MARGIN)
          COOLDOWN_SECONDS = 65.0
          QUOTA_ERROR_MARKERS = ("exceeded your current quota", "resource_exhausted", "rate limit")

          NUGGET_PROMPT_TEMPLATE = """
          Sei un estrattore di fatti (nugget) ad alta precisione.
          Estrai SOLO fatti realmente presenti nel testo utili per un articolo editoriale su: {topic}

          REGOLE:
          1. Estrai SOLO fatti realmente presenti nel testo. Non dedurre o inventare.
          2. Per ogni nugget, riporta in "quote_originale" la frase ESATTA (verbatim).
          3. Classifica la "category" tra: prezzo, orario, evento, storia, geografia, recensione, dato_statistico, contatto, altro.
          4. Restituisci ESCLUSIVAMENTE un array JSON con oggetti: [{{"fact": "...", "category": "...", "quote_originale": "..."}}]
          5. Usa il formato markdown ```json ... ```

          URL SORGENTE:
          {source_url}

          TESTO SORGENTE:
          {testo}
          """

          def _stima_token(testo):
              if not testo: return 0
              return max(1, len(testo) // 4)

          class TokenBucket:
              def __init__(self, capacity_tokens, refill_period_seconds=60.0):
                  self.capacity = capacity_tokens
                  self.tokens = capacity_tokens
                  self.refill_period = refill_period_seconds
                  self.refill_rate = capacity_tokens / refill_period_seconds
                  self.last_refill = time.monotonic()
                  self._lock = asyncio.Lock()

              def _refill(self):
                  now = time.monotonic()
                  elapsed = now - self.last_refill
                  if elapsed > 0:
                      self.tokens = min(self.capacity, self.tokens + elapsed * self.refill_rate)
                      self.last_refill = now

              async def acquire(self, needed_tokens, label=""):
                  needed_tokens = min(needed_tokens, self.capacity)
                  async with self._lock:
                      while True:
                          self._refill()
                          if self.tokens >= needed_tokens:
                              self.tokens -= needed_tokens
                              return
                          deficit = needed_tokens - self.tokens
                          wait_seconds = min(deficit / self.refill_rate, 20.0)
                          print(f"{label}[TPM-BUCKET] Attendo {wait_seconds:.1f}s...", flush=True)
                          await asyncio.sleep(wait_seconds)

          class GeminiKeyPool:
              def __init__(self, api_keys):
                  api_keys = [k for k in api_keys if k]
                  self.entries = [{
                      "key": k,
                      "client": genai.Client(api_key=k),
                      "bucket": TokenBucket(TPM_BUDGET),
                      "cooldown_until": 0.0,
                  } for k in api_keys]
                  self._idx = 0
                  self._lock = asyncio.Lock()

              async def _pick_entry(self, label=""):
                  async with self._lock:
                      n = len(self.entries)
                      while True:
                          now = time.monotonic()
                          if any(e["cooldown_until"] <= now for e in self.entries):
                              for _ in range(n):
                                  self._idx = (self._idx + 1) % n
                                  if self.entries[self._idx]["cooldown_until"] <= now:
                                      return self.entries[self._idx]
                          attesa = max(0.5, min(e["cooldown_until"] for e in self.entries) - now)
                          print(f"{label}[KEY-POOL] Chiavi in cooldown, attendo {attesa:.1f}s...", flush=True)
                          await asyncio.sleep(min(attesa, 15.0))

              def _mark_cooldown(self, entry, label=""):
                  entry["cooldown_until"] = time.monotonic() + COOLDOWN_SECONDS
                  print(f"{label}[KEY-POOL] Quota superata. Cooldown impostato a {COOLDOWN_SECONDS}s", flush=True)

              async def esegui_con_pool(self, payload, timeout_seconds, label=""):
                  entry = await self._pick_entry(label)
                  await entry["bucket"].acquire(_stima_token(payload), label=label)
                  accumulated_text = ""
                  try:
                      async def run_session():
                          nonlocal accumulated_text
                          async with entry["client"].aio.live.connect(model=MODEL_NAME, config=CONFIG_LIVE) as session:
                              await session.send_realtime_input(text=payload)
                              async for response in session.receive():
                                  if response.server_content and response.server_content.output_transcription:
                                      if response.server_content.output_transcription.text:
                                          accumulated_text += response.server_content.output_transcription.text
                                  if response.server_content and response.server_content.turn_complete:
                                      break
                      await asyncio.wait_for(run_session(), timeout=timeout_seconds)
                      return accumulated_text.strip(), None
                  except (asyncio.TimeoutError, TimeoutError):
                      return None, "timeout"
                  except Exception as e:
                      if any(m in str(e).lower() for m in QUOTA_ERROR_MARKERS):
                          self._mark_cooldown(entry, label=label)
                          return None, "quota"
                      return None, f"errore: {e}"

          def _estrai_json_da_risposta(raw_text):
              if not raw_text: return None
              match = re.search(r'```json\s*(.*?)\s*```', raw_text, re.DOTALL)
              try:
                  parsed = json.loads(match.group(1) if match else raw_text)
                  if isinstance(parsed, list): return parsed
              except: pass
              return None

          def _calcola_confidence(quote_originale, testo_sorgente):
              if not quote_originale or not testo_sorgente: return "low"
              quote_norm = re.sub(r'\s+', ' ', quote_originale).strip().lower()
              testo_norm = re.sub(r'\s+', ' ', testo_sorgente).strip().lower()
              if quote_norm in testo_norm: return "high"
              
              finestra = len(quote_norm)
              if finestra < 8 or len(testo_norm) < finestra: return "low"
              
              best_ratio = 0.0
              step = max(1, finestra // 2)
              for i in range(0, len(testo_norm) - finestra + 1, step):
                  ratio = difflib.SequenceMatcher(None, quote_norm, testo_norm[i:i + finestra]).ratio()
                  if ratio > best_ratio: best_ratio = ratio
                  if best_ratio > 0.95: break
              if best_ratio >= 0.85: return "high"
              if best_ratio >= 0.60: return "medium"
              return "low"

          def scrivi_nuggets_jsonl(nuggets, jsonl_path):
              if nuggets:
                  with open(jsonl_path, "a", encoding="utf-8") as f:
                      for n in nuggets:
                          f.write(json.dumps(n, ensure_ascii=False) + "\n")

          async def estrai_nuggets(key_pool, source_url, testo_markdown, topic, node_id=None, timeout_seconds=NUGGET_TIMEOUT_SECONDS):
              if not testo_markdown or len(testo_markdown.strip()) < 50: return []
              label = f"[NODO {node_id}] " if node_id is not None else ""
              payload = NUGGET_PROMPT_TEMPLATE.format(topic=topic, source_url=source_url, testo=testo_markdown)
              
              for _ in range(len(key_pool.entries)):
                  accumulated_text, errore = await key_pool.esegui_con_pool(payload, timeout_seconds, label=label)
                  if errore is None:
                      parsed = _estrai_json_da_risposta(accumulated_text)
                      if parsed is None: return None
                      
                      nuggets = []
                      for item in parsed:
                          if not isinstance(item, dict) or not str(item.get("fact", "")).strip(): continue
                          nuggets.append({
                              "fact": str(item.get("fact", "")).strip(),
                              "source_url": source_url,
                              "category": str(item.get("category", "altro")).strip() or "altro",
                              "confidence": _calcola_confidence(str(item.get("quote_originale", "")), testo_markdown),
                              "quote_originale": str(item.get("quote_originale", "")).strip()
                          })
                      return nuggets
                  elif errore == "quota": continue
                  else: return None
              return None
          EOF

      - name: Creazione Processo Estrattore Nugget INDIPENDENTE
        run: |
          cat << 'EOF' > nugget_estrattore_standalone.py
          import asyncio
          import json
          import os
          import time
          from nugget_extractor import GeminiKeyPool, estrai_nuggets, scrivi_nuggets_jsonl

          SCRAPED_CONTENT_PATH = "scraped_content.jsonl"
          NUGGETS_OUTPUT_PATH = "nuggets_estrattore.jsonl"
          SCRAPING_DONE_FLAG_PATH = "scraping_completato.flag"
          TARGET_TOPIC = os.environ.get("TARGET_TOPIC", "")
          _jsonl_lock = asyncio.Lock()

          async def main():
              api_keys = [os.environ.get(k) for k in ["GEMINI_API_KEY", "GEMINI_API_KEY_2", "GEMINI_API_KEY_3"] if os.environ.get(k)]
              if not api_keys: return
              
              key_pool = GeminiKeyPool(api_keys)
              nugget_semaphore = asyncio.Semaphore(5)
              tasks_in_volo = []
              righe_lette = 0
              ultima_riga_vista = time.monotonic()

              async def processa_riga(source_url, testo_markdown):
                  async with nugget_semaphore:
                      esito = await estrai_nuggets(key_pool, source_url, testo_markdown, TARGET_TOPIC)
                  if esito:
                      async with _jsonl_lock: scrivi_nuggets_jsonl(esito, NUGGETS_OUTPUT_PATH)

              while True:
                  if os.path.exists(SCRAPED_CONTENT_PATH):
                      with open(SCRAPED_CONTENT_PATH, "r", encoding="utf-8") as f:
                          tutte_le_righe = f.readlines()
                      
                      for riga in tutte_le_righe[righe_lette:]:
                          if not riga.strip(): continue
                          try:
                              rec = json.loads(riga)
                              if rec.get("source_url") and rec.get("testo_markdown"):
                                  tasks_in_volo.append(asyncio.create_task(processa_riga(rec["source_url"], rec["testo_markdown"])))
                          except: pass
                      
                      if len(tutte_le_righe) > righe_lette:
                          ultima_riga_vista = time.monotonic()
                          righe_lette = len(tutte_le_righe)

                  tasks_in_volo = [t for t in tasks_in_volo if not t.done()]
                  if os.path.exists(SCRAPING_DONE_FLAG_PATH) and not tasks_in_volo:
                      if time.monotonic() - ultima_riga_vista > 3.0: break

                  await asyncio.sleep(2.0)

              if tasks_in_volo: await asyncio.gather(*tasks_in_volo, return_exceptions=True)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Creazione Script Python - STEP 1 (Veloce curl-cffi, disaccoppiato da Gemini)
        run: |
          cat << 'EOF' > m2_step1.py
          import time
          import sys
          import random
          import os
          import json
          import asyncio
          from bs4 import BeautifulSoup
          from curl_cffi import requests as curl_requests
          from extraction_utils import html_to_clean_markdown

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          if len(sys.argv) < 2: sys.exit(1)
          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          async def verify_proxy_active(port, max_retries=6, delay=5):
              test_session = curl_requests.AsyncSession(impersonate="chrome120")
              test_session.proxies = {"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}
              for _ in range(max_retries):
                  try:
                      # [FIX] Uso di api64 al posto di api6 per supportare fluidamente IPv4 o IPv6, evitando fallimenti critici dei Nodi (come successo al Nodo 4)
                      if (await test_session.get("https://api64.ipify.org?format=json", timeout=6)).status_code == 200:
                          await test_session.close()
                          return True
                  except: pass
                  await asyncio.sleep(delay)
              await test_session.close()
              return False

          def validate_html(html, url, status_code):
              if status_code is not None and status_code >= 400: return False, f"Blocco HTTP {status_code}"
              if not html or len(html.strip()) < 300: return False, "HTML vuoto"
                  
              soup = BeautifulSoup(html, "html.parser")
              title = (soup.title.string or "").strip().lower() if soup.title else ""
              for wt in ["access denied", "attention required", "just a moment", "checking your browser", "cloudflare"]:
                  if wt in title: return False, f"WAF rilevato nel titolo: {title}"

              for element in soup(["script", "style", "noscript"]): element.decompose()
              visible_text = soup.get_text(separator=' ', strip=True).lower()

              for ind in ["are you a robot", "prove your humanity", "captcha verification", "unusual traffic from your computer network", "robot challenge screen", "verifica di sicurezza", "verifying you are human", "challenge-platform"]:
                  if ind in visible_text: return False, f"WAF/Captcha rilevato nel testo: {ind}"

              if len(visible_text) < 150: return False, "Contenuto della pagina insufficiente"
              return True, ""

          async def main():
              if not await verify_proxy_active(ACTIVE_PORT): sys.exit(0)
              
              if not os.path.exists(f"/tmp/step1_queue_{node_id}.json"): sys.exit(0)
              with open(f"/tmp/step1_queue_{node_id}.json", "r") as f: targets = json.load(f)

              results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 1 (curl-cffi)\n{'#'*60}\n"
              failed_targets = []

              session = curl_requests.AsyncSession(impersonate="chrome120")
              session.proxies = {"http": f"socks5h://127.0.0.1:{ACTIVE_PORT}", "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"}
              # [FIX] Rimossa la riga session.headers.update(...) che inquinava irrimediabilmente l'H2 fingerprint causando lo shadow ban di Bing!

              for url in targets:
                  if os.environ.get("FORZA_DIAGNOSTICI_STEP2", "0") == "1" and any(site in url for site in DIAGNOSTIC_SITES):
                      failed_targets.append(url)
                      continue

                  try:
                      resp = await session.get(url, timeout=12)
                      is_ok, err_msg = validate_html(resp.text, url, resp.status_code)
                      
                      if is_ok:
                          if any(site in url for site in DIAGNOSTIC_SITES):
                              soup = BeautifulSoup(resp.text, 'html.parser')
                              text = soup.get_text(separator=' ', strip=True)
                          else:
                              text = html_to_clean_markdown(resp.text, url)
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO:\n{text}\n"
                          
                          if not any(site in url for site in DIAGNOSTIC_SITES):
                              with open("scraped_content.jsonl", "a", encoding="utf-8") as f:
                                  f.write(json.dumps({"source_url": url, "testo_markdown": text, "node_id": node_id, "step": "step1"}, ensure_ascii=False) + "\n")
                      else:
                          failed_targets.append(url)
                  except:
                      failed_targets.append(url)
                  await asyncio.sleep(random.uniform(1.0, 2.0))
              
              await session.close()
              with open(f"output_node_{node_id}_step1.txt", "w", encoding="utf-8") as f: f.write(results)
              with open(f"failed_node_{node_id}.json", "w", encoding="utf-8") as f: json.dump(failed_targets, f)

          if __name__ == "__main__": asyncio.run(main())
          EOF

      - name: Avvio Processo Estrattore Nugget INDIPENDENTE (background)
        run: |
          touch scraped_content.jsonl
          nohup python -u nugget_estrattore_standalone.py > estrattore_nugget.log 2>&1 &
          echo $! > estrattore_nugget.pid

      - name: Esecuzione Scraping Parallelo - STEP 1
        run: |
          touch node1_step1.log node2_step1.log node3_step1.log node4_step1.log node5_step1.log node6_step1.log
          tail -q -f node1_step1.log node2_step1.log node3_step1.log node4_step1.log node5_step1.log node6_step1.log &
          TAIL_PID=$!
          PIDS=()
          for i in {1..6}; do python -u m2_step1.py $i > node${i}_step1.log 2>&1 & PIDS+=($!); sleep 1.5; done
          wait "${PIDS[@]}"
          kill $TAIL_PID || true

      - name: Refresh IP Container per lo STEP 2
        run: |
          docker restart warproxy-1 warproxy-2 warproxy-3 warproxy-4 warproxy-5 warproxy-6
          sleep 6

      - name: Inizializzazione Code DISTRIBUITE - STEP 2
        run: |
          cat << 'EOF' > m2_step2_setup.py
          import json, os
          merged_failed = []
          for i in range(1, 7):
              if os.path.exists(f"failed_node_{i}.json"):
                  with open(f"failed_node_{i}.json", "r") as f:
                      try: merged_failed.extend(json.load(f))
                      except: pass
          unique_failed = list(dict.fromkeys(merged_failed))
          for i in range(1, 7):
              with open(f"/tmp/step2_queue_{i}.json", "w") as f:
                  json.dump(unique_failed[i-1::6], f)
          EOF
          python -u m2_step2_setup.py

      - name: Creazione Script Python - STEP 2 (Async + CloakBrowser, disaccoppiato da Gemini)
        run: |
          cat << 'EOF' > m2_step2.py
          import asyncio
          import sys
          import random
          import os
          import json
          from urllib.parse import urlparse, parse_qs
          from cloakbrowser import launch_persistent_context_async
          from bs4 import BeautifulSoup
          from curl_cffi import requests as curl_requests
          from extraction_utils import html_to_clean_markdown

          if len(sys.argv) < 2: sys.exit(1)
          node_id = int(sys.argv[1])
          INITIAL_PORT = 40000 + node_id

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  queries = parse_qs(urlparse(url).query)
                  for p in ['q', 'query', 'p', 'find_desc']:
                      if p in queries: return queries[p][0]
              except: pass
              return default

          async def verify_proxy_active(port, max_retries=6, delay=5):
              test_session = curl_requests.AsyncSession(impersonate="chrome120")
              test_session.proxies = {"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}
              for _ in range(max_retries):
                  try:
                      # [FIX] Stessa modifica dello Step 1 su IPV4/IPV6 agnostico
                      if (await test_session.get("https://api64.ipify.org?format=json", timeout=6)).status_code == 200:
                          await test_session.close()
                          return True
                  except: pass
                  await asyncio.sleep(delay)
              await test_session.close()
              return False

          def validate_html(html, url, status_code):
              if status_code is not None and status_code >= 400: return False, f"Blocco HTTP {status_code}"
              if not html or len(html.strip()) < 300: return False, "HTML vuoto"

              soup = BeautifulSoup(html, "html.parser")
              for wt in ["access denied", "attention required", "just a moment", "checking your browser", "cloudflare"]:
                  if wt in (soup.title.string or "").strip().lower(): return False, f"WAF rilevato nel titolo"

              for element in soup(["script", "style", "noscript"]): element.decompose()
              visible_text = soup.get_text(separator=' ', strip=True).lower()

              for ind in ["are you a robot", "prove your humanity", "captcha verification", "unusual traffic from your computer network"]:
                  if ind in visible_text: return False, f"WAF/Captcha rilevato"

              if len(visible_text) < 150: return False, "Contenuto insufficiente"
              return True, ""

          async def main():
              if not os.path.exists(f"/tmp/step2_queue_{node_id}.json"): return
              with open(f"/tmp/step2_queue_{node_id}.json", "r") as f: targets = json.load(f)
              if not targets:
                  open(f"output_node_{node_id}_step2.txt", "w").close()
                  return

              if not await verify_proxy_active(INITIAL_PORT): return

              home_dir = os.path.expanduser("~")
              windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
              
              base_args = [
                  "--no-sandbox",
                  "--disable-dev-shm-usage",
                  f"--fingerprint={random.randint(100000, 999999)}",
                  f"--fingerprint-fonts-dir={windows_fonts_dir}",
                  "--fingerprint-screen-width=1920",
                  "--fingerprint-screen-height=1080",
                  "--fingerprint-taskbar-height=48",
                  "--fingerprint-storage-quota=5000",
                  "--force-webrtc-ip-handling-policy=disable_non_proxied_udp",
                  "--fingerprint-webrtc-ip=auto"
              ]

              results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 2 (Fallback)\n{'#'*60}\n"
              context = None
              try:
                  try:
                      # [FIX] Utilizzato proxy come dictionary (formato standard e sicuro Playwright/Cloak)
                      context = await launch_persistent_context_async(
                          os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2"),
                          headless=False,
                          humanize=True,
                          human_preset="careful",
                          proxy={"server": f"socks5://127.0.0.1:{INITIAL_PORT}"},
                          geoip=True,
                          viewport={"width": 1920, "height": 940},
                          args=base_args
                      )
                      page = await context.new_page()
                      await page.goto("https://www.google.com", wait_until="domcontentloaded", timeout=25000)
                      await asyncio.sleep(2)
                  except:
                      return

                  for url in targets:
                      try:
                          query_to_search = get_query_from_url(url)

                          if "bing.com" in url:
                              await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.5, 4.0))
                              try:
                                  search_box = page.locator("textarea[name='q'], input[name='q']").first
                                  await search_box.type(query_to_search, delay=60)
                                  await page.keyboard.press("Enter")
                              except:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                          # [FIX] Aggiunta interazione manuale per Google per bypassare le schermate captcha gbv=1
                          elif "google.com" in url and "search" in url:
                              await page.goto("https://www.google.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.5, 4.0))
                              try:
                                  consent = page.locator("button:has-text('Accept all'), button:has-text('Accetta tutto')").first
                                  if await consent.is_visible(timeout=2000):
                                      await consent.click()
                                      await asyncio.sleep(1)
                              except: pass
                              try:
                                  search_box = page.locator("textarea[name='q'], input[name='q']").first
                                  await search_box.type(query_to_search, delay=60)
                                  await page.keyboard.press("Enter")
                              except:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                          elif "startpage.com" in url:
                              await page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.0, 3.5))
                              try:
                                  search_box = page.locator("input#q").first
                                  await search_box.type(query_to_search, delay=60)
                                  await page.keyboard.press("Enter")
                              except:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                          elif "html.duckduckgo.com" in url:
                              await page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.0, 3.5))
                              try:
                                  search_box = page.locator("input[name=q]").first
                                  await search_box.type(query_to_search, delay=60)
                                  await page.keyboard.press("Enter")
                              except:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                          else:
                              await page.goto(url, wait_until="domcontentloaded", timeout=40000)

                          try: await page.wait_for_load_state("networkidle", timeout=12000)
                          except: pass

                          await asyncio.sleep(4)
                          await page.keyboard.press("PageDown")
                          await asyncio.sleep(2)

                          raw_html = await page.content()
                          current_url = page.url

                          is_ok, err_msg = validate_html(raw_html, current_url, None)

                          if is_ok:
                              text_for_output = html_to_clean_markdown(raw_html, current_url)
                              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO ESTRATTO:\n{text_for_output}\n"
                              
                              with open("scraped_content.jsonl", "a", encoding="utf-8") as f:
                                  f.write(json.dumps({"source_url": url, "testo_markdown": text_for_output, "node_id": node_id, "step": "step2"}, ensure_ascii=False) + "\n")
                          else:
                              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nFALLITO ({err_msg})\n"

                      except Exception as e:
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nERRORE: {e}\n"

                      await asyncio.sleep(random.uniform(4.0, 7.0))

                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f: f.write(results)

              finally:
                  if context is not None:
                      try: await context.close()
                      except: pass

          if __name__ == "__main__": asyncio.run(main())
          EOF

      - name: Esecuzione Scraping Parallelo - STEP 2 (Fallback CloakBrowser)
        if: always()
        run: |
          touch node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log
          tail -q -f node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log &
          TAIL_PID=$!
          PIDS=()
          for i in {1..6}; do python -u m2_step2.py $i > node${i}_step2.log 2>&1 & PIDS+=($!); sleep 1.5; done
          wait "${PIDS[@]}"
          kill $TAIL_PID || true

          for i in {1..6}; do docker rm -f warproxy-$i || true; done

          touch output_node_{1..6}_step{1..2}.txt
          cat output_node_*.txt > output_macchina2_cdp.txt

      - name: Attesa Coda Residua Estrattore Nugget
        if: always()
        run: |
          touch scraping_completato.flag
          if [ -f estrattore_nugget.pid ]; then
            PID=$(cat estrattore_nugget.pid)
            for i in {1..90}; do
              if ! kill -0 "$PID" 2>/dev/null; then break; fi
              sleep 1
            done
            kill "$PID" 2>/dev/null || true
          fi
          touch nuggets_estrattore.jsonl

      - name: Merge Nugget Finale
        if: always()
        run: |
          cat << 'EOF' > merge_nuggets.py
          import json, glob

          merged_nuggets = []
          for filename in sorted(glob.glob("nuggets_estrattore*.jsonl")):
              with open(filename, "r", encoding="utf-8") as f:
                  for riga in f:
                      if riga.strip():
                          try: merged_nuggets.append(json.loads(riga))
                          except: pass

          seen = set()
          nuggets_deduplicati = []
          for n in merged_nuggets:
              key = ((n.get("fact") or "").strip().lower(), (n.get("source_url") or "").strip().lower())
              if key not in seen:
                  seen.add(key)
                  nuggets_deduplicati.append(n)

          with open("nuggets_finale.json", "w", encoding="utf-8") as f:
              json.dump({"stats": {"totale": len(nuggets_deduplicati)}, "nuggets": nuggets_deduplicati}, f, indent=2, ensure_ascii=False)
          EOF
          python -u merge_nuggets.py

      - name: Upload Artifact Macchina 2 (Testo Grezzo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt

      - name: Upload Artifact Nugget (JSON Strutturato)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nuggets_Macchina2
          path: nuggets_finale.json
