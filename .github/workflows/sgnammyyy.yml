name: Test WARP Client Ufficiale (caomingjun)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Pull immagine
        run: docker pull caomingjun/warp:latest

      - name: Avvia 6 nodi scaglionati (client ufficiale)
        run: |
          for i in 1 2 3 4 5 6; do
            PORT=$((1080 + i))
            docker run -d \
              --name "warp_$i" \
              --cap-add NET_ADMIN \
              --cap-add MKNOD \
              --cap-add AUDIT_WRITE \
              --sysctl net.ipv6.conf.all.disable_ipv6=0 \
              --sysctl net.ipv4.conf.all.src_valid_mark=1 \
              -e WARP_SLEEP=2 \
              -p "$PORT":1080 \
              caomingjun/warp:latest

            DELAY=$(awk -v min=2 -v max=4 'BEGIN{srand('"$i"'+systime()); print min+rand()*(max-min)}')
            echo "Nodo $i avviato su porta $PORT, attendo ${DELAY}s..."
            sleep "$DELAY"
          done

          echo ""
          echo "=== Attesa registrazione (25s) ==="
          sleep 10

      - name: Verifica stato e IP di uscita per nodo
        run: |
          for i in 1 2 3 4 5 6; do
            PORT=$((1080 + i))
            echo "--- Nodo $i (porta $PORT) ---"
            docker logs "warp_$i" 2>&1 | tail -5
            TRACE=$(curl -s --max-time 10 -x "socks5h://127.0.0.1:$PORT" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null)
            echo "$TRACE"
            echo ""
          done

      - name: Riepilogo IP
        run: |
          echo "=== Riepilogo compatto ==="
          for i in 1 2 3 4 5 6; do
            PORT=$((1080 + i))
            IP=$(curl -s --max-time 8 -x "socks5h://127.0.0.1:$PORT" https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep "^ip=" | cut -d= -f2)
            echo "Nodo $i (porta $PORT): $IP"
          done

      - name: Pulizia
        if: always()
        run: |
          for i in 1 2 3 4 5 6; do
            docker rm -f "warp_$i" || true
          done
