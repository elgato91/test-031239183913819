name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper Completo
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl-cffi
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup Container WARP (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
            sleep 0.5
          done
          
          echo "Attesa stabilizzazione tunnel WARP..."
          sleep 6

      - name: Creazione Cartella Temporanea Risultati
        run: mkdir -p results_temp

      - name: Raccolta Cookie di Sessione (Google e Bing) con CloakBrowser
        run: |
          cat << 'EOF' > harvest_cookies.py
          import asyncio
          import os
          import json
          import random
          import time
          import requests
          from cloakbrowser import launch_persistent_context_async

          def wait_for_proxy(port, max_retries=10, delay=5):
              proxies = {
                  "http": f"socks5h://127.0.0.1:{port}",
                  "https": f"socks5h://127.0.0.1:{port}"
              }
              for i in range(max_retries):
                  try:
                      resp = requests.get("https://api6.ipify.org?format=json", proxies=proxies, timeout=6)
                      if resp.status_code == 200:
                          print(f"[HARVEST] Proxy {port} attivo! IP: {resp.json().get('ip')}", flush=True)
                          return True
                  except Exception:
                      pass
                  print(f"[HARVEST] In attesa che il proxy {port} sia pronto (tentativo {i+1}/{max_retries})...", flush=True)
                  time.sleep(delay)
              return False

          async def harvest_for_port(port):
              if not wait_for_proxy(port):
                  print(f"[HARVEST] Salto porta {port} per inattività del proxy.", flush=True)
                  return

              home_dir = os.path.expanduser("~")
              profile_dir = os.path.join(home_dir, f".cloak_profiles/harvest_{port}")
              windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
              
              # Configurazione proxy passata direttamente a Chromium per forzare DNS sul server proxy
              base_args = [
                  "--no-sandbox",
                  "--disable-dev-shm-usage",
                  f"--proxy-server=socks5://127.0.0.1:{port}",
                  f"--fingerprint={random.randint(100000, 999999)}",
                  f"--fingerprint-fonts-dir={windows_fonts_dir}"
              ]
              
              print(f"[HARVEST] Avvio CloakBrowser su porta {port}...", flush=True)
              try:
                  context = await launch_persistent_context_async(
                      profile_dir,
                      headless=False,
                      geoip=True,
                      args=base_args
                  )
                  page = await context.new_page()
                  
                  # Visita Google per stabilire la sessione ed ottenere i cookie fiduciari
                  try:
                      await page.goto("https://www.google.com", wait_until="domcontentloaded", timeout=25000)
                      await asyncio.sleep(3)
                  except Exception as e:
                      print(f"[HARVEST] Errore di connessione a Google su porta {port}: {e}", flush=True)
                      
                  # Visita Bing per stabilire la sessione ed ottenere i cookie fiduciari
                  try:
                      await page.goto("https://www.bing.com", wait_until="domcontentloaded", timeout=25000)
                      await asyncio.sleep(3)
                  except Exception as e:
                      print(f"[HARVEST] Errore di connessione a Bing su porta {port}: {e}", flush=True)
                      
                  cookies = await context.cookies()
                  cookie_file = f"results_temp/cookies_{port}.json"
                  with open(cookie_file, "w") as f:
                      json.dump(cookies, f)
                  print(f"[HARVEST] Sessione salvata per porta {port} ({len(cookies)} cookie).", flush=True)
                  
                  await context.close()
              except Exception as e:
                  print(f"[HARVEST] Errore critico su porta {port}: {e}", flush=True)

          async def main():
              os.makedirs("results_temp", exist_ok=True)
              # Eseguiamo in sequenza per non saturare la CPU
              for port in [40001, 40002, 40003, 40004, 40005, 40006]:
                  await harvest_for_port(port)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python harvest_cookies.py

      - name: Creazione Scraper Multithread Ultra-Stealth con Session Hijacking
        run: |
          cat << 'EOF' > stealth_scraper.py
          import json
          import re
          import sys
          import time
          import random
          import base64
          import threading
          import os
          from pathlib import Path
          from urllib.parse import urlparse, urlunparse, parse_qs, parse_qsl, urlencode, unquote, quote
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from bs4 import BeautifulSoup
          from curl_cffi import requests

          def log(message: str):
              sys.stderr.write(message + "\n")
              sys.stderr.flush()

          def clean_url(url: str) -> str:
              try:
                  parsed = urlparse(url)
                  query_params = parse_qsl(parsed.query)
                  filtered_params = [
                      (k, v) for k, v in query_params
                      if k.lower() not in ["srsltid", "gclid", "fbclid"]
                      and not k.lower().startswith("utm_")
                  ]
                  new_query = urlencode(filtered_params)
                  return urlunparse((parsed.scheme, parsed.netloc, parsed.path, parsed.params, new_query, parsed.fragment))
              except Exception:
                  return url

          def human_sleep(mean: float, std_dev: float):
              sleep_time = max(0.1, random.gauss(mean, std_dev))
              time.sleep(sleep_time)

          class ProxyPool:
              def __init__(self, ports):
                  self.ports = ports
                  self.last_used = {port: 0 for port in ports}
                  self.lock = threading.Lock()

              def get_proxy(self):
                  with self.lock:
                      sorted_ports = sorted(self.ports, key=lambda p: self.last_used[p])
                      best_port = sorted_ports[0]
                      self.last_used[best_port] = time.time()
                      return best_port

          PROXY_POOL = ProxyPool([40001, 40002, 40003, 40004, 40005, 40006])
          STARTPAGE_LOCK = threading.Lock()

          ACCEPT_LANGUAGES = [
              "it-IT,it;q=0.9,en-US;q=0.8,en;q=0.7",
              "it-IT,it;q=0.9",
              "en-US,en;q=0.9,it;q=0.8"
          ]

          BROWSER_PROFILES = {
              "chrome": {
                  "impersonate": "chrome120",
                  "ua": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  "accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
              },
              "edge": {
                  "impersonate": "chrome120",
                  "ua": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36 Edg/120.0.0.0",
                  "accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
              }
          }

          def get_minimal_headers(browser: str) -> dict:
              profile = BROWSER_PROFILES[browser]
              return {
                  "user-agent": profile["ua"],
                  "accept": profile["accept"],
                  "accept-language": random.choice(ACCEPT_LANGUAGES),
                  "accept-encoding": "gzip, deflate, br",
              }

          def load_cookies_for_port(session, port):
              cookie_file = f"results_temp/cookies_{port}.json"
              if os.path.exists(cookie_file):
                  try:
                      with open(cookie_file, "r") as f:
                          cookies = json.load(f)
                      for c in cookies:
                          domain = c.get("domain", "")
                          session.cookies.set(
                              c["name"], 
                              c["value"], 
                              domain=domain, 
                              path=c.get("path", "/")
                          )
                  except Exception as e:
                      log(f"     [COOKIE JAR] Errore caricamento cookie per porta {port}: {e}")

          def extract_react_json(html_content: str) -> dict | None:
              start_str = '{"render":'
              idx = html_content.find(start_str)
              if idx == -1: return None
              brace_count, json_end = 0, -1
              for i in range(idx, len(html_content)):
                  if html_content[i] == "{": brace_count += 1
                  elif html_content[i] == "}": brace_count -= 1
                  if brace_count == 0:
                      json_end = i
                      break
              if json_end == -1: return None
              try: return json.loads(html_content[idx : json_end + 1])
              except Exception: return None

          def extract_google(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              # Google non-JS: estrae dai contenitori dei risultati organici per eliminare la spazzatura
              for div in soup.find_all("div", class_=["kCrYT", "egMi0"]):
                  for a in div.find_all("a", href=True):
                      href = a["href"]
                      if href.startswith("/url?q="):
                          match = re.search(r"/url\?q=([^&]+)", href)
                          if match:
                              url = unquote(match.group(1))
                              if url.startswith("http") and "google." not in url:
                                  links.append(url)
              return links

          def extract_bing(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              # Bing: estrae solo dai blocchi classe b_algo (risultati reali, decodificando i redirect Base64)
              for li in soup.find_all("li", class_="b_algo"):
                  for a in li.find_all("a", href=True):
                      href = a["href"]
                      if "bing.com/ck/a" in href:
                          try:
                              parsed = urlparse(href)
                              qs = parse_qs(parsed.query)
                              if "u" in qs:
                                  u_val = qs["u"][0]
                                  if u_val.startswith("a1"):
                                      u_val = u_val[2:]
                                  u_val += "=" * ((4 - len(u_val) % 4) % 4)
                                  decoded = base64.b64decode(u_val).decode("utf-8", errors="ignore")
                                  if decoded.startswith("http") and "bing.com" not in decoded:
                                      links.append(decoded)
                          except: pass
                      elif href.startswith("http") and not any(d in href for d in ["bing.com", "microsoft.com", "bingviz"]):
                          links.append(href)
              return links

          def extract_duckduckgo(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", class_="result__url", href=True):
                  href = a["href"]
                  match = re.search(r"uddg=([^&]+)", href)
                  if match:
                      real_url = unquote(match.group(1))
                      if real_url.startswith("http") and "duckduckgo.com" not in real_url:
                          links.append(real_url)
              return links

          def extract_startpage(html):
              links = []
              react_data = extract_react_json(html)
              if react_data:
                  try:
                      mainline = react_data.get("render", {}).get("presenter", {}).get("regions", {}).get("mainline", [])
                      for section in mainline:
                          if section.get("display_type") == "web-google" and "results" in section:
                              for item in section["results"]:
                                  if "clickUrl" in item:
                                      links.append(item["clickUrl"])
                  except Exception: pass
              
              if links:
                  return links

              soup = BeautifulSoup(html, "html.parser")
              for a in soup.find_all("a", class_=["w-gl__result-title", "w-gl__result-link"], href=True):
                  href = a["href"]
                  if href.startswith("http") and not any(d in href for d in ["startpage.com", "ixquick.com", "startmail.com"]):
                      links.append(href)
              return links

          def extract_yahoo(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for div in soup.find_all("div", class_=["compTitle", "algo", "y-algo"]):
                  for a in div.find_all("a", href=True):
                      href = a["href"]
                      if "r.search.yahoo.com" in href and "RU=" in href:
                          match = re.search(r"RU=([^/]+)", href)
                          if match:
                              url = unquote(match.group(1))
                              if url.startswith("http"):
                                  links.append(url)
                      elif href.startswith("http") and not any(d in href for d in ["yahoo.com", "yimg.com", "yahoo.co.jp"]):
                          links.append(href)
              return links

          def extract_links(html, url):
              links = []
              if "google.com" in url: links = extract_google(html)
              elif "bing.com" in url: links = extract_bing(html)
              elif "duckduckgo.com" in url: links = extract_duckduckgo(html)
              elif "startpage.com" in url: links = extract_startpage(html)
              elif "yahoo.com" in url: links = extract_yahoo(html)
              
              cleaned_links = []
              for l in links:
                  cleaned = clean_url(l)
                  if cleaned: cleaned_links.append(cleaned)
              return cleaned_links

          def fetch_startpage(session: requests.Session, query: str, browser: str, port: int) -> list[str] | None:
              headers = get_minimal_headers(browser)
              with STARTPAGE_LOCK:
                  try:
                      response_get = session.get("https://www.startpage.com/", headers=headers, timeout=8.0)
                      if response_get.status_code != 200: return None
                      sc_match = (
                          re.search(r'name=["\']sc["\'][^>]*value=["\']([^"\']+)["\']', response_get.text, re.IGNORECASE)
                          or re.search(r'value=["\']([^"\']+)["\'][^>]*name=["\']sc["\']', response_get.text, re.IGNORECASE)
                      )
                      sc_token = sc_match.group(1) if sc_match else ""
                  except Exception: return None

                  time.sleep(random.uniform(0.3, 0.8))

                  payload = {
                      "query": query, "sc": sc_token, "cat": "web", "t": "device",
                      "language": "italiano", "lui": "english", "qadf": "moderate"
                  }
                  headers_post = headers.copy()
                  headers_post.update({
                      "origin": "https://www.startpage.com", "referer": "https://www.startpage.com/",
                      "content-type": "application/x-www-form-urlencoded", "sec-fetch-dest": "empty",
                      "sec-fetch-mode": "cors", "sec-fetch-site": "same-origin"
                  })

                  try:
                      response_post = session.post("https://www.startpage.com/sp/search", headers=headers_post, data=payload, timeout=8.0)
                      if response_post.status_code != 200 or "captcha" in response_post.text.lower():
                          return None
                      links = extract_startpage(response_post.text)
                      return links if links else None
                  except Exception: return None

          def fetch_duckduckgo(session: requests.Session, query: str, browser: str, port: int) -> list[str] | None:
              headers = get_minimal_headers(browser)
              headers.update({
                  "referer": "https://duckduckgo.com/", "origin": "https://duckduckgo.com",
                  "sec-fetch-dest": "document", "sec-fetch-mode": "navigate",
                  "sec-fetch-site": "same-origin", "sec-fetch-user": "?1", "upgrade-insecure-requests": "1"
              })
              url = f"https://html.duckduckgo.com/html/?q={quote(query)}"
              for inner_attempt in range(1, 3):
                  try:
                      response = session.get(url, headers=headers, timeout=8.0)
                      if response.status_code == 202:
                          wait = random.uniform(1.5, 3.0) * inner_attempt
                          time.sleep(wait)
                          continue
                      if response.status_code != 200 or "captcha" in response.text.lower():
                          return None
                      links = extract_duckduckgo(response.text)
                      return links if links else None
                  except Exception: return None
              return None

          def fetch_google(session: requests.Session, query: str, browser: str, port: int) -> list[str] | None:
              load_cookies_for_port(session, port)
              headers = get_minimal_headers(browser)
              url = f"https://www.google.com/search?q={quote(query)}&gbv=1&num=50"
              try:
                  response = session.get(url, headers=headers, timeout=10.0)
                  if response.status_code != 200 or "captcha" in response.text.lower() or "unusual traffic" in response.text.lower(): 
                      return None
                  links = extract_google(response.text)
                  return links if links else None
              except Exception: return None

          def fetch_bing(session: requests.Session, query: str, browser: str, port: int) -> list[str] | None:
              load_cookies_for_port(session, port)
              headers = get_minimal_headers(browser)
              url = f"https://www.bing.com/search?q={quote(query)}&count=50"
              try:
                  response = session.get(url, headers=headers, timeout=10.0)
                  if response.status_code != 200 or "captcha" in response.text.lower() or "cloudflare" in response.text.lower(): 
                      return None
                  links = extract_bing(response.text)
                  return links if links else None
              except Exception: return None

          def fetch_yahoo(session: requests.Session, query: str, browser: str, port: int) -> list[str] | None:
              headers = get_minimal_headers(browser)
              url = f"https://search.yahoo.com/search?p={quote(query)}&n=50"
              try:
                  response = session.get(url, headers=headers, timeout=10.0)
                  if response.status_code != 200: return None
                  links = extract_yahoo(response.text)
                  return links if links else None
              except Exception: return None

          def process_single_task(query: str, engine: str, task_index: int, total_tasks: int) -> list[str]:
              time.sleep(random.uniform(0.1, 1.2))
              max_retries = 3
              for attempt in range(1, max_retries + 1):
                  port = PROXY_POOL.get_proxy()
                  if not port:
                      time.sleep(1.0)
                      continue

                  browser = random.choice(["chrome", "edge"])
                  impersonate_target = BROWSER_PROFILES[browser]["impersonate"]
                  proxies = {
                      "http": f"socks5h://127.0.0.1:{port}",
                      "https": f"socks5h://127.0.0.1:{port}"
                  }
                  session = requests.Session(impersonate=impersonate_target, proxies=proxies)

                  links = None
                  try:
                      if engine == "google": links = fetch_google(session, query, browser, port)
                      elif engine == "bing": links = fetch_bing(session, query, browser, port)
                      elif engine == "duckduckgo": links = fetch_duckduckgo(session, query, browser, port)
                      elif engine == "startpage": links = fetch_startpage(session, query, browser, port)
                      elif engine == "yahoo": links = fetch_yahoo(session, query, browser, port)
                  except Exception:
                      pass

                  if links is not None:
                      cleaned_links = [clean_url(l) for l in links if l]
                      log(f"[{task_index:03d}/{total_tasks}] [OK] {engine.upper()} -> {len(cleaned_links)} risultati per: '{query}'")
                      return cleaned_links
                  else:
                      time.sleep(random.uniform(1.0, 2.5))

              log(f"[{task_index:03d}/{total_tasks}] [FALLITO] {engine.upper()} per: '{query}'")
              return []

          def main():
              queries = [
                  "cosa vedere a Orvieto in un giorno",
                  "Orvieto sotterranea biglietti e orari",
                  "Duomo di Orvieto facciata e capolavori",
                  "Pozzo di San Patrizio storia e segreti",
                  "itinerario Orvieto a piedi centro storico",
                  "migliori ristoranti cucina tipica Orvieto",
                  "cosa fare a Orvieto nel weekend",
                  "Pozzo della Cava Orvieto recensioni",
                  "Orvieto attrazioni principali da non perdere",
                  "dove mangiare la gallina ubriaca a Orvieto",
                  "Orvieto nascosta e luoghi insoliti",
                  "storia del Pozzo di San Patrizio Orvieto",
                  "MUSEO Claudio Faina Orvieto cosa vedere",
                  "Orvieto con bambini cosa fare",
                  "guida turistica Orvieto consigli utili",
                  "Orvieto sotterranea visita guidata opinioni",
                  "dove parcheggiare gratis a Orvieto centro",
                  "Tempio del Belvedere Orvieto rovina etrusca",
                  "Orvieto cantine storiche e degustazione vini",
                  "Cappella di San Brizio Luca Signorelli Duomo",
                  "Orvieto punti panoramici migliori",
                  "cosa vedere vicino a Orvieto nei dintorni",
                  "Orvieto artigianato locale ceramiche",
                  "Torre del Moro Orvieto salita e panorama",
                  "Orvieto d'inverno cosa vedere e fare",
                  "best things to do in Orvieto Umbria",
                  "Orvieto 1 day itinerary walk",
                  "St Patrick's Well Orvieto tickets and history",
                  "Orvieto Underground tour review",
                  "Duomo di Orvieto masterpieces to see",
                  "best local restaurants in Orvieto center",
                  "where to eat in Orvieto authentic food",
                  "traditional trattorias in Orvieto",
                  "cheap eats and street food in Orvieto",
                  "hidden gem restaurants in Orvieto",
                  "best historic restaurants in Orvieto",
                  "best pasta and pizza in Orvieto favorites",
                  "authentic local restaurants Orvieto",
                  "where do locals eat in Orvieto",
                  "what to see in Orvieto",
                  "best viewpoints in Orvieto",
                  "where to park in Orvieto",
                  "best things to do in Orvieto",
                  "Orvieto travel guide",
                  "local food specialties Orvieto",
                  "best coffee and pastry in Orvieto",
                  "Orvieto Cathedral Signorelli chapel history",
                  "Etruscan museum Orvieto Claudio Faina",
                  "Orvieto underground caves historical guide",
                  "places to visit near Orvieto Umbria"
              ]

              engines = ["google", "bing", "duckduckgo", "startpage", "yahoo"]
              tasks = []
              for q_idx, q in enumerate(queries):
                  for eng in engines:
                      tasks.append((q, eng))

              total_tasks = len(tasks)
              log(f"Inizio scraping di {total_tasks} combinazioni (50 query x 5 motori di ricerca)")

              Path("results_temp").mkdir(exist_ok=True)

              with ThreadPoolExecutor(max_workers=6) as executor:
                  futures = {
                      executor.submit(process_single_task, task[0], task[1], idx + 1, total_tasks): (task[0], task[1], idx + 1)
                      for idx, task in enumerate(tasks)
                  }

                  for future in as_completed(futures):
                      q, eng, t_idx = futures[future]
                      try:
                          links = future.result()
                          temp_file = Path("results_temp") / f"task_{t_idx:03d}.json"
                          with open(temp_file, "w", encoding="utf-8") as f:
                              json.dump({"query": q, "engine": eng, "links": links}, f, ensure_ascii=False, indent=2)
                      except Exception as e:
                          log(f"Errore grave nel thread task {t_idx}: {e}")

          if __name__ == "__main__":
              main()
          EOF

      - name: Esecuzione Scraping Veloce con Cookie Hijacking
        run: python -u stealth_scraper.py

      - name: Combinazione e Deduplica Risultati Finali
        if: always()
        shell: python
        run: |
          import json
          import glob
          import re
          import os

          engines = ["google", "bing", "duckduckgo", "startpage", "yahoo"]
          links_by_engine = {eng: [] for eng in engines}

          # Legge i file parziali salvati progressivamente su disco
          for filepath in glob.glob("results_temp/task_*.json"):
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      data = json.load(f)
                      eng = data.get("engine")
                      links = data.get("links", [])
                      if eng in links_by_engine and isinstance(links, list):
                          for l in links:
                              cleaned = re.sub(r"[\s\u200b\u200c\u200d\ufeff]+", "", l).strip()
                              if cleaned.startswith("http") and len(cleaned) >= 12:
                                  links_by_engine[eng].append(cleaned)
              except Exception as e:
                  print(f"Errore lettura {filepath}: {e}")

          # Salva la lista finale suddivisa per motore
          with open("output_macchina2_cdp.txt", "w", encoding="utf-8") as f:
              for eng in engines:
                  group_links = links_by_engine[eng]
                  # Ordina solo per rendere l'output leggibile, ma preserva i duplicati
                  group_links.sort()
                  f.write("=========================================\n")
                  f.write(f"{eng.upper()} ({len(group_links)} link estratti)\n")
                  f.write("=========================================\n")
                  for url in group_links:
                      f.write(url + "\n")
                  f.write("\n")

          print("File finale raggruppato generato con successo.")

      - name: Upload Artifact Macchina 2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
