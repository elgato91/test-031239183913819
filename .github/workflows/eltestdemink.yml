name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Dipendenze Scraper Veloce
        run: |
          pip install beautifulsoup4 requests "requests[socks]" curl-cffi

      - name: Setup Container WARP (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
            sleep 0.5
          done
          
          echo "Attesa stabilizzazione tunnel WARP..."
          sleep 6

      - name: Creazione Cartella Temporanea Risultati
        run: mkdir -p results_temp

      - name: Creazione Scraper Multithread Ultra-Stealth
        run: |
          cat << 'EOF' > stealth_scraper.py
          import json
          import re
          import sys
          import time
          import random
          import base64
          import threading
          from pathlib import Path
          from urllib.parse import urlparse, urlunparse, parse_qs, parse_qsl, urlencode, unquote, quote
          from concurrent.futures import ThreadPoolExecutor, as_completed
          from bs4 import BeautifulSoup
          from curl_cffi import requests

          def log(message: str):
              sys.stderr.write(message + "\n")
              sys.stderr.flush()

          def clean_url(url: str) -> str:
              try:
                  parsed = urlparse(url)
                  query_params = parse_qsl(parsed.query)
                  filtered_params = [
                      (k, v) for k, v in query_params
                      if k.lower() not in ["srsltid", "gclid", "fbclid"]
                      and not k.lower().startswith("utm_")
                  ]
                  new_query = urlencode(filtered_params)
                  return urlunparse((parsed.scheme, parsed.netloc, parsed.path, parsed.params, new_query, parsed.fragment))
              except Exception:
                  return url

          def normalize_url(url: str) -> str:
              try:
                  url_lower = url.lower().rstrip("/")
                  parsed = urlparse(url_lower)
                  netloc = parsed.netloc
                  if netloc.startswith("www."):
                      netloc = netloc[4:]
                  scheme = "https"
                  params = sorted(parse_qsl(parsed.query))
                  return urlunparse((scheme, netloc, parsed.path, "", urlencode(params), ""))
              except Exception:
                  return url

          def human_sleep(mean: float, std_dev: float):
              sleep_time = max(0.1, random.gauss(mean, std_dev))
              time.sleep(sleep_time)

          class ProxyPool:
              def __init__(self, ports):
                  self.ports = ports
                  self.last_used = {port: 0 for port in ports}
                  self.lock = threading.Lock()

              def get_proxy(self):
                  with self.lock:
                      # Seleziona la porta utilizzata meno di recente (Round-Robin perfetto)
                      sorted_ports = sorted(self.ports, key=lambda p: self.last_used[p])
                      best_port = sorted_ports[0]
                      self.last_used[best_port] = time.time()
                      return best_port

          PROXY_POOL = ProxyPool([40001, 40002, 40003, 40004, 40005, 40006])
          STARTPAGE_LOCK = threading.Lock()

          ACCEPT_LANGUAGES = [
              "it-IT,it;q=0.9,en-US;q=0.8,en;q=0.7",
              "it-IT,it;q=0.9",
              "en-US,en;q=0.9,it;q=0.8"
          ]

          BROWSER_PROFILES = {
              "chrome": {
                  "impersonate": "chrome120",
                  "ua": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
                  "accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
              },
              "edge": {
                  "impersonate": "chrome120",
                  "ua": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36 Edg/120.0.0.0",
                  "accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8",
              }
          }

          def get_minimal_headers(browser: str) -> dict:
              profile = BROWSER_PROFILES[browser]
              return {
                  "user-agent": profile["ua"],
                  "accept": profile["accept"],
                  "accept-language": random.choice(ACCEPT_LANGUAGES),
                  "accept-encoding": "gzip, deflate, br",
              }

          def extract_react_json(html_content: str) -> dict | None:
              start_str = '{"render":'
              idx = html_content.find(start_str)
              if idx == -1: return None
              brace_count, json_end = 0, -1
              for i in range(idx, len(html_content)):
                  if html_content[i] == "{": brace_count += 1
                  elif html_content[i] == "}": brace_count -= 1
                  if brace_count == 0:
                      json_end = i
                      break
              if json_end == -1: return None
              try: return json.loads(html_content[idx : json_end + 1])
              except Exception: return None

          def extract_google(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if href.startswith("/url?q="):
                      match = re.search(r"/url\?q=([^&]+)", href)
                      if match:
                          url = unquote(match.group(1))
                          if url.startswith("http") and "google.com" not in url:
                              links.append(url)
                  elif href.startswith("http") and "google.com" not in href:
                      links.append(href)
              return links

          def extract_bing(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if "bing.com/ck/a" in href:
                      try:
                          parsed = urlparse(href)
                          qs = parse_qs(parsed.query)
                          if "u" in qs:
                              u_val = qs["u"][0]
                              if u_val.startswith("a1"):
                                  u_val = u_val[2:]
                              u_val += "=" * ((4 - len(u_val) % 4) % 4)
                              decoded = base64.b64decode(u_val).decode("utf-8", errors="ignore")
                              if decoded.startswith("http"):
                                  links.append(decoded)
                      except: pass
                  elif href.startswith("http") and not any(d in href for d in ["bing.com", "microsoft.com", "bingviz"]):
                      links.append(href)
              return links

          def extract_duckduckgo(html):
              links = []
              for match in re.finditer(r'uddg=([^&"\'>\s]+)', html):
                  try:
                      real_url = unquote(match.group(1))
                      if real_url.startswith("http") and "duckduckgo.com" not in real_url:
                          links.append(real_url)
                  except Exception: pass
              return links

          def extract_startpage(html):
              links = []
              react_data = extract_react_json(html)
              if react_data:
                  try:
                      mainline = react_data.get("render", {}).get("presenter", {}).get("regions", {}).get("mainline", [])
                      for section in mainline:
                          if section.get("display_type") == "web-google" and "results" in section:
                              for item in section["results"]:
                                  if "clickUrl" in item:
                                      links.append(item["clickUrl"])
                  except Exception: pass
              soup = BeautifulSoup(html, "html.parser")
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if href.startswith("http") and not any(d in href for d in ["startpage.com", "ixquick.com"]):
                      links.append(href)
              return links

          def extract_yahoo(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if "r.search.yahoo.com" in href and "RU=" in href:
                      match = re.search(r"RU=([^/]+)", href)
                      if match:
                          url = unquote(match.group(1))
                          if url.startswith("http"):
                              links.append(url)
                  elif href.startswith("http") and not any(d in href for d in ["yahoo.com", "yimg.com", "yahoo.co.jp"]):
                      links.append(href)
              return links

          def fetch_startpage(session: requests.Session, query: str, browser: str) -> list[str] | None:
              headers = get_minimal_headers(browser)
              with STARTPAGE_LOCK:
                  try:
                      response_get = session.get("https://www.startpage.com/", headers=headers, timeout=8.0)
                      if response_get.status_code != 200: return None
                      sc_match = (
                          re.search(r'name=["\']sc["\'][^>]*value=["\']([^"\']+)["\']', response_get.text, re.IGNORECASE)
                          or re.search(r'value=["\']([^"\']+)["\'][^>]*name=["\']sc["\']', response_get.text, re.IGNORECASE)
                      )
                      sc_token = sc_match.group(1) if sc_match else ""
                  except Exception: return None

                  time.sleep(random.uniform(0.3, 0.8))

                  payload = {
                      "query": query, "sc": sc_token, "cat": "web", "t": "device",
                      "language": "italiano", "lui": "english", "qadf": "moderate"
                  }
                  headers_post = headers.copy()
                  headers_post.update({
                      "origin": "https://www.startpage.com", "referer": "https://www.startpage.com/",
                      "content-type": "application/x-www-form-urlencoded", "sec-fetch-dest": "empty",
                      "sec-fetch-mode": "cors", "sec-fetch-site": "same-origin"
                  })

                  try:
                      response_post = session.post("https://www.startpage.com/sp/search", headers=headers_post, data=payload, timeout=8.0)
                      if response_post.status_code != 200 or "captcha" in response_post.text.lower():
                          return None
                      links = extract_startpage(response_post.text)
                      return links if links else None
                  except Exception: return None

          def fetch_duckduckgo(session: requests.Session, query: str, browser: str) -> list[str] | None:
              headers = get_minimal_headers(browser)
              headers.update({
                  "referer": "https://duckduckgo.com/", "origin": "https://duckduckgo.com",
                  "sec-fetch-dest": "document", "sec-fetch-mode": "navigate",
                  "sec-fetch-site": "same-origin", "sec-fetch-user": "?1", "upgrade-insecure-requests": "1"
              })
              url = f"https://html.duckduckgo.com/html/?q={quote(query)}"
              for inner_attempt in range(1, 3):
                  try:
                      response = session.get(url, headers=headers, timeout=8.0)
                      if response.status_code == 202:
                          wait = random.uniform(1.5, 3.0) * inner_attempt
                          time.sleep(wait)
                          continue
                      if response.status_code != 200 or "captcha" in response.text.lower():
                          return None
                      links = extract_duckduckgo(response.text)
                      return links if links else None
                  except Exception: return None
              return None

          def fetch_google(session: requests.Session, query: str, browser: str) -> list[str] | None:
              headers = get_minimal_headers(browser)
              url = f"https://www.google.com/search?q={quote(query)}&gbv=1"
              try:
                  response = session.get(url, headers=headers, timeout=8.0)
                  if response.status_code != 200 or "captcha" in response.text.lower() or "unusual traffic" in response.text.lower(): 
                      return None
                  links = extract_google(response.text)
                  return links if links else None
              except Exception: return None

          def fetch_bing(session: requests.Session, query: str, browser: str) -> list[str] | None:
              headers = get_minimal_headers(browser)
              url = f"https://www.bing.com/search?q={quote(query)}"
              try:
                  response = session.get(url, headers=headers, timeout=8.0)
                  if response.status_code != 200 or "captcha" in response.text.lower() or "cloudflare" in response.text.lower(): 
                      return None
                  links = extract_bing(response.text)
                  return links if links else None
              except Exception: return None

          def fetch_yahoo(session: requests.Session, query: str, browser: str) -> list[str] | None:
              headers = get_minimal_headers(browser)
              url = f"https://search.yahoo.com/search?p={quote(query)}"
              try:
                  response = session.get(url, headers=headers, timeout=8.0)
                  if response.status_code != 200: return None
                  links = extract_yahoo(response.text)
                  return links if links else None
              except Exception: return None

          def process_single_task(query: str, engine: str, task_index: int, total_tasks: int) -> list[str]:
              # Scagliona leggermente gli avvii dei thread per evitare collisioni immediate
              time.sleep(random.uniform(0.1, 1.2))
              max_retries = 3
              for attempt in range(1, max_retries + 1):
                  port = PROXY_POOL.get_proxy()
                  if not port:
                      time.sleep(1.0)
                      continue

                  browser = random.choice(["chrome", "edge"])
                  impersonate_target = BROWSER_PROFILES[browser]["impersonate"]
                  proxies = {
                      "http": f"socks5h://127.0.0.1:{port}",
                      "https": f"socks5h://127.0.0.1:{port}"
                  }
                  session = requests.Session(impersonate=impersonate_target, proxies=proxies)

                  links = None
                  try:
                      if engine == "google": links = fetch_google(session, query, browser)
                      elif engine == "bing": links = fetch_bing(session, query, browser)
                      elif engine == "duckduckgo": links = fetch_duckduckgo(session, query, browser)
                      elif engine == "startpage": links = fetch_startpage(session, query, browser)
                      elif engine == "yahoo": links = fetch_yahoo(session, query, browser)
                  except Exception:
                      pass

                  if links is not None:
                      cleaned_links = [clean_url(l) for l in links if l]
                      log(f"[{task_index:03d}/{total_tasks}] [OK] {engine.upper()} -> {len(cleaned_links)} risultati per: '{query}'")
                      return cleaned_links
                  else:
                      # Cooldown breve locale senza distruggere e ricreare il container
                      time.sleep(random.uniform(1.0, 2.5))

              log(f"[{task_index:03d}/{total_tasks}] [FALLITO] {engine.upper()} per: '{query}'")
              return []

          def main():
              locs = ["Trastevere", "Testaccio", "Monti", "Prati", "Campo de Fiori"]
              queries = []
              for loc in locs:
                  queries.extend([
                      f"best restaurants in {loc} Rome",
                      f"best restaurants in {loc} Rome reviews blog",
                      f"where to eat in {loc} Rome local recommendations",
                      f"best traditional trattorias and osterias in {loc} Rome",
                      f"cheap eats and street food in {loc} Rome",
                      f"hidden gem restaurants in {loc} Rome",
                      f"best historic restaurants in {loc} Rome",
                      f"best pasta and pizza in {loc} Rome favorites",
                      f"authentic local restaurants {loc} Rome",
                      f"where do locals eat in {loc} Rome",
                  ])

              engines = ["google", "bing", "duckduckgo", "startpage", "yahoo"]
              tasks = []
              for q_idx, q in enumerate(queries):
                  for eng in engines:
                      tasks.append((q, eng))

              total_tasks = len(tasks)
              log(f"Inizio scraping di {total_tasks} combinazioni (50 query x 5 motori di ricerca)")

              # Cartella di output temporanea
              Path("results_temp").mkdir(exist_ok=True)

              # 6 thread paralleli su 6 proxy WARP indipendenti
              with ThreadPoolExecutor(max_workers=6) as executor:
                  futures = {
                      executor.submit(process_single_task, task[0], task[1], idx + 1, total_tasks): (task[0], task[1], idx + 1)
                      for idx, task in enumerate(tasks)
                  }

                  for future in as_completed(futures):
                      q, eng, t_idx = futures[future]
                      try:
                          links = future.result()
                          temp_file = Path("results_temp") / f"task_{t_idx:03d}.json"
                          with open(temp_file, "w", encoding="utf-8") as f:
                              json.dump({"query": q, "engine": eng, "links": links}, f, ensure_ascii=False, indent=2)
                      except Exception as e:
                          log(f"Errore grave nel thread task {t_idx}: {e}")

          if __name__ == "__main__":
              main()
          EOF

      - name: Esecuzione Scraping Veloce
        run: python -u stealth_scraper.py

      - name: Combinazione e Deduplica Risultati Finali
        if: always()
        run: |
          cat << 'EOF' > m2_merge.py
          import json
          import glob
          import re
          import os
          from urllib.parse import urlparse, parse_qsl, urlencode, urlunparse

          def clean_url(url: str) -> str:
              try:
                  parsed = urlparse(url)
                  query_params = parse_qsl(parsed.query)
                  filtered_params = [
                      (k, v) for k, v in query_params
                      if k.lower() not in ["srsltid", "gclid", "fbclid"]
                      and not k.lower().startswith("utm_")
                  ]
                  new_query = urlencode(filtered_params)
                  return urlunparse((parsed.scheme, parsed.netloc, parsed.path, parsed.params, new_query, parsed.fragment))
              except Exception:
                  return url

          def normalize_url(url: str) -> str:
              try:
                  url_lower = url.lower().rstrip("/")
                  parsed = urlparse(url_lower)
                  netloc = parsed.netloc
                  if netloc.startswith("www."):
                      netloc = netloc[4:]
                  scheme = "https"
                  params = sorted(parse_qsl(parsed.query))
                  return urlunparse((scheme, netloc, parsed.path, "", urlencode(params), ""))
              except Exception:
                  return url

          all_urls = []
          # Legge i file parziali salvati progressivamente su disco
          for filepath in glob.glob("results_temp/task_*.json"):
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      data = json.load(f)
                      links = data.get("links", [])
                      if isinstance(links, list):
                          all_urls.extend(links)
              except Exception as e:
                  print(f"Errore lettura {filepath}: {e}")

          seen_normalized = set()
          deduped_urls = []
          for u in all_urls:
              cleaned = re.sub(r"[\s\u200b\u200c\u200d\ufeff]+", "", u).strip()
              if not cleaned.startswith("http") or len(cleaned) < 12:
                  continue
              norm = normalize_url(cleaned)
              if norm not in seen_normalized:
                  seen_normalized.add(norm)
                  deduped_urls.append(cleaned)

          deduped_urls.sort()

          # Salva la lista pulita finale (sarà creata anche se vuota, evitando errori nello step successivo)
          with open("output_macchina2_cdp.txt", "w", encoding="utf-8") as f:
              for url in deduped_urls:
                  f.write(url + "\n")

          print(f"File finale generato: {len(deduped_urls)} URL unici estratti e deduplicati.")
          EOF
          python m2_merge.py

      - name: Upload Artifact Macchina 2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
