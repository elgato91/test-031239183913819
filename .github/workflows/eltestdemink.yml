name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl-cffi
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup Container WARP (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
            sleep 0.5
          done
          
          echo "Attesa stabilizzazione tunnel WARP..."
          sleep 6

      - name: Inizializzazione Code DISTRIBUITE - STEP 1
        run: |
          cat << 'EOF' > m2_step1_setup.py
          import json
          from urllib.parse import quote_plus
          
          locs = ["Trastevere", "Testaccio", "Monti", "Prati", "Campo de Fiori"]
          queries = []
          for loc in locs:
              queries.extend([
                  f"best restaurants in {loc} Rome",
                  f"best restaurants in {loc} Rome reviews blog",
                  f"where to eat in {loc} Rome local recommendations",
                  f"best traditional trattorias and osterias in {loc} Rome",
                  f"cheap eats and street food in {loc} Rome",
                  f"hidden gem restaurants in {loc} Rome",
                  f"best historic restaurants in {loc} Rome",
                  f"best pasta and pizza in {loc} Rome favorites",
                  f"authentic local restaurants {loc} Rome",
                  f"where do locals eat in {loc} Rome",
              ])
          
          TARGETS = []
          for q in queries:
              TARGETS.append(f"https://www.google.com/search?q={quote_plus(q)}&gbv=1")
              TARGETS.append(f"https://www.bing.com/search?q={quote_plus(q)}")
              TARGETS.append(f"https://html.duckduckgo.com/html/?q={quote_plus(q)}")
              TARGETS.append(f"https://www.startpage.com/sp/search?query={quote_plus(q)}")
              TARGETS.append(f"https://search.yahoo.com/search?p={quote_plus(q)}")
          
          # Suddivisione matematica statica (Chunking) per performance ottimali
          for i in range(1, 7):
              chunk = TARGETS[i-1::6]
              with open(f"/tmp/step1_queue_{i}.json", "w") as f:
                  json.dump(chunk, f)
          print(f"Code distribuite Step 1 generate con successo. Totale target: {len(TARGETS)}")
          EOF
          python -u m2_step1_setup.py

      - name: Creazione Script Python - STEP 1 (Veloce curl-cffi)
        run: |
          cat << 'EOF' > m2_step1.py
          import time
          import sys
          import random
          import os
          import json
          import re
          from urllib.parse import urlparse, parse_qsl, urlencode, urlunparse, unquote
          from bs4 import BeautifulSoup
          from curl_cffi import requests

          if len(sys.argv) < 2: sys.exit(1)
          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          def clean_url(url: str) -> str:
              try:
                  parsed = urlparse(url)
                  query_params = parse_qsl(parsed.query)
                  filtered_params = [
                      (k, v) for k, v in query_params
                      if k.lower() not in ["srsltid", "gclid", "fbclid"]
                      and not k.lower().startswith("utm_")
                  ]
                  new_query = urlencode(filtered_params)
                  return urlunparse((parsed.scheme, parsed.netloc, parsed.path, parsed.params, new_query, parsed.fragment))
              except Exception:
                  return url

          def normalize_url(url: str) -> str:
              try:
                  url_lower = url.lower().rstrip("/")
                  parsed = urlparse(url_lower)
                  netloc = parsed.netloc
                  if netloc.startswith("www."):
                      netloc = netloc[4:]
                  scheme = "https"
                  params = sorted(parse_qsl(parsed.query))
                  return urlunparse((scheme, netloc, parsed.path, "", urlencode(params), ""))
              except Exception:
                  return url

          def extract_react_json(html_content: str) -> dict | None:
              start_str = '{"render":'
              idx = html_content.find(start_str)
              if idx == -1: return None
              brace_count, json_end = 0, -1
              for i in range(idx, len(html_content)):
                  if html_content[i] == "{": brace_count += 1
                  elif html_content[i] == "}": brace_count -= 1
                  if brace_count == 0:
                      json_end = i
                      break
              if json_end == -1: return None
              try: return json.loads(html_content[idx : json_end + 1])
              except Exception: return None

          def extract_google(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if href.startswith("/url?q="):
                      match = re.search(r"/url\?q=([^&]+)", href)
                      if match:
                          url = unquote(match.group(1))
                          if url.startswith("http") and "google.com" not in url:
                              links.append(url)
                  elif href.startswith("http") and "google.com" not in href:
                      links.append(href)
              return links

          def extract_bing(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if href.startswith("http") and not any(d in href for d in ["bing.com", "microsoft.com", "bingviz"]):
                      links.append(href)
              return links

          def extract_duckduckgo(html):
              links = []
              for match in re.finditer(r'uddg=([^&"\'>\s]+)', html):
                  try:
                      real_url = unquote(match.group(1))
                      if real_url.startswith("http") and "duckduckgo.com" not in real_url:
                          links.append(real_url)
                  except Exception: pass
              return links

          def extract_startpage(html):
              links = []
              react_data = extract_react_json(html)
              if react_data:
                  try:
                      mainline = react_data.get("render", {}).get("presenter", {}).get("regions", {}).get("mainline", [])
                      for section in mainline:
                          if section.get("display_type") == "web-google" and "results" in section:
                              for item in section["results"]:
                                  if "clickUrl" in item:
                                      links.append(item["clickUrl"])
                  except Exception: pass
              soup = BeautifulSoup(html, "html.parser")
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if href.startswith("http") and not any(d in href for d in ["startpage.com", "ixquick.com"]):
                      links.append(href)
              return links

          def extract_yahoo(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if "r.search.yahoo.com" in href and "RU=" in href:
                      match = re.search(r"RU=([^/]+)", href)
                      if match:
                          url = unquote(match.group(1))
                          if url.startswith("http"):
                              links.append(url)
                  elif href.startswith("http") and not any(d in href for d in ["yahoo.com", "yimg.com", "yahoo.co.jp"]):
                      links.append(href)
              return links

          def extract_links(html, url):
              links = []
              if "google.com" in url: links = extract_google(html)
              elif "bing.com" in url: links = extract_bing(html)
              elif "duckduckgo.com" in url: links = extract_duckduckgo(html)
              elif "startpage.com" in url: links = extract_startpage(html)
              elif "yahoo.com" in url: links = extract_yahoo(html)
              
              cleaned_links = []
              for l in links:
                  cleaned = clean_url(l)
                  if cleaned: cleaned_links.append(cleaned)
              return cleaned_links

          def verify_proxy_active(port, max_retries=5, delay=5):
              test_session = requests.Session(impersonate="chrome120")
              test_session.proxies = {"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}
              for _ in range(max_retries):
                  try:
                      resp = test_session.get("https://api6.ipify.org?format=json", timeout=6)
                      if resp.status_code == 200: return True
                  except: pass
                  time.sleep(delay)
              return False

          def validate_html(html, url, status_code):
              if status_code >= 400: return False, f"Blocco HTTP {status_code}"
              if not html or len(html.strip()) < 300: return False, "HTML vuoto"
              
              low_html = html.lower()
              blocking_indicators = [
                  "challenge-platform", "access denied", "403 forbidden", "cloudflare", 
                  "just a moment", "security verification", "please enable js", "enable javascript",
                  "are you a robot", "please wait for verification", "we've detected unusual activity",
                  "if you are not redirected", "unusual traffic from your computer network",
                  "checking your browser", "prove your humanity", "captcha verification", 
                  "please enter in the characters you see below", "access to this page is forbidden",
                  "error 1020", "you have been blocked", "pardon our interruption",
                  "se non vieni reindirizzato", "se hai problemi ad accedere", 
                  "robot challenge screen", "ci siamo quasi", "verifica di sicurezza"
              ]
              
              for ind in blocking_indicators:
                  if ind in low_html: return False, f"WAF/Captcha rilevato: {ind}"
              return True, ""

          if not verify_proxy_active(ACTIVE_PORT): sys.exit(0)

          queue_file = f"/tmp/step1_queue_{node_id}.json"
          if not os.path.exists(queue_file): sys.exit(0)
          
          with open(queue_file, "r") as f:
              targets = json.load(f)

          results_data = []
          failed_targets = []
          
          session = requests.Session(impersonate="chrome120")
          session.proxies = {"http": f"socks5h://127.0.0.1:{ACTIVE_PORT}", "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"}
          session.headers.update({
              "Accept-Language": "it-IT,it;q=0.9,en-US;q=0.8,en;q=0.7",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8"
          })

          for url in targets:
              print(f"[NODO {node_id}] [STEP 1] Richiesta: {url}", flush=True)
              try:
                  resp = session.get(url, timeout=12)
                  is_ok, err_msg = validate_html(resp.text, url, resp.status_code)
                  
                  if is_ok:
                      extracted = extract_links(resp.text, url)
                      for l in extracted:
                          results_data.append({"url": l, "source_url": url})
                      print(f"[NODO {node_id}] -> Successo Rapido! Estratti {len(extracted)} link.", flush=True)
                  else:
                      print(f"[NODO {node_id}] -> Bloccato, passo allo Step 2: {err_msg}", flush=True)
                      failed_targets.append(url)
              except Exception as e:
                  print(f"[NODO {node_id}] -> Errore rete. Passo allo Step 2.", flush=True)
                  failed_targets.append(url)
              
              time.sleep(random.uniform(1.0, 2.0))

          with open(f"output_node_{node_id}_step1.json", "w", encoding="utf-8") as f:
              json.dump(results_data, f, ensure_ascii=False, indent=2)
          with open(f"failed_node_{node_id}.json", "w", encoding="utf-8") as f:
              json.dump(failed_targets, f)
          EOF

      - name: Esecuzione Scraping Parallelo - STEP 1
        run: |
          echo 'Avvio processi paralleli per STEP 1 (Velocità Pura)...'
          touch node1_step1.log node2_step1.log node3_step1.log node4_step1.log node5_step1.log node6_step1.log
          tail -q -f node1_step1.log node2_step1.log node3_step1.log node4_step1.log node5_step1.log node6_step1.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            python -u m2_step1.py $i > node${i}_step1.log 2>&1 &
            PIDS+=($!)
            sleep 1.5
          done

          wait "${PIDS[@]}"
          kill $TAIL_PID || true

      - name: Refresh IP Container per lo STEP 2
        run: |
          echo 'Riavvio dei container per pulire la sessione WARP per lo Step 2...'
          docker restart warproxy-1 warproxy-2 warproxy-3 warproxy-4 warproxy-5 warproxy-6
          sleep 6

      - name: Inizializzazione Code DISTRIBUITE - STEP 2
        run: |
          cat << 'EOF' > m2_step2_setup.py
          import json
          import os

          merged_failed = []
          for i in range(1, 7):
              filename = f"failed_node_{i}.json"
              if os.path.exists(filename):
                  with open(filename, "r", encoding="utf-8") as f:
                      try: merged_failed.extend(json.load(f))
                      except Exception: pass
          
          unique_failed = list(dict.fromkeys(merged_failed))
          
          for i in range(1, 7):
              chunk = unique_failed[i-1::6]
              with open(f"/tmp/step2_queue_{i}.json", "w") as f:
                  json.dump(chunk, f)
                  
          print(f"Code Step 2 distribuite con {len(unique_failed)} target da recuperare con CloakBrowser.")
          EOF
          python -u m2_step2_setup.py

      - name: Creazione Script Python - STEP 2 (Async + CloakBrowser Ottimizzato - No CDP Noise)
        run: |
          cat << 'EOF' > m2_step2.py
          import asyncio
          import time
          import sys
          import random
          import os
          import json
          import re
          from urllib.parse import urlparse, parse_qs, parse_qsl, urlencode, urlunparse, unquote
          from cloakbrowser import launch_persistent_context_async
          from bs4 import BeautifulSoup

          if len(sys.argv) < 2: sys.exit(1)
          node_id = int(sys.argv[1])
          INITIAL_PORT = 40000 + node_id

          def clean_url(url: str) -> str:
              try:
                  parsed = urlparse(url)
                  query_params = parse_qsl(parsed.query)
                  filtered_params = [
                      (k, v) for k, v in query_params
                      if k.lower() not in ["srsltid", "gclid", "fbclid"]
                      and not k.lower().startswith("utm_")
                  ]
                  new_query = urlencode(filtered_params)
                  return urlunparse((parsed.scheme, parsed.netloc, parsed.path, parsed.params, new_query, parsed.fragment))
              except Exception:
                  return url

          def normalize_url(url: str) -> str:
              try:
                  url_lower = url.lower().rstrip("/")
                  parsed = urlparse(url_lower)
                  netloc = parsed.netloc
                  if netloc.startswith("www."):
                      netloc = netloc[4:]
                  scheme = "https"
                  params = sorted(parse_qsl(parsed.query))
                  return urlunparse((scheme, netloc, parsed.path, "", urlencode(params), ""))
              except Exception:
                  return url

          def extract_react_json(html_content: str) -> dict | None:
              start_str = '{"render":'
              idx = html_content.find(start_str)
              if idx == -1: return None
              brace_count, json_end = 0, -1
              for i in range(idx, len(html_content)):
                  if html_content[i] == "{": brace_count += 1
                  elif html_content[i] == "}": brace_count -= 1
                  if brace_count == 0:
                      json_end = i
                      break
              if json_end == -1: return None
              try: return json.loads(html_content[idx : json_end + 1])
              except Exception: return None

          def extract_google(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if href.startswith("/url?q="):
                      match = re.search(r"/url\?q=([^&]+)", href)
                      if match:
                          url = unquote(match.group(1))
                          if url.startswith("http") and "google.com" not in url:
                              links.append(url)
                  elif href.startswith("http") and "google.com" not in href:
                      links.append(href)
              return links

          def extract_bing(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if href.startswith("http") and not any(d in href for d in ["bing.com", "microsoft.com", "bingviz"]):
                      links.append(href)
              return links

          def extract_duckduckgo(html):
              links = []
              for match in re.finditer(r'uddg=([^&"\'>\s]+)', html):
                  try:
                      real_url = unquote(match.group(1))
                      if real_url.startswith("http") and "duckduckgo.com" not in real_url:
                          links.append(real_url)
                  except Exception: pass
              return links

          def extract_startpage(html):
              links = []
              react_data = extract_react_json(html)
              if react_data:
                  try:
                      mainline = react_data.get("render", {}).get("presenter", {}).get("regions", {}).get("mainline", [])
                      for section in mainline:
                          if section.get("display_type") == "web-google" and "results" in section:
                              for item in section["results"]:
                                  if "clickUrl" in item:
                                      links.append(item["clickUrl"])
                  except Exception: pass
              soup = BeautifulSoup(html, "html.parser")
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if href.startswith("http") and not any(d in href for d in ["startpage.com", "ixquick.com"]):
                      links.append(href)
              return links

          def extract_yahoo(html):
              soup = BeautifulSoup(html, "html.parser")
              links = []
              for a in soup.find_all("a", href=True):
                  href = a["href"]
                  if "r.search.yahoo.com" in href and "RU=" in href:
                      match = re.search(r"RU=([^/]+)", href)
                      if match:
                          url = unquote(match.group(1))
                          if url.startswith("http"):
                              links.append(url)
                  elif href.startswith("http") and not any(d in href for d in ["yahoo.com", "yimg.com", "yahoo.co.jp"]):
                      links.append(href)
              return links

          def extract_links(html, url):
              links = []
              if "google.com" in url: links = extract_google(html)
              elif "bing.com" in url: links = extract_bing(html)
              elif "duckduckgo.com" in url: links = extract_duckduckgo(html)
              elif "startpage.com" in url: links = extract_startpage(html)
              elif "yahoo.com" in url: links = extract_yahoo(html)
              
              cleaned_links = []
              for l in links:
                  cleaned = clean_url(l)
                  if cleaned: cleaned_links.append(cleaned)
              return cleaned_links

          def get_query_from_url(url, default="best restaurants in Trastevere Rome"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries: return queries[param][0]
              except: pass
              return default

          async def main():
              queue_file = f"/tmp/step2_queue_{node_id}.json"
              if not os.path.exists(queue_file): return
              
              with open(queue_file, "r") as f: targets = json.load(f)
              if not targets:
                  with open(f"output_node_{node_id}_step2.json", "w", encoding="utf-8") as f: json.dump([], f)
                  return

              home_dir = os.path.expanduser("~")
              profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2")
              windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
              
              base_args = [
                  "--no-sandbox",
                  "--disable-dev-shm-usage",
                  f"--fingerprint={random.randint(100000, 999999)}",
                  f"--fingerprint-fonts-dir={windows_fonts_dir}"
              ]

              print(f"[NODO {node_id}] Avvio singola sessione Persistente (Warmup + Scraping)...", flush=True)
              try:
                  context = await launch_persistent_context_async(
                      profile_dir,
                      headless=False,
                      humanize=True,
                      human_config={"mistype_chance": 0.05, "typing_delay": 100, "idle_between_actions": True},
                      proxy=f"socks5://127.0.0.1:{INITIAL_PORT}",
                      geoip=True,
                      viewport={"width": 1920, "height": 1080},
                      args=base_args
                  )
                  page = await context.new_page()
                  
                  # WARMUP Integrato (Reimpostato all'originale)
                  await page.goto("https://www.yelp.com", wait_until="domcontentloaded", timeout=25000)
                  await asyncio.sleep(2)
                  await page.goto("https://www.reddit.com", wait_until="domcontentloaded", timeout=25000)
                  await asyncio.sleep(2)

              except Exception as e:
                  print(f"[NODO {node_id}] Errore critico avvio Browser: {e}")
                  return

              results_data = []

              for url in targets:
                  print(f"[NODO {node_id}] Recupero Avanzato: {url}", flush=True)
                  try:
                      query_to_search = get_query_from_url(url)
                      
                      if "bing.com" in url:
                          await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.5, 4.0))
                          try:
                              search_box = page.locator("textarea[name='q'], input[name='q']").first
                              await search_box.fill(query_to_search) 
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                              
                      elif "startpage.com" in url:
                          await page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.0, 3.5))
                          try:
                              search_box = page.locator("input#q").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                      elif "html.duckduckgo.com" in url:
                          await page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.0, 3.5))
                          try:
                              search_box = page.locator("input[name=q]").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                      else:
                          await page.goto(url, wait_until="domcontentloaded", timeout=40000)
                      
                      try: await page.wait_for_load_state("networkidle", timeout=12000)
                      except: pass
                          
                      await asyncio.sleep(6) 
                      
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(1)
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(2)
                      
                      raw_html = await page.content()
                      low_html = raw_html.lower()
                      
                      blocking_indicators = [
                          "just a moment", "are you a robot", "prove your humanity",
                          "captcha verification", "please enter in the characters you see below",
                          "access is forbidden", "access to this page is forbidden", "challenge-platform",
                          "we've detected unusual activity"
                      ]
                      is_blocked = any(b in low_html for b in blocking_indicators)
                      
                      if len(raw_html) > 300 and not is_blocked:
                          extracted = extract_links(raw_html, url)
                          for link in extracted:
                              results_data.append({"url": link, "source_url": url})
                          print(f"[NODO {node_id}] -> Recuperato con Successo! Estratti {len(extracted)} link.", flush=True)
                      else:
                          print(f"[NODO {node_id}] -> Fallito (WAF/Captcha rilevato).", flush=True)

                  except Exception as e:
                      print(f"[NODO {node_id}] -> Errore esecuzione: {e}", flush=True)
                  
                  await asyncio.sleep(random.uniform(4.0, 7.0))

              try: await context.close()
              except: pass

              with open(f"output_node_{node_id}_step2.json", "w", encoding="utf-8") as f:
                  json.dump(results_data, f, ensure_ascii=False, indent=2)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Scraping Parallelo - STEP 2 (Fallback CloakBrowser)
        run: |
          echo 'Avvio processi paralleli per STEP 2 sui target falliti...'
          touch node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log
          tail -q -f node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            python -u m2_step2.py $i > node${i}_step2.log 2>&1 &
            PIDS+=($!)
            sleep 1.5
          done

          wait "${PIDS[@]}"
          kill $TAIL_PID || true
          
          for i in {1..6}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

          # Inizializza come array JSON vuoto per evitare errori di decoding se un worker non ha prodotto file
          for i in {1..6}; do
            if [ ! -s output_node_${i}_step1.json ]; then echo "[]" > output_node_${i}_step1.json; fi
            if [ ! -s output_node_${i}_step2.json ]; then echo "[]" > output_node_${i}_step2.json; fi
          done

      - name: Combinazione e Deduplica Risultati Finali
        run: |
          cat << 'EOF' > m2_merge.py
          import json
          import glob
          import re
          from urllib.parse import urlparse, parse_qsl, urlencode, urlunparse

          def clean_url(url: str) -> str:
              try:
                  parsed = urlparse(url)
                  query_params = parse_qsl(parsed.query)
                  filtered_params = [
                      (k, v) for k, v in query_params
                      if k.lower() not in ["srsltid", "gclid", "fbclid"]
                      and not k.lower().startswith("utm_")
                  ]
                  new_query = urlencode(filtered_params)
                  return urlunparse((parsed.scheme, parsed.netloc, parsed.path, parsed.params, new_query, parsed.fragment))
              except Exception:
                  return url

          def normalize_url(url: str) -> str:
              try:
                  url_lower = url.lower().rstrip("/")
                  parsed = urlparse(url_lower)
                  netloc = parsed.netloc
                  if netloc.startswith("www."):
                      netloc = netloc[4:]
                  scheme = "https"
                  params = sorted(parse_qsl(parsed.query))
                  return urlunparse((scheme, netloc, parsed.path, "", urlencode(params), ""))
              except Exception:
                  return url

          all_urls = []
          for filepath in glob.glob("output_node_*_step*.json"):
              try:
                  with open(filepath, "r", encoding="utf-8") as f:
                      data = json.load(f)
                      for item in data:
                          if "url" in item:
                              all_urls.append(item["url"])
              except Exception as e:
                  print(f"Errore lettura {filepath}: {e}")

          seen_normalized = set()
          deduped_urls = []
          for u in all_urls:
              cleaned = re.sub(r"[\s\u200b\u200c\u200d\ufeff]+", "", u).strip()
              if not cleaned.startswith("http") or len(cleaned) < 12:
                  continue
              norm = normalize_url(cleaned)
              if norm not in seen_normalized:
                  seen_normalized.add(norm)
                  deduped_urls.append(cleaned)

          deduped_urls.sort()

          with open("output_macchina2_cdp.txt", "w", encoding="utf-8") as f:
              for url in deduped_urls:
                  f.write(url + "\n")

          print(f"File unificato generato: {len(deduped_urls)} URL univoci scritti in output_macchina2_cdp.txt")
          EOF
          python m2_merge.py

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
