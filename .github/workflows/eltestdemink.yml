name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl-cffi
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup Container WARP (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
          done
          
          echo "Attesa stabilizzazione tunnel WARP (Polling intelligente)..."
          for i in {1..6}; do
            PORT=$((40000 + i))
            for attempt in {1..15}; do
              if curl -s -m 5 -x socks5h://127.0.0.1:$PORT https://api6.ipify.org > /dev/null; then
                echo "WARP proxy $PORT stabile e pronto."
                break
              fi
              sleep 1
            done
          done

      - name: Esecuzione STEP 1 (Multithreading Dinamico curl-cffi)
        run: |
          cat << 'EOF' > m2_step1_master.py
          import time
          import random
          import json
          import queue
          import threading
          from bs4 import BeautifulSoup
          from curl_cffi import requests

          TARGETS = [
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          # Coda centralizzata: i nodi pescano dinamicamente
          q = queue.Queue()
          for t in TARGETS: q.put(t)

          results_list = []
          failed_targets = []
          lock = threading.Lock()

          def validate_html(html, url, status_code):
              if status_code >= 400: return False, f"Blocco HTTP {status_code}"
              if not html or len(html.strip()) < 300: return False, "HTML vuoto"
              if any(site in url for site in DIAGNOSTIC_SITES): return True, ""
              
              low_html = html.lower()
              blocking_indicators = [
                  "challenge-platform", "access denied", "403 forbidden", "cloudflare", 
                  "just a moment", "security verification", "please enable js", "enable javascript",
                  "are you a robot", "please wait for verification", "we've detected unusual activity",
                  "if you are not redirected", "unusual traffic from your computer network",
                  "checking your browser", "prove your humanity", "captcha verification", 
                  "please enter in the characters you see below", "access to this page is forbidden",
                  "error 1020", "you have been blocked", "pardon our interruption",
                  "se non vieni reindirizzato", "se hai problemi ad accedere", 
                  "robot challenge screen", "ci siamo quasi", "verifica di sicurezza"
              ]
              for ind in blocking_indicators:
                  if ind in low_html: return False, f"WAF/Captcha: {ind}"
              return True, ""

          def worker_step1(node_id, port):
              session = requests.Session(impersonate="chrome120")
              session.proxies = {"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}
              session.headers.update({
                  "Accept-Language": "it-IT,it;q=0.9,en-US;q=0.8,en;q=0.7",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8"
              })

              while True:
                  try:
                      url = q.get_nowait()
                  except queue.Empty:
                      break

                  print(f"[NODO {node_id}] Analizzando: {url}", flush=True)
                  try:
                      resp = session.get(url, timeout=12)
                      is_ok, err_msg = validate_html(resp.text, url, resp.status_code)
                      
                      if is_ok:
                          soup = BeautifulSoup(resp.text, 'html.parser')
                          text = soup.get_text(separator=' ', strip=True)[:5000]
                          if any(site in url for site in DIAGNOSTIC_SITES):
                              text = soup.get_text(separator=' ', strip=True)
                          with lock:
                              results_list.append(f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO:\n{text}\n")
                          print(f"[NODO {node_id}] -> Successo Rapido!", flush=True)
                      else:
                          print(f"[NODO {node_id}] -> Bloccato ({err_msg}). Passo allo Step 2.", flush=True)
                          with lock: failed_targets.append(url)
                  except Exception as e:
                      print(f"[NODO {node_id}] -> Errore di rete. Passo allo Step 2.", flush=True)
                      with lock: failed_targets.append(url)
                  
                  time.sleep(random.uniform(1.0, 2.0))
                  q.task_done()

          # Avvio dei 6 Worker concorrenti
          threads = []
          for i in range(1, 7):
              t = threading.Thread(target=worker_step1, args=(i, 40000 + i))
              t.start()
              threads.append(t)

          for t in threads: t.join()

          with open("output_step1.txt", "w", encoding="utf-8") as f:
              f.write(f"\n{'#'*60}\nREPORT STEP 1 (Veloce curl-cffi)\n{'#'*60}\n")
              f.write("".join(results_list))

          # Esportazione target falliti per lo Step 2
          with open("failed_targets.json", "w", encoding="utf-8") as f:
              json.dump(list(set(failed_targets)), f)

          print("Step 1 Completato in modo dinamico e sincronizzato.")
          EOF
          python -u m2_step1_master.py

      - name: Refresh IP Container per lo STEP 2
        run: |
          echo 'Riavvio dei container per pulire la sessione WARP per lo Step 2...'
          docker restart warproxy-1 warproxy-2 warproxy-3 warproxy-4 warproxy-5 warproxy-6
          
          echo "Attesa nuova stabilizzazione WARP..."
          for i in {1..6}; do
            PORT=$((40000 + i))
            for attempt in {1..10}; do
              if curl -s -m 5 -x socks5h://127.0.0.1:$PORT https://api6.ipify.org > /dev/null; then break; fi
              sleep 1
            done
          done

      - name: Esecuzione STEP 2 (Asyncio Dinamico CloakBrowser su Target Falliti)
        run: |
          cat << 'EOF' > m2_step2_master.py
          import asyncio
          import time
          import random
          import os
          import json
          from urllib.parse import urlparse, parse_qs
          from cloakbrowser import launch_persistent_context_async
          from bs4 import BeautifulSoup

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p', 'find_desc']:
                      if param in queries: return queries[param][0]
              except: pass
              return default

          async def worker_step2(node_id, port, q, results_list):
              if q.empty(): return  # Non istanziare alcun browser se la coda è già vuota!

              home_dir = os.path.expanduser("~")
              profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2")
              windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
              
              base_args = [
                  "--no-sandbox", "--disable-dev-shm-usage",
                  f"--fingerprint={random.randint(100000, 999999)}",
                  f"--fingerprint-fonts-dir={windows_fonts_dir}"
              ]

              context = None
              page = None

              while True:
                  try:
                      url = q.get_nowait()
                  except asyncio.QueueEmpty:
                      break

                  # Warmup Lazily Evaluated: Il browser parte solo se c'è almeno 1 URL
                  if context is None:
                      print(f"[NODO {node_id}] Avvio Browser Cloak (Warmup)...", flush=True)
                      try:
                          context = await launch_persistent_context_async(
                              profile_dir, headless=False, humanize=True,
                              human_config={"mistype_chance": 0.05, "typing_delay": 100, "idle_between_actions": True},
                              proxy=f"socks5://127.0.0.1:{port}", geoip=True,
                              viewport={"width": 1920, "height": 1080}, args=base_args
                          )
                          page = await context.new_page()
                          await page.goto("https://www.yelp.com", wait_until="domcontentloaded", timeout=25000)
                          await asyncio.sleep(2)
                          await page.goto("https://www.reddit.com", wait_until="domcontentloaded", timeout=25000)
                          await asyncio.sleep(2)
                      except Exception as e:
                          print(f"[NODO {node_id}] Errore critico avvio Browser: {e}")
                          q.task_done()
                          break

                  print(f"[NODO {node_id}] Recupero Avanzato: {url}", flush=True)
                  try:
                      query_to_search = get_query_from_url(url)
                      
                      # RICERCHE NATIVE
                      if "bing.com" in url:
                          await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.5, 4.0))
                          try:
                              search_box = page.locator("textarea[name='q'], input[name='q']").first
                              await search_box.fill(query_to_search) 
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                              
                      elif "startpage.com" in url:
                          await page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.0, 3.5))
                          try:
                              search_box = page.locator("input#q").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                      elif "html.duckduckgo.com" in url:
                          await page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                          await asyncio.sleep(random.uniform(2.0, 3.5))
                          try:
                              search_box = page.locator("input[name=q]").first
                              await search_box.fill(query_to_search)
                              await page.keyboard.press("Enter")
                          except: await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                      else:
                          await page.goto(url, wait_until="domcontentloaded", timeout=40000)
                      
                      try: await page.wait_for_load_state("networkidle", timeout=12000)
                      except: pass
                          
                      await asyncio.sleep(6) 
                      
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(1)
                      await page.keyboard.press("PageDown")
                      await asyncio.sleep(2)
                      
                      raw_html = await page.content()
                      soup = BeautifulSoup(raw_html, 'html.parser')
                      text = soup.get_text(separator=' ', strip=True)[:5000]
                      text_lower = text.lower()
                      
                      blocking_indicators = [
                          "just a moment", "are you a robot", "prove your humanity",
                          "captcha verification", "please enter in the characters you see below",
                          "access is forbidden", "access to this page is forbidden", "challenge-platform",
                          "we've detected unusual activity"
                      ]
                      is_blocked = any(b in text_lower for b in blocking_indicators)
                      
                      if len(text) > 150 and not is_blocked:
                          results_list.append(f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO ESTRATTO:\n{text}\n")
                          print(f"[NODO {node_id}] -> Recuperato con Successo!", flush=True)
                      else:
                          results_list.append(f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nFALLITO (Blocco WAF/Captcha)\n")
                          print(f"[NODO {node_id}] -> Fallito.", flush=True)

                  except Exception as e:
                      print(f"[NODO {node_id}] -> Errore esecuzione: {e}", flush=True)
                      results_list.append(f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nERRORE: {e}\n")
                  
                  await asyncio.sleep(random.uniform(4.0, 7.0))
                  q.task_done()

              if context:
                  try: await context.close()
                  except: pass

          async def main():
              if not os.path.exists("failed_targets.json"): return
              with open("failed_targets.json", "r") as f:
                  targets = json.load(f)
              
              if not targets: return

              q = asyncio.Queue()
              for t in targets: q.put_nowait(t)

              results_list = []
              
              # Lancia tutti e 6 i worker (Massima Potenza!)
              # I worker "estrarranno" il lavoro dalla coda asincrona man mano che si liberano.
              tasks = []
              for i in range(1, 7):
                  port = 40000 + i
                  tasks.append(worker_step2(i, port, q, results_list))

              await asyncio.gather(*tasks)

              with open("output_step2.txt", "w", encoding="utf-8") as f:
                  f.write(f"\n{'#'*60}\nREPORT STEP 2 (Fallback CloakBrowser)\n{'#'*60}\n")
                  f.write("".join(results_list))

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          python -u m2_step2_master.py

      - name: Pulizia Proxy e Combina Output
        run: |
          for i in {1..6}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

          touch output_step1.txt output_step2.txt
          cat output_step1.txt output_step2.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
