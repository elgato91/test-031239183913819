name: Test RAG Challenge 2026

on:
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installazione Font di Sistema (Inclusi Font Microsoft)
        run: |
          sudo apt-get update
          # Accettazione automatica non interattiva dell'EULA Microsoft per i font core di Windows
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 3 WARProxy Docker Containers (Active & Parallel IPv6-only)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          # CONTAINER 1 
          docker run --name warproxy-1 \
            --network host \
            -e TZ=Europe/Rome \
            -e SOCKS5_PORT=40001 \
            -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          # CONTAINER 2
          docker run --name warproxy-2 \
            --network host \
            -e TZ=Europe/Rome \
            -e SOCKS5_PORT=40002 \
            -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          # CONTAINER 3
          docker run --name warproxy-3 \
            --network host \
            -e TZ=Europe/Rome \
            -e SOCKS5_PORT=40003 \
            -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          sleep 15
          docker ps -a

      - name: Verifica IP IPv6 di uscita sui 3 Proxy
        run: |
          echo "=================================================="
          echo "VERIFICA IP CONTAINER 1 (40001):"
          curl --proxy socks5h://127.0.0.1:40001 https://api6.ipify.org?format=json || echo "Proxy 1 fallito!"
          echo "=================================================="
          echo "VERIFICA IP CONTAINER 2 (40002):"
          curl --proxy socks5h://127.0.0.1:40002 https://api6.ipify.org?format=json || echo "Proxy 2 fallito!"
          echo "=================================================="
          echo "VERIFICA IP CONTAINER 3 (40003):"
          curl --proxy socks5h://127.0.0.1:40003 https://api6.ipify.org?format=json || echo "Proxy 3 fallito!"
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Stabile)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          echo "Esecuzione download sincrono di CloakBrowser per evitare Race Condition..."
          python -c "
          from cloakbrowser import launch_context
          try:
              ctx = launch_context(headless=True)
              ctx.close()
              print('Cache CloakBrowser pronta e scaricata con successo.')
          except Exception as e:
              print(f'Errore in pre-init: {e}')
          "

      - name: Creazione script Python (Macchina 2)
        shell: python
        run: |
          import textwrap
          code = r'''
          import time
          import sys
          import random
          import requests
          from cloakbrowser import launch_context
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          TARGETS = [
              "https://api6.ipify.org?format=json",
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.eater.com/rome",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://guide.michelin.com/en/it/lazio/roma/restaurants",
              "https://www.cntraveler.com/gallery/best-restaurants-in-rome",
              "https://www.facebook.com/groups/1373361046396315/posts/2860154274383644/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://newromantimes.substack.com/p/a-very-subjective-list-of-the-best",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          if node_id == 1:
              ACTIVE_PORT = 40001
              MY_TARGETS = TARGETS[0:9]
          elif node_id == 2:
              ACTIVE_PORT = 40002
              MY_TARGETS = TARGETS[9:18]
          elif node_id == 3:
              ACTIVE_PORT = 40003
              MY_TARGETS = TARGETS[18:27]
          else:
              sys.exit(1)

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          def handle_cookie_consent(page):
              try:
                  consent_selectors = [
                      "button:has-text('Accetta tutto')",
                      "button:has-text('Accept all')",
                      "button:has-text('Consenti')",
                      "button:has-text('I agree')",
                      "button:has-text('Accetto')",
                      "button:has-text('Agree')"
                  ]
                  for selector in consent_selectors:
                      btn = page.locator(selector)
                      if btn.is_visible():
                          btn.click(timeout=1500)
                          time.sleep(1)
                          break
              except Exception:
                  pass

          def wait_for_proxy(port, timeout=45):
              print(f"[NODO {node_id}] Attesa attivazione proxy su porta {port}...", flush=True)
              start_time = time.time()
              proxies = {"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}
              while time.time() - start_time < timeout:
                  try:
                      r = requests.get("https://api6.ipify.org?format=json", proxies=proxies, timeout=5)
                      if r.status_code == 200:
                          print(f"[NODO {node_id}] Connessione proxy stabilita. IP: {r.json().get('ip')}", flush=True)
                          return True
                  except Exception:
                      pass
                  time.sleep(2)
              return False

          if not wait_for_proxy(ACTIVE_PORT):
              print(f"[NODO {node_id}] Errore: Proxy non disponibile o inattivo. Interruzione.", flush=True)
              sys.exit(1)

          random_seed = str(random.randint(100000, 999999))
          print(f"[NODO {node_id}] Avvio CloakBrowser (Seed: {random_seed})", flush=True)

          context = launch_context(
              headless=False,
              humanize=True,
              proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
              geoip=True,
              viewport={"width": 1920, "height": 1080},
              args=[
                  "--no-sandbox", 
                  "--disable-dev-shm-usage",
                  f"--fingerprint={random_seed}",
                  "--fingerprint-storage-quota=5000"
              ]
          )

          results = f"\n{'#'*60}\nREPORT NODO {node_id} (PORTA {ACTIVE_PORT})\n{'#'*60}\n"

          for url in MY_TARGETS:
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"[NODO {node_id}] -> {url}", flush=True)
              try:
                  page = context.new_page()
                  query_to_search = get_query_from_url(url)

                  if "google.com" in url:
                      time.sleep(random.uniform(4, 8))

                  # Meccanismo di caricamento con timeout esteso e tentativo di ricaricamento (retry) per gestire l'instabilità di WARP
                  success_nav = False
                  for attempt in range(2):
                      try:
                          if "yelp.com" in url or "yelp.it" in url:
                              page.goto("https://www.yelp.com/", wait_until="commit", timeout=35000)
                              time.sleep(random.uniform(2, 4))
                              page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          elif "startpage.com" in url:
                              page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                              time.sleep(2)
                              try:
                                  page.locator("input#q").type(query_to_search, delay=120, timeout=2000)
                                  page.keyboard.press("Enter")
                              except Exception: pass
                          elif "html.duckduckgo.com" in url:
                              page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                              time.sleep(2)
                              try:
                                  page.locator("input[name=q]").type(query_to_search, delay=120, timeout=2000)
                                  page.keyboard.press("Enter")
                              except Exception: pass
                          else:
                              page.goto(url, wait_until="domcontentloaded", timeout=45000)
                              if not any(x in url for x in ["facebook.com", "reddit.com", "yelp"]):
                                  handle_cookie_consent(page)
                          success_nav = True
                          break
                      except Exception as nav_ex:
                          print(f"[NODO {node_id}] Tentativo {attempt+1} fallito per {url}: {nav_ex}", flush=True)
                          time.sleep(3)

                  if not success_nav:
                      results += f"ERRORE DI NAVIGAZIONE: Impossibile caricare {url} dopo 2 tentativi\n"
                      try: page.close()
                      except Exception: pass
                      continue
                  
                  if "canadianinsider.com" in url or "reddit.com" in url:
                      print(f"[NODO {node_id}] Rilevato potenziale WAF. Avvio polling di risoluzione...", flush=True)
                      for _ in range(15):
                          try:
                              title = page.title().lower()
                              content = page.content().lower()
                          except Exception:
                              title, content = "", ""
                          if "just a moment" not in title and "checking your browser" not in content and "cf-challenge" not in content:
                              print(f"[NODO {node_id}] Sfida superata con successo.", flush=True)
                              break
                          time.sleep(1)

                  if "finance.yahoo.com" in url:
                      try: page.wait_for_selector('section[data-testid="qsp-statistics"]', timeout=5000)
                      except Exception: pass
                      time.sleep(1)

                  try:
                      for _ in range(random.randint(3, 5)):
                          scroll_y = random.randint(150, 350)
                          page.mouse.wheel(0, scroll_y)
                          time.sleep(random.uniform(0.8, 1.5))
                  except Exception:
                      pass

                  if "creepjs" in url: time.sleep(15) 
                  elif "pixelscan" in url: time.sleep(8)
                  elif any(t in url for t in ["sannysoft", "browserleaks", "incolumitas", "deviceinfo"]): time.sleep(5)
                  else: time.sleep(random.uniform(2, 4))

                  # Estrazione sicura che non interrompe l'esecuzione in caso di redirect dinamici o blocco della navigazione
                  try:
                      page.wait_for_load_state("domcontentloaded", timeout=10000)
                      raw_html = page.content()
                  except Exception as content_ex:
                      raw_html = f"Errore nel recupero dell'HTML (pagina in navigazione): {content_ex}"

                  results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"
                  page.close()

              except Exception as e:
                  print(f"[NODO {node_id}] Errore su {url}: {e}", flush=True)
                  results += f"ERRORE GLOBALE: {str(e)}\n"
                  try: page.close()
                  except Exception: pass

          context.close()

          with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
              f.write(results)
          '''
          with open('m2_insocket.py', 'w', encoding='utf-8') as f:
              f.write(textwrap.dedent(code).strip())

      - name: Esecuzione Scraping Parallelo (3 Nodi indipendenti)
        run: |
          echo "Avvio processi paralleli con staggering temporale..."
          python -u m2_insocket.py 1 > node1.log 2>&1 &
          
          # Ritardo di 5 secondi per far respirare l'allocazione Xvfb e differenziare le temporizzazioni dei nodi
          sleep 5
          python -u m2_insocket.py 2 > node2.log 2>&1 &
          
          # Ulteriore ritardo prima del terzo nodo
          sleep 5
          python -u m2_insocket.py 3 > node3.log 2>&1 &
          
          # Attende il completamento di tutti i processi in background
          wait

          echo "=== LOG NODO 1 ==="
          cat node1.log || true
          echo "=== LOG NODO 2 ==="
          cat node2.log || true
          echo "=== LOG NODO 3 ==="
          cat node3.log || true
          echo "=================="

          # Crea i file vuoti nel caso un nodo fosse andato in crash irreversibile, evitando l'errore cat
          touch output_node_1.txt output_node_2.txt output_node_3.txt
          
          # Assembla il report finale
          cat output_node_1.txt output_node_2.txt output_node_3.txt > output_macchina2_cdp.txt

      - name: Verifica integrità ed esistenza dei dati
        run: |
          if [ ! -s output_macchina2_cdp.txt ]; then
            echo "ERRORE CRITICO: Il report finale 'output_macchina2_cdp.txt' è vuoto!"
            echo "Verifica i log dei nodi sovrastanti per comprendere quale eccezione Python ha causato il crash."
            exit 1
          else
            echo "Il file contiene dati validi ed è pronto per essere inviato all'uploader."
          fi

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
