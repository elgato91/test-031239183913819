name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sincronizza Orologio di Sistema (NTP)
        run: |
          sudo systemctl stop systemd-timesyncd.service || true
          sudo sntp -sS pool.ntp.org || sudo ntpdate -s pool.ntp.org || true
          sudo systemctl start systemd-timesyncd.service || true

      - name: Installazione Font di Sistema e Xvfb
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y xvfb ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install -U "camoufox[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps firefox

      - name: Patch del Bug di Playwright (Firefox pageError crash)
        run: |
          # Applichiamo una patch al driver di Playwright per evitare il crash irreversibile 
          # causato dagli errori JS privi di sorgente ('location' undefined) su Firefox.
          python3 -c "
          import playwright
          from pathlib import Path
          bundle_path = Path(playwright.__file__).resolve().parent / 'driver' / 'package' / 'lib' / 'coreBundle.js'
          if bundle_path.exists():
              text = bundle_path.read_text(encoding='utf-8')
              text = text.replace('url: pageError.location.url,', 'url: pageError.location?.url || \"\",')
              text = text.replace('line: pageError.location.lineNumber,', 'line: pageError.location?.lineNumber || 0,')
              text = text.replace('column: pageError.location.columnNumber', 'column: pageError.location?.columnNumber || 0')
              bundle_path.write_text(text, encoding='utf-8')
              print('Patch Playwright Firefox applicata con successo.')
          else:
              print('AVVISO: coreBundle.js non trovato, patch saltata.')
          "

      - name: Setup 3 WARProxy Docker Containers (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in 1 2 3; do
            PORT=$((40000 + i))
            docker run --name warproxy-$i \
              --network host \
              -e TZ=Europe/Rome \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
          done

          sleep 15
          docker ps -a

      - name: Verifica IP IPv6 di uscita sui 3 Proxy
        run: |
          for i in 1 2 3; do
            PORT=$((40000 + i))
            echo "=================================================="
            echo "VERIFICA IP CONTAINER $i ($PORT):"
            curl --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json || echo "Proxy $i fallito!"
          done
          echo "=================================================="

      - name: Pre-inizializzazione Camoufox Browser
        run: |
          python3 -m camoufox fetch

      - name: Creazione script Python (Macchina 2)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import requests
          from camoufox.sync_api import Camoufox
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          TARGETS = [
              "https://api6.ipify.org?format=json",
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.eater.com/rome",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://guide.michelin.com/en/it/lazio/roma/restaurants",
              "https://www.cntraveler.com/gallery/best-restaurants-in-rome",
              "https://www.facebook.com/groups/1373361046396315/posts/2860154274383644/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://newromantimes.substack.com/p/a-very-subjective-list-of-the-best",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id
          MY_TARGETS = TARGETS[(node_id-1)*9 : node_id*9]

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          profile_dir = f"./profile_node_{node_id}"
          proxy_config = {"server": f"socks5://127.0.0.1:{ACTIVE_PORT}"}

          # --- RILEVAMENTO IP DEL PROXY ---
          # Eseguiamo una chiamata preventiva per determinare l'IP di uscita reale (IPv6 o IPv4)
          # aggirando la funzione nativa di Camoufox che fallisce sulle reti locali/IPv6 proxy.
          ip_di_uscita = None
          proxies_test = {
              "http": f"socks5h://127.0.0.1:{ACTIVE_PORT}",
              "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"
          }
          
          for service_url in ["https://api6.ipify.org?format=text", "https://api.ipify.org?format=text"]:
              try:
                  r = requests.get(service_url, proxies=proxies_test, timeout=12)
                  if r.status_code == 200:
                      ip_di_uscita = r.text.strip()
                      print(f"[NODO {node_id}] IP di uscita rilevato: {ip_di_uscita}", flush=True)
                      break
              except Exception as e:
                  print(f"[NODO {node_id}] Servizio IP {service_url} non raggiungibile tramite proxy: {e}", flush=True)

          # Fallback su un IP italiano valido se la risoluzione fallisce temporaneamente
          if not ip_di_uscita:
              ip_di_uscita = "2.224.0.0"
              print(f"[NODO {node_id}] Utilizzo IP di fallback italiano: {ip_di_uscita}", flush=True)

          print(f"[NODO {node_id}] Avvio Camoufox (Porta {ACTIVE_PORT})", flush=True)

          results = f"\n{'#'*60}\nREPORT NODO {node_id} (PORTA {ACTIVE_PORT})\n{'#'*60}\n"

          # Passiamo l'IP di uscita direttamente sotto forma di stringa al parametro 'geoip' 
          # per consentire a Camoufox di applicare la geolocalizzazione senza rieseguire il controllo IP interno.
          with Camoufox(
              user_data_dir=profile_dir,
              persistent_context=True,
              headless=False,
              humanize=True,
              os="linux",
              proxy=proxy_config,
              geoip=ip_di_uscita,
              viewport={"width": 1920, "height": 950}
          ) as context:

              for url in MY_TARGETS:
                  results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
                  print(f"[NODO {node_id}] -> {url}", flush=True)
                  try:
                      page = context.new_page()
                      query_to_search = get_query_from_url(url)

                      # Navigazione iniziale
                      if "yelp.com" in url or "yelp.it" in url:
                          page.goto("https://www.yelp.com/", wait_until="domcontentloaded", timeout=30000)
                          time.sleep(3)
                          page.goto(url, wait_until="domcontentloaded", timeout=30000)
                      elif "startpage.com" in url:
                          page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=30000)
                          try:
                              page.locator("input#q").press_sequentially(query_to_search, delay=random.randint(50, 150))
                              page.keyboard.press("Enter")
                          except Exception: pass
                      elif "html.duckduckgo.com" in url:
                          page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=30000)
                          try:
                              page.locator("input[name=q]").press_sequentially(query_to_search, delay=random.randint(50, 150))
                              page.keyboard.press("Enter")
                          except Exception: pass
                      else:
                          page.goto(url, wait_until="domcontentloaded", timeout=30000)

                      time.sleep(5)

                      # Specifico per Reddit
                      if "reddit.com" in url:
                          try:
                              page.wait_for_load_state("networkidle", timeout=15000)
                          except Exception: pass
                          time.sleep(6)

                      # Gestione del consenso cookie standard
                      if not any(x in url for x in ["facebook.com", "reddit.com", "yelp"]):
                          try:
                              consent_selectors = [
                                  "button:has-text('Accetta tutto')", "button:has-text('Accept all')",
                                  "button:has-text('Consenti')", "button:has-text('I agree')"
                              ]
                              for selector in consent_selectors:
                                  btn = page.locator(selector)
                                  if btn.is_visible():
                                      btn.click()
                                      break
                          except Exception: pass

                      # Trigger esplicito per Pixelscan (legittimo)
                      if "pixelscan.net" in url:
                          try:
                              btn = page.locator("text=Scan My Browser Now")
                              if btn.is_visible():
                                  btn.click()
                          except Exception: pass

                      # Scroll umano simulato per eludere il tracking comportamentale
                      try:
                          for _ in range(3):
                              page.mouse.wheel(0, random.randint(300, 600))
                              time.sleep(random.uniform(0.8, 1.5))
                      except Exception: pass

                      # Tempistiche di rendering
                      if "creepjs" in url: time.sleep(15) 
                      elif "pixelscan" in url: time.sleep(10)
                      else: time.sleep(3)

                      raw_html = page.content()
                      results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"
                      page.close()

                  except Exception as e:
                      print(f"[NODO {node_id}] Errore su {url}: {e}", flush=True)
                      results += f"ERRORE GLOBALE: {str(e)}\n"
                      try: page.close()
                      except Exception: pass

          with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Parallelo
        run: |
          echo "Avvio processi paralleli con Xvfb dedicato..."
          
          # Ciascun processo viene avviato con xvfb-run -a per isolare i canali grafici ed evitare race conditions.
          # L'output viene inviato direttamente a video in tempo reale per monitorare l'avanzamento.
          xvfb-run -a --server-args="-screen 0 1920x1080x24" python3 -u m2_insocket.py 1 &
          PID1=$!
          xvfb-run -a --server-args="-screen 0 1920x1080x24" python3 -u m2_insocket.py 2 &
          PID2=$!
          xvfb-run -a --server-args="-screen 0 1920x1080x24" python3 -u m2_insocket.py 3 &
          PID3=$!

          echo "Processi attivi con PID: $PID1, $PID2, $PID3"
          
          wait $PID1
          wait $PID2
          wait $PID3

          echo "Tutti i nodi hanno terminato l'esecuzione."
          touch output_node_1.txt output_node_2.txt output_node_3.txt
          cat output_node_1.txt output_node_2.txt output_node_3.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
