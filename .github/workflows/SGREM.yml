name: Extract Markdown (Stealth curl-cffi + Jina Fallback + ZIP)

on:
  workflow_dispatch:

jobs:
  extract-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze Python
        run: |
          python -m pip install --upgrade pip
          pip install requests pysocks curl-cffi markdownify

      - name: Scannerizza Proxy e Estrai in Parallelo
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python - << 'EOF'
          import os
          import re
          import requests
          import random
          import time
          import concurrent.futures
          from curl_cffi import requests as requests_cffi
          from markdownify import markdownify as md

          URLS_TO_TEST = [
              "https://catholicindex.org/mx/churches/mx-oaxaca-oaxaca-de-juarez-templo-de-santo-domingo-de-guzman-05ffe56e",
              "https://eltonodelacochinilla.com/visitanos",
              "https://klook.com/it/activity/150588-hierve-el-agua-mitla-mezcal-tour-in-mexico",
              "https://hola-oaxaca.com/que-hacer/tour/hierve-el-agua",
              "https://my.trip.com/travel-guide/attraction/oaxaca/templo-de-santo-domingo-de-guzmn-18697124",
              "https://mindtrip.ai/inspiration/how-take-shared-taxi-colectivo-oaxaca/in-HZoeSkoK",
              "https://oaxacae.com/2024/06/hierve-el-agua-oaxaca.html",
              "https://oaxacaautentico.com/es/blog/como-llegar-y-moverse-en-oaxaca-guia-transporte",
              "https://oaxaca.travel/index.php/es/markets-es/20-de-noviembre-market-en",
              "https://uncoveredhistory.com/mexico/monte-alban-the-encrypted-city",
              "https://edenviaggi.it/racconti/monte-alban-viaggio-nellantica-capitale-zapoteca-di-oaxaca-in-messico",
              "https://oaxaca.travel/index.php/en-us/markets-es/20-de-noviembre-market-en",
              "https://santacultura.mx/arte-popular/muestran-proceso-ancestral-de-tapetes-de-lana-en-teotitlan-del-valle",
              "https://hotelesdeoaxaca.com/atractivos-turisticos/mercado-20-de-noviembre.html",
              "https://oaxacaairporttaxi.com/es",
              "https://acchiappamappa.com/pozzo-di-san-patrizio-orvieto-guida",
              "https://alltrails.com/it-it/sentiero/italy/umbria/anello-della-rupe-di-orvieto",
              "https://alltrails.com/trail/italy/umbria/anello-della-rupe-di-orvieto",
              "https://comune.orvieto.tr.it/it/page/come-arrivare",
              "https://comune.orvieto.tr.it/it/page/orvieto-carta-unica",
              "https://comune.orvieto.tr.it/it/vivere/pozzo-di-san-patrizio",
              "https://comune.orvieto.tr.it/it/vivere/il-duomo-di-orvieto",
              "https://fsbusitalia.it/it/umbria/titoli-di-viaggio-tariffe-umbria/biglietti-tariffe-servizi-urbani-umbria/tariffe-orvieto.html",
              "https://fsbusitalia.it/it/turismo/programma-il-tuo-viaggio/orvieto-urbs-vetus-dell-umbria.html",
              "https://fsbusitalia.it/it/umbria/orari-linee-umbria/quibus-orvieto.html",
              "https://it.wikiloc.com/percorsi-escursionismo/orvieto-anello-della-rupe-e-i-sotterranei-246324949",
              "https://liveorvieto.com/blog/attrazioni_naturali/anello-della-rupe",
              "https://olodramma.com/it/cosa-vedere-in-umbria-in-un-weekend-itinerario-di-3-giorni-tra-orvieto-spello-assisi-e-gubbio",
              "https://neuralword.com/it/cucina/ristoranti-posti-dove-mangiare/mangiare-ad-orvieto-i-migliori-ristoranti",
              "https://roadmindtrip.com/cosa-vedere-a-orvieto-guida-per-un-weekend",
              "https://travelworld.it/visitare-orvieto-2-giorni-per-scoprire-la-perla-dellumbria",
              "https://viaggiadipiu.it/2020/03/09/visitare-orvieto-informazioni-e-consigli-utili",
              "https://flashpackingitaly.com/orvieto-card-review",
              "https://umbriatourism.it/en/w/crocefisso-del-tufo-necropolis-orvieto",
              "https://umbriatourism.it/it/w/duomo-di-santa-maria-assunta-in-cielo-it",
              "https://umbriatourism.it/it/w/necropoli-di-crocifisso-del-tufo-orvieto",
              "https://wikiloc.com/hiking-trails/gita-fuori-porta-due-viandanti-ad-orvieto-con-annesso-lanello-della-rupe-166636709"
          ]

          os.makedirs('output', exist_ok=True)
          total_urls = len(URLS_TO_TEST)

          # FASE 1: DOWNLOAD E FILTRAGGIO RAPIDO DEI PROXY
          print("==========================================", flush=True)
          print("🔄 Scaricamento liste proxy candidati...", flush=True)
          try:
              proxy_req = requests.get("https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt", timeout=10)
              raw_proxies = [p.strip() for p in proxy_req.text.split('\n') if p.strip()]
              random.shuffle(raw_proxies)
              print(f"✅ Trovati {len(raw_proxies)} proxy candidati. Avvio selezione rapida...", flush=True)
          except Exception as e:
              print(f"⚠️ Errore nel recupero della lista proxy: {e}", flush=True)
              raw_proxies = []

          working_proxies = []
          max_working = 50
          test_url = "https://r.jina.ai/https://example.com"
          test_headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'}

          def test_single_proxy(proxy_addr):
              if len(working_proxies) >= max_working:
                  return
              
              proxies = {
                  'http': f'socks5h://{proxy_addr}',
                  'https': f'socks5h://{proxy_addr}'
              }
              try:
                  r = requests.get(test_url, headers=test_headers, proxies=proxies, timeout=3.0)
                  if r.status_code == 200 and "example" in r.text.lower():
                      if len(working_proxies) < max_working:
                          working_proxies.append(proxy_addr)
                          print(f"  [+] Proxy funzionante trovato: {proxy_addr} ({len(working_proxies)}/{max_working})", flush=True)
              except Exception:
                  pass

          print("🚀 Scansione parallela avviata (200 thread, max 3s di attesa per proxy)...", flush=True)
          start_scan = time.time()
          with concurrent.futures.ThreadPoolExecutor(max_workers=200) as executor:
              futures = {executor.submit(test_single_proxy, p): p for p in raw_proxies[:1000]}
              for future in concurrent.futures.as_completed(futures):
                  if len(working_proxies) >= max_working:
                      break

          scan_duration = time.time() - start_scan
          print(f"⏱️ Scansione completata in {scan_duration:.2f} secondi.", flush=True)
          print(f"📌 Proxy stabili selezionati ({len(working_proxies)}): {working_proxies}\n", flush=True)
          print("==========================================\n", flush=True)

          if not working_proxies:
              print("⚠️ Nessun proxy valido trovato. Procedo con la connessione diretta.", flush=True)

          # FASE 2: ESECUZIONE SIMULTANEA CON ASSEGNAZIONE CASUALE ED EVITAMENTO DEL CONFLITTO
          def fetch_url(item):
              index, url = item
              clean_name = re.sub(r'^https?://', '', url)
              safe_filename = re.sub(r'[^a-zA-Z0-9]', '_', clean_name)[:150]
              filepath = os.path.join('output', f"{safe_filename}.md")
              jina_url = f"https://r.jina.ai/{url}"
              
              max_attempts = 2
              failed_proxies = set()
              
              for attempt in range(1, max_attempts + 1):
                  if not working_proxies:
                      proxies = None
                      proxy_addr = "Direct IP"
                  else:
                      candidates = [p for p in working_proxies if p not in failed_proxies]
                      proxy_addr = random.choice(candidates) if candidates else random.choice(working_proxies)
                      
                      proxies = {
                          'http': f'socks5h://{proxy_addr}',
                          'https': f'socks5h://{proxy_addr}'
                      }

                  # Scaglionamento iniziale (0.5 - 2.5 secondi)
                  time.sleep(random.uniform(0.5, 2.5))

                  # ==========================================
                  # 🚀 STEP A: TENTATIVO ULTRA STEALTH CON curl-cffi
                  # ==========================================
                  print(f"[⌛ Avvio {index}/{total_urls}] (Stealth Direct via {proxy_addr}) -> {url}", flush=True)
                  try:
                      impersonate_target = random.choice(["chrome110", "chrome120", "chrome124"])
                      headers_cffi = {
                          "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8",
                          "Accept-Language": "en-US,en;q=0.9",
                          "Sec-Ch-Ua": '"Not_A Brand";v="8", "Chromium";v="120", "Google Chrome";v="120"',
                          "Sec-Ch-Ua-Mobile": "?0",
                          "Sec-Ch-Ua-Platform": '"Windows"',
                          "Sec-Fetch-Dest": "document",
                          "Sec-Fetch-Mode": "navigate",
                          "Sec-Fetch-Site": "none",
                          "Sec-Fetch-User": "?1",
                          "Upgrade-Insecure-Requests": "1"
                      }
                      
                      # Impersona l'handshake e le impronte crittografiche reali di un browser
                      response = requests_cffi.get(
                          url,
                          headers=headers_cffi,
                          proxies=proxies,
                          impersonate=impersonate_target,
                          timeout=10
                      )
                      
                      lowered_html = response.text.lower()
                      if response.status_code != 200:
                          raise Exception(f"HTTP status non ottimale: {response.status_code}")
                          
                      # Se c'è una schermata di blocco di Cloudflare con Captcha, passiamo a Jina
                      if "cloudflare" in lowered_html and ("captcha" in lowered_html or "just a moment" in lowered_html or "enable javascript" in lowered_html):
                          raise Exception("Intercettata protezione avanzata di Cloudflare")
                          
                      if len(response.text.strip()) < 300:
                          raise Exception("HTML ricevuto troppo vuoto o non conforme")

                      # Conversione locale a Markdown con stile ATX (# per titoli)
                      markdown_content = md(response.text, heading_style="ATX")
                      
                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(markdown_content)
                          
                      return f"[✅ STEALTH {index}/{total_urls}] {url} -> Scaricato direttamente tramite curl-cffi!"

                  # ==========================================
                  # 🔄 STEP B: FALLBACK IMMEDIATO A JINA AI
                  # ==========================================
                  except Exception as stealth_err:
                      print(f"[🔄 FALLBACK {index}/{total_urls}] Stealth fallito ({stealth_err}). Passaggio a Jina AI...", flush=True)
                      
                      try:
                          jina_headers = {
                              'User-Agent': f'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/{random.randint(110, 122)}.0.0.0 Safari/537.36',
                              'X-Return-Format': 'markdown'
                          }
                          # Riproviamo la chiamata di Jina usando lo stesso proxy
                          jina_response = requests.get(jina_url, headers=jina_headers, proxies=proxies, timeout=10)
                          
                          if jina_response.status_code in [404, 422]:
                              return f"[❌ ERRORE {index}/{total_urls}] Jina non supporta questo URL (Status {jina_response.status_code}) -> {url}"
                          
                          jina_response.raise_for_status()
                          
                          if "cloudflare" in jina_response.text.lower() and "captcha" in jina_response.text.lower():
                              raise Exception("Captcha Cloudflare rilevato anche sul fallback Jina")

                          with open(filepath, 'w', encoding='utf-8') as f:
                              f.write(jina_response.text)
                              
                          return f"[✅ JINA {index}/{total_urls}] {url} -> Salvato tramite Jina AI (Fallback)!"
                          
                      except Exception as jina_err:
                          # Se falliscono sia il tentativo diretto che il fallback, contrassegniamo il proxy come difettoso
                          failed_proxies.add(proxy_addr)
                          
                          if attempt == max_attempts:
                              return f"[❌ ERRORE DEFINITIVO {index}/{total_urls}] {url} fallito. Ultimo errore Jina: {jina_err}"
                          
                          time.sleep(1)

          # Avviamo TUTTE le richieste contemporaneamente (37 thread)
          workers = total_urls
          print(f"🚀 Avvio estrazione simultanea per {total_urls} URL con {workers} lavoratori in parallelo...", flush=True)
          
          with concurrent.futures.ThreadPoolExecutor(max_workers=workers) as executor:
              items = list(enumerate(URLS_TO_TEST, start=1))
              future_to_url = {executor.submit(fetch_url, item): item for item in items}
              
              for future in concurrent.futures.as_completed(future_to_url):
                  print(future.result() + "\n", flush=True)

          EOF

      # FASE 3: IMPACCHETTAMENTO E CARICAMENTO COME ARTEFATTO (ZIP)
      - name: Carica i file estratti come Artefatto ZIP
        uses: actions/upload-artifact@v4
        with:
          name: jina-markdown-outputs
          path: output/
          retention-days: 7
