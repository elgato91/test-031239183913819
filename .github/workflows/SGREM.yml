name: Extract Markdown (Fully Proxied Hybrid Pipeline + ZIP)

on:
  workflow_dispatch:

jobs:
  extract-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installa dipendenze sistema, Python, CloakBrowser e Utility WARP
        run: |
          # Aggiorna pacchetti di sistema
          sudo apt-get update
          
          # Installa wgcf (Utility per la registrazione degli account WARP)
          sudo curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.29/wgcf_2.2.29_linux_amd64 -o /usr/local/bin/wgcf
          sudo chmod +x /usr/local/bin/wgcf
          
          # Installa wireproxy (Proxy SOCKS5 leggero basato su WireGuard)
          curl -fsSL https://github.com/pufferffish/wireproxy/releases/download/v1.0.9/wireproxy_linux_amd64.tar.gz -o wireproxy.tar.gz
          tar -xzf wireproxy.tar.gz
          sudo mv wireproxy /usr/local/bin/wireproxy
          sudo chmod +x /usr/local/bin/wireproxy
          
          # Installa le dipendenze Python e CloakBrowser
          python -m pip install --upgrade pip
          pip install requests pysocks curl-cffi markdownify beautifulsoup4 playwright "cloakbrowser[geoip]"
          python -m playwright install-deps chromium
          python -m cloakbrowser install

      - name: Avvio Xvfb (Virtual Display Headful per CloakBrowser)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pipeline 100% Proxata con Validazione Antibot e Tunneling WARP
        run: |
          cat << 'EOF' > extract.py
          import os
          import re
          import requests
          import random
          import time
          import concurrent.futures
          import threading
          import subprocess
          import sys
          import textwrap
          from queue import Queue, Empty
          from urllib.parse import urlparse, parse_qs
          from curl_cffi import requests as requests_cffi
          from markdownify import markdownify as md
          from cloakbrowser import launch

          URLS_TO_TEST = [
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          os.makedirs('output', exist_ok=True)
          total_urls = len(URLS_TO_TEST)

          proxy_queue = Queue()
          stop_scanner = threading.Event()
          working_count = 0
          working_lock = threading.Lock()
          max_working = 100
          working_proxies = []

          warp_success_lock = threading.Lock()
          active_warp_proxies = []
          warp_processes = []
          warp_counter = 0
          stop_registration = threading.Event()

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p', 'find_desc']:
                      if param in queries: return queries[param][0]
              except Exception: pass
              return default

          def parse_wgcf_profile(filepath):
              private_key, addresses, dns_servers, public_key, endpoint = None, [], [], None, "engage.cloudflareclient.com:2408"
              if os.path.exists(filepath):
                  with open(filepath, "r") as f:
                      for line in f:
                          line = line.strip()
                          if not line or line.startswith("#"): continue
                          if "=" in line:
                              key, val = [x.strip() for x in line.split("=", 1)]
                              key = key.lower()
                              if key == "privatekey": private_key = val
                              elif key == "address": addresses.extend([p.strip() for p in val.split(",") if p.strip()])
                              elif key == "dns": dns_servers.extend([p.strip() for p in val.split(",") if p.strip()])
                              elif key == "publickey": public_key = val
                              elif key == "endpoint": endpoint = val
              for d in ["8.8.8.8", "9.9.9.9"]:
                  if d not in dns_servers: dns_servers.append(d)
              return private_key, addresses or ["172.16.0.2/32"], dns_servers, public_key, endpoint

          def validate_markdown(markdown_text, url):
              if not markdown_text: return False, "Markdown vuoto"
              text_only = re.sub(r'\[([^\]]+)\]\([^\)]+\)', r'\1', markdown_text)
              text_only = re.sub(r'!\[[^\]]*\]\([^\)]+\)', '', text_only)
              text_only = ' '.join(re.sub(r'[*_#>\-`[\]]', ' ', text_only).split())
              if len(text_only) < 200: return False, f"Testo utile markdown insufficiente ({len(text_only)} caratteri)"
              low_text = markdown_text.lower()
              blocking_indicators = [
                  "challenge-platform", "access denied", "403 forbidden", "cloudflare", "just a moment",
                  "security verification", "please enable js", "enable javascript", "are you a robot",
                  "please wait for verification", "we've detected unusual activity", "unusual traffic from your computer network",
                  "checking your browser", "prove your humanity", "captcha verification", "robot challenge screen",
                  "one moment, please...", "pardon our interruption", "warning: this page maybe requiring captcha",
                  "please make sure you are authorized to access this page", "this page maybe requiring captcha",
                  "the request could not be satisfied", "block access from your country", "generated by cloudfront",
                  "under construction", "mindtrip is under construction", "problem loading page", "accept the risk and continue",
                  "network security settings might be causing this", "accept the risk", "connection is untrusted"
              ]
              for ind in blocking_indicators:
                  if ind in low_text: return False, f"Rilevato blocco o errore: '{ind}'"
              domain_match = re.search(r'https?://(?:www\.)?([^/]+)', url)
              if domain_match:
                  domain = domain_match.group(1).lower().split('.')[0]
                  words = text_only.lower().split()
                  if len(words) > 0 and (words.count(domain) / len(words)) > 0.35 and len(words) < 100:
                      return False, f"Contenuto fittizio dominio '{domain}'"
              return True, ""

          def scan_worker(proxy_addr):
              global working_count, working_proxies
              if stop_scanner.is_set(): return
              proxies = {'http': f'socks5h://{proxy_addr}', 'https': f'socks5h://{proxy_addr}'}
              try:
                  r = requests.get("https://r.jina.ai/https://example.com", headers={'User-Agent': 'Mozilla/5.0'}, proxies=proxies, timeout=3.0)
                  latency = time.time()
                  if r.status_code == 200 and "example" in r.text.lower():
                      with working_lock:
                          if len(working_proxies) < max_working and not stop_scanner.is_set():
                              working_proxies.append((proxy_addr, latency))
                              working_count = len(working_proxies)
                              proxy_queue.put(proxy_addr)
                              print(f"  [+] Proxy valido: {proxy_addr} ({working_count}/{max_working})", flush=True)
                              if working_count >= max_working: stop_scanner.set()
              except Exception: pass

          def register_single_warp(proxy_addr):
              global warp_counter
              if stop_registration.is_set(): return
              with warp_success_lock:
                  if len(active_warp_proxies) >= 20:
                      stop_registration.set(); return
                  current_idx = warp_counter
                  warp_counter += 1
              local_port = 20001 + current_idx
              dir_name = f"warp_{current_idx}"
              os.makedirs(dir_name, exist_ok=True)
              env = os.environ.copy()
              env["HTTP_PROXY"] = env["HTTPS_PROXY"] = env["ALL_PROXY"] = f"socks5h://{proxy_addr}"
              try:
                  reg_res = subprocess.run(["wgcf", "register", "--accept-tos"], env=env, cwd=dir_name, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, timeout=8)
                  if reg_res.returncode != 0 or stop_registration.is_set(): return
                  gen_res = subprocess.run(["wgcf", "generate"], env=env, cwd=dir_name, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, timeout=8)
                  if gen_res.returncode != 0 or stop_registration.is_set(): return
                  private_key, addresses, dns_servers, public_key, endpoint = parse_wgcf_profile(os.path.join(dir_name, "wgcf-profile.conf"))
                  if not private_key or not public_key or stop_registration.is_set(): return
                  wp_config_path = os.path.join(dir_name, "wireproxy.conf")
                  wp_config_content = textwrap.dedent(f"""\
                      [Interface]
                      PrivateKey = {private_key}
                      {"\n".join([f"Address = {addr}" for addr in addresses])}
                      DNS = {', '.join(dns_servers)}
                      MTU = 1280
                      [Peer]
                      PublicKey = {public_key}
                      Endpoint = {endpoint}
                      AllowedIPs = 0.0.0.0/0
                      AllowedIPs = ::/0
                      [Socks5]
                      BindAddress = 127.0.0.1:{local_port}
                  """)
                  with open(wp_config_path, "w") as f: f.write(wp_config_content)
                  if stop_registration.is_set(): return
                  proc = subprocess.Popen(["wireproxy", "-c", "wireproxy.conf"], cwd=dir_name, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
                  time.sleep(1.0)
                  try:
                      test_r = requests.get("https://www.cloudflare.com/cdn-cgi/trace", proxies={'http': f'socks5://127.0.0.1:{local_port}', 'https': f'socks5://127.0.0.1:{local_port}'}, timeout=4.0)
                      if "warp=on" in test_r.text:
                          with warp_success_lock:
                              if len(active_warp_proxies) < 20 and not stop_registration.is_set():
                                  active_warp_proxies.append(f"127.0.0.1:{local_port}")
                                  warp_processes.append(proc)
                                  print(f"  [✅ WARP PRONTO] Istanza {len(active_warp_proxies)} avviata su 127.0.0.1:{local_port} (tramite proxy {proxy_addr})", flush=True)
                                  if len(active_warp_proxies) >= 20: stop_registration.set()
                              else: proc.terminate()
                      else: proc.terminate()
                  except Exception: proc.terminate()
              except Exception: pass

          def fetch_url_lightweight(item, proxies_list):
              index, url = item
              clean_name = re.sub(r'^https?://', '', url)
              filepath = os.path.join('output', f"{re.sub(r'[^a-zA-Z0-9]', '_', clean_name)[:150]}.md")
              jina_url = f"https://r.jina.ai/{url}"
              if "bing.com" in url:
                  return False, f"[⏭️ FORCED BING {index}] {url} -> Forzato a CloakBrowser", (index, url, filepath)
              if not proxies_list:
                  return False, f"[⚠️ NO PROXY {index}/{total_urls}] {url}", (index, url, filepath)
              for attempt in range(2):
                  proxy_addr = random.choice(proxies_list)
                  proxies = {'http': f'socks5://{proxy_addr}' if "127.0.0.1" in proxy_addr else f'socks5h://{proxy_addr}',
                             'https': f'socks5://{proxy_addr}' if "127.0.0.1" in proxy_addr else f'socks5h://{proxy_addr}'}
                  time.sleep(random.uniform(0.1, 0.5))
                  try:
                      response = requests_cffi.get(url, headers={"Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8", "Accept-Language": "en-US,en;q=0.9"}, proxies=proxies, impersonate=random.choice(["chrome110", "chrome120", "chrome124"]), timeout=6)
                      if response.status_code == 200:
                          markdown_content = md(response.text, heading_style="ATX")
                          is_valid, _ = validate_markdown(markdown_content, url)
                          if is_valid:
                              with open(filepath, 'w', encoding='utf-8') as f: f.write(markdown_content)
                              return True, f"[✅ STEALTH {index}] {url} -> Scaricato via curl-cffi (Proxy: {proxy_addr})", None
                  except Exception: pass
                  try:
                      jina_response = requests.get(jina_url, headers={'User-Agent': 'Mozilla/5.0', 'X-Return-Format': 'markdown'}, proxies=proxies, timeout=10)
                      if jina_response.status_code == 200:
                          markdown_content = jina_response.text
                          is_valid, _ = validate_markdown(markdown_content, url)
                          if is_valid:
                              with open(filepath, 'w', encoding='utf-8') as f: f.write(markdown_content)
                              return True, f"[✅ JINA {index}] {url} -> Salvato via Jina (Proxy: {proxy_addr})", None
                  except Exception: pass
              return False, f"[⚠️ FAIL {index}] {url} -> Richiede step successivo.", (index, url, filepath)

          def cloakbrowser_worker_thread(worker_id, warp_proxy_addr, public_proxies, jobs_queue):
              print(f"  [🕵️ Worker CB {worker_id}] Avvio CloakBrowser con default WARP {warp_proxy_addr}...", flush=True)
              try:
                  browser = launch(headless=False, geoip=True, humanize=True, args=["--no-sandbox", "--disable-dev-shm-usage", f"--fingerprint={random.randint(100000, 999999)}", "--fingerprint-fonts-dir=/home/runner/.local/share/fonts/windows"])
                  context = browser.new_context(proxy={"server": f"socks5://{warp_proxy_addr}"}, viewport={"width": 1920, "height": 1080}, ignore_https_errors=True)
                  try:
                      warmup_page = context.new_page()
                      warmup_page.goto("https://www.google.com", wait_until="load", timeout=25000)
                      time.sleep(2.0)
                      warmup_page.goto("https://www.reddit.com", wait_until="load", timeout=25000)
                      time.sleep(2.0)
                      warmup_page.close()
                  except Exception: pass
                  while True:
                      try: item = jobs_queue.get_nowait()
                      except Empty: break
                      index, url, filepath = item
                      print(f"  [🕵️ Worker CB {worker_id}] Scaricamento: {url}", flush=True)
                      success = False
                      error_msg = ""
                      try:
                          page = context.new_page()
                          try:
                              page.goto(url, wait_until="load", timeout=45000)
                              try: page.wait_for_load_state("networkidle", timeout=12000)
                              except Exception: pass
                              time.sleep(6.0)
                              page.keyboard.press("PageDown")
                              time.sleep(1.0)
                              page.keyboard.press("PageDown")
                              time.sleep(2.0)
                          except Exception: pass
                          try: html_content = page.content()
                          except Exception: html_content = ""
                          markdown_content = md(html_content, heading_style="ATX")
                          is_valid, reason = validate_markdown(markdown_content, url)
                          if is_valid:
                              with open(filepath, 'w', encoding='utf-8') as f: f.write(markdown_content)
                              print(f"[✅ CLOAKBROWSER SUCCESS {index}] {url} -> Estratto con successo via WARP!", flush=True)
                              success = True
                          else: error_msg = f"Validazione fallita su WARP: {reason}"
                          page.close()
                      except Exception as e: error_msg = f"Errore su WARP: {e}"
                      if not success and public_proxies:
                          for f_idx in range(3):
                              fallback_proxy = random.choice(public_proxies)
                              print(f"  [🕵️ Worker CB {worker_id}] ⚠️ WARP fallito ({error_msg}) per {url}. Fallback {f_idx+1}/3 con proxy: {fallback_proxy}...", flush=True)
                              try:
                                  fallback_context = browser.new_context(proxy={"server": f"socks5://{fallback_proxy}"}, viewport={"width": 1920, "height": 1080}, ignore_https_errors=True)
                                  page = fallback_context.new_page()
                                  try:
                                      page.goto(url, wait_until="load", timeout=45000)
                                      try: page.wait_for_load_state("networkidle", timeout=12000)
                                      except Exception: pass
                                      time.sleep(6.0)
                                      page.keyboard.press("PageDown")
                                      time.sleep(1.0)
                                      page.keyboard.press("PageDown")
                                      time.sleep(2.0)
                                  except Exception: pass
                                  try: html_content = page.content()
                                  except Exception: html_content = ""
                                  markdown_content = md(html_content, heading_style="ATX")
                                  is_valid, reason = validate_markdown(markdown_content, url)
                                  fallback_context.close()
                                  if is_valid:
                                      with open(filepath, 'w', encoding='utf-8') as f: f.write(markdown_content)
                                      print(f"[✅ CLOAKBROWSER FALLBACK SUCCESS {index}] {url} -> Estratto con successo via Proxy Pubblico SOCKS5 (tentativo {f_idx+1})!", flush=True)
                                      success = True; break
                                  else: error_msg = f"Validazione fallita su fallback: {reason}"
                              except Exception as fe: error_msg = f"Errore su fallback: {fe}"
                          if not success: print(f"[❌ CLOAKBROWSER ALL TRIES FAILED {index}] {url} non recuperato: {error_msg}", flush=True)
                      jobs_queue.task_done()
                  browser.close()
              except Exception as e: print(f"  [❌ CLOAKBROWSER Worker {worker_id}] Errore thread browser: {e}", flush=True)

          if __name__ == '__main__':
              print("==========================================", flush=True)
              print("🔄 Scaricamento liste proxy candidati...", flush=True)
              proxy_urls = [
                  "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt",
                  "https://raw.githubusercontent.com/Hookzof/socks5_list/master/socks5.txt",
                  "https://raw.githubusercontent.com/proxifly/free-proxy-list/main/proxies/protocols/socks5/data.txt"
              ]
              raw_proxies_set = set()
              for p_url in proxy_urls:
                  try:
                      r = requests.get(p_url, timeout=10)
                      if r.status_code == 200:
                          for line in r.text.split('\n'):
                              line = line.strip()
                              if line and re.match(r'^\d+\.\d+\.\d+\.\d+:\d+$', line):
                                  raw_proxies_set.add(line)
                  except Exception: pass
              raw_proxies = list(raw_proxies_set)
              random.shuffle(raw_proxies)
              print(f"✅ Recuperati {len(raw_proxies)} proxy candidati totali.", flush=True)

              print("🚀 Scansione proxy pubblici per la Fase 1 (fino a 100 funzionanti)...", flush=True)
              with concurrent.futures.ThreadPoolExecutor(max_workers=300) as scanner_executor:
                  futures = {scanner_executor.submit(scan_worker, p): p for p in raw_proxies[:2000]}
                  concurrent.futures.wait(futures)

              working_proxies.sort(key=lambda x: x[1])
              sorted_proxy_addrs = [p[0] for p in working_proxies]
              if not sorted_proxy_addrs:
                  print("⚠️ Nessun proxy pubblico valido trovato. Fallback su connessione diretta per la Fase 1.", flush=True)

              print("\n==========================================", flush=True)
              print(f"🚀 FASE 1: Estrazione con {len(sorted_proxy_addrs)} proxy pubblici...", flush=True)
              print("==========================================\n", flush=True)
              failed_phase1 = []
              with concurrent.futures.ThreadPoolExecutor(max_workers=min(50, total_urls)) as executor:
                  items = list(enumerate(URLS_TO_TEST, start=1))
                  future_to_url = {executor.submit(fetch_url_lightweight, item, sorted_proxy_addrs): item for item in items}
                  for future in concurrent.futures.as_completed(future_to_url):
                      success, message, failed_item = future.result()
                      print(message, flush=True)
                      if not success: failed_phase1.append(failed_item)

              if failed_phase1:
                  print("\n==========================================", flush=True)
                  print(f"🌀 FASE 2: Registrazione ultra-concorrente di 20 IP WARP tramite i proxy funzionanti...", flush=True)
                  print("==========================================\n", flush=True)
                  stop_registration.clear()
                  active_warp_proxies = []
                  warp_processes = []
                  warp_counter = 0

                  with concurrent.futures.ThreadPoolExecutor(max_workers=40) as register_executor:
                      futures = [register_executor.submit(register_single_warp, p) for p in sorted_proxy_addrs[:100]]
                      concurrent.futures.wait(futures)
                      
                  if not active_warp_proxies:
                      print("⚠️ Registrazione WARP non riuscita. Fallback sui proxy pubblici originali.", flush=True)
                      active_warp_proxies = sorted_proxy_addrs
                  else:
                      print(f"\n🎉 Totale tunnel WARP locali attivati: {len(active_warp_proxies)}", flush=True)

                  print("\n==========================================", flush=True)
                  print(f"🚀 FASE 2a: Retest di {len(failed_phase1)} URL falliti tramite IP WARP con curl-cffi/Jina...", flush=True)
                  print("==========================================\n", flush=True)
                  failed_phase2a = []
                  with concurrent.futures.ThreadPoolExecutor(max_workers=min(20, len(failed_phase1))) as executor:
                      future_to_url = {executor.submit(fetch_url_lightweight, (item[0], item[1]), active_warp_proxies): item for item in failed_phase1}
                      for future in concurrent.futures.as_completed(future_to_url):
                          success, message, failed_item = future.result()
                          print(message, flush=True)
                          if not success: failed_phase2a.append(failed_item)

                  if failed_phase2a:
                      print("\n==========================================", flush=True)
                      print(f"🔥 FASE 2b: Avvio di {min(20, len(active_warp_proxies))} browser paralleli CloakBrowser per risolvere {len(failed_phase2a)} URL rimanenti...", flush=True)
                      print("==========================================\n", flush=True)
                      jobs_queue = Queue()
                      for item in failed_phase2a: jobs_queue.put(item)
                      cf_threads = []
                      num_cf_workers = min(20, len(active_warp_proxies), len(failed_phase2a))
                      for w_id in range(1, num_cf_workers + 1):
                          proxy_for_worker = active_warp_proxies[(w_id - 1) % len(active_warp_proxies)]
                          t = threading.Thread(target=cloakbrowser_worker_thread, args=(w_id, proxy_for_worker, sorted_proxy_addrs, jobs_queue))
                          t.start()
                          cf_threads.append(t)
                      for t in cf_threads: t.join()
                  else:
                      print("\n🎉 Tutti gli URL sono stati recuperati con successo nella Fase 2a via WARP + curl-cffi!", flush=True)
              else:
                  print("\n🎉 Tutti gli URL sono stati estratti con successo nella Fase 1!", flush=True)
                  
              if warp_processes:
                  print("\n🧹 Spegnimento dei processi WARP locali in background...", flush=True)
                  for proc in warp_processes:
                      try:
                          proc.terminate()
                          proc.wait(timeout=2)
                      except Exception: pass
              print("👋 Fine elaborazione.", flush=True)
          EOF
          export PYTHONUNBUFFERED=1
          python extract.py

      # FASE 3: IMPACCHETTAMENTO E CARICAMENTO COME ARTEFATTO (ZIP)
      - name: Carica i file estratti come Artefatto ZIP
        uses: actions/upload-artifact@v4
        with:
          name: jina-markdown-outputs
          path: output/
          retention-days: 7
