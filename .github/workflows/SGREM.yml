name: Extract Markdown (Fully Proxied Hybrid Pipeline + ZIP)

on:
  workflow_dispatch:

jobs:
  extract-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installa dipendenze sistema, Python, CloakBrowser e Utility WARP
        run: |
          # Aggiorna pacchetti di sistema
          sudo apt-get update
          
          # Installa wgcf (Utility per la registrazione degli account WARP)
          sudo curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.29/wgcf_2.2.29_linux_amd64 -o /usr/local/bin/wgcf
          sudo chmod +x /usr/local/bin/wgcf
          
          # Installa wireproxy (Proxy SOCKS5 leggero basato su WireGuard)
          curl -fsSL https://github.com/pufferffish/wireproxy/releases/download/v1.0.9/wireproxy_linux_amd64.tar.gz -o wireproxy.tar.gz
          tar -xzf wireproxy.tar.gz
          sudo mv wireproxy /usr/local/bin/wireproxy
          sudo chmod +x /usr/local/bin/wireproxy
          
          # Installa le dipendenze Python e CloakBrowser
          python -m pip install --upgrade pip
          pip install requests pysocks curl-cffi markdownify beautifulsoup4 playwright "cloakbrowser[geoip]"
          python -m playwright install-deps chromium
          python -m cloakbrowser install

      - name: Avvio Xvfb (Virtual Display Headful per CloakBrowser)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pipeline 100% Proxata con Validazione Antibot e Tunneling WARP
        run: |
          cat << 'EOF' > extract.py
          import os
          import re
          import requests
          import random
          import time
          import concurrent.futures
          import threading
          import subprocess
          import sys
          import textwrap
          import asyncio
          from queue import Queue, Empty
          from urllib.parse import urlparse, parse_qs
          from curl_cffi import requests as requests_cffi
          from markdownify import markdownify as md
          from cloakbrowser import launch_persistent_context_async
          from bs4 import BeautifulSoup

          URLS_TO_TEST = [
              "https://comune.orvieto.tr.it/it/vivere/pozzo-di-san-patrizio",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          os.makedirs('output', exist_ok=True)
          total_urls = len(URLS_TO_TEST)

          # Scanner variabili
          proxy_queue = Queue()
          stop_scanner = threading.Event()
          working_count = 0
          working_lock = threading.Lock()
          max_working = 100
          working_proxies = []

          # Gestione WARP
          warp_success_lock = threading.Lock()
          active_warp_proxies = []
          warp_processes = []
          warp_counter = 0
          stop_registration = threading.Event()

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p', 'find_desc']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          def parse_wgcf_profile(filepath):
              private_key = None
              addresses = []
              dns_servers = []
              public_key = None
              endpoint = "engage.cloudflareclient.com:2408"
              
              if os.path.exists(filepath):
                  with open(filepath, "r") as f:
                      for line in f:
                          line = line.strip()
                          if not line or line.startswith("#"):
                              continue
                          if "=" in line:
                              key, val = line.split("=", 1)
                              key = key.strip().lower()
                              val = val.strip()
                              if key == "privatekey":
                                  private_key = val
                              elif key == "address":
                                  parts = [p.strip() for p in val.split(",") if p.strip()]
                                  addresses.extend(parts)
                              elif key == "dns":
                                  parts = [p.strip() for p in val.split(",") if p.strip()]
                                  dns_servers.extend(parts)
                              elif key == "publickey":
                                  public_key = val
                              elif key == "endpoint":
                                  endpoint = val
                                  
              # Risoluzione Dual-Stack preferendo DNS IPv6 per WARP
              dns_servers = ["2606:4700:4700::1111", "1.1.1.1", "2606:4700:4700::1001", "8.8.8.8"]
                      
              if not addresses:
                  addresses = ["172.16.0.2/32", "fd00:53b:43::1/128"]
                  
              return private_key, addresses, dns_servers, public_key, endpoint

          def clean_html_and_to_markdown(html_content):
              try:
                  soup = BeautifulSoup(html_content, 'html.parser')
                  for element in soup(["noscript", "script", "style", "iframe", "meta", "head"]):
                      element.decompose()
                  cleaned_html = str(soup)
              except Exception:
                  cleaned_html = html_content
              return md(cleaned_html, heading_style="ATX")

          def validate_markdown(markdown_text, url):
              if not markdown_text:
                  return False, "Markdown vuoto"
                  
              text_only = re.sub(r'\[([^\]]+)\]\([^\)]+\)', r'\1', markdown_text)
              text_only = re.sub(r'!\[[^\]]*\]\([^\)]+\)', '', text_only)
              text_only = re.sub(r'[*_#>\-`[\]]', ' ', text_only)
              text_only = ' '.join(text_only.split())
              
              char_count = len(text_only)
              if char_count < 200:
                  return False, f"Testo utile nel markdown insufficiente ({char_count} caratteri)"
                  
              low_text = markdown_text.lower()
              blocking_indicators = [
                  "challenge-platform", "access denied", "403 forbidden", "cloudflare",
                  "just a moment", "security verification", "please enable js", "enable javascript",
                  "are you a robot", "please wait for verification", "we've detected unusual activity",
                  "unusual traffic from your computer network", "checking your browser", 
                  "prove your humanity", "captcha verification", "robot challenge screen",
                  "one moment, please...", "pardon our interruption",
                  "you've been blocked by network security",
                  "blocked by network security",
                  "use your developer token",
                  "warning: this page maybe requiring captcha",
                  "please make sure you are authorized to access this page",
                  "this page maybe requiring captcha",
                  "the request could not be satisfied",
                  "block access from your country",
                  "generated by cloudfront",
                  "under construction",
                  "mindtrip is under construction",
                  "problem loading page",
                  "accept the risk and continue",
                  "network security settings might be causing this",
                  "accept the risk",
                  "connection is untrusted",
                  "one last step",
                  "please solve the challenge below",
                  "solve the challenge below to continue",
                  "sending automated queries",
                  "not allowed to access yelp",
                  "yelp.com/captcha"
              ]
              for ind in blocking_indicators:
                  if ind in low_text:
                      return False, f"Rilevato blocco, captcha o errore nel testo: '{ind}'"
                      
              domain_match = re.search(r'https?://(?:www\.)?([^/]+)', url)
              if domain_match:
                  domain = domain_match.group(1).lower().split('.')[0]
                  words = text_only.lower().split()
                  if len(words) > 0:
                      domain_occurrences = sum(1 for w in words if domain in w)
                      ratio = domain_occurrences / len(words)
                      if ratio > 0.35 and len(words) < 100:
                          return False, f"Contenuto fittizio: contiene quasi esclusivamente riferimenti al dominio '{domain}'"
                          
              return True, ""

          def scan_worker(proxy_addr):
              global working_count, working_proxies
              if stop_scanner.is_set():
                  return
              
              proxies = {
                  'http': f'socks5h://{proxy_addr}',
                  'https': f'socks5h://{proxy_addr}'
              }
              try:
                  test_headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'}
                  start_time = time.time()
                  r = requests.get("https://r.jina.ai/https://example.com", headers=test_headers, proxies=proxies, timeout=3.0)
                  latency = time.time() - start_time
                  if r.status_code == 200 and "example" in r.text.lower():
                      with working_lock:
                          if len(working_proxies) < max_working and not stop_scanner.is_set():
                              working_proxies.append((proxy_addr, latency))
                              working_count = len(working_proxies)
                              proxy_queue.put(proxy_addr)
                              print(f"  [+] Proxy valido: {proxy_addr} | Latenza: {latency:.2f}s ({working_count}/{max_working})", flush=True)
                              if working_count >= max_working:
                                  stop_scanner.set()
              except Exception:
                  pass

          def register_single_warp(proxy_addr):
              global warp_counter
              if stop_registration.is_set():
                  return
                  
              with warp_success_lock:
                  if len(active_warp_proxies) >= 20:
                      stop_registration.set()
                      return
                  current_idx = warp_counter
                  warp_counter += 1
                  
              local_port = 20001 + current_idx
              dir_name = f"warp_{current_idx}"
              os.makedirs(dir_name, exist_ok=True)
              
              env = os.environ.copy()
              env["HTTP_PROXY"] = f"socks5h://{proxy_addr}"
              env["HTTPS_PROXY"] = f"socks5h://{proxy_addr}"
              env["ALL_PROXY"] = f"socks5h://{proxy_addr}"
              
              try:
                  # 1. wgcf register
                  reg_res = subprocess.run(
                      ["wgcf", "register", "--accept-tos"],
                      env=env, cwd=dir_name, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, timeout=8
                  )
                  if reg_res.returncode != 0 or stop_registration.is_set():
                      return
                      
                  # 2. wgcf generate
                  gen_res = subprocess.run(
                      ["wgcf", "generate"],
                      env=env, cwd=dir_name, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, timeout=8
                  )
                  if gen_res.returncode != 0 or stop_registration.is_set():
                      return
                      
                  # 3. Estrazione dinamica e totale dei dati dal profilo wgcf
                  profile_path = os.path.join(dir_name, "wgcf-profile.conf")
                  private_key, addresses, dns_servers, public_key, endpoint = parse_wgcf_profile(profile_path)
                  
                  if not private_key or not public_key or stop_registration.is_set():
                      return
                      
                  # 4. Generazione configurazione allineata di wireproxy
                  address_lines = "\n".join([f"Address = {addr}" for addr in addresses])
                  dns_lines = f"DNS = {', '.join(dns_servers)}"
                  
                  wp_config_path = os.path.join(dir_name, "wireproxy.conf")
                  wp_config_content = textwrap.dedent(f"""\
                      [Interface]
                      PrivateKey = {private_key}
                      {address_lines}
                      {dns_lines}
                      MTU = 1280

                      [Peer]
                      PublicKey = {public_key}
                      Endpoint = {endpoint}
                      AllowedIPs = 0.0.0.0/0
                      AllowedIPs = ::/0

                      [Socks5]
                      BindAddress = 127.0.0.1:{local_port}
                  """)
                  with open(wp_config_path, "w") as f:
                      f.write(wp_config_content)
                      
                  if stop_registration.is_set():
                      return

                  # 5. Avvio wireproxy in background
                  proc = subprocess.Popen(
                      ["wireproxy", "-c", "wireproxy.conf"],
                      cwd=dir_name, stdout=subprocess.PIPE, stderr=subprocess.PIPE
                  )
                  
                  # Test rapido di funzionamento del proxy locale WARP
                  time.sleep(1.0)
                  test_proxies = {
                      'http': f'socks5h://127.0.0.1:{local_port}',
                      'https': f'socks5h://127.0.0.1:{local_port}'
                  }
                  try:
                      test_r = requests.get("https://www.cloudflare.com/cdn-cgi/trace", proxies=test_proxies, timeout=4.0)
                      if "warp=on" in test_r.text:
                          with warp_success_lock:
                              if len(active_warp_proxies) < 20 and not stop_registration.is_set():
                                  active_warp_proxies.append(f"127.0.0.1:{local_port}")
                                  warp_processes.append(proc)
                                  print(f"  [✅ WARP PRONTO] Istanza {len(active_warp_proxies)} avviata su 127.0.0.1:{local_port} (tramite proxy {proxy_addr})", flush=True)
                                  if len(active_warp_proxies) >= 20:
                                      stop_registration.set()
                              else:
                                  proc.terminate()
                      else:
                          proc.terminate()
                  except Exception:
                      proc.terminate()
                      
              except Exception:
                  pass

          def fetch_url_lightweight(item, proxies_list):
              index, url = item
              clean_name = re.sub(r'^https?://', '', url)
              safe_filename = re.sub(r'[^a-zA-Z0-9]', '_', clean_name)[:150]
              filepath = os.path.join('output', f"{safe_filename}.md")
              jina_url = f"https://r.jina.ai/{url}"
              
              if "bing.com" in url:
                  return False, f"[⏭️ FORCED BING {index}] {url} -> Forzato a CloakBrowser", (index, url, filepath)

              if "google.com" in url:
                  return False, f"[⏭️ FORCED GOOGLE {index}] {url} -> Forzato a CloakBrowser", (index, url, filepath)
                  
              if not proxies_list:
                  return False, f"[⚠️ NO PROXY {index}/{total_urls}] {url}", (index, url, filepath)
                  
              max_light_attempts = 2
              for attempt in range(1, max_light_attempts + 1):
                  proxy_addr = random.choice(proxies_list)
                  proxy_url = f"socks5h://{proxy_addr}"
                  proxies = {
                      'http': proxy_url,
                      'https': proxy_url
                  }
                  
                  time.sleep(random.uniform(0.1, 0.5))
                  
                  # 1. Tentativo curl-cffi stealth
                  try:
                      impersonate_target = "chrome120"
                      headers_cffi = {
                          "accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7",
                          "accept-language": "en-US,en;q=0.9",
                          "cache-control": "max-age=0",
                          "sec-ch-ua": '"Not_A Brand";v="8", "Chromium";v="120", "Google Chrome";v="120"',
                          "sec-ch-ua-mobile": "?0",
                          "sec-ch-ua-platform": '"Windows"',
                          "sec-fetch-dest": "document",
                          "sec-fetch-mode": "navigate",
                          "sec-fetch-site": "none",
                          "sec-fetch-user": "?1",
                          "upgrade-insecure-requests": "1",
                          "user-agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
                      }
                      response = requests_cffi.get(
                          url,
                          headers=headers_cffi,
                          proxies=proxies,
                          impersonate=impersonate_target,
                          timeout=8
                      )
                      if response.status_code == 200:
                          markdown_content = clean_html_and_to_markdown(response.text)
                          is_valid, reason = validate_markdown(markdown_content, url)
                          if is_valid:
                              with open(filepath, 'w', encoding='utf-8') as f:
                                  f.write(markdown_content)
                              return True, f"[✅ STEALTH {index}] {url} -> Scaricato via curl-cffi (Proxy: {proxy_addr})", None
                  except Exception:
                      pass

                  # 2. Fallback Jina AI
                  try:
                      jina_headers = {
                          'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)',
                          'X-Return-Format': 'markdown'
                      }
                      jina_response = requests.get(jina_url, headers=jina_headers, proxies=proxies, timeout=10)
                      if jina_response.status_code == 200:
                          markdown_content = jina_response.text
                          is_valid, reason = validate_markdown(markdown_content, url)
                          if is_valid:
                              with open(filepath, 'w', encoding='utf-8') as f:
                                  f.write(markdown_content)
                              return True, f"[✅ JINA {index}] {url} -> Salvato via Jina (Proxy: {proxy_addr})", None
                  except Exception:
                      pass

              return False, f"[⚠️ FAIL {index}] {url} -> Richiede step successivo.", (index, url, filepath)

          def cloakbrowser_worker_thread(worker_id, warp_proxy_addr, active_warp_proxies, public_proxies, jobs_queue):
              print(f"  [🕵️ Worker CB {worker_id}] Avvio thread CloakBrowser...", flush=True)
              
              async def worker_async():
                  home_dir = os.path.expanduser("~")
                  windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
                  
                  # Configurazione del fingerprint coerente e allineata per emulare sessione persistente
                  base_args = [
                      "--no-sandbox",
                      "--disable-dev-shm-usage",
                      f"--fingerprint-fonts-dir={windows_fonts_dir}"
                  ]
                  
                  context = None
                  page = None
                  current_proxy = warp_proxy_addr
                  
                  async def init_browser_context(proxy_addr):
                      nonlocal context, page, current_proxy
                      if context:
                          try:
                              await context.close()
                          except Exception:
                              pass
                      
                      current_proxy = proxy_addr
                      proxy_safe_name = proxy_addr.replace(".", "_").replace(":", "_")
                      profile_dir = os.path.join(home_dir, f".cloak_profiles/worker_{worker_id}_{proxy_safe_name}")
                      
                      # Generiamo un sotto-argomento con fingerprint-seed dinamico coerente con il proxy per evitare collisioni di lock
                      scoped_args = base_args + [f"--fingerprint={random.randint(100000, 999999)}"]
                      
                      print(f"  [🕵️ Worker CB {worker_id}] Inizializzazione browser persistente con proxy {proxy_addr}...", flush=True)
                      context = await launch_persistent_context_async(
                          profile_dir,
                          headless=False,
                          humanize=True,
                          human_config={"mistype_chance": 0.05, "typing_delay": 100, "idle_between_actions": True},
                          proxy=f"socks5://{proxy_addr}",
                          geoip=True,
                          viewport={"width": 1920, "height": 1080},
                          args=scoped_args
                      )
                      page = await context.new_page()
                      
                      # Warmup integrato identico al codice stabile per generare una cronologia credibile
                      print(f"  [🕵️ Worker CB {worker_id}] Esecuzione warmup sul proxy {proxy_addr}...", flush=True)
                      try:
                          await page.goto("https://www.google.com", wait_until="domcontentloaded", timeout=25000)
                          await asyncio.sleep(2)
                          await page.goto("https://www.reddit.com", wait_until="domcontentloaded", timeout=25000)
                          await asyncio.sleep(2)
                      except Exception as e:
                          print(f"  [🕵️ Worker CB {worker_id}] Warmup warning su {proxy_addr}: {e}", flush=True)
                  
                  # Inizializziamo il browser la prima volta sul proxy WARP nativo
                  try:
                      await init_browser_context(warp_proxy_addr)
                  except Exception as e:
                      print(f"  [❌ Worker CB {worker_id}] Errore critico di avvio browser: {e}", flush=True)
                      return
                  
                  while True:
                      try:
                          item = jobs_queue.get_nowait()
                      except Empty:
                          break
                      
                      index, url, filepath = item
                      print(f"  [🕵️ Worker CB {worker_id}] Scaricamento: {url}", flush=True)
                      
                      # Se l'iterazione precedente ha cambiato il proxy, ripristiniamo l'IP WARP primario per iniziare puliti
                      if current_proxy != warp_proxy_addr:
                          print(f"  [🕵️ Worker CB {worker_id}] Ripristino dell'IP WARP primario ({warp_proxy_addr}) per il nuovo target...", flush=True)
                          try:
                              await init_browser_context(warp_proxy_addr)
                          except Exception as e:
                              print(f"  [🕵️ Worker CB {worker_id}] Errore nel ripristino del proxy primario: {e}", flush=True)
                      
                      success = False
                      error_msg = ""
                      query_to_search = get_query_from_url(url)
                      
                      # --- TENTATIVO 1: Tramite IP WARP assegnato ---
                      try:
                          if "bing.com" in url:
                              await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.5, 4.0))
                              try:
                                  search_box = page.locator("textarea[name='q'], input[name='q']").first
                                  await search_box.fill(query_to_search) 
                                  await page.keyboard.press("Enter")
                              except Exception:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                                  
                          elif "startpage.com" in url:
                              await page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.0, 3.5))
                              try:
                                  search_box = page.locator("input#q").first
                                  await search_box.fill(query_to_search)
                                  await page.keyboard.press("Enter")
                              except Exception:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                                  
                          else:
                              await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                          try:
                              await page.wait_for_load_state("networkidle", timeout=12000)
                          except Exception:
                              pass
                          
                          await asyncio.sleep(6.0)
                          
                          try:
                              await page.keyboard.press("PageDown")
                              await asyncio.sleep(1.0)
                              await page.keyboard.press("PageDown")
                              await asyncio.sleep(2.0)
                          except Exception:
                              pass
                                      
                          html_content = await page.content()
                          markdown_content = clean_html_and_to_markdown(html_content)
                          
                          is_valid, reason = validate_markdown(markdown_content, url)
                          if is_valid:
                              with open(filepath, 'w', encoding='utf-8') as f:
                                  f.write(markdown_content)
                              print(f"[✅ CLOAKBROWSER SUCCESS {index}] {url} -> Estratto con successo via WARP!", flush=True)
                              success = True
                          else:
                              error_msg = f"Validazione fallita su WARP: {reason}"
                      except Exception as e:
                          error_msg = f"Errore su WARP: {e}"
                          
                      # --- TENTATIVI DI RISERVA (FALLBACK) ---
                      # Se fallisce l'IP WARP primario, ruotiamo su 2 IP WARP alternativi e successivamente su 3 SOCKS5 pubblici migliori.
                      if not success:
                          # 1. Recupero 2 IP WARP alternativi dal pool attivo
                          warp_alternatives = [p for p in active_warp_proxies if p != warp_proxy_addr]
                          random.shuffle(warp_alternatives)
                          warp_fallbacks = warp_alternatives[:2]
                          
                          # 2. Recupero 3 proxy pubblici tra i 30 con minor latenza
                          fast_public_proxies = public_proxies[:30]
                          random.shuffle(fast_public_proxies)
                          public_fallbacks = fast_public_proxies[:3]
                          
                          # 3. Consolidamento dei fallback in una coda ordinata
                          fallback_queue = []
                          for p in warp_fallbacks:
                              fallback_queue.append((p, "WARP Alternativo"))
                          for p in public_fallbacks:
                              fallback_queue.append((p, "SOCKS5 Pubblico"))
                              
                          for f_idx, (fallback_proxy, proxy_type) in enumerate(fallback_queue, start=1):
                              print(f"  [🕵️ Worker CB {worker_id}] ⚠️ WARP fallito ({error_msg}) per {url}. Fallback {f_idx}/{len(fallback_queue)} con {proxy_type}: {fallback_proxy}...", flush=True)
                              
                              try:
                                  # Re-inizializziamo il browser persistente sul nuovo proxy di fallback con warmup integrato
                                  await init_browser_context(fallback_proxy)
                                  
                                  if "bing.com" in url:
                                      await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                                      await asyncio.sleep(random.uniform(2.5, 4.0))
                                      try:
                                          search_box = page.locator("textarea[name='q'], input[name='q']").first
                                          await search_box.fill(query_to_search) 
                                          await page.keyboard.press("Enter")
                                      except Exception:
                                          await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                                          
                                  elif "startpage.com" in url:
                                      await page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                                      await asyncio.sleep(random.uniform(2.0, 3.5))
                                      try:
                                          search_box = page.locator("input#q").first
                                          await search_box.fill(query_to_search)
                                          await page.keyboard.press("Enter")
                                      except Exception:
                                          await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                                          
                                  else:
                                      await page.goto(url, wait_until="domcontentloaded", timeout=35000)
                                  
                                  try:
                                      await page.wait_for_load_state("networkidle", timeout=12000)
                                  except Exception:
                                      pass
                                  
                                  await asyncio.sleep(6.0)
                                  
                                  try:
                                      await page.keyboard.press("PageDown")
                                      await asyncio.sleep(1.0)
                                      await page.keyboard.press("PageDown")
                                      await asyncio.sleep(2.0)
                                  except Exception:
                                      pass
                                              
                                  html_content = await page.content()
                                  markdown_content = clean_html_and_to_markdown(html_content)
                                  
                                  is_valid, reason = validate_markdown(markdown_content, url)
                                  if is_valid:
                                      with open(filepath, 'w', encoding='utf-8') as f:
                                          f.write(markdown_content)
                                      print(f"[✅ CLOAKBROWSER FALLBACK SUCCESS {index}] {url} -> Estratto con successo via {proxy_type} ({fallback_proxy})!", flush=True)
                                      success = True
                                      break
                                  else:
                                      error_msg = f"Validazione fallita su {proxy_type}: {reason}"
                              except Exception as fe:
                                  error_msg = f"Errore su {proxy_type}: {fe}"
                                  
                          if not success:
                              print(f"[❌ CLOAKBROWSER ALL TRIES FAILED {index}] {url} non recuperato: {error_msg}", flush=True)
                              
                      jobs_queue.task_done()
                  
                  try:
                      await context.close()
                  except Exception:
                      pass

              asyncio.run(worker_async())

          if __name__ == '__main__':
              # DOWNLOAD LISTA PROXY
              print("==========================================", flush=True)
              print("🔄 Scaricamento liste proxy candidati...", flush=True)
              proxy_urls = [
                  "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt",
                  "https://raw.githubusercontent.com/Hookzof/socks5_list/master/socks5.txt",
                  "https://raw.githubusercontent.com/proxifly/free-proxy-list/main/proxies/protocols/socks5/data.txt"
              ]
              raw_proxies_set = set()
              for p_url in proxy_urls:
                  try:
                      r = requests.get(p_url, timeout=10)
                      if r.status_code == 200:
                          for line in r.text.split('\n'):
                              line = line.strip()
                              if line and re.match(r'^\d+\.\d+\.\d+\.\d+:\d+$', line):
                                  raw_proxies_set.add(line)
                  except Exception:
                      pass
                      
              raw_proxies = list(raw_proxies_set)
              random.shuffle(raw_proxies)
              print(f"✅ Recuperati {len(raw_proxies)} proxy candidati totali.", flush=True)

              # AVVIO DELLO SCANNER
              print("🚀 Scansione proxy pubblici per la Fase 1 (fino a 100 funzionanti)...", flush=True)
              with concurrent.futures.ThreadPoolExecutor(max_workers=300) as scanner_executor:
                  futures = {scanner_executor.submit(scan_worker, p): p for p in raw_proxies[:2000]}
                  concurrent.futures.wait(futures)

              working_proxies.sort(key=lambda x: x[1])
              sorted_proxy_addrs = [p[0] for p in working_proxies]
              
              if not sorted_proxy_addrs:
                  print("⚠️ Nessun proxy pubblico valido trovato. Fallback su connessione diretta per la Fase 1.", flush=True)

              # FASE 1: curl-cffi E Jina con i proxy pubblici
              print("\n==========================================", flush=True)
              print(f"🚀 FASE 1: Estrazione con {len(sorted_proxy_addrs)} proxy pubblici...", flush=True)
              print("==========================================\n", flush=True)
              
              failed_phase1 = []
              with concurrent.futures.ThreadPoolExecutor(max_workers=min(50, total_urls)) as executor:
                  items = list(enumerate(URLS_TO_TEST, start=1))
                  future_to_url = {executor.submit(fetch_url_lightweight, item, sorted_proxy_addrs): item for item in items}
                  for future in concurrent.futures.as_completed(future_to_url):
                      success, message, failed_item = future.result()
                      print(message, flush=True)
                      if not success:
                          failed_phase1.append(failed_item)

              # FASE 2: Registrazione concorrente WARP
              if failed_phase1:
                  print("\n==========================================", flush=True)
                  print(f"🌀 FASE 2: Registrazione ultra-concorrente di 20 IP WARP tramite i proxy funzionanti...", flush=True)
                  print("==========================================\n", flush=True)
                  
                  stop_registration.clear()
                  active_warp_proxies = []
                  warp_processes = []
                  warp_counter = 0

                  with concurrent.futures.ThreadPoolExecutor(max_workers=40) as register_executor:
                      futures = [register_executor.submit(register_single_warp, p) for p in sorted_proxy_addrs[:100]]
                      concurrent.futures.wait(futures)
                      
                  if not active_warp_proxies:
                      print("⚠️ Registrazione WARP non riuscita. Fallback sui proxy pubblici originali.", flush=True)
                      active_warp_proxies = sorted_proxy_addrs
                  else:
                      print(f"\n🎉 Totale tunnel WARP locali attivati: {len(active_warp_proxies)}", flush=True)

                  # FASE 2a: Retest degli URL falliti con curl-cffi usando i proxy WARP
                  print("\n==========================================", flush=True)
                  print(f"🚀 FASE 2a: Retest di {len(failed_phase1)} URL falliti tramite IP WARP con curl-cffi/Jina...", flush=True)
                  print("==========================================\n", flush=True)
                  
                  failed_phase2a = []
                  with concurrent.futures.ThreadPoolExecutor(max_workers=min(20, len(failed_phase1))) as executor:
                      future_to_url = {executor.submit(fetch_url_lightweight, (item[0], item[1]), active_warp_proxies): item for item in failed_phase1}
                      for future in concurrent.futures.as_completed(future_to_url):
                          success, message, failed_item = future.result()
                          print(message, flush=True)
                          if not success:
                              failed_phase2a.append(failed_item)

                  # FASE 2b: Avvio CloakBrowser con 20 browser paralleli su WARP per i rimanenti fallimenti
                  if failed_phase2a:
                      print("\n==========================================", flush=True)
                      print(f"🔥 FASE 2b: Avvio di {min(20, len(active_warp_proxies))} browser paralleli CloakBrowser per risolvere {len(failed_phase2a)} URL rimanenti...", flush=True)
                      print("==========================================\n", flush=True)
                      
                      jobs_queue = Queue()
                      for item in failed_phase2a:
                          jobs_queue.put(item)
                          
                      cf_threads = []
                      num_cf_workers = min(20, len(active_warp_proxies), len(failed_phase2a))
                      
                      for w_id in range(1, num_cf_workers + 1):
                          proxy_for_worker = active_warp_proxies[(w_id - 1) % len(active_warp_proxies)]
                          t = threading.Thread(target=cloakbrowser_worker_thread, args=(w_id, proxy_for_worker, active_warp_proxies, sorted_proxy_addrs, jobs_queue))
                          t.start()
                          cf_threads.append(t)
                          
                      for t in cf_threads:
                          t.join()
                  else:
                      print("\n🎉 Tutti gli URL sono stati recuperati con successo nella Fase 2a via WARP + curl-cffi!", flush=True)
              else:
                  print("\n🎉 Tutti gli URL sono stati estratti con successo nella Fase 1!", flush=True)
                  
              # SPEGNIMENTO DEI PROCESSI WIREPROXY IN BACKGROUND
              if warp_processes:
                  print("\n🧹 Spegnimento dei processi WARP locali in background...", flush=True)
                  for proc in warp_processes:
                      try:
                          proc.terminate()
                          proc.wait(timeout=2)
                      except Exception:
                          pass
              print("👋 Fine elaborazione.", flush=True)
          EOF
