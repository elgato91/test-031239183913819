name: Extract Markdown (Fully Proxied Hybrid Pipeline + ZIP)

on:
  workflow_dispatch:

jobs:
  extract-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze sistema, Python, Camoufox e Utility WARP
        run: |
          # Aggiorna pacchetti di sistema
          sudo apt-get update
          
          # Installa wgcf (Utility per la registrazione degli account WARP)
          sudo curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.29/wgcf_2.2.29_linux_amd64 -o /usr/local/bin/wgcf
          sudo chmod +x /usr/local/bin/wgcf
          
          # Installa wireproxy (Proxy SOCKS5 leggero basato su WireGuard)
          curl -fsSL https://github.com/pufferffish/wireproxy/releases/download/v1.0.9/wireproxy_linux_amd64.tar.gz -o wireproxy.tar.gz
          tar -xzf wireproxy.tar.gz
          sudo mv wireproxy /usr/local/bin/wireproxy
          sudo chmod +x /usr/local/bin/wireproxy
          
          # Installa le dipendenze Python e Camoufox
          python -m pip install --upgrade pip
          pip install requests pysocks curl-cffi markdownify camoufox[geoip]
          python -m camoufox fetch

      - name: Pipeline 100% Proxata con Validazione Antibot e Tunneling WARP
        run: |
          cat << 'EOF' > extract.py
          import os
          import re
          import requests
          import random
          import time
          import concurrent.futures
          import threading
          import subprocess
          import sys
          import textwrap
          from queue import Queue, Empty
          from curl_cffi import requests as requests_cffi
          from markdownify import markdownify as md
          from camoufox.sync_api import Camoufox

          URLS_TO_TEST = [
              "https://catholicindex.org/mx/churches/mx-oaxaca-oaxaca-de-juarez-templo-de-santo-domingo-de-guzman-05ffe56e",
              "https://eltonodelacochinilla.com/visitanos",
              "https://klook.com/it/activity/150588-hierve-el-agua-mitla-mezcal-tour-in-mexico",
              "https://hola-oaxaca.com/que-hacer/tour/hierve-el-agua",
              "https://my.trip.com/travel-guide/attraction/oaxaca/templo-de-santo-domingo-de-guzmn-18697124",
              "https://mindtrip.ai/inspiration/how-take-shared-taxi-colectivo-oaxaca/in-HZoeSkoK",
              "https://oaxacae.com/2024/06/hierve-el-agua-oaxaca.html",
              "https://oaxacaautentico.com/es/blog/como-llegar-y-moverse-en-oaxaca-guia-transporte",
              "https://oaxaca.travel/index.php/es/markets-es/20-de-noviembre-market-en",
              "https://uncoveredhistory.com/mexico/monte-alban-the-encrypted-city",
              "https://edenviaggi.it/racconti/monte-alban-viaggio-nellantica-capitale-zapoteca-di-oaxaca-in-messico",
              "https://oaxaca.travel/index.php/en-us/markets-es/20-de-noviembre-market-en",
              "https://santacultura.mx/arte-popular/muestran-proceso-ancestral-de-tapetes-de-lana-en-teotitlan-del-valle",
              "https://hotelesdeoaxaca.com/atractivos-turisticos/mercado-20-de-noviembre.html",
              "https://oaxacaairporttaxi.com/es",
              "https://acchiappamappa.com/pozzo-di-san-patrizio-orvieto-guida",
              "https://alltrails.com/it-it/sentiero/italy/umbria/anello-della-rupe-di-orvieto",
              "https://alltrails.com/trail/italy/umbria/anello-della-rupe-di-orvieto",
              "https://comune.orvieto.tr.it/it/page/come-arrivare",
              "https://comune.orvieto.tr.it/it/page/orvieto-carta-unica",
              "https://comune.orvieto.tr.it/it/vivere/pozzo-di-san-patrizio",
              "https://comune.orvieto.tr.it/it/vivere/il-duomo-di-orvieto",
              "https://fsbusitalia.it/it/umbria/titoli-di-viaggio-tariffe-umbria/biglietti-tariffe-servizi-urbani-umbria/tariffe-orvieto.html",
              "https://fsbusitalia.it/it/turismo/programma-il-tuo-viaggio/orvieto-urbs-vetus-dell-umbria.html",
              "https://fsbusitalia.it/it/umbria/orari-linee-umbria/quibus-orvieto.html",
              "https://it.wikiloc.com/percorsi-escursionismo/orvieto-anello-della-rupe-e-i-sotterranei-246324949",
              "https://liveorvieto.com/blog/attrazioni_naturali/anello-della-rupe",
              "https://olodramma.com/it/cosa-vedere-in-umbria-in-un-weekend-itinerario-di-3-giorni-tra-orvieto-spello-assisi-e-gubbio",
              "https://neuralword.com/it/cucina/ristoranti-posti-dove-mangiare/mangiare-ad-orvieto-i-migliori-ristoranti",
              "https://roadmindtrip.com/cosa-vedere-a-orvieto-guida-per-un-weekend",
              "https://travelworld.it/visitare-orvieto-2-giorni-per-scoprire-la-perla-dellumbria",
              "https://viaggiadipiu.it/2020/03/09/visitare-orvieto-informazioni-e-consigli-utili",
              "https://flashpackingitaly.com/orvieto-card-review",
              "https://umbriatourism.it/en/w/crocefisso-del-tufo-necropolis-orvieto",
              "https://umbriatourism.it/it/w/duomo-di-santa-maria-assunta-in-cielo-it",
              "https://umbriatourism.it/it/w/necropoli-di-crocifisso-del-tufo-orvieto",
              "https://wikiloc.com/hiking-trails/gita-fuori-porta-due-viandanti-ad-orvieto-con-annesso-lanello-della-rupe-166636709"
          ]

          os.makedirs('output', exist_ok=True)
          total_urls = len(URLS_TO_TEST)

          # Scanner variabili
          proxy_queue = Queue()
          stop_scanner = threading.Event()
          working_count = 0
          working_lock = threading.Lock()
          max_working = 50
          working_proxies = []

          # Gestione WARP
          warp_success_lock = threading.Lock()
          active_warp_proxies = []
          warp_processes = []
          warp_counter = 0

          def parse_wgcf_profile(filepath):
              private_key = None
              public_key = None
              endpoint = "engage.cloudflareclient.com:2408"
              
              if os.path.exists(filepath):
                  with open(filepath, "r") as f:
                      content = f.read()
                      pk_match = re.search(r"PrivateKey\s*=\s*([^\s]+)", content)
                      pub_match = re.search(r"PublicKey\s*=\s*([^\s]+)", content)
                      ep_match = re.search(r"Endpoint\s*=\s*([^\s]+)", content)
                      
                      if pk_match:
                          private_key = pk_match.group(1).strip()
                      if pub_match:
                          public_key = pub_match.group(1).strip()
                      if ep_match:
                          endpoint = ep_match.group(1).strip()
                          
              return private_key, public_key, endpoint

          def validate_content(text, url, is_html=True):
              if any(site in url for site in ["example.com", "api.ipify.org"]):
                  return True, ""
                  
              if not text or len(text.strip()) < 300:
                  return False, "Contenuto vuoto o eccessivamente corto (< 300 caratteri)"
                  
              low_text = text.lower()
              
              if is_html:
                  title_match = re.search(r"<title[^>]*>(.*?)</title>", low_text, re.DOTALL)
                  title_text = title_match.group(1).strip() if title_match else ""
                  waf_titles = ["just a moment", "attention required", "access denied", 
                                "checking your browser", "robot challenge screen", 
                                "403 forbidden", "forbidden", "access forbidden", "one moment, please..."]
                  for wt in waf_titles:
                      if wt in title_text:
                          return False, f"WAF rilevato nel titolo HTML: '{wt}'"
                  
                  blocking_indicators = [
                      "challenge-platform", "access denied", "403 forbidden", "cloudflare",
                      "just a moment", "security verification", "please enable js", "enable javascript",
                      "are you a robot", "please wait for verification", "we've detected unusual activity",
                      "if you are not redirected", "unusual traffic from your computer network",
                      "checking your browser", "prove your humanity", "captcha verification",
                      "please enter in the characters you see below", "access to this page is forbidden",
                      "error 1020", "you have been blocked", "pardon our interruption",
                      "se non vieni reindirizzato", "se hai problemi ad accedere",
                      "robot challenge screen", "ci siamo quasi", "verifica di sicurezza",
                      "checking the site connection security", "please wait while your request is being verified",
                      "one moment, please..."
                  ]
              else:
                  blocking_indicators = [
                      "just a moment", "are you a robot", "prove your humanity",
                      "captcha verification", "please enter in the characters you see below",
                      "access is forbidden", "access to this page is forbidden", "challenge-platform",
                      "we've detected unusual activity", "robot challenge screen", 
                      "checking the site connection security", "unusual traffic from your computer network",
                      "403 forbidden", "forbidden", "target url returned error",
                      "page maybe requiring captcha", "please make sure you are authorized",
                      "performing security verification", "challenges.cloudflare.com",
                      "verification successful. waiting for", "attention required!",
                      "please wait while your request is being verified", "one moment, please..."
                  ]
          
              for ind in blocking_indicators:
                  if ind in low_text:
                      return False, f"WAF/Captcha/Blocco rilevato nel testo: '{ind}'"
                      
              return True, ""

          def scan_worker(proxy_addr):
              global working_count, working_proxies
              if stop_scanner.is_set():
                  return
              
              proxies = {
                  'http': f'socks5h://{proxy_addr}',
                  'https': f'socks5h://{proxy_addr}'
              }
              try:
                  test_headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'}
                  start_time = time.time()
                  r = requests.get("https://r.jina.ai/https://example.com", headers=test_headers, proxies=proxies, timeout=3.0)
                  latency = time.time() - start_time
                  if r.status_code == 200 and "example" in r.text.lower():
                      with working_lock:
                          if len(working_proxies) < max_working and not stop_scanner.is_set():
                              working_proxies.append((proxy_addr, latency))
                              working_count = len(working_proxies)
                              proxy_queue.put(proxy_addr)
                              print(f"  [+] Proxy valido: {proxy_addr} | Latenza: {latency:.2f}s ({working_count}/{max_working})", flush=True)
                              if working_count >= max_working:
                                  stop_scanner.set()
              except Exception:
                  pass

          def register_warp_worker(proxy_list_queue):
              global warp_counter
              while not proxy_list_queue.empty():
                  with warp_success_lock:
                      if len(active_warp_proxies) >= 20:
                          break
                      current_idx = warp_counter
                      warp_counter += 1
                  
                  try:
                      proxy = proxy_list_queue.get_nowait()
                  except Empty:
                      break
                      
                  local_port = 20001 + current_idx
                  dir_name = f"warp_{current_idx}"
                  os.makedirs(dir_name, exist_ok=True)
                  
                  env = os.environ.copy()
                  env["HTTP_PROXY"] = f"socks5h://{proxy}"
                  env["HTTPS_PROXY"] = f"socks5h://{proxy}"
                  env["ALL_PROXY"] = f"socks5h://{proxy}"
                  
                  try:
                      # 1. wgcf register
                      reg_res = subprocess.run(
                          ["wgcf", "register", "--accept-tos"],
                          env=env, cwd=dir_name, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, timeout=10
                      )
                      if reg_res.returncode != 0:
                          continue
                          
                      # 2. wgcf generate
                      gen_res = subprocess.run(
                          ["wgcf", "generate"],
                          env=env, cwd=dir_name, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, timeout=10
                      )
                      if gen_res.returncode != 0:
                          continue
                          
                      # 3. Estrazione dei dati per la config di wireproxy
                      profile_path = os.path.join(dir_name, "wgcf-profile.conf")
                      private_key, public_key, endpoint = parse_wgcf_profile(profile_path)
                      
                      if not private_key or not public_key:
                          continue
                          
                      # 4. Creazione file di configurazione custom per wireproxy
                      wp_config_path = os.path.join(dir_name, "wireproxy.conf")
                      wp_config_content = textwrap.dedent(f"""\
                          [Interface]
                          PrivateKey = {private_key}
                          Address = 172.16.0.2/32
                          DNS = 1.1.1.1
                          MTU = 1280

                          [Peer]
                          PublicKey = {public_key}
                          Endpoint = {endpoint}
                          AllowedIPs = 0.0.0.0/0

                          [Socks5]
                          BindAddress = 127.0.0.1:{local_port}
                      """)
                      with open(wp_config_path, "w") as f:
                          f.write(wp_config_content)
                          
                      # 5. Avvio wireproxy in background
                      proc = subprocess.Popen(
                          ["wireproxy", "-c", "wireproxy.conf"],
                          cwd=dir_name, stdout=subprocess.PIPE, stderr=subprocess.PIPE
                      )
                      
                      # Test rapido di funzionamento del proxy locale WARP
                      time.sleep(1.0)
                      test_proxies = {
                          'http': f'socks5://127.0.0.1:{local_port}',
                          'https': f'socks5://127.0.0.1:{local_port}'
                      }
                      try:
                          test_r = requests.get("https://www.cloudflare.com/cdn-cgi/trace", proxies=test_proxies, timeout=5.0)
                          if "warp=on" in test_r.text:
                              with warp_success_lock:
                                  if len(active_warp_proxies) < 20:
                                      active_warp_proxies.append(f"127.0.0.1:{local_port}")
                                      warp_processes.append(proc)
                                      print(f"  [✅ WARP PRONTO] Istanza {len(active_warp_proxies)} avviata su 127.0.0.1:{local_port} (tramite proxy {proxy})", flush=True)
                                  else:
                                      proc.terminate()
                          else:
                              proc.terminate()
                      except Exception:
                          proc.terminate()
                          
                  except Exception:
                      pass

          def fetch_url_lightweight(item, proxies_list):
              index, url = item
              clean_name = re.sub(r'^https?://', '', url)
              safe_filename = re.sub(r'[^a-zA-Z0-9]', '_', clean_name)[:150]
              filepath = os.path.join('output', f"{safe_filename}.md")
              jina_url = f"https://r.jina.ai/{url}"
              
              if not proxies_list:
                  return False, f"[⚠️ NO PROXY {index}/{total_urls}] {url}", (index, url, filepath)
                  
              max_light_attempts = 2
              for attempt in range(1, max_light_attempts + 1):
                  proxy_addr = random.choice(proxies_list)
                  # Se locale usiamo socks5 standard, se pubblico socks5h per instradare DNS remoto
                  proxy_url = f"socks5://{proxy_addr}" if "127.0.0.1" in proxy_addr else f"socks5h://{proxy_addr}"
                  proxies = {
                      'http': proxy_url,
                      'https': proxy_url
                  }
                  
                  time.sleep(random.uniform(0.1, 0.5))
                  
                  # 1. Tentativo curl-cffi stealth
                  try:
                      impersonate_target = random.choice(["chrome110", "chrome120", "chrome124"])
                      headers_cffi = {
                          "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8",
                          "Accept-Language": "en-US,en;q=0.9",
                          "Upgrade-Insecure-Requests": "1"
                      }
                      response = requests_cffi.get(
                          url,
                          headers=headers_cffi,
                          proxies=proxies,
                          impersonate=impersonate_target,
                          timeout=6
                      )
                      if response.status_code == 200:
                          is_valid, reason = validate_content(response.text, url, is_html=True)
                          if is_valid:
                              markdown_content = md(response.text, heading_style="ATX")
                              with open(filepath, 'w', encoding='utf-8') as f:
                                  f.write(markdown_content)
                              return True, f"[✅ STEALTH {index}] {url} -> Scaricato via curl-cffi (Proxy: {proxy_addr})", None
                  except Exception:
                      pass

                  # 2. Fallback Jina AI
                  try:
                      jina_headers = {
                          'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)',
                          'X-Return-Format': 'markdown'
                      }
                      jina_response = requests.get(jina_url, headers=jina_headers, proxies=proxies, timeout=10)
                      if jina_response.status_code == 200:
                          is_valid, reason = validate_content(jina_response.text, url, is_html=False)
                          if is_valid:
                              with open(filepath, 'w', encoding='utf-8') as f:
                                  f.write(jina_response.text)
                              return True, f"[✅ JINA {index}] {url} -> Salvato via Jina (Proxy: {proxy_addr})", None
                  except Exception:
                      pass

              return False, f"[⚠️ FAIL {index}] {url} -> Richiede step successivo.", (index, url, filepath)

          def camoufox_worker_thread(worker_id, proxy_addr, jobs_queue):
              print(f"  [🦊 Worker CF {worker_id}] Avvio browser con WARP proxy {proxy_addr}...", flush=True)
              proxy_config = {"server": f"socks5://{proxy_addr}"}
              
              try:
                  with Camoufox(
                      proxy=proxy_config,
                      headless=True,
                      geoip=True, 
                      humanize=True, 
                      i_know_what_im_doing=True
                  ) as browser:
                      print(f"  [🦊 Worker CF {worker_id}] Browser pronto!", flush=True)
                      while True:
                          try:
                              item = jobs_queue.get_nowait()
                          except Empty:
                              break
                          
                          index, url, filepath = item
                          print(f"  [🦊 Worker CF {worker_id}] Scaricamento: {url}", flush=True)
                          try:
                              page = browser.new_page()
                              # Blocco dei contenuti pesanti
                              page.route("**/*", lambda route: route.abort() if route.request.resource_type in ["image", "stylesheet", "font", "media"] else route.continue_())
                              
                              page.goto(url, wait_until="domcontentloaded", timeout=20000)
                              html_content = page.content()
                              
                              is_valid, reason = validate_content(html_content, url, is_html=True)
                              if not is_valid:
                                      raise Exception(f"Validazione fallita: {reason}")
                                      
                              markdown_content = md(html_content, heading_style="ATX")
                              with open(filepath, 'w', encoding='utf-8') as f:
                                  f.write(markdown_content)
                              print(f"[✅ CAMOUFOX SUCCESS {index}] {url} -> Estratto con successo!", flush=True)
                              page.close()
                          except Exception as e:
                              print(f"[❌ CAMOUFOX FAIL {index}] {url} fallito: {e}", flush=True)
                          finally:
                              jobs_queue.task_done()
              except Exception as e:
                  print(f"  [❌ CAMOUFOX Worker {worker_id}] Inizializzazione browser fallita: {e}", flush=True)

          if __name__ == '__main__':
              # DOWNLOAD LISTA PROXY
              print("==========================================", flush=True)
              print("🔄 Scaricamento liste proxy candidati...", flush=True)
              try:
                  proxy_req = requests.get("https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt", timeout=10)
                  raw_proxies = [p.strip() for p in proxy_req.text.split('\n') if p.strip()]
                  random.shuffle(raw_proxies)
                  print(f"✅ Recuperati {len(raw_proxies)} proxy candidati.", flush=True)
              except Exception as e:
                  print(f"⚠️ Errore recupero proxy: {e}", flush=True)
                  raw_proxies = []

              # AVVIO DELLO SCANNER (Trova 50 proxy pubblici veloci per la Fase 1)
              print("🚀 Scansione proxy pubblici per la Fase 1 (fino a 50 funzionanti)...", flush=True)
              with concurrent.futures.ThreadPoolExecutor(max_workers=200) as scanner_executor:
                  futures = {scanner_executor.submit(scan_worker, p): p for p in raw_proxies[:1500]}
                  concurrent.futures.wait(futures)

              working_proxies.sort(key=lambda x: x[1])
              sorted_proxy_addrs = [p[0] for p in working_proxies]
              
              if not sorted_proxy_addrs:
                  print("⚠️ Nessun proxy pubblico valido trovato. Fallback su connessione diretta per la Fase 1.", flush=True)

              # FASE 1: curl-cffi E Jina con i 50 proxy pubblici
              print("\n==========================================", flush=True)
              print(f"🚀 FASE 1: Estrazione con {len(sorted_proxy_addrs)} proxy pubblici...", flush=True)
              print("==========================================\n", flush=True)
              
              failed_phase1 = []
              with concurrent.futures.ThreadPoolExecutor(max_workers=min(50, total_urls)) as executor:
                  items = list(enumerate(URLS_TO_TEST, start=1))
                  future_to_url = {executor.submit(fetch_url_lightweight, item, sorted_proxy_addrs): item for item in items}
                  for future in concurrent.futures.as_completed(future_to_url):
                      success, message, failed_item = future.result()
                      print(message, flush=True)
                      if not success:
                          failed_phase1.append(failed_item)

              # FASE 2: Registrazione WARP (solo se vi sono URL falliti)
              if failed_phase1:
                  print("\n==========================================", flush=True)
                  print(f"🌀 FASE 2: Avvio registrazione di fino a 20 IP WARP locali usando l'intera lista dei proxy...", flush=True)
                  print("==========================================\n", flush=True)
                  
                  registration_queue = Queue()
                  for p in raw_proxies:
                      registration_queue.put(p)
                      
                  reg_threads = []
                  # Avvio di 20 thread paralleli per sveltire la configurazione concorrente di wireproxy
                  for i in range(20):
                      t = threading.Thread(target=register_warp_worker, args=(registration_queue,))
                      t.start()
                      reg_threads.append(t)
                  for t in reg_threads:
                      t.join()
                      
                  if not active_warp_proxies:
                      print("⚠️ Registrazione WARP fallita o non riuscita. Fallback sui proxy pubblici originali.", flush=True)
                      active_warp_proxies = sorted_proxy_addrs
                  else:
                      print(f"\n🎉 Totale tunnel WARP locali attivi: {len(active_warp_proxies)}", flush=True)

                  # FASE 2a: Ritesta gli URL falliti con curl-cffi usando i proxy WARP
                  print("\n==========================================", flush=True)
                  print(f"🚀 FASE 2a: Retest di {len(failed_phase1)} URL falliti tramite IP WARP con curl-cffi/Jina...", flush=True)
                  print("==========================================\n", flush=True)
                  
                  failed_phase2a = []
                  with concurrent.futures.ThreadPoolExecutor(max_workers=min(20, len(failed_phase1))) as executor:
                      future_to_url = {executor.submit(fetch_url_lightweight, (item[0], item[1]), active_warp_proxies): item for item in failed_phase1}
                      for future in concurrent.futures.as_completed(future_to_url):
                          success, message, failed_item = future.result()
                          print(message, flush=True)
                          if not success:
                              failed_phase2a.append(failed_item)

                  # FASE 2b: Avvio Camoufox con 20 browser paralleli su WARP per i rimanenti fallimenti
                  if failed_phase2a:
                      print("\n==========================================", flush=True)
                      print(f"🔥 FASE 2b: Avvio di {min(20, len(active_warp_proxies))} browser paralleli Camoufox per risolvere {len(failed_phase2a)} URL rimanenti...", flush=True)
                      print("==========================================\n", flush=True)
                      
                      jobs_queue = Queue()
                      for item in failed_phase2a:
                          jobs_queue.put(item)
                          
                      cf_threads = []
                      num_cf_workers = min(20, len(active_warp_proxies), len(failed_phase2a))
                      
                      for w_id in range(1, num_cf_workers + 1):
                          # Associa ciascun worker a un IP WARP distinto
                          proxy_for_worker = active_warp_proxies[(w_id - 1) % len(active_warp_proxies)]
                          t = threading.Thread(target=camoufox_worker_thread, args=(w_id, proxy_for_worker, jobs_queue))
                          t.start()
                          cf_threads.append(t)
                          
                      for t in cf_threads:
                          t.join()
                  else:
                      print("\n🎉 Tutti gli URL sono stati recuperati con successo nella Fase 2a via WARP + curl-cffi!", flush=True)
              else:
                  print("\n🎉 Tutti gli URL sono stati estratti con successo nella Fase 1 senza ricorrere a WARP!", flush=True)
                  
              # SPEGNIMENTO DEI PROCESSI WIREPROXY IN BACKGROUND
              if warp_processes:
                  print("\n🧹 Spegnimento dei processi WARP locali in background...", flush=True)
                  for proc in warp_processes:
                      try:
                          proc.terminate()
                          proc.wait(timeout=2)
                      except Exception:
                          pass
              print("👋 Fine elaborazione.", flush=True)
          EOF
          export PYTHONUNBUFFERED=1
          python extract.py

      # FASE 3: IMPACCHETTAMENTO E CARICAMENTO COME ARTEFATTO (ZIP)
      - name: Carica i file estratti come Artefatto ZIP
        uses: actions/upload-artifact@v4
        with:
          name: jina-markdown-outputs
          path: output/
          retention-days: 7
