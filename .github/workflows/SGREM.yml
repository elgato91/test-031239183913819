name: Test Gemma 26B via Google AI Studio

on:
  workflow_dispatch: # Consente di avviare il test manualmente da GitHub Actions

jobs:
  test-gemma:
    runs-on: ubuntu-latest
    steps:
      - name: Invia richiesta a Gemma 26B
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Errore: GEMINI_API_KEY non è configurata nei GitHub Secrets."
            exit 1
          fi

          curl -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemma-4-26b-a4b-it:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "contents": [
                {
                  "parts": [
                    {
                      "text": "Rispondi in una sola frase: perché il cielo è azzurro?"
                    }
                  ]
                }
              ]
            }'
