name: Test Gemma 26B con Google Search Grounding

on:
  workflow_dispatch:

jobs:
  test-gemma-search:
    runs-on: ubuntu-latest
    steps:
      - name: Richiesta a Gemma con Grounding Web
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Errore: GEMINI_API_KEY non è configurata."
            exit 1
          fi

          echo "Inizio della chiamata API con Google Search (può richiedere fino a 45 secondi)..."

          # Usiamo --max-time 60 per interrompere dopo un minuto in caso di blocco e salviamo su file
          curl -sS --connect-timeout 15 --max-time 60 \
            -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemma-4-26b-a4b-it:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{
              "contents": [
                {
                  "parts": [
                    {
                      "text": "Quali sono le ultime novità di oggi sul telescopio James Webb? Rispondi in massimo due frasi."
                    }
                  ]
                }
              ],
              "tools": [
                {
                  "google_search": {}
                }
              ]
            }' -o response.json

          # Controlliamo se il file è vuoto o non è stato creato
          if [ ! -s response.json ]; then
            echo "Errore: Il server di Google non ha risposto entro i limiti di tempo o la connessione è fallita."
            exit 1
          fi

          # Controlliamo se l'API ha restituito un errore formale di configurazione o di quota
          if jq -e '.error' response.json >/dev/null; then
            echo "Errore restituito dalle API di Google:"
            jq '.error' response.json
            exit 1
          fi

          echo "========================================="
          echo "RISPOSTA DEL MODELLO:"
          echo "========================================="
          # Estraiamo solo il testo finale generato dal modello
          jq -r '.candidates[0].content.parts[] | select(.thought != true) | .text' response.json
          
          echo -e "\n========================================="
          echo "FONTI UTILIZZATE (GROUNDING METADATA):"
          echo "========================================="
          # Estraiamo i dettagli della ricerca effettuata sul web
          jq '.candidates[0].groundingMetadata' response.json
