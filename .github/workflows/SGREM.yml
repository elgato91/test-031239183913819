name: Extract Markdown (Hide from Jina via Proxy Rotation)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze Python
        run: |
          python -m pip install --upgrade pip
          pip install requests pysocks

      - name: Estrai Markdown mascherando l'IP a Jina AI
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python - << 'EOF'
          import os
          import re
          import requests
          import random
          import time
          import concurrent.futures

          URLS_TO_TEST = [
              "https://catholicindex.org/mx/churches/mx-oaxaca-oaxaca-de-juarez-templo-de-santo-domingo-de-guzman-05ffe56e",
              "https://eltonodelacochinilla.com/visitanos",
              "https://klook.com/it/activity/150588-hierve-el-agua-mitla-mezcal-tour-in-mexico",
              "https://hola-oaxaca.com/que-hacer/tour/hierve-el-agua",
              "https://my.trip.com/travel-guide/attraction/oaxaca/templo-de-santo-domingo-de-guzmn-18697124",
              "https://mindtrip.ai/inspiration/how-take-shared-taxi-colectivo-oaxaca/in-HZoeSkoK",
              "https://oaxacae.com/2024/06/hierve-el-agua-oaxaca.html",
              "https://oaxacaautentico.com/es/blog/como-llegar-y-moverse-en-oaxaca-guia-transporte",
              "https://oaxaca.travel/index.php/es/markets-es/20-de-noviembre-market-en",
              "https://uncoveredhistory.com/mexico/monte-alban-the-encrypted-city",
              "https://edenviaggi.it/racconti/monte-alban-viaggio-nellantica-capitale-zapoteca-di-oaxaca-in-messico",
              "https://oaxaca.travel/index.php/en-us/markets-es/20-de-noviembre-market-en",
              "https://santacultura.mx/arte-popular/muestran-proceso-ancestral-de-tapetes-de-lana-en-teotitlan-del-valle",
              "https://hotelesdeoaxaca.com/atractivos-turisticos/mercado-20-de-noviembre.html",
              "https://oaxacaairporttaxi.com/es",
              "https://acchiappamappa.com/pozzo-di-san-patrizio-orvieto-guida",
              "https://alltrails.com/it-it/sentiero/italy/umbria/anello-della-rupe-di-orvieto",
              "https://alltrails.com/trail/italy/umbria/anello-della-rupe-di-orvieto",
              "https://comune.orvieto.tr.it/it/page/come-arrivare",
              "https://comune.orvieto.tr.it/it/page/orvieto-carta-unica",
              "https://comune.orvieto.tr.it/it/vivere/pozzo-di-san-patrizio",
              "https://comune.orvieto.tr.it/it/vivere/il-duomo-di-orvieto",
              "https://fsbusitalia.it/it/umbria/titoli-di-viaggio-tariffe-umbria/biglietti-tariffe-servizi-urbani-umbria/tariffe-orvieto.html",
              "https://fsbusitalia.it/it/turismo/programma-il-tuo-viaggio/orvieto-urbs-vetus-dell-umbria.html",
              "https://fsbusitalia.it/it/umbria/orari-linee-umbria/quibus-orvieto.html",
              "https://it.wikiloc.com/percorsi-escursionismo/orvieto-anello-della-rupe-e-i-sotterranei-246324949",
              "https://liveorvieto.com/blog/attrazioni_naturali/anello-della-rupe",
              "https://olodramma.com/it/cosa-vedere-in-umbria-in-un-weekend-itinerario-di-3-giorni-tra-orvieto-spello-assisi-e-gubbio",
              "https://neuralword.com/it/cucina/ristoranti-posti-dove-mangiare/mangiare-ad-orvieto-i-migliori-ristoranti",
              "https://roadmindtrip.com/cosa-vedere-a-orvieto-guida-per-un-weekend",
              "https://travelworld.it/visitare-orvieto-2-giorni-per-scoprire-la-perla-dellumbria",
              "https://viaggiadipiu.it/2020/03/09/visitare-orvieto-informazioni-e-consigli-utili",
              "https://flashpackingitaly.com/orvieto-card-review",
              "https://umbriatourism.it/en/w/crocefisso-del-tufo-necropolis-orvieto",
              "https://umbriatourism.it/it/w/duomo-di-santa-maria-assunta-in-cielo-it",
              "https://umbriatourism.it/it/w/necropoli-di-crocifisso-del-tufo-orvieto",
              "https://wikiloc.com/hiking-trails/gita-fuori-porta-due-viandanti-ad-orvieto-con-annesso-lanello-della-rupe-166636709"
          ]

          os.makedirs('output', exist_ok=True)
          total_urls = len(URLS_TO_TEST)

          print("==========================================", flush=True)
          print("🔄 Scaricamento lista di Proxy SOCKS5 gratuiti...", flush=True)
          try:
              # Scarichiamo una lista fresca di proxy SOCKS5 da una nota repository di GitHub
              proxy_req = requests.get("https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt", timeout=10)
              PROXY_LIST = [p.strip() for p in proxy_req.text.split('\n') if p.strip()]
              print(f"✅ Trovati {len(PROXY_LIST)} proxy disponibili per nascondersi da Jina!", flush=True)
          except Exception as e:
              print(f"⚠️ Errore nel download dei proxy: {e}. Lista vuota.", flush=True)
              PROXY_LIST = []
          print("==========================================\n", flush=True)

          def fetch_url(item):
              index, url = item
              clean_name = re.sub(r'^https?://', '', url)
              safe_filename = re.sub(r'[^a-zA-Z0-9]', '_', clean_name)[:150]
              filepath = os.path.join('output', f"{safe_filename}.md")
              jina_url = f"https://r.jina.ai/{url}"
              
              max_retries = 5
              
              for attempt in range(1, max_retries + 1):
                  # Pesca un proxy casuale dalla lista
                  proxy_addr = random.choice(PROXY_LIST) if PROXY_LIST else None
                  
                  if proxy_addr:
                      # Usa socks5h in modo da risolvere i DNS (nomi a dominio) direttamente dal server Proxy
                      proxies = {
                          'http': f'socks5h://{proxy_addr}',
                          'https': f'socks5h://{proxy_addr}'
                      }
                  else:
                      proxies = None

                  # Cambiamo lo User-Agent a caso per sembrare browser diversi
                  headers = {
                      'User-Agent': f'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/{random.randint(110, 122)}.0.0.0 Safari/537.36'
                  }
                  
                  print(f"[⌛ Avvio {index}/{total_urls}] (Tentativo {attempt}/{max_retries} via Proxy: {proxy_addr}) -> {url}", flush=True)
                  
                  try:
                      # Usiamo un timeout basso (15 secondi). Se il proxy gratuito è morto/lento, fallisce in fretta e riprova
                      response = requests.get(jina_url, headers=headers, proxies=proxies, timeout=15)
                      
                      # Se Jina ci da un 403 o 429, solleva l'eccezione in modo da forzare il tentativo con un nuovo proxy
                      response.raise_for_status()
                      
                      with open(filepath, 'w', encoding='utf-8') as f:
                          f.write(response.text)
                          
                      return f"[✅ FATTO {index}/{total_urls}] Jina ha accettato la connessione. Salvato: {filepath}"
                      
                  except Exception as e:
                      # Errore (Proxy morto o IP bannato da Jina)
                      if attempt == max_retries:
                          return f"[❌ ERRORE {index}/{total_urls}] {url} Fallito definitivamente. Ultimo errore: {e}"
                      
                      # Pausa brevissima prima di ripescare un nuovo proxy
                      time.sleep(1)

          # Impostiamo 5 thread paralleli. Ognuno userà il proprio proxy ruotante.
          with concurrent.futures.ThreadPoolExecutor(max_workers=5) as executor:
              items = list(enumerate(URLS_TO_TEST, start=1))
              future_to_url = {executor.submit(fetch_url, item): item for item in items}
              
              for future in concurrent.futures.as_completed(future_to_url):
                  print(future.result() + "\n", flush=True)

          EOF

      - name: Esegui commit e push dei risultati
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || (git commit -m "📝 Auto-extract markdown via Jina AI (Proxy Rotation)" && git push)
