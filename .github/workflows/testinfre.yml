name: Test Middleware - Filtro URL con Gemini 3.1 Live API

on: 
  workflow_dispatch:

jobs:
  test_gemini_live_screener:
    runs-on: ubuntu-latest
    steps:

      - name: Setup Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installazione Dipendenze Essenziali
        run: |
          pip install google-genai requests

      - name: Scrivi Script Filtro URL con Gemini 3.1 Live
        shell: bash
        run: |
          cat << 'EOF' > url_screener.py
          import os
          import json
          import re
          import asyncio
          from urllib.parse import urlparse, urlunparse
          from google import genai
          from google.genai import types

          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              print("Errore: GEMINI_API_KEY non trovata nelle variabili d'ambiente.")
              exit(1)

          client = genai.Client(api_key=api_key)

          # Configurazione Live ORIGINALE e funzionante
          config_live = {
              "response_modalities": ["AUDIO"],
              "output_audio_transcription": {}
          }

          semaphore = asyncio.Semaphore(20)

          # LISTA SPORCA DI ESEMPIO
          raw_urls = [
              "https://atlanta.eater.com/maps/best-thai-restaurants-atlanta",
              "https://beborghi.com/cosa-vedere-a-vancouver/",
              "https://www.idealista.it/en/vendita-case/orvieto-terni/",
              "https://lesperta.com/pasta-come-back-carbs/",
              "https://www.politesi.polimi.it/retrieve/tesi_01.pdf",
              "https://viaggi.corriere.it/europa/italia/cards/orvieto/?img=11",
              "https://viaggi.corriere.it/europa/italia/cards/orvieto/?img=8",
              "https://mindtrip.ai/attraction/orvieto-umbria/orvieto-underground/at-UjqomX9H",
              "https://www.orvietoviva.com/en/pozzo-di-san-patrizio/",
              "https://www.orvietoviva.com/en/orvieto-underground/",
              "https://it.wikipedia.org/wiki/Duomo_di_Orvieto",
              "http://www.duomodiorvieto.it/duomo-di-orvieto/la-facciata",
              "https://www.thefork.com/restaurants/orvieto-c361958/pizza-t652"
          ] * 10 # Moltiplichiamo per testare i chunk e la concorrenza

          def pulizia_sintattica(url_list):
              """Fase 1: Pulisce parametri, deduplica e separa PDF/Wiki"""
              clean_urls = set()
              special_urls = {"pdf": [], "wikipedia": []}

              for url in url_list:
                  parsed = urlparse(url)
                  if parsed.path.lower().endswith('.pdf'):
                      special_urls["pdf"].append(url)
                      continue
                  if "wikipedia.org" in parsed.netloc:
                      special_urls["wikipedia"].append(url)
                      continue
                  
                  # Rimuove Query String per deduplicazione aggressiva
                  clean_url = urlunparse((parsed.scheme, parsed.netloc, parsed.path, '', '', ''))
                  clean_urls.add(clean_url)

              return list(clean_urls), special_urls

          async def analizza_chunk_live(chunk_idx, chunk, prompt):
              """Sotto-funzione asincrona per elaborare un chunk di URL tramite WebSocket"""
              async with semaphore:
                  print(f"   [Chunk {chunk_idx}] Connessione WebSocket attiva. Invio {len(chunk)} URL...", flush=True)
                  accumulated_text = ""
                  payload = f"ISTRUZIONI:\n{prompt}\n\nURL CHUNK DA ANALIZZARE:\n{json.dumps(chunk)}"
                  
                  try:
                      async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config_live) as session:
                          await session.send_realtime_input(text=payload)
                          
                          async for response in session.receive():
                              # Estrazione originale basata sulla trascrizione audio generata
                              if response.server_content and response.server_content.output_transcription:
                                  if response.server_content.output_transcription.text:
                                      accumulated_text += response.server_content.output_transcription.text
                                      
                              if response.server_content and response.server_content.turn_complete:
                                  break
                                  
                      print(f"   [Chunk {chunk_idx}] Analisi completata.", flush=True)
                      return accumulated_text.strip()
                  except Exception as e:
                      print(f"   [Chunk {chunk_idx}] Errore chiamata Live API: {e}", flush=True)
                      return None

          async def main():
              print("\n=== AVVIO PIPELINE CONCORRENTE MIDDLEWARE URL ===", flush=True)
              print(f"URL Grezzi Iniziali: {len(raw_urls)}")

              url_puliti, url_speciali = pulizia_sintattica(raw_urls)
              print(f"Dopo Pulizia Sintattica (Deduplicazione): {len(url_puliti)} URL unici da valutare.")
              print(f"URL Wiki deviati: {len(url_speciali['wikipedia'])} | PDF deviati: {len(url_speciali['pdf'])}")

              prompt_filtraggio = """
              Sei un router semantico per un sistema di guide turistiche. Stiamo elaborando URL per: Orvieto (Italia).
              Analizza gli slug dei seguenti URL e SCARTA quelli che rientrano in queste categorie:
              1. Fuori luogo geografico (es. atlanta, vancouver, o altre città palesemente errate).
              2. Real Estate / Servizi non turistici (es. idealista, immobiliare, idraulici).
              3. E-commerce di prodotti (es. pomodori, braccialetti, scarpe).
              4. App generatrici di itinerari AI (es. mindtrip.ai, roamaround).
              
              MANTIENI tutto il resto (blog, OTA come TheFork/Tripadvisor, musei, siti istituzionali).
              Restituisci ESCLUSIVAMENTE un array JSON contenente gli URL validi. Usa il formato markdown ```json ... ```.
              """

              # Chunking da 50 URL
              chunk_size = 50
              chunks = [url_puliti[i:i + chunk_size] for i in range(0, len(url_puliti), chunk_size)]
              
              tasks = []
              for idx, chunk in enumerate(chunks):
                  tasks.append(analizza_chunk_live(idx + 1, chunk, prompt_filtraggio))
                  
              print(f"-> Lancio di {len(chunks)} analisi parallele istantanee sui chunk...", flush=True)
              risultati_raw = await asyncio.gather(*tasks)

              url_approvati = []
              for idx, ris in enumerate(risultati_raw):
                  if ris:
                      try:
                          # Estrazione del JSON usando la tua regex
                          match = re.search(r'```json\s*(.*?)\s*```', ris, re.DOTALL)
                          json_str = match.group(1) if match else ris
                          chunk_approvati = json.loads(json_str)
                          if isinstance(chunk_approvati, list):
                              url_approvati.extend(chunk_approvati)
                      except Exception as e:
                          print(f"   [Chunk {idx+1}] Errore parsing JSON. Output grezzo: {ris[:50]}...", flush=True)

              print(f"\n=== RISULTATO FINALE ===")
              print(f"URL Approvati per lo Scraper: {len(url_approvati)}")

              output_finale = {
                  "stats": {
                      "totale_grezzi": len(raw_urls),
                      "totale_wiki_api": len(url_speciali['wikipedia']),
                      "totale_pdf_parser": len(url_speciali['pdf']),
                      "totale_approvati_scraper": len(url_approvati)
                  },
                  "urls_per_scraper": url_approvati,
                  "urls_per_wiki_api": url_speciali['wikipedia'],
                  "urls_per_pdf_parser": url_speciali['pdf']
              }

              output_path = "urls_filtrati.json"
              with open(output_path, "w", encoding="utf-8") as f:
                  json.dump(output_finale, f, indent=4, ensure_ascii=False)
              print(f"Analisi globale completata e salvata in {output_path}.", flush=True)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF
          
          python url_screener.py

      - name: Esporta URL Filtrati (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: URL_Pronti_Per_Scraper
          path: urls_filtrati.json
