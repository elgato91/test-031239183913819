name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS PER CLOAKBROWSER
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Installazione e Inizializzazione Tor (Bypass Rate-Limit)
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          sudo systemctl start tor

      - name: Setup 6 WARProxy Docker Containers (WARP+ Premium via Tor Chaining)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            
            echo "=================================================="
            echo "Rigenerazione circuito Tor per cambiare IP di registrazione..."
            sudo systemctl restart tor
            
            # Attesa dinamica finché Tor non ha stabilito il circuito con il nuovo IP
            TOR_READY=false
            for attempt in {1..15}; do
              if TOR_IP=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:9050 https://api6.ipify.org 2>/dev/null); then
                echo "Tor pronto! IP di registrazione per nodo $i: $TOR_IP"
                TOR_READY=true
                break
              fi
              sleep 1
            done

            if [ "$TOR_READY" = "false" ]; then
              echo "Tor non è riuscito a connettersi in tempo. Provo comunque l'avvio..."
            fi

            echo "Avvio container warproxy-$i sulla porta $PORT..."
            # Passiamo Tor come proxy di registrazione (HTTP_PROXY/HTTPS_PROXY)
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e WARP_PLUS=true \
              -e HTTPS_PROXY="socks5://127.0.0.1:9050" \
              -e HTTP_PROXY="socks5://127.0.0.1:9050" \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest

            DELAY=$((4 + RANDOM % 3))
            echo "Attesa di sicurezza di $DELAY secondi..."
            sleep $DELAY
          done

          echo "Attesa finale inizializzazione dei tunnel..."
          sleep 12

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          for i in {1..6}; do
            PORT=$((40000 + i))
            DELAY=$((3 + RANDOM % 3))
            sleep $DELAY

            SUCCESS=false
            for tentativo in {1..5}; do
              echo "Verifica container $i (tentativo $tentativo/5)..."
              
              # L'uso dell'if impedisce l'uscita immediata di GitHub Actions su fallimento curl
              if IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT "https://api6.ipify.org?format=json" 2>/dev/null); then
                if [ ! -z "$IP" ]; then
                  echo "Container $i pronto! IP: $IP"
                  SUCCESS=true
                  break
                fi
              fi
              
              echo "Socks5 non ancora pronto. Riavvio container $i e attesa di 8 secondi..."
              docker restart warproxy-$i
              sleep 8
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "ERRORE CRITICO: Il container $i non si è inizializzato correttamente dopo 5 tentativi."
              exit 1
            fi
          done

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Creazione script Python (Macchina 2)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import math
          import os
          from cloakbrowser import launch_context
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          TARGETS = [
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          num_nodes = 6
          slice_size = math.ceil(len(TARGETS) / num_nodes)
          MY_TARGETS = TARGETS[(node_id-1)*slice_size : node_id*slice_size]

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          def get_safe_content(page, retries=3):
              for attempt in range(retries):
                  try:
                      return page.content()
                  except Exception as e:
                      if "navigating" in str(e).lower() or "execution context" in str(e).lower():
                          time.sleep(3)
                      else:
                          break
              return ""

          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")

          # SUPREME: Disattivazione Blink Automation + Forzatura DNS Over HTTPS Criptato su Cloudflare
          extra_args = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              "--disable-blink-features=AutomationControlled",
              "--enable-features=DnsOverHttps",
              "--dns-over-https-templates=https://chrome.cloudflare-dns.com/dns-query",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          context = launch_context(
              headless=False,
              humanize=True,
              proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
              geoip=True,
              viewport=None, 
              args=extra_args
          )

          results = f"\n{'#'*60}\nREPORT NODO {node_id} (PORTA {ACTIVE_PORT})\n{'#'*60}\n"

          for idx, url in enumerate(MY_TARGETS):
              # PAUSA CASUALE TRA UN TARGET E L'ALTRO (Da 4 a 8 secondi) - Esclude la prima iterazione
              if idx > 0:
                  pause_time = random.uniform(4.0, 8.0)
                  print(f"[NODO {node_id}] Pausa tra i target di {pause_time:.2f} secondi...", flush=True)
                  time.sleep(pause_time)

              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"[NODO {node_id}] -> Navigo su: {url}", flush=True)
              page = None
              
              try:
                  page = context.new_page()
                  query_to_search = get_query_from_url(url)

                  if "startpage.com" in url:
                      page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                      time.sleep(3)
                      try:
                          page.locator("input#q").type(query_to_search, delay=random.randint(50, 150), timeout=3000)
                          page.keyboard.press("Enter")
                      except Exception:
                          page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                  elif "html.duckduckgo.com" in url:
                      page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                      time.sleep(3)
                      try:
                          page.locator("input[name=q]").type(query_to_search, delay=random.randint(50, 150), timeout=3000)
                          page.keyboard.press("Enter")
                      except Exception:
                          page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                  else:
                      page.goto(url, wait_until="domcontentloaded", timeout=40000)
                  
                  # SILENZIO ASSOLUTO CDP RANDOM (da 11 a 16 secondi)
                  site_wait = random.uniform(11.0, 16.0)
                  print(f"[NODO {node_id}] Silenzio CDP attivo per {site_wait:.2f} secondi...", flush=True)
                  time.sleep(site_wait)

                  if "pixelscan.net" in url:
                      try:
                          btn = page.locator("text=Scan My Browser Now").first
                          if btn.is_visible(timeout=3000):
                              btn.click() 
                              time.sleep(random.uniform(6.0, 9.0))
                      except Exception:
                          pass
                      
                  if "creepjs" in url:
                      time.sleep(random.uniform(5.0, 7.0)) 

                  raw_html = get_safe_content(page)
                  results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"

              except Exception as e:
                  print(f"[NODO {node_id}] Errore su {url}: {e}", flush=True)
                  results += f"ERRORE GLOBALE: {str(e)}\n"
              finally:
                  if page:
                      try:
                          page.close()
                      except Exception:
                          pass

          context.close()

          with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Parallelo (6 Nodi con Jitter Casuale)
        run: |
          echo "Avvio processi paralleli con Jitter temporale..."
          
          python -u m2_insocket.py 1 > node1.log 2>&1 &
          sleep $(python3 -c "import random; print(round(random.uniform(1.5, 4.0), 2))")
          
          python -u m2_insocket.py 2 > node2.log 2>&1 &
          sleep $(python3 -c "import random; print(round(random.uniform(1.5, 4.0), 2))")
          
          python -u m2_insocket.py 3 > node3.log 2>&1 &
          sleep $(python3 -c "import random; print(round(random.uniform(1.5, 4.0), 2))")
          
          python -u m2_insocket.py 4 > node4.log 2>&1 &
          sleep $(python3 -c "import random; print(round(random.uniform(1.5, 4.0), 2))")
          
          python -u m2_insocket.py 5 > node5.log 2>&1 &
          sleep $(python3 -c "import random; print(round(random.uniform(1.5, 4.0), 2))")
          
          python -u m2_insocket.py 6 > node6.log 2>&1 &

          wait

          touch output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt
          cat output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
