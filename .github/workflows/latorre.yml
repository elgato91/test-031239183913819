name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema (Essenziale per CloakBrowser)
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 6 WARProxy Docker Containers
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest

            if [ $i -lt 6 ]; then
              sleep $((5 + RANDOM % 4))
            fi
          done

          echo "Attesa finale inizializzazione dei tunnel..."
          sleep 10

      - name: Verifica Connessioni Proxy
        run: |
          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Verifica connessione su porta $PORT..."
            SUCCESS=false
            for tentativo in {1..5}; do
              IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api.ipify.org || true)
              if [ ! -z "$IP" ]; then
                echo "Container $i pronto! IP: $IP"
                SUCCESS=true
                break
              else
                echo "Container $i non risponde. Riavvio in corso..."
                docker restart warproxy-$i
                sleep 8
              fi
            done
            if [ "$SUCCESS" = "false" ]; then
              echo "ERRORE CRITICO: Il container $i non è raggiungibile."
              exit 1
            fi
          done

      - name: Avvio Xvfb (Virtual Display Headful 1920x1080)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Creazione script Python (Playwright Puro + Binario CloakBrowser)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import math
          import os
          import requests
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          # USIAMO L'API STANDARD DI PLAYWRIGHT, NON IL WRAPPER DI CLOAKBROWSER!
          from playwright.sync_api import sync_playwright
          from cloakbrowser.download import ensure_binary

          TARGETS = [
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          num_nodes = 6
          slice_size = math.ceil(len(TARGETS) / num_nodes)
          MY_TARGETS = TARGETS[(node_id-1)*slice_size : node_id*slice_size]

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except:
                  pass
              return default

          # 1. OTTIENI IL PATH AL BROWSER C++ STEALTH
          binary_path = ensure_binary()

          # 2. RISOLVI IP PER WEBRTC (Maschera il leak di WARP)
          proxy_str = f"socks5h://127.0.0.1:{ACTIVE_PORT}"
          my_ip = ""
          try:
              # Tenta prima IPv6, se WARP lo passa
              my_ip = requests.get("https://api6.ipify.org", proxies={"http": proxy_str, "https": proxy_str}, timeout=5).text.strip()
          except:
              try:
                  my_ip = requests.get("https://api.ipify.org", proxies={"http": proxy_str, "https": proxy_str}, timeout=5).text.strip()
              except:
                  my_ip = "127.0.0.1"

          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")

          extra_args = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}",
              "--fingerprint-platform=windows",
              "--fingerprint-screen-width=1920",
              "--fingerprint-screen-height=1080",
              "--fingerprint-noise=false" # Rimuove l'alterazione matematica del Canvas (vitale)
          ]

          # Imposta l'IP risolto per WebRTC
          if my_ip != "127.0.0.1":
              extra_args.append(f"--fingerprint-webrtc-ip={my_ip}")

          results = f"\n{'#'*60}\nREPORT NODO {node_id} (PORTA {ACTIVE_PORT})\n{'#'*60}\n"

          # 3. AVVIA PLAYWRIGHT STANDARD SENZA INIEZIONI JS
          with sync_playwright() as p:
              print(f"[NODO {node_id}] Avvio Playwright su {binary_path}", flush=True)
              browser = p.chromium.launch(
                  executable_path=binary_path,
                  headless=False,
                  proxy={"server": proxy_str},
                  args=extra_args
              )

              # Contesto blindato 1920x1080
              context = browser.new_context(
                  viewport={"width": 1920, "height": 1080},
                  locale="en-US",
                  timezone_id="America/New_York"
              )

              for url in MY_TARGETS:
                  results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
                  print(f"[NODO {node_id}] -> {url}", flush=True)
                  page = None
                  
                  try:
                      page = context.new_page()
                      query_to_search = get_query_from_url(url)

                      if "startpage.com" in url:
                          page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                          time.sleep(2)
                          try:
                              page.locator("input#q").fill(query_to_search)
                              page.keyboard.press("Enter")
                          except:
                              page.goto(url, wait_until="domcontentloaded", timeout=35000)
                              
                      elif "html.duckduckgo.com" in url:
                          page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                          time.sleep(2)
                          try:
                              page.locator("input[name=q]").fill(query_to_search)
                              page.keyboard.press("Enter")
                          except:
                              page.goto(url, wait_until="domcontentloaded", timeout=35000)
                              
                      else:
                          page.goto(url, wait_until="domcontentloaded", timeout=40000)
                      
                      print(f"[NODO {node_id}] In attesa di risoluzione passiva...", flush=True)
                      time.sleep(12)

                      if "pixelscan.net" in url:
                          try:
                              btn = page.locator("text=Scan My Browser Now").first
                              if btn.is_visible(timeout=3000):
                                  btn.click() 
                                  time.sleep(8)
                          except:
                              pass
                          
                      if "creepjs" in url:
                          time.sleep(6) 

                      raw_html = ""
                      for attempt in range(3):
                          try:
                              raw_html = page.content()
                              break
                          except:
                              time.sleep(2)

                      results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"

                  except Exception as e:
                      print(f"[NODO {node_id}] Errore: {e}", flush=True)
                      results += f"ERRORE GLOBALE: {str(e)}\n"
                  finally:
                      if page:
                          try:
                              page.close()
                          except:
                              pass

              context.close()
              browser.close()

          with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Parallelo (6 Nodi)
        run: |
          echo "Avvio processi paralleli su 6 nodi..."
          python -u m2_insocket.py 1 > node1.log 2>&1 &
          sleep 2
          python -u m2_insocket.py 2 > node2.log 2>&1 &
          sleep 2
          python -u m2_insocket.py 3 > node3.log 2>&1 &
          sleep 2
          python -u m2_insocket.py 4 > node4.log 2>&1 &
          sleep 2
          python -u m2_insocket.py 5 > node5.log 2>&1 &
          sleep 2
          python -u m2_insocket.py 6 > node6.log 2>&1 &

          wait

          echo "=== LOG NODO 1 ===" && cat node1.log || true
          echo "=== LOG NODO 2 ===" && cat node2.log || true
          echo "=== LOG NODO 3 ===" && cat node3.log || true
          echo "=== LOG NODO 4 ===" && cat node4.log || true
          echo "=== LOG NODO 5 ===" && cat node5.log || true
          echo "=== LOG NODO 6 ===" && cat node6.log || true
          echo "=================="

          cat output_node_*.txt > output_macchina2_cdp.txt 2>/dev/null || true

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
