name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS PER CLOAKBROWSER
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 6 WARProxy Docker Containers (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest

            if [ $i -lt 6 ]; then
              DELAY=$((3 + RANDOM % 2))
              echo "Attesa scaglionata di $DELAY secondi per il prossimo container..."
              sleep $DELAY
            fi
          done

          echo "Attesa finale inizializzazione dei tunnel..."
          sleep 10

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "=================================================="
            echo "VERIFICA E AUTO-HEALING CONTAINER $i (PORTA $PORT):"
            
            DELAY=$((3 + RANDOM % 2))
            sleep $DELAY

            SUCCESS=false
            for tentativo in {1..5}; do
              echo "Tentativo $tentativo/5 per container $i..."
              IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json)
              
              if [ $? -eq 0 ] && [ ! -z "$IP" ]; then
                echo "Container $i pronto! IP: $IP"
                SUCCESS=true
                break
              else
                echo "Container $i non risponde. Riavvio in corso..."
                docker restart warproxy-$i
                sleep 5
              fi
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "ERRORE CRITICO: Il container $i non è raggiungibile."
              exit 1
            fi
          done
          echo "=================================================="

      - name: Ripristino Cache Profili CloakBrowser
        uses: actions/cache/restore@v4
        with:
          path: ~/.cloak_profiles
          key: cloak-profiles-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            cloak-profiles-${{ runner.os }}-
            cloak-profiles-

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Creazione script Python (Corretto get_query_from_url)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import math
          import os
          import shutil
          from cloakbrowser import launch_persistent_context
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          TARGETS = [
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          WARMUP_QUERIES = [
              "weather tomorrow", "world news today", "how to cook pasta", 
              "best movies 2026", "wikipedia space exploration", "historical events today"
          ]

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          num_nodes = 6
          slice_size = math.ceil(len(TARGETS) / num_nodes)
          MY_TARGETS = TARGETS[(node_id-1)*slice_size : node_id*slice_size]

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def get_query_from_url(url, default="migliore carbonara roma"):
              """Estrae i parametri di query per simulare la ricerca reale."""
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          def is_search_engine(url):
              """Verifica se l'URL appartiene a un motore di ricerca."""
              return any(x in url for x in ["google.com", "bing.com", "duckduckgo.com", "startpage.com", "yahoo.com"])

          def parse_search_links(html_content, url):
              """Estrae e pulisce i primi 40 link organici in base al motore di ricerca specifico."""
              soup = BeautifulSoup(html_content, 'html.parser')
              links = []
              parsed_url = urlparse(url)
              domain = parsed_url.netloc

              if "google" in domain:
                  for g in soup.select('div.g, .yuRUbf, .MjjYbeb'):
                      for a in g.select('a[href]'):
                          href = a['href']
                          if href.startswith('http') and not any(x in href for x in ['google.', 'gstatic.', 'youtube.com', 'webcache']):
                              links.append(href)
                  if not links:
                      for a in soup.select('a[href]'):
                          href = a['href']
                          if '/url?q=' in href:
                              qs = parse_qs(urlparse(href).query).get('q')
                              if qs:
                                  href = qs[0]
                          if href.startswith('http') and not any(x in href for x in ['google.', 'gstatic.', 'youtube.com', 'support.google']):
                              links.append(href)

              elif "bing" in domain:
                  for algo in soup.select('li.b_algo, .b_algo, .b_title'):
                      for a in algo.select('a[href]'):
                          href = a['href']
                          if href.startswith('http') and not any(x in href for x in ['bing.com', 'microsoft.com', 'msn.com', 'live.com']):
                              links.append(href)

              elif "startpage" in domain:
                  for result in soup.select('.w-gl__result, .result, .result-link'):
                      for a in result.select('a[href]'):
                          href = a['href']
                          if href.startswith('http') and not any(x in href for x in ['startpage.com', 'ixquick.com']):
                              links.append(href)

              elif "yahoo" in domain:
                  for title in soup.select('h3.title, .compTitle, .compText'):
                      for a in title.select('a[href]'):
                          href = a['href']
                          if href.startswith('http') and not any(x in href for x in ['yahoo.com', 'yahoo.it', 'yimg.com', 'search.yahoo']):
                              links.append(href)

              elif "duckduckgo" in domain:
                  for res in soup.select('.result__title, .result__url, .result__body'):
                      for a in res.select('a[href]'):
                          href = a['href']
                          if href.startswith('http') and not any(x in href for x in ['duckduckgo.com', 'ddg.gg']):
                              links.append(href)

              if not links:
                  for a in soup.select('a[href]'):
                      href = a['href']
                      if href.startswith('http') and not any(x in href for x in ['google', 'bing.com', 'yahoo.com', 'duckduckgo', 'startpage', 'microsoft', 'yimg', 'gstatic', 'facebook.com', 'twitter.com', 'instagram.com']):
                          links.append(href)

              seen = set()
              unique_links = []
              for l in links:
                  if l not in seen:
                      seen.add(l)
                      unique_links.append(l)

              return unique_links[:40]

          def human_scroll_to_bottom(page, scrolls=3):
              """Esegue uno scorrimento fluido simulando un utente reale per caricare gli elementi lazy-load."""
              print("[Scorrimento] Avvio scorrimento fluido della pagina...", flush=True)
              for _ in range(scrolls):
                  scroll_amount = random.randint(450, 750)
                  page.evaluate(f"window.scrollBy(0, {scroll_amount})")
                  time.sleep(random.uniform(1.8, 3.2))

          def run_warmup_phase_http1(profile_dir, active_port, extra_args_base, node_id):
              """Riscaldamento del profilo in HTTP/1.1 limitato a Reddit (HTTP/1.1) e Wikipedia (Neutro). Google rimosso."""
              print(f"[NODO {node_id}] [Warmup HTTP/1.1] Avvio...", flush=True)
              warmup_args = extra_args_base + ["--disable-http2"]
              
              try:
                  context = launch_persistent_context(
                      profile_dir,
                      headless=False,
                      humanize=True,
                      human_config={
                          "typing_delay": 120,
                          "mistype_chance": 0.03,
                          "idle_between_actions": True
                      },
                      proxy=f"socks5://127.0.0.1:{active_port}",
                      geoip=True,
                      viewport={"width": 1920, "height": 1080},
                      args=warmup_args
                  )
                  
                  page = context.new_page()
                  
                  # 1. Reddit Home in HTTP/1.1
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Visita Reddit...", flush=True)
                  try:
                      page.goto("https://www.reddit.com", wait_until="domcontentloaded", timeout=35000)
                      time.sleep(random.uniform(6, 10))
                  except Exception as e:
                      print(f"[NODO {node_id}] [Warmup HTTP/1.1] Errore Reddit: {e}", flush=True)
                      
                  # 2. Wikipedia (Riscaldamento Neutro ad alta reputazione, no tracciamenti Google)
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Visita Wikipedia...", flush=True)
                  try:
                      page.goto("https://en.wikipedia.org/wiki/Special:Random", wait_until="domcontentloaded", timeout=30000)
                      time.sleep(random.uniform(5, 8))
                  except Exception as e:
                      print(f"[NODO {node_id}] [Warmup HTTP/1.1] Errore Wikipedia: {e}", flush=True)

                  page.close()
                  context.close()
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Profilo riscaldato salvato.", flush=True)
              except Exception as e:
                  print(f"[NODO {node_id}] Errore warmup: {e}", flush=True)

          # --- INIZIO SCRIPT NORMALE ---
          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}")

          extra_args_base = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          # Fase 1: Esecuzione del riscaldamento in HTTP/1.1
          run_warmup_phase_http1(profile_dir, ACTIVE_PORT, extra_args_base, node_id)

          time.sleep(3)

          # Fase 2: Avvio dello Scraping principale in HTTP/2
          print(f"[NODO {node_id}] [Scraping HTTP/2] Connessione...", flush=True)
          context = launch_persistent_context(
              profile_dir,
              headless=False,
              humanize=True,
              human_config={
                  "typing_delay": 100,
                  "mistype_chance": 0.03,
                  "idle_between_actions": True
              },
              proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
              geoip=True,
              viewport={"width": 1920, "height": 1080},
              args=extra_args_base
          )

          results = f"\n{'#'*60}\nREPORT NODO {node_id} (PORTA {ACTIVE_PORT})\n{'#'*60}\n"
          flagged_as_bot = False

          for url in MY_TARGETS:
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"[NODO {node_id}] -> {url}", flush=True)
              page = None
              
              try:
                  page = context.new_page()
                  query_to_search = get_query_from_url(url)

                  if "startpage.com" in url:
                      page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                      time.sleep(3)
                      try:
                          page.type("input#q", query_to_search)
                          page.keyboard.press("Enter")
                      except Exception:
                          page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                  elif "html.duckduckgo.com" in url:
                      page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                      time.sleep(3)
                      try:
                          page.type("input[name=q]", query_to_search)
                          page.keyboard.press("Enter")
                      except Exception:
                          page.goto(url, wait_until="domcontentloaded", timeout=35000)
                          
                  else:
                      page.goto(url, wait_until="domcontentloaded", timeout=40000)
                  
                  # Scrolling fluido automatico per caricare gli elementi dinamici (lazy-loading)
                  human_scroll_to_bottom(page, scrolls=3)

                  # Attesa passiva randomica
                  passive_wait = random.randint(12, 22)
                  print(f"[NODO {node_id}] In attesa di assestamento per {passive_wait}s...", flush=True)
                  time.sleep(passive_wait)

                  if "pixelscan.net" in url:
                      try:
                          btn = page.locator("text=Scan My Browser Now").first
                          if btn.is_visible(timeout=3000):
                              btn.click() 
                              time.sleep(8)
                      except Exception:
                          pass
                      
                  if "creepjs" in url:
                      time.sleep(6) 

                  raw_html = get_safe_content(page)
                  
                  content_lower = raw_html.lower()
                  if any(indicator in content_lower for indicator in ["prove your humanity", "security verification", "malicious bots", "enable javascript and cookies to continue", "bot verification"]):
                      print(f"[NODO {node_id}] ATTENZIONE: Rilevato possibile blocco anti-bot su {url}. Marcatura del profilo per eliminazione.", flush=True)
                      flagged_as_bot = True

                  # ESTRAZIONE DIFFERENZIATA: Motori di ricerca vs Siti standard
                  if is_search_engine(url):
                      extracted_urls = parse_search_links(raw_html, url)
                      results += f"MOTORE DI RICERCA RILEVATO. URL ESTRATTI (Totale: {len(extracted_urls)}):\n"
                      for link_idx, link in enumerate(extracted_urls, 1):
                          results += f"[{link_idx}] {link}\n"
                  else:
                      results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"

              except Exception as e:
                  print(f"[NODO {node_id}] Errore: {e}", flush=True)
                  results += f"ERRORE GLOBALE: {str(e)}\n"
              finally:
                  if page:
                      try:
                          page.close()
                      except Exception:
                          pass
                  
                  visit_interval = random.uniform(4.0, 9.0)
                  print(f"[NODO {node_id}] Pausa di {visit_interval:.2f}s prima del prossimo target...", flush=True)
                  time.sleep(visit_interval)

          context.close()

          # SELF-HEALING DEL PROFILO: Se rilevato come bot, cancella la cartella locale
          if flagged_as_bot:
              print(f"[NODO {node_id}] [Self-Healing] Cancellazione del profilo compromesso '{profile_dir}'...", flush=True)
              try:
                  shutil.rmtree(profile_dir)
                  print(f"[NODO {node_id}] [Self-Healing] Profilo rimosso. Il prossimo avvio partirà pulito.", flush=True)
              except Exception as e:
                  print(f"[NODO {node_id}] Errore durante la pulizia del profilo: {e}", flush=True)

          with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Parallelo (6 Nodi con Staggered Delay)
        run: |
          echo "Avvio processi paralleli su 6 nodi con avvio scaglionato casuale..."
          
          for i in {1..6}; do
            echo "Inizializzazione del Nodo $i..."
            python -u m2_insocket.py $i > node$i.log 2>&1 &
            
            if [ $i -lt 6 ]; then
              # Delay casuale tra 5 e 15 secondi prima di far partire lo scraper successivo
              DELAY=$((5 + RANDOM % 11))
              echo "Nodo $i avviato. Attesa casuale di $DELAY secondi prima del prossimo nodo..."
              sleep $DELAY
            fi
          done

          echo "Tutti i nodi sono stati instanziati. Attesa del completamento dello scraping..."
          wait

          echo "=== LOG NODO 1 ===" && cat node1.log || true
          echo "=== LOG NODO 2 ===" && cat node2.log || true
          echo "=== LOG NODO 3 ===" && cat node3.log || true
          echo "=== LOG NODO 4 ===" && cat node4.log || true
          echo "=== LOG NODO 5 ===" && cat node5.log || true
          echo "=== LOG NODO 6 ===" && cat node6.log || true
          echo "=================="

          touch output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt
          cat output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt > output_macchina2_cdp.txt

      - name: Salvataggio Cache Profili CloakBrowser
        uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.cloak_profiles
          key: cloak-profiles-${{ runner.os }}-${{ github.run_id }}

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
