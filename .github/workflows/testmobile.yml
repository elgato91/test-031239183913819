name: Test RAG Challenge 2026

on:
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installazione Font di Sistema (Inclusi Font Microsoft)
        run: |
          sudo apt-get update
          # Accettazione automatica non interattiva dell'EULA Microsoft per i font core di Windows
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          fc-cache -f -v

      - name: Installazione Dipendenze
        run: |
          # Installiamo requests[socks] e curl_cffi come richiesto dalla logica di attesa attiva dei tuoi amici
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl_cffi
          playwright install-deps chromium

      - name: Setup Warproxy Docker Containers (Active & Idle in Network Host per IPv6)
        run: |
          # Pull dell'immagine ufficiale
          docker pull ghcr.io/kingcc/warproxy:latest

          # Container Attivo in network host su porta locale 40001 (conserva l'IPv6 nativo del runner)
          docker run --name warproxy-active \
            --network host \
            -e TZ=Europe/Rome \
            -e SOCKS5_PORT=40001 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          # Container Idle/Inattivo (lasciato completamente vuoto) su porta locale 40002
          docker run --name warproxy-idle \
            --network host \
            -e TZ=Europe/Rome \
            -e SOCKS5_PORT=40002 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          # Attesa tecnica per consentire la negoziazione di WireGuard nei container
          echo "In attesa dell'avvio dei proxy..."
          sleep 12
          docker ps -a

      - name: Avvio Xvfb (Virtual Display Stabile)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Creazione script Python (Macchina 2)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import asyncio
          import threading
          import random
          import requests
          from curl_cffi import requests as curl_requests
          from cloakbrowser import launch_context
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          TARGETS = [
              "https://api64.ipify.org?format=json",
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.eater.com/rome",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://guide.michelin.com/en/it/lazio/roma/restaurants",
              "https://www.cntraveler.com/gallery/best-restaurants-in-rome",
              "https://www.facebook.com/groups/1373361046396315/posts/2860154274383644/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://newromantimes.substack.com/p/a-very-subjective-list-of-the-best",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]
          results = ""

          def run_async_in_thread(coro):
              result, exception = [None], [None]
              def worker():
                  try:
                      loop = asyncio.new_event_loop()
                      asyncio.set_event_loop(loop)
                      result[0] = loop.run_until_complete(coro)
                      loop.close()
                  except Exception as e:
                      exception[0] = e
              t = threading.Thread(target=worker)
              t.start()
              t.join()
              if exception[0]:
                  raise exception[0]
              return result[0]

          def wait_for_proxy(port, timeout=45):
              start_time = time.time()
              proxies = {"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}
              while time.time() - start_time < timeout:
                  try:
                      r = curl_requests.get("https://ipv6.icanhazip.com", proxies=proxies, timeout=3)
                      if r.status_code == 200 and ":" in r.text:
                          return True, "IPv6", r.text.strip()
                  except Exception:
                      pass
                  try:
                      r = curl_requests.get("https://www.cloudflare.com/cdn-cgi/trace", proxies=proxies, timeout=3)
                      if r.status_code == 200 and "warp=" in r.text:
                          ip_line = [line for line in r.text.split('\n') if line.startswith('ip=')]
                          if ip_line:
                              ip = ip_line[0].split('=')[1]
                              ip_type = "IPv6" if ":" in ip else "IPv4"
                              return True, ip_type, ip
                  except Exception:
                      pass
                  time.sleep(2)
              return False, None, None

          def check_html_success(html, url, target_name, engine_name):
              html_str = str(html) if html else ""
              html_lower = html_str.lower()
              block_indicators = ["captcha", "robot", "blocked", "denied", "forbidden", "challenge-platform", "cloudflare"]
              if any(ind in html_lower for ind in block_indicators) and not any(diag in url for diag in DIAGNOSTIC_SITES):
                  print(f"[BLOCCO RILEVATO] Potenziale blocco su {target_name} ({url}) via {engine_name}", flush=True)
                  return False
              return True

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          def handle_cookie_consent(page):
              try:
                  consent_selectors = [
                      "button:has-text('Accetta tutto')",
                      "button:has-text('Accept all')",
                      "button:has-text('Consenti')",
                      "button:has-text('I agree')",
                      "button:has-text('Accetto')",
                      "button:has-text('Agree')",
                      "button:has-text('Accept')",
                      "button:has-text('OK')",
                      "button:has-text('Allow all')",
                      "button:has-text('Consenti l\\'uso dei cookie')",
                      "#L2AGLb"
                  ]
                  for selector in consent_selectors:
                      btn = page.locator(selector)
                      if btn.is_visible():
                          btn.click(timeout=1500)
                          time.sleep(0.5)
                          print(f"Cookie bypassato: {selector}", flush=True)
                          break
              except Exception:
                  pass

          # 1. Verifica ed attesa del proxy attivo su porta 40001
          ACTIVE_PORT = 40001
          print(f"Controllo connessione proxy SOCKS5H su porta {ACTIVE_PORT}...", flush=True)
          success, ip_type, proxy_ip = wait_for_proxy(ACTIVE_PORT, timeout=60)

          if not success:
              raise RuntimeError(f"Errore: il proxy sulla porta {ACTIVE_PORT} non è pronto.")

          print(f"Allineamento completato -> Connessione proxy attiva con IP {ip_type}: {proxy_ip}", flush=True)

          timezone = "UTC"
          locale = "en-US"

          # 2. Geolocalizzazione basata sull'IP del proxy (usando le richieste proxate)
          proxies = {"http": f"socks5h://127.0.0.1:{ACTIVE_PORT}", "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"}
          geo_services = [
              (f"https://freeipapi.com/api/json/{proxy_ip}", lambda d: (d.get("timeZone"), d.get("countryCode", "US"))),
              (f"https://ipapi.co/{proxy_ip}/json/", lambda d: (d.get("timezone"), d.get("languages", "en-US").split(",")[0])),
              (f"https://ipwho.is/{proxy_ip}", lambda d: (d.get("timezone"), d.get("country_code", "US")))
          ]
          for url, parse_func in geo_services:
              try:
                  print(f"Geolocalizzazione IP su {url} tramite proxy...", flush=True)
                  response = requests.get(url, proxies=proxies, timeout=5)
                  if response.status_code == 200:
                      data = response.json()
                      tz, loc = parse_func(data)
                      if tz:
                          timezone = tz
                          locale = loc
                          if len(locale) == 2:
                              country_to_locale = {
                                  "IT": "it-IT", "US": "en-US", "GB": "en-GB", "FR": "fr-FR", 
                                  "DE": "de-DE", "ES": "es-ES", "BR": "pt-BR", "CA": "en-CA"
                              }
                              locale = country_to_locale.get(locale.upper(), f"{locale.lower()}-{locale.upper()}")
                          print(f"Allineamento completato -> Timezone: {timezone} | Locale: {locale}", flush=True)
                          break
              except Exception as e:
                  print(f"Avviso: {url} non raggiungibile o in rate-limit ({e}). Provo il servizio successivo...", flush=True)

          # Generazione di un seed hardware dinamico coerente per ogni run
          random_seed = str(random.randint(100000, 999999))
          print(f"Avviando CloakBrowser con seed hardware dinamico: {random_seed}...", flush=True)

          # Avvio del contesto (Rimosso il flag --host-resolver-rules che bloccava il browser)
          context = launch_context(
              headless=False,
              humanize=True,
              timezone=timezone,
              locale=locale,
              viewport={"width": 1920, "height": 950},
              proxy={
                  "server": f"socks5://127.0.0.1:{ACTIVE_PORT}"
              },
              args=[
                  "--no-sandbox", 
                  "--disable-dev-shm-usage",
                  f"--fingerprint-timezone={timezone}",
                  f"--fingerprint-locale={locale}",
                  f"--fingerprint={random_seed}",
                  "--fingerprint-storage-quota=5000",   
                  "--fingerprint-windows-font-metrics"  
              ]
          )

          for url in TARGETS:
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"Analizzando: {url}", flush=True)
              try:
                  page = context.new_page()
                  
                  # INIEZIONE ATTIVA DI POLYFILL
                  page.add_init_script("""
                      if (!('ContactsManager' in window)) {
                          window.ContactsManager = class ContactsManager {
                              async getProperties() { return ['name', 'email', 'tel', 'address', 'icon']; }
                              async select() { return []; }
                          };
                          Object.defineProperty(navigator, 'contacts', {
                              get: () => new window.ContactsManager(),
                              configurable: true,
                              enumerable: true
                          });
                      }

                      if (!('ContentIndex' in window)) {
                          window.ContentIndex = class ContentIndex {
                              async add() {}
                              async delete() {}
                              async getAll() { return []; }
                          };
                      }

                      if (window.NetworkInformation && !('downlinkMax' in window.NetworkInformation.prototype)) {
                          Object.defineProperty(window.NetworkInformation.prototype, 'downlinkMax', {
                              get: () => 10,
                              configurable: true,
                              enumerable: true
                          });
                      }
                      if (navigator.connection) {
                          if (!('downlinkMax' in navigator.connection)) {
                              Object.defineProperty(navigator.connection, 'downlinkMax', {
                                  get: () => 10,
                                  configurable: true,
                                  enumerable: true
                              });
                          }
                          Object.defineProperty(navigator.connection, 'rtt', {
                              get: () => 100,
                              configurable: true,
                              enumerable: true
                          });
                      }
                  """)

                  query_to_search = get_query_from_url(url)

                  # GESTIONE SPECIFICA YELP
                  if "yelp.com" in url or "yelp.it" in url:
                      print("Esecuzione del warm-up su Yelp...", flush=True)
                      page.goto("https://www.yelp.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(3)
                      page.goto(url, wait_until="domcontentloaded", timeout=25000)
                  
                  # Navigazione simulata per Startpage
                  elif "startpage.com/sp/search" in url:
                      page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(2)
                      try:
                          search_input = page.locator("input#q")
                          search_input.type(query_to_search, delay=100, timeout=2000)
                          page.keyboard.press("Enter")
                      except Exception as e:
                          print(f"Avviso: errore scrittura su Startpage: {e}", flush=True)
                  
                  # Navigazione simulata per DuckDuckGo HTML
                  elif "html.duckduckgo.com/html" in url:
                      page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(2)
                      try:
                          search_input = page.locator("input[name=q]")
                          search_input.type(query_to_search, delay=100, timeout=2000)
                          page.keyboard.press("Enter")
                      except Exception as e:
                          print(f"Avviso: errore scrittura su DuckDuckGo: {e}", flush=True)
                      
                  else:
                      page.goto(url, wait_until="domcontentloaded", timeout=25000)
                      if not any(x in url for x in ["facebook.com", "reddit.com", "yelp"]):
                          handle_cookie_consent(page)
                  
                  # GESTIONE SPECIFICA YAHOO FINANCE
                  if "finance.yahoo.com" in url:
                      print("In attesa del caricamento dei dati di Yahoo Finance...", flush=True)
                      try:
                          page.wait_for_selector('section[data-testid="qsp-statistics"]', timeout=5000)
                      except Exception:
                          pass
                      time.sleep(1)

                  # Scorrimento simulato
                  try:
                      for _ in range(3):
                          page.mouse.wheel(0, 300)
                          time.sleep(1)
                  except Exception:
                      pass

                  # Tempi di attesa bilanciati
                  if "creepjs" in url:
                      time.sleep(20) 
                  elif "pixelscan" in url:
                      time.sleep(10)
                  elif any(test in url for test in ["sannysoft", "browserleaks", "incolumitas", "deviceinfo"]):
                      time.sleep(5)
                  else:
                      time.sleep(4)

                  raw_html = page.content()
                  
                  # Verifica se la pagina caricata contiene indicazioni di blocco
                  check_html_success(raw_html, url, urlparse(url).netloc, "CloakBrowser")
                  
                  results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"
                  page.close()

              except Exception as e:
                  print(f"Errore critico su {url}: {e}", flush=True)
                  results += f"ERRORE GLOBALE: {str(e)}\n"
                  try:
                      page.close()
                  except Exception:
                      pass

          context.close()

          with open("output_macchina2_cdp.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Macchina 2
        run: python -u m2_insocket.py

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
