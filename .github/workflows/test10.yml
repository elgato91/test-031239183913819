name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sincronizza Orologio di Sistema (NTP)
        run: |
          # Installiamo ntpdate prima di eseguirlo per evitare l'errore "command not found"
          sudo apt-get update && sudo apt-get install -y ntpdate || true
          sudo systemctl stop systemd-timesyncd.service || true
          sudo ntpdate -s pool.ntp.org || true

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 3 WARProxy Docker Containers (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          # Avvio lineare e pulito dei container
          for i in 1 2 3; do
            PORT=$((40000 + i))
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
          done

          echo "Attesa stabilizzazione tunnel WARP..."
          sleep 15
          docker ps -a

      - name: Verifica IP IPv6 di uscita sui 3 Proxy
        run: |
          for i in 1 2 3; do
            PORT=$((40000 + i))
            echo "=================================================="
            echo "VERIFICA IP CONTAINER $i ($PORT):"
            curl --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json || echo "Proxy $i fallito!"
          done
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Stabile)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Creazione script Python (Macchina 2)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import requests
          from cloakbrowser import launch_context
          from bs4 import BeautifulSoup

          TARGETS = [
              "https://api64.ipify.org?format=json",
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.eater.com/rome",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San%20Francisco%2C%20CA",
              "https://www.passportindex.org/passport/italy/",
              "https://guide.michelin.com/en/it/lazio/roma/restaurants",
              "https://www.cntraveler.com/gallery/best-restaurants-in-rome",
              "https://www.facebook.com/groups/1373361046396315/posts/2860154274383644/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://newromantimes.substack.com/p/a-very-subjective-list-of-the-best",
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id
          MY_TARGETS = TARGETS[(node_id-1)*10 : node_id*10] # Distribuzione dei 28 target

          results = ""

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          # Rilevamento geografico robusto multi-stage instradato attraverso il proxy del nodo
          print(f"[NODO {node_id}] Rilevamento parametri geografici dell'IP di rete...", flush=True)
          timezone = "UTC"
          locale = "it-IT" # Forziamo la lingua italiana per evitare il soft-block dei motori USA (es. l'acronimo COSA su Bing)
          
          proxies = {
              "http": f"socks5h://127.0.0.1:{ACTIVE_PORT}",
              "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"
          }
          
          geo_services = [
              ("http://ip-api.com/json/", lambda d: (d.get("timezone"), "it-IT")),
              ("https://ipapi.co/json/", lambda d: (d.get("timezone"), "it-IT")),
              ("https://ipwho.is/", lambda d: (d.get("timezone"), "it-IT"))
          ]
          
          for url, parse_func in geo_services:
              try:
                  print(f"[NODO {node_id}] Tentativo con {url}...", flush=True)
                  response = requests.get(url, proxies=proxies, timeout=5)
                  if response.status_code == 200:
                      data = response.json()
                      tz, loc = parse_func(data)
                      if tz:
                          timezone = tz
                          locale = loc
                          print(f"[NODO {node_id}] Allineamento completato -> Timezone: {timezone} | Locale: {locale}", flush=True)
                          break
              except Exception as e:
                  print(f"[NODO {node_id}] Avviso: {url} in rate-limit ({e}). Provo il successivo...", flush=True)

          print(f"[NODO {node_id}] Avviando CloakBrowser con i parametri allineati...", flush=True)
          
          # launch_context in-memory (stateless) originale per garantire isolamento e velocità
          context = launch_context(
              headless=False,
              humanize=True,
              timezone=timezone,
              locale=locale,
              proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
              viewport={"width": 1920, "height": 1080},
              args=[
                  "--no-sandbox", 
                  "--disable-dev-shm-usage",
                  f"--fingerprint-timezone={timezone}",
                  f"--fingerprint-locale={locale}",
                  "--fingerprint=42069" # Seed hardware stabile e credibile della tua configurazione di successo
              ]
          )

          for url in MY_TARGETS:
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"[NODO {node_id}] Analizzando: {url}", flush=True)
              try:
                  page = context.new_page()

                  # GESTIONE SPECIFICA YELP (Warm-up della sessione sulla home page)
                  if "yelp.com" in url or "yelp.it" in url:
                      print(f"[NODO {node_id}] Esecuzione del warm-up su Yelp...", flush=True)
                      page.goto("https://www.yelp.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(3)
                      page.goto(url, wait_until="domcontentloaded", timeout=25000)
                  
                  # Navigazione originale per Startpage
                  elif "startpage.com/sp/search" in url:
                      page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(2)
                      page.type("input#q", "migliore carbonara roma", delay=150)
                      page.keyboard.press("Enter")
                  
                  # Navigazione originale per DuckDuckGo
                  elif "html.duckduckgo.com/html/" in url:
                      page.goto("https://duckduckgo.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(2)
                      page.type("input[name=q]", "migliore carbonara roma", delay=150)
                      page.keyboard.press("Enter")
                      
                  else:
                      page.goto(url, wait_until="domcontentloaded", timeout=25000)
                  
                  # GESTIONE SPECIFICA YAHOO FINANCE
                  if "finance.yahoo.com" in url:
                      print(f"[NODO {node_id}] In attesa del caricamento dei dati di Yahoo Finance...", flush=True)
                      try:
                          page.wait_for_selector('section[data-testid="qsp-statistics"]', timeout=15000)
                          time.sleep(2)
                      except Exception: pass

                  # Movimento scorrimento simulato originale
                  try:
                      for _ in range(3):
                          page.mouse.wheel(0, 300)
                          time.sleep(1)
                  except:
                      pass

                  # Attese necessarie per permettere la profilazione diagnostica completa
                  if "creepjs" in url:
                      time.sleep(20) 
                  elif "pixelscan" in url:
                      time.sleep(10)
                  elif any(test in url for test in ["sannysoft", "browserleaks", "incolumitas", "deviceinfo"]):
                      time.sleep(5)
                  else:
                      time.sleep(6)

                  raw_html = page.content()
                  results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"
                  page.close()

              except Exception as e:
                  print(f"[NODO {node_id}] Errore critico su {url}: {e}", flush=True)
                  results += f"ERRORE GLOBALE: {str(e)}\n"
                  try:
                      page.close()
                  except:
                      pass

          context.close()

          with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Parallelo
        run: |
          echo "Avvio processi paralleli..."
          python -u m2_insocket.py 1 > node1.log 2>&1 &
          python -u m2_insocket.py 2 > node2.log 2>&1 &
          python -u m2_insocket.py 3 > node3.log 2>&1 &
          
          wait

          echo "=== LOG NODO 1 ==="
          cat node1.log || true
          echo "=== LOG NODO 2 ==="
          cat node2.log || true
          echo "=== LOG NODO 3 ==="
          cat node3.log || true
          echo "=================="

          touch output_node_1.txt output_node_2.txt output_node_3.txt
          cat output_node_1.txt output_node_2.txt output_node_3.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
