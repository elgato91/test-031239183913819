name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on:
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 6 WARProxy Docker Containers (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest

            if [ $i -lt 6 ]; then
              DELAY=$(3 + RANDOM % 2))
              echo "Attesa scaglionata di $DELAY secondi per il prossimo container..."
              sleep $DELAY
            fi
          done

          echo "Attesa finale inizializzazione dei tunnel..."
          sleep 10

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "=================================================="
            echo "VERIFICA E AUTO-HEALING CONTAINER $i (PORTA $PORT):"
            
            DELAY=$((3 + RANDOM % 2))
            sleep $DELAY

            SUCCESS=false
            for tentativo in {1..5}; do
              echo "Tentativo $tentativo/5 per container $i..."
              IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json)
              
              if [ $? -eq 0 ] && [ ! -z "$IP" ]; then
                echo "Container $i pronto! IP: $IP"
                SUCCESS=true
                break
              else
                echo "Container $i non risponde. Riavvio in corso..."
                docker restart warproxy-$i
                sleep 8
              fi
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "ERRORE CRITICO: Il container $i non è raggiungibile dopo 5 riavvii."
              exit 1
            fi
          done
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Creazione script Python (Macchina 2)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import math
          from cloakbrowser import launch_persistent_context
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          TARGETS = [
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://www.cntraveler.com/gallery/best-restaurants-in-rome",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.getyourguide.com/it-it/musei-vaticani-l2738/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          num_nodes = 6
          slice_size = math.ceil(len(TARGETS) / num_nodes)
          MY_TARGETS = TARGETS[(node_id-1)*slice_size : node_id*slice_size]

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          # Torna alla vostra generazione originale e sicura del seed
          random_seed = str(random.randint(100000, 999999))

          # Vostra configurazione originale infallibile che inibisce il DNS leak locale
          extra_args = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              "--host-resolver-rules=MAP * ~NOTFOUND , EXCLUDE 127.0.0.1"
          ]

          print(f"[NODO {node_id}] Avvio Context Persistente", flush=True)

          # Passiamo a launch_persistent_context per eliminare il rilevamento incognito/storage quota
          # Questo risolve nativamente i blocchi Turnstile su Katie Parla e Canadian Insider
          profile_dir = f"./profile_node_{node_id}"
          context = launch_persistent_context(
              profile_dir,
              headless=False,
              humanize=True,
              proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
              geoip=True,
              viewport={"width": 1920, "height": 950},
              args=extra_args
          )

          results = f"\n{'#'*60}\nREPORT NODO {node_id} (PORTA {ACTIVE_PORT})\n{'#'*60}\n"

          for url in MY_TARGETS:
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"[NODO {node_id}] -> {url}", flush=True)
              page = None
              
              try:
                  page = context.new_page()
                  
                  # Navigazione lineare diretta originale vostra
                  page.goto(url, wait_until="domcontentloaded", timeout=35000)
                  
                  # Tempistiche vostre originali
                  time.sleep(6)

                  # ==========================================
                  # RISOLUTORE AUTOMATICO GOOGLE CAPTCHA
                  # (Vostro originale, pulito e immediato senza attese asincrone)
                  # ==========================================
                  if "google.com/search" in url:
                      try:
                          if page.locator('form[action="/sorry/index"]').is_visible(timeout=3000):
                              print(f"[NODO {node_id}] Google CAPTCHA rilevato. Risolvo...", flush=True)
                              recaptcha_frame = page.frame_locator("iframe[title*='reCAPTCHA']")
                              checkbox = recaptcha_frame.locator(".recaptcha-checkbox-border")
                              if checkbox.is_visible(timeout=3000):
                                  checkbox.click()
                                  time.sleep(6) 
                      except Exception:
                          pass

                  # ==========================================
                  # RISOLUTORE CLOUDFLARE TURNSTILE (Semplice e non bloccante)
                  # ==========================================
                  try:
                      if "Just a moment" in page.title() or page.locator("body:has-text('Cloudflare')").is_visible(timeout=2000):
                          cf_iframe = page.frame_locator("iframe[src*='cloudflare']")
                          cf_checkbox = cf_iframe.locator("input[type='checkbox'], .cb-c")
                          if cf_checkbox.is_visible(timeout=3000):
                              cf_checkbox.click()
                              time.sleep(10)
                  except Exception:
                      pass

                  # ==========================================
                  # RIMOZIONE MURI DI COOKIE GENERI (Vostra originale)
                  # ==========================================
                  if not any(x in url for x in ["facebook.com", "reddit.com", "google", "bing"]):
                      try:
                          consent_selectors = [
                              "button#onetrust-accept-btn-handler",
                              "button:has-text('Accetta tutto')", 
                              "button:has-text('Accept all')",
                              "button:has-text('Consenti')", 
                              "button:has-text('I agree')"
                          ]
                          for selector in consent_selectors:
                              btn = page.locator(selector).first
                              if btn.is_visible(timeout=1000):
                                  btn.click() 
                                  break
                      except Exception:
                          pass
                      
                  # ==========================================
                  # SCROLL UMANO SIMULATO (Vostro originale, esclude movimenti mouse artificiali)
                  # ==========================================
                  try:
                      for _ in range(3):
                          page.mouse.wheel(0, random.randint(300, 600))
                          time.sleep(random.uniform(0.8, 1.5))
                  except Exception:
                      pass

                  # Tempistiche finali vostre originali
                  if "creepjs" in url:
                      time.sleep(12) 
                  elif "pixelscan" in url:
                      time.sleep(8)

                  raw_html = page.content()
                  results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"

              except Exception as e:
                  print(f"[NODO {node_id}] Errore: {e}", flush=True)
                  results += f"ERRORE GLOBALE: {str(e)}\n"
              finally:
                  if page:
                      try:
                          page.close()
                      except Exception:
                          pass

          context.close()

          with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Parallelo (6 Nodi)
        run: |
          echo "Avvio processi paralleli su 6 nodi..."
          python -u m2_insocket.py 1 > node1.log 2>&1 &
          sleep 2
          python -u m2_insocket.py 2 > node2.log 2>&1 &
          sleep 2
          python -u m2_insocket.py 3 > node3.log 2>&1 &
          sleep 2
          python -u m2_insocket.py 4 > node4.log 2>&1 &
          sleep 2
          python -u m2_insocket.py 5 > node5.log 2>&1 &
          sleep 2
          python -u m2_insocket.py 6 > node6.log 2>&1 &

          wait

          echo "=== LOG NODO 1 ===" && cat node1.log || true
          echo "=== LOG NODO 2 ===" && cat node2.log || true
          echo "=== LOG NODO 3 ===" && cat node3.log || true
          echo "=== LOG NODO 4 ===" && cat node4.log || true
          echo "=== LOG NODO 5 ===" && cat node5.log || true
          echo "=== LOG NODO 6 ===" && cat node6.log || true
          echo "=================="

          touch output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt
          cat output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
