import time
import sys
import random
import math
from cloakbrowser import launch_context
from bs4 import BeautifulSoup
from urllib.parse import urlparse, parse_qs

TARGETS = [
    "https://tls.browserleaks.com/json",
    "https://bot.sannysoft.com/",
    "https://abrahamjuliot.github.io/creepjs/",
    "https://pixelscan.net/",
    "https://bot.incolumitas.com/",
    "https://www.deviceinfo.me/",
    "https://www.google.com/search?q=cosa+vedere+roma",
    "https://www.bing.com/search?q=cosa+vedere+roma",
    "https://www.bloomberg.com/markets/stocks",
    "https://www.morningstar.com/stocks/xnas/aapl/quote",
    "https://finance.yahoo.com/quote/AAPL/key-statistics",
    "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
    "https://www.passportindex.org/passport/italy/",
    "https://www.cntraveler.com/gallery/best-restaurants-in-rome",
    "https://katieparla.com/budget-dining-in-rome-revised/",
    "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
    "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
    "https://www.bing.com/search?q=migliore+carbonara+roma",
    "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
    "https://search.yahoo.com/search?p=migliore+carbonara+roma",
    "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
    "https://www.facebook.com/groups/expatsinparaguay/",
    "https://www.canadianinsider.com/money-is-moving"
]

DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

if len(sys.argv) < 2:
    print("Manca ID nodo.")
    sys.exit(1)

node_id = int(sys.argv[1])
ACTIVE_PORT = 40000 + node_id

num_nodes = 6
slice_size = math.ceil(len(TARGETS) / num_nodes)
MY_TARGETS = TARGETS[(node_id-1)*slice_size : node_id*slice_size]

def extract_text(html_content, url):
    soup = BeautifulSoup(html_content, 'html.parser')
    text = soup.get_text(separator=' ', strip=True)
    if any(site in url for site in DIAGNOSTIC_SITES):
        return text
    return text[:5000]

def get_query_from_url(url, default="migliore carbonara roma"):
    try:
        parsed = urlparse(url)
        queries = parse_qs(parsed.query)
        for param in ['q', 'query', 'p']:
            if param in queries:
                return queries[param][0]
    except Exception:
        pass
    return default

print(f"[NODO {node_id}] Avvio Context Perfetto", flush=True)

# Il seed fisso garantisce che Google non ci veda come 20 device diversi dallo stesso IP.
random_seed = str(random.randint(100000, 999999))

# Ripristiniamo la vostra configurazione DNS infallibile + la disattivazione del WebDriver
extra_args = [
    "--no-sandbox",
    "--disable-dev-shm-usage",
    f"--fingerprint={random_seed}",
    "--host-resolver-rules=MAP * ~NOTFOUND , EXCLUDE 127.0.0.1",
    "--disable-blink-features=AutomationControlled"
]

try:
    context = launch_context(
        headless=False,
        humanize=True,
        proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
        geoip=True,
        viewport={"width": 1920, "height": 950},
        args=extra_args
    )
except Exception as e:
    print(f"[NODO {node_id}] Fallito avvio browser: {e}", flush=True)
    sys.exit(1)

results = f"\n{'#'*60}\nREPORT NODO {node_id} (PORTA {ACTIVE_PORT})\n{'#'*60}\n"

for url in MY_TARGETS:
    results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
    print(f"[NODO {node_id}] -> {url}", flush=True)
    page = None
    
    try:
        page = context.new_page()
        
        # ==========================================
        # LOGICA MOTORI DI RICERCA: Typing Umano
        # ==========================================
        search_engines = ["google.com/search", "bing.com/search", "search.yahoo.com", "startpage.com", "html.duckduckgo.com"]
        
        if any(se in url for se in search_engines):
            query_to_search = get_query_from_url(url)
            
            if "google.com" in url:
                base_url, sel = "https://www.google.com/", 'textarea[name="q"], input[name="q"]'
            elif "bing.com" in url:
                base_url, sel = "https://www.bing.com/", 'input[name="q"]'
            elif "yahoo.com" in url:
                base_url, sel = "https://search.yahoo.com/", 'input[name="p"]'
            elif "startpage.com" in url:
                base_url, sel = "https://www.startpage.com/", 'input#q'
            else:
                base_url, sel = "https://html.duckduckgo.com/", 'input[name="q"]'
                
            page.goto(base_url, wait_until="domcontentloaded", timeout=40000)
            
            # Accetta il muro dei cookie su Google/Bing se si presenta
            try:
                consent = page.locator("button:has-text('Accetta tutto'), button:has-text('Accept all')").first
                if consent.is_visible(timeout=3000):
                    consent.click()
                    time.sleep(2)
            except Exception:
                pass
                
            try:
                # humanize=True applicherà ritardi realistici nella digitazione
                page.locator(sel).first.type(query_to_search, delay=random.randint(60, 150))
                page.keyboard.press("Enter")
                page.wait_for_load_state("domcontentloaded", timeout=20000)
            except Exception:
                # Fallback di sicurezza se la casella di ricerca non viene trovata
                page.goto(url, wait_until="domcontentloaded", timeout=40000)
                
            time.sleep(random.uniform(4.0, 7.0))
            
        else:
            # Navigazione normale per tutti gli altri siti
            page.goto(url, wait_until="domcontentloaded", timeout=45000)
            time.sleep(random.uniform(4.0, 7.0))

        # ==========================================
        # RISOLUTORE CLOUDFLARE TURNSTILE E GOOGLE CAPTCHA
        # ==========================================
        try:
            if "Just a moment" in page.title() or page.locator("body:has-text('Cloudflare')").is_visible(timeout=2000):
                time.sleep(random.uniform(3.0, 5.0))
                cf_iframe = page.frame_locator("iframe[src*='cloudflare']")
                cf_checkbox = cf_iframe.locator("input[type='checkbox'], .cb-c")
                if cf_checkbox.is_visible(timeout=5000):
                    cf_checkbox.click()
                    time.sleep(10)
        except Exception:
            pass

        if "google.com" in url:
            try:
                if page.locator('form[action="/sorry/index"]').is_visible(timeout=3000):
                    time.sleep(8)
                    recaptcha_frame = page.frame_locator("iframe[title*='reCAPTCHA']")
                    checkbox = recaptcha_frame.locator(".recaptcha-checkbox-border")
                    if checkbox.is_visible(timeout=3000):
                        checkbox.click()
                        time.sleep(8) 
            except Exception:
                pass

        # ==========================================
        # RIMOZIONE MURI DI COOKIE STANDARD
        # ==========================================
        if not any(x in url for x in ["facebook.com", "reddit.com", "google", "bing", "yahoo"]):
            try:
                consent_selectors = [
                    "button#onetrust-accept-btn-handler",
                    "button:has-text('Accetta tutto')", 
                    "button:has-text('Accept all')",
                    "button:has-text('Consenti')", 
                    "button:has-text('I agree')"
                ]
                for selector in consent_selectors:
                    btn = page.locator(selector).first
                    if btn.is_visible(timeout=1000):
                        btn.click() 
                        break
            except Exception:
                pass

        # ==========================================
        # SCROLL UMANO NATIVO
        # ==========================================
        try:
            page.mouse.move(random.randint(400, 1200), random.randint(200, 700))
            time.sleep(1)
            for _ in range(3):
                page.mouse.wheel(0, random.randint(300, 600))
                time.sleep(random.uniform(1.5, 3.0))
        except Exception:
            pass

        # Siti di diagnostica pesanti
        if any(x in url for x in ["creepjs", "pixelscan", "sannysoft", "incolumitas"]):
            time.sleep(8)

        raw_html = page.content()
        results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"

    except Exception as e:
        print(f"[NODO {node_id}] Errore navigazione: {e}", flush=True)
        results += f"ERRORE GLOBALE: {str(e)}\n"
        
    finally:
        if page:
            try:
                page.close()
            except Exception:
                pass

context.close()

with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
    f.write(results)
