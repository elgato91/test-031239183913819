name: Test RAG Challenge 2026

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sincronizza Orologio di Sistema (NTP)
        run: |
          # Arresta temporaneamente il demone di sincronizzazione standard per forzare l'aggiornamento
          sudo systemctl stop systemd-timesyncd.service || true
          # Sincronizza l'orologio di sistema usando sntp o ntpdate
          sudo sntp -sS pool.ntp.org || sudo ntpdate -s pool.ntp.org || true
          # Riavvia il servizio di sincronizzazione di sistema
          sudo systemctl start systemd-timesyncd.service || true

      - name: Installazione Font di Sistema (Inclusi Font Microsoft)
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 3 WARProxy Docker Containers (Active & Parallel IPv6-only)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in 1 2 3; do
            PORT=$((40000 + i))
            docker run --name warproxy-$i \
              --network host \
              -e TZ=Europe/Rome \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
          done

          sleep 15
          docker ps -a

      - name: Verifica IP IPv6 di uscita sui 3 Proxy
        run: |
          for i in 1 2 3; do
            PORT=$((40000 + i))
            echo "=================================================="
            echo "VERIFICA IP CONTAINER $i ($PORT):"
            curl --proxy socks5h://127.0.0.1:$PORT https://api64.ipify.org?format=json || echo "Proxy $i fallito!"
          done
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Stabile)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          echo "Download pre-emptive del binario Chromium modificato..."
          python -m cloakbrowser install

      - name: Creazione script Python (Macchina 2)
        run: |
          # Lo script Python aggiornato viene copiato direttamente qui
          cat << 'EOF' > m2_insocket.py
          # [Il codice dello script Python generato sopra va inserito qui]
          EOF

      - name: Esecuzione Scraping Parallelo (3 Nodi indipendenti)
        run: |
          echo "Avvio processi paralleli in background..."
          python -u m2_insocket.py 1 > node1.log 2>&1 &
          python -u m2_insocket.py 2 > node2.log 2>&1 &
          python -u m2_insocket.py 3 > node3.log 2>&1 &
          
          # Attende il completamento di tutti i processi in background
          wait

          echo "=== LOG NODO 1 ==="
          cat node1.log || true
          echo "=== LOG NODO 2 ==="
          cat node2.log || true
          echo "=== LOG NODO 3 ==="
          cat node3.log || true
          echo "=================="

          # Crea i file vuoti nel caso un nodo fosse andato in crash irreversibile
          touch output_node_1.txt output_node_2.txt output_node_3.txt
          
          # Assembla il report finale
          cat output_node_1.txt output_node_2.txt output_node_3.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
