      - name: Verifica presenza file di input
        run: |
          INPUT_FILE="${{ github.event.inputs.input_file }}"
          if [ -z "$INPUT_FILE" ]; then
            INPUT_FILE="nuggets_finale.json"
          fi
          echo "INPUT_FILE=$INPUT_FILE" >> $GITHUB_ENV
          if [ ! -f "$INPUT_FILE" ]; then
            echo "ERRORE: file di input '$INPUT_FILE' non trovato nella repo."
            echo "Assicurati di aver caricato il file JSON con i nugget grezzi nella root della repo (o passa un path diverso in input_file)."
            exit 1
          fi
          echo "File di input trovato: $INPUT_FILE"

      - name: Esecuzione pipeline di riconciliazione
        run: |
          python -u orchestrator.py --input "${{ env.INPUT_FILE }}" --output-dir ./output

      - name: Riepilogo revisione umana
        if: always()
        run: |
          if [ -f "./output/needs_human_review.json" ]; then
            echo "### Riepilogo verifica anti-allucinazione" >> $GITHUB_STEP_SUMMARY
            python3 print_summary.py >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Artifact - Nugget Riconciliati
        uses: actions/upload-artifact@v4
        with:
          name: Nuggets_Riconciliati
          path: output/nuggets_riconciliati.json

      - name: Upload Artifact - Verified Facts (dati critici da monitorare)
        uses: actions/upload-artifact@v4
        with:
          name: Verified_Facts
          path: output/verified_facts.json

      - name: Upload Artifact - Report Revisione Umana
        uses: actions/upload-artifact@v4
        with:
          name: Needs_Human_Review
          path: output/needs_human_review.json
