name: Reconcile Nuggets - Agente Riconciliazione Editoriale

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: "Path del file JSON con i nugget grezzi (deve essere nella repo)"
        required: false
        default: "nuggets_finale.json"

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      ANALYSIS_MODEL_NAME: "gemma-4-26b-a4b-it"
      MAX_RPM_ANALYSIS: "15"
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installazione dipendenze
