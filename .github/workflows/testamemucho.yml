name: Test Gemma 4 Grounding con Retry

on:
  workflow_dispatch:

jobs:
  test-grounding:
    runs-on: ubuntu-latest
    steps:
      - name: Chiamata a Gemma 4 con Retry e Search Grounding
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Errore: GEMINI_API_KEY non è impostata nei Secrets."
            exit 1
          fi

          echo "Inizio dei tentativi di chiamata a gemma-4-26b-a4b-it..."

          # Ciclo di retry fino a 5 tentativi con attesa di 15 secondi
          for i in {1..15}; do
            echo "Tentativo $i di 15..."

            HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
              "https://generativelanguage.googleapis.com/v1beta/models/gemma-4-26b-a4b-it:generateContent?key=${GEMINI_API_KEY}" \
              -H 'Content-Type: application/json' \
              -X POST \
              -d '{
                "contents": [{
                  "parts":[{"text": "Quali sono le notizie principali di oggi nel mondo? Rispondi in italiano in modo molto breve."}]
                }],
                "tools": [
                  {
                    "googleSearch": {}
                  }
                ]
              }')

            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Successo! Risposta ricevuta correttamente al tentativo $i."
              break
            else
              echo "Errore Server ($HTTP_STATUS). Attesa di 15 secondi prima del prossimo tentativo..."
              cat response.json
              echo ""
              sleep 3
            fi

            if [ "$i" -eq 15 ]; then
              echo "Errore: il server ha fallito tutti e 5 i tentativi di chiamata."
              exit 1
            fi
          done

          echo "=== RISPOSTA GREZZA DA GOOGLE ==="
          cat response.json
          echo ""

          echo "=== TESTO ESTRATTO ==="
          # Estrae la risposta finale escludendo i blocchi di "thought"
          cat response.json | jq -r '.candidates[0].content.parts[] | select(.thought != true) | .text' || echo "Nessun testo finale estratto."

          echo ""
          echo "=== METADATI DI RICERCA (VERIFICA GROUNDING) ==="
          # Mostra le query di ricerca e le fonti reali consultate da Google
          cat response.json | jq '.candidates[0].groundingMetadata' || echo "Nessun metadato di grounding presente."
