                  if os.path.exists(out_file):
                      with open(out_file, "r", encoding="utf-8") as f:
                          testo_comparso += f.read()

              for url in tutti_i_target:
                  gia_in_failed = url in merged_failed
                  compare_nei_report = ("TARGET: " + url) in testo_comparso
                  if not gia_in_failed and not compare_nei_report:
                      target_orfani.append(url)

              if target_orfani:
