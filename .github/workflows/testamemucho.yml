          merged_failed = []
          for i in range(1, 7):
              filename = f"failed_node_{i}.json"
              if os.path.exists(filename):
                  with open(filename, "r", encoding="utf-8") as f:
                      try: merged_failed.extend(json.load(f))
                      except Exception: pass

          # --- Rete di sicurezza ---
          # Confronta la lista COMPLETA dei target originali di Step 1 con quelli che
          # risultano effettivamente comparsi (successo o fallito, non importa quale)
          # nei report testuali di Step 1. Un target originale che non compare in
