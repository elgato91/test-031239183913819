name: Reconcile Nuggets - Agente Riconciliazione Editoriale

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: "Path del file JSON con i nugget grezzi (deve essere nella repo)"
        required: false
        default: "nuggets_finale.json"

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installazione dipendenze
        run: |
          pip install google-genai requests --break-system-packages

      - name: Creazione modulo - orchestrator.py
        run: |
          cat << 'EOF' > orchestrator.py
          import os
          import sys
          import time
          import tarfile
          import requests
          from google import genai

          def run_antigravity_pipeline(input_path, output_dir):
              api_key = os.environ.get("GEMINI_API_KEY")
              if not api_key:
                  print("[ORCHESTRATOR] ERRORE: GEMINI_API_KEY non configurata.")
                  sys.exit(1)

              print(f"[ORCHESTRATOR] Caricamento nugget grezzi da: {input_path}")
              try:
                  with open(input_path, "r", encoding="utf-8") as f:
                      raw_nuggets_content = f.read()
              except Exception as e:
                  print(f"[ORCHESTRATOR] ERRORE durante la lettura del file di input: {e}")
                  sys.exit(1)

              client = genai.Client(api_key=api_key)

              print("[ORCHESTRATOR] Avvio dell'agente Google Antigravity in background...")
              
              # Prompt ottimizzato al minimo per evitare cicli di programmazione e ricerche web ridondanti
              prompt = f"""
          Sei l'Agente Riconciliazione Editoriale basato su Google Antigravity.
          Il tuo unico compito è riordinare, pulire, accorpare i nugget forniti qui sotto, risolvere eventuali incoerenze ed identificare le fonti ufficiali per i dati volatili importanti (orari, prezzi, contatti) tramite Google Search.

          NUGGET GREZZI (JSON):
          ```json
          {raw_nuggets_content}
          ```

          REGOLE RIGIDE PER EVITARE SPRECO DI TOKEN:
          1. NON scrivere, compilare o eseguire complessi script Python di test o di verifica fuzzy anti-allucinazione nella sandbox.
          2. NON effettuare ricerche web seriali o ripetitive. Usa Google Search solo ed esclusivamente se trovi reali incongruenze nei dati dei nugget (es. prezzi discordanti sullo stesso luogo) per identificare la fonte ufficiale corretta.
          3. Scrivi direttamente i 3 file JSON richiesti nella cartella 'output/' usando comandi di scrittura immediati (es. tramite un semplice script a riga singola o echo):
             - `output/nuggets_riconciliati.json` (contenente la mappatura dei nugget grezzi raggruppati in max 15 macro-aree)
             - `output/verified_facts.json` (la lista piatta dei dati volatili e dei relativi URL ufficiali verificati)
             - `output/needs_human_review.json` (le statistiche e l'elenco dei dati rimasti incoerenti o non verificabili)

          Assicurati che le strutture dei JSON rispettino esattamente i formati richiesti. Una volta scritti i 3 file, termina subito scrivendo "PIPELINE_COMPLETE".
          """

              try:
                  # Avvio dell'interazione in background per prevenire timeout HTTP locali
                  interaction = client.interactions.create(
                      agent="antigravity-preview-05-2026",
                      input=prompt,
                      environment="remote",
                      background=True
                  )
                  
                  print(f"[ORCHESTRATOR] Chiamata avviata con successo. ID: {interaction.id}")
                  print("[ORCHESTRATOR] Polling dello stato dell'agente...")
                  
                  while True:
                      time.sleep(15)
                      status_res = client.interactions.get(interaction.id)
                      print(f"[ORCHESTRATOR] Stato corrente: {status_res.status}", flush=True)
                      
                      if status_res.status == "completed":
                          interaction = status_res
                          break
                      elif status_res.status in ["failed", "cancelled"]:
                          print(f"[ORCHESTRATOR] ERRORE: L'interazione si è interrotta con stato: {status_res.status}")
                          if getattr(status_res, "error", None):
                              print(f"[ORCHESTRATOR] Dettagli errore: {status_res.error}")
                          sys.exit(1)
                  
                  print("[ORCHESTRATOR] Agente completato. Output di esecuzione:")
                  print(interaction.output_text)
                  
                  env_id = interaction.environment_id
                  if not env_id:
                      print("[ORCHESTRATOR] ERRORE: L'ambiente remoto non ha restituito un ID valido.")
                      sys.exit(1)
                      
                  print(f"[ORCHESTRATOR] Scaricamento dello snapshot dell'ambiente ({env_id})...")
                  download_url = f"https://generativelanguage.googleapis.com/v1beta/files/environment-{env_id}:download"
                  
                  response = requests.get(
                      download_url,
                      params={"alt": "media"},
                      headers={"x-goog-api-key": api_key},
                      allow_redirects=True
                  )
                  
                  if response.status_code != 200:
                      print(f"[ORCHESTRATOR] ERRORE durante il download dello snapshot: {response.status_code}")
                      sys.exit(1)
                      
                  tar_path = "snapshot.tar"
                  with open(tar_path, "wb") as f:
                      f.write(response.content)
                      
                  print("[ORCHESTRATOR] Estrazione dei file generati...")
                  os.makedirs(output_dir, exist_ok=True)
                  
                  extracted_files = []
                  with tarfile.open(tar_path, "r") as tar:
                      for member in tar.getmembers():
                          filename = os.path.basename(member.name)
                          if filename in ["nuggets_riconciliati.json", "verified_facts.json", "needs_human_review.json"]:
                              member.name = filename
                              tar.extract(member, path=output_dir)
                              extracted_files.append(filename)
                              
                  print(f"[ORCHESTRATOR] Estrazione completata in {output_dir}:")
                  for f in extracted_files:
                      print(f"  - {f}")
                      
              except Exception as e:
                  print(f"[ORCHESTRATOR] Errore di esecuzione: {e}")
                  sys.exit(1)

          def main():
              import argparse
              parser = argparse.ArgumentParser()
              parser.add_argument("--input", required=True)
              parser.add_argument("--output-dir", default="./output")
              args = parser.parse_args()
              run_antigravity_pipeline(args.input, args.output_dir)

          if __name__ == "__main__":
              main()
          EOF

      - name: Creazione modulo - print_summary.py
        run: |
          cat << 'EOF' > print_summary.py
          import json

          try:
              with open("./output/needs_human_review.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
              stats = data.get("stats", {})
              print(f"- Fatti consolidati totali: {stats.get('totale_fatti_consolidati', 0)}")
              print(f"- Verified facts totali: {stats.get('totale_verified_facts', 0)}")
              print(f"- Elementi da revisionare: {stats.get('totale_non_verificati', 0)}")
          except Exception as e:
              print(f"Errore durante la lettura del riepilogo: {e}")
          EOF

      - name: Verifica presenza file di input
        run: |
          INPUT_FILE="${{ github.event.inputs.input_file }}"
          if [ -z "$INPUT_FILE" ]; then
            INPUT_FILE="nuggets_finale.json"
          fi
          echo "INPUT_FILE=$INPUT_FILE" >> $GITHUB_ENV
          if [ ! -f "$INPUT_FILE" ]; then
            echo "ERRORE: file di input '$INPUT_FILE' non trovato."
            exit 1
          fi
          echo "File di input trovato: $INPUT_FILE"

      - name: Esecuzione pipeline di riconciliazione
        run: |
          python -u orchestrator.py --input "${{ env.INPUT_FILE }}" --output-dir ./output

      - name: Riepilogo revisione umana
        if: always()
        run: |
          if [ -f "./output/needs_human_review.json" ]; then
            echo "### Riepilogo verifica anti-allucinazione" >> $GITHUB_STEP_SUMMARY
            python3 print_summary.py >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Artifact - Nugget Riconciliati
        uses: actions/upload-artifact@v4
        with:
          name: Nuggets_Riconciliati
          path: output/nuggets_riconciliati.json

      - name: Upload Artifact - Verified Facts (dati critici da monitorare)
        uses: actions/upload-artifact@v4
        with:
          name: Verified_Facts
          path: output/verified_facts.json

      - name: Upload Artifact - Report Revisione Umana
        uses: actions/upload-artifact@v4
        with:
          name: Needs_Human_Review
          path: output/needs_human_review.json
