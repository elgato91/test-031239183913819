name: Test Gemma 4 31B Grounding Nativo

on:
  workflow_dispatch:

jobs:
  test-grounding:
    runs-on: ubuntu-latest
    steps:
      - name: Chiamata Diretta a Gemma 4 con Search
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "Errore: GOOGLE_API_KEY non è impostata nei Secrets."
            exit 1
          fi

          echo "Inizio chiamata nativa a gemma-4-31b-it con Google Search..."

          # Chiamata API ufficiale con il tool googleSearch abilitato
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemma-4-31b-it:generateContent?key=${GOOGLE_API_KEY}" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d '{
              "contents": [{
                "parts":[{"text": "Quali sono le notizie principali di oggi nel mondo? Rispondi in italiano."}]
              }],
              "tools": [
                {
                  "googleSearch": {}
                }
              ]
            }' > response.json

          echo "=== RISPOSTA GREZZA DA GOOGLE ==="
          cat response.json
          echo ""

          echo "=== TESTO ESTRATTO ==="
          # Estrae solo la risposta testuale escludendo i blocchi di "thought" (pensiero)
          cat response.json | jq -r '.candidates[0].content.parts[] | select(.thought != true) | .text' || echo "Nessun testo finale estratto."

          echo ""
          echo "=== METADATI DI RICERCA (VERIFICA GROUNDING) ==="
          # Mostra i metadati di grounding generati nativamente da Google (query e fonti)
          cat response.json | jq '.candidates[0].groundingMetadata' || echo "Nessun metadato di grounding presente."
