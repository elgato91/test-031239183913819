              pass
          except Exception as e:
              print(f"Attenzione: controllo target orfani fallito ({e}), si prosegue "
                    f"solo con i falliti espliciti.")

          merged_failed.extend(target_orfani)
          unique_failed = list(dict.fromkeys(merged_failed))

          for i in range(1, 7):
              chunk = unique_failed[i-1::6]
              with open(f"/tmp/step2_queue_{i}.json", "w") as f:
                  json.dump(chunk, f)

          print(f"Code Step 2 distribuite con {len(unique_failed)} target da recuperare con CloakBrowser "
                f"({len(target_orfani)} recuperati dalla rete di sicurezza).")
          EOF
          python -u m2_step2_setup.py

      - name: Creazione Script Python - STEP 2 (Async + CloakBrowser Ottimizzato + nugget extraction)
        run: |
          cat << 'EOF' > m2_step2.py
          import asyncio
          import time
          import sys
          import random
          import os
          import json
          from urllib.parse import urlparse, parse_qs
          from cloakbrowser import launch_persistent_context_async
          from bs4 import BeautifulSoup
          from curl_cffi import requests as curl_requests
          from extraction_utils import html_to_clean_markdown
          from nugget_extractor import estrai_nuggets, scrivi_nuggets_jsonl, crea_pool_sicuro

          if len(sys.argv) < 2:
              sys.exit(1)
          node_id = int(sys.argv[1])
          INITIAL_PORT = 40000 + node_id

          NUGGET_CONCURRENCY = 5
          TARGET_TOPIC = os.environ.get("TARGET_TOPIC", "")

          NUGGETS_JSONL_PATH = f"nuggets_node_{node_id}_step2.jsonl"
          _jsonl_lock = asyncio.Lock()

          # Stessi indicatori usati in Step 1: la validazione va fatta sull'HTML
          # grezzo (o su get_text semplice), MAI sul markdown gia' ripulito da
          # html_to_clean_markdown, perche' lo stripping di nav/footer/header/form
          # e la rimozione dei link non validi alterano la lunghezza e il contenuto
          # del testo, producendo falsi positivi di "blocco" su pagine che in realta'
          # sono state scaricate correttamente.
          BLOCKING_INDICATORS = [
              "just a moment", "are you a robot", "prove your humanity",
              "captcha verification", "please enter in the characters you see below",
              "access is forbidden", "access to this page is forbidden", "challenge-platform",
              "we've detected unusual activity", "checking your browser",
              "security verification", "unusual traffic from your computer network"
          ]


          def carica_gemini_api_keys():
              keys = []
              primary = os.environ.get("GEMINI_API_KEY")
              if primary:
                  keys.append(primary)
              i = 2
              while True:
                  k = os.environ.get(f"GEMINI_API_KEY_{i}")
                  if not k:
                      break
                  keys.append(k)
                  i += 1
              return keys


          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p', 'find_desc']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default


          async def salva_nuggets(nuggets):
              if not nuggets:
                  return
              async with _jsonl_lock:
                  scrivi_nuggets_jsonl(nuggets, NUGGETS_JSONL_PATH)


          async def verify_proxy_active(port, max_retries=6, delay=5):
              """
              Stessa identica logica del check gia' presente in m2_step1.py.
              Nella pipeline stabile questo controllo mancava in Step 2, ma il
              timing tutto sincrono lo rendeva innocuo: il ritardo introdotto dal
              check bloccante in Step 1 (piu' i 6s di sleep fisso dopo il restart
              dei container) copriva quasi sempre la latenza di avvio di WARP.
              Con Step 1 reso asincrono e concorrente quel margine di sicurezza
              implicito e' sparito: senza questo check, CloakBrowser puo' provare
              ad aprire Chromium mentre il tunnel SOCKS5 del container non e'
              ancora up, causando ERR_PROXY_CONNECTION_FAILED al primo goto e la
              conseguente perdita silenziosa del nodo (nessun output, nessun
              errore "gestito": il processo muore prima del loop sui target).
              """
              test_session = curl_requests.AsyncSession(impersonate="chrome120")
              test_session.proxies = {"http": f"socks5h://127.0.0.1:{port}", "https": f"socks5h://127.0.0.1:{port}"}
              for tentativo in range(max_retries):
                  try:
                      resp = await test_session.get("https://api6.ipify.org?format=json", timeout=6)
                      if resp.status_code == 200:
                          await test_session.close()
                          return True
                  except Exception:
                      pass
                  print(f"[NODO {node_id}] Proxy non ancora pronto sulla porta {port}, "
                        f"tentativo {tentativo + 1}/{max_retries}...", flush=True)
                  await asyncio.sleep(delay)
              await test_session.close()
              return False


          def validate_html(html, url, status_code):
              """
              Validazione WAF/captcha identica nello spirito a quella di Step 1,
              ma eseguita sull'HTML grezzo scaricato dal browser (via page.content()),
              PRIMA di qualunque pulizia o conversione a markdown. La conversione a
              markdown resta un post-processing esclusivamente per l'output finale
              e non deve mai influenzare la decisione di successo/fallimento.
              """
              if status_code is not None and status_code >= 400:
                  return False, f"Blocco HTTP {status_code}"
              if not html or len(html.strip()) < 300:
                  return False, "HTML vuoto"

              soup = BeautifulSoup(html, "html.parser")
              text_grezzo = soup.get_text(separator=' ', strip=True)

              if len(text_grezzo) <= 150:
                  return False, "Contenuto insufficiente"

              low_text = text_grezzo.lower()
              for ind in BLOCKING_INDICATORS:
                  if ind in low_text:
                      return False, f"WAF/Captcha rilevato: {ind}"

              return True, ""


          async def main():
              queue_file = f"/tmp/step2_queue_{node_id}.json"
              if not os.path.exists(queue_file):
                  return

              with open(queue_file, "r") as f:
                  targets = json.load(f)

              if not targets:
                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                      f.write("")
                  return

              # --- FIX 1: health-check del proxy prima di avviare il browser ---
              if not await verify_proxy_active(INITIAL_PORT):
                  print(f"[NODO {node_id}] Proxy MAI diventato attivo sulla porta {INITIAL_PORT}. "
                        f"Nodo abortito, i target restano falliti.", flush=True)
                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                      f.write(f"\n{'#'*60}\nNODO {node_id} - STEP 2: proxy non disponibile, "
                               f"nodo abortito prima di iniziare\n{'#'*60}\n")
                  return

              # --- Init del pool Gemini in BACKGROUND, non bloccante ---
              # Stessa logica di m2_step1.py: l'init parte come task separato SUBITO
              # dopo il proxy check, ma il nodo non la aspetta. Il browser viene
              # avviato immediatamente dopo, esattamente ai tempi che avrebbe senza
              # nugget extraction. Il pool viene atteso solo dal primo nugget task
              # che ne avra' davvero bisogno, non dall'avvio del nodo.
              api_keys = carica_gemini_api_keys()
              pool_init_task = None
              if api_keys:
                  pool_init_task = asyncio.create_task(
                      crea_pool_sicuro(api_keys, node_id=node_id, label_step="step2")
                  )
              else:
                  print(f"[NODO {node_id}] Nessuna GEMINI_API_KEY trovata: nugget extraction disattivata.", flush=True)

              nugget_semaphore = asyncio.Semaphore(NUGGET_CONCURRENCY)
              nugget_retry_pool = []
              nugget_tasks = []

              async def lancia_nugget_task(url, testo_markdown):
                  if pool_init_task is None:
                      return

                  async def _run():
                      key_pool = await pool_init_task
                      if key_pool is None:
                          return

                      async with nugget_semaphore:
                          esito = await estrai_nuggets(
                              key_pool=key_pool,
                              source_url=url,
                              testo_markdown=testo_markdown,
                              topic=TARGET_TOPIC,
                              node_id=node_id
                          )
                      if esito is None:
                          nugget_retry_pool.append((url, testo_markdown))
                      else:
                          await salva_nuggets(esito)

                  nugget_tasks.append(asyncio.create_task(_run()))

              home_dir = os.path.expanduser("~")
              profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2")
              windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")

              base_args = [
                  "--no-sandbox",
                  "--disable-dev-shm-usage",
                  f"--fingerprint={random.randint(100000, 999999)}",
                  f"--fingerprint-fonts-dir={windows_fonts_dir}"
              ]

              results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 2 (Fallback)\n{'#'*60}\n"

              context = None
              print(f"[NODO {node_id}] Avvio singola sessione Persistente (Warmup + Scraping)...", flush=True)
              try:
                  # --- FIX 2: try/finally attorno a tutto il ciclo di vita del browser ---
                  # Se qualsiasi cosa fallisce dopo l'apertura del context (incluso il
                  # primissimo goto di warmup), il context viene comunque chiuso in modo
                  # esplicito prima che asyncio.run() chiuda il loop. Prima, un errore
                  # qui faceva "return" immediato lasciando Chromium e le sue pipe aperte,
                  # causando il "RuntimeError: Event loop is closed" nel __del__ del
                  # subprocess transport quando il garbage collector interveniva dopo
                  # la chiusura del loop.
                  try:
                      context = await launch_persistent_context_async(
                          profile_dir,
                          headless=False,
                          humanize=True,
                          human_config={"mistype_chance": 0.05, "typing_delay": 100, "idle_between_actions": True},
                          proxy=f"socks5://127.0.0.1:{INITIAL_PORT}",
                          geoip=True,
                          viewport={"width": 1920, "height": 1080},
                          args=base_args
                      )
                      page = await context.new_page()

                      await page.goto("https://www.google.com", wait_until="domcontentloaded", timeout=25000)
                      await asyncio.sleep(2)
                      await page.goto("https://www.reddit.com", wait_until="domcontentloaded", timeout=25000)
                      await asyncio.sleep(2)

                  except Exception as e:
                      print(f"[NODO {node_id}] Errore critico avvio Browser: {e}", flush=True)
                      with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                          f.write(f"\n{'#'*60}\nNODO {node_id} - STEP 2: errore critico avvio browser: {e}\n{'#'*60}\n")
                      return

                  for url in targets:
                      print(f"[NODO {node_id}] Recupero Avanzato: {url}", flush=True)
                      try:
                          query_to_search = get_query_from_url(url)

                          if "bing.com" in url:
                              await page.goto("https://www.bing.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.5, 4.0))
                              try:
                                  search_box = page.locator("textarea[name='q'], input[name='q']").first
                                  await search_box.fill(query_to_search)
                                  await page.keyboard.press("Enter")
                              except Exception:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                          elif "startpage.com" in url:
                              await page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.0, 3.5))
                              try:
                                  search_box = page.locator("input#q").first
                                  await search_box.fill(query_to_search)
                                  await page.keyboard.press("Enter")
                              except Exception:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                          elif "html.duckduckgo.com" in url:
                              await page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                              await asyncio.sleep(random.uniform(2.0, 3.5))
                              try:
                                  search_box = page.locator("input[name=q]").first
                                  await search_box.fill(query_to_search)
                                  await page.keyboard.press("Enter")
                              except Exception:
                                  await page.goto(url, wait_until="domcontentloaded", timeout=35000)

                          else:
                              await page.goto(url, wait_until="domcontentloaded", timeout=40000)

                          try:
                              await page.wait_for_load_state("networkidle", timeout=12000)
                          except Exception:
                              pass

                          await asyncio.sleep(6)

                          await page.keyboard.press("PageDown")
                          await asyncio.sleep(1)
                          await page.keyboard.press("PageDown")
                          await asyncio.sleep(2)

                          raw_html = await page.content()
                          current_url = page.url

                          # --- FIX 3: validazione sull'HTML grezzo, non sul markdown ---
                          is_ok, err_msg = validate_html(raw_html, current_url, None)

                          if is_ok:
                              text_for_output = html_to_clean_markdown(raw_html, current_url)
                              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO ESTRATTO:\n{text_for_output}\n"
                              print(f"[NODO {node_id}] -> Recuperato con Successo!", flush=True)

                              await lancia_nugget_task(url, text_for_output)
                          else:
                              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nFALLITO ({err_msg})\n"
                              print(f"[NODO {node_id}] -> Fallito: {err_msg}", flush=True)

                      except Exception as e:
                          print(f"[NODO {node_id}] -> Errore esecuzione: {e}", flush=True)
                          results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nERRORE: {e}\n"

                      await asyncio.sleep(random.uniform(4.0, 7.0))

                  with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                      f.write(results)

                  if nugget_tasks:
                      print(f"[NODO {node_id}] Attesa completamento {len(nugget_tasks)} chiamate nugget in volo...", flush=True)
                      await asyncio.gather(*nugget_tasks, return_exceptions=True)

                  # Stesso ragionamento di m2_step1.py: qui il pool e' gia' risolto.
                  key_pool_finale = await pool_init_task if pool_init_task is not None else None

                  if nugget_retry_pool and key_pool_finale is not None:
                      print(f"[NODO {node_id}] Retry nugget extraction su {len(nugget_retry_pool)} target falliti...", flush=True)
                      retry_tasks = []
                      for url, testo_markdown in nugget_retry_pool:
                          async def _retry(url=url, testo_markdown=testo_markdown):
                              async with nugget_semaphore:
                                  esito = await estrai_nuggets(
                                      key_pool=key_pool_finale,
                                      source_url=url,
                                      testo_markdown=testo_markdown,
                                      topic=TARGET_TOPIC,
                                      node_id=node_id
                                  )
                              if esito:
                                  await salva_nuggets(esito)
                              else:
                                  print(f"[NODO {node_id}] [NUGGET] Retry fallito definitivamente su {url}", flush=True)
                          retry_tasks.append(asyncio.create_task(_retry()))
                      await asyncio.gather(*retry_tasks, return_exceptions=True)

                  print(f"[NODO {node_id}] STEP 2 completato. Nugget salvati in {NUGGETS_JSONL_PATH}", flush=True)

              finally:
                  # Chiusura esplicita e garantita del context, qualunque cosa succeda
                  # sopra (successo, eccezione, return anticipato). Questo e' il pezzo
                  # che mancava ed e' la causa diretta del RuntimeError sul loop chiuso.
                  if context is not None:
                      try:
                          await context.close()
                      except Exception:
                          pass


          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Scraping Parallelo - STEP 2 (Fallback CloakBrowser)
        if: always()
        run: |
          echo 'Avvio processi paralleli per STEP 2 sui target falliti...'
          touch node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log
          tail -q -f node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            python -u m2_step2.py $i > node${i}_step2.log 2>&1 &
            PIDS+=($!)
            sleep 1.5
          done

          wait "${PIDS[@]}"
          kill $TAIL_PID || true
          
          for i in {1..6}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

          touch output_node_1_step1.txt output_node_1_step2.txt \
                output_node_2_step1.txt output_node_2_step2.txt \
                output_node_3_step1.txt output_node_3_step2.txt \
                output_node_4_step1.txt output_node_4_step2.txt \
                output_node_5_step1.txt output_node_5_step2.txt \
                output_node_6_step1.txt output_node_6_step2.txt

          cat output_node_1_step1.txt output_node_1_step2.txt \
              output_node_2_step1.txt output_node_2_step2.txt \
              output_node_3_step1.txt output_node_3_step2.txt \
              output_node_4_step1.txt output_node_4_step2.txt \
              output_node_5_step1.txt output_node_5_step2.txt \
              output_node_6_step1.txt output_node_6_step2.txt > output_macchina2_cdp.txt

      - name: Merge Nugget Finale (JSONL -> JSON strutturato deduplicato)
        if: always()
        run: |
          cat << 'EOF' > merge_nuggets.py
          import json
          import os
          import glob

          # Cerca TUTTI i file nuggets_node_*_step*.jsonl presenti nella working
          # directory, indipendentemente da quanti nodi/step siano effettivamente
          # arrivati alla fine. Questo rende il merge resiliente anche a
          # interruzioni parziali del job: se il job muore a meta', questo script
          # recupera comunque tutto cio' che era stato scritto fino a quel momento.
          jsonl_files = sorted(glob.glob("nuggets_node_*_step*.jsonl"))

          merged_nuggets = []
          per_node_stats = {}

          for filename in jsonl_files:
              count = 0
              corrotte = 0
              try:
                  with open(filename, "r", encoding="utf-8") as f:
                      for riga in f:
                          riga = riga.strip()
                          if not riga:
                              continue
                          try:
                              nugget = json.loads(riga)
                              merged_nuggets.append(nugget)
                              count += 1
                          except json.JSONDecodeError:
                              # Riga scritta a meta' (es. processo interrotto durante
                              # il flush): la scartiamo senza far fallire tutto il merge.
                              corrotte += 1
              except Exception as e:
                  print(f"Errore lettura {filename}: {e}", flush=True)

              label = filename.replace("nuggets_node_", "").replace(".jsonl", "")
              per_node_stats[label] = count
              if corrotte:
                  print(f"{filename}: {corrotte} riga/e corrotta/e scartata/e", flush=True)

          # Deduplica su (fact, source_url) normalizzati
          seen = set()
          nuggets_deduplicati = []
          for n in merged_nuggets:
              fact_norm = (n.get("fact") or "").strip().lower()
              url_norm = (n.get("source_url") or "").strip().lower()
              key = (fact_norm, url_norm)
              if key in seen:
                  continue
              seen.add(key)
              nuggets_deduplicati.append(n)

          confidence_counts = {"high": 0, "medium": 0, "low": 0}
          for n in nuggets_deduplicati:
              c = n.get("confidence", "low")
              if c in confidence_counts:
                  confidence_counts[c] += 1

          output_finale = {
              "stats": {
                  "file_jsonl_trovati": len(jsonl_files),
                  "totale_nugget_grezzi": len(merged_nuggets),
                  "totale_nugget_deduplicati": len(nuggets_deduplicati),
                  "per_nodo": per_node_stats,
                  "per_confidence": confidence_counts
              },
              "nuggets": nuggets_deduplicati
          }

          with open("nuggets_finale.json", "w", encoding="utf-8") as f:
              json.dump(output_finale, f, indent=2, ensure_ascii=False)

          print(f"Merge completato: {len(nuggets_deduplicati)} nugget unici "
                f"(da {len(merged_nuggets)} grezzi, {len(jsonl_files)} file letti) "
                f"salvati in nuggets_finale.json", flush=True)
          print(f"Distribuzione confidence: {confidence_counts}", flush=True)
          EOF
          python -u merge_nuggets.py

      - name: Upload Artifact Macchina 2 (Testo Grezzo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt

      - name: Upload Artifact Nugget (JSON Strutturato)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nuggets_Macchina2
          path: nuggets_finale.json
