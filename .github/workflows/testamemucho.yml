name: Test Gemma 4 31B con Google Search

on:
  workflow_dispatch:

jobs:
  test-grounding:
    runs-on: ubuntu-latest
    steps:
      - name: Chiamata con Grounding a Gemma 4 31B
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "Errore: GOOGLE_API_KEY non è configurata nei Secrets."
            exit 1
          fi

          echo "Invio richiesta a gemma-4-31b-it con Google Search Grounding abilitato..."

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            "https://generativelanguage.googleapis.com/v1beta/models/gemma-4-31b-it:generateContent?key=${GOOGLE_API_KEY}" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d '{
              "contents": [{
                "parts":[{"text": "Quali sono le ultime notizie meteo di oggi per Milano? Rispondi in italiano in modo sintetico."}]
              }],
              "tools": [
                {
                  "googleSearch": {}
                }
              ]
            }')

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Richiesta completata con successo!"
          else
            echo "Errore server Google ($HTTP_STATUS)."
            cat response.json
            exit 1
          fi

          echo "=== RISPOSTA FINALE ESTRATTA ==="
          cat response.json | jq -r '.candidates[0].content.parts[] | select(.thought != true) | .text'
          echo ""

          echo "=== FONTI E QUERY UTILIZZATE (GROUNDING METADATA) ==="
          # Estrae i metadati di ricerca (le query inviate a Google e i siti web consultati)
          cat response.json | jq '.candidates[0].groundingMetadata'
