name: Test Gemma 4 26B

on:
  workflow_dispatch: # Ti permette di avviarlo manualmente dalla tab "Actions" su GitHub

jobs:
  test-gemma4:
    runs-on: ubuntu-latest
    steps:
      - name: Invia prompt a Gemma 4 26B
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "Errore: GOOGLE_API_KEY non è configurata nei Secrets del repository."
            exit 1
          fi

          echo "Inizio chiamata a gemma-4-26b-a4b-it..."

          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemma-4-26b-a4b-it:generateContent?key=${GOOGLE_API_KEY}" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d '{
              "contents": [{
                "parts":[{"text": "Ciao Gemma 4! Rispondi con un brevissimo saluto di test in italiano."}]
              }]
            }' > response.json

          # Mostra la risposta JSON grezza ricevuta dalle API
          echo "=== RISPOSTA API ==="
          cat response.json
          echo ""

          # Opzionale: estrae solo il testo della risposta se è installato jq (preinstallato sui runner GitHub)
          echo "=== TESTO ESTRATTO ==="
          cat response.json | jq -r '.candidates[0].content.parts[0].text' || echo "Impossibile formattare la risposta."
