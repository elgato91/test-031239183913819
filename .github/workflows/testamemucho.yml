name: Test Gemini 3.1 Flash Live con Grounding

on:
  workflow_dispatch:

jobs:
  test-live-grounding:
    runs-on: ubuntu-latest
    steps:
      - name: Chiamata a Gemini 3.1 Flash Live con Search Grounding
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Errore: GEMINI_API_KEY non è impostata nei Secrets."
            exit 1
          fi

          echo "Inizio chiamata nativa a gemini-3.1-flash-live-preview con Google Search..."

          # Chiamata API ufficiale con il modello Gemini 3.1 Flash Live e Google Search Grounding attivo
          curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-live-preview:generateContent?key=${GEMINI_API_KEY}" \
            -H 'Content-Type: application/json' \
            -X POST \
            -d '{
              "contents": [{
                "parts":[{"text": "Quali sono le ultime notizie più importanti di oggi nel mondo? Rispondi in italiano in modo molto sintetico."}]
              }],
              "tools": [
                {
                  "googleSearch": {}
                }
              ]
            }' > response.json

          echo "=== RISPOSTA GREZZA DA GOOGLE ==="
          cat response.json
          echo ""

          echo "=== TESTO ESTRATTO ==="
          # Estrae la risposta finale escludendo i blocchi di "thought" se presenti
          cat response.json | jq -r '.candidates[0].content.parts[] | select(.thought != true) | .text' || echo "Nessun testo finale estratto."

          echo ""
          echo "=== METADATI DI RICERCA (VERIFICA GROUNDING) ==="
          # Mostra i metadati reali del grounding (query effettuate e fonti consultate)
          cat response.json | jq '.candidates[0].groundingMetadata' || echo "Nessun metadato di grounding presente."
