name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS PER CLOAKBROWSER
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 1 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          echo "Avvio container warproxy-1 sulla porta $PORT..."
          docker run --name warproxy-1 \
            --network host \
            -e SOCKS5_PORT=$PORT \
            -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          echo "Attesa inizializzazione del tunnel..."
          sleep 5

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          PORT=40001
          echo "=================================================="
          echo "VERIFICA E AUTO-HEALING CONTAINER 1 (PORTA $PORT):"
          
          SUCCESS=false
          for tentativo in {1..5}; do
            echo "Tentativo $tentativo/5..."
            IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json)
            
            if [ $? -eq 0 ] && [ ! -z "$IP" ]; then
              echo "Container 1 pronto! IP: $IP"
              SUCCESS=true
              break
            else
              echo "Container 1 non risponde. Riavvio in corso..."
              docker restart warproxy-1
              sleep 5
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "ERRORE CRITICO: Il container 1 non è raggiungibile dopo 5 riavvii."
            exit 1
          fi
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Creazione script Python (Estrazione via Google Search Modal)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import os
          import re
          import json
          from cloakbrowser import launch_persistent_context

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          # --- CONFIGURAZIONE CLOAKBROWSER ---
          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}")

          extra_args_base = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          # --- METODO PRINCIPALE: BYPASS VIA GOOGLE SEARCH ---
          def estrai_recensioni_via_search(page, query, max_recensioni=50):
              # 1. Carichiamo Google Search invece di Maps per aggirare la "Limited View" del 2026
              search_url = f"https://www.google.com/search?q={query.replace(' ', '+')}&hl=it"
              print(f"[NODO {node_id}] Navigazione su Google Search: {search_url}", flush=True)
              
              page.set_default_navigation_timeout(90000)
              page.set_default_timeout(90000)
              
              # Impediamo il caricamento di immagini superflue per velocizzare l'esecuzione
              def block_heavy_assets(route):
                  url = route.request.url.lower()
                  if any(ext in url for ext in [".png", ".jpg", ".jpeg", ".webp", ".svg", ".gif", "/vt/", "/cbk", "/kh"]):
                      route.abort()
                  else:
                      route.continue_()
              page.route("**/*", block_heavy_assets)
              
              page.goto(search_url, wait_until="commit", timeout=90000)
              time.sleep(5)
              
              # Gestione del Cookie Consent di Google se presente
              try:
                  consent_btn = page.locator("button:has-text('Accetta tutto'), button:has-text('Accept all')").first
                  if consent_btn.is_visible(timeout=5000):
                      consent_btn.click()
                      time.sleep(3)
              except Exception:
                  pass
                  
              # 2. Individuiamo il link delle recensioni nel Knowledge Graph di destra
              # Utilizziamo l'attributo stabile 'data-async-trigger' che Google Search usa per far apparire il modal delle recensioni
              review_trigger = page.locator("a[data-async-trigger^='reviewSort'], a:has-text('recensioni'), a:has-text('reviews')").first
              review_trigger.wait_for(state="visible", timeout=20000)
              print(f"[NODO {node_id}] Trovato link recensioni su Search. Clicco per aprire il modal...", flush=True)
              review_trigger.click()
              
              # 3. Attendiamo l'apertura del modal delle recensioni (.gws-localreviews__google-review)
              print(f"[NODO {node_id}] Attendo il caricamento delle recensioni nel modal...", flush=True)
              page.wait_for_selector(".gws-localreviews__google-review", timeout=20000)
              
              # Identifichiamo il panel scrollabile e la prima card visibile
              first_card = page.locator(".gws-localreviews__google-review").first
              first_card.hover()
              
              recensioni_estratte = {}
              iterazioni_senza_novita = 0
              ciclo = 0
              
              print(f"[NODO {node_id}] Avvio loop di scorrimento del modal...", flush=True)
              
              while len(recensioni_estratte) < max_recensioni and iterazioni_senza_novita < 15:
                  ciclo += 1
                  # Seleziona tutte le card recensione attualmente renderizzate nel modal di Search
                  cards = page.locator(".gws-localreviews__google-review").all()
                  nuovi_elementi_trovati = 0
                  
                  for card in cards:
                      try:
                          # Creiamo una chiave unica robusta combinando il nome dell'autore con i primi caratteri del testo
                          autore_el = card.locator(".TSv7un, .d470gc, [class*='name']").first
                          autore = autore_el.inner_text(timeout=1000) if autore_el.count() > 0 else "Utente Google"
                          
                          # Espandiamo il testo lungo ("Altro") se presente
                          altro_btn = card.locator("button:has-text('Altro'), button:has-text('More')").first
                          if altro_btn.is_visible(timeout=300):
                              altro_btn.click()
                              time.sleep(0.1)
                              
                          testo_el = card.locator(".wiI7pd, [class*='text']").first
                          testo_completo = testo_el.inner_text(timeout=1000) if testo_el.count() > 0 else ""
                          
                          review_id = f"id_{hash(autore + testo_completo[:30])}"
                          
                          if review_id not in recensioni_estratte:
                              stelle_el = card.locator("span[aria-label*='stelle'], span[aria-label*='star']").first
                              stelle = stelle_el.get_attribute("aria-label", timeout=1000) or "N/D" if stelle_el.count() > 0 else "N/D"
                              
                              recensioni_estratte[review_id] = {
                                  "autore": autore,
                                  "testo": testo_completo,
                                  "stelle": stelle
                              }
                              nuovi_elementi_trovati += 1
                              
                              if len(recensioni_estratte) >= max_recensioni:
                                  break
                      except Exception:
                          continue
                          
                  if nuovi_elementi_trovati > 0:
                      iterazioni_senza_novita = 0
                      print(f"[NODO {node_id}] [Ciclo {ciclo}] Scaricate {nuovi_elementi_trovati} nuove recensioni. Totale: {len(recensioni_estratte)}", flush=True)
                  else:
                      iterazioni_senza_novita += 1
                      print(f"[NODO {node_id}] [Ciclo {ciclo}] Nessun elemento rilevato. Tentativi a vuoto: {iterazioni_senza_novita}/15", flush=True)
                      
                  # Scroll fisico della rotellina del mouse sopra il pannello del modal per forzare il caricamento
                  try:
                      last_card = page.locator(".gws-localreviews__google-review").last
                      last_card.hover(timeout=2000)
                      page.mouse.wheel(0, 800)
                  except Exception:
                      page.keyboard.press("PageDown")
                      
                  time.sleep(random.uniform(1.5, 2.2))
                  
              return list(recensioni_estratte.values())

          # --- RUN PRINCIPALE ---
          try:
              context = launch_persistent_context(
                  profile_dir,
                  headless=False,
                  humanize=True,
                  human_config={
                      "typing_delay": 100,
                      "mistype_chance": 0.02,
                      "idle_between_actions": True
                  },
                  proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
                  geoip=True,
                  viewport={"width": 1920, "height": 1080},
                  args=extra_args_base
              )

              page = context.new_page()
              ricerca_target = "Coro Orvieto"
              
              # Avviamo l'estrazione bypassando la Limited View di Maps
              recensioni = estrai_recensioni_via_search(page, ricerca_target, max_recensioni=50)
              
              # Salvataggio su file
              output_file = f"output_node_{node_id}.txt"
              with open(output_file, "w", encoding="utf-8") as f:
                  f.write(json.dumps(recensioni, indent=4, ensure_ascii=False))
                  
              print(f"[NODO {node_id}] Esecuzione terminata. Salvate {len(recensioni)} recensioni.", flush=True)
              
              page.close()
              context.close()

          except Exception as e:
              print(f"[NODO {node_id}] Errore critico nel processo: {e}", flush=True)
              with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
                  f.write(f"ERRORE CRITICO: {e}\n")
          EOF

      - name: Esecuzione Scraping Singolo Nodo
        run: |
          echo "Avvio processo su un singolo nodo (Nodo 1)..."
          python -u m2_insocket.py 1
          
          # Consolidamento dell'output per l'artifact
          touch output_node_1.txt
          cat output_node_1.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
