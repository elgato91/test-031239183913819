name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Dipendenze Leggere (No Browser/No UI)
        run: |
          sudo apt-get update
          # Installiamo solo le librerie Python per HTTP, SOCKS5 e parsing HTML
          pip install beautifulsoup4 requests "requests[socks]"

      - name: Setup 1 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          echo "Avvio container warproxy-1 sulla porta $PORT..."
          docker run --name warproxy-1 \
            --network host \
            -e SOCKS5_PORT=$PORT \
            -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          echo "Attesa inizializzazione del tunnel..."
          sleep 5

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          PORT=40001
          echo "=================================================="
          echo "VERIFICA E AUTO-HEALING CONTAINER 1 (PORTA $PORT):"
          
          SUCCESS=false
          for tentativo in {1..5}; do
            echo "Tentativo $tentativo/5..."
            IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json)
            
            if [ $? -eq 0 ] && [ ! -z "$IP" ]; then
              echo "Container 1 pronto! IP: $IP"
              SUCCESS=true
              break
            else
              echo "Container 1 non risponde. Riavvio in corso..."
              docker restart warproxy-1
              sleep 5
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "ERRORE CRITICO: Il container 1 non è raggiungibile dopo 5 riavvii."
            exit 1
          fi
          echo "=================================================="

      - name: Creazione script Python (Protocol Emulation - async/reviewSort)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import os
          import re
          import json
          import requests
          from bs4 import BeautifulSoup

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          # Configurazione del proxy locale fornito dal tuo container Docker
          PROXIES = {
              "http": f"socks5h://127.0.0.1:{ACTIVE_PORT}",
              "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"
          }

          # User-Agent standard per evitare blocchi immediati su richieste socket
          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept-Language": "it-IT,it;q=0.9,en-US;q=0.8,en;q=0.7"
          }

          def estrai_feature_id(query):
              """Esegue una ricerca rapida su Google ed estrae il data-cid (ludocid) del locale."""
              search_url = "https://www.google.com/search"
              params = {"q": query, "hl": "it"}
              
              print(f"[NODO {node_id}] Risoluzione entità per: '{query}'...", flush=True)
              response = requests.get(search_url, headers=HEADERS, params=params, proxies=PROXIES, timeout=15)
              
              if response.status_code != 200:
                  raise ConnectionError(f"Impossibile contattare Google Search (Status: {response.status_code})")
              
              # Cerchiamo il pattern del data-cid / ludocid nel sorgente HTML
              match_cid = re.search(r'data-cid="([0-9]+)"', response.text)
              if not match_cid:
                  match_cid = re.search(r'data-ludocid="([0-9]+)"', response.text)
                  
              if match_cid:
                  feature_id = match_cid.group(1)
                  print(f"[NODO {node_id}] Entità risolta con successo. Feature ID (CID): {feature_id}", flush=True)
                  return feature_id
              else:
                  raise ValueError("Impossibile trovare il Feature ID (CID) per questa attività commerciale.")

          def scarica_recensioni_protocollo(feature_id, max_recensioni=50):
              """Interroga direttamente l'endpoint AJAX delle recensioni ed esegue il parsing."""
              recensioni_estratte = []
              start_index = 0
              ciclo = 0
              
              print(f"[NODO {node_id}] Avvio estrazione tramite protocollo HTTP/REST...", flush=True)
              
              while len(recensioni_estratte) < max_recensioni:
                  ciclo += 1
                  # Endpoint interno AJAX di Google per il sorting e la paginazione delle recensioni
                  ajax_url = "https://www.google.com/async/reviewSort"
                  
                  # Parametri strutturati richiesti dal protocollo di Google
                  params = {
                      "yv": "3",
                      "async": f"feature_id:{feature_id},_id:reviewSort,_p:true,menu:true,sort_by:qualityScore,start_index:{start_index},_fmt:pc"
                  }
                  
                  response = requests.get(ajax_url, headers=HEADERS, params=params, proxies=PROXIES, timeout=15)
                  
                  if response.status_code != 200:
                      print(f"[NODO {node_id}] Errore durante la paginazione all'indice {start_index}.", flush=True)
                      break
                      
                  soup = BeautifulSoup(response.text, 'html.parser')
                  
                  # Le recensioni all'interno di questo frammento HTML sono racchiuse in div con classe 'gws-localreviews__google-review'
                  review_elements = soup.find_all(class_="gws-localreviews__google-review")
                  
                  if not review_elements:
                      print(f"[NODO {node_id}] Nessun elemento trovato all'indice {start_index}. Fine delle recensioni disponibili.", flush=True)
                      break
                      
                  nuove_estratte_ciclo = 0
                  for el in review_elements:
                      try:
                          # Estrazione autore con fallback non bloccanti
                          autore_tag = el.find(class_="TSv7un") or el.find(class_="d470gc")
                          autore = autore_tag.get_text(strip=True) if autore_tag else "Utente Google"
                          
                          # Estrazione testo con fallback
                          testo_tag = el.find(class_="wiI7pd")
                          testo = testo_tag.get_text(strip=True) if testo_tag else ""
                          
                          # Estrazione valutazione (stelle)
                          stelle_tag = el.find(class_="kv731") or el.find(attrs={"aria-label": True})
                          stelle = stelle_tag["aria-label"] if stelle_tag else "N/D"
                          
                          recensioni_estratte.append({
                              "autore": autore,
                              "testo": testo,
                              "stelle": stelle
                          })
                          nuove_estratte_ciclo += 1
                          
                          if len(recensioni_estratte) >= max_recensioni:
                              break
                      except Exception:
                          continue
                          
                  print(f"[NODO {node_id}] [Ciclo {ciclo}] Scaricate {nuove_estratte_ciclo} nuove recensioni. Totale in memoria: {len(recensioni_estratte)}", flush=True)
                  
                  # Google impagina le recensioni a blocchi di 10
                  start_index += 10
                  
                  # Leggera pausa casuale per simulare intervalli di rete standard
                  time.sleep(random.uniform(0.5, 1.2))
                  
              return recensioni_estratte

          # --- FLUSSO PRINCIPALE ---
          try:
              ricerca_target = "Coro Orvieto"
              
              # 1. Risoluzione dell'ID
              f_id = estrai_feature_id(ricerca_target)
              
              # 2. Estrazione diretta dei payload
              recensioni = scarica_recensioni_protocollo(f_id, max_recensioni=50)
              
              # 3. Salvataggio dell'output strutturato
              output_file = f"output_node_{node_id}.txt"
              with open(output_file, "w", encoding="utf-8") as f:
                  f.write(json.dumps(recensioni, indent=4, ensure_ascii=False))
                  
              print(f"[NODO {node_id}] Task completata! Salvate {len(recensioni)} recensioni.", flush=True)

          except Exception as e:
              print(f"[NODO {node_id}] Errore nel protocollo: {e}", flush=True)
              with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
                  f.write(f"ERRORE CRITICO: {e}\n")
          EOF

      - name: Esecuzione Scraping Singolo Nodo (In-Socket)
        run: |
          echo "Avvio processo su un singolo nodo (Nodo 1)..."
          # Eseguiamo lo script direttamente. L'output a terminale sarà istantaneo.
          python -u m2_insocket.py 1
          
          # Consolidamento dell'output per l'artifact
          touch output_node_1.txt
          cat output_node_1.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
