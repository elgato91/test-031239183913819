name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS PER CLOAKBROWSER
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 1 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          echo "Avvio container warproxy-1 sulla porta $PORT..."
          docker run --name warproxy-1 \
            --network host \
            -e SOCKS5_PORT=$PORT \
            -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          echo "Attesa inizializzazione del tunnel..."
          sleep 5

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          PORT=40001
          echo "=================================================="
          echo "VERIFICA E AUTO-HEALING CONTAINER 1 (PORTA $PORT):"
          
          SUCCESS=false
          for tentativo in {1..5}; do
            echo "Tentativo $tentativo/5..."
            IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json)
            
            if [ $? -eq 0 ] && [ ! -z "$IP" ]; then
              echo "Container 1 pronto! IP: $IP"
              SUCCESS=true
              break
            else
              echo "Container 1 non risponde. Riavvio in corso..."
              docker restart warproxy-1
              sleep 5
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "ERRORE CRITICO: Il container 1 non è raggiungibile dopo 5 riavvii."
            exit 1
          fi
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Creazione script Python (In-Context API Fetching con Iframe Detection)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import os
          import re
          import json
          from cloakbrowser import launch_persistent_context
          from bs4 import BeautifulSoup

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          # --- CONFIGURAZIONE CLOAKBROWSER ---
          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}")

          extra_args_base = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          # --- METODO 1: RICERCA E RISOLUZIONE CID ---
          def esegui_ricerca_e_risolvi_cid(page, query):
              """Esegue la ricerca e recupera il data-cid (ludocid) dopo il reindirizzamento."""
              search_url = f"https://www.google.com/maps/search/{query.replace(' ', '+')}"
              print(f"[NODO {node_id}] Navigazione per ricerca diretta su: {search_url}", flush=True)
              
              page.set_default_navigation_timeout(90000)
              page.set_default_timeout(90000)
              
              # Ottimizzazione di rete: blocchiamo immagini e tile geografici
              def block_heavy_assets(route):
                  url = route.request.url.lower()
                  if any(ext in url for ext in [".png", ".jpg", ".jpeg", ".webp", ".svg", ".gif", "/vt/", "/cbk", "/kh"]):
                      route.abort()
                  else:
                      route.continue_()
                      
              page.route("**/*", block_heavy_assets)
              page.goto(search_url, wait_until="commit", timeout=90000)
              
              time.sleep(6)
              
              # Gestione del Cookie Consent di Google se presente
              try:
                  consent_btn = page.locator("button:has-text('Accetta tutto'), button:has-text('Accept all')").first
                  if consent_btn.is_visible(timeout=5000):
                      consent_btn.click()
                      time.sleep(3)
              except Exception:
                  pass

              # Gestione della disambiguazione (se compare l'elenco dei risultati)
              risultati_ricerca = page.locator("a[href*='/maps/place/']")
              if risultati_ricerca.count() > 0:
                  print(f"[NODO {node_id}] Rilevato elenco. Clicco sul primo risultato...", flush=True)
                  risultati_ricerca.first.click()
                  time.sleep(5)
              else:
                  print(f"[NODO {node_id}] Scheda aperta direttamente.", flush=True)

              # Attendiamo che l'URL si stabilizzi sul reindirizzamento definitivo (/maps/place/...)
              try:
                  page.wait_for_url("**/maps/place/**", timeout=25000)
                  print(f"[NODO {node_id}] Reindirizzamento completato: {page.url}", flush=True)
              except Exception:
                  print(f"[NODO {node_id}] Timeout attesa URL place. URL attuale: {page.url}", flush=True)

              # Tentativo 1 (Il più stabile): Estrazione del CID convertendo la coordinata esadecimale dall'URL di Maps
              cid = None
              current_url = page.url
              match = re.search(r"0x[a-fA-F0-9]+:0x([a-fA-F0-9]+)", current_url)
              if match:
                  try:
                      cid = str(int(match.group(1), 16))
                      print(f"[NODO {node_id}] CID risolto via conversione esadecimale URL.", flush=True)
                  except Exception:
                      pass
              
              # Tentativo 2: Cerca attributi data-cid o data-ludocid nel DOM
              if not cid:
                  cid = page.evaluate('''() => {
                      const el = document.querySelector('[data-cid], [data-ludocid]');
                      if (el) {
                          return el.getAttribute('data-cid') || el.getAttribute('data-ludocid');
                      }
                      const link = document.querySelector('a[href*="cid="]');
                      if (link) {
                          const url = new URL(link.href);
                          return url.searchParams.get("cid");
                      }
                      return null;
                  }''')
                  if cid:
                      print(f"[NODO {node_id}] CID risolto via attributo DOM.", flush=True)

              # Tentativo 3: Scansione regex dell'HTML interno di base
              if not cid:
                  html = page.content()
                  match_html = re.search(r'data-cid="([0-9]+)"', html)
                  if match_html:
                      cid = match_html.group(1)
                      print(f"[NODO {node_id}] CID risolto via regex HTML.", flush=True)

              print(f"[NODO {node_id}] Risultato risoluzione CID: {cid}", flush=True)
              return cid

          # --- METODO 2: IN-CONTEXT API FETCHING ---
          def estrai_recensioni_in_context(page, feature_id, max_recensioni=50):
              """Effettua le chiamate fetch all'endpoint AJAX ereditando la sessione reale del browser."""
              # 1. Clicchiamo sul tab delle recensioni usando il ruolo semantico ARIA tab, molto più stabile
              tab_recensioni = page.locator("button[role='tab']:has-text('Recensioni'), button[role='tab']:has-text('Reviews')").first
              
              if tab_recensioni.is_visible(timeout=8000):
                  print(f"[NODO {node_id}] Clicco sul tab Recensioni...", flush=True)
                  tab_recensioni.click()
              else:
                  review_tab = page.locator("button[aria-label*='recensioni'], button[aria-label*='Reviews'], div.F7nice button").first
                  review_tab.wait_for(state="visible", timeout=15000)
                  print(f"[NODO {node_id}] Clicco sul pulsante recensioni di ripiego...", flush=True)
                  review_tab.click()

              time.sleep(5)

              # SCANSIONE DEGLI IFRAME: Identifichiamo il contesto di lavoro corretto.
              # Se le recensioni sono caricate in un iframe, effettueremo le chiamate in quel contesto.
              work_context = page
              for frame in page.frames:
                  try:
                      if frame.locator(".jftiEf").count() > 0:
                          work_context = frame
                          print(f"[NODO {node_id}] Rilevato iframe dedicato per le recensioni! Sposto il contesto di esecuzione.", flush=True)
                          break
                  except Exception:
                      continue

              recensioni_estratte = []
              start_index = 0
              ciclo = 0
              
              print(f"[NODO {node_id}] Inizio fetch asincroni all'interno del contesto di lavoro...", flush=True)
              
              while len(recensioni_estratte) < max_recensioni:
                  ciclo += 1
                  ajax_url = f"https://www.google.com/async/reviewSort?yv=3&async=feature_id:{feature_id},_id:reviewSort,_p:true,menu:true,sort_by:qualityScore,start_index:{start_index},_fmt:pc"
                  
                  # Chiamata fetch ereditando la sessione reale del browser
                  print(f"[NODO {node_id}] [Ciclo {ciclo}] Chiamata fetch per indice {start_index}...", flush=True)
                  try:
                      html_chunk = work_context.evaluate("""async (url) => {
                          try {
                              const response = await fetch(url);
                              return await response.text();
                          } catch (e) {
                              return "ERRORE: " + e.message;
                          }
                      }""", ajax_url)
                      
                      if html_chunk.startswith("ERRORE:"):
                          print(f"[NODO {node_id}] Errore nel fetch browser-side: {html_chunk}", flush=True)
                          break
                          
                      soup = BeautifulSoup(html_chunk, 'html.parser')
                      review_elements = soup.find_all(class_="gws-localreviews__google-review")
                      
                      if not review_elements:
                          print(f"[NODO {node_id}] Nessun elemento trovato nel chunk. Fine.", flush=True)
                          break
                          
                      nuove_estratte = 0
                      for el in review_elements:
                          autore_tag = el.find(class_="TSv7un") or el.find(class_="d470gc")
                          autore = autore_tag.get_text(strip=True) if autore_tag else "Utente Google"
                          
                          testo_tag = el.find(class_="wiI7pd")
                          testo = testo_tag.get_text(strip=True) if testo_tag else ""
                          
                          stelle_tag = el.find(class_="kv731") or el.find(attrs={"aria-label": True})
                          stelle = stelle_tag["aria-label"] if stelle_tag else "N/D"
                          
                          recensioni_estratte.append({
                              "autore": autore,
                              "testo": testo,
                              "stelle": stelle
                          })
                          nuove_estratte += 1
                          
                          if len(recensioni_estratte) >= max_recensioni:
                              break
                              
                      print(f"[NODO {node_id}] [Ciclo {ciclo}] Elaborate {nuove_estratte} recensioni. Totale: {len(recensioni_estratte)}", flush=True)
                      
                      start_index += 10
                      time.sleep(random.uniform(0.3, 0.8))
                      
                  except Exception as e:
                      print(f"[NODO {node_id}] Errore durante l'evaluate fetch: {e}", flush=True)
                      break
                      
              return recensioni_estratte

          # --- RUN PRINCIPALE ---
          try:
              context = launch_persistent_context(
                  profile_dir,
                  headless=False,
                  humanize=True,
                  human_config={
                      "typing_delay": 100,
                      "mistype_chance": 0.02,
                      "idle_between_actions": True
                  },
                  proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
                  geoip=True,
                  viewport={"width": 1920, "height": 1080},
                  args=extra_args_base
              )

              page = context.new_page()
              ricerca_target = "Coro Orvieto"
              
              # 1. Risoluzione dell'ID a caldo
              f_id = esegui_ricerca_e_risolvi_cid(page, ricerca_target)
              
              if f_id:
                  # 2. Estrazione diretta dei payload dal contesto (In-Context)
                  recensioni = estrai_recensioni_in_context(page, f_id, max_recensioni=50)
              else:
                  raise ValueError("Impossibile risolvere il CID del locale.")
              
              # 3. Salvataggio su file
              output_file = f"output_node_{node_id}.txt"
              with open(output_file, "w", encoding="utf-8") as f:
                  f.write(json.dumps(recensioni, indent=4, ensure_ascii=False))
                  
              print(f"[NODO {node_id}] Esecuzione terminata. Salvate {len(recensioni)} recensioni.", flush=True)
              
              page.close()
              context.close()

          except Exception as e:
              print(f"[NODO {node_id}] Errore critico nel processo: {e}", flush=True)
              with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
                  f.write(f"ERRORE CRITICO: {e}\n")
          EOF

      - name: Esecuzione Scraping Singolo Nodo
        run: |
          echo "Avvio processo su un singolo nodo (Nodo 1)..."
          python -u m2_insocket.py 1
          
          # Consolidamento dell'output per l'artifact
          touch output_node_1.txt
          cat output_node_1.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
