name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS PER CLOAKBROWSER (Essenziale per sistemi Linux minimi)
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 1 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          echo "Avvio container warproxy-1 sulla porta $PORT..."
          docker run --name warproxy-1 \
            --network host \
            -e SOCKS5_PORT=$PORT \
            -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          echo "Attesa inizializzazione del tunnel..."
          sleep 5

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          PORT=40001
          echo "=================================================="
          echo "VERIFICA E AUTO-HEALING CONTAINER 1 (PORTA $PORT):"
          
          SUCCESS=false
          for tentativo in {1..5}; do
            echo "Tentativo $tentativo/5..."
            IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json)
            
            if [ $? -eq 0 ] && [ ! -z "$IP" ]; then
              echo "Container 1 pronto! IP: $IP"
              SUCCESS=true
              break
            else
              echo "Container 1 non risponde. Riavvio in corso..."
              docker restart warproxy-1
              sleep 5
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "ERRORE CRITICO: Il container 1 non è raggiungibile dopo 5 riavvii."
            exit 1
          fi
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Creazione script Python (Estrazione Recensioni Google Maps)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import os
          import re
          import json
          from cloakbrowser import launch_persistent_context

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          # --- CONFIGURAZIONE CLOAKBROWSER ---
          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}")

          extra_args_base = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          # --- METODO 1: RICERCA E DISAMBIGUAZIONE ---
          def esegui_ricerca_e_apri_scheda(page, query):
              """Risolve la ricerca e si assicura che la scheda del luogo sia aperta."""
              search_url = f"https://www.google.com/maps/search/{query.replace(' ', '+')}"
              print(f"[NODO {node_id}] Eseguo ricerca diretta su URL: {search_url}", flush=True)
              
              # Impostiamo timeout ampi per non incorrere nel limite dei 30s di default
              page.set_default_navigation_timeout(90000)
              page.set_default_timeout(90000)
              
              # OTTIMIZZAZIONE RETE: Intercettiamo e blocchiamo immagini e tile della mappa.
              # Maps si caricherà a una velocità sensibilmente superiore riducendo il consumo di banda.
              def block_heavy_assets(route):
                  url = route.request.url.lower()
                  if any(ext in url for ext in [".png", ".jpg", ".jpeg", ".webp", ".svg", ".gif", "/vt/", "/cbk", "/kh"]):
                      route.abort()
                  else:
                      route.continue_()
                      
              page.route("**/*", block_heavy_assets)
              
              # Usiamo 'commit' in modo che Playwright si sblocchi non appena riceve l'HTML iniziale,
              # senza attendere il caricamento dei pesanti script asincroni e assecondando i proxy lenti.
              page.goto(search_url, wait_until="commit", timeout=90000)
              
              # Diamo al motore qualche secondo di assestamento per il rendering iniziale dell'HTML
              time.sleep(6)
              
              # Gestione del Cookie Consent di Google se presente
              try:
                  consent_btn = page.locator("button:has-text('Accetta tutto'), button:has-text('Accept all')").first
                  if consent_btn.is_visible(timeout=5000):
                      consent_btn.click()
                      time.sleep(3)
              except Exception:
                  pass

              # Attendiamo in modo reattivo l'apparizione degli elementi essenziali (elenco o pulsanti della scheda)
              try:
                  page.locator("a[href*='/maps/place/'], button[aria-label*='recensioni'], button[aria-label*='Reviews'], button[role='tab']").first.wait_for(timeout=30000)
              except Exception:
                  pass

              # Verifica se siamo finiti su un elenco (Caso B) o direttamente sulla scheda (Caso A)
              risultati_ricerca = page.locator("a[href*='/maps/place/']")
              
              if risultati_ricerca.count() > 0:
                  print(f"[NODO {node_id}] Rilevato elenco di disambiguazione. Seleziono il primo risultato...", flush=True)
                  # Clicchiamo sul primo risultato dell'elenco
                  risultati_ricerca.first.click()
                  time.sleep(5)
              else:
                  print(f"[NODO {node_id}] Direct Hit! Scheda del luogo aperta direttamente.", flush=True)

          # --- METODO 2: ESTRAZIONE CON FINESTRA SCORREVOLE (SLIDING WINDOW) ---
          def estrai_recensioni_passo_passo(page, max_recensioni=100):
              """Estrae le recensioni in tempo reale gestendo la distruzione dei nodi nel DOM."""
              # 1. Clicchiamo sul tab delle recensioni usando il ruolo semantico ARIA tab, molto più stabile
              tab_recensioni = page.locator("button[role='tab']:has-text('Recensioni'), button[role='tab']:has-text('Reviews')").first
              
              if tab_recensioni.is_visible(timeout=8000):
                  print(f"[NODO {node_id}] Clicco sul tab Recensioni...", flush=True)
                  tab_recensioni.click()
              else:
                  # Fallback su bottone classico se l'interfaccia è in modalità mista
                  review_tab = page.locator("button[aria-label*='recensioni'], button[aria-label*='Reviews'], div.F7nice button").first
                  review_tab.wait_for(state="visible", timeout=15000)
                  print(f"[NODO {node_id}] Clicco sul pulsante recensioni di ripiego...", flush=True)
                  review_tab.click()
              
              # Attendiamo che appaia la prima recensione nel DOM per confermare l'apertura
              print(f"[NODO {node_id}] Attendo caricamento della prima recensione (.jftiEf)...", flush=True)
              page.wait_for_selector(".jftiEf", timeout=30000)
              
              # Javascript poller per trovare dinamicamente l'antenato scrollabile della recensione.
              # In questo modo non dipendiamo da classi CSS oscure del pannello.
              scrollable_panel_js = """
                  () => {
                      const firstCard = document.querySelector('.jftiEf');
                      if (!firstCard) return null;
                      let parent = firstCard.parentElement;
                      while (parent) {
                          const style = window.getComputedStyle(parent);
                          if (style.overflowY === 'auto' || style.overflowY === 'scroll') {
                              return parent;
                          }
                          parent = parent.parentElement;
                      }
                      return document.querySelector('div[role="feed"]') || document.body;
                  }
              """

              recensioni_estratte = {}
              iterazioni_senza_novita = 0
              
              print(f"[NODO {node_id}] Avvio loop di scorrimento ed estrazione in tempo reale...", flush=True)
              
              while len(recensioni_estratte) < max_recensioni and iterazioni_senza_novita < 30:
                  # Recupera tutte le card delle recensioni attualmente caricate nel viewport
                  cards = page.locator(".jftiEf").all()
                  nuovi_elementi_trovati = 0
                  
                  for card in cards:
                      try:
                          # ID univoco esposto da Google
                          review_id = card.get_attribute("data-review-id")
                          
                          # Fallback generativo dell'ID
                          if not review_id:
                              autore_testo = card.locator(".d470gc").inner_text()
                              testo_parziale = card.locator(".wiI7pd").inner_text()[:20]
                              review_id = f"custom_id_{hash(autore_testo + testo_parziale)}"
                          
                          # Se non ancora estratto, leggiamo i dati
                          if review_id not in recensioni_estratte:
                              autore = card.locator(".d470gc").inner_text()
                              
                              # Espansione del testo lungo ("Altro")
                              altro_btn = card.locator("button:has-text('Altro'), button:has-text('More')").first
                              if altro_btn.is_visible(timeout=500):
                                  altro_btn.click() 
                                  time.sleep(0.2)
                                  
                              testo_completo = card.locator(".wiI7pd").inner_text()
                              stelle_el = card.locator("span.kv731.v37sz1").first
                              stelle = stelle_el.get_attribute("aria-label") if stelle_el.count() > 0 else "N/D"
                              
                              # Salvataggio immediato nell'accumulatore
                              recensioni_estratte[review_id] = {
                                  "autore": autore,
                                  "testo": testo_completo,
                                  "stelle": stelle
                              }
                              nuovi_elementi_trovati += 1
                              
                              if len(recensioni_estratte) >= max_recensioni:
                                  break
                      except Exception:
                          # Tolleriamo nodi distrutti dallo scrolling a caldo
                          continue
                  
                  if nuovi_elementi_trovati > 0:
                      iterazioni_senza_novita = 0
                      print(f"[NODO {node_id}] Scaricate {len(recensioni_estratte)} recensioni uniche...", flush=True)
                  else:
                      iterazioni_senza_novita += 1
                      
                  # Eseguiamo lo scroll usando il riferimento del pannello trovato dinamicamente in JS
                  page.evaluate(f"({scrollable_panel_js})().scrollBy(0, 450)")
                  
                  # Pausa per permettere l'invio della richiesta AJAX e il rendering dei nodi
                  time.sleep(random.uniform(1.5, 2.2))
                  
              return list(recensioni_estratte.values())

          # --- RUN PRINCIPALE ---
          try:
              context = launch_persistent_context(
                  profile_dir,
                  headless=False,
                  humanize=True,
                  human_config={
                      "typing_delay": 100,
                      "mistype_chance": 0.02,
                      "idle_between_actions": True
                  },
                  proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
                  geoip=True,
                  viewport={"width": 1920, "height": 1080},
                  args=extra_args_base
              )

              page = context.new_page()
              
              # Query dinamica di test
              ricerca_target = "Coro Orvieto"
              
              # 1. Trova ed apre il locale gestendo la disambiguazione
              esegui_ricerca_e_apri_scheda(page, ricerca_target)
              
              # 2. Estrae le recensioni in tempo reale battendo il recycling del DOM
              recensioni = estrai_recensioni_passo_passo(page, max_recensioni=50)
              
              # 3. Salvataggio su file
              output_file = f"output_node_{node_id}.txt"
              with open(output_file, "w", encoding="utf-8") as f:
                  f.write(json.dumps(recensioni, indent=4, ensure_ascii=False))
                  
              print(f"[NODO {node_id}] Esecuzione terminata. Salvate {len(recensioni)} recensioni.", flush=True)
              
              page.close()
              context.close()

          except Exception as e:
              print(f"[NODO {node_id}] Errore critico nel processo: {e}", flush=True)
              with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
                  f.write(f"ERRORE CRITICO: {e}\n")
          EOF

      - name: Esecuzione Scraping Singolo Nodo
        run: |
          echo "Avvio processo su un singolo nodo (Nodo 1)..."
          # Eseguiamo direttamente lo script senza salvare in un file log cieco.
          # Questo mostrerà l'output di Playwright in tempo reale sulla console di GitHub.
          python -u m2_insocket.py 1
          
          # Consolidamento dell'output per l'artifact
          touch output_node_1.txt
          cat output_node_1.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
