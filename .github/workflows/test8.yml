name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS (Essenziale per i controlli di fingerprinting sui font)
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 1 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          echo "Avvio container warproxy-1 sulla porta $PORT..."
          docker run --name warproxy-1 \
            --network host \
            -e SOCKS5_PORT=$PORT \
            -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          echo "Attesa inizializzazione del tunnel..."
          sleep 5

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          PORT=40001
          echo "=================================================="
          echo "VERIFICA E AUTO-HEALING CONTAINER 1 (PORTA $PORT):"
          
          SUCCESS=false
          for tentativo in {1..5}; do
            echo "Tentativo $tentativo/5..."
            IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json)
            
            if [ $? -eq 0 ] && [ ! -z "$IP" ]; then
              echo "Container 1 pronto! IP: $IP"
              SUCCESS=true
              break
            else
              echo "Container 1 non risponde. Riavvio in corso..."
              docker restart warproxy-1
              sleep 5
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "ERRORE CRITICO: Il container 1 non è raggiungibile dopo 5 riavvii."
            exit 1
          fi
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Headful per UC Mode)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Clona e Configura George's Scraper
        run: |
          # 1. Cloniamo il repository di George
          git clone https://github.com/georgekhananaev/google-reviews-scraper-pro.git
          cd google-reviews-scraper-pro
          
          # 2. Installiamo le sue dipendenze
          pip install -r requirements.txt
          pip install pyyaml seleniumbase
          
          # 3. Armiamo il driver di SeleniumBase
          seleniumbase install chromedriver
          
          # 4. Script Python inline per generare un config.yaml pulito da zero
          # Questo evita conflitti con i file sample preesistenti e assicura l'uso del nostro proxy
          python -c "
          import yaml

          config_data = {
              'scraper': {
                  'headless': False,               # Headed obbligatorio per UC Mode sotto Xvfb
                  'sort_by': 'relevance',         # Ordine di rilevanza [5]
                  'max_reviews': 50,              # Limite massimo di recensioni da estrarre [5]
                  'proxy': 'socks5://127.0.0.1:40001', # Il nostro tunnel WARProxy
                  'log_level': 'INFO'
              },
              'database': {
                  'db_path': 'reviews.db'         # Nome del database autogenerato [5]
              },
              'json': {
                  'backup_to_json': True,         # Abilita il backup automatico in JSON [5]
                  'json_path': 'google_reviews.json'
              },
              'businesses': [
                  {
                      'url': 'https://www.google.com/maps/place/Coro/@42.7179111,12.1116244,17z/data=!3m1!4b1!4m6!3m5!1s0x132ecd778417bda5:0x4e6e6043f0ea67e1!8m2!3d42.7179111!4d12.1116244!16s%2Fg%2F11l23qq660',
                      'custom_params': {
                          'company': 'Coro Orvieto'
                      }
                  }
              ]
          }

          with open('config.yaml', 'w') as f:
              yaml.dump(config_data, f)
          "
          echo "Configurazione pulita generata con successo."

      - name: Esecuzione Scraping Professionale (George's Scraper)
        run: |
          cd google-reviews-scraper-pro
          # Avviamo lo scraper di George. L'output mostrerà l'avanzamento dei cicli in tempo reale.
          python start.py
          
          # Spostiamo i file prodotti dall'esecuzione nella root della nostra cartella di lavoro
          cp google_reviews.json ../output_macchina2_cdp.txt || true
          cp reviews.db ../output_macchina2_cdp.db || true

      - name: Upload Artifact Macchina 2 (JSON)
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2_JSON
          path: output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2 (Database SQLite)
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2_DB
          path: output_macchina2_cdp.db
