name: Fast RAG Challenge 2026 Università di Roma

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Setup 1 WARProxy Docker Container (IPv6)
        # Il proxy serve per non far bannare l'IP di GitHub da Google.
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          docker run --name warproxy-1 --network host \
            -e SOCKS5_PORT=$PORT -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -d ghcr.io/kingcc/warproxy:latest
          sleep 5

      - name: Verifica IP IPv6 (socks5h)
        run: |
          PORT=40001
          for i in {1..3}; do
            IP=$(curl -s --max-time 5 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org) && break || sleep 2
          done
          echo "Proxy pronto. IP di uscita: $IP"

      - name: Setup Ambiente e Dipendenze Essenziali
        # Rimosso Playwright, Cloakbrowser e Font. Scarichiamo solo il necessario.
        run: |
          git clone https://github.com/georgekhananaev/google-reviews-scraper-pro.git
          cd google-reviews-scraper-pro
          pip install -r requirements.txt
          pip install pyyaml seleniumbase
          seleniumbase install chromedriver

      - name: Avvio Xvfb (Display virtuale per Selenium)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Genera Configurazione Ottimizzata
        run: |
          cd google-reviews-scraper-pro
          python -c "
          import yaml

          config_data = {
              'headless': False,                       # Serve 'False' per via di Xvfb/UC Mode
              'sort_by': 'newest',                     # <-- MODIFICATO: Ordina per Più Recenti
              'max_reviews': 50,                       # <-- LIMITA a 50
              'proxy': 'socks5://127.0.0.1:40001',     
              'db_path': ':memory:',                   # <-- SQLite forzato in RAM, sparirà
              'download_images': False,                # Ottimizzazione velocità
              'use_mongodb': False,                    
              'backup_to_json': True,                  
              'json_path': 'google_reviews.json',      # Unico output reale
              'log_level': 'WARNING',                  # Meno spam nella console
              'businesses': [
                  {
                      'url': 'https://www.google.com/maps/place/Coro/@42.7179111,12.1116244,17z/data=!3m1!4b1!4m6!3m5!1s0x132ecd778417bda5:0x4e6e6043f0ea67e1!8m2!3d42.7179111!4d12.1116244!16s%2Fg%2F11l23qq660',
                      'custom_params': {'company': 'Coro Orvieto'}
                  }
              ]
          }

          with open('config.yaml', 'w') as f:
              yaml.dump(config_data, f)
          "

      - name: Esecuzione Scraping
        run: |
          cd google-reviews-scraper-pro
          python start.py
          # Copiamo SOLO il file JSON, ignorando tutto il resto
          cp google_reviews.json ../output_macchina2_cdp.json

      - name: Upload Artifact (SOLO JSON)
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2_JSON
          path: output_macchina2_cdp.json
