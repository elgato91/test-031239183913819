name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS PER CLOAKBROWSER
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 1 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          PORT=40001
          echo "Avvio container warproxy-1 sulla porta $PORT..."
          docker run --name warproxy-1 \
            --network host \
            -e SOCKS5_PORT=$PORT \
            -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
            -e VERBOSE=true \
            -d ghcr.io/kingcc/warproxy:latest

          echo "Attesa inizializzazione del tunnel..."
          sleep 5

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          PORT=40001
          echo "=================================================="
          echo "VERIFICA E AUTO-HEALING CONTAINER 1 (PORTA $PORT):"
          
          SUCCESS=false
          for tentativo in {1..5}; do
            echo "Tentativo $tentativo/5..."
            IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json)
            
            if [ $? -eq 0 ] && [ ! -z "$IP" ]; then
              echo "Container 1 pronto! IP: $IP"
              SUCCESS=true
              break
            else
              echo "Container 1 non risponde. Riavvio in corso..."
              docker restart warproxy-1
              sleep 5
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "ERRORE CRITICO: Il container 1 non è raggiungibile dopo 5 riavvii."
            exit 1
          fi
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Creazione script Python (In-Context API listentitiesreviews)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import os
          import re
          import json
          import urllib.parse
          from cloakbrowser import launch_persistent_context

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          # --- CONFIGURAZIONE CLOAKBROWSER ---
          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}")

          extra_args_base = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          # --- SUPPORTO INTERI A 64 BIT CON SEGNO (Complemento a Due) ---
          def to_signed_64(hex_str):
              """Converte una stringa esadecimale in un intero a 64-bit con segno."""
              val = int(hex_str, 16)
              # Se il bit più significativo è attivo, la coordinata è negativa in memoria
              if val >= 0x8000000000000000:
                  val -= 0x10000000000000000
              return str(val)

          # --- METODO 1: RICERCA E RISOLUZIONE COORDINATE ---
          def esegui_ricerca_e_risolvi_coordinate(page, query):
              """Esegue la ricerca e isola id_y e cid in formato signed 64-bit."""
              search_url = f"https://www.google.com/maps/search/{query.replace(' ', '+')}"
              print(f"[NODO {node_id}] Navigazione su: {search_url}", flush=True)
              
              page.set_default_navigation_timeout(90000)
              page.set_default_timeout(90000)
              
              def block_heavy_assets(route):
                  url = route.request.url.lower()
                  if any(ext in url for ext in [".png", ".jpg", ".jpeg", ".webp", ".svg", ".gif", "/vt/", "/cbk", "/kh"]):
                      route.abort()
                  else:
                      route.continue_()
                      
              page.route("**/*", block_heavy_assets)
              page.goto(search_url, wait_until="commit", timeout=90000)
              
              time.sleep(6)
              
              # Gestione del Cookie Consent di Google se presente
              try:
                  consent_btn = page.locator("button:has-text('Accetta tutto'), button:has-text('Accept all')").first
                  if consent_btn.is_visible(timeout=5000):
                      consent_btn.click()
                      time.sleep(3)
              except Exception:
                  pass

              # Gestione della disambiguazione (se compare l'elenco dei risultati)
              risultati_ricerca = page.locator("a[href*='/maps/place/']")
              if risultati_ricerca.count() > 0:
                  print(f"[NODO {node_id}] Rilevato elenco. Clicco sul primo risultato...", flush=True)
                  risultati_ricerca.first.click()
                  time.sleep(5)
              else:
                  print(f"[NODO {node_id}] Scheda aperta direttamente.", flush=True)

              # Attendiamo che l'URL si stabilizzi sul reindirizzamento definitivo (/maps/place/...)
              try:
                  page.wait_for_url("**/maps/place/**", timeout=25000)
                  print(f"[NODO {node_id}] Reindirizzamento completato: {page.url}", flush=True)
              except Exception:
                  print(f"[NODO {node_id}] Timeout attesa URL place. URL attuale: {page.url}", flush=True)

              # Estrazione di id_y e cid convertendoli da esadecimale a signed 64-bit decimale
              id_y = None
              cid = None
              current_url = page.url
              match = re.search(r"(0x[a-fA-F0-9]+):(0x[a-fA-F0-9]+)", current_url)
              
              if match:
                  try:
                      hex_y = match.group(1)
                      hex_cid = match.group(2)
                      id_y = to_signed_64(hex_y)
                      cid = to_signed_64(hex_cid)
                      print(f"[NODO {node_id}] Coordinate convertite (Signed 64-bit): id_y={id_y}, cid={cid}", flush=True)
                  except Exception as e:
                      print(f"[NODO {node_id}] Errore di conversione esadecimale: {e}", flush=True)
                      
              return id_y, cid

          # --- METODO 2: IN-CONTEXT JSON FETCHING ---
          def estrai_recensioni_in_context(page, id_y, cid, max_recensioni=50):
              """Effettua le chiamate fetch all'endpoint nativo di Maps ereditando la sessione reale."""
              recensioni_estratte = []
              start_index = 0
              ciclo = 0
              
              print(f"[NODO {node_id}] Inizio fetch asincroni JSON dal contesto di lavoro...", flush=True)
              
              while len(recensioni_estratte) < max_recensioni:
                  ciclo += 1
                  
                  # Costruiamo il parametro pb nativo richiesto da Google Maps per le recensioni
                  pb_param = f"!1m2!1y{id_y}!2y{cid}!2m2!1i{start_index}!2i10!3e1!4m5!3b1!4b1!5b1!6b1!7b1"
                  
                  # Eseguiamo la codifica URL in Python del parametro pb.
                  # Questo trasforma i caratteri '!' in '%21' prevenendo il fallimento di routing (404) del server
                  pb_encoded = urllib.parse.quote(pb_param, safe='')
                  
                  ajax_url = f"https://www.google.com/maps/preview/review/listentitiesreviews?authuser=0&hl=it&gl=it&pb={pb_encoded}"
                  
                  print(f"[NODO {node_id}] [Ciclo {ciclo}] Chiamata fetch per indice {start_index}...", flush=True)
                  try:
                      json_raw = page.evaluate("""async (url) => {
                          try {
                              const response = await fetch(url);
                              return await response.text();
                          } catch (e) {
                              return "ERRORE: " + e.message;
                          }
                      }""", ajax_url)
                      
                      if json_raw.startswith("ERRORE:"):
                          print(f"[NODO {node_id}] Errore nel fetch browser-side: {json_raw}", flush=True)
                          break
                          
                      # Rimuoviamo il prefisso di sicurezza XSSI di Google )]}'\n prima del parsing JSON
                      if json_raw.startswith(")]}'"):
                          json_raw = json_raw[4:].strip()
                          
                      # Diagnostica log
                      print(f"[NODO {node_id}] [Ciclo {ciclo}] Risposta JSON ricevuta (lunghezza {len(json_raw)}): {json_raw[:180]}...", flush=True)
                      
                      data = json.loads(json_raw)
                      
                      # Nel JSON di Google, le recensioni sono caricate all'interno del terzo livello (indice 2)
                      raw_reviews = data[2] if (len(data) > 2 and data[2] is not None) else []
                      
                      if not raw_reviews:
                          print(f"[NODO {node_id}] Nessun elemento trovato nel JSON. Fine delle recensioni disponibili.", flush=True)
                          break
                          
                      nuove_estratte = 0
                      for r in raw_reviews:
                          try:
                              # Struttura del JSON di listentitiesreviews:
                              # r[3] -> Testo della recensione
                              # r[0][1] -> Autore
                              # r[4] -> Stelle (valutazione numerica da 1 a 5)
                              autore = r[0][1] if (len(r) > 0 and len(r[0]) > 1) else "Utente Google"
                              testo = r[3] if len(r) > 3 else ""
                              stelle = f"{r[4]} stelle" if len(r) > 4 else "N/D"
                              
                              recensioni_estratte.append({
                                  "autore": autore,
                                  "testo": testo,
                                  "stelle": stelle
                              })
                              nuove_estratte += 1
                              
                              if len(recensioni_estratte) >= max_recensioni:
                                  break
                          except Exception:
                              continue
                              
                      print(f"[NODO {node_id}] [Ciclo {ciclo}] Elaborate {nuove_estratte} recensioni. Totale in memoria: {len(recensioni_estratte)}", flush=True)
                      
                      start_index += 10
                      time.sleep(random.uniform(0.3, 0.7))
                      
                  except Exception as e:
                      print(f"[NODO {node_id}] Errore durante l'evaluate fetch: {e}", flush=True)
                      break
                      
              return recensioni_estratte

          # --- RUN PRINCIPALE ---
          try:
              context = launch_persistent_context(
                  profile_dir,
                  headless=False,
                  humanize=True,
                  human_config={
                      "typing_delay": 100,
                      "mistype_chance": 0.02,
                      "idle_between_actions": True
                  },
                  proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
                  geoip=True,
                  viewport={"width": 1920, "height": 1080},
                  args=extra_args_base
              )

              page = context.new_page()
              ricerca_target = "Coro Orvieto"
              
              # 1. Risoluzione delle coordinate esadecimali
              id_y, cid = esegui_ricerca_e_risolvi_coordinate(page, ricerca_target)
              
              if id_y and cid:
                  # 2. Estrazione diretta dei payload JSON dal contesto (In-Context) senza cliccare alcun tasto
                  recensioni = estrai_recensioni_in_context(page, id_y, cid, max_recensioni=50)
              else:
                  raise ValueError("Impossibile risolvere le coordinate id_y o cid del locale.")
              
              # 3. Salvataggio su file
              output_file = f"output_node_{node_id}.txt"
              with open(output_file, "w", encoding="utf-8") as f:
                  f.write(json.dumps(recensioni, indent=4, ensure_ascii=False))
                  
              print(f"[NODO {node_id}] Esecuzione terminata. Salvate {len(recensioni)} recensioni.", flush=True)
              
              page.close()
              context.close()

          except Exception as e:
              print(f"[NODO {node_id}] Errore critico nel processo: {e}", flush=True)
              with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
                  f.write(f"ERRORE CRITICO: {e}\n")
          EOF

      - name: Esecuzione Scraping Singolo Nodo
        run: |
          echo "Avvio processo su un singolo nodo (Nodo 1)..."
          python -u m2_insocket.py 1
          
          # Consolidamento dell'output per l'artifact
          touch output_node_1.txt
          cat output_node_1.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
