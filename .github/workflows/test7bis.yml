name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS PER CLOAKBROWSER (Essenziale per sistemi Linux minimi)
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 6 WARProxy Docker Containers (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest

            if [ $i -lt 6 ]; then
              DELAY=$((3 + RANDOM % 2))
              echo "Attesa scaglionata di $DELAY secondi per il prossimo container..."
              sleep $DELAY
            fi
          done

          echo "Attesa finale inizializzazione dei tunnel..."
          sleep 10

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "=================================================="
            echo "VERIFICA E AUTO-HEALING CONTAINER $i (PORTA $PORT):"
            
            DELAY=$((3 + RANDOM % 2))
            sleep $DELAY

            SUCCESS=false
            for tentativo in {1..5}; do
              echo "Tentativo $tentativo/5 per container $i..."
              IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json)
              
              if [ $? -eq 0 ] && [ ! -z "$IP" ]; then
                echo "Container $i pronto! IP: $IP"
                SUCCESS=true
                break
              else
                echo "Container $i non risponde. Riavvio in corso..."
                docker restart warproxy-$i
                sleep 5
              fi
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "ERRORE CRITICO: Il container $i non è hackerabile o raggiungibile dopo 5 riavvii."
              exit 1
            fi
          done
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Creazione script Python (Estrazione API Key Jina)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import os
          import re
          from cloakbrowser import launch_persistent_context

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}")

          extra_args_base = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          print(f"[NODO {node_id}] Avvio estrazione su porta proxy {ACTIVE_PORT}...", flush=True)

          try:
              # Avvio del contesto persistente con CloakBrowser (Headed per bypassare Cloudflare)
              context = launch_persistent_context(
                  profile_dir,
                  headless=False,
                  humanize=True,
                  human_config={
                      "typing_delay": 120,
                      "mistype_chance": 0.03,
                      "idle_between_actions": True
                  },
                  proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
                  geoip=True,
                  viewport={"width": 1920, "height": 1080},
                  args=extra_args_base
              )

              page = context.new_page()
              
              # Navigazione diretta alla pagina di Jina
              url = "https://jina.ai/"
              print(f"[NODO {node_id}] Navigazione su {url}...", flush=True)
              page.goto(url, wait_until="networkidle", timeout=60000)
              
              # Simulazione attesa umana per l'assestamento dei caricamenti asincroni
              time.sleep(random.uniform(5, 8))
              
              api_key = None
              
              # TENTATIVO 1: Lettura della proprietà live del DOM tramite Javascript poller
              try:
                  print(f"[NODO {node_id}] Tentativo 1: Interrogazione proprietà live del DOM...", flush=True)
                  page.wait_for_selector("input[aria-label='API key']", timeout=20000)
                  
                  # Vue.js aggiorna la proprietà .value dell'elemento senza mutare l'attributo HTML statico.
                  # Interroghiamo ricorsivamente la proprietà finché non inizia con il prefisso atteso.
                  api_key = page.evaluate('''() => {
                      return new Promise((resolve) => {
                          let attempts = 0;
                          const check = () => {
                              const input = document.querySelector('input[aria-label="API key"]');
                              if (input && input.value && input.value.trim().startsWith('jina_')) {
                                  resolve(input.value.trim());
                              } else if (attempts > 30) { // 15 secondi di timeout massimo
                                  resolve(input ? input.value : null);
                              } else {
                                  attempts++;
                                  setTimeout(check, 500);
                              }
                          };
                          check();
                      });
                  }''')
              except Exception as e:
                  print(f"[NODO {node_id}] Timeout o errore nella lettura del selettore: {e}", flush=True)

              # TENTATIVO 2: Fallback su localStorage (Jina memorizza i dati utente persistenti nel browser)
              if not api_key or not api_key.startswith("jina_"):
                  print(f"[NODO {node_id}] Tentativo 2: Fallback su localStorage...", flush=True)
                  try:
                      local_storage = page.evaluate("() => JSON.stringify(localStorage)")
                      match = re.search(r"jina_[a-zA-Z0-9]{32,}", local_storage)
                      if match:
                          api_key = match.group(0)
                          print(f"[NODO {node_id}] Chiave recuperata da localStorage.", flush=True)
                  except Exception as e:
                      print(f"[NODO {node_id}] Errore lettura localStorage: {e}", flush=True)

              # TENTATIVO 3: Scansione regex dell'intero sorgente renderizzato a caldo (ultimo fallback)
              if not api_key or not api_key.startswith("jina_"):
                  print(f"[NODO {node_id}] Tentativo 3: Scansione regex del DOM a caldo...", flush=True)
                  try:
                      html_content = page.content()
                      match = re.search(r"jina_[a-zA-Z0-9]{32,}", html_content)
                      if match:
                          api_key = match.group(0)
                          print(f"[NODO {node_id}] Chiave recuperata via regex DOM.", flush=True)
                  except Exception as e:
                      print(f"[NODO {node_id}] Errore scansione regex: {e}", flush=True)

              # Scrittura del risultato
              output_file = f"output_node_{node_id}.txt"
              with open(output_file, "w", encoding="utf-8") as f:
                  if api_key and api_key.startswith("jina_"):
                      print(f"[NODO {node_id}] Estrazione completata: {api_key[:12]}...", flush=True)
                      f.write(f"CHIAVE_ESTRATTA: {api_key}\n")
                  else:
                      print(f"[NODO {node_id}] Fallimento: Chiave non rilevata.", flush=True)
                      f.write("ERRORE: Chiave non trovata.\n")

              page.close()
              context.close()

          except Exception as e:
              print(f"[NODO {node_id}] Errore irreversibile: {e}", flush=True)
              with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
                  f.write(f"ERRORE CRITICO: {e}\n")
          EOF

      - name: Esecuzione Scraping Parallelo (6 Nodi con Staggered Delay)
        run: |
          echo "Avvio processi paralleli su 6 nodi con avvio scaglionato casuale..."
          
          for i in {1..6}; do
            echo "Inizializzazione del Nodo $i..."
            python -u m2_insocket.py $i > node$i.log 2>&1 &
            
            if [ $i -lt 6 ]; then
              # Delay casuale tra 5 e 15 secondi prima di far partire lo scraper successivo
              DELAY=$((5 + RANDOM % 11))
              echo "Nodo $i avviato. Attesa casuale di $DELAY secondi prima del prossimo nodo..."
              sleep $DELAY
            fi
          done

          echo "Tutti i nodi sono stati instanziati. Attesa del completamento dello scraping..."
          wait

          echo "=== LOG NODO 1 ===" && cat node1.log || true
          echo "=== LOG NODO 2 ===" && cat node2.log || true
          echo "=== LOG NODO 3 ===" && cat node3.log || true
          echo "=== LOG NODO 4 ===" && cat node4.log || true
          echo "=== LOG NODO 5 ===" && cat node5.log || true
          echo "=== LOG NODO 6 ===" && cat node6.log || true
          echo "=================="

          touch output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt
          cat output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
