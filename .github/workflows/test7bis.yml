- name: Creazione Script Python - STEP 2 (CloakBrowser Persistente)
        run: |
          cat << 'EOF' > m2_step2.py
          import time
          import sys
          import random
          import os
          import json
          import fcntl
          from cloakbrowser import launch_persistent_context
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          QUEUE_FILE = "/tmp/step2_queue.json"
          LOCK_FILE = "/tmp/step2_queue.lock"

          if len(sys.argv) < 2: sys.exit(1)
          node_id = int(sys.argv[1])
          INITIAL_PORT = 40000 + node_id

          def get_next_target():
              if not os.path.exists(QUEUE_FILE): return None
              with open(LOCK_FILE, "w") as lock_f:
                  try:
                      fcntl.flock(lock_f, fcntl.LOCK_EX)
                      with open(QUEUE_FILE, "r") as q_f: queue = json.load(q_f)
                      if not queue: return None
                      next_url = queue.pop(0)
                      with open(QUEUE_FILE, "w") as q_f: json.dump(queue, q_f)
                      return next_url
                  except: return None
                  finally: fcntl.flock(lock_f, fcntl.LOCK_UN)

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries: return queries[param][0]
              except: pass
              return default

          # --- AVVIO SINGOLO BROWSER PER NODO ---
          home_dir = os.path.expanduser("~")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          
          print(f"[NODO {node_id}] Avvio contesto persistente CloakBrowser su porta {INITIAL_PORT}...", flush=True)
          try:
              context = launch_persistent_context(
                  profile_dir,
                  headless=False,
                  humanize=True,
                  human_config={"typing_delay": 80, "mistype_chance": 0.02},
                  proxy=f"socks5://127.0.0.1:{INITIAL_PORT}",
                  geoip=True,
                  viewport={"width": 1920, "height": 1080},
                  args=["--no-sandbox", "--disable-dev-shm-usage", f"--fingerprint={random.randint(100000, 999999)}", f"--fingerprint-fonts-dir={windows_fonts_dir}"]
              )
              page = context.new_page()
              
              # Singolo Warmup per stabilire la fiducia dell'IP
              print(f"[NODO {node_id}] Esecuzione Warmup su Google...", flush=True)
              page.goto("https://www.google.com", timeout=20000)
              time.sleep(3)
              
          except Exception as e:
              print(f"[NODO {node_id}] Errore critico avvio Browser: {e}")
              sys.exit(0)

          results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 2 (Cloakbrowser) (PORTA {INITIAL_PORT})\n{'#'*60}\n"

          while True:
              url = get_next_target()
              if not url: break
                  
              print(f"[NODO {node_id}] Scraping fallback: {url}", flush=True)
              try:
                  # Logica motori di ricerca
                  if "startpage.com" in url or "duckduckgo.com" in url:
                      page.goto(url, wait_until="domcontentloaded", timeout=30000)
                  else:
                      page.goto(url, wait_until="domcontentloaded", timeout=30000)

                  # ATTESA SMART: Lascia il tempo a JS di risolvere la challenge WAF
                  time.sleep(6) # Attesa base
                  
                  for _ in range(3): # Controlla fino a 3 volte se c'è un blocco visibile
                      content = page.content().lower()
                      if "challenge-platform" in content or "just a moment" in content:
                          print(f"[NODO {node_id}] Challenge rilevata. Attendo risoluzione automatica...", flush=True)
                          time.sleep(8)
                      else:
                          break
                  
                  raw_html = page.content()
                  soup = BeautifulSoup(raw_html, 'html.parser')
                  text = soup.get_text(separator=' ', strip=True)[:5000]
                  
                  if len(text) > 200 and "just a moment" not in text.lower():
                      results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO ESTRATTO:\n{text}\n"
                      print(f"[NODO {node_id}] -> Successo Fallback!", flush=True)
                  else:
                      results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nFALLITO (WAF irrisolto o timeout)\n"
                      print(f"[NODO {node_id}] -> Fallito (WAF irrisolto).", flush=True)

              except Exception as e:
                  print(f"[NODO {node_id}] -> Errore esecuzione: {e}", flush=True)
                  results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nERRORE DI NAVIGAZIONE: {e}\n"
              
              time.sleep(random.uniform(2.0, 4.0))

          try:
              context.close()
          except: pass

          with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF
