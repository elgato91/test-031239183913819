name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl-cffi
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup Container WARP (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
            sleep 0.5
          done
          
          echo "Attesa stabilizzazione tunnel WARP..."
          sleep 6

      - name: Distribuzione Code Statiche (Chunking)
        run: |
          cat << 'EOF' > m2_queue_setup.py
          import json
          TARGETS = [
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]
          
          # Dividiamo matematicamente i 22 URL sui 6 nodi. Ogni nodo avrà 3-4 URL.
          for i in range(1, 7):
              chunk = TARGETS[i-1::6]
              with open(f"/tmp/queue_{i}.json", "w") as f:
                  json.dump(chunk, f)
          print("Code distribuite con successo. Nessun conflitto possibile.")
          EOF
          python -u m2_queue_setup.py

      - name: Creazione Script Scraper (Motore CloakBrowser Sincrono)
        run: |
          cat << 'EOF' > m2_scraper.py
          import time
          import sys
          import random
          import os
          import json
          from urllib.parse import urlparse, parse_qs
          from cloakbrowser import launch_persistent_context
          from bs4 import BeautifulSoup

          if len(sys.argv) < 2: sys.exit(1)
          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries: return queries[param][0]
              except: pass
              return default

          def get_safe_content(page, max_retries=5):
              for _ in range(max_retries):
                  try: return page.content()
                  except Exception as e:
                      if "navigating" in str(e).lower() or "navigation" in str(e).lower(): time.sleep(2)
                      else: time.sleep(1)
              return ""

          queue_file = f"/tmp/queue_{node_id}.json"
          if not os.path.exists(queue_file): sys.exit(0)
          
          with open(queue_file, "r") as f:
              targets = json.load(f)

          if not targets:
              with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f: f.write("")
              sys.exit(0)

          home_dir = os.path.expanduser("~")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          
          base_args = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random.randint(100000, 999999)}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          # --- FASE 1: RISCALDAMENTO HTTP/1.1 (TRUCCO CLOUDFLARE) ---
          print(f"[NODO {node_id}] Esecuzione Warmup HTTP/1.1 per aggirare WAF...", flush=True)
          try:
              warmup_ctx = launch_persistent_context(
                  profile_dir,
                  headless=False,
                  proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
                  geoip=True,
                  locale="it-IT",
                  timezone_id="Europe/Rome",
                  viewport={"width": 1920, "height": 1080},
                  args=base_args + ["--disable-http2"]
              )
              wp = warmup_ctx.new_page()
              wp.goto("https://www.google.com", timeout=25000)
              time.sleep(3)
              warmup_ctx.close()
          except Exception as e:
              print(f"[NODO {node_id}] Errore non critico nel Warmup: {e}")

          # --- FASE 2: SCRAPING PRINCIPALE HTTP/2 ---
          print(f"[NODO {node_id}] Avvio contesto principale CloakBrowser...", flush=True)
          try:
              context = launch_persistent_context(
                  profile_dir,
                  headless=False,
                  humanize=True,
                  human_config={"typing_delay": 80, "mistype_chance": 0.02, "idle_between_actions": True},
                  proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
                  geoip=True,
                  locale="it-IT",
                  timezone_id="Europe/Rome",
                  viewport={"width": 1920, "height": 1080},
                  args=base_args
              )
          except Exception as e:
              print(f"[NODO {node_id}] Errore critico avvio Browser HTTP/2: {e}")
              sys.exit(0)

          results = f"\n{'#'*60}\nREPORT NODO {node_id} (PORTA {ACTIVE_PORT})\n{'#'*60}\n"

          for url in targets:
              print(f"[NODO {node_id}] -> {url}", flush=True)
              try:
                  page = context.new_page()
                  query_to_search = get_query_from_url(url)
                  
                  # Automazione Motori di Ricerca come utente umano
                  if "startpage.com" in url:
                      page.goto("https://www.startpage.com/", wait_until="commit", timeout=40000)
                      time.sleep(4)
                      try:
                          page.type("input#q", query_to_search)
                          page.keyboard.press("Enter")
                      except: page.goto(url, wait_until="commit", timeout=40000)
                  elif "html.duckduckgo.com" in url:
                      page.goto("https://html.duckduckgo.com/", wait_until="commit", timeout=40000)
                      time.sleep(4)
                      try:
                          page.type("input[name=q]", query_to_search)
                          page.keyboard.press("Enter")
                      except: page.goto(url, wait_until="commit", timeout=40000)
                  else:
                      page.goto(url, wait_until="commit", timeout=40000)

                  time.sleep(6) # Attesa caricamento JS
                  
                  # Risoluzione WAF passiva (Scroll leggeri se c'è Captcha)
                  for attempt in range(4): 
                      content = get_safe_content(page).lower()
                      if not content:
                          time.sleep(2)
                          continue
                          
                      if "challenge-platform" in content or "just a moment" in content or "prove your humanity" in content:
                          print(f"[NODO {node_id}] Analisi WAF. Movimenti umani...", flush=True)
                          try:
                              page.mouse.move(random.randint(300, 800), random.randint(300, 800))
                              page.mouse.wheel(0, random.randint(200, 500))
                          except: pass
                          time.sleep(7)
                      else:
                          break
                  
                  try: page.mouse.wheel(0, 800) # Lieve scroll finale per lazy loading
                  except: pass
                  time.sleep(3)
                  
                  raw_html = get_safe_content(page)
                  if not raw_html:
                      raise Exception("Impossibile estrarre HTML (redirect loop)")

                  soup = BeautifulSoup(raw_html, 'html.parser')
                  text = soup.get_text(separator=' ', strip=True)[:5000]
                  text_lower = text.lower()
                  
                  # Controllo fallimento rigido
                  blocking_indicators = [
                      "just a moment", "are you a robot", "prove your humanity",
                      "captcha verification", "please enter in the characters you see below",
                      "access is forbidden", "access to this page is forbidden", "challenge-platform",
                      "we've detected unusual activity", "this page cannot function without javascript",
                      "verifica di sicurezza", "un traffico insolito", "robot challenge screen", "ci siamo quasi"
                  ]
                  is_blocked = any(b in text_lower for b in blocking_indicators)
                  
                  if len(text) > 150 and not is_blocked:
                      results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nTESTO ESTRATTO:\n{text}\n"
                      print(f"[NODO {node_id}] -> Successo!", flush=True)
                  else:
                      results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nFALLITO (Blocco Persistente)\n"
                      print(f"[NODO {node_id}] -> Fallito.", flush=True)

              except Exception as e:
                  print(f"[NODO {node_id}] -> Errore esecuzione: {e}", flush=True)
                  results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\nERRORE: {e}\n"
              
              try: page.close()
              except: pass
              time.sleep(random.uniform(2.0, 4.0))

          try: context.close()
          except: pass

          with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Parallelo
        run: |
          echo 'Avvio processi paralleli di Scraping...'
          touch node1.log node2.log node3.log node4.log node5.log node6.log
          tail -q -f node1.log node2.log node3.log node4.log node5.log node6.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            python -u m2_scraper.py $i > node${i}.log 2>&1 &
            PIDS+=($!)
            sleep 1.5
          done

          wait "${PIDS[@]}"
          kill $TAIL_PID || true
          
          for i in {1..6}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

          cat output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
