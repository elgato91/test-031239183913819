name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS PER CLOAKBROWSER
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl-cffi
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup e Verifica Container STEP 1 (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          # Avvio controllato dei primi 6 container dello Step 1 (Porte 40001-40006)
          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
          done

          echo "Verifica attiva del corretto avvio dei tunnel STEP 1..."
          ENDPOINTS=(
            "https://api6.ipify.org?format=json"
            "https://v6.ident.me/.json"
            "https://ifconfig.co/json"
          )

          # Polling rapido per evitare attese statiche (sleep fisse)
          for i in {1..6}; do
            PORT=$((40000 + i))
            SUCCESS=false
            echo "Verifica container $i sulla porta $PORT..."
            
            for tentativo in {1..15}; do
              URL=${ENDPOINTS[$((tentativo % 3))]}
              if curl -s --max-time 3 --proxy socks5h://127.0.0.1:$PORT "$URL" > /dev/null; then
                echo "Container $i pronto sulla porta $PORT!"
                SUCCESS=true
                break
              fi
              sleep 1
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "ERRORE CRITICO: Il container $i non risponde."
              exit 1
            fi
          done

      - name: Creazione Script Python - STEP 1 (Cloakbrowser -> curl-cffi)
        run: |
          cat << 'EOF' > m2_step1.py
          import time
          import sys
          import random
          import math
          import os
          import json
          from cloakbrowser import launch_persistent_context
          from bs4 import BeautifulSoup
          from curl_cffi import requests

          TARGETS = [
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          WARMUP_QUERIES = [
              "weather tomorrow", "world news today", "how to cook pasta", 
              "best movies 2026", "wikipedia space exploration", "historical events today"
          ]

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          num_nodes = 6
          slice_size = math.ceil(len(TARGETS) / num_nodes)
          MY_TARGETS = TARGETS[(node_id-1)*slice_size : node_id*slice_size]

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def validate_html(html, url):
              if not html or len(html.strip()) < 300:
                  return False, "Sorgente HTML vuota o estremamente ridotta (< 300 byte)"
              
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return True, ""

              low_html = html.lower()
              blocking_indicators = [
                  "captcha", "recaptcha", "hcaptcha", "cloudflare", "challenge-platform",
                  "access denied", "blocked", "forbidden", "403 forbidden", "404 not found",
                  "robot check", "security verification", "enable javascript", "ddos-guard",
                  "distil networks", "incapsula", "sucuri", "perimeterx", "scrolling is not possible",
                  "unusual traffic", "challenge", "bots use", "bot detection", "just a moment"
              ]
              
              for indicator in blocking_indicators:
                  if indicator in low_html:
                      return False, f"Rilevato blocco anti-bot o errore di rete: '{indicator}'"
                          
              try:
                  soup = BeautifulSoup(html, 'html.parser')
                  text = soup.get_text(separator=' ', strip=True)
                  if len(text) < 100:
                      return False, "Contenuto testuale insufficiente (< 100 caratteri)"
              except Exception as e:
                  return False, f"Impossibile effettuare il parsing HTML: {str(e)}"
                  
              return True, ""

          def gaussian_delay(mu=1.5, sigma=0.4):
              delay = random.gauss(mu, sigma)
              actual_delay = max(0.5, min(delay, 4.0))
              print(f"[NODO {node_id}] Pausa gaussiana di {actual_delay:.2f} secondi...", flush=True)
              time.sleep(actual_delay)

          def run_warmup_phase_http1(profile_dir, active_port, extra_args_base, node_id):
              print(f"[NODO {node_id}] [Warmup HTTP/1.1] Inizializzazione profilo...", flush=True)
              warmup_args = extra_args_base + ["--disable-http2"]
              cookies = []
              user_agent = ""
              
              try:
                  context = launch_persistent_context(
                      profile_dir,
                      headless=False,
                      humanize=True,
                      human_config={
                          "typing_delay": 120,
                          "mistype_chance": 0.03,
                          "idle_between_actions": True
                      },
                      proxy=f"socks5://127.0.0.1:{active_port}",
                      geoip=True,
                      viewport={"width": 1920, "height": 1080},
                      args=warmup_args
                  )
                  
                  page = context.new_page()
                  user_agent = page.evaluate("navigator.userAgent")
                  
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Navigazione su Reddit Home...", flush=True)
                  try:
                      page.goto("https://www.reddit.com", wait_until="domcontentloaded", timeout=35000)
                      time.sleep(random.uniform(3, 5))
                  except Exception as e:
                      print(f"[NODO {node_id}] [Warmup HTTP/1.1] Errore su Reddit: {e}", flush=True)
                      
                  query = random.choice(WARMUP_QUERIES)
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Ricerca Google: '{query}'", flush=True)
                  try:
                      page.goto("https://www.google.com", wait_until="domcontentloaded", timeout=30000)
                      time.sleep(random.uniform(1.5, 3))
                      accept_btn = page.locator("button:has-text('Accetta tutto'), button:has-text('Accept all')").first
                      if accept_btn.is_visible(timeout=2000):
                          accept_btn.click()
                          time.sleep(1.5)
                      
                      page.type("textarea[name='q'], input[name='q']", query)
                      page.keyboard.press("Enter")
                      time.sleep(random.uniform(2, 4))
                  except Exception as e:
                      print(f"[NODO {node_id}] [Warmup HTTP/1.1] Errore su Google: {e}", flush=True)

                  cookies = context.cookies()
                  page.close()
                  context.close()
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Completato. Cookie estratti.", flush=True)
              except Exception as e:
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Errore di inizializzazione: {e}", flush=True)
                  
              return cookies, user_agent

          # --- INIZIO FLUSSO OPERATIVO ---
          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step1")

          extra_args_base = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          cookies, user_agent = run_warmup_phase_http1(profile_dir, ACTIVE_PORT, extra_args_base, node_id)

          time.sleep(2)

          print(f"[NODO {node_id}] [Scraping curl_cffi] Configurazione sessione...", flush=True)
          session = requests.Session(impersonate="chrome120")
          session.proxies = {
              "http": f"socks5h://127.0.0.1:{ACTIVE_PORT}",
              "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"
          }

          if user_agent:
              session.headers.update({"User-Agent": user_agent})

          for cookie in cookies:
              try:
                  session.cookies.set(
                      cookie['name'],
                      cookie['value'],
                      domain=cookie.get('domain', ''),
                      path=cookie.get('path', '/')
                  )
              except Exception as ce:
                  print(f"[NODO {node_id}] Errore importazione cookie {cookie.get('name')}: {ce}", flush=True)

          results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 1 (curl-cffi) (PORTA {ACTIVE_PORT})\n{'#'*60}\n"
          failed_targets = []

          for url in MY_TARGETS:
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"[NODO {node_id}] -> Richiesta curl-cffi: {url}", flush=True)
              
              try:
                  if url != MY_TARGETS[0]:
                      gaussian_delay()
                      
                  resp = session.get(url, timeout=12)
                  html_content = resp.text
                  is_ok, err_msg = validate_html(html_content, url)
                  
                  if is_ok:
                      print(f"[NODO {node_id}] -> Successo: {url}", flush=True)
                      results += f"TESTO ESTRATTO (curl-cffi):\n{extract_text(html_content, url)}\n"
                  else:
                      print(f"[NODO {node_id}] -> Validazione fallita per {url}: {err_msg}", flush=True)
                      results += f"FALLITO (Errore validazione): {err_msg}\n"
                      failed_targets.append(url)
                      
              except Exception as e:
                  print(f"[NODO {node_id}] -> Errore connessione per {url}: {e}", flush=True)
                  results += f"FALLITO (Errore di rete/globale): {str(e)}\n"
                  failed_targets.append(url)

          with open(f"output_node_{node_id}_step1.txt", "w", encoding="utf-8") as f:
              f.write(results)

          with open(f"failed_node_{node_id}.json", "w", encoding="utf-8") as f:
              json.dump(failed_targets, f)
          EOF

      - name: Creazione Script Python - STEP 2 (Fallback CloakBrowser)
        run: |
          cat << 'EOF' > m2_step2.py
          import time
          import sys
          import random
          import os
          import json
          from cloakbrowser import launch_persistent_context
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40006 + node_id

          failed_file = f"failed_node_{node_id}.json"
          if not os.path.exists(failed_file):
              print(f"[NODO {node_id}] File fallimenti non trovato. Fine.", flush=True)
              sys.exit(0)

          with open(failed_file, "r", encoding="utf-8") as f:
              MY_TARGETS = json.load(f)

          if not MY_TARGETS:
              print(f"[NODO {node_id}] Nessun URL fallito nello Step 1. Fine.", flush=True)
              with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                  f.write(f"Nessun URL da recuperare per il nodo {node_id}.\n")
              sys.exit(0)

          print(f"[NODO {node_id}] [STEP 2] Esecuzione fallback per {len(MY_TARGETS)} URL.", flush=True)

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          WARMUP_QUERIES = [
              "weather tomorrow", "world news today", "how to cook pasta", 
              "best movies 2026", "wikipedia space exploration", "historical events today"
          ]

          # Lista globale delle porte dello Step 2 per permettere la rotazione (failover)
          ALL_PORTS = [40007, 40008, 40009, 40010, 40011, 40012]

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def validate_html(html, url):
              if not html or len(html.strip()) < 300:
                  return False, "HTML vuoto o troppo ridotto"
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return True, ""
              low_html = html.lower()
              blocking_indicators = [
                  "captcha", "recaptcha", "hcaptcha", "cloudflare", "challenge-platform",
                  "access denied", "blocked", "forbidden", "403 forbidden", "404 not found",
                  "robot check", "security verification", "enable javascript", "ddos-guard",
                  "distil networks", "incapsula", "sucuri", "perimeterx", "scrolling is not possible",
                  "unusual traffic", "challenge", "bots use", "bot detection", "just a moment"
              ]
              for indicator in blocking_indicators:
                  if indicator in low_html:
                      return False, f"Rilevato blocco anti-bot o errore: '{indicator}'"
              return True, ""

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          def get_safe_content(page, retries=3):
              for attempt in range(retries):
                  try:
                      return page.content()
                  except Exception as e:
                      if "navigating" in str(e).lower() or "execution context" in str(e).lower():
                          time.sleep(3)
                      else:
                          break
              return ""

          def run_warmup_phase_http1(profile_dir, active_port, extra_args_base, node_id):
              print(f"[NODO {node_id}] [Warmup HTTP/1.1] Inizializzazione profilo su porta {active_port}...", flush=True)
              warmup_args = extra_args_base + ["--disable-http2"]
              
              try:
                  context = launch_persistent_context(
                      profile_dir,
                      headless=False,
                      humanize=True,
                      human_config={
                          "typing_delay": 120,
                          "mistype_chance": 0.03,
                          "idle_between_actions": True
                      },
                      proxy=f"socks5://127.0.0.1:{active_port}",
                      geoip=True,
                      viewport={"width": 1920, "height": 1080},
                      args=warmup_args
                  )
                  
                  page = context.new_page()
                  
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Navigazione su Reddit Home...", flush=True)
                  try:
                      page.goto("https://www.reddit.com", wait_until="domcontentloaded", timeout=35000)
                      time.sleep(random.uniform(3, 5))
                  except Exception as e:
                      print(f"[NODO {node_id}] [Warmup HTTP/1.1] Errore su Reddit: {e}", flush=True)
                      
                  query = random.choice(WARMUP_QUERIES)
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Ricerca Google: '{query}'", flush=True)
                  try:
                      page.goto("https://www.google.com", wait_until="domcontentloaded", timeout=30000)
                      time.sleep(random.uniform(1.5, 3))
                      accept_btn = page.locator("button:has-text('Accetta tutto'), button:has-text('Accept all')").first
                      if accept_btn.is_visible(timeout=2000):
                          accept_btn.click()
                          time.sleep(1.5)
                      
                      page.type("textarea[name='q'], input[name='q']", query)
                      page.keyboard.press("Enter")
                      time.sleep(random.uniform(2, 4))
                  except Exception as e:
                      print(f"[NODO {node_id}] [Warmup HTTP/1.1] Errore su Google: {e}", flush=True)

                  page.close()
                  context.close()
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Completato.", flush=True)
              except Exception as e:
                  print(f"[NODO {node_id}] [Warmup HTTP/1.1] Errore: {e}", flush=True)

          # --- INIZIO SCRIPT RECUPERO ---
          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2")

          extra_args_base = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          # Eseguiamo il warmup iniziale sulla porta nativa
          run_warmup_phase_http1(profile_dir, ACTIVE_PORT, extra_args_base, node_id)
          time.sleep(2)

          results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 2 (Cloakbrowser) (PORTA INIZIALE {ACTIVE_PORT})\n{'#'*60}\n"

          # Pool di porte alternative escludendo la porta nativa corrente
          RETRY_PORTS = [p for p in ALL_PORTS if p != ACTIVE_PORT]

          for url in MY_TARGETS:
              results += f"\n{'='*50}\nTARGET FALLBACK: {url}\n{'='*50}\n"
              print(f"[NODO {node_id}] -> Recupero fallback per: {url}", flush=True)
              
              current_port = ACTIVE_PORT
              raw_html = ""
              scraped_successfully = False
              
              # Proviamo fino a 2 tentativi, usando un IP alternativo se il primo viene bloccato (failover)
              for attempt in range(2):
                  if attempt > 0:
                      backup_port = random.choice(RETRY_PORTS)
                      print(f"[NODO {node_id}] -> Rilevato blocco su porta {current_port}. Eseguo Failover su proxy alternativo: {backup_port}", flush=True)
                      current_port = backup_port
                      # Rieseguiamo un brevissimo warmup sul nuovo IP per agganciare i cookie prima della chiamata
                      run_warmup_phase_http1(profile_dir, current_port, extra_args_base, node_id)
                      time.sleep(1)
                      
                  page = None
                  context = None
                  try:
                      context = launch_persistent_context(
                          profile_dir,
                          headless=False,
                          humanize=True,
                          human_config={
                              "typing_delay": 100,
                              "mistype_chance": 0.03,
                              "idle_between_actions": True
                          },
                          proxy=f"socks5://127.0.0.1:{current_port}",
                          geoip=True,
                          viewport={"width": 1920, "height": 1080},
                          args=extra_args_base
                      )
                      
                      page = context.new_page()
                      query_to_search = get_query_from_url(url)

                      if "startpage.com" in url:
                          page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=35000)
                          time.sleep(2)
                          try:
                              page.type("input#q", query_to_search)
                              page.keyboard.press("Enter")
                          except Exception:
                              page.goto(url, wait_until="domcontentloaded", timeout=35000)
                              
                      elif "html.duckduckgo.com" in url:
                          page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=35000)
                          time.sleep(2)
                          try:
                              page.type("input[name=q]", query_to_search)
                              page.keyboard.press("Enter")
                          except Exception:
                              page.goto(url, wait_until="domcontentloaded", timeout=35000)
                      else:
                          page.goto(url, wait_until="domcontentloaded", timeout=40000)
                      
                      # Attesa Dinamica per schermate Cloudflare / Turnstile (max 15 secondi)
                      start_wait_cf = time.time()
                      while time.time() - start_wait_cf < 15:
                          content_snapshot = get_safe_content(page)
                          low_snapshot = content_snapshot.lower()
                          if any(ind in low_snapshot for ind in ["just a moment", "security verification", "challenge-platform", "checking your browser"]):
                              print(f"[NODO {node_id}] Rilevato schermo di verifica/attesa Cloudflare. Attendo transizione...", flush=True)
                              time.sleep(1.5)
                          else:
                              break

                      # Azioni specifiche per siti particolari
                      if "pixelscan.net" in url:
                          try:
                              btn = page.locator("text=Scan My Browser Now").first
                              if btn.is_visible(timeout=3000):
                                  btn.click() 
                                  time.sleep(5)
                          except Exception:
                              pass
                          
                      if "creepjs" in url:
                          time.sleep(3)
                      else:
                          time.sleep(random.uniform(3.0, 5.0))

                      raw_html = get_safe_content(page)
                      
                      # Chiusura sicura delle istanze
                      page.close()
                      context.close()
                      
                      # Validiamo il risultato
                      is_ok, err_msg = validate_html(raw_html, url)
                      if is_ok:
                          results += f"TESTO ESTRATTO (Fallback - Porta {current_port}):\n{extract_text(raw_html, url)}\n"
                          scraped_successfully = True
                          break
                      else:
                          print(f"[NODO {node_id}] HTML ottenuto da {url} non supera la validazione (Porta {current_port}): {err_msg}", flush=True)
                          
                  except Exception as e:
                      print(f"[NODO {node_id}] Errore fallback su porta {current_port}: {e}", flush=True)
                      if page:
                          try:
                              page.close()
                          except Exception:
                              pass
                      if context:
                          try:
                              context.close()
                          except Exception:
                              pass
                              
              if not scraped_successfully:
                  results += f"ERRORE DEFINITIVO: Impossibile bypassare il blocco dopo failover e attese dinamiche.\nSorgente estratta per debug:\n{extract_text(raw_html, url) if raw_html else 'Nessun HTML ottenuto'}\n"

              time.sleep(random.uniform(2.0, 4.0))

          with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Parallelo - STEP 1 (curl-cffi)
        run: |
          echo "Avvio processi paralleli per STEP 1..."
          
          touch node1_step1.log node2_step1.log node3_step1.log node4_step1.log node5_step1.log node6_step1.log
          
          tail -q -f node1_step1.log node2_step1.log node3_step1.log node4_step1.log node5_step1.log node6_step1.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            echo "Inizializzazione Nodo $i (Step 1)..."
            python -u m2_step1.py $i > node${i}_step1.log 2>&1 &
            PIDS+=($!)
            
            if [ $i -lt 6 ]; then
              sleep 2
            fi
          done

          echo "Tutti i nodi Step 1 istanziati. Attesa completamento..."
          wait "${PIDS[@]}"
          
          kill $TAIL_PID || true
          
          echo "STEP 1 completato. Pulizia totale dei container dello Step 1..."
          for i in {1..6}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

      - name: Setup e Verifica Container STEP 2 (IPv6)
        run: |
          echo "Avvio dei container dello Step 2 (Porte 40007-40012)..."
          for i in {7..12}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
          done

          echo "Verifica attiva del corretto avvio dei tunnel STEP 2..."
          ENDPOINTS=(
            "https://api6.ipify.org?format=json"
            "https://v6.ident.me/.json"
            "https://ifconfig.co/json"
          )

          # Polling rapido per evitare attese statiche (sleep fisse)
          for i in {7..12}; do
            PORT=$((40000 + i))
            SUCCESS=false
            echo "Verifica container $i sulla porta $PORT..."
            
            for tentativo in {1..15}; do
              URL=${ENDPOINTS[$((tentativo % 3))]}
              if curl -s --max-time 3 --proxy socks5h://127.0.0.1:$PORT "$URL" > /dev/null; then
                echo "Container $i pronto sulla porta $PORT!"
                SUCCESS=true
                break
              fi
              sleep 1
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "ERRORE CRITICO: Il container $i non risponde."
              exit 1
            fi
          done

      - name: Esecuzione Scraping Parallelo - STEP 2 (Fallback CloakBrowser)
        run: |
          echo "Avvio processi paralleli per STEP 2 sui target falliti..."
          
          touch node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log
          
          tail -q -f node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            echo "Inizializzazione Nodo $i (Step 2)..."
            python -u m2_step2.py $i > node${i}_step2.log 2>&1 &
            PIDS+=($!)
            
            if [ $i -lt 6 ]; then
              sleep 2
            fi
          done

          echo "Tutti i nodi Step 2 istanziati. Attesa completamento..."
          wait "${PIDS[@]}"
          
          kill $TAIL_PID || true
          
          echo "STEP 2 completato. Rimozione dei container STEP 2..."
          for i in {7..12}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

          # Aggregazione finale e unione di tutti i report
          touch output_node_1_step1.txt output_node_1_step2.txt \
                output_node_2_step1.txt output_node_2_step2.txt \
                output_node_3_step1.txt output_node_3_step2.txt \
                output_node_4_step1.txt output_node_4_step2.txt \
                output_node_5_step1.txt output_node_5_step2.txt \
                output_node_6_step1.txt output_node_6_step2.txt

          cat output_node_1_step1.txt output_node_1_step2.txt \
              output_node_2_step1.txt output_node_2_step2.txt \
              output_node_3_step1.txt output_node_3_step2.txt \
              output_node_4_step1.txt output_node_4_step2.txt \
              output_node_5_step1.txt output_node_5_step2.txt \
              output_node_6_step1.txt output_node_6_step2.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
