name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS PER CLOAKBROWSER (Essenziale per sistemi Linux minimi)
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]"
          playwright install-deps chromium

      - name: Setup 6 WARProxy Docker Containers (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest

            if [ $i -lt 6 ]; then
              DELAY=$((3 + RANDOM % 2))
              echo "Attesa scaglionata di $DELAY secondi per il prossimo container..."
              sleep $DELAY
            fi
          done

          echo "Attesa finale inizializzazione dei tunnel..."
          sleep 10

      - name: Verifica IP IPv6 con Auto-healing (socks5h)
        run: |
          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "=================================================="
            echo "VERIFICA E AUTO-HEALING CONTAINER $i (PORTA $PORT):"
            
            DELAY=$((3 + RANDOM % 2))
            sleep $DELAY

            SUCCESS=false
            for tentativo in {1..5}; do
              echo "Tentativo $tentativo/5 per container $i..."
              IP=$(curl -s --max-time 10 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org?format=json)
              
              if [ $? -eq 0 ] && [ ! -z "$IP" ]; then
                echo "Container $i pronto! IP: $IP"
                SUCCESS=true
                break
              else
                echo "Container $i non risponde. Riavvio in corso..."
                docker restart warproxy-$i
                sleep 5
              fi
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "ERRORE CRITICO: Il container $i non è raggiungibile dopo 5 riavvii."
              exit 1
            fi
          done
          echo "=================================================="

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Creazione script Python (Estrazione Recensioni Google Maps)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import sys
          import random
          import os
          import re
          import json
          from cloakbrowser import launch_persistent_context

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          # --- CONFIGURAZIONE CLOAKBROWSER ---
          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}")

          extra_args_base = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          # --- METODO 1: RICERCA E DISAMBIGUAZIONE ---
          def esegui_ricerca_e_apri_scheda(page, query):
              """Risolve la ricerca e si assicura che la scheda del luogo sia aperta."""
              # Sostituiamo gli spazi con il '+' per l'URL di ricerca diretta di Google Maps
              search_url = f"https://www.google.com/maps/search/{query.replace(' ', '+')}"
              print(f"[NODO {node_id}] Eseguo ricerca diretta su URL: {search_url}", flush=True)
              
              page.goto(search_url, wait_until="domcontentloaded", timeout=50000)
              
              # Gestione del Cookie Consent di Google (essenziale in GHA per evitare blocco iniziale)
              try:
                  consent_btn = page.locator("button:has-text('Accetta tutto'), button:has-text('Accept all')").first
                  if consent_btn.is_visible(timeout=4000):
                      consent_btn.click()
                      time.sleep(2)
              except Exception:
                  pass

              page.wait_for_load_state("networkidle")
              time.sleep(3)

              # Verifica se siamo finiti su un elenco (Caso B) o direttamente sulla scheda (Caso A)
              # Su Maps, i link dei risultati di una ricerca ad elenco contengono sempre '/maps/place/'
              risultati_ricerca = page.locator("a[href*='/maps/place/']")
              
              if risultati_ricerca.count() > 0:
                  print(f"[NODO {node_id}] Rilevato elenco di disambiguazione. Seleziono il primo risultato...", flush=True)
                  # Clicchiamo sul primo risultato dell'elenco
                  risultati_ricerca.first.click()
                  page.wait_for_load_state("networkidle")
                  time.sleep(3)
              else:
                  print(f"[NODO {node_id}] Direct Hit! Scheda del luogo aperta direttamente.", flush=True)

          # --- METODO 2: ESTRAZIONE CON FINESTRA SCORREVOLE (SLIDING WINDOW) ---
          def estrai_recensioni_passo_passo(page, max_recensioni=100):
              """Estrae le recensioni in tempo reale gestendo la distruzione dei nodi nel DOM."""
              # 1. Clicchiamo sul tab delle recensioni
              # Cerchiamo il pulsante che contiene la stringa 'recensioni' o 'reviews' nell'aria-label
              review_tab = page.locator("button[aria-label*='recensioni'], button[aria-label*='Reviews'], div.F7nice button").first
              review_tab.click()
              time.sleep(3)
              
              # 2. Identifichiamo il selettore del sotto-pannello scrollabile
              # Il feed delle recensioni è solitamente un div con attributo role="feed" o classe .m6QErb.DDoB2b
              panel = page.locator("div[role='feed']").first
              if not panel.is_visible():
                  panel = page.locator("div.m6QErb.DDoB2b").first

              recensioni_estratte = {}
              iterazioni_senza_novita = 0
              
              print(f"[NODO {node_id}] Avvio loop di scorrimento ed estrazione in tempo reale...", flush=True)
              
              while len(recensioni_estratte) < max_recensioni and iterazioni_senza_novita < 8:
                  # Recupera tutte le card delle recensioni attualmente caricate in memoria
                  cards = page.locator(".jftiEf").all()
                  nuovi_elementi_trovati = 0
                  
                  for card in cards:
                      try:
                          # Google Maps espone l'ID univoco della recensione nel tag HTML
                          review_id = card.get_attribute("data-review-id")
                          
                          # Fallback di sicurezza: se manca l'ID, generiamo un hash sul testo parziale
                          if not review_id:
                              autore_testo = card.locator(".d470gc").inner_text()
                              testo_parziale = card.locator(".wiI7pd").inner_text()[:20]
                              review_id = f"custom_id_{hash(autore_testo + testo_parziale)}"
                          
                          # Se la chiave non è presente nel nostro dizionario di accumulo, la estraiamo
                          if review_id not in recensioni_estratte:
                              autore = card.locator(".d470gc").inner_text()
                              
                              # Se la recensione è molto lunga, Google nasconde il testo sotto un pulsante "Altro"
                              altro_btn = card.locator("button:has-text('Altro'), button:has-text('More')").first
                              if altro_btn.is_visible(timeout=500):
                                  altro_btn.click() # Clic asincrono per espandere il testo prima di catturarlo
                                  time.sleep(0.2)
                                  
                              testo_completo = card.locator(".wiI7pd").inner_text()
                              stelle_el = card.locator("span.kv731.v37sz1").first
                              stelle = stelle_el.get_attribute("aria-label") if stelle_el.count() > 0 else "N/D"
                              
                              # Salvataggio immediato
                              recensioni_estratte[review_id] = {
                                  "autore": autore,
                                  "testo": testo_completo,
                                  "stelle": stelle
                              }
                              nuovi_elementi_trovati += 1
                              
                              if len(recensioni_estratte) >= max_recensioni:
                                  break
                      except Exception:
                          # Durante lo scrolling, Playwright potrebbe fallire la lettura se Vue distrugge l'elemento a caldo.
                          # Intercettiamo l'errore per evitare il crash dello script e passiamo alla card successiva.
                          continue
                  
                  if nuovi_elementi_trovati > 0:
                      iterazioni_senza_dati = 0
                      print(f"[NODO {node_id}] Trovate nuove recensioni. Totale: {len(api_key_extracted)}", flush=True)
                  else:
                      iterazioni_senza_novita += 1
                  
                  # Se per 30 iterazioni non troviamo nulla di nuovo, fermiamo lo scroll
                  if iterazioni_senza_novita >= 30:
                      break

                  # Eseguiamo lo scroll sul contenitore specifico (non sulla pagina globale)
                  panel.evaluate("el => el.scrollBy(0, 450)")
                  
                  # Pausa per permettere l'invio della richiesta AJAX e il rendering dei nodi
                  time.sleep(random.uniform(1.2, 1.8))
                  
              return list(recensioni_estratte.values())

          # --- RUN PRINCIPALE ---
          try:
              context = launch_persistent_context(
                  profile_dir,
                  headless=False,
                  humanize=True,
                  human_config={
                      "typing_delay": 100,
                      "mistype_chance": 0.02,
                      "idle_between_actions": True
                  },
                  proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
                  geoip=True,
                  viewport={"width": 1920, "height": 1080},
                  args=extra_args_base
              )

              page = context.new_page()
              
              # Query dinamica di test
              ricerca_target = "Coro Orvieto"
              
              # 1. Trova ed apre il locale gestendo la disambiguazione
              esegui_ricerca_e_apri_scheda(page, ricerca_target)
              
              # 2. Estrae le recensioni in tempo reale battendo il recycling del DOM
              recensioni = estrai_recensioni_passo_passo(page, max_recensioni=50)
              
              # 3. Salvataggio su file
              output_file = f"output_node_{node_id}.txt"
              with open(output_file, "w", encoding="utf-8") as f:
                  f.write(json.dumps(recensioni, indent=4, ensure_ascii=False))
                  
              print(f"[NODO {node_id}] Esecuzione terminata. Salvate {len(recensioni)} recensioni.", flush=True)
              
              page.close()
              context.close()

          except Exception as e:
              print(f"[NODO {node_id}] Errore critico nel processo: {e}", flush=True)
              with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
                  f.write(f"ERRORE CRITICO: {e}\n")
          EOF

      - name: Esecuzione Scraping Parallelo (6 Nodi con Staggered Delay)
        run: |
          echo "Avvio processi paralleli su 6 nodi con avvio scaglionato casuale..."
          
          for i in {1..6}; do
            echo "Inizializzazione del Nodo $i..."
            python -u m2_insocket.py $i > node$i.log 2>&1 &
            
            if [ $i -lt 6 ]; then
              # Delay casuale tra 5 e 15 secondi prima di far partire lo scraper successivo
              DELAY=$((5 + RANDOM % 11))
              echo "Nodo $i avviato. Attesa casuale di $DELAY secondi prima del prossimo nodo..."
              sleep $DELAY
            fi
          done

          echo "Tutti i nodi sono stati instanziati. Attesa del completamento dello scraping..."
          wait

          echo "=== LOG NODO 1 ===" && cat node1.log || true
          echo "=== LOG NODO 2 ===" && cat node2.log || true
          echo "=== LOG NODO 3 ===" && cat node3.log || true
          echo "=== LOG NODO 4 ===" && cat node4.log || true
          echo "=== LOG NODO 5 ===" && cat node5.log || true
          echo "=== LOG NODO 6 ===" && cat node6.log || true
          echo "=================="

          touch output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt
          cat output_node_1.txt output_node_2.txt output_node_3.txt output_node_4.txt output_node_5.txt output_node_6.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
