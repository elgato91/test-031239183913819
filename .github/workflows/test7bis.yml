name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # COPIA DEI FONT WINDOWS
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl-cffi
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup Container STEP 1 (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
            sleep 0.5
          done

      - name: Inizializzazione Coda Globale STEP 1
        run: |
          # Scrittura protetta tramite Heredoc (Previene errori di apici di Bash)
          cat << 'EOF' > m2_step1_setup.py
          import json
          TARGETS = [
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]
          with open("/tmp/step1_queue.json", "w") as f:
              json.dump(TARGETS, f)
          print("Coda globale dello Step 1 creata con successo.")
          EOF
          python -u m2_step1_setup.py

      - name: Creazione Script Python - STEP 1 (Pure curl-cffi con Coda Dinamica e Autoverifica)
        run: |
          cat << 'EOF' > m2_step1.py
          import time
          import sys
          import random
          import os
          import json
          import fcntl
          from bs4 import BeautifulSoup
          from curl_cffi import requests
          from urllib.parse import urlparse

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]
          QUEUE_FILE = "/tmp/step1_queue.json"
          LOCK_FILE = "/tmp/step1_queue.lock"

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          def verify_proxy_active(port, node_id, max_retries=5, delay=5):
              """Verifica attiva del proxy direttamente dentro Python."""
              print(f"[NODO {node_id}] Verifica attività proxy sulla porta {port}...", flush=True)
              test_session = requests.Session(impersonate="chrome120")
              test_session.proxies = {
                  "http": f"socks5h://127.0.0.1:{port}",
                  "https": f"socks5h://127.0.0.1:{port}"
              }
              endpoints = [
                  "https://api6.ipify.org?format=json",
                  "https://v6.ident.me/.json",
                  "https://ifconfig.co/json"
              ]
              for r in range(1, max_retries + 1):
                  url = endpoints[(r - 1) % len(endpoints)]
                  try:
                      resp = test_session.get(url, timeout=6)
                      if resp.status_code == 200 and len(resp.text) > 0:
                          print(f"[NODO {node_id}] Proxy allineato! Risposta: {resp.text.strip()}", flush=True)
                          return True
                  except Exception as e:
                      print(f"[NODO {node_id}] Tentativo {r}/{max_retries} fallito per il proxy {port}: {e}", flush=True)
                  if r < max_retries:
                      time.sleep(delay)
              return False

          def get_next_target(queue_path, lock_path):
              """Estrae in modo sicuro (process-safe) il prossimo URL disponibile dalla coda globale."""
              if not os.path.exists(queue_path):
                  return None
              with open(lock_path, "w") as lock_f:
                  try:
                      fcntl.flock(lock_f, fcntl.LOCK_EX)
                      if not os.path.exists(queue_path) or os.path.getsize(queue_path) == 0:
                          return None
                      with open(queue_path, "r") as q_f:
                          try:
                              queue = json.load(q_f)
                          except Exception:
                              return None
                      if not queue:
                          return None
                      next_url = queue.pop(0)
                      with open(queue_path, "w") as q_f:
                          json.dump(queue, q_f)
                      return next_url
                  except Exception as e:
                      print(f"Errore lock: {e}", flush=True)
                      return None
                  finally:
                      fcntl.flock(lock_f, fcntl.LOCK_UN)

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def validate_html(html, url):
              if not html or len(html.strip()) < 300:
                  return False, "Sorgente HTML vuota o estremamente ridotta"
              
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return True, ""

              low_html = html.lower()
              blocking_indicators = [
                  "captcha", "recaptcha", "hcaptcha", "cloudflare", "challenge-platform",
                  "access denied", "blocked", "forbidden", "403 forbidden", "404 not found",
                  "robot check", "security verification", "enable javascript", "ddos-guard",
                  "distil networks", "incapsula", "sucuri", "perimeterx", "scrolling is not possible",
                  "unusual traffic"
              ]
              
              for indicator in blocking_indicators:
                  if indicator in low_html:
                      return False, f"Rilevato blocco anti-bot o errore di rete: {indicator}"
                          
              try:
                  soup = BeautifulSoup(html, 'html.parser')
                  text = soup.get_text(separator=' ', strip=True)
                  if len(text) < 100:
                      return False, "Contenuto testuale insufficiente (< 100 caratteri)"
              except Exception as e:
                  return False, f"Impossibile effettuare il parsing HTML: {str(e)}"
                  
              return True, ""

          # --- INIZIO SCRAPING STEP 1 ---
          if not verify_proxy_active(ACTIVE_PORT, node_id):
              print(f"[NODO {node_id}] ERRORE: Proxy offline. Spegnimento. Il carico verrà assorbito dagli altri nodi.", flush=True)
              sys.exit(0)

          # Inizializziamo una singola sessione persistente all'esterno per sfruttare il Connection Pooling di HTTP/2
          print(f"[NODO {node_id}] [Scraping curl_cffi] Inizializzazione sessione persistente...", flush=True)
          session = requests.Session(impersonate="chrome120")
          session.proxies = {
              "http": f"socks5h://127.0.0.1:{ACTIVE_PORT}",
              "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"
          }

          results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 1 (curl-cffi) (PORTA {ACTIVE_PORT})\n{'#'*60}\n"
          failed_targets = []
          last_domain = ""

          while True:
              url = get_next_target(QUEUE_FILE, LOCK_FILE)
              if not url:
                  break
                  
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              parsed_url = urlparse(url)
              current_domain = parsed_url.netloc
              if last_domain and current_domain == last_domain:
                  delay = random.uniform(2.0, 4.0)
                  print(f"[NODO {node_id}] Stesso dominio rilevato ({current_domain}). Attesa di {delay:.2f}s...", flush=True)
                  time.sleep(delay)
              else:
                  time.sleep(0.3)
              
              last_domain = current_domain
              print(f"[NODO {node_id}] -> Richiesta curl-cffi: {url}", flush=True)
              
              try:
                  resp = session.get(url, timeout=20)
                  html_content = resp.text
                  
                  is_ok, err_msg = validate_html(html_content, url)
                  if is_ok:
                      print(f"[NODO {node_id}] -> Successo: {url}", flush=True)
                      results += f"TESTO ESTRATTO (curl-cffi):\n{extract_text(html_content, url)}\n"
                  else:
                      print(f"[NODO {node_id}] -> Validazione fallita per {url}: {err_msg}", flush=True)
                      results += f"FALLITO (Errore validazione): {err_msg}\n"
                      failed_targets.append(url)
                      
              except Exception as e:
                  print(f"[NODO {node_id}] -> Errore connessione per {url}: {e}", flush=True)
                  results += f"FALLITO (Errore globale): {str(e)}\n"
                  failed_targets.append(url)

          session.close()

          with open(f"output_node_{node_id}_step1.txt", "w", encoding="utf-8") as f:
              f.write(results)

          with open(f"failed_node_{node_id}.json", "w", encoding="utf-8") as f:
              json.dump(failed_targets, f)
          EOF

      - name: Creazione Script Python - STEP 2 (CloakBrowser con Rotazione Proxy e Warmup H2 Integrato)
        run: |
          cat << 'EOF' > m2_step2.py
          import time
          import sys
          import random
          import os
          import json
          import fcntl
          from cloakbrowser import launch_persistent_context
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs
          from curl_cffi import requests

          QUEUE_FILE = "/tmp/step2_queue.json"
          LOCK_FILE = "/tmp/step2_queue.lock"

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40006 + node_id

          def verify_proxy_active(port, node_id, max_retries=5, delay=5):
              """Verifica attiva del proxy per lo Step 2."""
              print(f"[NODO {node_id}] Verifica attività proxy sulla porta {port}...", flush=True)
              test_session = requests.Session(impersonate="chrome120")
              test_session.proxies = {
                  "http": f"socks5h://127.0.0.1:{port}",
                  "https": f"socks5h://127.0.0.1:{port}"
              }
              endpoints = [
                  "https://api6.ipify.org?format=json",
                  "https://v6.ident.me/.json",
                  "https://ifconfig.co/json"
              ]
              for r in range(1, max_retries + 1):
                  url = endpoints[(r - 1) % len(endpoints)]
                  try:
                      resp = test_session.get(url, timeout=6)
                      if resp.status_code == 200 and len(resp.text) > 0:
                          print(f"[NODO {node_id}] Proxy allineato! Risposta: {resp.text.strip()}", flush=True)
                          return True
                  except Exception as e:
                      print(f"[NODO {node_id}] Tentativo {r}/{max_retries} fallito per il proxy {port}: {e}", flush=True)
                  if r < max_retries:
                      time.sleep(delay)
              return False

          def get_next_target(queue_path, lock_path):
              """Estrae in modo sicuro il prossimo URL disponibile dalla coda globale di fallback."""
              if not os.path.exists(queue_path):
                  return None
              with open(lock_path, "w") as lock_f:
                  try:
                      fcntl.flock(lock_f, fcntl.LOCK_EX)
                      if not os.path.exists(queue_path) or os.path.getsize(queue_path) == 0:
                          return None
                      with open(queue_path, "r") as q_f:
                          try:
                              queue = json.load(queue_f)
                          except Exception:
                              return None
                      if not queue:
                          return None
                      next_url = queue.pop(0)
                      with open(queue_path, "w") as q_f:
                          json.dump(queue, q_f)
                      return next_url
                  except Exception as e:
                      print(f"Errore lock: {e}", flush=True)
                      return None
                  finally:
                      fcntl.flock(lock_f, fcntl.LOCK_UN)

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          def run_warmup_phase_http2(context, node_id):
              """Warmup isolato ed autonomo su domini neutri ad alta fiducia (Google e Wikipedia)."""
              print(f"[NODO {node_id}] [Warmup STEP 2] Avvio riscaldamento su Wikipedia & Google...", flush=True)
              try:
                  page = context.new_page()
                  
                  # 1. Visita passiva su Wikipedia (Neutro e sicuro per evitare rintracciabilità)
                  try:
                      page.goto("https://it.wikipedia.org/wiki/Pagina_principale", wait_until="commit", timeout=15000)
                      time.sleep(4)
                  except Exception:
                      pass
                      
                  # 2. Visita passiva su Google Home
                  try:
                      page.goto("https://www.google.com", wait_until="commit", timeout=15000)
                      time.sleep(3)
                  except Exception:
                      pass
                      
                  page.close()
                  print(f"[NODO {node_id}] [Warmup STEP 2] Completato.", flush=True)
              except Exception as e:
                  print(f"[NODO {node_id}] Errore warmup STEP 2: {e}", flush=True)

          # --- INIZIO SCRIPT RECUPERO ---
          if not verify_proxy_active(ACTIVE_PORT, node_id):
              print(f"[NODO {node_id}] ERRORE: Proxy offline. Spegnimento. Il carico verrà assorbito dagli altri nodi.", flush=True)
              with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
                  f.write(f"Proxy offline per il nodo {node_id}. Carico delegato ad altri nodi.\n")
              sys.exit(0)

          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}_step2")

          extra_args_base = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          # Avviamo il Browser persistente (UNICO per tutta la durata del nodo)
          print(f"[NODO {node_id}] [Scraping HTTP/2] Avvio istanza browser persistente...", flush=True)
          context = launch_persistent_context(
              profile_dir,
              headless=False,
              humanize=True,
              human_config={
                  "typing_delay": 100,
                  "mistype_chance": 0.03,
                  "idle_between_actions": True
              },
              proxy=f"socks5://127.0.0.1:{ACTIVE_PORT}",
              geoip=True,
              viewport={"width": 1920, "height": 1080},
              args=extra_args_base
          )

          # Eseguiamo il warmup iniziale una sola volta all'apertura del browser
          run_warmup_phase_http2(context, node_id)
          time.sleep(1.0)

          results = f"\n{'#'*60}\nREPORT NODO {node_id} - STEP 2 (Cloakbrowser) (PORTA {ACTIVE_PORT})\n{'#'*60}\n"

          while True:
              url = get_next_target(QUEUE_FILE, LOCK_FILE)
              if not url:
                  break
                  
              results += f"\n{'='*50}\nTARGET FALLBACK: {url}\n{'='*50}\n"
              print(f"[NODO {node_id}] -> Recupero fallback: {url}", flush=True)
              
              page = None
              try:
                  page = context.new_page()
                  query_to_search = get_query_from_url(url)

                  # Carica con commit immediato per agganciare subito la sfida JS
                  if "startpage.com" in url:
                      page.goto("https://www.startpage.com/", wait_until="commit", timeout=25000)
                      time.sleep(2)
                      try:
                          page.type("input#q", query_to_search)
                          page.keyboard.press("Enter")
                      except Exception:
                          page.goto(url, wait_until="commit", timeout=25000)
                          
                  elif "html.duckduckgo.com" in url:
                      page.goto("https://html.duckduckgo.com/", wait_until="commit", timeout=25000)
                      time.sleep(2)
                      try:
                          page.type("input[name=q]", query_to_search)
                          page.keyboard.press("Enter")
                      except Exception:
                          page.goto(url, wait_until="commit", timeout=25000)
                          
                  else:
                      page.goto(url, wait_until="commit", timeout=30000)

                  # POLLING ATTIVO DI MONITORAGGIO RISOLUZIONE WAF / CLOUDFLARE (Protetto da eccezioni di navigazione)
                  print(f"[NODO {node_id}] Monitoraggio barriere di sicurezza...", flush=True)
                  start_poll = time.time()
                  
                  while time.time() - start_poll < 15: # Attesa dinamica max 15 secondi
                      try:
                          content = page.content().lower()
                      except Exception:
                          # Previene crash asincroni se la pagina sta eseguendo un redirect
                          time.sleep(1.0)
                          continue

                      is_challenge = (
                          "challenge-platform" in content or
                          "just a moment" in content or
                          "checking your browser" in content or
                          "security verification" in content or
                          "enable javascript" in content or
                          "forbidden" in content or
                          "access denied" in content or
                          "captcha" in content
                      )
                      
                      if not is_challenge and len(content.strip()) > 150:
                          break
                      time.sleep(1.0)
                      
                  # Un piccolo assestamento per consentire il caricamento degli asset asincroni
                  time.sleep(3.0)

                  if "pixelscan.net" in url:
                      try:
                          btn = page.locator("text=Scan My Browser Now").first
                          if btn.is_visible(timeout=3000):
                              btn.click() 
                              time.sleep(4)
                      except Exception:
                          pass

                  raw_html = page.content()
                  results += f"TESTO ESTRATTO (Fallback):\n{extract_text(raw_html, url)}\n"

              except Exception as e:
                  print(f"[NODO {node_id}] Errore fallback: {e}", flush=True)
                  results += f"ERRORE GLOBALE FALLBACK: {str(e)}\n"
              finally:
                  if page:
                      try:
                          page.close()
                      except Exception:
                          pass
                  
                  visit_interval = random.uniform(2.0, 4.0)
                  print(f"[NODO {node_id}] Pausa di {visit_interval:.2f}s prima del prossimo target...", flush=True)
                  time.sleep(visit_interval)

          # Chiusura ordinata del browser persistente
          try:
              context.close()
          except Exception:
              pass

          with open(f"output_node_{node_id}_step2.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Parallelo - STEP 1 (curl-cffi)
        run: |
          echo 'Avvio processi paralleli per STEP 1...'
          
          touch node1_step1.log node2_step1.log node3_step1.log node4_step1.log node5_step1.log node6_step1.log
          
          tail -q -f node1_step1.log node2_step1.log node3_step1.log node4_step1.log node5_step1.log node6_step1.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            echo "Inizializzazione Nodo $i (Step 1)..."
            python -u m2_step1.py $i > node${i}_step1.log 2>&1 &
            PIDS+=($!)
            
            if [ $i -lt 6 ]; then
              sleep 1.5
            fi
          done

          echo 'Tutti i nodi Step 1 istanziati. Attesa completamento...'
          wait "${PIDS[@]}"
          
          kill $TAIL_PID || true
          
          echo 'STEP 1 completato. Pulizia totale dei container dello Step 1...'
          for i in {1..6}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

      - name: Setup Container STEP 2 (IPv6 Sequenziale)
        run: |
          # Avvio sequenziale con ritardo "sleep 3" per scaglionare le registrazioni concorrenti a Cloudflare
          echo 'Avvio dei container dello Step 2 (Porte 40007-40012)...'
          for i in {7..12}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
            
            sleep 3.0
          done

      - name: Inizializzazione Coda Globale STEP 2 (Unione e Fusione Fallimenti)
        run: |
          # Scrittura protetta tramite Heredoc (Previene errori di apici di Bash)
          cat << 'EOF' > m2_step2_setup.py
          import json
          import os

          merged_failed = []
          for i in range(1, 7):
              filename = f"failed_node_{i}.json"
              if os.path.exists(filename):
                  with open(filename, "r", encoding="utf-8") as f:
                      try:
                          failed = json.load(f)
                          merged_failed.extend(failed)
                      except Exception:
                          pass
          
          # Rimozione duplicati preservando l'ordine originale
          unique_failed = list(dict.fromkeys(merged_failed))
          
          with open("/tmp/step2_queue.json", "w") as f:
              json.dump(unique_failed, f)
              
          print(f"Coda globale dello Step 2 creata con {len(unique_failed)} target da recuperare.")
          EOF
          python -u m2_step2_setup.py

      - name: Esecuzione Scraping Parallelo - STEP 2 (Fallback CloakBrowser)
        run: |
          echo 'Avvio processi paralleli per STEP 2 sui target falliti...'
          
          touch node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log
          
          tail -q -f node1_step2.log node2_step2.log node3_step2.log node4_step2.log node5_step2.log node6_step2.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            echo "Inizializzazione Nodo $i (Step 2)..."
            python -u m2_step2.py $i > node${i}_step2.log 2>&1 &
            PIDS+=($!)
            
            if [ $i -lt 6 ]; then
              sleep 1.5
            fi
          done

          echo 'Tutti i nodi Step 2 istanziati. Attesa completamento...'
          wait "${PIDS[@]}"
          
          kill $TAIL_PID || true
          
          echo 'STEP 2 completato. Rimozione dei container STEP 2...'
          for i in {7..12}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

          touch output_node_1_step1.txt output_node_1_step2.txt \
