name: Test RAG Challenge 2026 Università di Roma Corso di Computer Science

on: 
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:

      - name: Installazione Font di Sistema
        run: |
          sudo apt-get update
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          
          # Copia dei font Windows per CloakBrowser
          mkdir -p ~/.local/share/fonts/windows
          cp /usr/share/fonts/truetype/msttcorefonts/*.ttf ~/.local/share/fonts/windows/ || true
          cp /usr/share/fonts/truetype/msttcorefonts/*.TTF ~/.local/share/fonts/windows/ || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests "requests[socks]" curl-cffi
          playwright install-deps chromium

      - name: Avvio Xvfb (Virtual Display Headful)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Pre-inizializzazione Cache CloakBrowser
        run: |
          python -m cloakbrowser install

      - name: Setup e Verifica Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest

          # Avvio controllato dei 6 container proxy (Porte 40001-40006)
          for i in {1..6}; do
            PORT=$((40000 + i))
            echo "Avvio container warproxy-$i sulla porta $PORT..."
            docker run --name warproxy-$i \
              --network host \
              -e SOCKS5_PORT=$PORT \
              -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -e VERBOSE=true \
              -d ghcr.io/kingcc/warproxy:latest
          done

          echo "Verifica attiva dei proxy in corso (Polling)..."
          ENDPOINTS=(
            "https://api6.ipify.org?format=json"
            "https://v6.ident.me/.json"
            "https://ifconfig.co/json"
          )

          for i in {1..6}; do
            PORT=$((40000 + i))
            SUCCESS=false
            echo "Verifica del proxy sulla porta $PORT..."
            
            # Polling attivo fino a un massimo di 15 secondi per nodo
            for tentativo in {1..15}; do
              URL=${ENDPOINTS[$((tentativo % 3))]}
              if curl -s --max-time 3 --proxy socks5h://127.0.0.1:$PORT "$URL" > /dev/null; then
                echo "Proxy sulla porta $PORT pronto!"
                SUCCESS=true
                break
              fi
              sleep 1
            done

            if [ "$SUCCESS" = "false" ]; then
              echo "ERRORE CRITICO: Il proxy sulla porta $PORT non risponde."
              exit 1
            fi
          done

      - name: Creazione Script Python Unificato (Pipeline Continua)
        run: |
          cat << 'EOF' > m2_unified.py
          import time
          import sys
          import random
          import math
          import os
          import json
          from bs4 import BeautifulSoup
          from curl_cffi import requests
          from urllib.parse import urlparse, parse_qs
          from cloakbrowser import launch_persistent_context

          TARGETS = [
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.facebook.com/groups/expatsinparaguay/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]

          if len(sys.argv) < 2:
              sys.exit(1)

          node_id = int(sys.argv[1])
          ACTIVE_PORT = 40000 + node_id

          num_nodes = 6
          slice_size = math.ceil(len(TARGETS) / num_nodes)
          MY_TARGETS = TARGETS[(node_id-1)*slice_size : node_id*slice_size]

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def validate_html(html, url):
              if not html or len(html.strip()) < 300:
                  return False, "Sorgente HTML vuota o estremamente ridotta (< 300 byte)"
              
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return True, ""

              low_html = html.lower()
              blocking_indicators = [
                  "captcha", "recaptcha", "hcaptcha", "cloudflare", "challenge-platform",
                  "access denied", "blocked", "forbidden", "403 forbidden", "404 not found",
                  "robot check", "security verification", "enable javascript", "ddos-guard",
                  "distil networks", "incapsula", "sucuri", "perimeterx", "scrolling is not possible",
                  "unusual traffic"
              ]
              
              for indicator in blocking_indicators:
                  if indicator in low_html:
                      return False, f"Rilevato blocco anti-bot o errore di rete: '{indicator}'"
                          
              try:
                  soup = BeautifulSoup(html, 'html.parser')
                  text = soup.get_text(separator=' ', strip=True)
                  if len(text) < 100:
                      return False, "Contenuto testuale insufficiente (< 100 caratteri)"
              except Exception as e:
                  return False, f"Impossibile effettuare il parsing HTML: {str(e)}"
                  
              return True, ""

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          def run_fallback_cloak(url, profile_dir, active_port, extra_args):
              print(f"[NODO {node_id}] [FALLBACK CLOAK] Avvio browser reale per: {url}", flush=True)
              try:
                  context = launch_persistent_context(
                      profile_dir,
                      headless=False,
                      humanize=True,
                      human_config={
                          "typing_delay": 90,
                          "mistype_chance": 0.02,
                          "idle_between_actions": True
                      },
                      proxy=f"socks5://127.0.0.1:{active_port}",
                      geoip=True,
                      viewport={"width": 1920, "height": 1080},
                      args=extra_args
                  )
                  
                  page = context.new_page()
                  query_to_search = get_query_from_url(url)

                  # Navigazione nativa o simulazione interazioni per motori di ricerca
                  if "startpage.com" in url:
                      page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(1.5)
                      try:
                          page.type("input#q", query_to_search)
                          page.keyboard.press("Enter")
                      except Exception:
                          page.goto(url, wait_until="domcontentloaded", timeout=25000)
                          
                  elif "html.duckduckgo.com" in url:
                      page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(1.5)
                      try:
                          page.type("input[name=q]", query_to_search)
                          page.keyboard.press("Enter")
                      except Exception:
                          page.goto(url, wait_until="domcontentloaded", timeout=25000)
                  else:
                      page.goto(url, wait_until="domcontentloaded", timeout=30000)
                  
                  # Gestione interazioni specifiche
                  if "pixelscan.net" in url:
                      try:
                          btn = page.locator("text=Scan My Browser Now").first
                          if btn.is_visible(timeout=3000):
                              btn.click() 
                              time.sleep(4)
                      except Exception:
                          pass
                  elif "creepjs" in url:
                      time.sleep(3)
                  else:
                      time.sleep(random.uniform(2.0, 4.0))

                  # Estrazione sicura del sorgente della pagina
                  raw_html = ""
                  for _ in range(3):
                      try:
                          raw_html = page.content()
                          if raw_html:
                              break
                      except Exception:
                          time.sleep(1.5)

                  page.close()
                  context.close()
                  return raw_html
              except Exception as e:
                  print(f"[NODO {node_id}] [FALLBACK CLOAK] Errore critico: {e}", flush=True)
                  return ""

          # --- FLUSSO OPERATIVO PRINCIPALE ---
          random_seed = str(random.randint(100000, 999999))
          home_dir = os.path.expanduser("~")
          windows_fonts_dir = os.path.join(home_dir, ".local", "share", "fonts", "windows")
          profile_dir = os.path.join(home_dir, f".cloak_profiles/node_{node_id}")

          extra_args = [
              "--no-sandbox",
              "--disable-dev-shm-usage",
              f"--fingerprint={random_seed}",
              f"--fingerprint-fonts-dir={windows_fonts_dir}"
          ]

          # Setup sessione veloce curl-cffi
          session = requests.Session(impersonate="chrome120")
          session.proxies = {
              "http": f"socks5h://127.0.0.1:{ACTIVE_PORT}",
              "https": f"socks5h://127.0.0.1:{ACTIVE_PORT}"
          }

          results = f"\n{'#'*60}\nREPORT NODO {node_id} (PORTA {ACTIVE_PORT})\n{'#'*60}\n"

          for url in MY_TARGETS:
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"[NODO {node_id}] -> Tentativo veloce (curl-cffi): {url}", flush=True)
              
              # Minimo delay precauzionale prima di contattare un nuovo dominio
              time.sleep(random.uniform(0.5, 1.2))
              
              success = False
              try:
                  resp = session.get(url, timeout=12)
                  html_content = resp.text
                  is_ok, err_msg = validate_html(html_content, url)
                  
                  if is_ok:
                      print(f"[NODO {node_id}] -> Successo immediato (curl-cffi): {url}", flush=True)
                      results += f"TESTO ESTRATTO (curl-cffi):\n{extract_text(html_content, url)}\n"
                      success = True
                  else:
                      print(f"[NODO {node_id}] -> Fallito (curl-cffi): {err_msg}", flush=True)
              except Exception as e:
                  print(f"[NODO {node_id}] -> Errore connessione (curl-cffi): {e}", flush=True)

              # Se curl-cffi fallisce, esegui immediatamente il fallback on-the-fly con CloakBrowser
              if not success:
                  html_fallback = run_fallback_cloak(url, profile_dir, ACTIVE_PORT, extra_args)
                  is_ok, err_msg = validate_html(html_fallback, url)
                  
                  if is_ok:
                      print(f"[NODO {node_id}] -> Successo al recupero (CloakBrowser): {url}", flush=True)
                      results += f"TESTO ESTRATTO (Fallback CloakBrowser):\n{extract_text(html_fallback, url)}\n"
                  else:
                      print(f"[NODO {node_id}] -> Fallimento definitivo anche in recupero per {url}", flush=True)
                      results += f"FALLITO DEFINITIVAMENTE: {err_msg if err_msg else 'Errore sconosciuto/HTML vuoto'}\n"

          with open(f"output_node_{node_id}.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Parallelo Unificato
        run: |
          echo "Avvio processi paralleli unificati..."
          
          touch node1.log node2.log node3.log node4.log node5.log node6.log
          tail -q -f node1.log node2.log node3.log node4.log node5.log node6.log &
          TAIL_PID=$!
          
          PIDS=()
          for i in {1..6}; do
            echo "Inizializzazione Nodo $i..."
            python -u m2_unified.py $i > node${i}.log 2>&1 &
            PIDS+=($!)
            sleep 1
          done

          echo "Tutti i nodi sono in esecuzione. Attesa completamento..."
          wait "${PIDS[@]}"
          
          kill $TAIL_PID || true
          
          echo "Processi terminati. Rimozione e pulizia totale dei container Docker..."
          for i in {1..6}; do
            docker stop warproxy-$i || true
            docker rm warproxy-$i || true
          done

          # Aggregazione finale e creazione del report unificato
          touch output_node_1.txt output_node_2.txt output_node_3.txt \
                output_node_4.txt output_node_5.txt output_node_6.txt

          cat output_node_1.txt output_node_2.txt output_node_3.txt \
              output_node_4.txt output_node_5.txt output_node_6.txt > output_macchina2_cdp.txt

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
