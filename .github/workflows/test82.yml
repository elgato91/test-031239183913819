name: Test RAG Challenge 2026

on:
  workflow_dispatch:

jobs:
  docker_cdp_socks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Creazione Directory di Configurazione e Output
        run: |
          mkdir -p config1 config2 output

      - name: Generazione Configurazione WARP 1 (Account A)
        run: |
          docker run --rm -v $(pwd)/config1:/warp -w /warp ghcr.io/virb3/wgcf register --accept-tos
          docker run --rm -v $(pwd)/config1:/warp -w /warp ghcr.io/virb3/wgcf generate
          sudo chown -R $USER:$USER config1
          mv config1/wgcf-profile.conf config1/wg.conf

      - name: Generazione Configurazione WARP 2 (Account B)
        run: |
          docker run --rm -v $(pwd)/config2:/warp -w /warp ghcr.io/virb3/wgcf register --accept-tos
          docker run --rm -v $(pwd)/config2:/warp -w /warp ghcr.io/virb3/wgcf generate
          sudo chown -R $USER:$USER config2
          mv config2/wgcf-profile.conf config2/wg.conf

      - name: Modifica Configurazione per Esclusività IPv6 (AllowedIPs = ::/0)
        shell: python
        run: |
          for filepath in ["config1/wg.conf", "config2/wg.conf"]:
              with open(filepath, "r") as f:
                  content = f.read()
              
              lines = content.splitlines()
              clean_lines = []
              for line in lines:
                  # Esclude le righe destinate all'instradamento IPv4 generico
                  if "AllowedIPs" in line and "0.0.0.0" in line:
                      continue
                  clean_lines.append(line)
              
              with open(filepath, "w") as f:
                  f.write("\n".join(clean_lines) + "\n")
              print(f"Configurazione {filepath} modificata correttamente per uscire esclusivamente in IPv6.")

      - name: Creazione dei File di Configurazione Wireproxy
        run: |
          cat << 'EOF' > config1/wireproxy.conf
          WGConfig = /app/config/wg.conf

          [Socks5]
          BindAddress = 127.0.0.1:1080
          EOF

          cat << 'EOF' > config2/wireproxy.conf
          WGConfig = /app/config/wg.conf

          [Socks5]
          BindAddress = 127.0.0.1:1080
          EOF

      - name: Scrittura dei Dockerfile e Script di Avvio
        run: |
          # 1. Dockerfile Scraper
          cat << 'EOF' > Dockerfile.scraper
          FROM mcr.microsoft.com/playwright/python:v1.43.0-jammy
          ENV DEBIAN_FRONTEND=noninteractive
          RUN apt-get update && \
              echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | debconf-set-selections && \
              apt-get install -y --no-install-recommends \
              curl \
              xvfb \
              ttf-mscorefonts-installer \
              fonts-noto-color-emoji \
              fonts-freefont-ttf \
              fonts-unifont \
              fonts-ipafont-gothic \
              fonts-wqy-zenhei \
              fonts-tlwg-loma-otf \
              && rm -rf /var/lib/apt/lists/* \
              && fc-cache -f -v
          RUN pip install --no-cache-dir "cloakbrowser[geoip]" beautifulsoup4 requests
          RUN curl -fsSL -o /tmp/wireproxy.tar.gz https://github.com/pufferffish/wireproxy/releases/download/v1.0.8/wireproxy_linux_amd64.tar.gz && \
              tar -xzf /tmp/wireproxy.tar.gz -C /usr/local/bin/ wireproxy && \
              rm -rf /tmp/wireproxy.tar.gz
          WORKDIR /app
          COPY m2_insocket.py /app/m2_insocket.py
          COPY entrypoint_scraper.sh /app/entrypoint_scraper.sh
          RUN chmod +x /app/entrypoint_scraper.sh
          ENTRYPOINT ["/app/entrypoint_scraper.sh"]
          EOF

          # 2. Dockerfile Empty (Contenitore Vuoto / Inattivo)
          cat << 'EOF' > Dockerfile.empty
          FROM alpine:3.19
          RUN apk add --no-cache curl bash
          RUN curl -fsSL -o /tmp/wireproxy.tar.gz https://github.com/pufferffish/wireproxy/releases/download/v1.0.8/wireproxy_linux_amd64.tar.gz && \
              tar -xzf /tmp/wireproxy.tar.gz -C /usr/local/bin/ wireproxy && \
              rm -rf /tmp/wireproxy.tar.gz
          WORKDIR /app
          COPY entrypoint_empty.sh /app/entrypoint_empty.sh
          RUN chmod +x /app/entrypoint_empty.sh
          ENTRYPOINT ["/app/entrypoint_empty.sh"]
          EOF

          # 3. Entrypoint Scraper
          cat << 'EOF' > entrypoint_scraper.sh
          #!/bin/bash
          set -e
          # Avvio del Virtual Framebuffer
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
          export DISPLAY=:99

          echo "Avvio di Wireproxy (SOCKS5 locale su 127.0.0.1:1080)..."
          wireproxy -c /app/config/wireproxy.conf &
          WIREPROXY_PID=$!
          sleep 8

          echo "Verifica IP pubblico di uscita (SOCKS5H)..."
          curl -s --socks5-hostname 127.0.0.1:1080 https://api64.ipify.org?format=json || echo "Impossibile testare la connessione"
          
          python -u m2_insocket.py
          kill $WIREPROXY_PID || true
          EOF

          # 4. Entrypoint Empty
          cat << 'EOF' > entrypoint_empty.sh
          #!/bin/bash
          set -e
          echo "Avvio di Wireproxy nel container vuoto (SOCKS5 locale su 127.0.0.1:1080)..."
          wireproxy -c /app/config/wireproxy.conf &
          WIREPROXY_PID=$!
          sleep 8

          echo "Verifica IP pubblico di uscita nel container vuoto (SOCKS5H)..."
          curl -s --socks5-hostname 127.0.0.1:1080 https://api64.ipify.org?format=json || echo "Impossibile testare la connessione"
          
          echo "Container 2 (Vuoto) è operativo ed è in attesa (idle)..."
          tail -f /dev/null
          EOF

      - name: Creazione Script Python Scraper
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import os
          import random
          import requests
          from cloakbrowser import launch_context
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          TARGETS = [
              "https://api64.ipify.org?format=json",
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.eater.com/rome",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://guide.michelin.com/en/it/lazio/roma/restaurants",
              "https://www.cntraveler.com/gallery/best-restaurants-in-rome",
              "https://www.facebook.com/groups/1373361046396315/posts/2860154274383644/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://newromantimes.substack.com/p/a-very-subjective-list-of-the-best",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]
          results = ""

          # Allineamento di requests per forzare l'instradamento tramite proxy SOCKS5H locale
          LOCAL_PROXY = "socks5h://127.0.0.1:1080"
          PROXIES_DICT = {"http": LOCAL_PROXY, "https": LOCAL_PROXY}

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          def handle_cookie_consent(page):
              try:
                  consent_selectors = [
                      "button:has-text('Accetta tutto')",
                      "button:has-text('Accept all')",
                      "button:has-text('Consenti')",
                      "button:has-text('I agree')",
                      "button:has-text('Accetto')",
                      "button:has-text('Agree')",
                      "button:has-text('Accept')",
                      "button:has-text('OK')",
                      "button:has-text('Allow all')",
                      "button:has-text('Consenti l\\'uso dei cookie')",
                      "#L2AGLb"
                  ]
                  for selector in consent_selectors:
                      btn = page.locator(selector)
                      if btn.is_visible():
                          btn.click(timeout=1500)
                          time.sleep(0.5)
                          print(f"Cookie bypassato: {selector}", flush=True)
                          break
              except Exception:
                  pass

          # 1. Rilevamento preventivo dell'IP pubblico esatto (passando per il proxy SOCKS5H)
          print("Rilevamento IP pubblico di rete...", flush=True)
          detected_ip = None
          try:
              response = requests.get("https://api64.ipify.org?format=json", proxies=PROXIES_DICT, timeout=8)
              if response.status_code == 200:
                  detected_ip = response.json().get("ip")
                  print(f"IP Rilevato: {detected_ip}", flush=True)
          except Exception as e:
              print(f"Avviso: impossibile rilevare l'IP di rete ({e})", flush=True)

          timezone = "UTC"
          locale = "en-US"

          # 2. Geolocalizzazione basata sull'IP IPv6 reale (con freeipapi per azzerare i 429)
          if detected_ip:
              geo_services = [
                  (f"https://freeipapi.com/api/json/{detected_ip}", lambda d: (d.get("timeZone"), d.get("countryCode", "US"))),
                  (f"https://ipapi.co/{detected_ip}/json/", lambda d: (d.get("timezone"), d.get("languages", "en-US").split(",")[0])),
                  (f"https://ipwho.is/{detected_ip}", lambda d: (d.get("timezone"), d.get("country_code", "US")))
              ]
              for url, parse_func in geo_services:
                  try:
                      print(f"Geolocalizzazione IP su {url}...", flush=True)
                      response = requests.get(url, proxies=PROXIES_DICT, timeout=5)
                      if response.status_code == 200:
                          data = response.json()
                          tz, loc = parse_func(data)
                          if tz:
                              timezone = tz
                              locale = loc
                              if len(locale) == 2:
                                  country_to_locale = {
                                      "IT": "it-IT", "US": "en-US", "GB": "en-GB", "FR": "fr-FR", 
                                      "DE": "de-DE", "ES": "es-ES", "BR": "pt-BR", "CA": "en-CA"
                                  }
                                  locale = country_to_locale.get(locale.upper(), f"{locale.lower()}-{locale.upper()}")
                              print(f"Allineamento completato -> Timezone: {timezone} | Locale: {locale}", flush=True)
                              break
                  except Exception as e:
                      print(f"Avviso: {url} non raggiungibile o in rate-limit ({e}). Provo il servizio successivo...", flush=True)

          # Generazione di un seed hardware dinamico coerente per ogni run
          random_seed = str(random.randint(100000, 999999))
          print(f"Avviando CloakBrowser con seed hardware dinamico: {random_seed}...", flush=True)

          # Configurazione corretta del proxy locale SOCKS5 a livello di contesto Playwright e Chromium
          context = launch_context(
              headless=False,
              humanize=True,
              timezone=timezone,
              locale=locale,
              viewport={"width": 1920, "height": 950},
              proxy={"server": "socks5://127.0.0.1:1080"},
              args=[
                  "--no-sandbox", 
                  "--disable-dev-shm-usage",
                  "--proxy-server=socks5://127.0.0.1:1080",
                  f"--fingerprint-timezone={timezone}",
                  f"--fingerprint-locale={locale}",
                  f"--fingerprint={random_seed}",
                  "--fingerprint-storage-quota=5000",   
                  "--fingerprint-windows-font-metrics"  
              ]
          )

          for url in TARGETS:
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"Analizzando: {url}", flush=True)
              try:
                  page = context.new_page()
                  
                  # INIEZIONE ATTIVA DI POLYFILL (Per neutralizzare CreepJS "headless" e Incolumitas RTT)
                  page.add_init_script("""
                      if (!('ContactsManager' in window)) {
                          window.ContactsManager = class ContactsManager {
                              async getProperties() { return ['name', 'email', 'tel', 'address', 'icon']; }
                              async select() { return []; }
                          };
                          Object.defineProperty(navigator, 'contacts', {
                              get: () => new window.ContactsManager(),
                              configurable: true,
                              enumerable: true
                          });
                      }
                      if (!('ContentIndex' in window)) {
                          window.ContentIndex = class ContentIndex {
                              async add() {}
                              async delete() {}
                              async getAll() { return []; }
                          };
                      }
                      if (window.NetworkInformation && !('downlinkMax' in window.NetworkInformation.prototype)) {
                          Object.defineProperty(window.NetworkInformation.prototype, 'downlinkMax', {
                              get: () => 10,
                              configurable: true,
                              enumerable: true
                          });
                      }
                      if (navigator.connection) {
                          if (!('downlinkMax' in navigator.connection)) {
                              Object.defineProperty(navigator.connection, 'downlinkMax', {
                                  get: () => 10,
                                  configurable: true,
                                  enumerable: true
                              });
                          }
                          Object.defineProperty(navigator.connection, 'rtt', {
                              get: () => 100,
                              configurable: true,
                              enumerable: true
                          });
                      }
                  """)

                  query_to_search = get_query_from_url(url)

                  if "yelp.com" in url or "yelp.it" in url:
                      print("Esecuzione del warm-up su Yelp...", flush=True)
                      page.goto("https://www.yelp.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(3)
                      page.goto(url, wait_until="domcontentloaded", timeout=25000)
                  
                  elif "startpage.com/sp/search" in url:
                      page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(2)
                      try:
                          search_input = page.locator("input#q")
                          search_input.type(query_to_search, delay=100, timeout=2000)
                          page.keyboard.press("Enter")
                      except Exception as e:
                          print(f"Avviso: errore scrittura su Startpage: {e}", flush=True)
                  
                  elif "html.duckduckgo.com/html" in url:
                      page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(2)
                      try:
                          search_input = page.locator("input[name=q]")
                          search_input.type(query_to_search, delay=100, timeout=2000)
                          page.keyboard.press("Enter")
                      except Exception as e:
                          print(f"Avviso: errore scrittura su DuckDuckGo: {e}", flush=True)
                      
                  else:
                      page.goto(url, wait_until="domcontentloaded", timeout=25000)
                      if not any(x in url for x in ["facebook.com", "reddit.com", "yelp"]):
                          handle_cookie_consent(page)
                  
                  if "finance.yahoo.com" in url:
                      print("In attesa del caricamento dei dati di Yahoo Finance...", flush=True)
                      try:
                          page.wait_for_selector('section[data-testid="qsp-statistics"]', timeout=5000)
                      except Exception:
                          pass
                      time.sleep(1)

                  try:
                      for _ in range(3):
                          page.mouse.wheel(0, 300)
                          time.sleep(1)
                  except Exception:
                      pass

                  if "creepjs" in url:
                      time.sleep(20) 
                  elif "pixelscan" in url:
                      time.sleep(10)
                  elif any(test in url for test in ["sannysoft", "browserleaks", "incolumitas", "deviceinfo"]):
                      time.sleep(5)
                  else:
                      time.sleep(4)

                  raw_html = page.content()
                  results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"
                  page.close()

              except Exception as e:
                  print(f"Errore critico su {url}: {e}", flush=True)
                  results += f"ERRORE GLOBALE: {str(e)}\n"
                  try:
                      page.close()
                  except Exception:
                      pass

          context.close()

          # Scrittura dell'output sul volume montato di output
          os.makedirs("/app/output", exist_ok=True)
          with open("/app/output/output_macchina2_cdp.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

          # 6. Docker Compose
          cat << 'EOF' > docker-compose.yml
          version: '3.8'

          services:
            scraper:
              build:
                context: .
                dockerfile: Dockerfile.scraper
              volumes:
                - ./config1:/app/config
                - ./output:/app/output
              shm_size: '2gb'

            empty:
              build:
                context: .
                dockerfile: Dockerfile.empty
              volumes:
                - ./config2:/app/config
          EOF

      - name: Avvio Esecuzione Docker Compose
        run: |
          docker compose up --build --exit-code-from scraper

      - name: Ripristino Permessi Output per Archivio
        if: always()
        run: |
          sudo chown -R $USER:$USER output/ || true

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output/output_macchina2_cdp.txt
