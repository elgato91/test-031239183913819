name: Test RAG Challenge 2026

on:
  workflow_dispatch:

jobs:
  machine2_cdp_insocket:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installazione Font di Sistema (Inclusi Font Microsoft)
        run: |
          sudo apt-get update
          # Accettazione automatica non interattiva dell'EULA Microsoft per i font core di Windows
          echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
          sudo apt-get install -y ttf-mscorefonts-installer \
            fonts-noto-color-emoji fonts-freefont-ttf fonts-unifont \
            fonts-ipafont-gothic fonts-wqy-zenhei fonts-tlwg-loma-otf || true
          fc-cache -f -v

      - name: Installazione Dipendenze Scraper
        run: |
          pip install "cloakbrowser[geoip]" beautifulsoup4 playwright requests
          playwright install-deps chromium

      - name: Setup WireProxy & WGCF (SOCKS5h IPv6-Only WARP)
        run: |
          # Scarica WGCF (Unofficial CLI per Cloudflare WARP)
          wget -qO wgcf https://github.com/ViRb3/wgcf/releases/download/v2.2.31/wgcf_2.2.31_linux_amd64
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/

          # Scarica WireProxy (WireGuard in userspace come proxy SOCKS5h)
          wget -qO wireproxy.tar.gz https://github.com/octeep/wireproxy/releases/download/v1.1.2/wireproxy_linux_amd64.tar.gz
          tar -xzf wireproxy.tar.gz
          chmod +x wireproxy
          sudo mv wireproxy /usr/local/bin/

          # Registrazione ed esportazione del profilo di WARP
          wgcf register --accept-tos
          wgcf generate

          # Script in Python per isolare e configurare l'interfaccia puramente IPv6-only (risolve i crash DNS)
          cat << 'EOF' > make_config.py
          with open("wgcf-profile.conf", "r") as f:
              lines = f.readlines()
          new_lines = []
          for line in lines:
              # Estraiamo solo l'indirizzo IPv6 dall'interfaccia di WARP
              if line.strip().startswith("Address"):
                  parts = line.split("=")
                  ips = parts[1].split(",")
                  ipv6 = [ip.strip() for ip in ips if ":" in ip][0]
                  line = f"Address = {ipv6}\n"
              # Filtra i server DNS per tenere solo quelli IPv6 (altrimenti il tunnel IPv6-only fallisce)
              elif line.strip().startswith("DNS"):
                  parts = line.split("=")
                  dns_servers = parts[1].split(",")
                  ipv6_dns = [dns.strip() for dns in dns_servers if ":" in dns]
                  line = f"DNS = {', '.join(ipv6_dns)}\n"
              # Forza l'instradamento esclusivamente su IPv6
              elif line.strip().startswith("AllowedIPs"):
                  line = "AllowedIPs = ::/0\n"
              new_lines.append(line)
          
          # Accodiamo la sezione Socks5 per configurare il proxy locale in ascolto sulla porta 40000
          new_lines.append("\n[Socks5]\nBindAddress = 127.0.0.1:40000\n")
          
          with open("wireproxy.conf", "w") as f:
              f.writelines(new_lines)
          EOF
          
          python3 make_config.py

          # Avvia wireproxy salvando i log per eventuali analisi
          wireproxy -c wireproxy.conf > wireproxy.log 2>&1 &
          sleep 5

          # Stampa i log di avvio del tunnel nel pannello di Github Actions per verifica immediata
          echo "=== LOG DI AVVIO WIREPROXY ==="
          cat wireproxy.log
          echo "=============================="

          # Verifica che il tunnel SOCKS5h IPv6 funzioni correttamente
          echo "Verifica IP IPv6 di uscita su tunnel SOCKS5h:"
          curl -6 --proxy socks5h://127.0.0.1:40000 https://api64.ipify.org?format=json

      - name: Avvio Xvfb (Virtual Display Stabile)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Creazione script Python (Macchina 2)
        run: |
          cat << 'EOF' > m2_insocket.py
          import time
          import random
          from cloakbrowser import launch_context
          from bs4 import BeautifulSoup
          from urllib.parse import urlparse, parse_qs

          TARGETS = [
              "https://api64.ipify.org?format=json",
              "https://tls.browserleaks.com/json",
              "https://bot.sannysoft.com/",
              "https://abrahamjuliot.github.io/creepjs/",
              "https://pixelscan.net/",
              "https://bot.incolumitas.com/",
              "https://www.deviceinfo.me/",
              "https://www.google.com/search?q=cosa+vedere+roma",
              "https://www.bing.com/search?q=cosa+vedere+roma",
              "https://www.eater.com/rome",
              "https://www.bloomberg.com/markets/stocks",
              "https://www.morningstar.com/stocks/xnas/aapl/quote",
              "https://finance.yahoo.com/quote/AAPL/key-statistics",
              "https://www.yelp.com/search?find_desc=Restaurants&find_loc=San+Francisco%2C+CA",
              "https://www.passportindex.org/passport/italy/",
              "https://guide.michelin.com/en/it/lazio/roma/restaurants",
              "https://www.cntraveler.com/gallery/best-restaurants-in-rome",
              "https://www.facebook.com/groups/1373361046396315/posts/2860154274383644/",
              "https://katieparla.com/budget-dining-in-rome-revised/",
              "https://www.google.com/search?q=migliore+carbonara+roma&gbv=1",
              "https://html.duckduckgo.com/html/?q=migliore+carbonara+roma",
              "https://www.bing.com/search?q=migliore+carbonara+roma",
              "https://www.startpage.com/sp/search?query=migliore+carbonara+roma",
              "https://search.yahoo.com/search?p=migliore+carbonara+roma",
              "https://www.reddit.com/r/rome/comments/1cn61n5/must_try_restaurants_in_rome/",
              "https://newromantimes.substack.com/p/a-very-subjective-list-of-the-best",
              "https://www.canadianinsider.com/money-is-moving"
          ]

          DIAGNOSTIC_SITES = ["ipify", "browserleaks", "sannysoft", "creepjs", "pixelscan", "incolumitas", "deviceinfo"]
          results = ""

          def extract_text(html_content, url):
              soup = BeautifulSoup(html_content, 'html.parser')
              text = soup.get_text(separator=' ', strip=True)
              if any(site in url for site in DIAGNOSTIC_SITES):
                  return text
              return text[:5000]

          def get_query_from_url(url, default="migliore carbonara roma"):
              try:
                  parsed = urlparse(url)
                  queries = parse_qs(parsed.query)
                  for param in ['q', 'query', 'p']:
                      if param in queries:
                          return queries[param][0]
              except Exception:
                  pass
              return default

          def handle_cookie_consent(page):
              try:
                  consent_selectors = [
                      "button:has-text('Accetta tutto')",
                      "button:has-text('Accept all')",
                      "button:has-text('Consenti')",
                      "button:has-text('I agree')",
                      "button:has-text('Accetto')",
                      "button:has-text('Agree')",
                      "button:has-text('Accept')",
                      "button:has-text('OK')",
                      "button:has-text('Allow all')",
                      "button:has-text('Consenti l\\'uso dei cookie')",
                      "#L2AGLb"
                  ]
                  for selector in consent_selectors:
                      btn = page.locator(selector)
                      if btn.is_visible():
                          btn.click(timeout=1500)
                          time.sleep(0.5)
                          print(f"Cookie bypassato: {selector}", flush=True)
                          break
              except Exception:
                  pass

          random_seed = str(random.randint(100000, 999999))
          print(f"Avviando CloakBrowser con seed hardware dinamico: {random_seed}...", flush=True)

          # Avvio del contesto con il SOCKS5h Proxy e geoip=True (l'allineamento della timezone è gestito nativamente dal C++ del browser)
          context = launch_context(
              headless=False,
              humanize=True,
              proxy="socks5://127.0.0.1:40000",
              geoip=True,
              viewport={"width": 1920, "height": 950},
              args=[
                  "--no-sandbox", 
                  "--disable-dev-shm-usage",
                  f"--fingerprint={random_seed}",
                  "--fingerprint-storage-quota=5000",   # Normalizza lo spazio di archiviazione per eludere il rilevamento incognito/private
                  "--fingerprint-windows-font-metrics"  # Calibra le metriche dei font per allinearsi all'User-Agent Windows
              ]
          )

          for url in TARGETS:
              results += f"\n{'='*50}\nTARGET: {url}\n{'='*50}\n"
              print(f"Analizzando: {url}", flush=True)
              try:
                  page = context.new_page()
                  
                  # INIEZIONE ATTIVA DI POLYFILL (Per neutralizzare CreepJS "headless" e Incolumitas RTT)
                  page.add_init_script("""
                      // 1. Mock ContactsManager (atteso su Windows, nativamente assente su Linux headless)
                      if (!('ContactsManager' in window)) {
                          window.ContactsManager = class ContactsManager {
                              async getProperties() { return ['name', 'email', 'tel', 'address', 'icon']; }
                              async select() { return []; }
                          };
                          Object.defineProperty(navigator, 'contacts', {
                              get: () => new window.ContactsManager(),
                              configurable: true,
                              enumerable: true
                          });
                      }

                      // 2. Mock ContentIndex (atteso su contesti HTTPS Chrome)
                      if (!('ContentIndex' in window)) {
                          window.ContentIndex = class ContentIndex {
                              async add() {}
                              async delete() {}
                              async getAll() { return []; }
                          };
                      }

                      // 3. Correzione downlinkMax sul Prototipo (CreepJS) e allineamento RTT realistico
                      if (window.NetworkInformation && !('downlinkMax' in window.NetworkInformation.prototype)) {
                          Object.defineProperty(window.NetworkInformation.prototype, 'downlinkMax', {
                              get: () => 10,
                              configurable: true,
                              enumerable: true
                          });
                      }
                      if (navigator.connection) {
                          if (!('downlinkMax' in navigator.connection)) {
                              Object.defineProperty(navigator.connection, 'downlinkMax', {
                                  get: () => 10,
                                  configurable: true,
                                  enumerable: true
                              });
                          }
                          Object.defineProperty(navigator.connection, 'rtt', {
                              get: () => 100, // Allineamento con il ritardo di instradamento di WARP
                              configurable: true,
                              enumerable: true
                          });
                      }
                  """)

                  query_to_search = get_query_from_url(url)

                  # GESTIONE SPECIFICA YELP
                  if "yelp.com" in url or "yelp.it" in url:
                      print("Esecuzione del warm-up su Yelp...", flush=True)
                      page.goto("https://www.yelp.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(3)
                      page.goto(url, wait_until="domcontentloaded", timeout=25000)
                  
                  # Navigazione simulata per Startpage
                  elif "startpage.com/sp/search" in url:
                      page.goto("https://www.startpage.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(2)
                      try:
                          search_input = page.locator("input#q")
                          search_input.type(query_to_search, delay=100, timeout=2000)
                          page.keyboard.press("Enter")
                      except Exception as e:
                          print(f"Avviso: errore scrittura su Startpage: {e}", flush=True)
                  
                  # Navigazione simulata per DuckDuckGo HTML
                  elif "html.duckduckgo.com/html" in url:
                      page.goto("https://html.duckduckgo.com/", wait_until="domcontentloaded", timeout=25000)
                      time.sleep(2)
                      try:
                          search_input = page.locator("input[name=q]")
                          search_input.type(query_to_search, delay=100, timeout=2000)
                          page.keyboard.press("Enter")
                      except Exception as e:
                          print(f"Avviso: errore scrittura su DuckDuckGo: {e}", flush=True)
                      
                  else:
                      page.goto(url, wait_until="domcontentloaded", timeout=25000)
                      if not any(x in url for x in ["facebook.com", "reddit.com", "yelp"]):
                          handle_cookie_consent(page)
                  
                  # GESTIONE SPECIFICA YAHOO FINANCE
                  if "finance.yahoo.com" in url:
                      print("In attesa del caricamento dei dati di Yahoo Finance...", flush=True)
                      try:
                          page.wait_for_selector('section[data-testid="qsp-statistics"]', timeout=5000)
                      except Exception:
                          pass
                      time.sleep(1)

                  # Scorrimento simulato
                  try:
                      for _ in range(3):
                          page.mouse.wheel(0, 300)
                          time.sleep(1)
                  except Exception:
                      pass

                  # Tempi di attesa bilanciati
                  if "creepjs" in url:
                      time.sleep(20) 
                  elif "pixelscan" in url:
                      time.sleep(10)
                  elif any(test in url for test in ["sannysoft", "browserleaks", "incolumitas", "deviceinfo"]):
                      time.sleep(5)
                  else:
                      time.sleep(4)

                  raw_html = page.content()
                  results += f"TESTO ESTRATTO:\n{extract_text(raw_html, url)}\n"
                  page.close()

              except Exception as e:
                  print(f"Errore critico su {url}: {e}", flush=True)
                  results += f"ERRORE GLOBALE: {str(e)}\n"
                  try:
                      page.close()
                  except Exception:
                      pass

          context.close()

          with open("output_macchina2_cdp.txt", "w", encoding="utf-8") as f:
              f.write(results)
          EOF

      - name: Esecuzione Scraping Macchina 2
        run: python -u m2_insocket.py

      - name: Upload Artifact Macchina 2
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Macchina2
          path: output_macchina2_cdp.txt
