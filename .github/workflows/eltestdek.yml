name: Pipeline Completa Parallela - Scraping & AI Live

on: 
  workflow_dispatch:

jobs:
  run_full_pipeline:
    runs-on: ubuntu-latest
    steps:

      - name: Setup 3 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          
          # Avvia 3 proxy su 3 porte diverse
          for PORT in 40001 40002 40003; do
            docker run --name warproxy-$PORT --network host \
              -e SOCKS5_PORT=$PORT -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -d ghcr.io/kingcc/warproxy:latest
          done
          echo "Attesa inizializzazione proxy..."
          sleep 10

      - name: Verifica IP dei 3 Proxy
        run: |
          for PORT in 40001 40002 40003; do
            echo "Verifica proxy su porta $PORT..."
            IP=""
            for i in {1..5}; do
              IP=$(curl -s --max-time 5 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org) && break || sleep 3
            done
            if [ -z "$IP" ]; then
              echo "Errore: Proxy su porta $PORT non risponde."
              exit 1
            fi
            echo "Proxy $PORT pronto. IP: $IP"
          done

      - name: Setup Ambiente e Dipendenze
        run: |
          # Cloniamo lo scraper in una cartella "base" che poi i worker copieranno
          git clone https://github.com/georgekhananaev/google-reviews-scraper-pro.git base-scraper
          cd base-scraper
          pip install -r requirements.txt
          pip install pyyaml seleniumbase google-genai requests aiohttp
          seleniumbase install chromedriver

      - name: Avvio Xvfb (Display virtuale per Selenium)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Scrittura Orchestratore Parallelo (Fase 1, 2, 3 Integrate)
        shell: bash
        run: |
          cat << 'EOF' > orchestrator.py
          import asyncio
          import json
          import yaml
          import os
          import shutil
          import re
          import urllib.parse
          from google import genai
          from google.genai import types
          import requests

          # --- CONFIGURAZIONE LUOGHI ---
          LUOGHI_DA_ANALIZZARE = [
              'Colosseo, Roma',
              'Da Enzo al 29, Roma',
              'Hoffell hot tub',
              'Sulphur Bath, Vardzia, Georgia',
              'Pantheon, Roma'
          ]

          # --- SETUP DEI 6 RUNNER E DEI PROXY ---
          # 3 Porte proxy. 2 Runner per porta = 6 Runner totali.
          WORKER_CONFIGS = [
              {"id": 1, "proxy_port": 40001}, {"id": 2, "proxy_port": 40001},
              {"id": 3, "proxy_port": 40002}, {"id": 4, "proxy_port": 40002},
              {"id": 5, "proxy_port": 40003}, {"id": 6, "proxy_port": 40003}
          ]

          # Gestione dei limiti di rate limit API
          api_semaphore = asyncio.Semaphore(15)

          async def call_with_retry(func, *args, max_retries=5):
              """Esegue una funzione asincrona con backoff esponenziale in caso di errore di quota (429/1011)"""
              for attempt in range(max_retries):
                  try:
                      return await func(*args)
                  except Exception as e:
                      err_str = str(e).lower()
                      if "quota" in err_str or "429" in err_str or "1011" in err_str or "limit" in err_str:
                          wait_time = (2 ** attempt) * 15
                          print(f"   [Gemini Quota] Limite raggiunto. Attesa di {wait_time} secondi prima di riprovare...", flush=True)
                          await asyncio.sleep(wait_time)
                      else:
                          raise e
              return None

          async def analizza_immagine_gemini(client, config_live, url_immagine, prompt):
              async with api_semaphore:
                  try:
                      url_ottimizzato = re.sub(r'=w\d+-h\d+', '=w600-h600', url_immagine)
                      
                      def scarica_foto():
                          resp = requests.get(url_ottimizzato, timeout=10)
                          return resp.content if resp.status_code == 200 else None
                          
                      loop = asyncio.get_running_loop()
                      img_bytes = await loop.run_in_executor(None, scarica_foto)
                      if not img_bytes: return None

                      accumulated_text = ""
                      async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config_live) as session:
                          await session.send_realtime_input(video=types.Blob(data=img_bytes, mime_type="image/jpeg"))
                          await asyncio.sleep(0.5)
                          await session.send_realtime_input(text=prompt)
                          async for response in session.receive():
                              if response.server_content and response.server_content.output_transcription:
                                  if response.server_content.output_transcription.text:
                                      accumulated_text += response.server_content.output_transcription.text
                              if response.server_content and response.server_content.turn_complete:
                                  break
                      
                      return {"url_immagine": url_immagine, "descrizione_dettagliata": accumulated_text.strip()}
                  except Exception as e:
                      raise e

          async def fase3_ai_analisi(luogo, worker_dir):
              print(f"[Fase 3] Avvio Analisi AI Live per '{luogo}'...", flush=True)
              api_key = os.environ.get("GEMINI_API_KEY")
              if not api_key:
                  return {"errore": "Manca API KEY"}
                  
              client = genai.Client(api_key=api_key)
              config_live = {"response_modalities": ["AUDIO"], "output_audio_transcription": {}}
              
              reviews_file = os.path.join(worker_dir, "google_reviews.json")
              if not os.path.exists(reviews_file):
                  return {"errore": "Nessun file recensioni trovato"}
                  
              with open(reviews_file, "r", encoding="utf-8") as f:
                  reviews = json.load(f)
                  
              tutte_le_immagini = []
              for r in reviews:
                  tutte_le_immagini.extend(r.get("user_images", []))
              
              urls_unici = list(set(tutte_le_immagini))
              if not urls_unici:
                  return {"avviso": "Nessuna foto trovata in questo posto."}
              
              # Capping di sicurezza per rientrare nella quota TPM
              urls_campione = urls_unici[:40]
              
              print(f"   Trovate {len(urls_unici)} foto per '{luogo}' (Analisi di {len(urls_campione)} campioni per limiti di quota)...", flush=True)
              
              # Prompt singolo ottimizzato in chiave editoriale (evita descrizioni sterili)
              prompt_singolo = (
                  "Identify the prominent visual elements in this image (e.g., specific food dishes, architectural details, "
                  "materials, landscape features, signs, or crowd levels). Describe them objectively, concisely, "
                  "and with an editorial focus on what stands out to a traveler."
              )
              
              tasks = []
              for url in urls_campione:
                  tasks.append(call_with_retry(analizza_immagine_gemini, client, config_live, url, prompt_singolo))
                  await asyncio.sleep(0.5)
                  
              risultati_raw = await asyncio.gather(*tasks)
              risultati_validi = [r for r in risultati_raw if r is not None]
              
              print(f"   Elaborate {len(risultati_validi)}/{len(urls_campione)} foto per '{luogo}'. Generazione Sintesi Globale...", flush=True)
              
              if not risultati_validi:
                  return {"avviso": "Nessuna immagine analizzata con successo."}
                  
              # Sintesi Globale focalizzata su elementi di rilievo e design materico
              prompt_fase2 = """
              Sei uno scrittore di viaggi senior ed etnografo sul campo, appassionato di estetica, design dei materiali e architettura del paesaggio.
              Ti viene fornito un elenco strutturato di descrizioni empiriche ed oggettive di diverse immagini relative a un singolo luogo geografico.
              
              Il tuo compito è sintetizzare queste informazioni in una ricostruzione d'insieme viva, sensoriale e spaziale del posto.
              
              Vogliamo replicare l'intelligenza di un osservatore umano colto che racconta com'è fatto il posto, catturandone l'essenza e la 'vibe' in modo integrato, senza cadere nello 'slop' poetico artificiale o pubblicitario (evita assolutamente parole banali come 'magico', 'mozzafiato', 'maestoso', 'immergiti', 'teatro di', 'protagonista').
              
              Usa la regola aurea del reportage: "MOSTRA, NON RACCONTARE" (Show, don't tell) attraverso i dettagli visivi concreti ed i materiali.
              - Non dire che l'atmosfera è 'rilassante' o 'pacifica'; descrivi piuttosto l'interazione fisica tra l'acqua calda fumante che evapora dalle vasche di legno scuro e l'aria fredda di una vallata grigia o le montagne scoscese sullo sfondo.
              
              Restituisci l'output ESCLUSIVAMENTE in formato JSON all'interno di un blocco di codice markdown contrassegnato con ```json ... ```, con la seguente struttura:
              {
                  "tipologia_luogo": "Categoria generale del luogo identificata dall'analisi dei dati",
                  "identita_visiva_e_vibe": "Una ricostruzione densa, evocativa e fluida di 2 paragrafi in italiano che descrive lo spazio, l'atmosfera, i contrasti cromatici e termici. Scrivi con un tono narrativo ed elevato, ma rigorosamente agganciato ai fatti visivi reali.",
                  "elementi_visivi_di_rilievo": [
                      "Elenco dettagliato e ragionato di elementi fisici, piatti tipici, dettagli architettonici, cartelli o caratteristiche d'interesse visivo emerse dalle foto"
                  ],
                  "analisi_materica_e_design": "Un'analisi di come i materiali costruttivi (pietra, legno, metallo, ecc) si inseriscono e contrastano con il contesto naturale o urbano."
              }
              """
              
              dati_json_str = json.dumps(risultati_validi, indent=2, ensure_ascii=False)
              combined_payload = f"DATI INPUT COMPLETI DA ANALIZZARE:\n{dati_json_str}\n\nISTRUZIONI DI ANALISI:\n{prompt_fase2}"
              
              async def esegui_sintesi():
                  sintesi_raw = ""
                  async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config_live) as session:
                      await session.send_realtime_input(text=combined_payload)
                      async for response in session.receive():
                          if response.server_content and response.server_content.output_transcription:
                              if response.server_content.output_transcription.text:
                                  sintesi_raw += response.server_content.output_transcription.text
                          if response.server_content and response.server_content.turn_complete:
                              break
                  return sintesi_raw

              sintesi_globale_raw = await call_with_retry(esegui_sintesi)
              
              if not sintesi_globale_raw:
                  return {"errore": "Sintesi fallita per limiti quota ripetuti."}

              match = re.search(r'```json\s*(.*?)\s*```', sintesi_globale_raw, re.DOTALL)
              json_str = match.group(1) if match else sintesi_globale_raw
              
              try:
                  sintesi_json = json.loads(json_str)
              except Exception:
                  sintesi_json = {
                      "tipologia_luogo": "N/D",
                      "identita_visiva_e_vibe": sintesi_globale_raw,
                      "elementi_visivi_di_rilievo": [],
                      "analisi_materica_e_design": "N/D"
                  }
                  
              return {
                  "ricostruzione_globale_analitica": sintesi_json,
                  "analisi_granulare_immagini": risultati_validi
              }

          async def worker(worker_id, proxy_port, coda_luoghi, dizionario_risultati_mappe, dizionario_risultati_ai):
              # Scaglionamento iniziale per isolare totalmente la creazione del profilo Chrome di ogni worker
              await asyncio.sleep(worker_id * 5)
              proxy_url = f"socks5://127.0.0.1:{proxy_port}"
              worker_dir = f"worker_{worker_id}_env"
              
              # Copiamo il base-scraper nell'ambiente isolato del worker
              if os.path.exists(worker_dir): shutil.rmtree(worker_dir)
              shutil.copytree("base-scraper", worker_dir)
              
              while not coda_luoghi.empty():
                  luogo = await coda_luoghi.get()
                  print(f"► [Worker {worker_id} | Proxy {proxy_port}] Prende in carico: '{luogo}'", flush=True)
                  
                  # -- FASE 1: RISOLUZIONE MAPS (Eseguito come script indipendente nella directory del worker) --
                  # Questo garantisce isolamento totale dei processi Chrome, dei cookies e della cache.
                  
                  resolve_script_content = f"""
          import json
          import urllib.parse
          import time
          import re
          from seleniumbase import Driver

          nome = {repr(luogo)}
          proxy_ports = [40001, 40002, 40003]
          current_proxy_idx = {proxy_ports.index(proxy_port)}

          def pulisci_testo(testo):
              if not testo:
                  return 'N/D'
              testo_pulito = re.sub(r'^[\s\W_]+', '', testo)
              return testo_pulito.strip()

          resolved_successfully = False
          info_locale = {{}}

          for attempt in range(len(proxy_ports)):
              port = proxy_ports[(current_proxy_idx + attempt) % len(proxy_ports)]
              proxy_url = f"socks5://127.0.0.1:{{port}}"
              print(f"-> Tentativo di risoluzione con proxy su porta {{port}}...")
              
              # Profilo Chrome locale isolato per questo specifico worker
              driver = Driver(uc=True, headless=True, proxy=proxy_url, user_data_dir="./chrome_profile")
              
              try:
                  search_url = f'https://www.google.com/maps/search/{{urllib.parse.quote(nome)}}?hl=en'
                  driver.get(search_url)
                  driver.sleep(5)
                  
                  # Rilevamento e bypass del blocco CAPTCHA/Sorry
                  if "sorry/index" in driver.current_url or "google.com/sorry" in driver.current_url:
                      print(f"-> [WARNING] Rilevato CAPTCHA su porta {{port}}. Rotazione proxy...")
                      driver.quit()
                      time.sleep(3)
                      continue
                      
                  try:
                      consent_btn = driver.find_element('css selector', 'button[aria-label*="Accetta"], button[aria-label*="Accept"], [aria-label*="Agree"]')
                      consent_btn.click()
                      driver.sleep(2)
                  except:
                      pass
                      
                  current_url = driver.current_url
                  if '/maps/place/' not in current_url:
                      try:
                          first_result_el = driver.find_element('css selector', 'a[href*="/maps/place/"]')
                          resolved_url = first_result_el.get_attribute('href')
                          if 'hl=' not in resolved_url:
                              resolved_url += '&hl=en'
                          else:
                              resolved_url = re.sub(r'hl=[a-z]{2}', 'hl=en', resolved_url)
                          driver.get(resolved_url)
                          driver.sleep(5)
                      except:
                          pass
                          
                  if "sorry/index" in driver.current_url or "google.com/sorry" in driver.current_url:
                      print(f"-> [WARNING] Rilevato CAPTCHA post-ricerca su porta {{port}}. Rotazione proxy...")
                      driver.quit()
                      time.sleep(3)
                      continue
                      
                  info_locale = {{
                      'ricerca_originale': nome,
                      'url_mappa': driver.current_url,
                      'nome': 'N/D',
                      'categoria': 'N/D',
                      'indirizzo': 'N/D',
                      'telefono': 'N/D',
                      'sito_web': 'N/D',
                      'media_stelle': 'N/D',
                      'totale_recensioni': 'N/D',
                      'coordinate': {{}},
                      'popular_times_affluenza': [],
                      'caratteristiche_servizi': []
                  }}
                  
                  try:
                      info_locale['nome'] = driver.find_element('css selector', 'h1').text
                  except: pass
                  
                  try:
                      info_locale['categoria'] = driver.find_element('css selector', 'button[jsaction*="category"]').text
                  except: pass

                  try:
                      raw_address = driver.find_element('css selector', '[data-item-id="address"]').text
                      info_locale['indirizzo'] = pulisci_testo(raw_address)
                  except: pass
                  
                  try:
                      raw_phone = driver.find_element('css selector', '[data-item-id^="phone:tel"]').text
                      info_locale['telefono'] = pulisci_testo(raw_phone)
                  except: pass
                  
                  try:
                      info_locale['sito_web'] = driver.find_element('css selector', '[data-item-id="authority"]').get_attribute('href')
                  except: pass
                  
                  match_at = re.search(r'@([-0-9.]+),([-0-9.]+)', driver.current_url)
                  if match_at:
                      info_locale['coordinate'] = {{
                          'latitudine': float(match_at.group(1)),
                          'longitudine': float(match_at.group(2))
                      }}
                  else:
                      match_data = re.search(r'!3d([-0-9.]+)!4d([-0-9.]+)', driver.current_url)
                      if match_data:
                          info_locale['coordinate'] = {{
                              'latitudine': float(match_data.group(1)),
                              'longitudine': float(match_data.group(2))
                          }}
                          
                  # Stelle e recensioni (hl=en)
                  try:
                      rating_text = driver.find_element('css selector', 'div.F7nice').text
                      rating_text = rating_text.replace('\\xa0', ' ')
                      if '(' in rating_text:
                          parts = rating_text.split('(')
                          info_locale['media_stelle'] = float(parts[0].strip())
                          reviews_raw = parts[1].split(')')[0]
                          only_numbers = re.sub(r'[^\\d]', '', reviews_raw)
                          info_locale['totale_recensioni'] = int(only_numbers)
                  except: pass

                  # Fallback stella per hl=en se div.F7nice non risponde
                  if info_locale['media_stelle'] == 'N/D':
                      try:
                          rating_el = driver.find_element('xpath', "//*[contains(@aria-label, 'stars')]")
                          aria_lbl = rating_el.get_attribute('aria-label')
                          match_stars = re.search(r'([0-9.]+)\\s*stars', aria_lbl)
                          if match_stars:
                              info_locale['media_stelle'] = float(match_stars.group(1))
                      except: pass

                  # Scorrimento progressivo della scheda
                  try:
                      pannello = None
                      for selector in ['div[role="main"]', 'div.m67q6b', 'div.bJWbme', 'div.ecsc6b']:
                          try:
                              el = driver.find_element('css selector', selector)
                              if el.is_displayed():
                                  pannello = el
                                  break
                          except: pass
                      if pannello:
                          for pos in [300, 600, 900]:
                              driver.execute_script(f"arguments[0].scrollTo(0, {{pos}});", pannello)
                              driver.sleep(1.5)
                  except: pass

                  # Estrazione Grafici con Esclusione Menzioni Recensioni
                  try:
                      barre = driver.find_elements('xpath', "//*[contains(@aria-label, 'busy') or contains(@aria-label, 'popular') or contains(@aria-label, 'historically')]")
                      for b in barre:
                          lbl = b.get_attribute('aria-label')
                          if lbl and lbl not in info_locale['popular_times_affluenza']:
                              if "mentioned" not in lbl.lower() and "reviews" not in lbl.lower() and "recensioni" not in lbl.lower():
                                  info_locale['popular_times_affluenza'].append(lbl)
                  except: pass

                  # Estrazione Caratteristiche ed etichette (Pulsante About)
                  try:
                      info_btn = driver.find_element('css selector', 'button[data-tooltip="About"], button[aria-label*="About"]')
                      driver.execute_script("arguments[0].scrollIntoView(true);", info_btn)
                      driver.sleep(1)
                      info_btn.click()
                      driver.sleep(2)
                      
                      elementi_servizi = driver.find_elements('css selector', 'li.FontNormal, .DRY99e li, span.Y39Ktc, div.fontBodyMedium')
                      for s in elementi_servizi:
                          if s.text and s.text not in info_locale['caratteristiche_servizi']:
                              info_locale['caratteristiche_servizi'].append(s.text)
                  except: pass
                  
                  resolved_successfully = True
                  driver.quit()
                  break
                  
              except Exception as e:
                  print(f"-> Errore imprevisto sul proxy {{port}}: {{str(e)}}")
                  driver.quit()
                  time.sleep(3)

          if resolved_successfully:
              with open("maps_data.json", "w", encoding="utf-8") as f:
                  json.dump(info_locale, f, indent=4, ensure_ascii=False)
              print("-> Risoluzione completata.")
          else:
              print("-> Errore: Impossibile risolvere con i proxy disponibili.")
              exit(1)
          """
                  
                  resolve_path = os.path.join(worker_dir, "resolve_worker.py")
                  with open(resolve_path, "w", encoding="utf-8") as f:
                      f.write(resolve_script_content)
                      
                  # Eseguiamo la risoluzione come processo OS isolato
                  process_res = await asyncio.create_subprocess_exec(
                      "python", "resolve_worker.py",
                      cwd=worker_dir,
                      stdout=asyncio.subprocess.PIPE,
                      stderr=asyncio.subprocess.PIPE
                  )
                  await process_res.communicate()
                  
                  maps_data_file = os.path.join(worker_dir, "maps_data.json")
                  if not os.path.exists(maps_data_file):
                      print(f"✖ [Worker {worker_id}] Risoluzione fallita totalmente per '{luogo}'. Salto.", flush=True)
                      coda_luoghi.task_done()
                      continue
                      
                  with open(maps_data_file, "r", encoding="utf-8") as f:
                      info_locale = json.load(f)
                      
                  dizionario_risultati_mappe[luogo] = info_locale
                  url_mappa = info_locale.get('url_mappa')
                      
                  # -- FASE 2: SCRAPING REALE RECENSIONI (Isolato per cartella) --
                  print(f"[Fase 2] Scraping recensioni avviato per '{luogo}'...", flush=True)
                  config_data = {
                      'headless': True, 'sort_by': 'newest', 'scrape_mode': 'full',
                      'max_reviews': 100, 
                      'proxy': proxy_url, 'db_path': f'db_{worker_id}.sqlite',
                      'download_images': False, 'use_mongodb': False,
                      'backup_to_json': True, 'json_path': 'google_reviews.json',
                      'businesses': [{'url': url_mappa, 'custom_params': {'company': luogo}}]
                  }
                  
                  config_path = os.path.join(worker_dir, "config.yaml")
                  with open(config_path, 'w') as f: yaml.dump(config_data, f)
                  
                  process = await asyncio.create_subprocess_exec(
                      "python", "start.py",
                      cwd=worker_dir,
                      stdout=asyncio.subprocess.PIPE,
                      stderr=asyncio.subprocess.PIPE
                  )
                  await process.communicate()
                  
                  # -- FASE 3: AI ELABORAZIONE IMMAGINI LIVE --
                  risultati_ai = await fase3_ai_analisi(luogo, worker_dir)
                  dizionario_risultati_ai[luogo] = risultati_ai
                  
                  print(f"✔ [Worker {worker_id}] CICLO INTEGRATO COMPLETATO per '{luogo}'!\n", flush=True)
                  coda_luoghi.task_done()

          async def main():
              print("=== AVVIO ORCHESTRATORE PARALLELO MASSIVO ===", flush=True)
              
              coda = asyncio.Queue()
              for l in LUOGHI_DA_ANALIZZARE:
                  coda.put_nowait(l)
                  
              risultati_mappe = {}
              risultati_ai = {}
              
              tasks = []
              for cfg in WORKER_CONFIGS:
                  task = asyncio.create_task(
                      worker(cfg["id"], cfg["proxy_port"], coda, risultati_mappe, risultati_ai)
                  )
                  tasks.append(task)
                  
              await coda.join()
              
              # 1. Salviamo i dati completi delle mappe (Fase 1)
              lista_mappe = [info for info in risultati_mappe.values()]
              with open("dati_completi_mappe.json", "w", encoding="utf-8") as f:
                  json.dump(lista_mappe, f, indent=4, ensure_ascii=False)
                  
              # 2. Salviamo la Guida Viaggio Visiva AI (Fase 3)
              with open("guida_viaggio_visiva.json", "w", encoding="utf-8") as f:
                  json.dump(risultati_ai, f, indent=4, ensure_ascii=False)
                  
              # 3. Aggreghiamo ed esportiamo tutte le recensioni estratte dai singoli Worker (Fase 2)
              all_reviews = []
              for i in range(1, 7):
                  worker_dir = f"worker_{i}_env"
                  rev_file = os.path.join(worker_dir, "google_reviews.json")
                  if os.path.exists(rev_file):
                      try:
                          with open(rev_file, "r", encoding="utf-8") as f:
                              all_reviews.extend(json.load(f))
                      except Exception:
                          pass
              with open("google_reviews.json", "w", encoding="utf-8") as f:
                  json.dump(all_reviews, f, indent=4, ensure_ascii=False)
                  
              print("\n=== PIPELINE INTEGRATA PARALLELA COMPLETATA CON SUCCESSO ===", flush=True)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Pipeline Concorrente Orchestrata
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python orchestrator.py

      - name: Esporta Risultati AI Finale
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Mappe_Recensioni_e_GuidaAI
          path: |
            dati_completi_mappe.json
            google_reviews.json
            guida_viaggio_visiva.json
