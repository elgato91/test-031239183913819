name: Pipeline Parallela - Scraping & AI Desk Research

on: 
  workflow_dispatch:

jobs:
  run_full_pipeline:
    runs-on: ubuntu-latest
    steps:

      - name: Setup 3 WARProxy Docker Container (IPv6)
        run: |
          docker pull ghcr.io/kingcc/warproxy:latest
          
          # Avvia 3 proxy su 3 porte diverse per evitare rate limit
          for PORT in 40001 40002 40003; do
            docker run --name warproxy-$PORT --network host \
              -e SOCKS5_PORT=$PORT -e DNS=2606:4700:4700::1111,2606:4700:4700::1001 \
              -d ghcr.io/kingcc/warproxy:latest
          done
          echo "Attesa inizializzazione proxy..."
          sleep 10

      - name: Verifica IP dei 3 Proxy
        run: |
          for PORT in 40001 40002 40003; do
            echo "Verifica proxy su porta $PORT..."
            IP=""
            for i in {1..5}; do
              IP=$(curl -s --max-time 5 --proxy socks5h://127.0.0.1:$PORT https://api6.ipify.org) && break || sleep 3
            done
            if [ -z "$IP" ]; then
              echo "Errore: Proxy su porta $PORT non risponde."
              exit 1
            fi
            echo "Proxy $PORT pronto. IP: $IP"
          done

      - name: Setup Ambiente e Dipendenze
        run: |
          # Cloniamo lo scraper in una cartella "base" che poi i worker copieranno
          git clone https://github.com/georgekhananaev/google-reviews-scraper-pro.git base-scraper
          cd base-scraper
          pip install -r requirements.txt
          pip install pyyaml seleniumbase google-genai requests aiohttp
          seleniumbase install chromedriver

      - name: Avvio Xvfb (Display virtuale per Selenium)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Scrittura Orchestratore Parallelo Integrato
        shell: bash
        run: |
          cat << 'EOF' > orchestrator.py
          import asyncio
          import json
          import yaml
          import os
          import shutil
          import re
          import urllib.parse
          import glob
          import time
          from seleniumbase import Driver
          from google import genai
          from google.genai import types
          import requests

          # --- CONFIGURAZIONE LUOGHI ---
          LUOGHI_DA_ANALIZZARE = [
              'Colosseo, Roma',
              'Da Enzo al 29, Roma',
              'Hoffell hot tub',
              'Sulphur Bath, Vardzia, Georgia',
              'Pantheon, Roma'
          ]

          # --- SETUP DEI 6 RUNNER E DEI PROXY ---
          WORKER_CONFIGS = [
              {"id": 1, "proxy_port": 40001}, {"id": 2, "proxy_port": 40001},
              {"id": 3, "proxy_port": 40002}, {"id": 4, "proxy_port": 40002},
              {"id": 5, "proxy_port": 40003}, {"id": 6, "proxy_port": 40003}
          ]

          api_semaphore = asyncio.Semaphore(15)

          def pulisci_testo(testo):
              if not testo: return 'N/D'
              return re.sub(r'^[\s\W_]+', '', testo).strip()

          def genera_nome_file(luogo):
              return re.sub(r'[^a-zA-Z0-9]', '_', luogo.lower())

          async def call_with_retry(func, *args, max_retries=5):
              for attempt in range(max_retries):
                  try:
                      return await func(*args)
                  except Exception as e:
                      err_str = str(e).lower()
                      if "quota" in err_str or "429" in err_str or "1011" in err_str:
                          wait_time = (2 ** attempt) * 15
                          print(f"   [Gemini] Quota API raggiunta. Attesa {wait_time}s...", flush=True)
                          await asyncio.sleep(wait_time)
                      else:
                          raise e
              return None

          async def fase1_risolvi_mappa_worker(luogo, proxy_url, worker_id):
              def run_selenium():
                  # ISOLAMENTO TOTALE: Ogni worker ha la sua cartella profilo Chrome separata
                  user_dir = os.path.abspath(f"./chrome_profile_w{worker_id}")
                  driver = Driver(uc=True, headless=True, proxy=proxy_url, user_data_dir=user_dir)
                  
                  info_locale = {
                      'ricerca_originale': luogo, 'url_mappa': 'N/D', 'nome': 'N/D',
                      'categoria': 'N/D', 'indirizzo': 'N/D', 'telefono': 'N/D',
                      'sito_web': 'N/D', 'media_stelle': 'N/D', 'totale_recensioni': 'N/D',
                      'coordinate': {}, 'popular_times_affluenza': [], 'caratteristiche_servizi': []
                  }
                  
                  try:
                      search_url = f'https://www.google.com/maps/search/{urllib.parse.quote(luogo)}?hl=en'
                      driver.get(search_url)
                      driver.sleep(5)
                      
                      # Bypass Cookie Google
                      try:
                          consent_btn = driver.find_element('css selector', 'button[aria-label*="Accetta"], button[aria-label*="Accept"], [aria-label*="Agree"]')
                          consent_btn.click()
                          driver.sleep(2)
                      except: pass
                      
                      # --- LOGICA RISOLUZIONE URL / LISTE MAPS ---
                      current_url = driver.current_url
                      if '/maps/place/' not in current_url:
                          try:
                              # Tenta la classe per i risultati di ricerca in lista laterale (a.hfpxzc) o il vecchio selettore
                              first_result_el = driver.find_element('css selector', 'a[href*="/maps/place/"], a.hfpxzc')
                              resolved_url = first_result_el.get_attribute('href')
                              
                              if 'hl=' not in resolved_url:
                                  resolved_url += '&hl=en'
                              else:
                                  resolved_url = re.sub(r'hl=[a-z]{2}', 'hl=en', resolved_url)
                                  
                              driver.get(resolved_url)
                              driver.sleep(5)
                          except Exception:
                              pass
                      # -------------------------------------------
                      
                      info_locale['url_mappa'] = driver.current_url
                      
                      # Estrazione Dati
                      try: info_locale['nome'] = driver.find_element('css selector', 'h1').text
                      except: pass
                      try: info_locale['categoria'] = driver.find_element('css selector', 'button[jsaction*="category"]').text
                      except: pass
                      try: info_locale['indirizzo'] = pulisci_testo(driver.find_element('css selector', '[data-item-id="address"]').text)
                      except: pass
                      try: info_locale['telefono'] = pulisci_testo(driver.find_element('css selector', '[data-item-id^="phone:tel"]').text)
                      except: pass
                      try: info_locale['sito_web'] = driver.find_element('css selector', '[data-item-id="authority"]').get_attribute('href')
                      except: pass

                      match_at = re.search(r'@([-0-9.]+),([-0-9.]+)', driver.current_url)
                      if match_at:
                          info_locale['coordinate'] = {'latitudine': float(match_at.group(1)), 'longitudine': float(match_at.group(2))}
                      else:
                          match_data = re.search(r'!3d([-0-9.]+)!4d([-0-9.]+)', driver.current_url)
                          if match_data:
                              info_locale['coordinate'] = {'latitudine': float(match_data.group(1)), 'longitudine': float(match_data.group(2))}
                          
                      try:
                          rating_text = driver.find_element('css selector', 'div.F7nice').text.replace('\xa0', ' ')
                          if '(' in rating_text:
                              parts = rating_text.split('(')
                              info_locale['media_stelle'] = float(parts[0].strip())
                              info_locale['totale_recensioni'] = int(re.sub(r'[^\d]', '', parts[1].split(')')[0]))
                      except: pass

                      try:
                          pannello = None
                          for selector in ['div[role="main"]', 'div.m67q6b', 'div.bJWbme', 'div.ecsc6b']:
                              try:
                                  el = driver.find_element('css selector', selector)
                                  if el.is_displayed():
                                      pannello = el
                                      break
                              except: pass
                          if pannello:
                              for pos in [300, 600, 900]:
                                  driver.execute_script(f"arguments[0].scrollTo(0, {pos});", pannello)
                                  driver.sleep(1.5)
                      except: pass

                      try:
                          barre = driver.find_elements('xpath', "//*[contains(@aria-label, 'busy') or contains(@aria-label, 'popular') or contains(@aria-label, 'historically')]")
                          for b in barre:
                              lbl = b.get_attribute('aria-label')
                              if lbl and lbl not in info_locale['popular_times_affluenza']:
                                  info_locale['popular_times_affluenza'].append(lbl)
                      except: pass

                      try:
                          url_scheda_corrente = driver.current_url
                          info_btn = driver.find_element('css selector', 'button[data-tooltip="About"], button[aria-label*="About"]')
                          info_btn.click()
                          driver.sleep(2)
                          
                          elementi_servizi = driver.find_elements('css selector', 'li.FontNormal, .DRY99e li, span.Y39Ktc, div.fontBodyMedium')
                          for s in elementi_servizi:
                              if s.text and s.text not in info_locale['caratteristiche_servizi']:
                                  info_locale['caratteristiche_servizi'].append(s.text)
                      except: pass

                  finally:
                      driver.quit()
                  return info_locale

              loop = asyncio.get_running_loop()
              return await loop.run_in_executor(None, run_selenium)

          async def analizza_immagine_gemini(client, config_live, url_immagine):
              async with api_semaphore:
                  try:
                      url_ottimizzato = re.sub(r'=w\d+-h\d+', '=w600-h600', url_immagine)
                      loop = asyncio.get_running_loop()
                      img_bytes = await loop.run_in_executor(None, lambda: requests.get(url_ottimizzato, timeout=10).content if requests.get(url_ottimizzato).status_code == 200 else None)
                      if not img_bytes: return None

                      # PROMPT DESK RESEARCH
                      prompt = """Sei un reporter sul campo. Guarda questa foto e prendi appunti ultra-pratici e oggettivi.
                      1. TESTI VISIBILI: Trascrivi fedelmente orari, prezzi, numeri di telefono, cartelli esplicativi o nomi leggibili su scontrini e menu.
                      2. FATTI CONCRETI: Descrivi materialmente il luogo. Es: Il sentiero è in terra battuta, i tavoli sono di plastica, il cibo è servito in piatti di ceramica ed è abbondante, la stanza ha moquette, c'è una folla in coda.
                      Sii freddo, telegrafico e attento ai dettagli pratici. Nessun aggettivo emotivo."""
                      
                      accumulated_text = ""
                      async with client.aio.live.connect(model="gemini-3.1-flash-live-preview", config=config_live) as session:
                          await session.send_realtime_input(video=types.Blob(data=img_bytes, mime_type="image/jpeg"))
                          await asyncio.sleep(0.5)
                          await session.send_realtime_input(text=prompt)
                          async for response in session.receive():
                              if response.server_content and response.server_content.output_transcription:
                                  if response.server_content.output_transcription.text:
                                      accumulated_text += response.server_content.output_transcription.text
                              if response.server_content and response.server_content.turn_complete: break
                      
                      return {"url": url_immagine, "appunti_grezzi": accumulated_text.strip()}
                  except: return None

          async def fase3_ai_analisi(luogo, reviews_file):
              api_key = os.environ.get("GEMINI_API_KEY")
              if not api_key: return {"errore": "Manca API KEY"}
              client = genai.Client(api_key=api_key)
              config_live = {"response_modalities": ["AUDIO"], "output_audio_transcription": {}}
              
              if not os.path.exists(reviews_file): return {"errore": "Nessun dato di scraping."}
              with open(reviews_file, "r", encoding="utf-8") as f:
                  reviews = json.load(f)
                  
              urls_unici = list(set([img for r in reviews for img in r.get("user_images", [])]))
              if not urls_unici: return {"avviso": "Nessuna foto trovata in questa location."}
              
              urls_campione = urls_unici[:35]
              tasks = [call_with_retry(analizza_immagine_gemini, client, config_live, url) for url in urls_campione]
              risultati_raw = await asyncio.gather(*tasks)
              risultati_validi = [r for r in risultati_raw if r is not None]
              
              if not risultati_validi: return {"avviso": "Nessuna immagine analizzata."}
              
              # PROMPT SINTESI REDAZIONALE DESK RESEARCH (API STANDARD)
              prompt_fase2 = """
              Sei un assistente giornalistico. Ti passo gli appunti grezzi presi osservando decine di foto di un luogo.
              Il tuo compito è aggregarli per fornire al redattore un quadro crudo, pratico e iper-realistico di "come è veramente il posto".
              
              Restituisci SOLO UN JSON VALIDO con questa struttura esatta:
              {
                  "info_testuali_e_prezzi_recuperati": "Elenca tutti i dati testuali trascritti: orari, prezzi, piatti del menù, avvisi da cartelli o scontrini. Sii preciso.",
                  "descrizione_fisica_nuda_e_cruda": "Descrizione fattuale. Es: i tavoli sono di legno, il sentiero è franoso, le pareti sono scrostate, le posate di plastica.",
                  "osservazioni_su_cibo_e_servizio": "Cosa si consuma e come viene servito (porzioni, tipi di bicchieri, ingredienti evidenti).",
                  "contesto_ambientale": "È affollato? Le persone fanno la fila fuori? Sembra pulito o trasandato?"
              }
              """
              
              payload = json.dumps(risultati_validi, ensure_ascii=False)
              combined = f"APPUNTI VISIVI DALLE FOTO:\n{payload}\n\nISTRUZIONI REDAZIONALI:\n{prompt_fase2}"
              
              # USA API GENERATE CONTENT PER IL JSON FINALE
              async def esegui_sintesi():
                  response = await client.aio.models.generate_content(
                      model='gemini-2.5-flash',
                      contents=combined,
                      config=types.GenerateContentConfig(
                          response_mime_type="application/json"
                      )
                  )
                  return json.loads(response.text)

              sintesi_json = await call_with_retry(esegui_sintesi)
                  
              return {
                  "report_desk_research": sintesi_json,
                  "analisi_singole_foto": risultati_validi
              }

          async def worker(worker_id, proxy_port, coda_luoghi, diz_mappe, diz_ai):
              await asyncio.sleep(worker_id * 3)
              proxy_url = f"socks5://127.0.0.1:{proxy_port}"
              worker_dir = f"worker_{worker_id}_env"
              
              if os.path.exists(worker_dir): shutil.rmtree(worker_dir)
              shutil.copytree("base-scraper", worker_dir)
              
              while not coda_luoghi.empty():
                  luogo = await coda_luoghi.get()
                  print(f"► [Worker {worker_id}] Prende in carico: '{luogo}'", flush=True)
                  safe_luogo = genera_nome_file(luogo)
                  
                  # FASE 1: Risoluzione Maps (con worker_id passato per Chrome Profile)
                  info_locale = await fase1_risolvi_mappa_worker(luogo, proxy_url, worker_id)
                  
                  if not info_locale or info_locale.get('url_mappa') == 'N/D':
                      print(f"✖ [Worker {worker_id}] Fallita ricerca per '{luogo}'. Salto.", flush=True)
                      coda_luoghi.task_done()
                      continue
                      
                  diz_mappe[luogo] = info_locale
                  
                  # FASE 2: Scraping Isolato
                  reviews_filename = f"reviews_{safe_luogo}.json"
                  db_filename = f"db_{safe_luogo}.sqlite"
                  
                  config_data = {
                      'headless': True, 'sort_by': 'newest', 'scrape_mode': 'full',
                      'max_reviews': 80, 'proxy': proxy_url, 'db_path': db_filename,
                      'download_images': False, 'use_mongodb': False,
                      'backup_to_json': True, 'json_path': reviews_filename,
                      'businesses': [{'url': info_locale['url_mappa'], 'custom_params': {'company': luogo}}]
                  }
                  
                  with open(os.path.join(worker_dir, "config.yaml"), 'w') as f: yaml.dump(config_data, f)
                  
                  process = await asyncio.create_subprocess_exec(
                      "python", "start.py", cwd=worker_dir,
                      stdout=asyncio.subprocess.PIPE, stderr=asyncio.subprocess.PIPE
                  )
                  await process.communicate()
                  
                  # FASE 3: AI
                  file_recensioni_path = os.path.join(worker_dir, reviews_filename)
                  risultati_ai = await fase3_ai_analisi(luogo, file_recensioni_path)
                  diz_ai[luogo] = risultati_ai
                  
                  print(f"✔ [Worker {worker_id}] Completato: '{luogo}'", flush=True)
                  coda_luoghi.task_done()

          async def main():
              print("=== AVVIO ORCHESTRATORE ===", flush=True)
              coda = asyncio.Queue()
              for l in LUOGHI_DA_ANALIZZARE: coda.put_nowait(l)
                  
              risultati_mappe = {}
              risultati_ai = {}
              
              tasks = [asyncio.create_task(worker(cfg["id"], cfg["proxy_port"], coda, risultati_mappe, risultati_ai)) for cfg in WORKER_CONFIGS]
              await coda.join()
              
              # Export
              with open("dati_completi_mappe.json", "w", encoding="utf-8") as f:
                  json.dump(list(risultati_mappe.values()), f, indent=4, ensure_ascii=False)
                  
              with open("report_fotografico_desk_research.json", "w", encoding="utf-8") as f:
                  json.dump(risultati_ai, f, indent=4, ensure_ascii=False)
                  
              # Raccoglie i file univoci per luogo
              all_reviews = []
              for i in range(1, 7):
                  worker_dir = f"worker_{i}_env"
                  for rev_file in glob.glob(os.path.join(worker_dir, "reviews_*.json")):
                      try:
                          with open(rev_file, "r", encoding="utf-8") as f:
                              all_reviews.extend(json.load(f))
                      except Exception: pass
                      
              with open("google_reviews.json", "w", encoding="utf-8") as f:
                  json.dump(all_reviews, f, indent=4, ensure_ascii=False)
                  
              print("\n=== PIPELINE COMPLETATA ===", flush=True)

          if __name__ == "__main__":
              asyncio.run(main())
          EOF

      - name: Esecuzione Pipeline Concorrente Orchestrata
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python orchestrator.py

      - name: Esporta Risultati AI Finale
        uses: actions/upload-artifact@v4
        with:
          name: Risultati_Desk_Research_e_Scraping
          path: |
            dati_completi_mappe.json
            google_reviews.json
            report_fotografico_desk_research.json
